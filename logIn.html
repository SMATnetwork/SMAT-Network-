<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SMAT | Reg & LogIn</title>
    <style>
        :root {
            --primary: #f3ba2f;
            --primary-hover: #dbc03d;
            --bg: #0b0e11;
            --card-bg: #1e2329;
            --input-bg: #2b3139;
            --text-main: #eaecef;
            --text-muted: #848e9c;
            --border: #474d57;
            --shadow: 0 12px 40px rgba(0, 0, 0, 0.6);
        }

        * { 
            box-sizing: border-box; 
            transition: all 0.25s cubic-bezier(0.4, 0, 0.2, 1);
            outline: none !important;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Roboto, sans-serif;
            background-color: var(--bg);
            background-image: radial-gradient(circle at 50% 50%, #181a20 0%, #0b0e11 100%);
            color: var(--text-main);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        .auth-container {
            width: 92%;
            max-width: 380px;
            background: var(--card-bg);
            padding: 45px 35px;
            border-radius: 24px;
            box-shadow: var(--shadow);
            text-align: center;
            border: 1px solid rgba(255, 255, 255, 0.04);
        }

        h2 {
            font-size: 26px;
            font-weight: 700;
            margin: 0 0 10px 0;
            color: var(--text-main);
            letter-spacing: -0.5px;
        }

        .subtitle {
            color: var(--text-muted);
            font-size: 14px;
            margin-bottom: 35px;
        }

        .input-group {
            text-align: left;
            margin-bottom: 22px;
        }

        label {
            display: flex;
            justify-content: space-between;
            font-size: 13px;
            margin-bottom: 8px;
            color: var(--text-muted);
            font-weight: 500;
        }

        input {
            width: 100%;
            padding: 15px 18px;
            background-color: var(--input-bg);
            border: 1.5px solid transparent;
            border-radius: 12px;
            color: white;
            font-size: 15px;
        }

        input:focus {
            border-color: var(--primary);
            background-color: #1e2329;
            box-shadow: 0 0 10px rgba(243, 186, 47, 0.1);
        }

        .pass-hint {
            font-size: 10px;
            color: var(--text-muted);
        }

        button {
            width: 100%;
            padding: 16px;
            background-color: var(--primary);
            color: #000;
            border: none;
            border-radius: 12px;
            font-size: 16px;
            font-weight: 700;
            cursor: pointer;
            margin-top: 15px;
            box-shadow: 0 4px 15px rgba(243, 186, 47, 0.2);
        }

        button:disabled {
            background-color: #474d57;
            color: #848e9c;
            cursor: not-allowed;
            box-shadow: none;
        }

        button:hover:not(:disabled) {
            background-color: var(--primary-hover);
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(243, 186, 47, 0.3);
        }

        .footer-links {
            margin-top: 30px;
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .toggle-link {
            color: var(--primary);
            font-size: 14px;
            cursor: pointer;
            font-weight: 600;
            text-decoration: none;
        }

        .toggle-link:hover { color: #fff; }

        .forgot-pass {
            color: var(--text-muted);
            font-size: 13px;
            cursor: pointer;
        }

        .msg {
            margin-top: 20px;
            padding: 12px;
            border-radius: 10px;
            font-size: 13px;
            display: none;
            background: rgba(255, 255, 255, 0.03);
        }
    </style>
</head>
<body>

<div class="auth-container">
    <h2 id="title">Sign In</h2>
    <p class="subtitle" id="subtitle">Log in to your SMAT account</p>

    <div class="input-group">
        <label>Email Address</label>
        <input type="email" id="email" placeholder="email@example.com">
    </div>

    <div class="input-group">
        <label>
            Password 
            <span id="passStatus" class="pass-hint"></span>
        </label>
        <input type="password" id="password" placeholder="••••••••" oninput="validatePassword()">
    </div>

    <button id="btn" onclick="handleAuth()">Login</button>

    <div id="message" class="msg"></div>

    <div class="footer-links">
        <div class="toggle-link" id="toggleLink" onclick="toggleForm()">Create account</div>
        <div class="forgot-pass" onclick="resetPass()">Forgot password?</div>
    </div>
</div>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
  import { getAuth, createUserWithEmailAndPassword, signInWithEmailAndPassword, sendEmailVerification, sendPasswordResetEmail } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
  import { getDatabase, ref, set, get, runTransaction } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

  const firebaseConfig = {
    apiKey: "AIzaSyAMxtJedkehhxJRMPZLjhpKHqneHEWsGlE",
    authDomain: "smat-exchange.firebaseapp.com",
    projectId: "smat-exchange",
    storageBucket: "smat-exchange.firebasestorage.app",
    messagingSenderId: "836334569396",
    appId: "1:836334569396:web:679effe640b3453412d4e1",
    measurementId: "G-FCE3H3F18V"
  };

  const app = initializeApp(firebaseConfig);
  const auth = getAuth(app);
  const db = getDatabase(app);

  let isLogin = true;

  // --- Referral Detection ---
  const urlParams = new URLSearchParams(window.location.search);
  const referralID = urlParams.get('ref') || null;

  window.validatePassword = () => {
    const pass = document.getElementById('password').value;
    const status = document.getElementById('passStatus');
    const submitBtn = document.getElementById('btn');
    const regex = /^(?=.*[A-Za-z])(?=.*\d)[A-Za-z\d]{8,}$/;

    if (pass === "") {
        status.innerText = "";
        submitBtn.disabled = false;
        return;
    }

    if (regex.test(pass)) {
        status.innerText = "✓ Strong";
        status.style.color = "#00ff88";
        submitBtn.disabled = false;
    } else {
        status.innerText = "Min 8 chars, Letter & Number";
        status.style.color = "#ff4d4d";
        if(!isLogin) submitBtn.disabled = true;
    }
  };

  window.toggleForm = () => {
    isLogin = !isLogin;
    document.getElementById('title').innerText = isLogin ? "Sign In" : "Register";
    document.getElementById('subtitle').innerText = isLogin ? "Log in to your SMAT account" : "Join the SMAT ecosystem today";
    document.getElementById('btn').innerText = isLogin ? "Login" : "Create Account";
    document.getElementById('toggleLink').innerText = isLogin ? "Create account" : "Already have an account? Sign In";
    document.getElementById('message').style.display = "none";
    document.getElementById('passStatus').innerText = "";
    document.getElementById('btn').disabled = false;
  };

  const generateSmatID = async () => {
    const counterRef = ref(db, 'counters/lastSmatId');
    const result = await runTransaction(counterRef, (currentValue) => {
      return (currentValue || 100000) + 1;
    });
    return "SMAT" + result.snapshot.val();
  };

  window.handleAuth = async () => {
    const email = document.getElementById('email').value;
    const pass = document.getElementById('password').value;
    const msgBox = document.getElementById('message');
    
    if(!email || !pass) return alert("Please fill all fields");

    msgBox.style.display = "block";
    msgBox.style.color = "white";
    msgBox.innerText = "Processing...";

    try {
      if (isLogin) {
        const userCredential = await signInWithEmailAndPassword(auth, email, pass);
        
        if (userCredential.user.emailVerified) {
          const userSnapshot = await get(ref(db, 'users/' + userCredential.user.uid));
          if(userSnapshot.exists()){
            localStorage.setItem('smatID', userSnapshot.val().smatID);
          }
          
          localStorage.setItem('isLoggedIn', 'true');
          localStorage.setItem('userEmail', email);
          window.location.href = "home.html"; 
        } else {
          msgBox.style.color = "#f3ba2f";
          msgBox.innerText = "Please verify your email first!";
        }
      } else {
        const userCredential = await createUserWithEmailAndPassword(auth, email, pass);
        const newUser = userCredential.user;
        const newSmatID = await generateSmatID();

        // ডেটাবেজে ইউজারের তথ্য সেভ করা (রেফারেলসহ)
        await set(ref(db, 'users/' + newUser.uid), {
          email: email,
          smatID: newSmatID,
          kycStatus: 'unverified',
          referredBy: referralID, // URL থেকে পাওয়া রেফারেল আইডি এখানে সেভ হবে
          createdAt: new Date().toISOString()
        });

        await sendEmailVerification(newUser);
        msgBox.style.color = "#00ff88";
        msgBox.innerText = "Verification link sent! Check your Gmail.";
      }
    } catch (e) {
      msgBox.style.color = "#ff4d4d";
      msgBox.innerText = e.message;
    }
  };

  window.resetPass = async () => {
    const email = document.getElementById('email').value;
    if(!email) return alert("Enter email first.");
    try {
        await sendPasswordResetEmail(auth, email);
        alert("Password reset link sent to your email!");
    } catch (e) { alert(e.message); }
  };
</script>

</body>
</html>
