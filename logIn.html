<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SMAT Exchange | Secure Access</title>
    <style>
        :root {
            --primary: #f3ba2f;
            --primary-hover: #dbc03d;
            --bg: #0b0e11;
            --card-bg: #1e2329;
            --input-bg: #2b3139;
            --text-main: #eaecef;
            --text-muted: #848e9c;
            --border: #474d57;
            --shadow: 0 12px 40px rgba(0, 0, 0, 0.6);
        }

        /* কমন স্টাইল */
        * { 
            box-sizing: border-box; 
            transition: all 0.25s cubic-bezier(0.4, 0, 0.2, 1);
            outline: none !important;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Roboto, sans-serif;
            background-color: var(--bg);
            background-image: radial-gradient(circle at 50% 50%, #181a20 0%, #0b0e11 100%);
            color: var(--text-main);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        /* কার্ড ডিজাইন */
        .container-box {
            width: 92%;
            max-width: 380px;
            background: var(--card-bg);
            padding: 40px 30px;
            border-radius: 24px;
            box-shadow: var(--shadow);
            border: 1px solid rgba(255, 255, 255, 0.04);
            text-align: center;
        }

        h2 { font-size: 26px; margin-bottom: 10px; color: var(--text-main); }
        .subtitle { color: var(--text-muted); font-size: 14px; margin-bottom: 30px; }

        /* ইনপুট স্টাইল */
        .input-group { text-align: left; margin-bottom: 20px; }
        label { display: block; font-size: 13px; margin-bottom: 8px; color: var(--text-muted); }
        input {
            width: 100%;
            padding: 15px;
            background-color: var(--input-bg);
            border: 1.5px solid transparent;
            border-radius: 12px;
            color: white;
            font-size: 15px;
        }
        input:focus { border-color: var(--primary); background-color: #1e2329; }

        /* বাটন ডিজাইন */
        button {
            width: 100%;
            padding: 16px;
            background-color: var(--primary);
            color: #000;
            border: none;
            border-radius: 12px;
            font-size: 16px;
            font-weight: 700;
            cursor: pointer;
            margin-top: 10px;
            box-shadow: 0 4px 15px rgba(243, 186, 47, 0.2);
        }
        button:hover { transform: translateY(-2px); box-shadow: 0 6px 20px rgba(243, 186, 47, 0.3); }

        .btn-secondary { background: #474d57; color: white; margin-top: 15px; }

        /* ড্যাশবোর্ড বিশেষ স্টাইল */
        #dashBox { display: none; text-align: left; }
        .balance-card {
            background: linear-gradient(135deg, #2b3139 0%, #1e2329 100%);
            padding: 20px;
            border-radius: 16px;
            margin: 20px 0;
            border: 1px solid var(--border);
        }
        .balance-amount { font-size: 30px; font-weight: 700; color: var(--primary); margin: 5px 0; }

        /* ফুটার লিঙ্ক */
        .footer-links { margin-top: 25px; display: flex; flex-direction: column; gap: 12px; }
        .toggle-link { color: var(--primary); cursor: pointer; font-size: 14px; font-weight: 600; }
        .logout-link { color: #ff4d4d; cursor: pointer; font-size: 13px; margin-top: 20px; display: block; text-align: center; }
        .msg { margin-top: 15px; font-size: 13px; display: none; }
    </style>
</head>
<body>

    <div class="container-box" id="authBox">
        <h2 id="title">Sign In</h2>
        <p class="subtitle" id="subtitle">Log in to continue your trade</p>
        
        <div class="input-group">
            <label>Email Address</label>
            <input type="email" id="email" placeholder="email@example.com">
        </div>
        <div class="input-group">
            <label>Password</label>
            <input type="password" id="password" placeholder="••••••••">
        </div>

        <button id="btn" onclick="handleAuth()">Login</button>
        <div id="message" class="msg"></div>

        <div class="footer-links">
            <div class="toggle-link" id="toggleLink" onclick="toggleForm()">Create account</div>
            <div style="color:var(--text-muted); font-size:13px; cursor:pointer" onclick="resetPass()">Forgot password?</div>
        </div>
    </div>

    <div class="container-box" id="dashBox">
        <h2 style="font-size: 22px;">Assets Overview</h2>
        <p id="userEmailDisplay" style="color: var(--text-muted); font-size: 13px; margin-bottom: 20px;"></p>
        
        <div class="balance-card">
            <p style="font-size: 13px; margin: 0; color: var(--text-muted);">Total Balance (USDT)</p>
            <div class="balance-amount">0.00</div>
            <p style="font-size: 12px; color: #00ff88; margin: 0;">≈ 0.00 BDT</p>
        </div>

        <button onclick="alert('Deposit System logic is being added...')">Deposit</button>
        <button class="btn-secondary" onclick="alert('Withdrawals are currently locked.')">Withdraw</button>

        <span class="logout-link" onclick="location.reload()">Secure Logout</span>
    </div>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
  import { getAuth, createUserWithEmailAndPassword, signInWithEmailAndPassword, sendEmailVerification, sendPasswordResetEmail } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

  // আপনার আসল ফায়ারবেস কনফিগ
  const firebaseConfig = {
    apiKey: "AIzaSyAMxtJedkehhxJRMPZLjhpKHqneHEWsGlE",
    authDomain: "smat-exchange.firebaseapp.com",
    projectId: "smat-exchange",
    storageBucket: "smat-exchange.firebasestorage.app",
    messagingSenderId: "836334569396",
    appId: "1:836334569396:web:679effe640b3453412d4e1",
    measurementId: "G-FCE3H3F18V"
  };

  const app = initializeApp(firebaseConfig);
  const auth = getAuth(app);

  let isLogin = true;

  // ফর্ম টগল ফাংশন
  window.toggleForm = () => {
    isLogin = !isLogin;
    document.getElementById('title').innerText = isLogin ? "Sign In" : "Register";
    document.getElementById('btn').innerText = isLogin ? "Login" : "Create Account";
    document.getElementById('toggleLink').innerText = isLogin ? "Create account" : "Sign in instead";
    document.getElementById('message').style.display = "none";
  };

  // মেইন অথেনটিকেশন ফাংশন
  window.handleAuth = async () => {
    const email = document.getElementById('email').value;
    const pass = document.getElementById('password').value;
    const msgBox = document.getElementById('message');
    
    if(!email || !pass) return alert("Please fill all fields");

    msgBox.style.display = "block";
    msgBox.style.color = "white";
    msgBox.innerText = "Processing...";

    try {
      if (isLogin) {
        // লগইন লজিক
        const userCredential = await signInWithEmailAndPassword(auth, email, pass);
        if (userCredential.user.emailVerified) {
          // সফল হলে ড্যাশবোর্ড দেখাও
          document.getElementById('authBox').style.display = 'none';
          document.getElementById('dashBox').style.display = 'block';
          document.getElementById('userEmailDisplay').innerText = userCredential.user.email;
        } else {
          msgBox.style.color = "#f3ba2f";
          msgBox.innerText = "Please verify your email first!";
        }
      } else {
        // রেজিস্ট্রেশন লজিক
        const user = await createUserWithEmailAndPassword(auth, email, pass);
        await sendEmailVerification(user.user);
        msgBox.style.color = "#00ff88";
        msgBox.innerText = "Verification link sent to your email!";
      }
    } catch (e) {
      msgBox.style.color = "#ff4d4d";
      msgBox.innerText = e.message;
    }
  };

  // পাসওয়ার্ড রিসেট
  window.resetPass = async () => {
    const email = document.getElementById('email').value;
    if(!email) return alert("Enter email first.");
    try {
        await sendPasswordResetEmail(auth, email);
        alert("Reset link sent!");
    } catch (e) { alert(e.message); }
  };
</script>
</body>
</html>
