<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SMAT | Home Official</title>
    
    <script src="https://www.gstatic.com/firebasejs/9.0.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.0.0/firebase-database-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.0.0/firebase-auth-compat.js"></script>
    <script src="coin.js"></script>

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        /* CSS (অপরিবর্তিত - আগের স্টাইলগুলোই কাজ করবে) */
        :root { --primary: #f3ba2f; --bg: #0b0e11; --card-bg: #1e2329; --text-main: #eaecef; --text-sec: #848e9c; --up: #0ecb81; --down: #f6465d; --border: #2b3139; }
        body { margin: 0; background: var(--bg); color: var(--text-main); font-family: 'Segoe UI', sans-serif; padding-bottom: 90px; }
        .header { padding: 15px; display: flex; align-items: center; justify-content: space-between; position: sticky; top: 0; background: var(--bg); z-index: 100; }
        .profile-trigger { font-size: 26px; color: var(--primary); cursor: pointer; }
        .sidebar { position: fixed; top: 0; left: -100%; width: 85%; max-width: 320px; height: 100%; background: var(--card-bg); z-index: 4000; transition: 0.4s; padding: 25px; box-shadow: 15px 0 40px rgba(0,0,0,0.7); overflow-y: auto;}
        .sidebar.active { left: 0; }
        .sidebar-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); display: none; z-index: 3500; }
        .user-id-box { background: #181a20; padding: 15px; border-radius: 12px; margin: 15px 0; border: 1px dashed var(--primary); }
        .asset-card { margin: 15px; background: linear-gradient(135deg, #2b3139 0%, #1e2329 100%); padding: 25px; border-radius: 24px; border: 1px solid var(--border); }
        .asset-val { font-size: 32px; font-weight: 800; color: var(--primary); margin: 12px 0; }
        .market-tabs { display: flex; padding: 0 15px; gap: 20px; border-bottom: 1px solid var(--border); margin-top: 15px; }
        .tab { padding: 12px 5px; color: var(--text-sec); font-size: 15px; font-weight: 600; cursor: pointer; }
        .tab.active { color: var(--primary); border-bottom: 3px solid var(--primary); }
        .coin-list { padding: 5px 15px; }
        .coin-row { display: flex; justify-content: space-between; align-items: center; padding: 15px 0; border-bottom: 1px solid rgba(255,255,255,0.03); cursor: pointer; }
        .percent-box { padding: 6px 12px; border-radius: 8px; font-weight: 700; font-size: 13px; min-width: 75px; text-align: center; }
        .footer { position: fixed; bottom: 0; width: 100%; height: 75px; background: #181a20; display: flex; justify-content: space-around; align-items: center; border-top: 1px solid #2b3139; }
        .f-nav { text-decoration: none; color: var(--text-sec); text-align: center; font-size: 10px; }
        .f-nav i { font-size: 22px; display: block; margin-bottom: 4px; }
        .f-nav.active { color: var(--primary); }
    </style>
</head>
<body>

    <div class="sidebar-overlay" id="overlay" onclick="toggleSidebar()"></div>
    <div class="sidebar" id="sidebar">
        <h3 style="margin: 0 0 20px 0;">Account Profile</h3>
        <div id="loggedInContent">
            <div id="emailDisplay" style="font-weight:600; margin-top:4px;">Loading...</div>
            <div class="user-id-box">
                <span id="smatID" style="font-size:18px; font-weight:800; color:var(--primary);">SMAT------</span>
            </div>
            </div>
    </div>

    <div class="header">
        <i class="fa-solid fa-circle-user profile-trigger" onclick="toggleSidebar()"></i>
        <div style="font-weight: 900; font-size: 20px;">SMAT <span style="color:var(--primary)">Exchange</span></div>
        <i class="fa-solid fa-bell" style="font-size:22px; color:var(--text-sec)"></i>
    </div>

    <div class="asset-card">
        <div style="font-size: 14px; color: var(--text-sec);">Total Equity (USD)</div>
        <div class="asset-val">$ <span id="totalValue">0.00</span></div>
    </div>

    <div class="market-tabs">
        <div class="tab active" onclick="switchTab(this, 'hot')">Hot</div>
        <div class="tab" onclick="switchTab(this, 'gainer')">Gainers</div>
        <div class="tab" onclick="switchTab(this, 'loser')">Losers</div>
        <div class="tab" onclick="switchTab(this, 'new')">New</div>
    </div>

    <div class="coin-list" id="coinContainer"></div>

    <footer class="footer">
        <a href="home.html" class="f-nav active"><i class="fas fa-home"></i>Home</a>
        <a href="Trade.html" class="f-nav"><i class="fas fa-chart-line"></i>Trade</a>
        <a href="Wallet.html" class="f-nav"><i class="fas fa-wallet"></i>Wallet</a>
    </footer>

<script>
    // Firebase Config (আপনার API Key গুলো এখানে থাকবে)
    const firebaseConfig = {
        apiKey: "AIzaSyAMxtJedkehhxJRMPZLjhpKHqneHEWsGlE",
        authDomain: "smat-exchange.firebaseapp.com",
        projectId: "smat-exchange",
        storageBucket: "smat-exchange.firebasestorage.app",
        messagingSenderId: "836334569396",
        appId: "1:836334569396:web:679effe640b3453412d4e1",
        measurementId: "G-FCE3H3F18V",
        databaseURL: "https://smat-exchange-default-rtdb.firebaseio.com/"
    };
    firebase.initializeApp(firebaseConfig);
    const auth = firebase.auth();
    const database = firebase.database();

    let currentActiveTab = 'hot';

    // --- কয়েন রেন্ডারিং লজিক (HOT, Gainer, Loser) ---
    function renderCoins(filter = 'hot') {
        const container = document.getElementById('coinContainer');
        const liveData = (typeof GLOBAL_COINS !== 'undefined') ? GLOBAL_COINS : [];
        let filtered = [];

        // ফিল্টারিং লজিক
        if (filter === 'hot') {
            filtered = [...liveData].slice(0, 10);
        } else if (filter === 'gainer') {
            filtered = [...liveData].sort((a, b) => b.change - a.change);
        } else if (filter === 'loser') {
            filtered = [...liveData].sort((a, b) => a.change - b.change);
        } else if (filter === 'new') {
            filtered = [...liveData].slice(-5).reverse();
        }

        let htmlContent = '';
        filtered.forEach(coin => {
            const isUp = coin.change >= 0;
            htmlContent += `
                <div class="coin-row" onclick="window.location.href='Trade.html?coin=${coin.sym}'">
                    <div style="display:flex; align-items:center; gap:12px;">
                        <div style="width:35px; height:35px; background:#2b3139; border-radius:50%; display:flex; align-items:center; justify-content:center; font-weight:bold; font-size:12px">
                            ${coin.sym[0]}
                        </div>
                        <div>
                            <div style="font-weight:bold">${coin.sym.toUpperCase()}</div>
                            <div style="font-size:12px; color:var(--text-sec)">${coin.name}</div>
                        </div>
                    </div>
                    <div style="text-align:right">
                        <div style="font-weight:bold; font-size:16px">$${coin.price.toFixed(4)}</div>
                        <div class="percent-box" style="color:${isUp ? 'var(--up)' : 'var(--down)'}; background:${isUp ? 'rgba(14,203,129,0.1)' : 'rgba(246,70,93,0.1)'}">
                            ${isUp ? '+' : ''}${coin.change}%
                        </div>
                    </div>
                </div>
            `;
        });
        container.innerHTML = htmlContent;
    }

    function switchTab(element, category) {
        currentActiveTab = category;
        document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
        element.classList.add('active');
        renderCoins(category);
    }

    // --- Firebase Auth & User Data ---
    auth.onAuthStateChanged(user => {
        if (user) {
            document.getElementById('emailDisplay').innerText = user.email;
            database.ref('users/' + user.uid).on('value', (snapshot) => {
                let data = snapshot.val();
                if (!data) createNewUser(user.uid);
                else document.getElementById('smatID').innerText = data.smatID;
            });
        } else {
            window.location.href = 'logIn.html';
        }
    });

    function createNewUser(uid) {
        database.ref('userCount').transaction(c => (c || 0) + 1, (err, comm, snap) => {
            if (comm) {
                const newID = "SMAT" + (100000 + snap.val());
                database.ref('users/' + uid).set({
                    email: auth.currentUser.email,
                    smatID: newID,
                    kycStatus: 'unverified'
                });
            }
        });
    }

    // পেজ লোড হলে কয়েন লিস্ট দেখাবে
    window.onload = () => {
        renderCoins('hot');
        // প্রতি ৩ সেকেন্ড পর পর আপডেট হবে
        setInterval(() => renderCoins(currentActiveTab), 3000);
    };

    function toggleSidebar() {
        document.getElementById('sidebar').classList.toggle('active');
        document.getElementById('overlay').style.display = 
            document.getElementById('sidebar').classList.contains('active') ? 'block' : 'none';
    }
</script>

</body>
</html>
