<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SMAT | Home Official</title>
    <script src="coin.js"></script> <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root {
            --primary: #f3ba2f; --bg: #0b0e11; --card-bg: #1e2329;
            --text-main: #eaecef; --text-sec: #848e9c; --up: #0ecb81;
            --down: #f6465d; --border: #2b3139;
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; margin: 0; padding: 0; }
        body { background: var(--bg); color: var(--text-main); font-family: 'Inter', sans-serif; padding-bottom: 90px; }

        /* Header */
        .header { padding: 15px; display: flex; align-items: center; justify-content: space-between; position: sticky; top: 0; background: var(--bg); z-index: 100; border-bottom: 1px solid var(--border); }
        .profile-trigger { font-size: 24px; color: var(--primary); cursor: pointer; }

        /* Asset Card */
        .asset-card { margin: 15px; background: linear-gradient(135deg, #2b3139 0%, #1e2329 100%); padding: 25px; border-radius: 20px; border: 1px solid var(--border); position: relative; overflow: hidden; }
        .asset-val { font-size: 30px; font-weight: 800; color: var(--primary); margin: 8px 0; }

        /* Market Tabs */
        .market-tabs { display: flex; padding: 0 15px; gap: 20px; border-bottom: 1px solid var(--border); margin-top: 10px; }
        .tab { padding: 12px 5px; color: var(--text-sec); font-size: 14px; font-weight: 600; cursor: pointer; position: relative; }
        .tab.active { color: var(--primary); }
        .tab.active::after { content: ''; position: absolute; bottom: 0; left: 0; width: 100%; height: 3px; background: var(--primary); border-radius: 10px; }

        /* Coin List with Chart Icon */
        .coin-list { padding: 5px 15px; }
        .coin-row { display: flex; justify-content: space-between; align-items: center; padding: 16px 0; border-bottom: 1px solid rgba(255,255,255,0.05); cursor: pointer; }
        .coin-info { display: flex; align-items: center; gap: 12px; }
        .coin-icon-box { position: relative; }
        .coin-icon { width: 36px; height: 36px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-weight: bold; font-size: 14px; border: 1px solid rgba(255,255,255,0.1); }
        .mini-chart-icon { position: absolute; bottom: -2px; right: -2px; background: var(--bg); border-radius: 50%; padding: 2px; font-size: 10px; color: var(--up); }
        
        .price-info { text-align: right; }
        .percent-box { display: inline-block; padding: 5px 10px; border-radius: 6px; font-weight: 700; font-size: 12px; min-width: 70px; text-align: center; margin-top: 4px; }

        /* Trade History Section (নতুন যোগ করা হয়েছে) */
        .history-section { margin: 20px 15px; background: var(--card-bg); border-radius: 15px; padding: 15px; border: 1px solid var(--border); }
        .history-header { display: flex; justify-content: space-between; font-size: 13px; color: var(--text-sec); border-bottom: 1px solid var(--border); padding-bottom: 10px; margin-bottom: 10px; }
        .history-row { display: flex; justify-content: space-between; font-size: 12px; padding: 8px 0; border-bottom: 1px solid rgba(255,255,255,0.02); }

        /* Footer */
        .footer { position: fixed; bottom: 0; width: 100%; height: 70px; background: #111; display: flex; justify-content: space-around; align-items: center; border-top: 1px solid var(--border); z-index: 1000; }
        .f-nav { text-decoration: none; color: var(--text-sec); text-align: center; font-size: 10px; flex: 1; }
        .f-nav i { font-size: 20px; margin-bottom: 4px; display: block; }
        .f-nav.active { color: var(--primary); }
    </style>
</head>
<body>

    <div class="header">
        <i class="fa-solid fa-circle-user profile-trigger"></i>
        <div style="font-weight:900; font-size:18px;">SMAT <span style="color:var(--primary)">CEX</span></div>
        <i class="fa-solid fa-bell" style="color: var(--text-sec)"></i>
    </div>

    <div class="asset-card">
        <div style="font-size:12px; color:var(--text-sec);">Estimated Portfolio Balance</div>
        <div class="asset-val">$ <span id="totalValueDisplay">0.00</span></div>
        <div style="font-size:12px; color:var(--up)"><i class="fas fa-caret-up"></i> +2.45% (24h)</div>
    </div>

    <div class="market-tabs">
        <div class="tab active" onclick="switchTab(this, 'hot')">Hot</div>
        <div class="tab" onclick="switchTab(this, 'gainer')">Gainers</div>
        <div class="tab" onclick="switchTab(this, 'new')">New Listings</div>
    </div>

    <div class="coin-list" id="coinContainer">
        </div>

    <div class="history-section">
        <div class="history-header">
            <span onclick="loadHistory('global')" style="color:var(--primary); cursor:pointer">Global Trades</span>
            <span onclick="loadHistory('my')" style="cursor:pointer">My Trade</span>
            <span onclick="loadHistory('unsuccessful')" style="cursor:pointer">Failed</span>
        </div>
        <div id="historyContainer">
            <div style="text-align:center; padding:20px; color:var(--text-sec); font-size:12px;">
                <i class="fas fa-spinner fa-spin"></i> Syncing live history...
            </div>
        </div>
    </div>

    <footer class="footer">
        <a href="home.html" class="f-nav active"><i class="fas fa-home"></i>Home</a>
        <a href="Trade.html" class="f-nav"><i class="fas fa-chart-line"></i>Trade</a>
        <a href="Explorer.html" class="f-nav"><i class="fas fa-compass"></i>Explore</a>
        <a href="Wallet.html" class="f-nav"><i class="fas fa-wallet"></i>Wallet</a>
    </footer>

    <script>
        let currentFilter = 'hot';

        // ১. কয়েন লিস্ট রেন্ডারিং (সাথে ক্যান্ডেলস্টিক আইকন)
        function renderCoins() {
            const container = document.getElementById('coinContainer');
            const liveData = JSON.parse(localStorage.getItem('marketStats')) || GLOBAL_COINS;
            
            let filtered = liveData;
            if (currentFilter === 'gainer') filtered = [...liveData].sort((a,b) => (b.price/b.startPrice) - (a.price/a.startPrice));

            container.innerHTML = filtered.map(coin => {
                const change = ((coin.price - coin.startPrice) / coin.startPrice * 100).toFixed(2);
                const isUp = change >= 0;
                
                return `
                    <div class="coin-row" onclick="window.location.href='Trade.html?coin=${coin.sym}'">
                        <div class="coin-info">
                            <div class="coin-icon-box">
                                <div class="coin-icon" style="background:${coin.color}15; color:${coin.color}">${coin.sym[0]}</div>
                                <i class="fa-solid fa-chart-column mini-chart-icon" style="color:${isUp ? 'var(--up)' : 'var(--down)'}"></i>
                            </div>
                            <div>
                                <div style="font-weight:700; font-size:15px;">${coin.sym}<span style="font-size:10px; color:var(--text-sec)">/USDT</span></div>
                                <div style="font-size:11px; color:var(--text-sec)">Vol ${(coin.price * 1.2).toFixed(2)}M</div>
                            </div>
                        </div>
                        <div class="price-info">
                            <div style="font-weight:bold; font-size:16px; color:${isUp ? 'var(--text-main)' : 'var(--down)'}">$${coin.price.toLocaleString()}</div>
                            <div class="percent-box" style="background:${isUp ? '#0ecb8120' : '#f6465d20'}; color:${isUp ? 'var(--up)' : 'var(--down)'}">
                                ${isUp ? '+' : ''}${change}%
                            </div>
                        </div>
                    </div>
                `;
            }).join('');
            
            updateTotalBalance(liveData);
        }

        // ২. ট্রেড হিস্টোরি জেনারেটর (Global/My/Failed)
        function loadHistory(type) {
            const hContainer = document.getElementById('historyContainer');
            const assets = ['BTC', 'ETH', 'SMAT', 'BNB'];
            
            // ফেক ডাটা জেনারেটর (রিয়েলিস্টিক করার জন্য)
            let rows = '';
            for(let i=0; i<4; i++) {
                const asset = assets[Math.floor(Math.random()*assets.length)];
                const amount = (Math.random() * 0.5).toFixed(4);
                const price = (Math.random() * 50000).toFixed(2);
                const isBuy = Math.random() > 0.5;

                rows += `
                    <div class="history-row">
                        <span style="color:${isBuy ? 'var(--up)' : 'var(--down)'}">${isBuy ? 'BUY' : 'SELL'} ${asset}</span>
                        <span>${amount}</span>
                        <span style="font-weight:bold">$${price}</span>
                    </div>
                `;
            }
            hContainer.innerHTML = rows;
            
            // ট্যাব কালার চেঞ্জ
            document.querySelectorAll('.history-header span').forEach(s => s.style.color = 'var(--text-sec)');
            event.target.style.color = 'var(--primary)';
        }

        // ৩. পোর্টফোলিও আপডেট
        function updateTotalBalance(coins) {
            let total = parseFloat(localStorage.getItem('usdtBalance')) || 0;
            coins.forEach(c => {
                let bal = parseFloat(localStorage.getItem(c.key)) || 0;
                total += (bal * c.price);
            });
            document.getElementById('totalValueDisplay').innerText = total.toLocaleString(undefined, {minimumFractionDigits: 2});
        }

        function switchTab(el, cat) {
            currentFilter = cat;
            document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
            el.classList.add('active');
            renderCoins();
        }

        window.onload = () => {
            renderCoins();
            loadHistory('global');
            setInterval(renderCoins, 4000); // ৪ সেকেন্ড পর পর ডাটা রিফ্রেশ
        };
    </script>
</body>
</html>
