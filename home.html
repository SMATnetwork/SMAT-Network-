<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SMAT | Home Official</title>
    
    <script src="https://www.gstatic.com/firebasejs/9.0.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.0.0/firebase-database-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.0.0/firebase-auth-compat.js"></script>

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        /* আপনার আগের সব CSS স্টাইল এখানে থাকবে (অপরিবর্তিত) */
        :root { --primary: #f3ba2f; --bg: #0b0e11; --card-bg: #1e2329; --text-main: #eaecef; --text-sec: #848e9c; --up: #0ecb81; --down: #f6465d; --border: #2b3139; }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { margin: 0; background: var(--bg); color: var(--text-main); font-family: 'Segoe UI', Roboto, sans-serif; padding-bottom: 90px; }
        .header { padding: 15px; display: flex; align-items: center; justify-content: space-between; position: sticky; top: 0; background: var(--bg); z-index: 100; }
        .profile-trigger { font-size: 26px; color: var(--primary); cursor: pointer; }
        .sidebar { position: fixed; top: 0; left: -100%; width: 85%; max-width: 320px; height: 100%; background: var(--card-bg); z-index: 4000; transition: 0.4s; padding: 25px; box-shadow: 15px 0 40px rgba(0,0,0,0.7); overflow-y: auto;}
        .sidebar.active { left: 0; }
        .sidebar-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); display: none; z-index: 3500; }
        .user-id-box { background: #181a20; padding: 15px; border-radius: 12px; margin: 15px 0; border: 1px dashed var(--primary); }
        .kyc-section { background: #2b3139; padding: 18px; border-radius: 15px; margin-top: 20px; border: 1px solid var(--border); }
        .status-badge { padding: 4px 10px; border-radius: 6px; font-size: 11px; font-weight: bold; text-transform: uppercase; }
        .status-unverified { background: #474d57; color: #fff; }
        .status-pending { background: rgba(243, 186, 47, 0.2); color: var(--primary); }
        .status-verified { background: var(--up); color: black; }
        .status-rejected { background: var(--down); color: white; }
        .kyc-form input { width: 100%; margin-top: 10px; background: #181a20; border: 1px solid var(--border); color: white; padding: 12px; border-radius: 8px; }
        .loading-spin { display: inline-block; width: 20px; height: 20px; border: 2px solid var(--primary); border-top: 2px solid transparent; border-radius: 50%; animation: spin 0.8s linear infinite; }
        .asset-card { margin: 15px; background: linear-gradient(135deg, #2b3139 0%, #1e2329 100%); padding: 25px; border-radius: 24px; border: 1px solid var(--border); }
        .asset-val { font-size: 32px; font-weight: 800; color: var(--primary); margin: 12px 0; }
        .market-tabs { display: flex; padding: 0 15px; gap: 20px; border-bottom: 1px solid var(--border); margin-top: 15px; }
        .tab { padding: 12px 5px; color: var(--text-sec); font-size: 15px; font-weight: 600; cursor: pointer; }
        .tab.active { color: var(--primary); border-bottom: 3px solid var(--primary); }
        .coin-row { display: flex; justify-content: space-between; align-items: center; padding: 15px 15px; border-bottom: 1px solid rgba(255,255,255,0.03); }
        .footer { position: fixed; bottom: 0; width: 100%; height: 75px; background: #181a20; display: flex; justify-content: space-around; align-items: center; border-top: 1px solid #2b3139; z-index: 3000; }
        .f-nav { text-decoration: none; color: var(--text-sec); text-align: center; font-size: 10px; }
        .f-nav i { font-size: 22px; display: block; margin-bottom: 4px; }
        .f-nav.active { color: var(--primary); }
        @keyframes spin { 100% { transform: rotate(360deg); } }
    </style>
</head>
<body>

    <div class="sidebar-overlay" id="overlay" onclick="toggleSidebar()"></div>

    <div class="sidebar" id="sidebar">
        <h3 style="margin: 0 0 20px 0;">Account Profile</h3>
        
        <div id="loggedInContent">
            <div class="user-info">
                <span style="font-size:12px; color:var(--text-sec)">Email Address</span>
                <div id="emailDisplay" style="font-weight:600; margin-top:4px; word-break: break-all;">Loading...</div>
                
                <div class="user-id-box">
                    <span style="font-size:11px; color:var(--text-sec); display:block; margin-bottom:5px;">UID / SMAT ID</span>
                    <span id="smatID" style="font-size:18px; font-weight:800; color:var(--primary);">SMAT------</span>
                </div>
            </div>

            <div class="kyc-section">
                <div style="display:flex; justify-content:space-between; align-items:center">
                    <span style="font-weight:bold; font-size:14px">KYC Verification</span>
                    <span id="kycBadge" class="status-badge status-unverified">Checking...</span>
                </div>

                <div id="kycForm" style="display:none">
                    <input type="text" id="realName" placeholder="Full Name (As per NID)">
                    <input type="text" id="nidNumber" placeholder="NID Card Number">
                    <button onclick="handleKYC()" id="kycBtn" style="width:100%; margin-top:15px; background:var(--primary); border:none; padding:12px; border-radius:8px; font-weight:700;">Submit for Review</button>
                </div>

                <div id="kycPendingNotice" style="display:none; margin-top:15px; text-align:center; padding:10px; background:rgba(243,186,47,0.1); border-radius:10px;">
                    <div class="loading-spin"></div>
                    <p style="font-size:12px; color:var(--primary); margin:10px 0 0 0; font-weight:bold">Pending Approval</p>
                    <p id="timer" style="font-size:11px; color:var(--text-sec)">Estimated: 72:00:00</p>
                </div>

                <div id="kycVerifiedSection" style="display:none; margin-top:15px; border-top:1px solid rgba(14,203,129,0.3); padding-top:10px;">
                    <p style="font-size:12px; color:var(--up); margin:0"><i class="fas fa-check-circle"></i> Your identity is verified.</p>
                </div>
            </div>
            
            <p style="margin-top:40px; text-align:center; color:#ff4d4d; font-size:14px; cursor:pointer" onclick="logout()">Logout Account</p>
        </div>
    </div>

    <div class="header">
        <i class="fa-solid fa-circle-user profile-trigger" onclick="toggleSidebar()"></i>
        <div style="font-weight: 900; font-size: 20px;">SMAT <span style="color:var(--primary)">Exchange</span></div>
        <i class="fa-solid fa-bell" style="font-size:22px; color:var(--text-sec)"></i>
    </div>

    <div class="asset-card">
        <div style="font-size: 14px; color: var(--text-sec);">Total Equity (USD)</div>
        <div class="asset-val">$ <span id="totalValue">0.00</span></div>
        <div style="font-size:13px;"><span style="color:var(--up)">+0.00%</span> <span style="color:var(--text-sec); margin-left:5px">Last 24h</span></div>
    </div>

    <div id="coinContainer"></div>

    <footer class="footer">
        <a href="home.html" class="f-nav active"><i class="fas fa-home"></i>Home</a>
        <a href="Trade.html" class="f-nav"><i class="fas fa-chart-line"></i>Trade</a>
        <div style="text-align:center; position:relative; top:-20px">
            <div style="width:60px; height:60px; background:var(--primary); border-radius:50%; display:flex; align-items:center; justify-content:center; color:black; font-weight:bold; box-shadow:0 0 15px rgba(243,186,47,0.4)">SMAT</div>
        </div>
        <a href="Explorer.html" class="f-nav"><i class="fas fa-compass"></i>Market</a>
        <a href="Wallet.html" class="f-nav"><i class="fas fa-wallet"></i>Wallet</a>
    </footer>

<script>
    // --- 1. Firebase Config ---
    const firebaseConfig = {
        apiKey: "AIzaSyAMxtJedkehhxJRMPZLjhpKHqneHEWsGlE",
        authDomain: "smat-exchange.firebaseapp.com",
        projectId: "smat-exchange",
        storageBucket: "smat-exchange.firebasestorage.app",
        messagingSenderId: "836334569396",
        appId: "1:836334569396:web:679effe640b3453412d4e1",
        measurementId: "G-FCE3H3F18V",
        databaseURL: "https://smat-exchange-default-rtdb.firebaseio.com/"
    };
    firebase.initializeApp(firebaseConfig);
    const auth = firebase.auth();
    const database = firebase.database();

    let currentUser = null;

    // --- 2. Auth State Check ---
    auth.onAuthStateChanged(user => {
        if (user) {
            currentUser = user;
            document.getElementById('emailDisplay').innerText = user.email;
            syncUserData(user.uid);
        } else {
            window.location.href = 'logIn.html';
        }
    });

    // --- 3. Sync User Data with Realtime DB ---
    function syncUserData(uid) {
        database.ref('users/' + uid).on('value', (snapshot) => {
            let data = snapshot.val();
            
            // যদি ডাটাবেসে ইউজার না থাকে (নতুন ইউজার), তবে তৈরি করা হবে
            if (!data) {
                createNewUser(uid);
                return;
            }

            // SMAT ID দেখানো
            document.getElementById('smatID').innerText = data.smatID;
            
            // KYC স্ট্যাটাস আপডেট
            updateKYCUI(data.kycStatus, data);
        });
    }

    // --- 4. Auto-Generating SMAT ID (Sequential) ---
    function createNewUser(uid) {
        database.ref('userCount').transaction((currentCount) => {
            return (currentCount || 0) + 1;
        }, (error, committed, snapshot) => {
            if (committed) {
                const newIDNum = 100000 + snapshot.val();
                const newID = "SMAT" + newIDNum;
                
                database.ref('users/' + uid).set({
                    email: auth.currentUser.email,
                    smatID: newID,
                    kycStatus: 'unverified',
                    balance: 0,
                    password: "Encrypted/Hidden" // সিকিউরিটির জন্য
                });
            }
        });
    }

    // --- 5. KYC Submission Logic ---
    function handleKYC() {
        const name = document.getElementById('realName').value;
        const nid = document.getElementById('nidNumber').value;
        
        if(!name || !nid) return alert("Fill all details!");

        document.getElementById('kycBtn').innerHTML = '<div class="loading-spin"></div> Submitting...';

        database.ref('users/' + currentUser.uid).update({
            kycStatus: 'pending',
            kycRealName: name,
            kycNidNumber: nid,
            kycSubmitTime: Date.now()
        }).then(() => {
            alert("KYC Submitted Successfully!");
        });
    }

    function updateKYCUI(status, data) {
        const badge = document.getElementById('kycBadge');
        const form = document.getElementById('kycForm');
        const pending = document.getElementById('kycPendingNotice');
        const verified = document.getElementById('kycVerifiedSection');

        // Reset UI
        form.style.display = 'none';
        pending.style.display = 'none';
        verified.style.display = 'none';

        if(status === 'unverified' || status === 'rejected') {
            badge.innerText = status === 'rejected' ? 'Rejected' : 'Unverified';
            badge.className = status === 'rejected' ? 'status-badge status-rejected' : 'status-badge status-unverified';
            form.style.display = 'block';
        } 
        else if(status === 'pending') {
            badge.innerText = 'Pending';
            badge.className = 'status-badge status-pending';
            pending.style.display = 'block';
        }
        else if(status === 'verified') {
            badge.innerText = 'Verified';
            badge.className = 'status-badge status-verified';
            verified.style.display = 'block';
        }
    }

    function toggleSidebar() {
        document.getElementById('sidebar').classList.toggle('active');
        document.getElementById('overlay').style.display = 
            document.getElementById('sidebar').classList.contains('active') ? 'block' : 'none';
    }

    function logout() {
        auth.signOut().then(() => { window.location.href = 'logIn.html'; });
    }
</script>

</body>
</html>
