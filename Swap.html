<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SMAT Swap - Modern Crypto Aggregator</title>
    
    <link id="favicon" rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><circle cx='50' cy='50' r='48' fill='%23f3ba2f' stroke='black' stroke-width='1'/><text x='50%25' y='55%25' text-anchor='middle' dy='.3em' fill='black' font-family='Courier New, monospace' font-weight='900' font-size='55'>S</text></svg>">

    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700;800&family=Inter:wght@400;600;700&display=swap');

        /* Theme Variables */
        :root {
            --bg: #0b0e11; --text: #ffffff; --card: #1e2329;
            --border: #3b424a; --input: #2b3139; --yellow: #f0b90b;
        }

        /* Global Reset & Typography */
        body { background-color: var(--bg); color: var(--text); font-family: 'Inter', sans-serif; overflow-x: hidden; }
        
        /* Styled Large Headline */
        .page-headline { 
            font-family: 'Poppins', sans-serif; 
            font-weight: 800; 
            font-size: 36px; 
            text-align: center; 
            background: linear-gradient(135deg, #ffffff 0%, #f0b90b 100%); 
            -webkit-background-clip: text; 
            -webkit-text-fill-color: transparent; 
            letter-spacing: -1.5px; 
            margin-bottom: 5px; 
        }

        /* Swap Card Styling */
        .swap-card { background: var(--card); border: 1px solid var(--border); border-radius: 28px; padding: 25px; position: relative; box-shadow: 0 15px 50px rgba(0,0,0,0.3); }
        
        /* Input Box with Modern Styling */
        .input-box { background: var(--input); border-radius: 20px; padding: 18px; border: 1px solid transparent; transition: 0.2s; }
        .input-box:focus-within { border-color: var(--yellow); box-shadow: 0 0 15px rgba(240, 185, 11, 0.1); }
        
        /* Central Swap Arrow */
        .swap-arrow { 
            position: absolute; left: 50%; top: 43%; transform: translate(-50%, -50%);
            width: 42px; height: 42px; background: #1e2329; border: 4px solid #0b0e11;
            border-radius: 14px; display: flex; align-items: center; justify-content: center;
            cursor: pointer; z-index: 10; color: var(--yellow); transition: 0.3s;
        }
        .swap-arrow:hover { transform: translate(-50%, -50%) rotate(180deg); background: var(--yellow); color: black; }

        /* Token Select Dropdown Styling */
        .token-select { background: #3b424a; padding: 8px 16px; border-radius: 14px; display: flex; align-items: center; gap: 10px; font-weight: 700; font-size: 15px; border: 1px solid rgba(255,255,255,0.05); }
        
        /* Main Action Button States */
        .btn-swap { background: var(--yellow); color: black; width: 100%; padding: 18px; border-radius: 18px; font-weight: 700; font-size: 17px; margin-top: 25px; transition: 0.3s; position: relative; display: flex; justify-content: center; align-items: center; letter-spacing: 0.5px; }
        .btn-loading { background: #3b424a !important; color: transparent !important; cursor: not-allowed; }
        .btn-loading::after { content: ""; position: absolute; width: 24px; height: 24px; border: 3px solid #f0b90b; border-top-color: transparent; border-radius: 50%; animation: spin 0.8s linear infinite; }
        .btn-success { background: #03a66d !important; color: white !important; font-size: 22px !important; }

        @keyframes spin { to { transform: rotate(360deg); } }

        /* Notification Toast Styling */
        #swap-notif { position: fixed; top: -100px; left: 50%; transform: translateX(-50%); background: #03a66d; color: white; border-radius: 16px; padding: 18px 30px; font-size: 15px; font-weight: 700; display: flex; align-items: center; gap: 12px; z-index: 999; transition: all 0.5s cubic-bezier(0.68, -0.55, 0.265, 1.55); box-shadow: 0 15px 40px rgba(0,0,0,0.6); border: 2px solid rgba(255,255,255,0.1); }
        #swap-notif.show { top: 30px; }

        /* Details Breakdown Area */
        .details-box { background: rgba(0,0,0,0.25); border-radius: 16px; padding: 15px; border: 1px solid var(--border); font-size: 12px; }
        
        /* Navigation Bar Styling (Index Match) */
        .nav-item { flex: 1; display: flex; flex-direction: column; align-items: center; gap: 4px; text-decoration: none; transition: 0.2s; }
        .nav-item:hover i, .nav-item:hover span { color: var(--yellow) !important; }
    </style>
</head>
<body class="flex justify-center">

<div id="swap-notif"><i class="fas fa-check-circle text-xl"></i> Swap Successful! Balance Updated.</div>

<div class="w-full max-w-md min-h-screen pb-32">
    <div class="pt-10 pb-6 px-6 text-center">
        <h1 class="page-headline">SMAT Swap</h1>
        <div class="inline-flex items-center gap-1.5 bg-green-500/10 text-green-500 px-3 py-1 rounded-full border border-green-500/20 text-[11px] font-bold uppercase tracking-wider">
            <span class="w-2 h-2 bg-green-500 rounded-full animate-pulse"></span> LIVE MARKET
        </div>
    </div>

    <div class="px-4">
        <div class="swap-card">
            <div class="input-box mb-2">
                <div class="flex justify-between mb-3">
                    <span class="text-[11px] text-gray-500 font-extrabold uppercase tracking-wider">You Pay</span>
                    <div class="flex gap-2 items-center">
                        <span class="text-[11px] text-gray-400 font-medium">Bal: <span id="from-balance" class="font-mono">0.00000000</span></span>
                        <button onclick="setMax()" class="text-[10px] bg-yellow-500/20 text-yellow-500 px-2.5 py-1 rounded font-bold uppercase hover:bg-yellow-500 hover:text-black transition-all">Max</button>
                    </div>
                </div>
                <div class="flex justify-between items-center">
                    <input id="input-from" type="number" placeholder="0.00" class="bg-transparent text-3xl font-extrabold outline-none w-1/2 tracking-tight text-white placeholder:text-gray-700" oninput="calculate()">
                    <div class="token-select">
                        <img id="from-icon" src="" width="22" class="rounded-full">
                        <span id="from-symbol">BNB</span>
                        <i class="fas fa-chevron-down text-[10px] text-gray-500 ml-1"></i>
                    </div>
                </div>
            </div>

            <div class="swap-arrow" onclick="reverse()">
                <i class="fas fa-retweet text-lg"></i>
            </div>

            <div class="input-box mt-2">
                <div class="flex justify-between mb-3">
                    <span class="text-[11px] text-gray-500 font-extrabold uppercase tracking-wider">You Receive (Estimated)</span>
                </div>
                <div class="flex justify-between items-center">
                    <input id="input-to" type="number" placeholder="0.00" class="bg-transparent text-3xl font-extrabold outline-none w-1/2 tracking-tight text-white placeholder:text-gray-700" readonly>
                    <div class="token-select">
                        <img id="to-icon" src="" width="22" class="rounded-full">
                        <span id="to-symbol">USDT</span>
                        <i class="fas fa-chevron-down text-[10px] text-gray-500 ml-1"></i>
                    </div>
                </div>
            </div>

            <div class="mt-8 space-y-3">
                <div class="details-box space-y-2.5">
                    <div class="flex justify-between items-center">
                        <span class="text-gray-500 uppercase font-bold text-[10px] tracking-wider">Selling</span>
                        <span id="det-pay" class="font-mono text-gray-200">0.00000000 ---</span>
                    </div>
                    <div class="flex justify-between items-center">
                        <span class="text-gray-500 uppercase font-bold text-[10px] tracking-wider">Service Fee (0.1%)</span>
                        <span id="det-fee" class="text-red-400 font-mono">0.00000000 ---</span>
                    </div>
                    <div class="flex justify-between pt-3 border-t border-gray-800 items-center">
                        <span class="text-gray-300 font-bold uppercase text-[10px] tracking-wider">Net Received</span>
                        <span id="det-receive" class="text-yellow-500 font-bold font-mono text-sm">0.000000 ---</span>
                    </div>
                </div>
            </div>

            <button class="btn-swap uppercase" id="swap-btn" onclick="execute()">CONFIRM SWAP</button>
        </div>
    </div>

    <div class="fixed bottom-0 left-0 w-full bg-[var(--card)] border-t border-[var(--border)] px-2 py-3 flex justify-around items-center z-[110] shadow-[0_-10px_30px_rgba(0,0,0,0.5)]">
        <a href="Terminal.html" class="nav-item group"><i class="fas fa-terminal text-lg text-gray-500"></i><span class="text-[9px] font-bold text-gray-500 uppercase">Terminal</span></a>
        <a href="index.html" class="nav-item group"><i class="fas fa-wallet text-lg text-gray-500"></i><span class="text-[9px] font-bold text-gray-500 uppercase">Exchange</span></a>
        <a href="Swap.html" class="nav-item"><i class="fas fa-random text-lg text-yellow-500"></i><span class="text-[9px] font-bold text-yellow-500 uppercase">Swap</span></a>
        <a href="Ecosystem.html" class="nav-item group"><i class="fas fa-layer-group text-lg text-gray-500"></i><span class="text-[9px] font-bold text-gray-500 uppercase">Ecosystems</span></a>
    </div>
</div>

<script>
    /* Application Core State (Including Live Price Fallbacks) */
    const state = {
        from: 'BNB',
        to: 'USDT',
        tokens: {
            BNB: { symbol: 'BNB', price: 0, icon: 'https://raw.githubusercontent.com/trustwallet/assets/master/blockchains/smartchain/info/logo.png' },
            USDT: { symbol: 'USDT', price: 1.00, icon: 'https://raw.githubusercontent.com/trustwallet/assets/master/blockchains/smartchain/assets/0x55d398326f99059fF775485246999027B3197955/logo.png' },
            SMAT: { symbol: 'SMAT', price: 0.05, icon: 'data:image/svg+xml,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100"><circle cx="50" cy="50" r="48" fill="%23f3ba2f"/><text x="50%25" y="55%25" text-anchor="middle" dy=".3em" fill="black" font-weight="900" font-size="55">S</text></svg>' }
        }
    };

    /* Function 1: Fetch Live Prices from Binance API (Real-time update) */
    async function fetchPrices() {
        try {
            const res = await fetch('https://api.binance.com/api/v3/ticker/price?symbol=BNBUSDT');
            const data = await res.json();
            state.tokens.BNB.price = parseFloat(data.price);
            calculate(); // Recalculate based on new price
        } catch (e) {
            console.error("Price fetch failed, using fallback.");
            state.tokens.BNB.price = 612.45; // Fallback price
        }
    }

    /* Function 2: Calculation Logic with 0.1% Fee and High Decimal Precision */
    function calculate() {
        const inputField = document.getElementById('input-from');
        const val = parseFloat(inputField.value) || 0;
        const feeRate = 0.001; // 0.1% Swap Fee
        
        const fPrice = state.tokens[state.from].price;
        const tPrice = state.tokens[state.to].price;

        // Ensure price is loaded
        if(fPrice === 0) return;

        // Perform dynamic conversion
        const feeAmount = val * feeRate;
        const netToSwap = val - feeAmount;
        const result = (netToSwap * fPrice) / tPrice;

        // Display output up to 6 decimals
        document.getElementById('input-to').value = val > 0 ? result.toFixed(6) : "";
        
        // Update Breakdown Section with higher precision display
        document.getElementById('det-pay').innerText = `${val.toFixed(8)} ${state.from}`;
        document.getElementById('det-fee').innerText = `-${feeAmount.toFixed(8)} ${state.from}`;
        document.getElementById('det-receive').innerText = `${result.toFixed(6)} ${state.to}`;
    }

    /* Function 3: Set Max Available Balance to Input (Fixed for 18 Decimals) */
    function setMax() {
        const balances = JSON.parse(localStorage.getItem('balances')) || { BNB: 0.00174758, USDT: 100.0, SMAT: 0 };
        let totalBal = balances[state.from] || 0;
        
        // Use fixed to handle high precision without floating point errors
        // replace(/\.?0+$/, "") removes unnecessary trailing zeros
        document.getElementById('input-from').value = parseFloat(totalBal).toFixed(18).replace(/\.?0+$/, "");
        calculate();
    }

    /* Function 4: Reverse Swap Direction (To <-> From) */
    function reverse() {
        [state.from, state.to] = [state.to, state.from];
        updateUI();
        calculate();
    }

    /* Function 5: Update UI Icons, Symbols and Balance Display */
    function updateUI() {
        document.getElementById('from-symbol').innerText = state.from;
        document.getElementById('to-symbol').innerText = state.to;
        document.getElementById('from-icon').src = state.tokens[state.from].icon;
        document.getElementById('to-icon').src = state.tokens[state.to].icon;
        
        const balances = JSON.parse(localStorage.getItem('balances')) || { BNB: 0.00174758, USDT: 100.0, SMAT: 0 };
        // Show 8 decimals in the balance display area
        document.getElementById('from-balance').innerText = parseFloat(balances[state.from] || 0).toFixed(8);
    }

    /* Function 6: Execute Swap with Loading Spinner and Animated Success State */
    function execute() {
        const inputVal = parseFloat(document.getElementById('input-from').value);
        const btn = document.getElementById('swap-btn');
        const notif = document.getElementById('swap-notif');
        
        const balances = JSON.parse(localStorage.getItem('balances')) || { BNB: 0.00174758, USDT: 100.0, SMAT: 0 };
        const currentBalance = parseFloat(balances[state.from]);

        // Input Validations
        if(!inputVal || inputVal <= 0) return alert("Please enter amount");
        
        // Adding a tiny epsilon to handle 18-decimal floating point precision errors
        if(inputVal > (currentBalance + 0.0000000000000001)) {
            return alert("Insufficient balance!");
        }

        // 1. Start Spinning Animation on Button
        btn.classList.add('btn-loading');
        btn.innerHTML = ""; // Clear text for spinner

        // 2. Simulate Blockchain Confirmation Request (3 seconds)
        setTimeout(() => {
            // 3. Stop Loading & Show Green Tick Success State
            btn.classList.remove('btn-loading');
            btn.classList.add('btn-success');
            btn.innerHTML = `<i class="fas fa-check"></i>`; // Tick Icon

            // 4. Actual Balance Update in LocalStorage
            const receiveAmt = parseFloat(document.getElementById('input-to').value);
            
            // Deduct 'from' amount, add 'to' amount (ensure high precision)
            balances[state.from] = Math.max(0, currentBalance - inputVal); 
            balances[state.to] = (parseFloat(balances[state.to]) || 0) + receiveAmt;
            
            localStorage.setItem('balances', JSON.stringify(balances));

            // 5. Show Top Successful Notification Toast
            notif.classList.add('show');
            updateUI(); // Refresh the balance displayed on screen

            // 6. Reset UI to default state after 4 seconds
            setTimeout(() => {
                btn.classList.remove('btn-success');
                btn.innerText = "CONFIRM SWAP";
                notif.classList.remove('show');
                document.getElementById('input-from').value = ""; // Clear Input Field
                calculate(); // Reset detailed breakdown
            }, 4000);

        }, 3000); // 3 second delay for animation
    }

    /* Page Initialization on Load */
    window.onload = () => {
        updateUI(); // Update assets on load
        fetchPrices(); // Fetch initial prices
        
        // Set auto-refresh for prices every 15 seconds
        setInterval(fetchPrices, 15000); 

        // Ensure notification element exists (if needed dynamic creation)
        if(!document.getElementById('swap-notif')) {
            document.body.insertAdjacentHTML('beforeend', `<div id="swap-notif"><i class="fas fa-check-circle text-xl"></i> Swap Successful! Balance Updated.</div>`);
        }
    };
</script>

</body>
</html>
