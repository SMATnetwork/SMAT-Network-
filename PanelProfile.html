<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SMAT | Admin Control Panel</title>
    
    <script src="https://www.gstatic.com/firebasejs/9.0.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.0.0/firebase-database-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.0.0/firebase-auth-compat.js"></script>
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --primary: #f3ba2f; --bg: #0b0e11; --card: #1e2329; --text: #eaecef; --border: #2b3139; --text-sec: #848e9c; --up: #0ecb81; --down: #f6465d; }
        body { background: var(--bg); color: var(--text); font-family: 'Segoe UI', sans-serif; margin: 0; padding: 20px; }
        
        /* Login Screen */
        #adminLogin { position: fixed; top:0; left:0; width:100%; height:100%; background:var(--bg); z-index: 5000; display: flex; align-items: center; justify-content: center; }
        .login-card { background: var(--card); padding: 30px; border-radius: 15px; border: 1px solid var(--border); width: 90%; max-width: 350px; text-align: center; }
        .login-card input { width: 100%; padding: 12px; margin: 10px 0; background: #0b0e11; border: 1px solid var(--border); color: white; border-radius: 8px; box-sizing: border-box; }
        .btn-login { width: 100%; background: var(--primary); color: black; border: none; padding: 12px; border-radius: 8px; font-weight: bold; cursor: pointer; }

        /* Dashboard */
        .admin-container { max-width: 1100px; margin: auto; display: none; }
        .header-panel { display: flex; justify-content: space-between; align-items: center; border-bottom: 2px solid var(--primary); padding-bottom: 15px; margin-bottom: 25px; }
        
        .user-card { background: var(--card); border: 1px solid var(--border); border-radius: 15px; padding: 20px; margin-bottom: 20px; display: flex; flex-wrap: wrap; justify-content: space-between; gap: 20px; align-items: flex-start; }
        .info-group { flex: 1; min-width: 200px; }
        .info-group h4 { margin: 0 0 10px 0; color: var(--primary); border-bottom: 1px solid #2b3139; padding-bottom: 5px; }
        .info-group p { margin: 5px 0; font-size: 14px; }
        
        /* KYC Image Preview Buttons */
        .doc-btns { display: flex; gap: 8px; margin-top: 10px; flex-wrap: wrap; }
        .btn-view { background: #3772ff; color: white; border: none; padding: 6px 12px; border-radius: 5px; font-size: 12px; cursor: pointer; }

        .action-btns { display: flex; flex-direction: column; gap: 10px; }
        button { padding: 10px 20px; border-radius: 8px; border: none; cursor: pointer; font-weight: bold; transition: 0.2s; }
        .btn-verify { background: var(--up); color: black; }
        .btn-reject { background: var(--down); color: white; }
        .btn-logout { background: var(--down); color: white; padding: 5px 15px; font-size: 13px; }

        /* Modal for Images */
        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); z-index: 6000; align-items: center; justify-content: center; flex-direction: column; }
        .modal-img { max-width: 90%; max-height: 80%; border-radius: 10px; box-shadow: 0 0 30px rgba(255,255,255,0.1); }
        .close-modal { position: absolute; top: 20px; right: 30px; color: white; font-size: 30px; cursor: pointer; }

        .badge { background: var(--down); padding: 2px 8px; border-radius: 20px; font-size: 12px; }
    </style>
</head>
<body>

<div id="adminLogin">
    <div class="login-card">
        <h2 style="color: var(--primary);">SMAT Admin</h2>
        <input type="email" id="adminEmail" placeholder="Admin Email">
        <input type="password" id="adminPassword" placeholder="Password">
        <button class="btn-login" onclick="loginAdmin()">LOGIN</button>
        <p id="loginError" style="color: var(--down); display:none; margin-top:10px;"></p>
    </div>
</div>

<div class="admin-container" id="panelUI">
    <div class="header-panel">
        <h3><i class="fas fa-shield-alt"></i> Admin Dashboard</h3>
        <div style="display:flex; align-items:center; gap:20px">
            <span>Pending KYC: <b id="kycCount" class="badge">0</b></span>
            <button class="btn-logout" onclick="logoutAdmin()">Logout</button>
        </div>
    </div>

    <div id="userList">
        <p style="text-align:center; color:var(--text-sec)">Fetching Database...</p>
    </div>
</div>

<div id="imgModal" class="modal" onclick="this.style.display='none'">
    <span class="close-modal">&times;</span>
    <img id="previewImg" class="modal-img">
    <p id="imgLabel" style="color:white; margin-top:15px; font-weight:bold;"></p>
</div>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyAMxtJedkehhxJRMPZLjhpKHqneHEWsGlE",
        authDomain: "smat-exchange.firebaseapp.com",
        projectId: "smat-exchange",
        storageBucket: "smat-exchange.firebasestorage.app",
        messagingSenderId: "836334569396",
        appId: "1:836334569396:web:679effe640b3453412d4e1",
        measurementId: "G-FCE3H3F18V",
        databaseURL: "https://smat-exchange-default-rtdb.firebaseio.com/"
    };

    firebase.initializeApp(firebaseConfig);
    const auth = firebase.auth();
    const database = firebase.database();

    function loginAdmin() {
        const email = document.getElementById('adminEmail').value;
        const pass = document.getElementById('adminPassword').value;
        auth.signInWithEmailAndPassword(email, pass).catch(err => {
            document.getElementById('loginError').innerText = err.message;
            document.getElementById('loginError').style.display = 'block';
        });
    }

    function logoutAdmin() { auth.signOut().then(() => location.reload()); }

    auth.onAuthStateChanged(user => {
        if (user) {
            document.getElementById('adminLogin').style.display = 'none';
            document.getElementById('panelUI').style.display = 'block';
            loadUsers();
        }
    });

    function loadUsers() {
        database.ref('users').on('value', (snapshot) => {
            const users = snapshot.val() || {};
            const list = document.getElementById('userList');
            list.innerHTML = '';
            let pendingCount = 0;

            for (let uid in users) {
                const u = users[uid];
                const status = (u.kycStatus || 'unverified').toLowerCase();
                if(status === 'pending') pendingCount++;

                const statusColor = status === 'verified' ? '#0ecb81' : (status === 'pending' ? '#f3ba2f' : '#f6465d');

                list.innerHTML += `
                    <div class="user-card">
                        <div class="info-group">
                            <h4><i class="fas fa-user"></i> Account</h4>
                            <p>SMAT ID: <b>${u.smatID || 'N/A'}</b></p>
                            <p>Email: ${u.email}</p>
                            <p>Pass: <span style="color:#555">${u.password || 'N/A'}</span></p>
                        </div>

                        <div class="info-group">
                            <h4><i class="fas fa-id-card"></i> Identity Details</h4>
                            <p>Full Name: <b>${u.realName || 'N/A'}</b></p>
                            <p>NID Number: <b>${u.nidNumber || 'N/A'}</b></p>
                            <p>Status: <b style="color:${statusColor}">${status.toUpperCase()}</b></p>
                            
                            <div class="doc-btns">
                                <button class="btn-view" onclick="viewDoc('${u.nidFront}', 'NID Front')">Front</button>
                                <button class="btn-view" onclick="viewDoc('${u.nidBack}', 'NID Back')">Back</button>
                                <button class="btn-view" onclick="viewDoc('${u.userSelfie}', 'Selfie')">Selfie</button>
                            </div>
                        </div>

                        <div class="action-btns">
                            ${status === 'pending' ? `
                                <button class="btn-verify" onclick="decideKYC('${uid}', 'verified')">APPROVE</button>
                                <button class="btn-reject" onclick="decideKYC('${uid}', 'rejected')">REJECT</button>
                            ` : `<p style="font-size:12px; color:var(--text-sec)">No Pending Action</p>`}
                        </div>
                    </div>
                `;
            }
            document.getElementById('kycCount').innerText = pendingCount;
        });
    }

    function viewDoc(url, label) {
        if(!url || url === 'undefined') return alert("This document was not uploaded.");
        document.getElementById('previewImg').src = url;
        document.getElementById('imgLabel').innerText = label;
        document.getElementById('imgModal').style.display = 'flex';
    }

    function decideKYC(uid, status) {
        const msg = status === 'verified' ? "Approve this user's KYC?" : "Reject this user's KYC?";
        if(confirm(msg)) {
            database.ref('users/' + uid).update({ kycStatus: status });
        }
    }
</script>

</body>
</html>
