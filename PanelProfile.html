<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SMAT | User Panel</title>
    <script src="https://www.gstatic.com/firebasejs/9.0.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.0.0/firebase-database-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.0.0/firebase-auth-compat.js"></script>
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><circle cx='50' cy='50' r='50' fill='%23f3ba2f'/><text x='50%25' y='55%25' text-anchor='middle' dy='.3em' fill='black' font-family='Courier New, monospace' font-weight='900' font-size='60'>S</text></svg>">
    
    <style>
        :root { --primary: #f3ba2f; --bg: #0b0e11; --card: #1e2329; --text: #eaecef; --border: #2b3139; --text-sec: #848e9c; --up: #0ecb81; --down: #f6465d; }
        body { background: var(--bg); color: var(--text); font-family: 'Segoe UI', sans-serif; margin: 0; padding: 0; }
        
        /* Login Screen (Unchanged Logic) */
        #adminLogin { position: fixed; top:0; left:0; width:100%; height:100%; background:var(--bg); z-index: 5000; display: flex; align-items: center; justify-content: center; }
        .login-card { background: var(--card); padding: 30px; border-radius: 15px; border: 1px solid var(--border); width: 90%; max-width: 350px; text-align: center; }
        .login-card input { width: 100%; padding: 12px; margin: 10px 0; background: #0b0e11; border: 1px solid var(--border); color: white; border-radius: 8px; box-sizing: border-box; }
        .btn-login { width: 100%; background: var(--primary); color: black; border: none; padding: 12px; border-radius: 8px; font-weight: bold; cursor: pointer; }

        /* Dashboard Header with Shadow System */
        .admin-container { max-width: 1100px; margin: auto; display: none; padding: 20px; }
        
        .header-panel { 
            position: sticky; top: 0; z-index: 100;
            display: flex; justify-content: space-between; align-items: center; 
            background: #808000;
            padding: 20px 25px; 
            margin-bottom: 25px;          
            border-bottom: 1px solid var(--border);
            box-shadow: rgba(0, 0, 0, 0.25) 0px 54px 55px, rgba(0, 0, 0, 0.12) 0px -12px 30px, rgba(0, 0, 0, 0.12) 0px 4px 6px, rgba(0, 0, 0, 0.17) 0px 12px 13px, rgba(0, 0, 0, 0.09) 0px -3px 5px;
        }
        .header-panel h2 {background :none; margin: 0; font-size: 24px; color: var(--text); font-weight: 800; letter-spacing: 1px; }

        .btn-logout { 
            background: #0000FF; color: white; padding: 10px 25px; 
            font-size: 14px; border-radius: 8px; border: none; cursor: pointer; font-weight: bold;
            transition: 0.3s;
            box-shadow: rgba(0, 0, 0, 0.2) 0px 60px 40px -7px;
        }
        .btn-logout:hover { background: #d9394d; box-shadow: 0 0 15px rgba(246, 70, 93, 0.4); transform: translateY(-2px); }

        /* Status Stats Cards */
        .stats-grid { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 15px; margin-bottom: 25px; }
        .stat-card { 
            background: var(--card); padding: 15px; border-radius: 12px; text-align: center; 
            border: 1px solid var(--border); cursor: pointer; transition: 0.2s;
        }
        .stat-card:hover { border-color: var(--primary); transform: translateY(-3px); }
        .stat-card h5 { margin: 0; font-size: 12px; color: var(--text-sec); text-transform: uppercase; }
        .stat-card h2 { margin: 5px 0 0 0; font-size: 22px; }
        .stat-card.active { border: 2px solid var(--primary); background: rgba(243, 186, 47, 0.05); }

        /* Search Bar Style (Unchanged Logic) */
        .search-box { background: var(--card); border: 1px solid var(--border); border-radius: 12px; padding: 12px 20px; display: flex; align-items: center; margin-bottom: 25px; gap: 15px; }
        .search-box input { flex: 1; background: transparent; border: none; color: white; font-size: 15px; outline: none; }
        .search-box i { color: var(--text-sec); }

        /* User Cards (Unchanged Design/Logic) */
        .user-card { background: var(--card); border: 1px solid var(--border); border-radius: 15px; padding: 20px; margin-bottom: 20px; display: flex; flex-wrap: wrap; justify-content: space-between; gap: 20px; align-items: flex-start; }
        .info-group { flex: 1; min-width: 200px; }
        .info-group h4 { margin: 0 0 10px 0; color: var(--primary); border-bottom: 1px solid #2b3139; padding-bottom: 5px; }
        .info-group p { margin: 5px 0; font-size: 14px; }
        
        .doc-btns { display: flex; gap: 8px; margin-top: 10px; flex-wrap: wrap; }
        .btn-view { background: #3772ff; color: white; border: none; padding: 6px 12px; border-radius: 5px; font-size: 12px; cursor: pointer; font-weight: bold; }

        .action-btns { display: flex; flex-direction: column; gap: 10px; }
        .btn-verify { background: var(--up); color: black; padding: 10px 20px; border-radius: 8px; font-weight: bold; border:none; cursor:pointer;}
        .btn-reject { background: var(--down); color: white; padding: 10px 20px; border-radius: 8px; font-weight: bold; border:none; cursor:pointer;}
        .btn-edit { background: #474d57; color: white; margin-top: 5px; border-radius: 8px; border:none; padding: 8px; cursor:pointer; }

        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.95); z-index: 6000; align-items: center; justify-content: center; flex-direction: column; }
        .modal-img { max-width: 90%; max-height: 75%; border-radius: 10px; border: 2px solid var(--primary); }
        .close-modal { position: absolute; top: 20px; right: 30px; color: white; font-size: 40px; cursor: pointer; font-weight: bold; }
        #imgLabel { color: var(--primary); margin-top: 15px; font-size: 18px; font-weight: bold; letter-spacing: 1px; }
    </style>
</head>
<body>

<div id="adminLogin">
    <div class="login-card">
        <h2 style="color: var(--primary);">User Management Panel</h2>
        <input type="email" id="adminEmail" placeholder="Admin Email">
        <input type="password" id="adminPassword" placeholder="Password">
        <button class="btn-login" onclick="loginAdmin()">LOGIN</button>
        <p id="loginError" style="color: var(--down); display:none; margin-top:10px;"></p>
    </div>
</div>

<div class="header-panel" id="headerUI" style="display:none">
    <h2>Profile Panel</h2>
    <button class="btn-logout" onclick="logoutAdmin()">LogOut</button>
</div>

<div class="admin-container" id="panelUI">
    <div class="stats-grid">
        <div class="stat-card active" id="filterAll" onclick="setFilter('all')">
            <h5>Total Users</h5>
            <h2 id="totalCount" style="color:var(--text)">0</h2>
        </div>
        <div class="stat-card" id="filterPending" onclick="setFilter('pending')">
            <h5>Pending KYC</h5>
            <h2 id="pendingCount" style="color:var(--primary)">0</h2>
        </div>
        <div class="stat-card" id="filterVerified" onclick="setFilter('verified')">
            <h5>Passed KYC</h5>
            <h2 id="passedCount" style="color:var(--up)">0</h2>
        </div>
    </div>

    <div class="search-box">
        <i class="fas fa-search"></i>
        <input type="text" id="adminSearch" placeholder="Search by SMAT ID, Email or NID..." onkeyup="loadUsers()">
    </div>

    <div id="userList">
        <p style="text-align:center; color:var(--text-sec)">Fetching Database...</p>
    </div>
</div>

<div id="imgModal" class="modal">
    <span class="close-modal" onclick="closeDoc()">&times;</span>
    <img id="previewImg" class="modal-img">
    <p id="imgLabel"></p>
    <button onclick="closeDoc()" style="margin-top:20px; background: #333; color: white; padding: 10px 25px; border:none; cursor:pointer;">Close View</button>
</div>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyAMxtJedkehhxJRMPZLjhpKHqneHEWsGlE",
        authDomain: "smat-exchange.firebaseapp.com",
        projectId: "smat-exchange",
        storageBucket: "smat-exchange.firebasestorage.app",
        messagingSenderId: "836334569396",
        appId: "1:836334569396:web:679effe640b3453412d4e1",
        measurementId: "G-FCE3H3F18V",
        databaseURL: "https://smat-exchange-default-rtdb.firebaseio.com/"
    };

    firebase.initializeApp(firebaseConfig);
    const auth = firebase.auth();
    const database = firebase.database();

    let currentFilter = 'all'; // Default filter

    function loginAdmin() {
        const email = document.getElementById('adminEmail').value;
        const pass = document.getElementById('adminPassword').value;
        auth.signInWithEmailAndPassword(email, pass).catch(err => {
            document.getElementById('loginError').innerText = err.message;
            document.getElementById('loginError').style.display = 'block';
        });
    }

    function logoutAdmin() { auth.signOut().then(() => location.reload()); }

    auth.onAuthStateChanged(user => {
        if (user) {
            document.getElementById('adminLogin').style.display = 'none';
            document.getElementById('headerUI').style.display = 'flex';
            document.getElementById('panelUI').style.display = 'block';
            loadUsers();
        }
    });

    function setFilter(type) {
        currentFilter = type;
        document.querySelectorAll('.stat-card').forEach(c => c.classList.remove('active'));
        if(type === 'all') document.getElementById('filterAll').classList.add('active');
        if(type === 'pending') document.getElementById('filterPending').classList.add('active');
        if(type === 'verified') document.getElementById('filterVerified').classList.add('active');
        loadUsers();
    }

    function loadUsers() {
        const searchTerm = document.getElementById('adminSearch').value.toLowerCase();
        database.ref('users').on('value', (snapshot) => {
            const users = snapshot.val() || {};
            const list = document.getElementById('userList');
            list.innerHTML = '';
            
            let counts = { total: 0, pending: 0, verified: 0 };

            for (let uid in users) {
                const u = users[uid];
                const status = (u.kycStatus || 'unverified').toLowerCase();
                
                // Analytics counting
                counts.total++;
                if(status === 'pending') counts.pending++;
                if(status === 'verified') counts.verified++;

                // Filter logic based on clicked card
                if(currentFilter !== 'all' && status !== currentFilter) continue;

                // Search Filter Logic
                const searchStr = (u.smatID + u.email + u.nidNumber).toLowerCase();
                if(searchTerm && !searchStr.includes(searchTerm)) continue;

                const statusColor = status === 'verified' ? '#0ecb81' : (status === 'pending' ? '#f3ba2f' : '#f6465d');

                list.innerHTML += `
                    <div class="user-card">
                        <div class="info-group">
                            <h4><i class="fas fa-user"></i> Account</h4>
                            <p>SMAT ID: <b>${u.smatID || 'N/A'}</b></p>
                            <p>Email: <b>${u.email}</b></p>
                            <p>Pass: <span style="color:#f3ba2f">${u.password || 'N/A'}</span></p>
                            <button class="btn-edit" onclick="editUserAccount('${uid}', '${u.email}', '${u.password}')">Edit Login</button>
                        </div>

                        <div class="info-group">
                            <h4><i class="fas fa-id-card"></i> Identity Details</h4>
                            <p>Full Name: <b>${u.realName || 'N/A'}</b></p>
                            <p>NID Number: <b>${u.nidNumber || 'N/A'}</b></p>
                            <p>Status: <b style="color:${statusColor}">${status.toUpperCase()}</b></p>
                            
                            <div class="doc-btns">
                                <button class="btn-view" onclick="viewDoc('${u.nidFront}', 'NID Front')">Front</button>
                                <button class="btn-view" onclick="viewDoc('${u.nidBack}', 'NID Back')">Back</button>
                                <button class="btn-view" onclick="viewDoc('${u.userSelfie}', 'Selfie')">Selfie</button>
                            </div>
                        </div>

                        <div class="action-btns">
                            ${status === 'pending' ? `
                                <button class="btn-verify" onclick="decideKYC('${uid}', 'verified')">APPROVE</button>
                                <button class="btn-reject" onclick="decideKYC('${uid}', 'rejected')">REJECT</button>
                            ` : `<p style="font-size:12px; color:var(--text-sec)">Account Active</p>`}
                        </div>
                    </div>
                `;
            }
            // Update counts on cards
            document.getElementById('totalCount').innerText = counts.total;
            document.getElementById('pendingCount').innerText = counts.pending;
            document.getElementById('passedCount').innerText = counts.verified;
        });
    }

    function editUserAccount(uid, oldEmail, oldPass) {
        const newEmail = prompt("Enter New Email for this account:", oldEmail);
        if (newEmail === null) return;
        const newPass = prompt("Enter New Password for this account:", oldPass);
        if (newPass === null) return;

        if (newEmail && newPass) {
            database.ref('users/' + uid).update({ email: newEmail, password: newPass })
            .then(() => alert("Account updated successfully!"));
        }
    }

    function viewDoc(url, label) {
        if(!url || url === 'undefined' || url === 'null') {
            return alert("This document was not uploaded properly by the user.");
        }
        document.getElementById('previewImg').src = url;
        document.getElementById('imgLabel').innerText = label;
        document.getElementById('imgModal').style.display = 'flex';
    }

    function closeDoc() {
        document.getElementById('imgModal').style.display = 'none';
        document.getElementById('previewImg').src = '';
    }

    function decideKYC(uid, status) {
        const msg = status === 'verified' ? "Approve this user's KYC?" : "Reject this user's KYC?";
        if(confirm(msg)) {
            database.ref('users/' + uid).update({ kycStatus: status });
        }
    }
</script>

</body>
</html>
