<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SMAT | User Management Panel</title>
    <script src="https://www.gstatic.com/firebasejs/9.0.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.0.0/firebase-database-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.0.0/firebase-auth-compat.js"></script>
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@700;800;900&family=Inter:wght@400;600&display=swap" rel="stylesheet">
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><circle cx='50' cy='50' r='50' fill='%23f3ba2f'/><text x='50%25' y='55%25' text-anchor='middle' dy='.3em' fill='black' font-family='Courier New, monospace' font-weight='900' font-size='60'>S</text></svg>">
    
    <style>
        :root { 
            --primary: #f3ba2f; 
            --bg: #0b0e11; 
            --card: #1e2329; 
            --text: #eaecef; 
            --border: rgba(255, 255, 255, 0.08); 
            --text-sec: #848e9c; 
            --up: #0ecb81; 
            --down: #f6465d; 
            --font-bold: 'Montserrat', sans-serif;
            --font-main: 'Inter', sans-serif;
        }

        * { box-sizing: border-box; outline: none; }
        body { 
            background: var(--bg); 
            color: var(--text); 
            font-family: var(--font-main); 
            margin: 0; 
            padding: 0; 
            overflow-x: hidden;
        }

        /* --- Admin Login --- */
        #adminLogin { 
            position: fixed; top:0; left:0; width:100%; height:100%; 
            background: radial-gradient(circle at center, #1e2329 0%, #0b0e11 100%);
            z-index: 5000; display: flex; align-items: center; justify-content: center; 
        }
        .login-card { 
            background: var(--card); padding: 40px; border-radius: 24px; 
            border: 1px solid var(--border); width: 90%; max-width: 400px; 
            text-align: center; box-shadow: 0 20px 50px rgba(0,0,0,0.5);
            font-family: var(--font-main);
        }
        
        /* Montserrat Font for Admin Panel Title */
        .login-card h2 { 
            font-family: var(--font-bold); font-weight: 900; margin-top: 0; margin-bottom: 25px;
            color: white; text-transform: uppercase; letter-spacing: 1px;
        }
        .login-card h2 span { color: var(--primary); }

        .login-card input { 
            width: 100%; padding: 15px; margin: 10px 0; background: #0b0e11; 
            border: 1px solid var(--border); color: white; border-radius: 12px; 
            font-size: 14px; font-family: var(--font-main);
        }
        .login-card input:focus { border-color: var(--primary); }
        .btn-login { 
            width: 100%; background: var(--primary); color: black; border: none; 
            padding: 15px; border-radius: 12px; font-weight: 800; cursor: pointer; 
            margin-top: 15px; transition: 0.3s; font-family: var(--font-bold);
        }
        .btn-login:hover { transform: translateY(-2px); box-shadow: 0 5px 15px rgba(243, 186, 47, 0.3); }

        /* Icon styling */
        .call-center-icon {
            width: 60px; height: 60px; margin: 0 auto 20px;
            fill: var(--primary); /* SVG fill color matches your theme */
        }

        /* --- Header Panel --- */
        .header-panel { 
            position: sticky; top: 0; z-index: 100;
            display: flex; justify-content: space-between; align-items: center; 
            background: #181a20;
            padding: 15px 30px; 
            border-bottom: 1px solid var(--border);
            box-shadow: 0 4px 20px rgba(0,0,0,0.3);
        }
        .header-panel h2 { 
            font-family: var(--font-bold); margin: 0; font-size: 22px; 
            color: var(--primary); font-weight: 900; letter-spacing: 1px; 
        }
        .btn-logout { 
            background: rgba(246, 70, 93, 0.1); border: 1px solid rgba(246, 70, 93, 0.2);
            color: var(--down); padding: 10px; border-radius: 12px; cursor: pointer; transition: 0.3s;
        }
        .btn-logout:hover { background: var(--down); color: white; }

        /* --- Dashboard UI --- */
        .admin-container { max-width: 1200px; margin: auto; display: none; padding: 30px 20px; }
        
        /* Stats Grid */
        .stats-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(250px, 1fr)); gap: 20px; margin-bottom: 30px; }
        .stat-card { 
            background: linear-gradient(135deg, #1e2329 0%, #161a1e 100%);
            padding: 25px; border-radius: 20px; text-align: left; 
            border: 1px solid var(--border); cursor: pointer; transition: 0.3s;
            position: relative; overflow: hidden;
        }
        .stat-card:hover { border-color: var(--primary); transform: translateY(-5px); }
        .stat-card.active { border: 2px solid var(--primary); background: rgba(243, 186, 47, 0.03); }
        .stat-card h5 { margin: 0; font-size: 13px; color: var(--text-sec); font-weight: 600; text-transform: uppercase; }
        .stat-card h2 { margin: 10px 0 0 0; font-size: 32px; font-family: var(--font-bold); font-weight: 900; }

        /* Search Box */
        .search-box { 
            background: var(--card); border: 1px solid var(--border); border-radius: 16px; 
            padding: 15px 25px; display: flex; align-items: center; margin-bottom: 30px; gap: 15px; 
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
        }
        .search-box input { flex: 1; background: transparent; border: none; color: white; font-size: 16px; font-family: var(--font-main); }
        .search-box i { color: var(--primary); font-size: 18px; }

        /* User Cards */
        .user-card { 
            background: var(--card); border: 1px solid var(--border); border-radius: 20px; 
            padding: 25px; margin-bottom: 20px; display: flex; flex-wrap: wrap; 
            justify-content: space-between; gap: 25px; align-items: flex-start;
            transition: 0.3s;
        }
        .user-card:hover { border-color: rgba(243, 186, 47, 0.3); box-shadow: 0 10px 30px rgba(0,0,0,0.2); }
        
        .info-group { flex: 1; min-width: 250px; }
        .info-group h4 { 
            margin: 0 0 15px 0; color: var(--primary); font-family: var(--font-bold);
            font-size: 16px; display: flex; align-items: center; gap: 10px;
        }
        .info-group p { margin: 8px 0; font-size: 14px; color: var(--text-sec); }
        .info-group b { color: var(--text); font-weight: 600; }
        
        .doc-btns { display: flex; gap: 10px; margin-top: 15px; }
        .btn-view { 
            background: #2b3139; color: var(--text); border: 1px solid var(--border); 
            padding: 8px 16px; border-radius: 8px; font-size: 12px; cursor: pointer; 
            font-weight: 600; transition: 0.3s;
        }
        .btn-view:hover { background: var(--primary); color: black; border-color: var(--primary); }

        .action-btns { display: flex; flex-direction: column; gap: 12px; min-width: 150px; }
        .btn-verify { background: var(--up); color: black; padding: 12px; border-radius: 10px; font-weight: 800; border:none; cursor:pointer; font-family: var(--font-bold); }
        .btn-reject { background: rgba(246, 70, 93, 0.1); color: var(--down); padding: 12px; border-radius: 10px; font-weight: 800; border: 1px solid var(--down); cursor:pointer; font-family: var(--font-bold); }
        .btn-edit { background: transparent; color: var(--text-sec); border: 1px dashed var(--text-sec); margin-top: 10px; border-radius: 8px; padding: 8px; cursor:pointer; font-size: 12px; }
        .btn-edit:hover { border-color: var(--primary); color: var(--primary); }

        /* Modal */
        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.98); z-index: 6000; align-items: center; justify-content: center; flex-direction: column; padding: 20px; }
        .modal-img { max-width: 100%; max-height: 80vh; border-radius: 16px; border: 2px solid var(--primary); box-shadow: 0 0 50px rgba(243,186,47,0.2); }
        .close-modal { position: absolute; top: 20px; right: 30px; color: white; font-size: 35px; cursor: pointer; }
        #imgLabel { font-family: var(--font-bold); color: var(--primary); margin-top: 20px; font-size: 20px; font-weight: 900; text-transform: uppercase; letter-spacing: 2px; }

        .status-badge { padding: 4px 10px; border-radius: 6px; font-size: 11px; font-weight: 800; text-transform: uppercase; }

        @media (max-width: 768px) {
            .stats-grid { grid-template-columns: 1fr; }
            .header-panel { padding: 15px 20px; }
            .user-card { flex-direction: column; }
            .action-btns { width: 100%; }
        }
    </style>
</head>
<body>

<div id="adminLogin">
    <div class="login-card">
        <svg class="call-center-icon" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
            <path d="M256 0c141.4 0 256 114.6 256 256c0 10.3-4.1 20.2-11.3 27.4c-7.2 7.2-17.1 11.3-27.4 11.3H448c-17.7 0-32-14.3-32-32V224c0-10.3-4.1-20.2-11.3-27.4c-7.2-7.2-17.1-11.3-27.4-11.3H134.6c-10.3 0-20.2 4.1-27.4 11.3c-7.2 7.2-11.3 17.1-11.3 27.4V264c0 17.7-14.3 32-32 32H32c-10.3 0-20.2-4.1-27.4-11.3C-2.6 277.5-6.7 267.6-6.7 257.3C-6.7 115.9 108 1.3 249.4 1.3C251.6 1.3 253.8 1.3 256.0 1.3L256 0zm208 416c0 17.7-14.3 32-32 32s-32-14.3-32-32V384c0-17.7 14.3-32 32-32s32 14.3 32 32v32zm-288 0c0 17.7-14.3 32-32 32s-32-14.3-32-32V384c0-17.7 14.3-32 32-32s32 14.3 32 32v32zm144-80h48v32h-48v-32zm-64 0h48v32h-48v-32zm192-32c0 26.5-21.5 48-48 48H32c-26.5 0-48-21.5-48-48v-64c0-26.5 21.5-48 48-48h320c26.5 0 48 21.5 48 48v64zM240 288c0 8.8-7.2 16-16 16s-16-7.2-16-16v-48c0-8.8 7.2-16 16-16s16 7.2 16 16v48zm128 0c0 8.8-7.2 16-16 16s-16-7.2-16-16v-48c0-8.8 7.2-16 16-16s16 7.2 16 16v48zm-64 128h48v32h-48v-32z"/>
        </svg>

        <h2>ADMIN <span>PANEL</span></h2>
        <input type="email" id="adminEmail" placeholder="Admin Email">
        <input type="password" id="adminPassword" placeholder="Password">
        <button class="btn-login" onclick="loginAdmin()">ACCESS DASHBOARD</button>
        <p id="loginError" style="color: var(--down); display:none; margin-top:15px; font-size: 13px;"></p>
    </div>
</div>

<div class="header-panel" id="headerUI" style="display:none">
    <h2> Users <span style="color:white">DASHBOARD</span></h2>
    <div style="display: flex; align-items: center;">
        <button class="btn-logout" onclick="logoutAdmin()"><i class="fa-solid fa-power-off"></i></button>
    </div>
</div>

<div class="admin-container" id="panelUI">
    <div class="stats-grid">
        <div class="stat-card active" id="filterAll" onclick="setFilter('all')">
            <h5>Total Network Users</h5>
            <h2 id="totalCount">0</h2>
        </div>
        <div class="stat-card" id="filterPending" onclick="setFilter('pending')">
            <h5>Pending Verification</h5>
            <h2 id="pendingCount" style="color:var(--primary)">0</h2>
        </div>
        <div class="stat-card" id="filterVerified" onclick="setFilter('verified')">
            <h5>Verified Assets</h5>
            <h2 id="passedCount" style="color:var(--up)">0</h2>
        </div>
        </div>

    <div class="search-box">
        <i class="fas fa-search"></i>
        <input type="text" id="adminSearch" placeholder="Search by SMAT ID, Email or NID..." onkeyup="loadUsers()">
    </div>

    <div id="userList">
        <div style="text-align:center; padding: 50px; color:var(--text-sec)">
            <i class="fa-solid fa-circle-notch fa-spin" style="font-size: 30px; color: var(--primary);"></i>
            <p style="margin-top: 15px;">Synchronizing with SMAT Blockchain...</p>
        </div>
    </div>
</div>

<div id="imgModal" class="modal">
    <span class="close-modal" onclick="closeDoc()">&times;</span>
    <img id="previewImg" class="modal-img">
    <p id="imgLabel"></p>
    <button onclick="closeDoc()" style="margin-top:30px; background: var(--primary); color: black; padding: 12px 40px; border-radius: 12px; border:none; cursor:pointer; font-weight: 800; font-family: var(--font-bold);">CLOSE PREVIEW</button>
</div>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyAMxtJedkehhxJRMPZLjhpKHqneHEWsGlE",
        authDomain: "smat-exchange.firebaseapp.com",
        projectId: "smat-exchange",
        storageBucket: "smat-exchange.firebasestorage.app",
        messagingSenderId: "836334569396",
        appId: "1:836334569396:web:679effe640b3453412d4e1",
        measurementId: "G-FCE3H3F18V",
        databaseURL: "https://smat-exchange-default-rtdb.firebaseio.com/"
    };

    firebase.initializeApp(firebaseConfig);
    const auth = firebase.auth();
    const database = firebase.database();

    let currentFilter = 'all';

    function loginAdmin() {
        const email = document.getElementById('adminEmail').value;
        const pass = document.getElementById('adminPassword').value;
        const btn = document.querySelector('.btn-login');
        btn.innerText = "AUTHENTICATING...";
        
        auth.signInWithEmailAndPassword(email, pass).catch(err => {
            document.getElementById('loginError').innerText = "Access Denied: " + err.message;
            document.getElementById('loginError').style.display = 'block';
            btn.innerText = "ACCESS DASHBOARD";
        });
    }

    function logoutAdmin() { auth.signOut().then(() => location.reload()); }

    auth.onAuthStateChanged(user => {
        if (user) {
            document.getElementById('adminLogin').style.display = 'none';
            document.getElementById('headerUI').style.display = 'flex';
            document.getElementById('panelUI').style.display = 'block';
            loadUsers();
        }
    });

    function setFilter(type) {
        currentFilter = type;
        document.querySelectorAll('.stat-card').forEach(c => c.classList.remove('active'));
        if(type === 'all') document.getElementById('filterAll').classList.add('active');
        if(type === 'pending') document.getElementById('filterPending').classList.add('active');
        if(type === 'verified') document.getElementById('filterVerified').classList.add('active');
        loadUsers();
    }

    function loadUsers() {
        const searchTerm = document.getElementById('adminSearch').value.toLowerCase();
        database.ref('users').on('value', (snapshot) => {
            const users = snapshot.val() || {};
            const list = document.getElementById('userList');
            list.innerHTML = '';
            
            let counts = { total: 0, pending: 0, verified: 0 };

            const userArray = Object.keys(users).map(uid => ({uid, ...users[uid]}));
            
            for (let i = 0; i < userArray.length; i++) {
                const u = userArray[i];
                const uid = u.uid;
                const status = (u.kycStatus || 'unverified').toLowerCase();
                
                counts.total++;
                if(status === 'pending') counts.pending++;
                if(status === 'verified') counts.verified++;

                if(currentFilter !== 'all' && status !== currentFilter) continue;

                const searchStr = (u.smatID + u.email + (u.nidNumber || '')).toLowerCase();
                if(searchTerm && !searchStr.includes(searchTerm)) continue;

                const statusColor = status === 'verified' ? 'var(--up)' : (status === 'pending' ? 'var(--primary)' : 'var(--down)');

                list.innerHTML += `
                    <div class="user-card">
                        <div class="info-group">
                            <h4><i class="fas fa-user-shield"></i> ACCOUNT SECURITY</h4>
                            <p>SMAT ID: <b style="color:var(--primary)">${u.smatID || 'UNASSIGNED'}</b></p>
                            <p>Email: <b>${u.email}</b></p>
                            <p>Stored Pass: <span style="color:var(--primary); font-family: monospace; font-size: 15px;">${u.password || '••••••'}</span></p>
                            <button class="btn-edit" onclick="editUserAccount('${uid}', '${u.email}', '${u.password}')"><i class="fa-solid fa-user-pen"></i> Update Login Credentials</button>
                        </div>

                        <div class="info-group">
                            <h4><i class="fas fa-address-card"></i> KYC DOCUMENTS</h4>
                            <p>Legal Name: <b>${u.realName || 'NOT PROVIDED'}</b></p>
                            <p>NID Number: <b>${u.nidNumber || 'NOT PROVIDED'}</b></p>
                            <p>Status: <span class="status-badge" style="background: ${statusColor}22; color: ${statusColor}">${status}</span></p>
                            
                            <div class="doc-btns">
                                <button class="btn-view" onclick="viewDoc('${u.nidFront}', 'NID FRONT VIEW')">FRONT</button>
                                <button class="btn-view" onclick="viewDoc('${u.nidBack}', 'NID BACK VIEW')">BACK</button>
                                <button class="btn-view" onclick="viewDoc('${u.userSelfie}', 'HAND-HELD SELFIE')">SELFIE</button>
                            </div>
                        </div>

                        <div class="action-btns">
                            ${status === 'pending' ? `
                                <button class="btn-verify" onclick="decideKYC('${uid}', 'verified')">APPROVE KYC</button>
                                <button class="btn-reject" onclick="decideKYC('${uid}', 'rejected')">REJECT SUBMISSION</button>
                            ` : `
                                <div style="text-align:center; padding: 10px; border: 1px solid var(--border); border-radius: 12px;">
                                    <i class="fa-solid fa-circle-check" style="color:var(--up); font-size: 20px;"></i>
                                    <p style="font-size:11px; color:var(--text-sec); margin: 5px 0 0 0;">SYSTEM ACTIVE</p>
                                </div>
                            `}
                        </div>
                    </div>
                `;
            }
            
            document.getElementById('totalCount').innerText = counts.total;
            document.getElementById('pendingCount').innerText = counts.pending;
            document.getElementById('passedCount').innerText = counts.verified;
        });
    }

    function editUserAccount(uid, oldEmail, oldPass) {
        const newEmail = prompt("Update User Email:", oldEmail);
        if (newEmail === null) return;
        const newPass = prompt("Update User Password:", oldPass);
        if (newPass === null) return;

        if (newEmail && newPass) {
            database.ref('users/' + uid).update({ email: newEmail, password: newPass })
            .then(() => alert("SMAT Auth Database Updated."));
        }
    }

    function viewDoc(url, label) {
        if(!url || url === 'undefined' || url === 'null' || url === '') {
            return alert("Error: User has not uploaded this document yet.");
        }
        document.getElementById('previewImg').src = url;
        document.getElementById('imgLabel').innerText = label;
        document.getElementById('imgModal').style.display = 'flex';
    }

    function closeDoc() {
        document.getElementById('imgModal').style.display = 'none';
        document.getElementById('previewImg').src = '';
    }

    function decideKYC(uid, status) {
        const action = status === 'verified' ? "APPROVE" : "REJECT";
        if(confirm(`Are you sure you want to ${action} this identity?`)) {
            database.ref('users/' + uid).update({ kycStatus: status });
        }
    }
</script>

</body>
</html>
