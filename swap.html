    <style>
        @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@700;800&family=Inter:wght@400;600;700&display=swap');
        :root { --bg: #0b0e11; --card: #1e2329; --primary: #f0b90b; --border: #3b424a; --input: #2b3139; }
        body { background-color: var(--bg); color: white; font-family: 'Inter', sans-serif; overflow-x: hidden; }
        .page-headline { font-family: 'Poppins', sans-serif; font-weight: 800; font-size: 28px; text-align: center; background: linear-gradient(135deg, #fff 0%, var(--primary) 100%); -webkit-background-clip: text; -webkit-text-fill-color: transparent; margin-bottom: 20px; padding-top: 20px; }
        .swap-card { background: var(--card); border: 1px solid var(--border); border-radius: 24px; padding: 20px; position: relative; width: 100%; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        .input-box { background: var(--input); border-radius: 16px; padding: 15px; border: 1px solid transparent; transition: 0.3s; }
        .input-box:focus-within { border-color: var(--primary); }
        .token-select { background: #3b424a; padding: 8px; border-radius: 10px; font-weight: 700; color: white; border: none; cursor: pointer; }
        .swap-arrow { position: absolute; left: 50%; top: 50%; transform: translate(-50%, -50%); width: 40px; height: 40px; background: var(--card); border: 4px solid var(--bg); border-radius: 12px; display: flex; align-items: center; justify-content: center; cursor: pointer; z-index: 10; color: var(--primary); }
        .btn-swap { background: var(--primary); color: black; width: 100%; padding: 16px; border-radius: 16px; font-weight: 800; margin-top: 20px; transition: 0.3s; font-size: 16px; }
        .btn-swap:disabled { opacity: 0.4; cursor: not-allowed; }
        #warning { color: #f6465d; font-size: 11px; font-weight: 700; margin-top: 10px; display: none; text-align: center; }
        .loader { width: 20px; height: 20px; border: 3px solid black; border-top-color: transparent; border-radius: 50%; animation: spin 0.8s linear infinite; display: none; }
        @keyframes spin { to { transform: rotate(360deg); } }

        #notification-container { position: fixed; top: 20px; right: 20px; z-index: 10000; }
        .swap-toast { background: #1a1a1a; color: #fff; border-left: 4px solid var(--primary); padding: 15px 20px; border-radius: 12px; box-shadow: 0 10px 25px rgba(0,0,0,0.6); margin-bottom: 10px; animation: slideIn 0.4s ease-out forwards; min-width: 250px; }
        .swap-toast.hide { animation: slideOut 0.4s ease-in forwards; }
        @keyframes slideIn { from { transform: translateX(110%); } to { transform: translateX(0); } }
        @keyframes slideOut { from { transform: translateX(0); } to { transform: translateX(110%); } }
    </style>
</head>
<body class="flex justify-center min-h-screen">

<div id="notification-container"></div>

<div class="w-full max-w-md px-4">
    <h1 class="page-headline">SMAT SWAP</h1>

    <div class="swap-card">
        <div class="input-box">
            <div class="flex justify-between mb-2">
                <span class="text-[10px] text-gray-500 font-bold uppercase">Pay From</span>
                <span class="text-[10px] text-gray-300">Available: <span id="bal-from" class="text-primary">0.00</span></span>
            </div>
            <div class="flex justify-between items-center gap-2">
                <input id="input-from" type="number" placeholder="0.00" class="bg-transparent text-2xl font-bold outline-none w-full placeholder-gray-600" oninput="calculate()">
                <select id="select-from" class="token-select" onchange="updateTokens()">
                    <option value="USDT">USDT</option>
                    <option value="BNB">BNB</option>
                    <option value="ETH">ETH</option>
                    <option value="oxSMAT">oxSMAT</option>
                </select>
            </div>
            <button onclick="setMax()" class="mt-2 text-[10px] text-primary bg-yellow-500/10 px-2 py-1 rounded font-bold uppercase">Max (Inc. Fee)</button>
        </div>

        <div class="my-[-12px] relative h-10 flex items-center justify-center">
            <div class="swap-arrow" onclick="reverseTokens()"><i class="fas fa-retweet"></i></div>
        </div>

        <div class="input-box">
            <div class="flex justify-between mb-2">
                <span class="text-[10px] text-gray-500 font-bold uppercase">Receive To</span>
                <span class="text-[10px] text-gray-300">Balance: <span id="bal-to" class="text-primary">0.00</span></span>
            </div>
            <div class="flex justify-between items-center gap-2">
                <input id="input-to" type="number" placeholder="0.00" class="bg-transparent text-2xl font-bold outline-none w-full" readonly>
                <select id="select-to" class="token-select" onchange="updateTokens()">
                    <option value="oxSMAT">oxSMAT</option>
                    <option value="USDT">USDT</option>
                    <option value="BNB">BNB</option>
                    <option value="ETH">ETH</option>
                </select>
            </div>
        </div>

        <div id="warning"><i class="fas fa-exclamation-circle"></i> INSUFFICIENT BALANCE</div>

        <div class="mt-4 p-4 bg-black/30 rounded-xl space-y-2 border border-white/5">
            <div class="flex justify-between text-[11px]"><span class="text-gray-400">Exchange Rate</span><span id="live-rate" class="font-mono text-white">Loading...</span></div>
            <div class="flex justify-between text-[11px]"><span class="text-gray-400">Protocol Fee (0.1%)</span><span id="fee-display" class="font-mono text-red-400">0.00</span></div>
        </div>

        <button id="swap-btn" class="btn-swap flex items-center justify-center gap-2" onclick="executeSwap()">
            <div id="btn-loader" class="loader"></div>
            <span id="btn-text">CONFIRM SWAP</span>
        </button>
    </div>
</div>

<style>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyAMxtJedkehhxJRMPZLjhpKHqneHEWsGlE",
        authDomain: "smat-exchange.firebaseapp.com",
        databaseURL: "https://smat-exchange-default-rtdb.firebaseio.com",
        projectId: "smat-exchange"
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();
    const auth = firebase.auth();

    let userUID = null;
    let prices = { USDT: 1, BNB: 0, ETH: 0, oxSMAT: 8 };
    let userBalances = { USDT: 0, BNB: 0, ETH: 0, oxSMAT: 0 };

    auth.onAuthStateChanged(user => {
        if (user) { 
            userUID = user.uid; 
            syncBalances(); 
        } else {
            resetToZero();
            window.location.href = "login.html"; 
        }
    });

    function resetToZero() {
        document.getElementById('bal-from').innerText = "0.00";
        document.getElementById('bal-to').innerText = "0.00";
    }

    async function fetchPrices() {
        try {
            const [b, e] = await Promise.all([
                fetch('https://api.binance.com/api/v3/ticker/price?symbol=BNBUSDT'),
                fetch('https://api.binance.com/api/v3/ticker/price?symbol=ETHUSDT')
            ]);
            const bj = await b.json(); const ej = await e.json();
            prices.BNB = parseFloat(bj.price);
            prices.ETH = parseFloat(ej.price);
            calculate();
        } catch (err) { console.log("Price fetch fail"); }
    }

    function syncBalances() {
        db.ref(`users/${userUID}`).on('value', snap => {
            const d = snap.val();
            if(d) {
                userBalances.USDT = parseFloat(d.usdt_balance) || 0;
                userBalances.BNB = parseFloat(d.bnb_balance) || 0;
                userBalances.ETH = parseFloat(d.eth_balance) || 0;
                userBalances.oxSMAT = parseFloat(d.oxsmat_balance) || 0; // Correctly calling oxsmat_balance
                updateUIBalances();
            }
        });
    }

    function updateUIBalances() {
        const from = document.getElementById('select-from').value;
        const to = document.getElementById('select-to').value;
        if(userUID) {
            document.getElementById('bal-from').innerText = userBalances[from].toFixed(6);
            document.getElementById('bal-to').innerText = userBalances[to].toFixed(6);
        }
    }

    function calculate() {
        const f = document.getElementById('select-from').value;
        const t = document.getElementById('select-to').value;
        const input = parseFloat(document.getElementById('input-from').value) || 0;
        
        const fee = input * 0.001;
        const netInput = input - fee;
        const out = (netInput * prices[f]) / prices[t];

        document.getElementById('input-to').value = input > 0 ? out.toFixed(6) : "";
        document.getElementById('fee-display').innerText = `${fee.toFixed(6)} ${f}`;
        document.getElementById('live-rate').innerText = `1 ${f} = ${((1 * prices[f])/prices[t]).toFixed(4)} ${t}`;

        const warn = document.getElementById('warning');
        const btn = document.getElementById('swap-btn');
        if(input > userBalances[f]) {
            warn.style.display = 'block';
            btn.disabled = true;
        } else {
            warn.style.display = 'none';
            btn.disabled = false;
        }
    }

    function setMax() {
        const f = document.getElementById('select-from').value;
        document.getElementById('input-from').value = userBalances[f]; 
        calculate(); 
    }

    function updateTokens() { updateUIBalances(); calculate(); }

    function reverseTokens() {
        const s1 = document.getElementById('select-from');
        const s2 = document.getElementById('select-to');
        const temp = s1.value; s1.value = s2.value; s2.value = temp;
        updateTokens();
    }

    function showToast(title, message) {
        const container = document.getElementById('notification-container');
        const toast = document.createElement('div');
        toast.className = 'swap-toast';
        toast.innerHTML = `
            <div style="color:var(--primary); font-weight:800; font-size:14px; margin-bottom:4px;">${title}</div>
            <div style="font-size:12px; color:#ccc;">${message}</div>
        `;
        container.appendChild(toast);
        setTimeout(() => {
            toast.classList.add('hide');
            setTimeout(() => toast.remove(), 400);
        }, 3000);
    }

    async function executeSwap() {
        const f = document.getElementById('select-from').value;
        const t = document.getElementById('select-to').value;
        const fAmt = parseFloat(document.getElementById('input-from').value);
        const tAmt = parseFloat(document.getElementById('input-to').value);

        if(!fAmt || fAmt <= 0) return showToast("ERROR", "Please enter a valid amount");
        if(f === t) return showToast("ERROR", "Cannot swap the same coin");

        document.getElementById('btn-loader').style.display = 'block';
        document.getElementById('btn-text').innerText = 'PROCESSING...';
        document.getElementById('swap-btn').disabled = true;

        try {
            const up = {};
            const fPath = `${f.toLowerCase()}_balance`;
            const tPath = `${t.toLowerCase()}_balance`;

            if (userBalances[f] < fAmt) throw new Error("Insufficient Balance");

            up[`users/${userUID}/${fPath}`] = (userBalances[f] - fAmt).toFixed(8);
            up[`users/${userUID}/${tPath}`] = ((userBalances[t] || 0) + tAmt).toFixed(8);

            const logKey = db.ref(`users/${userUID}/history`).push().key;
            up[`users/${userUID}/history/${logKey}`] = {
                method: `SWAP ${f} TO ${t}`, // Title for Wallet History
                amount: tAmt.toFixed(6),
                coin: t,
                status: 'success',
                timestamp: Date.now(),
                address: "Internal System", // Fixed Undefined Address
                network: "DexSwap",         // Fixed Undefined Network
                hash: "SWAP-" + Math.random().toString(36).substr(2, 9).toUpperCase()
            };

            await db.ref().update(up);
            
            showToast("SWAP SUCCESSFUL", `Received: ${tAmt.toFixed(6)} ${t}`);
            document.getElementById('input-from').value = "";
            calculate();
        } catch (e) { 
            showToast("FAILED", e.message);
        }
        
        document.getElementById('btn-loader').style.display = 'none';
        document.getElementById('btn-text').innerText = 'CONFIRM SWAP';
        document.getElementById('swap-btn').disabled = false;
    }

    setInterval(fetchPrices, 15000);
    window.onload = fetchPrices;
</script>
