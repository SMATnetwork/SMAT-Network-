<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>SMAT EXPLORER | PRO TERMINAL</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&family=Montserrat:wght@900&display=swap" rel="stylesheet">
<link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><circle cx='50' cy='50' r='50' fill='%23f3ba2f'/><text x='50%25' y='55%25' text-anchor='middle' dy='.3em' fill='black' font-family='Courier New, monospace' font-weight='900' font-size='60'>S</text></svg>">
    

    
    <style>
    
    
        :root {
            --bg: #0b0e11;
            --card: #1e2329;
            --border: #2b2f36;
            --text: #eaecef;
            --dim: #848e9c;
            --nav-bg: #181a20;
            --table-header: #2b2f36;
        }
    
    
    * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
    
    html, body { 
        height: 100%; margin: 0; padding: 0; 
        background: var(--bg); color: var(--text); 
        font-family: 'Inter', sans-serif;
        overflow: hidden; /* স্ক্রিন বাউন্স রোধে */
        width: 100%;
    }
    
    .wrapper { 
        display: flex; flex-direction: column; 
        height: 100vh; height: 100dvh; 
        width: 100%;
    }
    
    .content-area {
        flex: 1; 
        overflow-y: auto; 
        padding: env(safe-area-inset-top) clamp(10px, 3vw, 20px) calc(75px + env(safe-area-inset-bottom)) clamp(10px, 3vw, 20px);
        scroll-behavior: smooth;
        -webkit-overflow-scrolling: touch;
    }
    
    .container { 
        max-width: 1200px; /* বড় স্ক্রিনের জন্য একটু বাড়ানো হয়েছে */
        margin: 0 auto; 
        width: 100%; 
    }
    
    .top-bar { 
        display: flex; 
        justify-content: space-between; 
        align-items: center; 
        padding: clamp(15px, 3vw, 25px) 0; 
        position: sticky; 
        top: 0; 
        background: var(--bg); 
        z-index: 100;
        gap: 10px;
    }
    
    .top-bar h2 { 
        font-family: 'Montserrat', sans-serif; 
        font-size: clamp(1.1rem, 5vw, 1.5rem); 
        margin: 0; 
        white-space: nowrap;
        letter-spacing: -0.5px;
    }
    
    .search-box input { 
        width: clamp(130px, 35vw, 250px); 
        background: var(--card); border: 1px solid var(--border); 
        color: var(--text); padding: 10px 15px; border-radius: 12px; outline: none;
        font-size: 14px; transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
    }
    
    .search-box input:focus { 
        width: clamp(160px, 50vw, 350px); 
        border-color: var(--accent); 
        box-shadow: 0 0 0 3px rgba(243, 186, 47, 0.1);
    }
    
    .table-container { 
        width: 100%; 
        overflow-x: auto; 
        border-radius: 16px; 
        border: 1px solid var(--border); 
        background: var(--card); 
        box-shadow: 0 4px 20px rgba(0,0,0,0.02);
    }
    
    table { 
        width: 100%; 
        border-collapse: collapse; 
        min-width: 550px; 
        table-layout: auto;
    }
    
    th { 
        background: var(--table-header); 
        color: var(--dim); 
        padding: 15px 12px; 
        text-align: left; 
        font-size: 10px; 
        text-transform: uppercase;
        letter-spacing: 1px;
        font-weight: 700;
    }
    
    td { 
        padding: 16px 12px; 
        border-bottom: 1px solid var(--border); 
        font-size: 14px; 
        white-space: nowrap; 
    }
    
    .col-rank { width: 60px; text-align: center; font-weight: 600; }
    .col-trend, .col-vol { display: none; } 
    
    @media (min-width: 640px) {
        .col-vol { display: table-cell; }
    }
    @media (min-width: 900px) {
        .col-trend { display: table-cell; }
        table { table-layout: fixed; }
    }
    
    .coin-info { display: flex; align-items: center; gap: 10px; }
    .coin-logo { width: 28px; height: 28px; border-radius: 50%; flex-shrink: 0; background: #eee; }
    
    .up { color: var(--up); font-weight: 700; }
    .down { color: var(--down); font-weight: 700; }
    
    .flash-up td { animation: flashUp 0.6s ease; }
    .flash-down td { animation: flashDown 0.6s ease; }
    
    @keyframes flashUp {
        0% { background: transparent; }
        50% { background: rgba(3, 166, 109, 0.15); }
        100% { background: transparent; }
    }
    @keyframes flashDown {
        0% { background: transparent; }
        50% { background: rgba(207, 48, 74, 0.15); }
        100% { background: transparent; }
    }
    
    .spinner { width: 14px; height: 14px; border: 2px solid rgba(0,0,0,0.1); border-radius: 50%; display: inline-block; animation: spin 1s linear infinite; vertical-align: middle; }
    .s-price { border-top-color: var(--accent); }
    
    @keyframes spin { 100% { transform: rotate(360deg); } }
    
    .bottom-nav {
        height: calc(65px + env(safe-area-inset-bottom)); 
        background: var(--nav-bg); 
        display: flex;
        border-top: 1px solid var(--border); 
        position: fixed; 
        bottom: 0; left: 0; right: 0; 
        z-index: 1000;
        padding-bottom: env(safe-area-inset-bottom);
        backdrop-filter: blur(10px);
        -webkit-backdrop-filter: blur(10px);
    }
    
    .nav-item { 
        flex: 1; display: flex; flex-direction: column; 
        align-items: center; justify-content: center; 
        color: var(--dim); text-decoration: none; 
        font-size: 10px; 
        font-weight: 600;
        transition: 0.2s;
    }
    
    .nav-item i { font-size: 20px; margin-bottom: 4px; }
    .nav-item.active { color: var(--accent); }
    
    .pagination { 
    display: flex; 
    justify-content: center; 
    gap: 15px; 
    /* প্যাডিং কমিয়ে দেওয়া হয়েছে যাতে এটি ন্যাভিগেশন বার এর উপরে সুন্দরভাবে বসে */
    padding: 30px 0 100px 0; 
    align-items: center;
    width: 100%;
}

    
    .btn-page { 
        background: var(--card); border: 1px solid var(--border); 
        color: var(--text); padding: 10px 20px; 
        border-radius: 12px; font-weight: 700; cursor: pointer;
        transition: 0.2s;
    }
    
    .btn-page:hover { border-color: var(--accent); }
    .btn-page:active { transform: scale(0.9); }

    /* কাস্টম স্ক্রলবার */
    .content-area::-webkit-scrollbar { width: 4px; }
    .content-area::-webkit-scrollbar-thumb { background: var(--border); border-radius: 10px; }
    </style>
    
</head>
<body>

<div class="wrapper">
    <div class="content-area">
        <div class="container">
            <header class="top-bar">
                <h2>SMAT <span style="color:var(--accent)">TERMINAL</span></h2>
                <div class="search-box">
                    <input type="text" id="searchInput" placeholder="Search Asset..." oninput="handleSearch()">
                </div>
            </header>

            <div class="table-container">
                <table>
                    <thead>
                        <tr>
                            <th class="col-rank">#</th>
                            <th>Token</th>
                            <th>Price</th>
                            <th style="width: 90px;">24h%</th>
                            <th class="col-trend">7D Chart</th>
                            <th class="col-vol">Volume</th>
                        </tr>
                    </thead>
                    <tbody id="crypto-table"></tbody>
                </table>
            </div>

            <div class="pagination">
                <button class="btn-page" onclick="changePage(-1)"><i class="fa-solid fa-chevron-left"></i></button>
                <span id="page-info" style="font-weight:900; font-size: 14px; letter-spacing: 1px;">PAGE 1</span>
                <button class="btn-page" onclick="changePage(1)"><i class="fa-solid fa-chevron-right"></i></button>
            </div>
        </div>
    </div>

    <nav class="bottom-nav">
        <a href="trade.html" class="nav-item"><i class="fa-solid fa-right-left"></i><span>Exchange</span></a>
        <a href="Explorer.html" class="nav-item active"><i class="fa-solid fa-magnifying-glass-chart"></i><span>Explore</span></a>
        <a href="index.html" class="nav-item"><i class="fa-solid fa-parachute-box"></i><span>Airdrop</span></a>
        <a href="Crash.html" class="nav-item"><i class="fa-solid fa-rocket"></i><span>Crash</span></a>
        <a href="SmatLab.html" class="nav-item"><i class="fa-solid fa-flask-vial"></i><span>SmatLab</span></a>
    </nav>
</div>

<script>
    let currentPage = 1;
    const perPage = 20;
    let allAssets = [];
    let filteredAssets = [];
    let socket = null;

    async function loadAssets() {
        try {
            const res = await fetch('https://api.binance.com/api/v3/ticker/24hr');
            const data = await res.json();
            allAssets = data.filter(t => t.symbol.endsWith('USDT'))
                            .sort((a, b) => parseFloat(b.quoteVolume) - parseFloat(a.quoteVolume))
                            .map((t, index) => ({
                                rank: index + 1,
                                symbol: t.symbol.replace('USDT', ''),
                                fullSymbol: t.symbol,
                                price: parseFloat(t.lastPrice),
                                change: parseFloat(t.priceChangePercent),
                                volume: parseFloat(t.quoteVolume)
                            }));
            filteredAssets = [...allAssets];
            render();
        } catch (e) { console.error("API Error:", e); }
    }

    function render() {
        const tbody = document.getElementById('crypto-table');
        const start = (currentPage - 1) * perPage;
        const pageData = filteredAssets.slice(start, start + perPage);
        tbody.innerHTML = '';

        if (currentPage === 1 && document.getElementById('searchInput').value === "") {
            const row = document.createElement('tr');
            row.style.background = "rgba(243, 186, 47, 0.08)";
            row.innerHTML = `
                <td class="col-rank"><i class="fa-solid fa-star" style="color:var(--accent)"></i></td>
                <td><div class="coin-info"><img class="coin-logo" src="https://ui-avatars.com/api/?name=S&background=f3ba2f&color=fff&bold=true"><strong>SMAT</strong></div></td>
                <td><span class="spinner s-price"></span> Syncing</td>
                <td class="up">0.00%</td>
                <td class="col-trend">---</td>
                <td class="col-vol">$0.00</td>
            `;
            tbody.appendChild(row);
        }

        pageData.forEach(coin => {
            const s = coin.fullSymbol.toLowerCase();
            const row = document.createElement('tr');
            row.id = `row-${s}`;
            row.innerHTML = `
                <td class="col-rank" style="color:var(--dim); font-size:11px;">${coin.rank}</td>
                <td><div class="coin-info">
                    <img class="coin-logo" src="https://assets.coincap.io/assets/icons/${coin.symbol.toLowerCase()}@2x.png" onerror="this.src='https://ui-avatars.com/api/?name=${coin.symbol}'">
                    <strong>${coin.symbol}</strong>
                </div></td>
                <td id="price-${s}" style="font-family:monospace; font-weight:700; font-size:15px;">$${formatPrice(coin.price)}</td>
                <td id="change-${s}" class="${coin.change >= 0 ? 'up' : 'down'}">${coin.change.toFixed(2)}%</td>
                <td class="col-trend"><canvas id="chart-${s}" width="80" height="25"></canvas></td>
                <td class="col-vol" style="color:var(--dim); font-size:12px;">$${formatVol(coin.volume)}</td>
            `;
            tbody.appendChild(row);
            drawChart(coin.fullSymbol, `chart-${s}`, coin.change >= 0 ? '#03a66d' : '#cf304a');
        });

        document.getElementById('page-info').innerText = `PAGE ${currentPage}`;
        connectWS(pageData);
    }

    function formatPrice(p) {
        return p < 1 ? p.toFixed(6) : p.toLocaleString(undefined, {minimumFractionDigits: 2, maximumFractionDigits: 2});
    }

    function formatVol(v) {
        if (v >= 1e9) return (v/1e9).toFixed(2) + 'B';
        if (v >= 1e6) return (v/1e6).toFixed(2) + 'M';
        return (v/1e3).toFixed(2) + 'K';
    }

    async function drawChart(symbol, canvasId, color) {
        try {
            const res = await fetch(`https://api.binance.com/api/v3/klines?symbol=${symbol}&interval=1h&limit=15`);
            const data = await res.json();
            const prices = data.map(d => parseFloat(d[4]));
            const canvas = document.getElementById(canvasId);
            if (!canvas) return;
            const ctx = canvas.getContext('2d');
            const min = Math.min(...prices), max = Math.max(...prices), range = max - min;
            ctx.clearRect(0,0,80,25); ctx.beginPath(); ctx.strokeStyle = color; ctx.lineWidth = 2;
            prices.forEach((p, i) => {
                const x = (i / 14) * 80;
                const y = 25 - ((p - min) / (range || 1)) * 25;
                i === 0 ? ctx.moveTo(x, y) : ctx.lineTo(x, y);
            });
            ctx.stroke();
        } catch(e) {}
    }

    function connectWS(coins) {
        if (socket) socket.close();
        const streams = coins.map(c => `${c.fullSymbol.toLowerCase()}@ticker`).join('/');
        socket = new WebSocket(`wss://stream.binance.com:9443/ws/${streams}`);
        socket.onmessage = (e) => {
            const d = JSON.parse(e.data);
            const s = d.s.toLowerCase();
            const pEl = document.getElementById(`price-${s}`), rEl = document.getElementById(`row-${s}`);
            if (pEl) {
                const newP = parseFloat(d.c), oldP = parseFloat(pEl.innerText.replace(/[$,]/g, ''));
                if (newP !== oldP) {
                    rEl.classList.add(newP > oldP ? 'flash-up' : 'flash-down');
                    setTimeout(() => rEl.classList.remove('flash-up', 'flash-down'), 600);
                }
                pEl.innerText = `$${formatPrice(newP)}`;
                const cEl = document.getElementById(`change-${s}`);
                cEl.innerText = `${parseFloat(d.P).toFixed(2)}%`;
                cEl.className = parseFloat(d.P) >= 0 ? 'up' : 'down';
            }
        };
    }

    function handleSearch() {
        const q = document.getElementById('searchInput').value.toUpperCase();
        filteredAssets = allAssets.filter(a => a.symbol.includes(q));
        currentPage = 1; render();
    }

    function changePage(step) {
        const totalPages = Math.ceil(filteredAssets.length / perPage);
        if (currentPage + step < 1 || (currentPage + step) > totalPages) return;
        currentPage += step; render();
        document.querySelector('.content-area').scrollTo(0,0);
    }

    loadAssets();

    // SMAT লাইভ প্রাইস আপডেট ফাংশন
    function updateSmatLive() {
        const marketData = JSON.parse(localStorage.getItem('marketStats'));
        if (marketData) {
            const smat = marketData.find(c => c.sym === 'SMAT');
            if (smat) {
                // টেবিলের প্রথম রো (SMAT) খুঁজে বের করা
                const tbody = document.getElementById('crypto-table');
                const firstRow = tbody.querySelector('tr');
                
                if (firstRow && firstRow.innerHTML.includes('SMAT')) {
                    const priceTd = firstRow.cells[2];
                    const changeTd = firstRow.cells[3];
                    const volTd = firstRow.cells[5];

                    // দাম আপডেট
                    const oldPrice = parseFloat(priceTd.innerText.replace(/[$,]/g, '')) || 0;
                    const newPrice = smat.price;

                    if (newPrice !== oldPrice && oldPrice !== 0) {
                        firstRow.classList.add(newPrice > oldPrice ? 'flash-up' : 'flash-down');
                        setTimeout(() => firstRow.classList.remove('flash-up', 'flash-down'), 600);
                    }

                    priceTd.innerHTML = `<span style="font-family:monospace; font-weight:700; font-size:15px;">$${formatPrice(newPrice)}</span>`;
                    
                    // পরিবর্তন (%) আপডেট
                    const change = ((newPrice - smat.startPrice) / smat.startPrice * 100).toFixed(2);
                    changeTd.innerText = `${change >= 0 ? '+' : ''}${change}%`;
                    changeTd.className = change >= 0 ? 'up' : 'down';

                    // ভলিউম আপডেট
                    volTd.innerText = `$${formatVol(smat.vol * newPrice)}`;
                }
            }
        }
    }

    // প্রতি ১ সেকেন্ডে SMAT এর দাম চেক করবে
    setInterval(updateSmatLive, 1000);



</script>

</body>
</html>
