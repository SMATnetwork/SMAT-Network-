 <style>
        :root {
            --bg: #0b0e11; --card: #1e2329; --primary: #f0b90b;
            --up: #0ecb81; --down: #f6465d; --text-sec: #848e9c;
            --border: rgba(255, 255, 255, 0.05);
            --font-bold: 'Montserrat', sans-serif;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Inter', sans-serif; -webkit-tap-highlight-color: transparent; }
        body { background: var(--bg); color: white; padding-bottom: 85px; overflow-x: hidden; }

        /* Header & Search */
        .header { padding: 15px; border-bottom: 1px solid var(--border); position: sticky; top: 0; background: var(--bg); z-index: 100; }
        .search-box { 
            background: var(--card); border-radius: 12px; padding: 12px 15px; 
            display: flex; align-items: center; gap: 10px; margin-top: 5px; 
            border: 1px solid var(--border); transition: 0.3s;
        }
        .search-box:focus-within { border-color: var(--primary); box-shadow: 0 0 10px rgba(240, 185, 11, 0.1); }
        .search-box input { background: none; border: none; color: white; width: 100%; outline: none; font-size: 15px; }

        /* Market Tabs */
        .market-tabs { display: flex; gap: 10px; padding: 15px; overflow-x: auto; scrollbar-width: none; }
        .market-tabs::-webkit-scrollbar { display: none; }
        
        .m-tab { 
            display: flex; align-items: center; gap: 8px; padding: 8px 16px; 
            background: var(--card); border-radius: 50px; color: var(--text-sec); 
            font-size: 13px; cursor: pointer; white-space: nowrap; 
            transition: 0.3s; font-weight: 700; border: 1px solid transparent;
        }
        .m-tab.active { background: rgba(240, 185, 11, 0.1); color: var(--primary); border-color: var(--primary); }
        .m-tab-icon { width: 16px; height: 16px; border-radius: 50%; }

        /* Market List Section */
        .market-header { 
            display: grid; grid-template-columns: 1.5fr 1.1fr 0.9fr; 
            padding: 10px 20px; color: var(--text-sec); font-size: 11px; 
            font-weight: 600; text-transform: uppercase;
        }
        
        .coin-row { 
            display: grid; grid-template-columns: 1.5fr 1.1fr 0.9fr; 
            padding: 16px 20px; align-items: center; border-bottom: 1px solid var(--border); 
            cursor: pointer; transition: 0.2s;
        }
        .coin-row:active { background: #1e2329; }
        
        .c-info { display: flex; align-items: center; gap: 12px; }
        .c-logo { width: 36px; height: 36px; border-radius: 50%; background: #2b3139; display: flex; align-items: center; justify-content: center; position: relative; }
        .c-logo img { width: 100%; height: 100%; object-fit: cover; border-radius: 50%; }
        
        .c-name-box { display: flex; flex-direction: column; }
        .c-name { font-family: var(--font-bold); font-weight: 900; font-size: 16px; color: #ffffff; letter-spacing: -0.5px; }
        .c-vol { font-size: 11px; color: var(--text-sec); margin-top: 2px; }

        .c-price { font-family: var(--font-bold); font-weight: 900; font-size: 15px; text-align: left; }
        
        /* Advanced % Change Box */
        .c-change { 
            justify-self: end; padding: 8px 0; border-radius: 8px; 
            font-family: var(--font-bold); font-weight: 900; width: 78px; 
            text-align: center; font-size: 12px; transition: 0.3s;
        }
        .up-bg { background: var(--up); color: #000; box-shadow: 0 4px 12px rgba(14, 203, 129, 0.2); }
        .down-bg { background: var(--down); color: #fff; box-shadow: 0 4px 12px rgba(246, 70, 93, 0.2); }

    </style>
</head>
<body>

    <header class="header">
        <div class="search-box">
            <i class="fas fa-search" style="color:var(--text-sec)"></i>
            <input type="text" id="marketSearch" placeholder="Search pairs..." oninput="renderMarkets()">
        </div>
    </header>

    <div class="market-tabs" id="marketTabs"></div>

    <div class="market-list">
        <div class="market-header">
            <span>Pair / Vol</span>
            <span>Price</span>
            <span style="text-align: right;">Change</span>
        </div>
        <div id="coinListContainer"></div>
    </div>

    <style>
    .footer {font-weight: 900; position: fixed; bottom: 0; width: 100%; height: 80px; background: #181a20; display: flex; justify-content: space-around; align-items: center; border-top: 1px solid var(--border); z-index: 3000; }
    .f-nav { text-decoration: none; color: var(--text-sec); text-align: center; font-size: 10px; flex: 1; display: flex; flex-direction: column; align-items: center; }
    .f-nav i { font-size: 22px; margin-bottom: 5px;background :yellow;padding:15px 15px; border-radius:50px; }
    .f-nav.active { color: var(--primary); }
    .fab-wrapper { position: relative; width: 75px; display: flex; justify-content: center; }       
    .fab-options {  position: absolute; bottom: 30px; display: flex; justify-content: center;   align-items: center; pointer-events: none; width: 250px; height: 180px;  }
    .fab-options i{font-size:20px;background :none;color:yellow;}
    .popup-btn {   position: absolute; background:none; text-decoration: none; font-weight: 800; font-size: 12px;   box-shadow: 0 10px 25px rgba(0,0,0,0.6); transition: all 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);  opacity: 0; transform: scale(0.3) translateY(120px); pointer-events: auto; white-space: nowrap; z-index: 2900;}
    .fab-options.show .btn-left { opacity: 1; transform: translate(-95px, -45px) scale(1); }
    .fab-options.show .btn-center { opacity: 1; transform: translate(0, -115px) scale(1); }
    .fab-options.show .btn-right { opacity: 1; transform: translate(95px, -45px) scale(1); }
    .main-fab {   width: 65px; height: 65px; background: var(--primary);border: none; border-radius: 50%; cursor: pointer;   box-shadow: 0 0 20px rgba(243, 186, 47, 0.4); display: flex; justify-content: center; align-items: center;  z-index: 3100; margin-top: -35px; outline: none;   transition: background 0.3s, box-shadow 0.3s;} @keyframes continuous-spin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
    .main-fab.active {  animation: continuous-spin 2s linear infinite;  background: var(--down); box-shadow: 0 0 35px rgba(246, 70, 93, 0.5);}
    .gaming-icon { font-size: 30px; color: #000; transition: color 0.3s; }
    .main-fab.active .gaming-icon { color: #fff; } @keyframes subtle-pulse { 0% { transform: scale(1); } 50% { transform: scale(1.05); } 100% { transform: scale(1); } }
    .main-fab:not(.active) { animation: subtle-pulse 3s infinite ease-in-out; }

<script>
const firebaseConfig = {
    apiKey: "AIzaSyAMxtJedkehhxJRMPZLjhpKHqneHEWsGlE",
    authDomain: "smat-exchange.firebaseapp.com",
    projectId: "smat-exchange",
    storageBucket: "smat-exchange.firebasestorage.app",
    messagingSenderId: "836334569396",
    appId: "1:836334569396:web:679effe640b3453412d4e1"
};
firebase.initializeApp(firebaseConfig);
const db = firebase.database();

let activeMarket = 'USDT';
let coinData = {}; 




        window.currentActiveTab = 'hot';
        function openSidebar() { document.getElementById('sidebar').classList.add('active'); document.getElementById('overlay').style.display='block'; }
        function closeSidebar() { document.getElementById('sidebar').classList.remove('active'); document.getElementById('overlay').style.display='none'; }
        function openRefPopup() { closeSidebar(); document.getElementById('refPopup').style.display='flex'; }
        function closeRefPopup() { document.getElementById('refPopup').style.display='none'; }
        function copyRef() { const inp = document.getElementById('referralLink'); inp.select(); navigator.clipboard.writeText(inp.value); alert("Referral Link Copied!"); }

        function switchTab(el, cat) {
            window.currentActiveTab = cat;
            document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
            el.classList.add('active');
            renderCoins(cat);
        }

        // Gaming Menu Toggle
        function toggleGamingMenu() {
            const options = document.getElementById('fabOptions');
            const mainBtn = document.getElementById('mainFab');
            options.classList.toggle('show');
            mainBtn.classList.toggle('active');
            if (navigator.vibrate) navigator.vibrate(50);
        }

        // Close Menu when clicking outside
        window.addEventListener('click', (e) => {
            if (!e.target.closest('.fab-wrapper')) {
                document.getElementById('fabOptions').classList.remove('show');
                document.getElementById('mainFab').classList.remove('active');
            }
        });



function init() {
    renderTabs();
    GLOBAL_COINS.forEach(coin => {
        const sym = coin.sym.toLowerCase();
        db.ref('market/' + sym).on('value', (snapshot) => {
            const data = snapshot.val();
            if (data) {
                coinData[sym] = data;
                renderMarkets();
                if(sym === 'smat') renderTabs();
            }
        });
    });
}

function renderTabs() {
    const markets = ['USDT', 'USDC', 'SMAT'];
    const container = document.getElementById('marketTabs');
    container.innerHTML = markets.map(m => `
        <div class="m-tab ${activeMarket === m ? 'active' : ''}" onclick="setMarket('${m}')">
            <img src="assets/logos/${m.toLowerCase()}.png" class="m-tab-icon" onerror="this.src='assets/logos/generic.png'">
            ${m}
        </div>
    `).join('');
}

function setMarket(m) {
    activeMarket = m;
    renderTabs();
    renderMarkets();
}

function renderMarkets() {
    const query = document.getElementById('marketSearch').value.toUpperCase();
    const container = document.getElementById('coinListContainer');
    const smatVal = (coinData['smat'] && coinData['smat'].price) ? coinData['smat'].price : 1;
    
    let filtered = GLOBAL_COINS.filter(c => 
        c.sym.toUpperCase().includes(query) && 
        c.sym.toUpperCase() !== activeMarket
    );

    container.innerHTML = filtered.map(c => {
        const symLower = c.sym.toLowerCase();
        const data = coinData[symLower] || { price: c.price, volume: 0 };
        
        // বর্তমান প্রাইস (ডাটাবেস থেকে)
        const currentPrice = data.price;
        // বেস প্রাইস (coin.js থেকে)
        const basePrice = c.price;

        // % Change Calculation
        const changePercent = basePrice > 0 ? ((currentPrice - basePrice) / basePrice * 100) : 0;
        
        let displayPrice = currentPrice;
        if(activeMarket === 'SMAT') displayPrice = currentPrice / smatVal;
        
        const isUp = changePercent >= 0;
        const changeClass = isUp ? 'up-bg' : 'down-bg';
        const changeSign = isUp ? '+' : '';

        return `
            <div class="coin-row" onclick="location.href='trade.html?coin=${c.sym.toUpperCase()}'">
                <div class="c-info">
                    <div class="c-logo">
                        <img src="assets/logos/${symLower}.png" onerror="this.src='assets/logos/generic.png'">
                    </div>
                    <div class="c-name-box">
                        <div class="c-name">${c.sym.toUpperCase()}<span style="font-family:Inter; font-size:10px; color:var(--text-sec); font-weight:600;">/${activeMarket}</span></div>
                        <div class="c-vol">Vol: ${parseFloat(data.volume || 0).toLocaleString(undefined, {minimumFractionDigits: 2})}</div>
                    </div>
                </div>
                
                <div class="c-price" style="color: ${isUp ? 'var(--up)' : 'var(--down)'}">
                    ${displayPrice.toLocaleString(undefined, {minimumFractionDigits: displayPrice < 1 ? 6 : 2, maximumFractionDigits: displayPrice < 1 ? 6 : 2})}
                </div>

                <div class="c-change ${changeClass}">
                    ${changeSign}${changePercent.toFixed(2)}%
                </div>
            </div>
        `;
    }).join('');
}

window.onload = init;
</script>
