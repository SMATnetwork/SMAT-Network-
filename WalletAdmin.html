<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SMAT | Wallet Management</title>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-database-compat.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@900&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --bg: #0b0e11; --card: #1e2329; --primary: #f0b90b;
            --up: #0ecb81; --down: #f6465d; --border: rgba(255, 255, 255, 0.1);
            --font: 'Montserrat', sans-serif;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; font-family: var(--font); }
        body { background: var(--bg); color: white; overflow-x: hidden; min-height: 100vh; }

        /* --- LOGIN SCREEN GRAPHICS --- */
        #loginScreen {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: var(--bg); display: flex; justify-content: center; align-items: center;
            z-index: 9999; transition: 0.5s;
        }
        .login-card { 
            background: var(--card); border-radius: 30px; padding: 50px 40px; 
            width: 90%; max-width: 420px; border: 1px solid var(--border); text-align: center; 
            box-shadow: 0 15px 40px rgba(0,0,0,0.5);
        }
        .logo-gfx { width: 70px; height: 70px; margin: 0 auto 25px; }
        .logo-top { width: 100%; height: 45px; background: var(--primary); border-radius: 35px 35px 0 0; }
        .logo-bot { display: flex; justify-content: center; gap: 10px; margin-top: 5px; }
        .logo-eye { width: 15px; height: 15px; background: var(--primary); border-radius: 50%; }
        
        .login-title { font-size: 28px; color: white; text-transform: uppercase; margin-bottom: 40px; }
        .login-title span { color: var(--primary); }

        .input-box { 
            width: 100%; background: #111418; border: 1px solid var(--border); 
            padding: 20px; border-radius: 12px; color: white; font-size: 14px; 
            margin-bottom: 20px; transition: 0.3s;
        }
        .input-box:focus { border-color: var(--primary); }

        .login-btn { 
            width: 100%; background: var(--primary); border: none; padding: 20px; 
            border-radius: 12px; color: black; font-weight: 900; cursor: pointer; 
            text-transform: uppercase; transition: 0.3s; box-shadow: 0 5px 15px rgba(240, 185, 11, 0.3); 
        }
        .login-btn:hover { filter: brightness(1.1); transform: translateY(-2px); }

        /* --- DASHBOARD STYLES (NO CHANGES) --- */
        #dashboard { display: none; }
        header { 
            height: 80px; background: var(--card); display: flex; align-items: center; 
            justify-content: space-between; padding: 0 40px; border-bottom: 3px solid var(--primary);
            position: sticky; top: 0; z-index: 1000; box-shadow: 0 4px 20px rgba(0,0,0,0.5);
        }
        .logo-text { font-size: 26px; letter-spacing: 2px; color: var(--primary); text-transform: uppercase; }
        .logout-btn { color: var(--down); font-size: 28px; cursor: pointer; transition: 0.3s; }
        .container { padding: 40px; max-width: 1500px; margin: 0 auto; }
        .tab-box { display: flex; gap: 20px; margin-bottom: 40px; background: rgba(255,255,255,0.03); padding: 12px; border-radius: 20px; border: 1px solid var(--border); }
        .tab { flex: 1; padding: 18px; text-align: center; border-radius: 15px; cursor: pointer; font-size: 14px; color: #848e9c; transition: 0.3s; border: 2px solid transparent; }
        .tab.active { background: var(--card); border-color: var(--primary); color: var(--primary); box-shadow: 0 10px 20px rgba(0,0,0,0.4); }
        .badge { background: var(--down); color: white; padding: 4px 10px; border-radius: 8px; font-size: 11px; margin-left: 8px; }
        .withdraw-card { background: var(--card); border-radius: 25px; padding: 25px; margin-bottom: 25px; border: 1px solid var(--border); display: grid; grid-template-columns: 1.2fr 1fr 1.5fr 1.2fr; align-items: center; gap: 25px; animation: fadeInUp 0.5s ease; }
        @keyframes fadeInUp { from { opacity: 0; transform: translateY(30px); } to { opacity: 1; transform: translateY(0); } }
        .label { font-size: 10px; color: #848e9c; margin-bottom: 8px; text-transform: uppercase; }
        .val { font-size: 15px; font-weight: 900; word-break: break-all; }
        .address-box { display: flex; align-items: center; justify-content: space-between; background: rgba(0,0,0,0.3); padding: 12px; border-radius: 12px; border: 1px solid var(--border); }
        .copy-icon { color: var(--primary); cursor: pointer; font-size: 20px; }
        .hash-input { background: #0b0e11; border: 2px solid var(--border); color: var(--primary); padding: 15px; border-radius: 12px; width: 100%; outline: none; margin-bottom: 12px; }
        .btn-group { display: flex; gap: 12px; }
        .btn { flex: 1; padding: 15px; border: none; border-radius: 12px; font-weight: 900; cursor: pointer; font-size: 12px; text-transform: uppercase; }
        .btn-approve { background: var(--up); color: #000; }
        .btn-reject { background: var(--down); color: #fff; }
        .empty { text-align: center; padding: 100px; color: #848e9c; font-size: 20px; }
    </style>
</head>
<body>

    <div id="loginScreen">
        <div class="login-card">
            <div class="logo-gfx">
                <div class="logo-top"></div>
                <div class="logo-bot"><div class="logo-eye"></div><div class="logo-eye"></div></div>
            </div>
            <div class="login-title">Admin <span>Panel</span></div>
            <input type="email" id="adminEmail" class="input-box" placeholder="Admin Email">
            <input type="password" id="adminPass" class="input-box" placeholder="Password">
            <button class="login-btn" onclick="handleLogin()">Access Dashboard</button>
            <p id="loginError" style="color:var(--down); font-size:12px; margin-top:15px; display:none;">Invalid Credentials!</p>
        </div>
    </div>

    <div id="dashboard">
        <header>
            <div class="logo-text">Wallet Management</div>
            <i class="fas fa-sign-out-alt logout-btn" onclick="adminLogout()" title="Sign Out"></i>
        </header>

        <div class="container">
            <div class="tab-box">
                <div class="tab active" onclick="switchTab('pending')">PENDING <span id="pCount" class="badge">0</span></div>
                <div class="tab" onclick="switchTab('success')">SUCCESS</div>
                <div class="tab" onclick="switchTab('failed')">REJECTED</div>
            </div>
            <div id="withdrawList"></div>
        </div>
    </div>

<script>
// --- FIREBASE CONFIGURATION ---
const firebaseConfig = { 
    apiKey: "AIzaSyAMxtJedkehhxJRMPZLjhpKHqneHEWsGlE", 
    authDomain: "smat-exchange.firebaseapp.com", 
    databaseURL: "https://smat-exchange-default-rtdb.firebaseio.com",
    projectId: "smat-exchange" 
};
firebase.initializeApp(firebaseConfig);
const db = firebase.database();
const auth = firebase.auth();

let currentTab = 'pending';
let lastPendingCount = 0;

// --- LOGIN HANDLER ---
function handleLogin() {
    const email = document.getElementById('adminEmail').value;
    const pass = document.getElementById('adminPass').value;
    const err = document.getElementById('loginError');

    auth.signInWithEmailAndPassword(email, pass)
    .then(() => {
        err.style.display = 'none';
        // Auth state listener will handle showing dashboard
    })
    .catch(() => {
        err.style.display = 'block';
    });
}

// --- AUTH STATE MONITOR ---
function init() {
    auth.onAuthStateChanged(user => {
        if (user) { 
            document.getElementById('loginScreen').style.display = 'none';
            document.getElementById('dashboard').style.display = 'block';
            loadWithdrawals(); 
        } else { 
            document.getElementById('loginScreen').style.display = 'flex';
            document.getElementById('dashboard').style.display = 'none';
        }
    });
}

function switchTab(t) {
    currentTab = t;
    document.querySelectorAll('.tab').forEach(el => el.classList.remove('active'));
    event.currentTarget.classList.add('active');
    loadWithdrawals();
}

function loadWithdrawals() {
    db.ref('users').on('value', snap => {
        const users = snap.val();
        let html = '';
        let pendingCount = 0;
        let allWithdraws = [];

        for (let uid in users) {
            const history = users[uid].history;
            if (history) {
                for (let txId in history) {
                    const tx = history[txId];
                    if (tx.method === 'Withdraw') {
                        if (tx.status === 'pending') pendingCount++;
                        allWithdraws.push({ uid, txId, email: users[uid].email, ...tx });
                    }
                }
            }
        }

        if (pendingCount > lastPendingCount) {
            new Audio('https://assets.mixkit.co/active_storage/sfx/2869/2869-preview.mp3').play().catch(e => {});
            lastPendingCount = pendingCount;
        }
        document.getElementById('pCount').innerText = pendingCount;

        const filtered = allWithdraws.filter(x => x.status === currentTab).sort((a,b) => b.timestamp - a.timestamp);

        if (filtered.length === 0) {
            document.getElementById('withdrawList').innerHTML = `<div class="empty">NO ${currentTab.toUpperCase()} RECORDS FOUND</div>`;
            return;
        }

        filtered.forEach(tx => {
            html += `
            <div class="withdraw-card">
                <div>
                    <div class="label">User / Time</div>
                    <div class="val" style="font-size:12px; color:var(--primary)">${tx.email}</div>
                    <div style="font-size:10px; color:#848e9c; margin-top:5px;">${new Date(tx.timestamp).toLocaleString()}</div>
                </div>
                <div>
                    <div class="label">Asset & Amount</div>
                    <div class="val" style="font-size:18px">${tx.amount} <span style="color:var(--primary)">${tx.coin}</span></div>
                    <div style="font-size:10px; color:var(--up); margin-top:5px;">Network: ${tx.network}</div>
                </div>
                <div>
                    <div class="label">Destination Address</div>
                    <div class="address-box">
                        <div class="val" style="font-family:monospace; font-size:11px;">${tx.address}</div>
                        <i class="fas fa-copy copy-icon" onclick="copyAddr('${tx.address}')"></i>
                    </div>
                </div>
                <div class="action-container">
                    ${tx.status === 'pending' ? `
                        <input type="text" id="hash_${tx.txId}" class="hash-input" placeholder="Paste Transaction Hash">
                        <div class="btn-group">
                            <button class="btn btn-approve" onclick="approveTx('${tx.uid}', '${tx.txId}')">Approve</button>
                            <button class="btn btn-reject" onclick="rejectTx('${tx.uid}', '${tx.txId}', '${tx.coin}', ${tx.amount})">Reject</button>
                        </div>
                    ` : `
                        <div style="text-align:right">
                            <div class="val" style="color:${tx.status === 'success' ? 'var(--up)' : 'var(--down)'}; font-size:20px;">${tx.status.toUpperCase()}</div>
                            <div style="font-size:9px; color:#848e9c; margin-top:5px; font-family:monospace;">${tx.hash || ''}</div>
                        </div>
                    `}
                </div>
            </div>`;
        });
        document.getElementById('withdrawList').innerHTML = html;
    });
}

function copyAddr(text) {
    navigator.clipboard.writeText(text).then(() => {
        const icon = event.target;
        icon.className = 'fas fa-check-circle copy-icon';
        icon.style.color = 'var(--up)';
        setTimeout(() => { icon.className = 'fas fa-copy copy-icon'; icon.style.color = 'var(--primary)'; }, 2000);
    });
}

async function approveTx(uid, txId) {
    const hash = document.getElementById('hash_' + txId).value;
    if (!hash || hash.length < 10) return alert("Valid TrxHash required!");
    if(confirm("Approve this transaction?")) {
        await db.ref(`users/${uid}/history/${txId}`).update({ status: 'success', hash: hash });
        alert("Approved!");
    }
}

async function rejectTx(uid, txId, coin, amount) {
    if(confirm("Reject & Refund?")) {
        const coinKey = (coin.toLowerCase() === 'usdt') ? 'balance' : coin.toLowerCase() + '_balance';
        const snap = await db.ref(`users/${uid}/${coinKey}`).once('value');
        await db.ref(`users/${uid}`).update({ [coinKey]: (snap.val() || 0) + amount });
        await db.ref(`users/${uid}/history/${txId}`).update({ status: 'failed', hash: 'REJECTED' });
        alert("Rejected.");
    }
}

function adminLogout() {
    auth.signOut();
}

window.onload = init;
</script>
</body>
</html>
