<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SMAT | Admin Wallet Management</title>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-database-compat.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@900&family=Inter:wght@400;600&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --bg: #0b0e11; --card: #1e2329; --primary: #f0b90b;
            --up: #0ecb81; --down: #f6465d; --border: rgba(255, 255, 255, 0.08);
            --font-main: 'Montserrat', sans-serif;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: var(--font-main); }
        body { background: var(--bg); color: white; overflow-x: hidden; }

        /* Header Styles */
        header { 
            height: 80px; background: var(--card); display: flex; align-items: center; 
            justify-content: space-between; padding: 0 30px; border-bottom: 2px solid var(--primary);
            position: sticky; top: 0; z-index: 1000;
        }
        .header-title { font-size: 24px; letter-spacing: 1px; color: var(--primary); }
        .logout-btn { color: var(--down); font-size: 24px; cursor: pointer; transition: 0.3s; }
        .logout-btn:hover { transform: scale(1.1); }

        /* Stats & Tabs */
        .container { padding: 30px; max-width: 1400px; margin: 0 auto; }
        .tab-box { 
            display: flex; gap: 15px; margin-bottom: 30px; background: rgba(255,255,255,0.03); 
            padding: 10px; border-radius: 15px; border: 1px solid var(--border);
        }
        .tab { 
            flex: 1; padding: 15px; text-align: center; border-radius: 12px; cursor: pointer;
            font-size: 14px; color: var(--text-sec); border: 1px solid transparent; transition: 0.3s;
        }
        .tab.active { background: var(--card); border-color: var(--primary); color: var(--primary); box-shadow: 0 5px 15px rgba(0,0,0,0.3); }

        /* Table & Cards */
        .withdraw-card { 
            background: var(--card); border-radius: 20px; padding: 20px; margin-bottom: 20px;
            border: 1px solid var(--border); display: grid; grid-template-columns: 1fr 1fr 1.5fr 1fr; 
            align-items: center; gap: 20px; animation: slideIn 0.4s ease-out;
        }
        @keyframes slideIn { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }

        .label { font-size: 10px; color: #848e9c; margin-bottom: 5px; text-transform: uppercase; }
        .val { font-size: 16px; font-weight: 900; }

        /* Buttons & Hash Box */
        .action-group { display: flex; gap: 10px; }
        .btn { 
            padding: 12px 20px; border: none; border-radius: 10px; font-weight: 900; 
            cursor: pointer; font-size: 12px; transition: 0.3s; text-transform: uppercase;
        }
        .btn-approve { background: var(--up); color: #000; }
        .btn-reject { background: var(--down); color: #fff; }
        .btn:hover { filter: brightness(1.2); transform: translateY(-2px); }

        .hash-input { 
            background: #0b0e11; border: 1px solid var(--border); color: var(--primary);
            padding: 12px; border-radius: 10px; width: 100%; outline: none;
            font-family: monospace; font-size: 12px; margin-bottom: 10px;
        }

        /* Notification Badge */
        .badge { background: var(--down); color: white; padding: 2px 8px; border-radius: 50px; font-size: 10px; margin-left: 5px; }
    </style>
</head>
<body>

    <header>
        <div class="header-title">WALLET MANAGEMENT</div>
        <i class="fas fa-sign-out-alt logout-btn" onclick="adminLogout()"></i>
    </header>

    <div class="container">
        <div class="tab-box">
            <div class="tab active" onclick="switchTab('pending')">PENDING <span id="pCount" class="badge">0</span></div>
            <div class="tab" onclick="switchTab('success')">SUCCESS</div>
            <div class="tab" onclick="switchTab('failed')">REJECTED</div>
        </div>

        <div id="withdrawList">
            </div>
    </div>

<script>
// --- FIREBASE CONFIG ---
const firebaseConfig = { 
    apiKey: "AIzaSyAMxtJedkehhxJRMPZLjhpKHqneHEWsGlE", 
    authDomain: "smat-exchange.firebaseapp.com", 
    databaseURL: "https://smat-exchange-default-rtdb.firebaseio.com",
    projectId: "smat-exchange" 
};
firebase.initializeApp(firebaseConfig);
const db = firebase.database();
const auth = firebase.auth();

let currentTab = 'pending';
let lastPendingCount = 0;

function init() {
    auth.onAuthStateChanged(user => {
        if (!user) { location.href = "logIn.html"; }
        else { loadWithdrawals(); }
    });
}

function switchTab(t) {
    currentTab = t;
    document.querySelectorAll('.tab').forEach(el => el.classList.remove('active'));
    event.currentTarget.classList.add('active');
    loadWithdrawals();
}

function loadWithdrawals() {
    db.ref('users').on('value', snap => {
        const users = snap.val();
        let html = '';
        let pendingCount = 0;
        let allWithdraws = [];

        for (let uid in users) {
            const history = users[uid].history;
            if (history) {
                for (let txId in history) {
                    const tx = history[txId];
                    if (tx.method === 'Withdraw') {
                        if (tx.status === 'pending') pendingCount++;
                        allWithdraws.push({ uid, txId, email: users[uid].email, ...tx });
                    }
                }
            }
        }

        // Notification Sound for new pending
        if (pendingCount > lastPendingCount) {
            new Audio('https://assets.mixkit.co/active_storage/sfx/2869/2869-preview.mp3').play();
            lastPendingCount = pendingCount;
        }
        document.getElementById('pCount').innerText = pendingCount;

        // Filter and Sort (Latest First)
        const filtered = allWithdraws.filter(x => x.status === currentTab).sort((a,b) => b.timestamp - a.timestamp);

        filtered.forEach(tx => {
            html += `
            <div class="withdraw-card">
                <div>
                    <div class="label">User / Time</div>
                    <div class="val" style="font-size:12px">${tx.email}</div>
                    <div style="font-size:10px; color:#848e9c">${new Date(tx.timestamp).toLocaleString()}</div>
                </div>
                <div>
                    <div class="label">Asset & Amount</div>
                    <div class="val" style="color:var(--primary)">${tx.amount} ${tx.coin}</div>
                    <div style="font-size:10px">${tx.network}</div>
                </div>
                <div>
                    <div class="label">Destination Address</div>
                    <div class="val" style="font-family:monospace; font-size:11px; color:#fff; background:rgba(255,255,255,0.05); padding:8px; border-radius:8px">${tx.address}</div>
                </div>
                <div class="action-group">
                    ${tx.status === 'pending' ? `
                        <div style="width:100%">
                            <input type="text" id="hash_${tx.txId}" class="hash-input" placeholder="Paste TrxHash here...">
                            <div style="display:flex; gap:10px">
                                <button class="btn btn-approve" onclick="approveTx('${tx.uid}', '${tx.txId}')">Approve</button>
                                <button class="btn btn-reject" onclick="rejectTx('${tx.uid}', '${tx.txId}', '${tx.coin}', ${tx.amount})">Reject</button>
                            </div>
                        </div>
                    ` : `
                        <div class="val" style="color:${tx.status === 'success' ? 'var(--up)' : 'var(--down)'}">
                            ${tx.status.toUpperCase()}<br>
                            <small style="font-size:9px; color:#848e9c">${tx.hash || ''}</small>
                        </div>
                    `}
                </div>
            </div>`;
        });

        document.getElementById('withdrawList').innerHTML = html || `<div style="text-align:center; padding:50px; color:#848e9c">NO ${currentTab.toUpperCase()} REQUESTS</div>`;
    });
}

async function approveTx(uid, txId) {
    const hash = document.getElementById('hash_' + txId).value;
    if (!hash) return alert("Please enter Transaction Hash first!");
    
    if(confirm("Complete this withdrawal?")) {
        await db.ref(`users/${uid}/history/${txId}`).update({ status: 'success', hash: hash });
        alert("Success!");
    }
}

async function rejectTx(uid, txId, coin, amount) {
    if(confirm("Reject and Refund user?")) {
        const coinKey = (coin.toLowerCase() === 'usdt') ? 'balance' : coin.toLowerCase() + '_balance';
        const uRef = db.ref(`users/${uid}`);
        const s = await uRef.child(coinKey).once('value');
        await uRef.update({ [coinKey]: (s.val() || 0) + amount });
        await uRef.child(`history/${txId}`).update({ status: 'failed', hash: 'REJECTED' });
        alert("Rejected & Refunded.");
    }
}

function adminLogout() {
    auth.signOut().then(() => location.href = "logIn.html");
}

window.onload = init;
</script>
</body>
</html>
