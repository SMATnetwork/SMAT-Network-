<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SMAT | Admin Wallet Terminal</title>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-database-compat.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@900&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --bg: #0b0e11; --card: #1e2329; --primary: #f0b90b;
            --up: #0ecb81; --down: #f6465d; --border: rgba(255, 255, 255, 0.1);
            --font: 'Montserrat', sans-serif;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; font-family: var(--font); }
        body { background: var(--bg); color: white; overflow-x: hidden; }

        /* Header */
        header { 
            height: 80px; background: var(--card); display: flex; align-items: center; 
            justify-content: space-between; padding: 0 40px; border-bottom: 3px solid var(--primary);
            position: sticky; top: 0; z-index: 1000; box-shadow: 0 4px 20px rgba(0,0,0,0.5);
        }
        .logo-text { font-size: 26px; letter-spacing: 2px; color: var(--primary); text-transform: uppercase; }
        .logout-btn { color: var(--down); font-size: 28px; cursor: pointer; transition: 0.3s; }
        .logout-btn:hover { transform: scale(1.15) rotate(10deg); }

        /* Tabs */
        .container { padding: 40px; max-width: 1500px; margin: 0 auto; }
        .tab-box { 
            display: flex; gap: 20px; margin-bottom: 40px; background: rgba(255,255,255,0.03); 
            padding: 12px; border-radius: 20px; border: 1px solid var(--border);
        }
        .tab { 
            flex: 1; padding: 18px; text-align: center; border-radius: 15px; cursor: pointer;
            font-size: 14px; color: #848e9c; transition: 0.3s; letter-spacing: 1px;
            border: 2px solid transparent; position: relative;
        }
        .tab.active { background: var(--card); border-color: var(--primary); color: var(--primary); box-shadow: 0 10px 20px rgba(0,0,0,0.4); }

        /* Notification Badge */
        .badge { background: var(--down); color: white; padding: 4px 10px; border-radius: 8px; font-size: 11px; margin-left: 8px; vertical-align: middle; }

        /* Withdraw Card */
        .withdraw-card { 
            background: var(--card); border-radius: 25px; padding: 25px; margin-bottom: 25px;
            border: 1px solid var(--border); display: grid; grid-template-columns: 1.2fr 1fr 1.5fr 1.2fr; 
            align-items: center; gap: 25px; animation: fadeInUp 0.5s ease;
        }
        @keyframes fadeInUp { from { opacity: 0; transform: translateY(30px); } to { opacity: 1; transform: translateY(0); } }

        .label { font-size: 10px; color: #848e9c; margin-bottom: 8px; text-transform: uppercase; letter-spacing: 1px; }
        .val { font-size: 15px; font-weight: 900; word-break: break-all; }

        /* Address Box with Copy */
        .address-box {
            display: flex; align-items: center; justify-content: space-between;
            background: rgba(0,0,0,0.3); padding: 12px; border-radius: 12px; border: 1px solid var(--border);
        }
        .copy-icon { color: var(--primary); cursor: pointer; font-size: 20px; transition: 0.2s; }
        .copy-icon:active { transform: scale(0.8); }

        /* Action Controls */
        .action-container { width: 100%; }
        .hash-input { 
            background: #0b0e11; border: 2px solid var(--border); color: var(--primary);
            padding: 15px; border-radius: 12px; width: 100%; outline: none;
            font-family: monospace; font-size: 13px; margin-bottom: 12px; transition: 0.3s;
        }
        .hash-input:focus { border-color: var(--primary); }
        .btn-group { display: flex; gap: 12px; }
        .btn { 
            flex: 1; padding: 15px; border: none; border-radius: 12px; font-weight: 900; 
            cursor: pointer; font-size: 12px; transition: 0.3s; text-transform: uppercase; letter-spacing: 1px;
        }
        .btn-approve { background: var(--up); color: #000; }
        .btn-reject { background: var(--down); color: #fff; }
        .btn:hover { filter: brightness(1.2); transform: translateY(-3px); box-shadow: 0 5px 15px rgba(0,0,0,0.3); }

        /* Empty State */
        .empty { text-align: center; padding: 100px; color: #848e9c; font-size: 20px; letter-spacing: 2px; }
    </style>
</head>
<body>

    <header>
        <div class="logo-text">SMAT | Wallet Management</div>
        <i class="fas fa-sign-out-alt logout-btn" onclick="adminLogout()" title="Sign Out"></i>
    </header>

    <div class="container">
        <div class="tab-box">
            <div class="tab active" onclick="switchTab('pending')">PENDING <span id="pCount" class="badge">0</span></div>
            <div class="tab" onclick="switchTab('success')">SUCCESS</div>
            <div class="tab" onclick="switchTab('failed')">REJECTED</div>
        </div>

        <div id="withdrawList">
            </div>
    </div>

<script>
// --- FIREBASE CONFIGURATION ---
const firebaseConfig = { 
    apiKey: "AIzaSyAMxtJedkehhxJRMPZLjhpKHqneHEWsGlE", 
    authDomain: "smat-exchange.firebaseapp.com", 
    databaseURL: "https://smat-exchange-default-rtdb.firebaseio.com",
    projectId: "smat-exchange" 
};
firebase.initializeApp(firebaseConfig);
const db = firebase.database();
const auth = firebase.auth();

let currentTab = 'pending';
let lastPendingCount = 0;

function init() {
    auth.onAuthStateChanged(user => {
        if (!user) { 
            location.href = "logIn.html"; 
        } else { 
            loadWithdrawals(); 
        }
    });
}

function switchTab(t) {
    currentTab = t;
    document.querySelectorAll('.tab').forEach(el => el.classList.remove('active'));
    event.currentTarget.classList.add('active');
    loadWithdrawals();
}

function loadWithdrawals() {
    db.ref('users').on('value', snap => {
        const users = snap.val();
        let html = '';
        let pendingCount = 0;
        let allWithdraws = [];

        for (let uid in users) {
            const history = users[uid].history;
            if (history) {
                for (let txId in history) {
                    const tx = history[txId];
                    if (tx.method === 'Withdraw') {
                        if (tx.status === 'pending') pendingCount++;
                        allWithdraws.push({ uid, txId, email: users[uid].email, ...tx });
                    }
                }
            }
        }

        // Notification sound for new requests
        if (pendingCount > lastPendingCount) {
            new Audio('https://assets.mixkit.co/active_storage/sfx/2869/2869-preview.mp3').play().catch(e => console.log("Sound error"));
            lastPendingCount = pendingCount;
        }
        document.getElementById('pCount').innerText = pendingCount;

        // Filter & Sort (Latest First)
        const filtered = allWithdraws.filter(x => x.status === currentTab).sort((a,b) => b.timestamp - a.timestamp);

        if (filtered.length === 0) {
            document.getElementById('withdrawList').innerHTML = `<div class="empty">NO ${currentTab.toUpperCase()} RECORDS FOUND</div>`;
            return;
        }

        filtered.forEach(tx => {
            html += `
            <div class="withdraw-card">
                <div>
                    <div class="label">User / Time</div>
                    <div class="val" style="font-size:12px; color:var(--primary)">${tx.email}</div>
                    <div style="font-size:10px; color:#848e9c; margin-top:5px;">${new Date(tx.timestamp).toLocaleString()}</div>
                </div>

                <div>
                    <div class="label">Asset & Amount</div>
                    <div class="val" style="font-size:18px">${tx.amount} <span style="color:var(--primary)">${tx.coin}</span></div>
                    <div style="font-size:10px; color:var(--up); margin-top:5px;">Network: ${tx.network}</div>
                </div>

                <div>
                    <div class="label">Destination Address (Copy it)</div>
                    <div class="address-box">
                        <div class="val" style="font-family:monospace; font-size:11px;">${tx.address}</div>
                        <i class="fas fa-copy copy-icon" onclick="copyAddr('${tx.address}')"></i>
                    </div>
                </div>

                <div class="action-container">
                    ${tx.status === 'pending' ? `
                        <input type="text" id="hash_${tx.txId}" class="hash-input" placeholder="Paste Transaction Hash (TrxHash)">
                        <div class="btn-group">
                            <button class="btn btn-approve" onclick="approveTx('${tx.uid}', '${tx.txId}')">Approve</button>
                            <button class="btn btn-reject" onclick="rejectTx('${tx.uid}', '${tx.txId}', '${tx.coin}', ${tx.amount})">Reject</button>
                        </div>
                    ` : `
                        <div style="text-align:right">
                            <div class="val" style="color:${tx.status === 'success' ? 'var(--up)' : 'var(--down)'}; font-size:20px;">
                                ${tx.status.toUpperCase()}
                            </div>
                            <div style="font-size:9px; color:#848e9c; margin-top:5px; font-family:monospace;">${tx.hash || ''}</div>
                        </div>
                    `}
                </div>
            </div>`;
        });
        document.getElementById('withdrawList').innerHTML = html;
    });
}

// Copy Function
function copyAddr(text) {
    navigator.clipboard.writeText(text).then(() => {
        const icon = event.target;
        icon.classList.remove('fa-copy');
        icon.classList.add('fa-check-circle');
        icon.style.color = 'var(--up)';
        setTimeout(() => {
            icon.classList.remove('fa-check-circle');
            icon.classList.add('fa-copy');
            icon.style.color = 'var(--primary)';
        }, 2000);
    });
}

// Approval Function
async function approveTx(uid, txId) {
    const hash = document.getElementById('hash_' + txId).value;
    if (!hash || hash.length < 10) return alert("Valid Transaction Hash is required!");
    
    if(confirm("Are you sure you want to APPROVE this transaction?")) {
        try {
            await db.ref(`users/${uid}/history/${txId}`).update({ 
                status: 'success', 
                hash: hash 
            });
            alert("Withdrawal Approved Successfully!");
        } catch (e) { alert("Error: " + e.message); }
    }
}

// Rejection & Refund Function
async function rejectTx(uid, txId, coin, amount) {
    if(confirm("REJECT this withdrawal? The amount will be refunded to the user's wallet.")) {
        try {
            const coinKey = (coin.toLowerCase() === 'usdt') ? 'balance' : coin.toLowerCase() + '_balance';
            const userRef = db.ref(`users/${uid}`);
            const currentSnap = await userRef.child(coinKey).once('value');
            const currentBalance = currentSnap.val() || 0;

            await userRef.update({ [coinKey]: currentBalance + amount });
            await userRef.child(`history/${txId}`).update({ 
                status: 'failed', 
                hash: 'REJECTED_BY_ADMIN' 
            });
            alert("Transaction Rejected & Funds Refunded.");
        } catch (e) { alert("Error: " + e.message); }
    }
}

function adminLogout() {
    auth.signOut().then(() => location.href = "logIn.html");
}

window.onload = init;
</script>
</body>
</html>
