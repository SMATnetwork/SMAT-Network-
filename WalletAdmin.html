<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SMAT | Wallet Management</title>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-auth-compat.js"></script>

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@900&display=swap" rel="stylesheet">
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml;base64,PHN2ZyB3aWR0aD0iNTEyIiBoZWlnaHQ9IjUxMiIgdmlld0JveD0iMCAwIDUxMiA1MTIiIGZpbGw9Im5vbmUiIHhtbG5zPSJodHRwOi8vd3d3LnczLm9yZy8yMDAwL3N2ZyI+CiAgPGNpcmNsZSBjeD0iMjU2IiBjeT0iMjU2IiByPSIyNDAiIGZpbGw9IiNmM2JhMmYiLz4KICA8Y2lyY2xlIGN4PSIyNTYiIGN5PSIyNTYiIHI9IjIxNSIgc3Ryb2tlPSJ3aGl0ZSIgc3Ryb2tlLXdpZHRoPSI4IiBmaWxsPSJ0cmFuc3BhcmVudCIvPgogIDxwYXRoIGQ9Ik0xNTAgMTcwIEMxNTAgMTQ1IDE3MCAxMzUgMjAwIDEzNSBMMzQwIDEzNSBDMzU1IDEzNSAzNjUgMTQ1IDM2NSAxNjAgQzM2NSAxNzUgMzU1IDE4NSAzNDAgMTg1IEwyMDUgMTg1IEMxOTAgMTg1IDE4NSAxOTAgMTg1IDIwNSBDMTg1IDIyMCAxOTAgMjI1IDIwNSAyMjUgTDM0MCAyMjUgQzM3MCAyMjUgMzkwIDI0NSAzOTAgMjc1IEwzOTAgMzI1IEMzOTAgMzU1IDM3MCAzNzUgMzQwIDM3NSBMMTcwIDM3NSBDMTU1IDM3NSAxNDUgMzY1IDE0NSAzNTAgQzE0NSAzMzUgMTU1IDMyNSAxNzAgMzI1IEwzMzUgMzI1IEMzNTAgMzI1IDM1NSAzMjAgMzU1IDMwNSBDMzU1IDI5MCAzNTAgMjg1IDMzNSAyODUgTDIwMCAyODUgQzE3MCAyODUgMTUwIDI2NSAxNTAgMjM1IFoiIGZpbGw9IndoaXRlIi8+Cjwvc3ZnPg==">
    <style>
        :root {
            --bg: #0b0e11; --card: #1e2329; --primary: #f0b90b;
            --up: #0ecb81; --down: #f6465d; --border: rgba(255, 255, 255, 0.1);
            --font: 'Montserrat', sans-serif;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; font-family: var(--font); }
        body { background: var(--bg); color: white; overflow-x: hidden; min-height: 100vh; }

        /* --- LOGIN SCREEN --- */
        #loginScreen { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: var(--bg); display: flex; justify-content: center; align-items: center; z-index: 9999; }
        .login-card { background: var(--card); border-radius: 30px; padding: 50px 40px; width: 90%; max-width: 420px; border: 1px solid var(--border); text-align: center; box-shadow: 0 15px 40px rgba(0,0,0,0.5); }
        .logo-gfx { width: 70px; height: 70px; margin: 0 auto 25px; }
        .logo-top { width: 100%; height: 45px; background: var(--primary); border-radius: 35px 35px 0 0; }
        .logo-bot { display: flex; justify-content: center; gap: 10px; margin-top: 5px; }
        .logo-eye { width: 15px; height: 15px; background: var(--primary); border-radius: 50%; }
        .login-title { font-size: 28px; color: white; text-transform: uppercase; margin-bottom: 40px; }
        .login-title span { color: var(--primary); }
        .input-box { width: 100%; background: #111418; border: 1px solid var(--border); padding: 20px; border-radius: 12px; color: white; font-size: 14px; margin-bottom: 20px; }
        .login-btn { width: 100%; background: var(--primary); border: none; padding: 20px; border-radius: 12px; color: black; font-weight: 900; cursor: pointer; text-transform: uppercase; }

        /* --- DASHBOARD --- */
        #dashboard { display: none; }
        header { height: 80px; background: var(--card); display: flex; align-items: center; justify-content: space-between; padding: 0 40px; border-bottom: 3px solid var(--primary); position: sticky; top: 0; z-index: 1000; }
        .logo-text { font-size: 26px; color: var(--primary); text-transform: uppercase; }
        .container { padding: 40px; max-width: 1500px; margin: 0 auto; }
        .tab-box { display: flex; gap: 20px; margin-bottom: 40px; background: rgba(255,255,255,0.03); padding: 12px; border-radius: 20px; border: 1px solid var(--border); }
        .tab { flex: 1; padding: 18px; text-align: center; border-radius: 15px; cursor: pointer; font-size: 14px; color: #848e9c; border: 2px solid transparent; }
        .tab.active { background: var(--card); border-color: var(--primary); color: var(--primary); }
        .badge { background: var(--down); color: white; padding: 4px 10px; border-radius: 8px; font-size: 11px; margin-left: 8px; }

        /* Withdraw Card */
        .withdraw-card { background: var(--card); border-radius: 25px; padding: 25px; margin-bottom: 25px; border: 1px solid var(--border); display: grid; grid-template-columns: 1.2fr 1fr 1.5fr 1.2fr; align-items: center; gap: 25px; position: relative; }
        .label { font-size: 10px; color: #848e9c; margin-bottom: 8px; text-transform: uppercase; }
        .val { font-size: 15px; font-weight: 900; }
        .address-box { display: flex; align-items: center; justify-content: space-between; background: rgba(0,0,0,0.3); padding: 12px; border-radius: 12px; }
        .inspect-btn { position: absolute; top: 20px; right: 20px; color: var(--primary); cursor: pointer; font-size: 18px; transition: 0.3s; }
        .inspect-btn:hover { transform: scale(1.2); color: white; }

        /* --- MODAL / POPUP --- */
        #userModal { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); display: none; justify-content: center; align-items: center; z-index: 10000; }
        .modal-content { background: var(--card); width: 90%; max-width: 800px; max-height: 80vh; border-radius: 25px; border: 2px solid var(--primary); padding: 30px; overflow-y: auto; position: relative; }
        .close-modal { position: absolute; top: 20px; right: 20px; color: var(--down); cursor: pointer; font-size: 24px; }
        .stat-grid { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 15px; margin-top: 20px; }
        .stat-item { background: rgba(255,255,255,0.03); padding: 15px; border-radius: 15px; border: 1px solid var(--border); text-align: center; }
        .stat-val { font-size: 18px; color: var(--primary); margin-top: 5px; }

        /* Action UI */
        .hash-input { background: #0b0e11; border: 2px solid var(--border); color: var(--primary); padding: 15px; border-radius: 12px; width: 100%; margin-bottom: 12px; }
        .btn-group { display: flex; gap: 12px; }
        .btn { flex: 1; padding: 15px; border: none; border-radius: 12px; font-weight: 900; cursor: pointer; text-transform: uppercase; }
        .btn-approve { background: var(--up); }
        .btn-reject { background: var(--down); color: #fff; }
    </style>
</head>
<body>

    <div id="loginScreen">
        <div class="login-card">
            <div class="logo-gfx">
                <div class="logo-top"></div>
                <div class="logo-bot"><div class="logo-eye"></div><div class="logo-eye"></div></div>
            </div>
            <div class="login-title">Admin <span>Panel</span></div>
            <input type="email" id="adminEmail" class="input-box" placeholder="Admin Email">
            <input type="password" id="adminPass" class="input-box" placeholder="Password">
            <button class="login-btn" onclick="handleLogin()">Access Dashboard</button>
            <p id="loginError" style="color:var(--down); font-size:12px; margin-top:15px; display:none;">Access Denied!</p>
        </div>
    </div>

    <div id="dashboard">
        <header>
            <div class="logo-text">Wallet Management</div>
            <i class="fas fa-sign-out-alt" style="color:var(--down); font-size:24px; cursor:pointer;" onclick="adminLogout()"></i>
        </header>
        <div class="container">
            <div class="tab-box">
                <div class="tab active" onclick="switchTab('pending')">PENDING <span id="pCount" class="badge">0</span></div>
                <div class="tab" onclick="switchTab('success')">SUCCESS</div>
                <div class="tab" onclick="switchTab('failed')">REJECTED</div>
            </div>
            <div id="withdrawList"></div>
        </div>
    </div>

    <div id="userModal">
        <div class="modal-content">
            <i class="fas fa-times-circle close-modal" onclick="closeModal()"></i>
            <h2 id="modalUserEmail" style="color:var(--primary); margin-bottom:10px;">User History</h2>
            <p style="font-size:10px; color:#848e9c;">LAST 365 DAYS ANALYSIS</p>
            
            <div class="stat-grid">
                <div class="stat-item"><div class="label">Total Deposit</div><div class="stat-val" id="statDeposit">0.00</div></div>
                <div class="stat-item"><div class="label">Game Profits</div><div class="stat-val" id="statGame" style="color:var(--up)">+0.00</div></div>
                <div class="stat-item"><div class="label">Trade Volume</div><div class="stat-val" id="statTrade">0.00</div></div>
            </div>

            <div style="margin-top:30px;">
                <div class="label">Recent Activity Logs</div>
                <div id="activityLogs" style="font-size:11px; color:#eaecee; background:rgba(0,0,0,0.2); padding:15px; border-radius:15px; max-height:200px; overflow-y:auto;">
                    Loading activity...
                </div>
            </div>
        </div>
    </div>

<script>
// --- FIREBASE ---
const firebaseConfig = { apiKey: "AIzaSyAMxtJedkehhxJRMPZLjhpKHqneHEWsGlE", authDomain: "smat-exchange.firebaseapp.com", databaseURL: "https://smat-exchange-default-rtdb.firebaseio.com", projectId: "smat-exchange" };
firebase.initializeApp(firebaseConfig);
const db = firebase.database();
const auth = firebase.auth();

let currentTab = 'pending';
let lastPendingCount = 0;

function handleLogin() {
    const email = document.getElementById('adminEmail').value;
    const pass = document.getElementById('adminPass').value;
    auth.signInWithEmailAndPassword(email, pass).catch(() => document.getElementById('loginError').style.display='block');
}

function init() {
    auth.onAuthStateChanged(user => {
        if (user) { document.getElementById('loginScreen').style.display='none'; document.getElementById('dashboard').style.display='block'; loadWithdrawals(); }
        else { document.getElementById('loginScreen').style.display='flex'; document.getElementById('dashboard').style.display='none'; }
    });
}

function switchTab(t) {
    currentTab = t;
    document.querySelectorAll('.tab').forEach(el => el.classList.remove('active'));
    event.currentTarget.classList.add('active');
    loadWithdrawals();
}

function loadWithdrawals() {
    db.ref('users').on('value', snap => {
        const users = snap.val();
        let html = '';
        let pendingCount = 0;
        let allWithdraws = [];

        for (let uid in users) {
            const history = users[uid].history;
            if (history) {
                for (let txId in history) {
                    const tx = history[txId];
                    if (tx.method === 'Withdraw') {
                        if (tx.status === 'pending') pendingCount++;
                        allWithdraws.push({ uid, txId, email: users[uid].email, ...tx });
                    }
                }
            }
        }

        if (pendingCount > lastPendingCount) { new Audio('https://assets.mixkit.co/active_storage/sfx/2869/2869-preview.mp3').play().catch(()=>{}); lastPendingCount = pendingCount; }
        document.getElementById('pCount').innerText = pendingCount;

        const filtered = allWithdraws.filter(x => x.status === currentTab).sort((a,b) => b.timestamp - a.timestamp);

        filtered.forEach(tx => {
            html += `
            <div class="withdraw-card">
                <i class="fas fa-user-shield inspect-btn" onclick="openUserInsights('${tx.uid}', '${tx.email}')" title="Inspect User Account"></i>
                <div>
                    <div class="label">User / Time</div>
                    <div class="val" style="font-size:12px; color:var(--primary)">${tx.email}</div>
                    <div style="font-size:10px; color:#848e9c; margin-top:5px;">${new Date(tx.timestamp).toLocaleString()}</div>
                </div>
                <div>
                    <div class="label">Asset & Amount</div>
                    <div class="val" style="font-size:18px">${tx.amount} <span>${tx.coin}</span></div>
                    <div style="font-size:10px; color:var(--up); margin-top:5px;">${tx.network}</div>
                </div>
                <div>
                    <div class="label">Address</div>
                    <div class="address-box">
                        <div class="val" style="font-family:monospace; font-size:11px;">${tx.address}</div>
                        <i class="fas fa-copy" onclick="copyText('${tx.address}')" style="color:var(--primary); cursor:pointer;"></i>
                    </div>
                </div>
                <div class="action-container">
                    ${tx.status === 'pending' ? `
                        <input type="text" id="hash_${tx.txId}" class="hash-input" placeholder="TrxHash">
                        <div class="btn-group">
                            <button class="btn btn-approve" onclick="approveTx('${tx.uid}', '${tx.txId}')">Approve</button>
                            <button class="btn btn-reject" onclick="rejectTx('${tx.uid}', '${tx.txId}', '${tx.coin}', ${tx.amount})">Reject</button>
                        </div>
                    ` : `<div style="text-align:right"><div class="val" style="color:${tx.status==='success'?'var(--up)':'var(--down)'}">${tx.status.toUpperCase()}</div><small style="font-size:9px; color:#848e9c;">${tx.hash||''}</small></div>`}
                </div>
            </div>`;
        });
        document.getElementById('withdrawList').innerHTML = html || '<div class="empty">NO RECORDS</div>';
    });
}

// --- USER INSIGHTS LOGIC ---
async function openUserInsights(uid, email) {
    document.getElementById('userModal').style.display = 'flex';
    document.getElementById('modalUserEmail').innerText = email;
    
    const oneYearAgo = Date.now() - (365 * 24 * 60 * 60 * 1000);
    let totalDep = 0, totalGame = 0, totalTrade = 0, logsHtml = '';

    const snap = await db.ref(`users/${uid}/history`).once('value');
    const history = snap.val();

    if(history) {
        Object.values(history).forEach(item => {
            if(item.timestamp > oneYearAgo) {
                if(item.method.toLowerCase().includes('deposit') && item.status === 'success') totalDep += parseFloat(item.amount);
                if(item.method.toLowerCase().includes('game')) totalGame += parseFloat(item.amount);
                if(item.method.toLowerCase().includes('trade')) totalTrade += parseFloat(item.amount);
                
                logsHtml += `<div style="margin-bottom:8px; border-bottom:1px solid rgba(255,255,255,0.05); padding-bottom:5px;">
                    <span style="color:var(--primary)">[${new Date(item.timestamp).toLocaleDateString()}]</span> 
                    ${item.method.toUpperCase()} - ${item.amount} ${item.coin} (${item.status})
                </div>`;
            }
        });
    }

    document.getElementById('statDeposit').innerText = totalDep.toFixed(2);
    document.getElementById('statGame').innerText = (totalGame >= 0 ? '+' : '') + totalGame.toFixed(2);
    document.getElementById('statTrade').innerText = totalTrade.toFixed(2);
    document.getElementById('activityLogs').innerHTML = logsHtml || "No recent activity found.";
}

function closeModal() { document.getElementById('userModal').style.display = 'none'; }
function copyText(t) { navigator.clipboard.writeText(t); alert("Address Copied!"); }

async function approveTx(uid, txId) {
    const hash = document.getElementById('hash_'+txId).value;
    if(!hash) return alert("Hash Required!");
    await db.ref(`users/${uid}/history/${txId}`).update({ status:'success', hash:hash });
    alert("Approved!");
}

async function rejectTx(uid, txId, coin, amount) {
    if(confirm("Reject?")) {
        const key = coin.toLowerCase()==='usdt'?'balance':coin.toLowerCase()+'_balance';
        const s = await db.ref(`users/${uid}/${key}`).once('value');
        await db.ref(`users/${uid}`).update({ [key]: (s.val()||0)+amount });
        await db.ref(`users/${uid}/history/${txId}`).update({ status:'failed', hash:'REJECTED' });
    }
}

function adminLogout() { auth.signOut(); }
window.onload = init;
</script>
</body>
</html>
