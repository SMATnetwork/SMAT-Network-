<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SMAT | Admin Terminal</title>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-database-compat.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@900&display=swap" rel="stylesheet">
    
<link rel="icon" type="image/svg+xml" href="data:image/svg+xml;base64,PHN2ZyB3aWR0aD0iNTEyIiBoZWlnaHQ9IjUxMiIgdmlld0JveD0iMCAwIDUxMiA1MTIiIGZpbGw9Im5vbmUiIHhtbG5zPSJodHRwOi8vd3d3LnczLm9yZy8yMDAwL3N2ZyI+CiAgPGNpcmNsZSBjeD0iMjU2IiBjeT0iMjU2IiByPSIyNDAiIGZpbGw9IiNmM2JhMmYiLz4KICA8Y2lyY2xlIGN4PSIyNTYiIGN5PSIyNTYiIHI9IjIxNSIgc3Ryb2tlPSJ3aGl0ZSIgc3Ryb2tlLXdpZHRoPSI4IiBmaWxsPSJ0cmFuc3BhcmVudCIvPgogIDxwYXRoIGQ9Ik0xNTAgMTcwIEMxNTAgMTQ1IDE3MCAxMzUgMjAwIDEzNSBMMzQwIDEzNSBDMzU1IDEzNSAzNjUgMTQ1IDM2NSAxNjAgQzM2NSAxNzUgMzU1IDE4NSAzNDAgMTg1IEwyMDUgMTg1IEMxOTAgMTg1IDE4NSAxOTAgMTg1IDIwNSBDMTg1IDIyMCAxOTAgMjI1IDIwNSAyMjUgTDM0MCAyMjUgQzM3MCAyMjUgMzkwIDI0NSAzOTAgMjc1IEwzOTAgMzI1IEMzOTAgMzU1IDM3MCAzNzUgMzQwIDM3NSBMMTcwIDM3NSBDMTU1IDM3NSAxNDUgMzY1IDE0NSAzNTAgQzE0NSAzMzUgMTU1IDMyNSAxNzAgMzI1IEwzMzUgMzI1IEMzNTAgMzI1IDM1NSAzMjAgMzU1IDMwNSBDMzU1IDI5MCAzNTAgMjg1IDMzNSAyODUgTDIwMCAyODUgQzE3MCAyODUgMTUwIDI2NSAxNTAgMjM1IFoiIGZpbGw9IndoaXRlIi8+Cjwvc3ZnPg==">
    <style>
        :root {
            --bg: #0b0e11; --card: #1e2329; --primary: #f0b90b;
            --up: #0ecb81; --down: #f6465d; --border: rgba(255, 255, 255, 0.1);
            --font: 'Montserrat', sans-serif;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; font-family: var(--font); outline: none; }
        body { background: var(--bg); color: white; overflow-x: hidden; min-height: 100vh; }

        /* --- 1. LOGIN SCREEN (AS PER SCREENSHOT) --- */
        #loginScreen {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: var(--bg); display: flex; justify-content: center; align-items: center;
            z-index: 9999;
        }
        .login-card { 
            background: var(--card); border-radius: 30px; padding: 50px 40px; 
            width: 90%; max-width: 420px; border: 1px solid var(--border); text-align: center; 
            box-shadow: 0 15px 40px rgba(0,0,0,0.5);
        }
        .logo-gfx { width: 70px; height: 70px; margin: 0 auto 25px; }
        .logo-top { width: 100%; height: 45px; background: var(--primary); border-radius: 35px 35px 0 0; }
        .logo-bot { display: flex; justify-content: center; gap: 10px; margin-top: 5px; }
        .logo-eye { width: 15px; height: 15px; background: var(--primary); border-radius: 50%; }
        .login-title { font-size: 28px; text-transform: uppercase; margin-bottom: 40px; color: white; }
        .login-title span { color: var(--primary); }
        .login-input { 
            width: 100%; background: #111418; border: 1px solid var(--border); 
            padding: 20px; border-radius: 12px; color: white; margin-bottom: 20px;
        }
        .login-btn { 
            width: 100%; background: var(--primary); border: none; padding: 20px; 
            border-radius: 12px; color: black; font-weight: 900; cursor: pointer; 
            text-transform: uppercase; box-shadow: 0 5px 15px rgba(240, 185, 11, 0.3); 
        }

        /* --- 2. DASHBOARD MAIN UI --- */
        #dashboard { display: none; }
        header { 
            height: 80px; background: var(--card); display: flex; align-items: center; 
            justify-content: space-between; padding: 0 40px; border-bottom: 3px solid var(--primary);
            position: sticky; top: 0; z-index: 1000;
        }
        .logo-text { font-size: 24px; color: var(--primary); text-transform: uppercase; letter-spacing: 2px; }
        .container { padding: 40px; max-width: 1500px; margin: 0 auto; }
        
        .tab-box { display: flex; gap: 15px; margin-bottom: 30px; background: rgba(255,255,255,0.03); padding: 10px; border-radius: 20px; }
        .tab { flex: 1; padding: 15px; text-align: center; border-radius: 12px; cursor: pointer; color: #848e9c; transition: 0.3s; font-size: 13px; }
        .tab.active { background: var(--card); border: 2px solid var(--primary); color: var(--primary); }
        .badge { background: var(--down); color: white; padding: 3px 8px; border-radius: 6px; font-size: 10px; margin-left: 5px; }

        /* Withdraw Card */
        .withdraw-card { 
            background: var(--card); border-radius: 25px; padding: 25px; margin-bottom: 20px;
            border: 1px solid var(--border); display: grid; grid-template-columns: 1fr 1fr 1.5fr 1fr; 
            align-items: center; gap: 20px; position: relative;
        }
        .inspect-trigger { position: absolute; top: 15px; right: 15px; color: var(--primary); cursor: pointer; font-size: 20px; }
        .label { font-size: 10px; color: #848e9c; margin-bottom: 5px; text-transform: uppercase; }
        .val { font-size: 14px; font-weight: 900; }
        .address-box { display: flex; align-items: center; justify-content: space-between; background: rgba(0,0,0,0.3); padding: 10px; border-radius: 10px; border: 1px solid var(--border); }
        
        .hash-input { background: #0b0e11; border: 2px solid var(--border); color: var(--primary); padding: 12px; border-radius: 10px; width: 100%; margin-bottom: 10px; font-size: 12px; }
        .btn-group { display: flex; gap: 10px; }
        .btn { flex: 1; padding: 12px; border: none; border-radius: 10px; font-weight: 900; cursor: pointer; font-size: 11px; text-transform: uppercase; }
        .btn-approve { background: var(--up); color: black; }
        .btn-reject { background: var(--down); color: white; }

        /* --- 3. INVESTIGATION MODAL --- */
        #userModal { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.95); display: none; justify-content: center; align-items: center; z-index: 10001; }
        .modal-content { background: var(--card); width: 95%; max-width: 850px; border-radius: 30px; border: 2px solid var(--primary); padding: 30px; position: relative; animation: zoomIn 0.3s ease; }
        @keyframes zoomIn { from { transform: scale(0.9); opacity: 0; } to { transform: scale(1); opacity: 1; } }
        
        .modal-header { border-left: 5px solid var(--primary); padding-left: 15px; margin-bottom: 20px; }
        .stat-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 15px; margin-bottom: 25px; }
        .stat-item { background: rgba(255,255,255,0.03); padding: 15px; border-radius: 15px; text-align: center; border: 1px solid var(--border); }
        
        .invest-tab-row { display: flex; gap: 8px; overflow-x: auto; padding-bottom: 15px; border-bottom: 1px solid var(--border); }
        .i-tab { background: #111418; border: 1px solid var(--border); color: #848e9c; padding: 8px 15px; border-radius: 8px; font-size: 10px; cursor: pointer; white-space: nowrap; font-weight: 900; }
        .i-tab.active { background: var(--primary); color: black; border-color: var(--primary); }
        
        #sectorSummary { background: rgba(240, 185, 11, 0.1); padding: 12px; border-radius: 10px; color: var(--primary); font-size: 12px; font-weight: 900; text-align: center; margin: 15px 0; border: 1px dashed var(--primary); }
        #investLogs { max-height: 300px; overflow-y: auto; background: rgba(0,0,0,0.2); border-radius: 15px; padding: 10px; }
        .log-item { display: flex; justify-content: space-between; padding: 12px; border-bottom: 1px solid rgba(255,255,255,0.05); font-size: 11px; }
    </style>
</head>
<body>

    <div id="loginScreen">
        <div class="login-card">
            <div class="logo-gfx">
                <div class="logo-top"></div>
                <div class="logo-bot"><div class="logo-eye"></div><div class="logo-eye"></div></div>
            </div>
            <div class="login-title">ADMIN <span>PANEL</span></div>
            <input type="email" id="admEmail" class="login-input" placeholder="Admin Email">
            <input type="password" id="admPass" class="login-input" placeholder="Password">
            <button class="login-btn" onclick="tryLogin()">Access Dashboard</button>
            <p id="admErr" style="color:var(--down); font-size:12px; margin-top:15px; display:none;">Invalid Admin Credentials!</p>
        </div>
    </div>

    <div id="dashboard">
        <header>
            <div class="logo-text">SMAT WALLET</div>
            <i class="fas fa-power-off" style="color:var(--down); font-size:24px; cursor:pointer;" onclick="adminLogout()"></i>
        </header>

        <div class="container">
            <div class="tab-box">
                <div class="tab active" onclick="switchMainTab('pending')">PENDING <span id="pCount" class="badge">0</span></div>
                <div class="tab" onclick="switchMainTab('success')">SUCCESS</div>
                <div class="tab" onclick="switchMainTab('failed')">REJECTED</div>
            </div>
            <div id="withdrawList"></div>
        </div>
    </div>

    <div id="userModal">
        <div class="modal-content">
            <i class="fas fa-times-circle" style="position:absolute; top:20px; right:20px; color:var(--down); cursor:pointer; font-size:24px;" onclick="closeModal()"></i>
            
            <div class="modal-header">
                <h3 id="mUserEmail" style="font-size:16px;">USER ANALYSIS</h3>
                <div id="mReserve" style="color:var(--up); font-size:12px; margin-top:5px;">RESERVE: 0.00 USDT</div>
            </div>

            <div class="stat-grid">
                <div class="stat-item"><div class="label">Total In (1Y)</div><div class="stat-val" id="mIn">0.00</div></div>
                <div class="stat-item"><div class="label">Total Out (1Y)</div><div class="stat-val" id="mOut" style="color:var(--down)">0.00</div></div>
                <div class="stat-item"><div class="label">Net Profit (1Y)</div><div class="stat-val" id="mProfit">0.00</div></div>
            </div>

            <div class="invest-tab-row">
                <button class="i-tab active" onclick="filterInv('all')">ALL</button>
                <button class="i-tab" onclick="filterInv('Deposit')">DEPOSIT</button>
                <button class="i-tab" onclick="filterInv('Spot')">SPOT</button>
                <button class="i-tab" onclick="filterInv('Crash')">CRASH</button>
                <button class="i-tab" onclick="filterInv('Prediction')">PRED</button>
                <button class="i-tab" onclick="filterInv('Future')">FUTURE</button>
                <button class="i-tab" onclick="filterInv('Airdrop')">AIRDROP</button>
                <button class="i-tab" onclick="filterInv('Withdraw')">WITHDRAW</button>
            </div>

            <div id="sectorSummary">Select a sector to see summary</div>
            <div id="investLogs"></div>
        </div>
    </div>

<script>
// --- FIREBASE SETUP ---
const firebaseConfig = { 
    apiKey: "AIzaSyAMxtJedkehhxJRMPZLjhpKHqneHEWsGlE", 
    authDomain: "smat-exchange.firebaseapp.com", 
    databaseURL: "https://smat-exchange-default-rtdb.firebaseio.com",
    projectId: "smat-exchange" 
};
firebase.initializeApp(firebaseConfig);
const db = firebase.database();
const auth = firebase.auth();

let activeMainTab = 'pending';
let lastCount = 0;
let userFullHistory = [];

// --- AUTH LOGIC ---
function tryLogin() {
    const e = document.getElementById('admEmail').value;
    const p = document.getElementById('admPass').value;
    auth.signInWithEmailAndPassword(e, p).catch(() => document.getElementById('admErr').style.display='block');
}

auth.onAuthStateChanged(user => {
    if (user) {
        document.getElementById('loginScreen').style.display = 'none';
        document.getElementById('dashboard').style.display = 'block';
        loadMainData();
    } else {
        document.getElementById('loginScreen').style.display = 'flex';
        document.getElementById('dashboard').style.display = 'none';
    }
});

function adminLogout() { auth.signOut(); }

// --- DASHBOARD LOGIC ---
function switchMainTab(t) {
    activeMainTab = t;
    document.querySelectorAll('.tab').forEach(el => el.classList.remove('active'));
    event.currentTarget.classList.add('active');
    loadMainData();
}

function loadMainData() {
    db.ref('users').on('value', snap => {
        const users = snap.val();
        let html = ''; let pCount = 0; let list = [];
        
        for (let uid in users) {
            const hist = users[uid].history;
            if (hist) {
                Object.keys(hist).forEach(tid => {
                    const tx = hist[tid];
                    if (tx.method === 'Withdraw') {
                        if (tx.status === 'pending') pCount++;
                        list.push({ uid, tid, email: users[uid].email, ...tx });
                    }
                });
            }
        }

        if (pCount > lastCount) { new Audio('https://assets.mixkit.co/active_storage/sfx/2869/2869-preview.mp3').play().catch(()=>{}); lastCount = pCount; }
        document.getElementById('pCount').innerText = pCount;

        const filtered = list.filter(x => x.status === activeMainTab).sort((a,b) => b.timestamp - a.timestamp);

        filtered.forEach(tx => {
            html += `
            <div class="withdraw-card">
                <i class="fas fa-user-shield inspect-trigger" onclick="openInspector('${tx.uid}', '${tx.email}')"></i>
                <div><div class="label">User</div><div class="val" style="color:var(--primary); font-size:11px;">${tx.email}</div><small style="font-size:9px; color:#848e9c;">${new Date(tx.timestamp).toLocaleString()}</small></div>
                <div><div class="label">Amount</div><div class="val">${tx.amount} ${tx.coin}</div><small style="color:var(--up); font-size:9px;">${tx.network}</small></div>
                <div><div class="label">Address</div><div class="address-box"><span class="val" style="font-size:10px; font-family:monospace;">${tx.address}</span><i class="fas fa-copy" style="color:var(--primary); cursor:pointer;" onclick="copyAddr('${tx.address}')"></i></div></div>
                <div>
                    ${tx.status === 'pending' ? `
                        <input type="text" id="h_${tx.tid}" class="hash-input" placeholder="TrxHash">
                        <div class="btn-group"><button class="btn btn-approve" onclick="approve('${tx.uid}','${tx.tid}')">Approve</button><button class="btn btn-reject" onclick="reject('${tx.uid}','${tx.tid}','${tx.coin}',${tx.amount})">Reject</button></div>
                    ` : `<div style="text-align:right"><div class="val" style="color:${tx.status==='success'?'var(--up)':'var(--down)'}">${tx.status.toUpperCase()}</div><div style="font-size:8px; color:#848e9c; font-family:monospace; margin-top:5px;">${tx.hash||''}</div></div>`}
                </div>
            </div>`;
        });
        document.getElementById('withdrawList').innerHTML = html || '<div style="text-align:center; padding:50px; color:#848e9c;">NO RECORDS</div>';
    });
}

// --- INSPECTOR LOGIC ---
async function openInspector(uid, email) {
    document.getElementById('userModal').style.display = 'flex';
    document.getElementById('mUserEmail').innerText = email;
    document.getElementById('investLogs').innerHTML = "Loading Data...";
    
    const oneYear = Date.now() - (365 * 24 * 60 * 60 * 1000);
    const uSnap = await db.ref(`users/${uid}`).once('value');
    const uData = uSnap.val();
    
    // 1. Reserve Balance
    let resHtml = "RESERVE: ";
    if(uData) {
        resHtml += `<span style="color:var(--primary)">${(uData.balance||0).toFixed(2)} USDT</span> | <span style="color:var(--primary)">${(uData.smat_balance||0).toFixed(2)} SMAT</span>`;
    }
    document.getElementById('mReserve').innerHTML = resHtml;

    // 2. Process History
    userFullHistory = [];
    let tin = 0; let tout = 0; let tprof = 0;
    const hData = uData.history;
    
    if(hData) {
        userFullHistory = Object.values(hData).filter(i => i.timestamp > oneYear).sort((a,b) => b.timestamp - a.timestamp);
        userFullHistory.forEach(i => {
            const a = parseFloat(i.amount) || 0;
            const m = i.method.toLowerCase();
            if(m.includes('deposit') || m.includes('airdrop')) tin += a;
            else if(m.includes('withdraw')) tout += Math.abs(a);
            else tprof += a;
        });
    }

    document.getElementById('mIn').innerText = tin.toFixed(2);
    document.getElementById('mOut').innerText = tout.toFixed(2);
    document.getElementById('mProfit').innerText = (tprof >= 0 ? '+' : '') + tprof.toFixed(2);
    document.getElementById('mProfit').style.color = tprof >= 0 ? 'var(--up)' : 'var(--down)';

    filterInv('all');
}

function filterInv(type) {
    document.querySelectorAll('.i-tab').forEach(b => b.classList.toggle('active', b.innerText.toLowerCase() === type.toLowerCase() || (type==='all' && b.innerText==='ALL')));
    
    let html = ''; let sTotal = 0;
    const filtered = (type === 'all') ? userFullHistory : userFullHistory.filter(i => i.method.toLowerCase().includes(type.toLowerCase()));
    
    filtered.forEach(i => {
        const a = parseFloat(i.amount) || 0;
        sTotal += a;
        html += `<div class="log-item">
            <div><div style="color:var(--primary); font-weight:900;">${i.method.toUpperCase()}</div><div style="font-size:8px; color:#848e9c;">${new Date(i.timestamp).toLocaleString()}</div></div>
            <div style="text-align:right"><div style="color:${a>=0?'var(--up)':'var(--down)'}; font-weight:900;">${a>=0?'+':''}${a} ${i.coin}</div><div style="font-size:8px; color:#848e9c;">${i.status}</div></div>
        </div>`;
    });

    document.getElementById('sectorSummary').innerHTML = type === 'all' ? "OVERALL 1 YEAR ACTIVITY" : `TOTAL ${type.toUpperCase()}: <span style="color:${sTotal>=0?'var(--up)':'var(--down)'}">${sTotal.toFixed(4)}</span>`;
    document.getElementById('investLogs').innerHTML = html || '<div style="text-align:center; padding:20px; color:#848e9c;">NO DATA</div>';
}

function closeModal() { document.getElementById('userModal').style.display = 'none'; }
function copyAddr(t) { navigator.clipboard.writeText(t); alert("Copied!"); }

// --- APPROVE / REJECT ---
async function approve(uid, tid) {
    const h = document.getElementById('h_'+tid).value;
    if(!h || h.length < 5) return alert("Enter TrxHash!");
    await db.ref(`users/${uid}/history/${tid}`).update({ status:'success', hash:h });
    alert("Approved!");
}

async function reject(uid, tid, coin, amt) {
    if(confirm("Reject and Refund?")) {
        const key = coin.toLowerCase()==='usdt'?'balance':coin.toLowerCase()+'_balance';
        const s = await db.ref(`users/${uid}/${key}`).once('value');
        await db.ref(`users/${uid}`).update({ [key]: (s.val()||0) + amt });
        await db.ref(`users/${uid}/history/${tid}`).update({ status:'failed', hash:'REJECTED' });
        alert("Rejected!");
    }
}
</script>
</body>
</html>
