<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SMAT | Pro Live Airdrop</title>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-database-compat.js"></script>
    <script src="coin.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700;900&display=swap');

        :root {
            --bg: #050709; --card: #12151a; --primary: #00ff88; --secondary: #f0b90b;
            --border: #23282e; --text-muted: #848e9c; --input-bg: #0b0e11;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Montserrat', sans-serif; }
        body { background: var(--bg); color: white; min-height: 100vh; overflow-x: hidden; }

        /* --- Auth Overlay --- */
        #authOverlay { position: fixed; inset: 0; background: var(--bg); z-index: 9999; display: flex; align-items: center; justify-content: center; padding: 20px; }
        .login-card { background: var(--card); border: 1px solid var(--border); padding: 40px; border-radius: 30px; width: 100%; max-width: 400px; text-align: center; box-shadow: 0 0 50px rgba(0,0,0,0.5); }

        /* --- Header --- */
        header { 
            height: 75px; background: rgba(18, 21, 26, 0.9); backdrop-filter: blur(15px);
            display: flex; align-items: center; justify-content: space-between;
            padding: 0 25px; border-bottom: 1px solid var(--border); position: sticky; top: 0; z-index: 100;
        }
        .live-indicator { display: flex; align-items: center; gap: 10px; font-weight: 900; font-size: 14px; text-transform: uppercase; color: #fff; }
        .dot { width: 12px; height: 12px; background: var(--primary); border-radius: 50%; box-shadow: 0 0 12px var(--primary); animation: pulse 1.5s infinite; }
        @keyframes pulse { 0% { transform: scale(0.95); opacity: 0.7; } 50% { transform: scale(1.2); opacity: 1; } 100% { transform: scale(0.95); opacity: 0.7; } }
        
        .signout-btn { background: rgba(255, 77, 77, 0.1); border: 1px solid rgba(255, 77, 77, 0.3); color: #ff4d4d; padding: 10px 18px; border-radius: 12px; cursor: pointer; font-weight: 900; font-size: 12px; transition: 0.3s; }
        .signout-btn:hover { background: #ff4d4d; color: white; }

        .container { max-width: 550px; margin: 30px auto; padding: 0 15px; padding-bottom: 50px; }

        /* --- Search & Grid --- */
        .search-container { background: var(--card); border-radius: 25px; padding: 20px; border: 1px solid var(--border); margin-bottom: 25px; }
        .search-bar { background: var(--input-bg); border: 1.5px solid var(--border); border-radius: 18px; padding: 16px; display: flex; align-items: center; gap: 12px; margin-bottom: 20px; }
        .search-bar input { background: none; border: none; color: white; width: 100%; outline: none; font-weight: 900; font-size: 14px; }
        
        .coin-grid { display: grid; grid-template-columns: repeat(5, 1fr); gap: 12px; }
        .coin-item { background: var(--input-bg); border: 1px solid var(--border); padding: 15px 5px; border-radius: 20px; text-align: center; cursor: pointer; transition: 0.3s; }
        .coin-item img { width: 30px; height: 30px; margin-bottom: 8px; border-radius: 50%; }
        .coin-item span { display: block; font-size: 10px; font-weight: 900; color: var(--text-muted); text-transform: uppercase; }
        .coin-item:hover { border-color: var(--secondary); transform: translateY(-5px); background: rgba(240, 185, 11, 0.05); }

        .selected-badge { display: none; background: rgba(0, 255, 136, 0.05); border: 2px solid var(--primary); padding: 25px; border-radius: 25px; text-align: center; position: relative; animation: fadeIn 0.4s ease; }
        @keyframes fadeIn { from { opacity: 0; transform: scale(0.9); } to { opacity: 1; transform: scale(1); } }
        .close-sel { position: absolute; right: 20px; top: 20px; cursor: pointer; color: var(--text-muted); font-size: 20px; }

        /* --- Inputs --- */
        .input-card { background: var(--card); border-radius: 30px; padding: 30px; border: 1px solid var(--border); margin-bottom: 25px; }
        .modern-input { margin-bottom: 20px; }
        .modern-input label { font-size: 11px; font-weight: 900; color: var(--text-muted); text-transform: uppercase; margin-bottom: 10px; display: block; letter-spacing: 1px; }
        .modern-input input { width: 100%; background: var(--input-bg); border: 2px solid var(--border); padding: 20px; border-radius: 18px; color: white; font-weight: 900; font-size: 16px; transition: 0.3s; }
        .modern-input input:focus { border-color: var(--primary); outline: none; background: #000; }

        /* --- Queue Card --- */
        .queue-card { background: var(--input-bg); border: 2px dashed var(--border); border-radius: 25px; padding: 20px; margin: 25px 0; display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }
        .q-box { text-align: center; }
        .q-box span { font-size: 10px; font-weight: 900; color: var(--text-muted); display: block; margin-bottom: 8px; }
        .q-box b { font-size: 26px; color: var(--secondary); font-weight: 900; }

        .btn-action { width: 100%; padding: 22px; border-radius: 20px; border: none; font-weight: 900; font-size: 16px; cursor: pointer; transition: 0.3s; display: flex; align-items: center; justify-content: center; gap: 12px; }
        .btn-add { background: #1a1e23; color: white; border: 1px solid var(--border); margin-bottom: 15px; }
        .btn-add:hover { border-color: var(--secondary); color: var(--secondary); }
        .btn-send { background: linear-gradient(135deg, var(--primary), #00d170); color: #000; box-shadow: 0 10px 30px rgba(0, 255, 136, 0.2); }

        /* --- History --- */
        .history-title { text-align: center; margin: 50px 0 30px; font-weight: 900; color: var(--secondary); font-size: 24px; text-transform: uppercase; }
        .h-header { display: grid; grid-template-columns: 70px 1.5fr 1fr 1.2fr; padding: 0 25px 15px; font-size: 11px; font-weight: 900; color: var(--text-muted); }
        .h-row { background: var(--card); border-radius: 22px; border: 1px solid var(--border); padding: 18px 25px; display: grid; grid-template-columns: 70px 1.5fr 1fr 1.2fr; align-items: center; margin-bottom: 12px; cursor: pointer; transition: 0.3s; }
        .h-row:hover { border-color: var(--primary); transform: translateX(10px); }
        .h-row img { width: 35px; height: 35px; border-radius: 50%; }

        /* --- Modal --- */
        #modal { position: fixed; inset: 0; background: rgba(0,0,0,0.95); backdrop-filter: blur(20px); z-index: 1000; display: none; align-items: center; justify-content: center; padding: 20px; }
        .modal-box { background: var(--card); border: 1px solid var(--primary); border-radius: 35px; width: 100%; max-width: 450px; max-height: 80vh; overflow: hidden; display: flex; flex-direction: column; }
        .modal-head { padding: 30px; text-align: center; border-bottom: 1px solid var(--border); background: rgba(0,255,136,0.03); }
        .modal-body { flex: 1; overflow-y: auto; padding: 25px; }

        .spinner { width: 22px; height: 22px; border: 3px solid #000; border-top-color: transparent; border-radius: 50%; animation: spin 0.8s linear infinite; display: none; }
        @keyframes spin { to { transform: rotate(360deg); } }

        footer { text-align: center; padding: 50px 0; color: var(--text-muted); font-size: 12px; font-weight: 900; opacity: 0.6; }
    </style>
</head>
<body>

<div id="authOverlay">
    <div class="login-card">
        <h1 style="color: var(--primary); font-weight: 900; margin-bottom: 5px;">SMAT HUB</h1>
        <p style="color: var(--text-muted); font-size: 11px; font-weight: 900; margin-bottom: 30px; text-transform: uppercase;">Founder Access Only</p>
        <div class="modern-input">
            <input type="email" id="email" placeholder="Admin Email" style="font-size: 14px; padding: 15px;">
        </div>
        <div class="modern-input">
            <input type="password" id="pass" placeholder="Password" style="font-size: 14px; padding: 15px;">
        </div>
        <button class="btn-action btn-send" onclick="login()">AUTHENTICATE</button>
    </div>
</div>

<header>
    <div class="live-indicator"><div class="dot"></div>Live Airdrop</div>
    <button class="signout-btn" onclick="logout()"><i class="fas fa-power-off"></i> SIGNOUT</button>
</header>

<div class="container">
    <div class="search-container">
        <div class="search-bar">
            <i class="fas fa-search" style="color: var(--text-muted);"></i>
            <input type="text" id="coinSearch" placeholder="Search Wallet Assets..." oninput="drawCoins()">
        </div>
        <div id="selectorUI" class="coin-grid"></div>
        <div id="selectedUI" class="selected-badge">
            <i class="fas fa-times-circle close-sel" onclick="resetSelector()"></i>
            <img id="selIcon" src="" style="width: 50px; height: 50px; margin-bottom: 10px;">
            <h2 id="selName" style="color: var(--primary); font-weight: 900;">-</h2>
            <span id="selSym" style="font-size: 12px; font-weight: 900; color: var(--text-muted);"></span>
        </div>
    </div>

    <div class="input-card">
        <div class="modern-input">
            <label>Recipient SMAT ID</label>
            <input type="text" id="sid" placeholder="SMAT1000XX">
        </div>
        <div class="modern-input">
            <label>Amount to Send</label>
            <input type="number" id="amt" placeholder="0.00">
        </div>
        <button class="btn-action btn-add" onclick="addToQueue()">ADD TO QUEUE</button>

        <div class="queue-card">
            <div class="q-box"><span>USERS</span><b id="qCount">0</b></div>
            <div class="q-box"><span>TOTAL AMT</span><b id="qTotal">0</b></div>
        </div>

        <button id="sendBtn" class="btn-action btn-send" onclick="processAirdrop()" style="display: none;">
            <div class="spinner" id="btnSpin"></div>
            <span id="btnText">EXECUTE LIVE AIRDROP</span>
        </button>
    </div>

    <h1 class="history-title">SMAT LIVE AIRDROP</h1>
    <div class="h-header">
        <span>Logo</span><span>Asset Name</span><span>Users</span><span>Amount</span>
    </div>
    <div id="historyList"></div>
</div>

<footer>
    All Reserve to right SMAT Exchange | 2026
</footer>

<div id="modal" onclick="if(event.target==this) closeModal()">
    <div class="modal-box">
        <div class="modal-head">
            <img id="mIcon" src="" style="width: 60px; border-radius: 50%; margin-bottom: 15px; border: 2px solid var(--primary); padding: 5px;">
            <h2 id="mCoinName" style="color: var(--primary); font-weight: 900;">-</h2>
            <p style="font-size: 11px; font-weight: 900; color: var(--text-muted); margin-top: 8px;">DISTRIBUTION REPORT</p>
        </div>
        <div id="mBody" class="modal-body"></div>
    </div>
</div>

<script>
// Firebase Config
const firebaseConfig = {
    apiKey: "AIzaSyAMxtJedkehhxJRMPZLjhpKHqneHEWsGlE",
    authDomain: "smat-exchange.firebaseapp.com",
    databaseURL: "https://smat-exchange-default-rtdb.firebaseio.com",
    projectId: "smat-exchange",
    appId: "1:836334569396:web:679effe640b3453412d4e1"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.database();
const auth = firebase.auth();

// Auth Logic
function login() {
    const e = document.getElementById('email').value;
    const p = document.getElementById('pass').value;
    auth.signInWithEmailAndPassword(e, p).catch(err => alert(err.message));
}
function logout() { auth.signOut(); }

auth.onAuthStateChanged(user => {
    document.getElementById('authOverlay').style.display = user ? 'none' : 'flex';
});

// Coin Logic
let activeCoin = null;
let queue = [];
let totalAmt = 0;

function drawCoins() {
    const q = document.getElementById('coinSearch').value.toLowerCase();
    const grid = document.getElementById('selectorUI');
    const filtered = GLOBAL_COINS.filter(c => c.sym.toLowerCase().includes(q));
    const display = q === "" ? filtered.slice(0, 5) : filtered;

    grid.innerHTML = display.map(c => `
        <div class="coin-item" onclick="selectCoin('${c.sym}', '${c.name}', '${c.logo}')">
            <img src="${c.logo}" onerror="this.src='https://cdn-icons-png.flaticon.com/512/25/25231.png'">
            <span>${c.sym}</span>
        </div>
    `).join('');
}
drawCoins();

function selectCoin(sym, name, logo) {
    activeCoin = { sym: sym.toLowerCase(), name, logo };
    document.getElementById('selectorUI').style.display = 'none';
    document.getElementById('selectedUI').style.display = 'block';
    document.getElementById('selName').innerText = name;
    document.getElementById('selSym').innerText = sym.toUpperCase();
    document.getElementById('selIcon').src = logo;
}

function resetSelector() {
    activeCoin = null;
    document.getElementById('selectorUI').style.display = 'grid';
    document.getElementById('selectedUI').style.display = 'none';
    document.getElementById('coinSearch').value = "";
    drawCoins();
}

// Queue Logic
function addToQueue() {
    const id = document.getElementById('sid').value.trim();
    const val = parseFloat(document.getElementById('amt').value);
    if(!activeCoin || !id || isNaN(val)) return;

    queue.push({ id, val });
    totalAmt += val;
    document.getElementById('qCount').innerText = queue.length;
    document.getElementById('qTotal').innerText = totalAmt.toLocaleString();
    document.getElementById('sendBtn').style.display = 'flex';
    document.getElementById('sid').value = ""; document.getElementById('amt').value = "";
}

// Execution
async function processAirdrop() {
    const btn = document.getElementById('sendBtn');
    btn.disabled = true;
    document.getElementById('btnSpin').style.display = 'block';
    document.getElementById('btnText').innerText = "EXECUTING...";

    const coin = activeCoin.sym;
    const balanceField = coin + "_balance";
    const snap = await db.ref('users').once('value');
    const users = snap.val();
    const logs = [];

    for(let item of queue) {
        let uKey = null;
        for(let k in users) { if(users[k].smatID === item.id) { uKey = k; break; } }
        if(uKey) {
            const cur = parseFloat(users[uKey][balanceField]) || 0;
            await db.ref(`users/${uKey}/${balanceField}`).set(cur + item.val);
            logs.push(item);
        }
    }

    await db.ref('stealth_airdrop_logs').push({
        coin: coin.toUpperCase(),
        logo: activeCoin.logo,
        totalUsers: logs.length,
        totalAmt: totalAmt,
        details: logs,
        time: Date.now()
    });

    queue = []; totalAmt = 0;
    document.getElementById('qCount').innerText = "0";
    document.getElementById('qTotal').innerText = "0";
    btn.style.display = 'none'; btn.disabled = false;
    document.getElementById('btnSpin').style.display = 'none';
    resetSelector();
    alert("Airdrop Successful!");
}

// History
db.ref('stealth_airdrop_logs').limitToLast(10).on('value', s => {
    const data = s.val(); if(!data) return;
    document.getElementById('historyList').innerHTML = Object.keys(data).reverse().map(k => {
        const h = data[k];
        return `
            <div class="h-row" onclick="viewDetails('${k}')">
                <img src="${h.logo}">
                <b style="font-weight:900">${h.coin}</b>
                <b style="color:var(--primary); font-weight:900">${h.totalUsers}</b>
                <b style="text-align:right; color:var(--secondary); font-weight:900">${h.totalAmt.toLocaleString()}</b>
            </div>
        `;
    }).join('');
});

function viewDetails(k) {
    db.ref(`stealth_airdrop_logs/${k}`).once('value', s => {
        const h = s.val();
        document.getElementById('mIcon').src = h.logo;
        document.getElementById('mCoinName').innerText = h.coin;
        document.getElementById('mBody').innerHTML = h.details.map(d => `
            <div style="display:flex; justify-content:space-between; padding:18px 0; border-bottom:1px solid var(--border);">
                <span style="font-weight:900; color:var(--text-muted); font-size:12px;">${d.id}</span>
                <b style="color:var(--primary); font-weight:900;">+${d.val}</b>
            </div>
        `).join('');
        document.getElementById('modal').style.display = 'flex';
    });
}
function closeModal() { document.getElementById('modal').style.display = 'none'; }
</script>
</body>
</html>
