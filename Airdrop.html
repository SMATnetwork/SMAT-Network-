<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SMAT | Pro Admin Panel</title>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-database-compat.js"></script>
    <script src="coin.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@900&family=Inter:wght@400;700&display=swap" rel="stylesheet">

    <style>
        :root {
            --bg: #0b0e11; --card: #1e2329; --primary: #f0b90b;
            --up: #0ecb81; --down: #f6465d; --border: rgba(255, 255, 255, 0.1);
        }
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Inter', sans-serif; outline: none; }
        body { background: var(--bg); color: white; min-height: 100vh; padding-bottom: 50px; }

        /* Login logic remains same as wallet */
        #loginScreen { position: fixed; inset: 0; background: var(--bg); display: flex; justify-content: center; align-items: center; z-index: 9999; }
        .login-card { background: var(--card); border-radius: 30px; padding: 40px; width: 90%; max-width: 400px; border: 1px solid var(--border); text-align: center; }

        header { height: 70px; background: var(--card); display: flex; align-items: center; justify-content: space-between; padding: 0 30px; border-bottom: 2px solid var(--primary); sticky: top; }
        .container { padding: 20px; max-width: 1000px; margin: 0 auto; }

        /* Searchable Select Container */
        .select-container { background: var(--card); padding: 15px; border-radius: 15px; border: 1px solid var(--border); margin-bottom: 20px; }
        .search-box { width: 100%; background: #0b0e11; border: 1px solid var(--border); color: white; padding: 12px; border-radius: 10px; margin-bottom: 10px; }
        .coin-list-dropdown { max-height: 150px; overflow-y: auto; display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
        .coin-opt { background: rgba(0,0,0,0.3); padding: 10px; border-radius: 8px; cursor: pointer; font-size: 12px; border: 1px solid transparent; }
        .coin-opt.active { border-color: var(--primary); background: rgba(240, 185, 11, 0.1); color: var(--primary); }

        textarea { width: 100%; height: 180px; background: #111418; border: 1px solid var(--border); color: var(--primary); padding: 15px; border-radius: 12px; font-family: monospace; resize: none; margin: 10px 0; }
        
        .btn-action { width: 100%; background: var(--primary); color: black; font-weight: 900; border: none; padding: 18px; border-radius: 12px; cursor: pointer; font-size: 16px; }
        
        /* History Styles */
        .history-section { margin-top: 40px; }
        .hist-card { background: var(--card); border-radius: 15px; padding: 15px; margin-bottom: 10px; border-left: 4px solid var(--primary); }
        .hist-header { display: flex; justify-content: space-between; font-size: 11px; color: #848e9c; margin-bottom: 5px; }

        .progress-bar { height: 8px; background: #111418; border-radius: 10px; margin: 15px 0; display: none; overflow: hidden; }
        .progress-fill { width: 0%; height: 100%; background: var(--up); transition: 0.3s; }
    </style>
</head>
<body>

    <div id="loginScreen">
        <div class="login-card">
            <h2 style="color:var(--primary); font-family: 'Montserrat', sans-serif;">ADMIN ACCESS</h2>
            <input type="email" id="admEmail" style="width:100%; margin: 20px 0 10px; padding:15px; border-radius:10px; border:1px solid var(--border); background:#111418; color:white;" placeholder="Admin Email">
            <input type="password" id="admPass" style="width:100%; margin-bottom: 20px; padding:15px; border-radius:10px; border:1px solid var(--border); background:#111418; color:white;" placeholder="Password">
            <button class="btn-action" onclick="tryLogin()">Login Dashboard</button>
        </div>
    </div>

    <div id="dashboard" style="display:none;">
        <header>
            <div style="font-weight: 900; color: var(--primary);">SMAT SYSTEM ADMIN</div>
            <i class="fas fa-power-off" style="color:var(--down); cursor:pointer;" onclick="auth.signOut()"></i>
        </header>

        <div class="container">
            <div class="select-container">
                <p style="font-size:12px; color:#848e9c; margin-bottom:10px;">1. SELECT COIN (SEARCHABLE)</p>
                <input type="text" class="search-box" id="coinSearch" placeholder="Type coin name or symbol..." oninput="filterCoins()">
                <div class="coin-list-dropdown" id="coinDropdown"></div>
            </div>

            <p style="font-size:12px; color:#848e9c;">2. USER LIST (FORMAT: SMAT_ID, AMOUNT)</p>
            <textarea id="bulkInput" placeholder="SMAT12345, 100&#10;SMAT67890, 50.5"></textarea>

            <div class="progress-bar" id="progBar"><div class="progress-fill" id="progFill"></div></div>
            <p id="statusTxt" style="text-align:center; font-size:12px; color:var(--up);"></p>

            <button class="btn-action" id="sendBtn" onclick="executeAirdrop()">EXECUTE BULK SEND</button>

            <div class="history-section">
                <h3 style="margin-bottom:15px; border-left: 3px solid var(--primary); padding-left:10px;">SENDING HISTORY</h3>
                <div id="adminHistoryList"></div>
            </div>
        </div>
    </div>

<script>
const firebaseConfig = { apiKey: "AIzaSyAMxtJedkehhxJRMPZLjhpKHqneHEWsGlE", authDomain: "smat-exchange.firebaseapp.com", databaseURL: "https://smat-exchange-default-rtdb.firebaseio.com", projectId: "smat-exchange" };
firebase.initializeApp(firebaseConfig);
const db = firebase.database();
const auth = firebase.auth();

let selectedCoin = "";

// --- Auth ---
function tryLogin() {
    auth.signInWithEmailAndPassword(document.getElementById('admEmail').value, document.getElementById('admPass').value)
    .catch(e => alert("Login Failed: " + e.message));
}

auth.onAuthStateChanged(user => {
    if(user) {
        document.getElementById('loginScreen').style.display = 'none';
        document.getElementById('dashboard').style.display = 'block';
        filterCoins();
        loadAdminHistory();
    } else {
        document.getElementById('loginScreen').style.display = 'flex';
        document.getElementById('dashboard').style.display = 'none';
    }
});

// --- Searchable Coin List ---
function filterCoins() {
    const q = document.getElementById('coinSearch').value.toLowerCase();
    const list = GLOBAL_COINS.filter(c => c.name.toLowerCase().includes(q) || c.sym.toLowerCase().includes(q));
    const html = list.map(c => `
        <div class="coin-opt ${selectedCoin === c.sym.toLowerCase() ? 'active' : ''}" onclick="selectCoin('${c.sym.toLowerCase()}')">
            ${c.sym.toUpperCase()} - ${c.name}
        </div>
    `).join('');
    document.getElementById('coinDropdown').innerHTML = html;
}

function selectCoin(sym) {
    selectedCoin = sym;
    filterCoins();
}

// --- Airdrop Execution ---
async function executeAirdrop() {
    const input = document.getElementById('bulkInput').value.trim();
    if(!selectedCoin) return alert("Please select a coin first!");
    if(!input) return alert("Input list is empty!");

    const lines = input.split('\n');
    const totalLines = lines.length;
    const btn = document.getElementById('sendBtn');
    const progBar = document.getElementById('progBar');
    const progFill = document.getElementById('progFill');

    if(!confirm(`Send ${selectedCoin.toUpperCase()} to ${totalLines} users?`)) return;

    btn.disabled = true;
    progBar.style.display = 'block';

    let successCount = 0;
    let totalAmtSent = 0;

    for(let i = 0; i < totalLines; i++) {
        const [sId, amtStr] = lines[i].split(',').map(s => s.trim());
        const amt = parseFloat(amtStr);

        if(sId && !isNaN(amt)) {
            // ১. ইউজারকে তার SMAT ID দিয়ে খুঁজে বের করা
            const userSnap = await db.ref('users').orderByChild('smatId').equalTo(sId).once('value');
            const userData = userSnap.val();

            if(userData) {
                const uid = Object.keys(userData)[0];
                const balKey = selectedCoin + '_balance';
                const currentBal = parseFloat(userData[uid][balKey]) || 0;

                // ২. ব্যালেন্স আপডেট (Atomic Update)
                await db.ref(`users/${uid}/${balKey}`).set(currentBal + amt);

                // ৩. ইউজারের ট্রানজ্যাকশন হিস্ট্রি
                await db.ref(`users/${uid}/history`).push({
                    method: 'Airdrop Reward',
                    coin: selectedCoin.toUpperCase(),
                    amount: amt,
                    status: 'success',
                    timestamp: Date.now(),
                    address: 'Admin Panel',
                    hash: 'SYSTEM-' + Math.random().toString(36).substr(2, 9).toUpperCase()
                });

                successCount++;
                totalAmtSent += amt;
            }
        }
        
        const pct = Math.floor(((i + 1) / totalLines) * 100);
        progFill.style.width = pct + '%';
        document.getElementById('statusTxt').innerText = `Processing: ${i+1}/${totalLines}`;
    }

    // ৪. এডমিন হিস্ট্রি সেভ করা (আপনার জন্য)
    await db.ref('admin_airdrop_history').push({
        coin: selectedCoin.toUpperCase(),
        totalUsers: successCount,
        totalAmount: totalAmtSent,
        timestamp: Date.now()
    });

    alert(`Successfully sent to ${successCount} users!`);
    btn.disabled = false;
    progBar.style.display = 'none';
    document.getElementById('bulkInput').value = "";
    loadAdminHistory();
}

// --- Load Admin History ---
function loadAdminHistory() {
    db.ref('admin_airdrop_history').limitToLast(20).on('value', snap => {
        const data = snap.val();
        if(!data) return;
        const html = Object.values(data).reverse().map(h => `
            <div class="hist-card">
                <div class="hist-header">
                    <span>${new Date(h.timestamp).toLocaleString()}</span>
                    <span style="color:var(--up)">SUCCESS</span>
                </div>
                <div style="display:flex; justify-content:space-between; align-items:center;">
                    <div>
                        <h4 style="color:var(--primary)">${h.totalAmount.toFixed(2)} ${h.coin}</h4>
                        <p style="font-size:10px; color:#848e9c;">Sent to ${h.totalUsers} users</p>
                    </div>
                    <i class="fas fa-check-circle" style="color:var(--up)"></i>
                </div>
            </div>
        `).join('');
        document.getElementById('adminHistoryList').innerHTML = html;
    });
}
</script>
</body>
</html>
