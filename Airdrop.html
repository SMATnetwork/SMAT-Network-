<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SMAT | Admin Panel</title>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-database-compat.js"></script>
    <script src="coin.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --bg: #0b0e11; --card: #1e2329; --primary: #f0b90b;
            --up: #0ecb81; --down: #f6465d; --text-sec: #848e9c;
        }
        body { background: var(--bg); color: white; font-family: 'Inter', sans-serif; margin: 0; padding: 20px; }
        
        /* Login Overlay */
        #loginOverlay { position: fixed; top:0; left:0; width:100%; height:100%; background:var(--bg); z-index:9999; display:flex; align-items:center; justify-content:center; }
        .login-box { background:var(--card); padding:30px; border-radius:20px; border:1px solid var(--primary); width:90%; max-width:350px; text-align:center; }
        
        /* Main Panel */
        .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 30px; border-bottom: 1px solid rgba(255,255,255,0.1); padding-bottom: 15px; }
        .admin-card { background: var(--card); border-radius: 20px; padding: 25px; border: 1px solid rgba(255,255,255,0.05); box-shadow: 0 10px 30px rgba(0,0,0,0.3); }
        
        select, input, textarea { 
            width: 100%; background: #0b0e11; border: 1px solid rgba(255,255,255,0.1); 
            color: white; padding: 15px; border-radius: 12px; margin: 10px 0; font-size: 14px; outline: none;
        }
        
        textarea { height: 200px; font-family: monospace; resize: none; }
        
        .btn-distribute { 
            background: var(--primary); color: black; font-weight: 800; border: none; 
            padding: 18px; border-radius: 12px; cursor: pointer; width: 100%; font-size: 16px;
            transition: 0.3s; margin-top: 10px;
        }
        .btn-distribute:disabled { background: #555; cursor: not-allowed; }

        /* Progress Bar */
        #progressContainer { display:none; margin-top:20px; background:rgba(255,255,255,0.05); border-radius:10px; height:10px; overflow:hidden; }
        #progressBar { width:0%; height:100%; background:var(--up); transition: 0.3s; }
        
        .stat-grid { display:grid; grid-template-columns: 1fr 1fr; gap:15px; margin-bottom:20px; }
        .stat-item { background:#2b3139; padding:15px; border-radius:15px; text-align:center; }
    </style>
</head>
<body>

    <div id="loginOverlay">
        <div class="login-box">
            <img src="assets/logos/smat.png" style="width:60px; margin-bottom:15px">
            <h2 style="color:var(--primary)">ADMIN ACCESS</h2>
            <input type="email" id="adminEmail" placeholder="Admin Email">
            <input type="password" id="adminPass" placeholder="Password">
            <button class="btn-main" onclick="adminLogin()" style="background:var(--primary); width:100%; border:none; padding:12px; border-radius:10px; font-weight:bold; cursor:pointer">LOGIN</button>
        </div>
    </div>

    <div id="adminPanel" style="display:none">
        <div class="header">
            <h3><i class="fas fa-user-shield"></i> SMAT ADMIN <span style="color:var(--primary)">AIRDROP</span></h3>
            <button onclick="auth.signOut()" style="background:none; border:none; color:var(--down); font-weight:bold; cursor:pointer">LOGOUT</button>
        </div>

        <div class="admin-card">
            <div class="stat-grid">
                <div class="stat-item">
                    <p style="font-size:10px; color:var(--text-sec)">TOTAL ENTRIES</p>
                    <h2 id="countEntries">0</h2>
                </div>
                <div class="stat-item">
                    <p style="font-size:10px; color:var(--text-sec)">TOTAL AMOUNT</p>
                    <h2 id="totalAirdrop">0</h2>
                </div>
            </div>

            <label style="font-size:12px; color:var(--text-sec)">1. SELECT COIN TO DISTRIBUTE</label>
            <select id="airdropCoin"></select>

            <label style="font-size:12px; color:var(--text-sec); margin-top:15px; display:block">2. PASTE DATA (Format: SMATID, AMOUNT)</label>
            <textarea id="airdropData" placeholder="Example:
SMAT88229, 500
SMAT11223, 1200
SMAT44556, 50.5" oninput="calculateStats()"></textarea>

            <div id="progressContainer">
                <div id="progressBar"></div>
            </div>
            <p id="statusLabel" style="font-size:12px; text-align:center; margin-top:5px; color:var(--primary)"></p>

            <button id="startBtn" class="btn-distribute" onclick="startAirdrop()">
                <i class="fas fa-paper-plane"></i> START BULK DISTRIBUTION
            </button>
        </div>
    </div>

<script>
// Firebase initialization (আপনার ডাটা অনুযায়ী)
const firebaseConfig = { apiKey: "AIzaSyAMxtJedkehhxJRMPZLjhpKHqneHEWsGlE", authDomain: "smat-exchange.firebaseapp.com", projectId: "smat-exchange", databaseURL: "https://smat-exchange-default-rtdb.firebaseio.com", storageBucket: "smat-exchange.appspot.com", messagingSenderId: "836334569396", appId: "1:836334569396:web:679effe640b3453412d4e1" };
firebase.initializeApp(firebaseConfig);
const db = firebase.database();
const auth = firebase.auth();

// ১. সিকিউরিটি চেক
auth.onAuthStateChanged(user => {
    if (user && user.email === "admin@smat.com") { // আপনার এডমিন ইমেল এখানে দিন
        document.getElementById('loginOverlay').style.display = 'none';
        document.getElementById('adminPanel').style.display = 'block';
        loadCoins();
    } else {
        document.getElementById('loginOverlay').style.display = 'flex';
        document.getElementById('adminPanel').style.display = 'none';
    }
});

async function adminLogin() {
    const e = document.getElementById('adminEmail').value;
    const p = document.getElementById('adminPass').value;
    try { await auth.signInWithEmailAndPassword(e, p); } catch(err) { alert("Access Denied!"); }
}

// ২. কয়েন লিস্ট লোড করা
function loadCoins() {
    const select = document.getElementById('airdropCoin');
    select.innerHTML = GLOBAL_COINS.map(c => `<option value="${c.sym.toLowerCase()}">${c.name} (${c.sym.toUpperCase()})</option>`).join('');
}

// ৩. স্ট্যাটাস ক্যালকুলেশন
function calculateStats() {
    const rawData = document.getElementById('airdropData').value.trim();
    if(!rawData) return;
    const lines = rawData.split('\n');
    let totalAmt = 0;
    lines.forEach(l => {
        const parts = l.split(',');
        if(parts[1]) totalAmt += parseFloat(parts[1].trim());
    });
    document.getElementById('countEntries').innerText = lines.length;
    document.getElementById('totalAirdrop').innerText = totalAmt.toFixed(2);
}

// ৪. বালক ডিস্ট্রিবিউশন লজিক (১ লাখ ইউজার প্রসেসিং সক্ষম)
async function startAirdrop() {
    const coin = document.getElementById('airdropCoin').value;
    const rawData = document.getElementById('airdropData').value.trim();
    const startBtn = document.getElementById('startBtn');
    
    if(!rawData) return alert("Paste some data first!");
    if(!confirm("Are you sure? This will distribute coins to all listed users.")) return;

    const lines = rawData.split('\n');
    const total = lines.length;
    startBtn.disabled = true;
    document.getElementById('progressContainer').style.display = 'block';

    for(let i = 0; i < total; i++) {
        try {
            const [smatId, amount] = lines[i].split(',').map(s => s.trim());
            const amt = parseFloat(amount);

            if(smatId && !isNaN(amt)) {
                // SMAT ID দিয়ে ইউজার খুঁজে বের করা (আপনার ডাটাবেসে smatId ফিল্ড থাকতে হবে)
                const userQuery = await db.ref('users').orderByChild('smatId').equalTo(smatId).once('value');
                const userData = userQuery.val();

                if(userData) {
                    const uid = Object.keys(userData)[0];
                    const currentBal = parseFloat(userData[uid][coin + '_balance']) || 0;
                    const newBal = (currentBal + amt).toFixed(8);

                    // ১. ব্যালেন্স আপডেট
                    await db.ref('users/' + uid).update({ [coin + '_balance']: newBal });

                    // ২. ট্রানজ্যাকশন হিস্ট্রি অ্যাড
                    const txId = db.ref('users/' + uid + '/history').push().key;
                    await db.ref('users/' + uid + '/history/' + txId).set({
                        method: 'Airdrop Reward',
                        coin: coin.toUpperCase(),
                        amount: amt,
                        network: 'SMAT Network',
                        address: 'System Admin',
                        status: 'success',
                        timestamp: Date.now(),
                        hash: 'AIRDROP-' + Math.random().toString(36).substr(2, 9).toUpperCase()
                    });
                }
            }
        } catch (e) { console.error("Error at line "+i, e); }

        // প্রোগ্রেস আপডেট
        const pct = Math.floor(((i + 1) / total) * 100);
        document.getElementById('progressBar').style.width = pct + '%';
        document.getElementById('statusLabel').innerText = `Processing: ${i+1} / ${total}`;
    }

    startBtn.disabled = false;
    alert("Airdrop Distribution Completed Successfully!");
    document.getElementById('airdropData').value = "";
    document.getElementById('progressContainer').style.display = 'none';
    document.getElementById('statusLabel').innerText = "";
}
</script>

</body>
</html>
