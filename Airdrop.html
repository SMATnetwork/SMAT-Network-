<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SMAT | Stealth Airdrop Pro</title>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-database-compat.js"></script>
    <script src="coin.js"></script>
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@700;900&display=swap" rel="stylesheet">
    
    <style>
        :root { --bg: #0b0e11; --card: #1e2329; --primary: #f0b90b; --up: #0ecb81; --down: #f6465d; --border: rgba(255, 255, 255, 0.1); }
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Montserrat', sans-serif; }
        body { background: var(--bg); color: white; padding-bottom: 50px; overflow-x: hidden; }

        header { height: 70px; background: var(--card); display: flex; align-items: center; justify-content: space-between; padding: 0 20px; border-bottom: 2px solid var(--primary); }
        .container { padding: 15px; max-width: 500px; margin: 0 auto; }

        /* Search & Coin Grid */
        .box { background: var(--card); border-radius: 15px; padding: 15px; margin-bottom: 15px; border: 1px solid var(--border); }
        .search-input { width: 100%; background: #000; border: 1px solid var(--border); color: #fff; padding: 12px; border-radius: 8px; margin-bottom: 10px; font-weight: bold; }
        .coin-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(80px, 1fr)); gap: 8px; max-height: 110px; overflow-y: auto; padding: 5px; }
        .coin-item { background: #111418; padding: 10px; border-radius: 8px; text-align: center; cursor: pointer; font-size: 10px; border: 1px solid transparent; transition: 0.3s; }
        .coin-item.active { border-color: var(--primary); background: rgba(240,185,11,0.1); transform: scale(0.95); }

        /* Summary Card */
        #summaryCard { 
            background: linear-gradient(135deg, #2b2f36, #1e2329); 
            border: 1px solid var(--primary); border-radius: 20px; padding: 20px; 
            text-align: center; margin-bottom: 15px; display: none;
            box-shadow: 0 10px 20px rgba(0,0,0,0.4);
        }
        .stat-grid { display: flex; justify-content: space-around; margin: 15px 0; }
        .stat-val { font-size: 20px; color: var(--primary); font-weight: 900; }
        .send-btn { width: 100%; background: var(--primary); color: #000; border: none; padding: 15px; border-radius: 12px; font-weight: 900; cursor: pointer; font-size: 14px; }

        /* Input Area */
        .input-row { display: flex; gap: 8px; }
        .input-row input { flex: 1; background: #000; border: 1px solid var(--border); color: white; padding: 14px; border-radius: 10px; font-weight: bold; outline: none; }
        .add-btn { background: var(--up); color: #000; border: none; padding: 0 20px; border-radius: 10px; font-weight: 900; cursor: pointer; }

        /* History List */
        .hist-item { background: var(--card); padding: 15px; border-radius: 15px; margin-bottom: 10px; display: flex; justify-content: space-between; align-items: center; border: 1px solid var(--border); cursor: pointer; }
        .coin-tag { width: 40px; height: 40px; background: #000; border-radius: 50%; display: flex; align-items: center; justify-content: center; color: var(--primary); font-weight: 900; border: 1px solid var(--border); }

        /* Popup Modal */
        #modalOverlay { position: fixed; inset: 0; background: rgba(0,0,0,0.85); z-index: 1000; display: none; align-items: center; justify-content: center; padding: 20px; backdrop-filter: blur(5px); }
        .modal-content { background: var(--card); border-radius: 25px; width: 100%; max-width: 400px; height: 70vh; display: flex; flex-direction: column; border: 1px solid var(--primary); overflow: hidden; position: relative; }
        .modal-header { padding: 20px; background: #2b2f36; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid var(--border); }
        .modal-body { flex: 1; overflow-y: auto; padding: 20px; }

        #toast { position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%); background: var(--up); color: #000; padding: 12px 30px; border-radius: 30px; font-weight: 900; display: none; z-index: 2000; }
    </style>
</head>
<body>

    <header>
        <div style="font-weight: 900; color: var(--primary); font-size: 16px;">SMAT <span style="color:#fff">STEALTH</span></div>
        <i class="fas fa-power-off" onclick="auth.signOut()" style="color:var(--down); cursor:pointer;"></i>
    </header>

    <div class="container">
        <div class="box">
            <input type="text" class="search-input" id="cSearch" placeholder="🔍 Search Asset..." oninput="drawCoins()">
            <div class="coin-grid" id="cGrid"></div>
        </div>

        <div id="summaryCard">
            <div id="selCoinName" style="color:var(--primary); font-size:14px; font-weight:900; margin-bottom:10px;">-</div>
            <div class="stat-grid">
                <div><div class="stat-val" id="qUsers">0</div><div style="font-size:9px; color:#848e9c">USERS</div></div>
                <div><div class="stat-val" id="qAmount">0</div><div style="font-size:9px; color:#848e9c">TOTAL AMT</div></div>
            </div>
            <button class="send-btn" id="sendBtn" onclick="processAirdrop()">EXECUTE SEND</button>
        </div>

        <div class="box">
            <div class="input-row">
                <input type="text" id="sid" placeholder="User SMAT ID">
                <input type="number" id="amt" placeholder="Amount">
                <button class="add-btn" onclick="addToQueue()"><i class="fas fa-plus"></i></button>
            </div>
        </div>

        <h3 style="margin:20px 5px 10px; font-size:12px; color:var(--primary); letter-spacing:1px;">LIVE AIRDROP LOGS</h3>
        <div id="historyList"></div>
    </div>

    <div id="modalOverlay" onclick="if(event.target==this) closeModal()">
        <div class="modal-content">
            <div class="modal-header">
                <div id="modalTitle" style="font-weight:900; color:var(--primary)">Distribution List</div>
                <i class="fas fa-times" onclick="closeModal()" style="cursor:pointer; color:var(--down)"></i>
            </div>
            <div class="modal-body" id="modalBody"></div>
        </div>
    </div>

    <div id="toast">PROCESS COMPLETED! ✅</div>

<script>
// --- Firebase Setup ---
const firebaseConfig = {
    apiKey: "AIzaSyAMxtJedkehhxJRMPZLjhpKHqneHEWsGlE",
    authDomain: "smat-exchange.firebaseapp.com",
    databaseURL: "https://smat-exchange-default-rtdb.firebaseio.com",
    projectId: "smat-exchange",
    storageBucket: "smat-exchange.firebasestorage.app",
    messagingSenderId: "836334569396",
    appId: "1:836334569396:web:679effe640b3453412d4e1"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.database();
const auth = firebase.auth();

let activeCoin = null;
let stealthQueue = [];
let totalAmtCounter = 0;

// --- Auth & Start ---
auth.onAuthStateChanged(user => { 
    if(user) { drawCoins(); loadHistory(); } 
    else { console.log("Login Required"); }
});

// --- UI Functions ---
function drawCoins() {
    const q = document.getElementById('cSearch').value.toLowerCase();
    if(typeof GLOBAL_COINS === 'undefined') return;
    const filtered = GLOBAL_COINS.filter(c => c.sym.toLowerCase().includes(q) || c.name.toLowerCase().includes(q));
    document.getElementById('cGrid').innerHTML = filtered.map(c => `
        <div class="coin-item ${activeCoin?.sym === c.sym.toLowerCase() ? 'active' : ''}" onclick="selectCoin('${c.sym}','${c.name}')">
            <b>${c.sym.toUpperCase()}</b>
        </div>
    `).join('');
}

function selectCoin(sym, name) {
    activeCoin = { sym: sym.toLowerCase(), name: name };
    document.getElementById('summaryCard').style.display = 'block';
    document.getElementById('selCoinName').innerText = `${name} (${sym.toUpperCase()})`;
    drawCoins();
}

function addToQueue() {
    if(!activeCoin) return alert("Select a coin first!");
    const sid = document.getElementById('sid').value.trim();
    const val = parseFloat(document.getElementById('amt').value);

    if(!sid || isNaN(val) || val <= 0) return;

    stealthQueue.push({ sid, val });
    totalAmtCounter += val;

    document.getElementById('qUsers').innerText = stealthQueue.length;
    document.getElementById('qAmount').innerText = totalAmtCounter.toLocaleString();

    document.getElementById('sid').value = "";
    document.getElementById('amt').value = "";
}

// --- Logic: Process & Balance Update ---
async function processAirdrop() {
    if(stealthQueue.length === 0) return;
    const btn = document.getElementById('sendBtn');
    btn.disabled = true;
    
    const coinKey = activeCoin.sym + "_balance";
    const finalLog = [];
    const finalTotalUsers = stealthQueue.length;
    const finalTotalAmt = totalAmtCounter;

    try {
        const usersSnap = await db.ref('users').once('value');
        const allUsers = usersSnap.val();

        while(stealthQueue.length > 0) {
            const item = stealthQueue.shift();
            
            // Live Update on Card
            document.getElementById('qUsers').innerText = stealthQueue.length;
            btn.innerText = `SENDING (${stealthQueue.length} LEFT)`;

            let targetUid = null;
            for(let uid in allUsers) {
                if(allUsers[uid].smatId && allUsers[uid].smatId.toString().toLowerCase() === item.sid.toLowerCase()) {
                    targetUid = uid;
                    break;
                }
            }

            if(targetUid) {
                const current = parseFloat(allUsers[targetUid][coinKey]) || 0;
                // Update User Balance
                await db.ref(`users/${targetUid}/${coinKey}`).set(current + item.val);
                // Push to User Personal History
                await db.ref(`users/${targetUid}/history`).push({
                    method: 'System Airdrop',
                    coin: activeCoin.sym.toUpperCase(),
                    amount: item.val,
                    status: 'success',
                    timestamp: Date.now()
                });
                finalLog.push({ sid: item.sid, val: item.val });
            }
        }

        // Save Admin Global History
        await db.ref('stealth_airdrop_logs').push({
            coin: activeCoin.sym.toUpperCase(),
            totalUsers: finalLog.length,
            totalAmt: finalTotalAmt,
            timestamp: Date.now(),
            details: finalLog
        });

        showToast();
        totalAmtCounter = 0;
    } catch (e) {
        alert("Processing Failed: " + e.message);
    } finally {
        btn.disabled = false;
        btn.innerText = "EXECUTE SEND";
        document.getElementById('summaryCard').style.display = 'none';
    }
}

// --- History & Modal Logic ---
function loadHistory() {
    db.ref('stealth_airdrop_logs').limitToLast(20).on('value', snap => {
        const data = snap.val();
        if(!data) return;
        const html = Object.keys(data).reverse().map(id => {
            const h = data[id];
            return `
                <div class="hist-item" onclick="showDetails('${id}')">
                    <div style="display:flex; align-items:center; gap:12px;">
                        <div class="coin-tag">${h.coin.charAt(0)}</div>
                        <div>
                            <div style="font-weight:900; font-size:13px;">${h.coin}</div>
                            <div style="font-size:9px; color:#848e9c;">${new Date(h.timestamp).toLocaleString()}</div>
                        </div>
                    </div>
                    <div style="text-align:right">
                        <div style="font-size:12px; color:var(--up); font-weight:900;">+${h.totalAmt.toLocaleString()}</div>
                        <div style="font-size:9px; color:#848e9c;">${h.totalUsers} Persons</div>
                    </div>
                </div>
            `;
        }).join('');
        document.getElementById('historyList').innerHTML = html;
    });
}

function showDetails(id) {
    const modal = document.getElementById('modalOverlay');
    const body = document.getElementById('modalBody');
    body.innerHTML = "<div style='text-align:center; padding:50px;'>Loading Details...</div>";
    modal.style.display = 'flex';

    db.ref(`stealth_airdrop_logs/${id}`).once('value', snap => {
        const h = snap.val();
        if(!h) return;
        document.getElementById('modalTitle').innerText = h.coin + " Distribution List";
        const content = h.details.map(d => `
            <div style="display:flex; justify-content:space-between; padding:12px 0; border-bottom:1px solid rgba(255,255,255,0.05); font-size:12px;">
                <span style="color:#848e9c">ID: <span style="color:#fff">${d.sid}</span></span>
                <span style="color:var(--primary); font-weight:900;">+${d.val}</span>
            </div>
        `).join('');
        body.innerHTML = content;
    });
}

function closeModal() { document.getElementById('modalOverlay').style.display = 'none'; }

function showToast() {
    const t = document.getElementById('toast');
    t.style.display = 'block';
    setTimeout(() => t.style.display = 'none', 3000);
}
</script>
</body>
</html>
