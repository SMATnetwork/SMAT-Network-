<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SMAT | Stealth Airdrop</title>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-database-compat.js"></script>
    <script src="coin.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@700;900&display=swap" rel="stylesheet">
    <style>
        :root { --bg: #0b0e11; --card: #1e2329; --primary: #f0b90b; --up: #0ecb81; --down: #f6465d; --border: rgba(255, 255, 255, 0.1); }
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Montserrat', sans-serif; }
        body { background: var(--bg); color: white; padding-bottom: 50px; }

        header { height: 70px; background: var(--card); display: flex; align-items: center; justify-content: space-between; padding: 0 20px; border-bottom: 2px solid var(--primary); }
        .container { padding: 15px; max-width: 600px; margin: 0 auto; }

        .box { background: var(--card); border-radius: 15px; padding: 15px; margin-bottom: 15px; border: 1px solid var(--border); }
        
        /* Queue Summary Card */
        #summaryCard { 
            background: linear-gradient(135deg, #1e2329, #0b0e11); 
            border: 2px solid var(--primary); border-radius: 20px; padding: 25px; 
            text-align: center; margin-bottom: 20px; display: none;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }
        .stat-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-top: 15px; }
        .stat-val { font-size: 22px; color: var(--primary); font-weight: 900; }

        /* Inputs */
        .search-input { width: 100%; background: #000; border: 1px solid var(--border); color: #fff; padding: 12px; border-radius: 8px; margin-bottom: 10px; }
        .coin-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(90px, 1fr)); gap: 8px; max-height: 100px; overflow-y: auto; }
        .coin-item { background: #111418; padding: 8px; border-radius: 8px; text-align: center; cursor: pointer; font-size: 10px; border: 1px solid transparent; }
        .coin-item.active { border-color: var(--primary); background: rgba(240,185,11,0.1); }

        .input-row { display: flex; gap: 8px; margin-top: 10px; }
        .input-row input { flex: 1; background: #000; border: 1px solid var(--border); color: white; padding: 12px; border-radius: 8px; font-weight: 900; }
        .add-btn { background: var(--up); color: #000; border: none; padding: 0 20px; border-radius: 8px; font-weight: 900; cursor: pointer; }

        .send-btn { width: 100%; background: var(--primary); color: #000; border: none; padding: 18px; border-radius: 12px; font-weight: 900; margin-top: 15px; cursor: pointer; font-size: 16px; }

        /* History */
        .hist-bar { background: var(--card); padding: 15px; border-radius: 12px; margin-bottom: 10px; display: flex; justify-content: space-between; align-items: center; border: 1px solid var(--border); cursor: pointer; }
        .hist-bar:hover { border-color: var(--primary); }
        .coin-info { display: flex; align-items: center; gap: 10px; }
        .coin-icon { width: 35px; height: 35px; background: #000; border-radius: 50%; display: flex; align-items: center; justify-content: center; color: var(--primary); border: 1px solid var(--border); }

        /* Detail Modal */
        #modalOverlay { position: fixed; inset: 0; background: rgba(0,0,0,0.9); z-index: 1000; display: none; padding: 20px; }
        .modal-content { background: var(--card); border-radius: 20px; max-width: 500px; margin: auto; height: 80vh; display: flex; flex-direction: column; border: 1px solid var(--primary); }
        .modal-header { padding: 20px; border-bottom: 1px solid var(--border); display: flex; justify-content: space-between; }
        .modal-body { flex: 1; overflow-y: auto; padding: 20px; font-family: monospace; font-size: 12px; }

        #toast { position: fixed; top: 20px; left: 50%; transform: translateX(-50%); background: var(--up); color: #000; padding: 12px 30px; border-radius: 30px; font-weight: 900; display: none; z-index: 2000; }
    </style>
</head>
<body>

    <header>
        <div style="font-weight: 900; color: var(--primary); font-size: 18px;">SMAT <span style="color:white">STEALTH</span></div>
        <i class="fas fa-power-off" onclick="auth.signOut()" style="color:var(--down); cursor:pointer;"></i>
    </header>

    <div class="container">
        <div class="box">
            <input type="text" class="search-input" id="cSearch" placeholder="Search Asset..." oninput="drawCoins()">
            <div class="coin-grid" id="cGrid"></div>
        </div>

        <div id="summaryCard">
            <div id="selCoinName" style="color:var(--primary); font-size:12px; margin-bottom:5px;">NONE SELECTED</div>
            <div style="font-size:10px; color:#848e9c;">QUEUE STATUS</div>
            <div class="stat-grid">
                <div><div class="stat-val" id="qUsers">0</div><div style="font-size:9px;">USERS</div></div>
                <div><div class="stat-val" id="qAmount">0</div><div style="font-size:9px;">TOTAL AMOUNT</div></div>
            </div>
            <button class="send-btn" id="sendBtn" onclick="processAirdrop()">EXECUTE STEALTH SEND</button>
        </div>

        <div class="box">
            <div class="input-row">
                <input type="text" id="sid" placeholder="User SMAT ID">
                <input type="number" id="amt" placeholder="Amount">
                <button class="add-btn" onclick="addToQueue()"><i class="fas fa-user-plus"></i></button>
            </div>
        </div>

        <h3 style="margin:25px 0 15px; font-size:13px; color:var(--primary); letter-spacing:1px;">LIVE AIRDROP HISTORY</h3>
        <div id="historyList"></div>
    </div>

    <div id="modalOverlay">
        <div class="modal-content">
            <div class="modal-header">
                <h3 id="modalTitle">Details</h3>
                <i class="fas fa-times" onclick="closeModal()" style="cursor:pointer; color:var(--down)"></i>
            </div>
            <div class="modal-body" id="modalBody"></div>
        </div>
    </div>

    <div id="toast">PROCESS COMPLETED! ✅</div>
<script>
// --- Firebase Configuration ---
const firebaseConfig = {
    apiKey: "AIzaSyAMxtJedkehhxJRMPZLjhpKHqneHEWsGlE",
    authDomain: "smat-exchange.firebaseapp.com",
    databaseURL: "https://smat-exchange-default-rtdb.firebaseio.com", // নিশ্চিত করুন এই URL ঠিক আছে
    projectId: "smat-exchange",
    storageBucket: "smat-exchange.firebasestorage.app",
    messagingSenderId: "836334569396",
    appId: "1:836334569396:web:679effe640b3453412d4e1",
    measurementId: "G-FCE3H3F18V"
};

// Initialize Firebase (Compat mode for your existing script)
if (!firebase.apps.length) {
    firebase.initializeApp(firebaseConfig);
}

const db = firebase.database();
const auth = firebase.auth();

let activeCoin = null;
let stealthQueue = []; 
let totalAmt = 0;

// --- Auth Monitor ---
auth.onAuthStateChanged(user => { 
    if(user) { 
        drawCoins(); 
        loadHistory(); 
    } else {
        console.log("Admin not logged in");
    }
});

// --- Coin Selection Logic ---
function drawCoins() {
    const q = document.getElementById('cSearch').value.toLowerCase();
    if (typeof GLOBAL_COINS === 'undefined') return;
    
    const filtered = GLOBAL_COINS.filter(c => c.sym.toLowerCase().includes(q) || c.name.toLowerCase().includes(q));
    document.getElementById('cGrid').innerHTML = filtered.map(c => `
        <div class="coin-item ${activeCoin?.sym === c.sym ? 'active' : ''}" onclick="selectCoin('${c.sym}','${c.name}')">
            <b>${c.sym.toUpperCase()}</b>
        </div>
    `).join('');
}

function selectCoin(sym, name) {
    activeCoin = { sym: sym.toLowerCase(), fullName: name };
    document.getElementById('summaryCard').style.display = 'block';
    document.getElementById('selCoinName').innerText = `${name} (${sym.toUpperCase()})`;
    drawCoins();
}

// --- Queue Management ---
function addToQueue() {
    if(!activeCoin) return alert("Please select a coin first!");
    const sidField = document.getElementById('sid');
    const amtField = document.getElementById('amt');
    
    const sid = sidField.value.trim();
    const val = parseFloat(amtField.value);

    if(!sid || isNaN(val) || val <= 0) {
        alert("Enter valid SMAT ID and Amount!");
        return;
    }

    stealthQueue.push({ sid, val });
    totalAmt += val;

    // Update UI Summary Card
    document.getElementById('qUsers').innerText = stealthQueue.length;
    document.getElementById('qAmount').innerText = totalAmt.toFixed(2);

    // Clear Inputs
    sidField.value = "";
    amtField.value = "";
}

// --- CORE FIX: Balance & History Processing ---
async function processAirdrop() {
    if(stealthQueue.length === 0) return;
    
    const btn = document.getElementById('sendBtn');
    btn.disabled = true;
    
    const coinKey = activeCoin.sym + "_balance";
    const reportDetails = [];
    const finalTotalUsers = stealthQueue.length;
    const finalTotalAmt = totalAmt;

    try {
        // ১. সব ইউজার ডাটা একবারে আনা
        const allUsersSnap = await db.ref('users').once('value');
        const allUsers = allUsersSnap.val();

        if(!allUsers) throw new Error("No users found in Database!");

        // ২. প্রসেসিং লুপ
        while(stealthQueue.length > 0) {
            const item = stealthQueue.shift();
            
            // লাইভ ইউআই আপডেট
            document.getElementById('qUsers').innerText = stealthQueue.length;
            btn.innerText = `SENDING... (${stealthQueue.length} LEFT)`;

            // ৩. আইডি ম্যাচিং (Case Insensitive Fix)
            let targetUid = null;
            for(let uid in allUsers) {
                if(allUsers[uid].smatId && allUsers[uid].smatId.toString().toLowerCase() === item.sid.toLowerCase()) {
                    targetUid = uid;
                    break;
                }
            }

            if(targetUid) {
                const currentBal = parseFloat(allUsers[targetUid][coinKey]) || 0;
                const newBal = currentBal + item.val;

                // ব্যালেন্স আপডেট
                await db.ref(`users/${targetUid}/${coinKey}`).set(newBal);

                // ইউজারের নিজস্ব হিস্ট্রি আপডেট
                await db.ref(`users/${targetUid}/history`).push({
                    method: 'Airdrop Reward',
                    coin: activeCoin.sym.toUpperCase(),
                    amount: item.val,
                    status: 'success',
                    timestamp: Date.now(),
                    hash: 'ST-' + Math.random().toString(36).substr(2, 9).toUpperCase()
                });

                reportDetails.push({ sid: item.sid, val: item.val });
            }
        }

        // ৪. এডমিন লগ সেভ (পপআপের জন্য)
        if (reportDetails.length > 0) {
            await db.ref('stealth_airdrop_logs').push({
                coin: activeCoin.sym.toUpperCase(),
                totalUsers: reportDetails.length,
                totalAmt: finalTotalAmt,
                timestamp: Date.now(),
                details: reportDetails
            });
        }

        showToast();
        totalAmt = 0; // Reset total
    } catch (error) {
        console.error("Airdrop Error:", error);
        alert("Error: " + error.message);
    } finally {
        btn.innerText = "EXECUTE STEALTH SEND";
        btn.disabled = false;
        document.getElementById('summaryCard').style.display = 'none';
    }
}

// --- History & Popup Fix ---
function loadHistory() {
    db.ref('stealth_airdrop_logs').limitToLast(20).on('value', snap => {
        const data = snap.val();
        const listDiv = document.getElementById('historyList');
        if(!data) {
            listDiv.innerHTML = "<p style='text-align:center; color:#555;'>No history found</p>";
            return;
        }

        const html = Object.keys(data).reverse().map(id => {
            const h = data[id];
            return `
                <div class="hist-bar" onclick="showDetails('${id}')">
                    <div class="coin-info">
                        <div class="coin-icon">${h.coin.charAt(0)}</div>
                        <div>
                            <div style="font-weight:900; font-size:13px;">${h.coin}</div>
                            <div style="font-size:9px; color:#848e9c;">${new Date(h.timestamp).toLocaleString()}</div>
                        </div>
                    </div>
                    <div style="text-align:right">
                        <div style="font-size:11px; color:var(--up)">+${h.totalAmt}</div>
                        <div style="font-size:9px; color:#848e9c;">${h.totalUsers} Persons</div>
                    </div>
                </div>
            `;
        }).join('');
        listDiv.innerHTML = html;
    });
}

function showDetails(logId) {
    const modal = document.getElementById('modalOverlay');
    const modalBody = document.getElementById('modalBody');
    
    modal.style.display = 'flex'; // পপআপ দেখাবে
    modalBody.innerHTML = "Loading...";

    db.ref(`stealth_airdrop_logs/${logId}`).once('value', snap => {
        const h = snap.val();
        if(!h) return;

        document.getElementById('modalTitle').innerText = `${h.coin} Distribution`;
        const listHtml = h.details.map(d => `
            <div style="display:flex; justify-content:space-between; padding:10px 0; border-bottom:1px solid #333;">
                <span>ID: ${d.sid}</span>
                <span style="color:var(--primary); font-weight:bold;">${d.val} ${h.coin}</span>
            </div>
        `).join('');
        modalBody.innerHTML = listHtml;
    });
}

function closeModal() {
    document.getElementById('modalOverlay').style.display = 'none';
}

function showToast() {
    const t = document.getElementById('toast');
    t.style.display = 'block';
    setTimeout(() => { t.style.display = 'none'; }, 3000);
}
</script/>
</body>
</html>
