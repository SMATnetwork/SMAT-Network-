<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SMAT | Pro Live Airdrop</title>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-database-compat.js"></script>
    <script src="coin.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700;900&display=swap');
        :root { --bg: #050709; --card: #12151a; --primary: #00ff88; --secondary: #f0b90b; --border: #23282e; --text-muted: #848e9c; --input-bg: #0b0e11; }
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Montserrat', sans-serif; }
        body { background: var(--bg); color: white; min-height: 100vh; overflow-x: hidden; }
        #authOverlay { position: fixed; inset: 0; background: var(--bg); z-index: 9999; display: flex; align-items: center; justify-content: center; padding: 20px; }
        .login-card { background: var(--card); border: 1px solid var(--border); padding: 40px; border-radius: 30px; width: 100%; max-width: 400px; text-align: center; }
        header { height: 75px; background: rgba(18, 21, 26, 0.9); backdrop-filter: blur(15px); display: flex; align-items: center; justify-content: space-between; padding: 0 25px; border-bottom: 1px solid var(--border); position: sticky; top: 0; z-index: 100; }
        .live-indicator { display: flex; align-items: center; gap: 10px; font-weight: 900; font-size: 14px; text-transform: uppercase; }
        .dot { width: 12px; height: 12px; background: var(--primary); border-radius: 50%; box-shadow: 0 0 12px var(--primary); animation: pulse 1.5s infinite; }
        @keyframes pulse { 0%, 100% { transform: scale(0.95); opacity: 0.7; } 50% { transform: scale(1.2); opacity: 1; } }
        .signout-btn { background: rgba(255, 77, 77, 0.1); border: 1px solid rgba(255, 77, 77, 0.3); color: #ff4d4d; padding: 10px 18px; border-radius: 12px; cursor: pointer; font-weight: 900; font-size: 12px; }
        .container { max-width: 550px; margin: 30px auto; padding: 0 15px; padding-bottom: 50px; }
        .search-container { background: var(--card); border-radius: 25px; padding: 20px; border: 1px solid var(--border); margin-bottom: 25px; }
        .search-bar { background: var(--input-bg); border: 1.5px solid var(--border); border-radius: 18px; padding: 16px; display: flex; align-items: center; gap: 12px; margin-bottom: 20px; }
        .search-bar input { background: none; border: none; color: white; width: 100%; outline: none; font-weight: 900; }
        .coin-grid { display: grid; grid-template-columns: repeat(5, 1fr); gap: 12px; }
        .coin-item { background: var(--input-bg); border: 1px solid var(--border); padding: 15px 5px; border-radius: 20px; text-align: center; cursor: pointer; }
        .coin-item img { width: 30px; height: 30px; margin-bottom: 8px; border-radius: 50%; }
        .coin-item span { display: block; font-size: 10px; font-weight: 900; color: var(--text-muted); }
        .selected-badge { display: none; background: rgba(0, 255, 136, 0.05); border: 2px solid var(--primary); padding: 25px; border-radius: 25px; text-align: center; position: relative; }
        .close-sel { position: absolute; right: 20px; top: 20px; cursor: pointer; color: var(--text-muted); font-size: 20px; }
        .input-card { background: var(--card); border-radius: 30px; padding: 30px; border: 1px solid var(--border); margin-bottom: 25px; }
        .modern-input { margin-bottom: 20px; }
        .modern-input label { font-size: 11px; font-weight: 900; color: var(--text-muted); text-transform: uppercase; margin-bottom: 10px; display: block; }
        .modern-input input { width: 100%; background: var(--input-bg); border: 2px solid var(--border); padding: 20px; border-radius: 18px; color: white; font-weight: 900; font-size: 16px; }
        .queue-card { background: var(--input-bg); border: 2px dashed var(--border); border-radius: 25px; padding: 20px; margin: 25px 0; display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }
        .q-box { text-align: center; }
        .q-box span { font-size: 10px; font-weight: 900; color: var(--text-muted); display: block; }
        .q-box b { font-size: 26px; color: var(--secondary); font-weight: 900; }
        .btn-action { width: 100%; padding: 22px; border-radius: 20px; border: none; font-weight: 900; font-size: 16px; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 12px; }
        .btn-add { background: #1a1e23; color: white; border: 1px solid var(--border); margin-bottom: 15px; }
        .btn-send { background: linear-gradient(135deg, var(--primary), #00d170); color: #000; }
        .history-title { text-align: center; margin: 50px 0 30px; font-weight: 900; color: var(--secondary); font-size: 24px; text-transform: uppercase; }
        .h-header { display: grid; grid-template-columns: 70px 1.5fr 1fr 1.2fr; padding: 0 25px 15px; font-size: 11px; font-weight: 900; color: var(--text-muted); }
        .h-row { background: var(--card); border-radius: 22px; border: 1px solid var(--border); padding: 18px 25px; display: grid; grid-template-columns: 70px 1.5fr 1fr 1.2fr; align-items: center; margin-bottom: 12px; cursor: pointer; }
        #modal { position: fixed; inset: 0; background: rgba(0,0,0,0.95); backdrop-filter: blur(20px); z-index: 1000; display: none; align-items: center; justify-content: center; padding: 20px; }
        .modal-box { background: var(--card); border: 1px solid var(--primary); border-radius: 35px; width: 100%; max-width: 450px; max-height: 85vh; overflow: hidden; display: flex; flex-direction: column; }
        .modal-head { padding: 30px; text-align: center; border-bottom: 1px solid var(--border); }
        .modal-body { flex: 1; overflow-y: auto; padding: 25px; }
        #successToast { position: fixed; top: -100px; left: 50%; transform: translateX(-50%); background: var(--primary); color: #000; padding: 20px 40px; border-radius: 20px; font-weight: 900; z-index: 10000; transition: 0.5s; display: flex; align-items: center; gap: 15px; }
        #successToast.show { top: 30px; }
        .spinner { width: 22px; height: 22px; border: 3px solid #000; border-top-color: transparent; border-radius: 50%; animation: spin 0.8s linear infinite; display: none; }
        @keyframes spin { to { transform: rotate(360deg); } }
        footer { text-align: center; padding: 50px 0; color: var(--text-muted); font-size: 12px; font-weight: 900; }
    </style>
</head>
<body>

<div id="successToast"><i class="fas fa-check-circle fa-lg"></i><span>AIRDROP DISPATCHED SUCCESSFULLY</span></div>

<div id="authOverlay">
    <div class="login-card">
        <h1 style="color: var(--primary); margin-bottom: 30px;">SMAT HUB</h1>
        <div class="modern-input"><input type="email" id="email" placeholder="Admin Email"></div>
        <div class="modern-input"><input type="password" id="pass" placeholder="Password"></div>
        <button class="btn-action btn-send" onclick="login()">AUTHENTICATE</button>
    </div>
</div>

<header>
    <div class="live-indicator"><div class="dot"></div>Live Airdrop</div>
    <button class="signout-btn" onclick="logout()"><i class="fas fa-power-off"></i> SIGNOUT</button>
</header>

<div class="container">
    <div class="search-container">
        <div class="search-bar"><i class="fas fa-search" style="color: var(--text-muted);"></i><input type="text" id="coinSearch" placeholder="Search Assets..." oninput="drawCoins()"></div>
        <div id="selectorUI" class="coin-grid"></div>
        <div id="selectedUI" class="selected-badge">
            <i class="fas fa-times-circle close-sel" onclick="resetSelector()"></i>
            <img id="selIcon" src="" style="width: 50px; height: 50px; border-radius: 50%;"><h2 id="selName" style="color: var(--primary);">-</h2><span id="selSym"></span>
        </div>
    </div>

    <div class="input-card">
        <div class="modern-input"><label>Recipient SMAT ID</label><input type="text" id="sid" placeholder="SMAT1000XX"></div>
        <div class="modern-input"><label>Amount</label><input type="number" id="amt" placeholder="0.00"></div>
        <button class="btn-action btn-add" onclick="addToQueue()">ADD TO QUEUE</button>
        <div class="queue-card">
            <div class="q-box"><span>QUEUE</span><b id="qCount">0</b></div>
            <div class="q-box"><span>TOTAL</span><b id="qTotal">0</b></div>
        </div>
        <button id="sendBtn" class="btn-action btn-send" onclick="processAirdrop()" style="display: none;"><div class="spinner" id="btnSpin"></div><span id="btnText">EXECUTE LIVE AIRDROP</span></button>
    </div>

    <h1 class="history-title">AIRDROP HISTORY</h1>
    <div class="h-header"><span>Logo</span><span>Asset</span><span>Users</span><span>Amount</span></div>
    <div id="historyList"></div>
</div>

<div id="modal" onclick="if(event.target==this) closeModal()">
    <div class="modal-box">
        <div class="modal-head">
            <i class="fas fa-times" style="position: absolute; right: 25px; top: 25px; cursor: pointer;" onclick="closeModal()"></i>
            <img id="mIcon" src="" style="width: 60px; border-radius: 50%; border: 2px solid var(--primary); padding: 5px;">
            <h2 id="mCoinName" style="color: var(--primary);"></h2>
        </div>
        <div id="mBody" class="modal-body"></div>
        <div id="mFooter" style="padding: 20px;"></div>
    </div>
</div>

<script>
const firebaseConfig = {
    apiKey: "AIzaSyAMxtJedkehhxJRMPZLjhpKHqneHEWsGlE",
    authDomain: "smat-exchange.firebaseapp.com",
    databaseURL: "https://smat-exchange-default-rtdb.firebaseio.com",
    projectId: "smat-exchange",
    appId: "1:836334569396:web:679effe640b3453412d4e1"
};
firebase.initializeApp(firebaseConfig);
const db = firebase.database(), auth = firebase.auth();

function login() { auth.signInWithEmailAndPassword(document.getElementById('email').value, document.getElementById('pass').value).catch(alert); }
function logout() { auth.signOut(); }
auth.onAuthStateChanged(u => document.getElementById('authOverlay').style.display = u ? 'none' : 'flex');

let activeCoin = null, queue = [], totalAmt = 0;

function drawCoins() {
    const q = document.getElementById('coinSearch').value.toLowerCase();
    const filtered = (typeof GLOBAL_COINS !== 'undefined' ? GLOBAL_COINS : []).filter(c => c.sym.toLowerCase().includes(q));
    document.getElementById('selectorUI').innerHTML = filtered.slice(0, 5).map(c => `
        <div class="coin-item" onclick="selectCoin('${c.sym}', '${c.name}')">
            <img src="assets/logos/${c.sym.toLowerCase()}.png" onerror="this.src='assets/logos/smat.png'">
            <span>${c.sym}</span>
        </div>
    `).join('');
}
drawCoins();

function selectCoin(sym, name) {
    activeCoin = { sym: sym.toLowerCase(), name };
    document.getElementById('selectorUI').style.display = 'none';
    document.getElementById('selectedUI').style.display = 'block';
    document.getElementById('selName').innerText = name;
    document.getElementById('selSym').innerText = sym.toUpperCase();
    document.getElementById('selIcon').src = `assets/logos/${sym.toLowerCase()}.png`;
}

function resetSelector() {
    activeCoin = null; document.getElementById('selectorUI').style.display = 'grid';
    document.getElementById('selectedUI').style.display = 'none'; drawCoins();
}

function addToQueue() {
    const id = document.getElementById('sid').value.trim(), val = parseFloat(document.getElementById('amt').value);
    if(!activeCoin || !id || isNaN(val)) return;
    queue.push({ id, val }); totalAmt += val;
    document.getElementById('qCount').innerText = queue.length;
    document.getElementById('qTotal').innerText = totalAmt.toLocaleString();
    document.getElementById('sendBtn').style.display = 'flex';
    document.getElementById('sid').value = ""; document.getElementById('amt').value = "";
}

async function processAirdrop() {
    const btn = document.getElementById('sendBtn'); btn.disabled = true;
    document.getElementById('btnSpin').style.display = 'block';
    const coin = activeCoin.sym, balanceField = coin + "_balance";
    
    // ১. প্রথমে ইউজার ডেটা একবার রিড করে নিন
    const snap = await db.ref('users').once('value');
    const allUsers = snap.val();
    
    let logsForAdmin = []; // অ্যাডমিন প্যানেলের ডিটেইলস পপআপের জন্য
    const currentQueue = [...queue]; 
    const currentTotal = totalAmt;

    // ২. অ্যাডমিন হিস্ট্রিতে মেইন এন্ট্রি তৈরি
    const logRef = db.ref('stealth_airdrop_logs').push();
    await logRef.set({
        coin: coin.toUpperCase(),
        totalUsers: currentQueue.length,
        totalAmt: currentTotal,
        time: Date.now()
    });

    // ৩. লুপ চালিয়ে ডেটা পাঠানো (পুরো লুপ শেষ না হওয়া পর্যন্ত ওয়েট করবে)
    for (let item of currentQueue) {
        let uKey = Object.keys(allUsers || {}).find(k => allUsers[k].smatID === item.id);
        if (uKey) {
            const currentBal = parseFloat(allUsers[uKey][balanceField]) || 0;
            // ওয়ালেট ব্যালেন্স আপডেট
            await db.ref(`users/${uKey}/${balanceField}`).set(currentBal + item.val);
            // ইউজারের ওয়ালেট হিস্ট্রিতে প্রমান রাখা
            await db.ref(`users/${uKey}/wallet_history`).push({
                type: "Airdrop",
                asset: coin.toUpperCase(),
                amount: item.val,
                status: "Success",
                timestamp: Date.now(),
                note: "Live Ecosystem Reward"
            });
            // অ্যাডমিন পপআপের জন্য ডেটা স্টোর করা
            logsForAdmin.push(item);
        }
        document.getElementById('btnText').innerText = `REMAINING: ${currentQueue.length - logsForAdmin.length}`;
    }

    // ৪. অ্যাডমিন হিস্ট্রির ভেতরে 'details' আপডেট করা (পপআপে ডেটা আসার জন্য)
    await db.ref(`stealth_airdrop_logs/${logRef.key}/details`).set(logsForAdmin);
    
    finishAirdrop();
}

function finishAirdrop() {
    queue = []; totalAmt = 0;
    document.getElementById('qCount').innerText = "0"; document.getElementById('qTotal').innerText = "0";
    document.getElementById('sendBtn').style.display = 'none'; 
    document.getElementById('btnSpin').style.display = 'none';
    document.getElementById('btnText').innerText = "EXECUTE LIVE AIRDROP";
    document.getElementById('sendBtn').disabled = false;
    resetSelector();
    const toast = document.getElementById('successToast'); toast.classList.add('show');
    setTimeout(() => toast.classList.remove('show'), 3500);
}

// হিস্ট্রি লিস্ট আপডেট
db.ref('stealth_airdrop_logs').limitToLast(15).on('value', s => {
    const data = s.val(); if(!data) return;
    document.getElementById('historyList').innerHTML = Object.keys(data).reverse().map(k => {
        const h = data[k];
        return `<div class="h-row" onclick="viewDetails('${k}')">
            <img src="assets/logos/${h.coin.toLowerCase()}.png" onerror="this.src='assets/logos/smat.png'" style="width:35px; border-radius:50%;">
            <b style="padding-left:10px">${h.coin}</b>
            <b style="color:var(--primary)">${h.totalUsers}</b>
            <b style="text-align:right; color:var(--secondary)">${h.totalAmt.toLocaleString()}</b>
        </div>`;
    }).join('');
});

// ডিটেইলস পপআপ ফাংশন
let currentDetails = [], displayedItems = 0;
function viewDetails(k) {
    db.ref(`stealth_airdrop_logs/${k}`).once('value', s => {
        const h = s.val(); if(!h || !h.details) return;
        currentDetails = h.details; displayedItems = 0;
        document.getElementById('mIcon').src = `assets/logos/${h.coin.toLowerCase()}.png`;
        document.getElementById('mCoinName').innerText = h.coin + " Report";
        document.getElementById('mBody').innerHTML = ""; 
        loadMoreRows();
        document.getElementById('modal').style.display = 'flex';
    });
}

function loadMoreRows() {
    const next = currentDetails.slice(displayedItems, displayedItems + 50);
    const html = next.map(d => `
        <div style="display:flex; justify-content:space-between; padding:15px 0; border-bottom:1px solid var(--border);">
            <span style="font-size:12px; color:var(--text-muted); font-weight:900;">${d.id}</span>
            <b style="color:var(--primary); font-weight:900;">+${d.val.toLocaleString()}</b>
        </div>
    `).join('');
    document.getElementById('mBody').insertAdjacentHTML('beforeend', html);
    displayedItems += next.length;
    document.getElementById('mFooter').innerHTML = displayedItems < currentDetails.length ? 
        `<button class="show-more-btn" onclick="loadMoreRows()">Show More (${currentDetails.length - displayedItems})</button>` : "";
}
function closeModal() { document.getElementById('modal').style.display = 'none'; }
</script>
</body>
</html>
