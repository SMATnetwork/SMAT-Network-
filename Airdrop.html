<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SMAT | Fixed Airdrop Panel</title>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-database-compat.js"></script>
    <script src="coin.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@700;900&display=swap" rel="stylesheet">
    <style>
        :root { --bg: #0b0e11; --card: #1e2329; --primary: #f0b90b; --up: #0ecb81; --down: #f6465d; --border: rgba(255, 255, 255, 0.1); }
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Montserrat', sans-serif; }
        body { background: var(--bg); color: white; padding-bottom: 50px; }

        header { height: 70px; background: var(--card); display: flex; align-items: center; justify-content: space-between; padding: 0 20px; border-bottom: 2px solid var(--primary); }
        .container { padding: 15px; max-width: 800px; margin: 0 auto; }

        /* Coin Selector */
        .box { background: var(--card); border-radius: 15px; padding: 15px; margin-bottom: 15px; border: 1px solid var(--border); }
        .search-input { width: 100%; background: #000; border: 1px solid var(--border); color: #fff; padding: 12px; border-radius: 8px; margin-bottom: 10px; font-weight: 900; }
        .coin-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(100px, 1fr)); gap: 8px; max-height: 120px; overflow-y: auto; }
        .coin-item { background: #111418; padding: 10px; border-radius: 8px; text-align: center; cursor: pointer; font-size: 11px; border: 1px solid transparent; }
        .coin-item:hover { border-color: var(--primary); }
        
        /* Selection UI */
        .selected-badge { background: linear-gradient(135deg, rgba(240,185,11,0.2), transparent); border: 1px solid var(--primary); padding: 20px; border-radius: 12px; text-align: center; margin-bottom: 15px; display: none; }
        
        /* Queue System */
        .input-group { display: flex; gap: 10px; margin-top: 10px; }
        .input-group input { flex: 1; background: #000; border: 1px solid var(--border); color: white; padding: 14px; border-radius: 8px; font-weight: 700; }
        .add-btn { background: var(--up); color: #000; border: none; padding: 0 25px; border-radius: 8px; font-weight: 900; cursor: pointer; }

        .queue-box { background: rgba(0,0,0,0.3); border-radius: 12px; padding: 15px; margin-top: 15px; border: 1px dashed var(--primary); }
        .queue-item { display: flex; justify-content: space-between; padding: 10px 0; border-bottom: 1px solid rgba(255,255,255,0.05); }

        .btn-send { width: 100%; background: var(--primary); color: #000; border: none; padding: 20px; border-radius: 12px; font-weight: 900; margin-top: 20px; cursor: pointer; font-size: 16px; }

        /* History */
        .hist-card { background: var(--card); border-radius: 12px; margin-bottom: 10px; border: 1px solid var(--border); overflow: hidden; }
        .hist-main { padding: 15px; display: flex; justify-content: space-between; align-items: center; cursor: pointer; }
        .hist-details { background: #111418; padding: 15px; display: none; border-top: 1px solid var(--border); font-size: 12px; }

        #toast { position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%); background: var(--up); color: #000; padding: 15px 40px; border-radius: 50px; font-weight: 900; display: none; z-index: 10000; }
    </style>
</head>
<body>

    <header>
        <div style="font-weight: 900; color: var(--primary); letter-spacing: 1px;">SMAT AIRDROP PRO</div>
        <i class="fas fa-sign-out-alt" onclick="auth.signOut()" style="color:var(--down); cursor:pointer; font-size: 20px;"></i>
    </header>

    <div class="container">
        <div class="box">
            <input type="text" class="search-input" id="searchCoin" placeholder="🔍 Search Coin..." oninput="renderCoins()">
            <div class="coin-grid" id="coinGrid"></div>
        </div>

        <div id="selectionShow" class="selected-badge">
            <div style="font-size:11px; color:#848e9c; margin-bottom: 5px;">AIRDROPPING ASSET</div>
            <div id="targetCoin" style="font-size:24px; color:var(--primary); font-weight:900;">NONE</div>
        </div>

        <div class="box">
            <div class="input-group">
                <input type="text" id="sidIn" placeholder="Enter SMAT ID">
                <input type="number" id="amtIn" placeholder="Amount">
                <button class="add-btn" onclick="addToQueue()"><i class="fas fa-plus"></i></button>
            </div>

            <div id="queueSection" style="display:none;">
                <div class="queue-box" id="queueList"></div>
                <button class="btn-send" id="sendBtn" onclick="startProcessing()">SEND TO ALL (<span id="qTotal">0</span>)</button>
            </div>
        </div>

        <h3 style="margin:25px 0 15px; color:var(--primary); font-size: 14px;">LIVE AIRDROP LOGS</h3>
        <div id="logList"></div>
    </div>

    <div id="toast">PROCESS COMPLETED! ✅</div>

<script>
const firebaseConfig = { apiKey: "AIzaSyAMxtJedkehhxJRMPZLjhpKHqneHEWsGlE", authDomain: "smat-exchange.firebaseapp.com", databaseURL: "https://smat-exchange-default-rtdb.firebaseio.com", projectId: "smat-exchange" };
firebase.initializeApp(firebaseConfig);
const db = firebase.database();
const auth = firebase.auth();

let activeCoin = null;
let queue = [];

// --- Init & Auth ---
auth.onAuthStateChanged(user => {
    if(!user) {
        window.location.href = "login.html"; // লগইন না থাকলে পাঠিয়ে দিন
    } else {
        renderCoins();
        fetchHistory();
    }
});

// --- Coin Search & Select ---
function renderCoins() {
    const term = document.getElementById('searchCoin').value.toLowerCase();
    const list = GLOBAL_COINS.filter(c => c.sym.toLowerCase().includes(term) || c.name.toLowerCase().includes(term));
    document.getElementById('coinGrid').innerHTML = list.map(c => `
        <div class="coin-item" onclick="selectThis('${c.sym}','${c.name}')">
            <b>${c.sym}</b><br><small style="color:#848e9c">${c.name}</small>
        </div>
    `).join('');
}

function selectThis(sym, name) {
    activeCoin = sym.toLowerCase();
    document.getElementById('selectionShow').style.display = 'block';
    document.getElementById('targetCoin').innerText = `${name} (${sym})`;
}

// --- Queue Control ---
function addToQueue() {
    if(!activeCoin) return alert("Please select a coin first!");
    const sId = document.getElementById('sidIn').value.trim();
    const val = parseFloat(document.getElementById('amtIn').value);

    if(!sId || isNaN(val) || val <= 0) return alert("Valid ID & Amount Required!");

    queue.push({ sId, val, coin: activeCoin });
    
    // UI Update
    document.getElementById('queueSection').style.display = 'block';
    document.getElementById('qTotal').innerText = queue.length;
    
    const itemHtml = `
        <div class="queue-item">
            <span>ID: ${sId}</span>
            <span style="color:var(--primary)">${val} ${activeCoin.toUpperCase()}</span>
        </div>
    `;
    document.getElementById('queueList').innerHTML += itemHtml;

    // Clear Inputs
    document.getElementById('sidIn').value = "";
    document.getElementById('amtIn').value = "";
}

// --- Heavy Execution (The Core Fix) ---
async function startProcessing() {
    const btn = document.getElementById('sendBtn');
    btn.disabled = true;
    btn.innerText = "SENDING... PLEASE WAIT";

    const summary = {
        coin: activeCoin.toUpperCase(),
        totalPerson: queue.length,
        totalAmount: 0,
        timestamp: Date.now(),
        recipients: []
    };

    // সব ইউজারদের ডাটা একবারে আনা (Performance এর জন্য)
    const allUsersSnap = await db.ref('users').once('value');
    const allUsers = allUsersSnap.val();

    for(let task of queue) {
        // ম্যানুয়ালি SMAT ID ম্যাচ করানো (Firebase Indexing এর ঝামেলা এড়াতে)
        let foundUid = null;
        for(let uid in allUsers) {
            if(allUsers[uid].smatId === task.sId) {
                foundUid = uid;
                break;
            }
        }

        if(foundUid) {
            const key = task.coin + "_balance";
            const currentBal = parseFloat(allUsers[foundUid][key]) || 0;
            const newBal = currentBal + task.val;

            // ১. ব্যালেন্স আপডেট
            await db.ref(`users/${foundUid}/${key}`).set(newBal);

            // ২. ইউজার ট্রানজ্যাকশন হিস্ট্রি
            await db.ref(`users/${foundUid}/history`).push({
                method: 'Airdrop Reward',
                coin: task.coin.toUpperCase(),
                amount: task.val,
                status: 'success',
                timestamp: Date.now(),
                address: 'System Admin',
                hash: 'AIR-' + Math.random().toString(36).substr(2, 8).toUpperCase()
            });

            summary.totalAmount += task.val;
            summary.recipients.push({ sId: task.sId, amt: task.val });
        } else {
            console.error("User not found: " + task.sId);
        }
    }

    // ৩. এডমিন লগ সেভ করা
    if(summary.recipients.length > 0) {
        await db.ref('airdrop_pro_logs').push(summary);
    }

    // ৪. UI রিসেট
    queue = [];
    document.getElementById('queueList').innerHTML = "";
    document.getElementById('queueSection').style.display = 'none';
    btn.disabled = false;
    btn.innerText = "SEND TO ALL";
    
    // Toast Show
    const t = document.getElementById('toast');
    t.style.display = 'block';
    setTimeout(() => t.style.display = 'none', 3000);
}

// --- History Fetching ---
function fetchHistory() {
    db.ref('airdrop_pro_logs').limitToLast(30).on('value', snap => {
        const data = snap.val();
        if(!data) {
            document.getElementById('logList').innerHTML = "<center style='color:#444'>No history yet</center>";
            return;
        }

        const keys = Object.keys(data).reverse();
        const html = keys.map(id => {
            const h = data[id];
            return `
                <div class="hist-card">
                    <div class="hist-main" onclick="toggleDetails('${id}')">
                        <div>
                            <span style="color:var(--primary); font-weight:900;">${h.coin}</span>
                            <div style="font-size:10px; color:#848e9c">${new Date(h.timestamp).toLocaleString()}</div>
                        </div>
                        <div style="text-align:right">
                            <div style="font-size:12px;">Users: ${h.totalPerson}</div>
                            <div style="font-size:12px; color:var(--up)">Total: ${h.totalAmount.toFixed(2)}</div>
                        </div>
                    </div>
                    <div class="hist-details" id="box_${id}">
                        ${h.recipients.map(r => `
                            <div style="display:flex; justify-content:space-between; margin-bottom:5px; border-bottom:1px solid #222; padding-bottom:3px;">
                                <span>ID: ${r.sId}</span>
                                <span style="color:var(--primary)">+${r.amt}</span>
                            </div>
                        `).join('')}
                    </div>
                </div>
            `;
        }).join('');
        document.getElementById('logList').innerHTML = html;
    });
}

function toggleDetails(id) {
    const el = document.getElementById('box_'+id);
    el.style.display = el.style.display === 'block' ? 'none' : 'block';
}

</script>
</body>
</html>
