<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SMAT | Fixed Airdrop Panel</title>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-database-compat.js"></script>
    <script src="coin.js"></script>
    <style>
        :root { --bg: #0b0e11; --card: #181a20; --primary: #f0b90b; --up: #0ecb81; --border: #2b3139; }
        body { background: var(--bg); color: white; font-family: sans-serif; padding: 20px; }
        .box { background: var(--card); padding: 20px; border-radius: 15px; border: 1px solid var(--border); max-width: 500px; margin: auto; }
        .coin-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; margin-bottom: 20px; }
        .coin-btn { background: #000; color: #fff; border: 1px solid var(--border); padding: 10px; border-radius: 8px; cursor: pointer; text-align: center; font-size: 11px; }
        .coin-btn.active { border-color: var(--primary); background: rgba(240, 185, 11, 0.1); }
        input { width: 100%; padding: 12px; margin: 10px 0; background: #000; border: 1px solid var(--border); color: #fff; border-radius: 8px; box-sizing: border-box; }
        .btn { width: 100%; padding: 15px; border: none; font-weight: bold; cursor: pointer; border-radius: 10px; margin-top: 10px; text-transform: uppercase; }
        #hList { margin-top: 20px; border-top: 1px solid var(--border); padding-top: 10px; }
        .h-item { background: #111; padding: 10px; margin-bottom: 5px; border-radius: 8px; display: flex; justify-content: space-between; font-size: 12px; border: 1px solid #222; }
    </style>
</head>
<body>

<div class="box">
    <h2 style="text-align:center; color:var(--primary); margin-bottom:20px;">SMAT AIRDROP</h2>
    
    <div class="coin-grid" id="cGrid"></div>

    <div id="statusInfo" style="display:none; text-align:center; margin-bottom:10px; color:var(--up); font-size:13px;">
        Selected: <span id="selCoin"></span> | Queue: <span id="qCount">0</span>
    </div>

    <input type="text" id="sid" placeholder="Target SMAT ID (e.g. SMAT100006)">
    <input type="number" id="amt" placeholder="Amount">
    
    <button class="btn" onclick="addToList()" style="background:var(--up); color:#000;">Add to List</button>
    <button id="sendBtn" class="btn" onclick="startAirdrop()" style="display:none; background:var(--primary); color:#000;">Send to All Users</button>
    
    <div id="hList"></div>
</div>

<script>
// আপনার সঠিক কনফিগারেশন
const firebaseConfig = {
    apiKey: "AIzaSyAMxtJedkehhxJRMPZLjhpKHqneHEWsGlE",
    authDomain: "smat-exchange.firebaseapp.com",
    databaseURL: "https://smat-exchange-default-rtdb.firebaseio.com",
    projectId: "smat-exchange",
    appId: "1:836334569396:web:679effe640b3453412d4e1"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.database();

let selectedCoin = null;
let airdropQueue = [];

// কয়েন লিস্ট দেখানো
function renderCoins() {
    const grid = document.getElementById('cGrid');
    grid.innerHTML = GLOBAL_COINS.map(c => `
        <div class="coin-btn ${selectedCoin === c.sym ? 'active' : ''}" onclick="setCoin('${c.sym}')">
            ${c.sym.toUpperCase()}
        </div>
    `).join('');
}
renderCoins();

function setCoin(sym) {
    selectedCoin = sym.toLowerCase();
    document.getElementById('statusInfo').style.display = 'block';
    document.getElementById('selCoin').innerText = sym.toUpperCase();
    renderCoins();
}

function addToList() {
    const id = document.getElementById('sid').value.trim();
    const val = parseFloat(document.getElementById('amt').value);
    if(!selectedCoin || !id || isNaN(val)) return alert("কয়েন সিলেক্ট করুন এবং সব তথ্য দিন!");

    airdropQueue.push({ id, val });
    document.getElementById('qCount').innerText = airdropQueue.length;
    document.getElementById('sendBtn').style.display = 'block';
    document.getElementById('sid').value = '';
    document.getElementById('amt').value = '';
}

async function startAirdrop() {
    const btn = document.getElementById('sendBtn');
    btn.disabled = true;
    btn.innerText = "Processing...";

    const balanceField = selectedCoin + "_balance"; // যেমন: usdt_balance
    const usersSnap = await db.ref('users').once('value');
    const users = usersSnap.val();

    if (!users) {
        alert("ইউজার পাওয়া যায়নি!");
        btn.disabled = false;
        return;
    }

    const currentQueue = [...airdropQueue];
    airdropQueue = [];
    document.getElementById('qCount').innerText = "0";

    for (let item of currentQueue) {
        let userKey = null;
        let oldBalance = 0;

        // আপনার সফল কোডের মতো smatID চেক
        for (let key in users) {
            if (users[key].smatID === item.id) {
                userKey = key;
                oldBalance = parseFloat(users[key][balanceField]) || 0;
                break;
            }
        }

        if (userKey) {
            // ১. সরাসরি ব্যালেন্স আপডেট (আপনার দেওয়া কোড অনুযায়ী)
            await db.ref(`users/${userKey}/${balanceField}`).set(oldBalance + item.val);
            
            // ২. হিস্ট্রিতে রেকর্ড রাখা
            await db.ref(`users/${userKey}/history`).push({
                method: 'Airdrop',
                coin: selectedCoin.toUpperCase(),
                amount: item.val,
                status: 'success',
                timestamp: Date.now()
            });
        }
    }

    // এডমিন লগ সেভ
    await db.ref('admin_airdrop_logs').push({
        coin: selectedCoin.toUpperCase(),
        totalUsers: currentQueue.length,
        time: Date.now()
    });

    alert("এয়ারড্রপ সফল হয়েছে!");
    btn.style.display = 'none';
    btn.disabled = false;
    btn.innerText = "Send to All Users";
}

// হিস্ট্রি লোড
db.ref('admin_airdrop_logs').limitToLast(5).on('value', s => {
    const data = s.val();
    if(!data) return;
    document.getElementById('hList').innerHTML = Object.keys(data).reverse().map(k => `
        <div class="h-item">
            <span>${data[k].coin}</span>
            <span>${data[k].totalUsers} Users</span>
            <span>${new Date(data[k].time).toLocaleTimeString()}</span>
        </div>
    `).join('');
});
</script>
</body>
</html>
