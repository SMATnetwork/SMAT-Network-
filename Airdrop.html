<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SMAT | Ultimate Stealth Airdrop</title>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-database-compat.js"></script>
    <script src="coin.js"></script>
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@700;900&display=swap" rel="stylesheet">
    
    <style>
        :root { --bg: #0b0e11; --card: #1e2329; --primary: #f0b90b; --up: #0ecb81; --down: #f6465d; --border: rgba(255, 255, 255, 0.1); }
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Montserrat', sans-serif; }
        body { background: var(--bg); color: white; padding-bottom: 50px; }
        header { height: 70px; background: var(--card); display: flex; align-items: center; justify-content: space-between; padding: 0 20px; border-bottom: 2px solid var(--primary); }
        .container { padding: 15px; max-width: 500px; margin: 0 auto; }
        .box { background: var(--card); border-radius: 15px; padding: 15px; margin-bottom: 15px; border: 1px solid var(--border); }
        .search-input { width: 100%; background: #000; border: 1px solid var(--border); color: #fff; padding: 12px; border-radius: 8px; margin-bottom: 10px; }
        .coin-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(80px, 1fr)); gap: 8px; max-height: 110px; overflow-y: auto; }
        .coin-item { background: #111418; padding: 10px; border-radius: 8px; text-align: center; cursor: pointer; font-size: 10px; border: 1px solid transparent; }
        .coin-item.active { border-color: var(--primary); background: rgba(240,185,11,0.1); }
        #summaryCard { background: linear-gradient(135deg, #2b2f36, #1e2329); border: 1px solid var(--primary); border-radius: 20px; padding: 20px; text-align: center; margin-bottom: 15px; display: none; }
        .stat-grid { display: flex; justify-content: space-around; margin: 15px 0; }
        .stat-val { font-size: 20px; color: var(--primary); font-weight: 900; }
        .send-btn { width: 100%; background: var(--primary); color: #000; border: none; padding: 15px; border-radius: 12px; font-weight: 900; cursor: pointer; }
        .input-row { display: flex; gap: 8px; }
        .input-row input { flex: 1; background: #000; border: 1px solid var(--border); color: white; padding: 14px; border-radius: 10px; font-weight: bold; }
        .add-btn { background: var(--up); color: #000; border: none; padding: 0 20px; border-radius: 10px; font-weight: 900; cursor: pointer; }
        .hist-item { background: var(--card); padding: 15px; border-radius: 15px; margin-bottom: 10px; display: flex; justify-content: space-between; align-items: center; border: 1px solid var(--border); cursor: pointer; }
        #modalOverlay { position: fixed; inset: 0; background: rgba(0,0,0,0.85); z-index: 1000; display: none; align-items: center; justify-content: center; padding: 20px; }
        .modal-content { background: var(--card); border-radius: 25px; width: 100%; max-width: 400px; height: 70vh; display: flex; flex-direction: column; border: 1px solid var(--primary); overflow: hidden; }
        .modal-header { padding: 20px; background: #2b2f36; display: flex; justify-content: space-between; border-bottom: 1px solid var(--border); }
        .modal-body { flex: 1; overflow-y: auto; padding: 20px; }
        #toast { position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%); background: var(--up); color: #000; padding: 12px 30px; border-radius: 30px; font-weight: 900; display: none; z-index: 2000; }
    </style>
</head>
<body>

    <header>
        <div style="font-weight: 900; color: var(--primary);">SMAT STEALTH</div>
        <i class="fas fa-power-off" onclick="auth.signOut()" style="color:var(--down); cursor:pointer;"></i>
    </header>

    <div class="container">
        <div class="box">
            <input type="text" class="search-input" id="cSearch" placeholder="🔍 Search Asset..." oninput="drawCoins()">
            <div class="coin-grid" id="cGrid"></div>
        </div>

        <div id="summaryCard">
            <div id="selCoinName" style="color:var(--primary); font-size:14px; font-weight:900;">-</div>
            <div class="stat-grid">
                <div><div class="stat-val" id="qUsers">0</div><div style="font-size:9px; color:#848e9c">USERS</div></div>
                <div><div class="stat-val" id="qAmount">0</div><div style="font-size:9px; color:#848e9c">TOTAL</div></div>
            </div>
            <button class="send-btn" id="sendBtn" onclick="processAirdrop()">EXECUTE SEND</button>
        </div>

        <div class="box">
            <div class="input-row">
                <input type="text" id="sid" placeholder="User SMAT ID">
                <input type="number" id="amt" placeholder="Amount">
                <button class="add-btn" onclick="addToQueue()"><i class="fas fa-plus"></i></button>
            </div>
        </div>

        <div id="historyList"></div>
    </div>

    <div id="modalOverlay" onclick="if(event.target==this) closeModal()">
        <div class="modal-content">
            <div class="modal-header">
                <div id="modalTitle" style="font-weight:900; color:var(--primary)">Distribution List</div>
                <i class="fas fa-times" onclick="closeModal()" style="cursor:pointer; color:var(--down)"></i>
            </div>
            <div class="modal-body" id="modalBody"></div>
        </div>
    </div>

    <div id="toast">PROCESS COMPLETED! ✅</div>

<script>
const firebaseConfig = {
    apiKey: "AIzaSyAMxtJedkehhxJRMPZLjhpKHqneHEWsGlE",
    authDomain: "smat-exchange.firebaseapp.com",
    databaseURL: "https://smat-exchange-default-rtdb.firebaseio.com",
    projectId: "smat-exchange",
    storageBucket: "smat-exchange.firebasestorage.app",
    messagingSenderId: "836334569396",
    appId: "1:836334569396:web:679effe640b3453412d4e1"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.database();
const auth = firebase.auth();

let activeCoin = null;
let stealthQueue = [];
let totalAmtCounter = 0;

auth.onAuthStateChanged(user => { if(user) { drawCoins(); loadHistory(); } });

function drawCoins() {
    const q = document.getElementById('cSearch').value.toLowerCase();
    if(typeof GLOBAL_COINS === 'undefined') return;
    const filtered = GLOBAL_COINS.filter(c => c.sym.toLowerCase().includes(q) || c.name.toLowerCase().includes(q));
    document.getElementById('cGrid').innerHTML = filtered.map(c => `
        <div class="coin-item ${activeCoin?.sym === c.sym.toLowerCase() ? 'active' : ''}" onclick="selectCoin('${c.sym}','${c.name}')">
            <b>${c.sym.toUpperCase()}</b>
        </div>
    `).join('');
}

function selectCoin(sym, name) {
    activeCoin = { sym: sym.toLowerCase(), name: name };
    document.getElementById('summaryCard').style.display = 'block';
    document.getElementById('selCoinName').innerText = `${name} (${sym.toUpperCase()})`;
    drawCoins();
}

function addToQueue() {
    const sid = document.getElementById('sid').value.trim();
    const val = parseFloat(document.getElementById('amt').value);
    if(!activeCoin || !sid || isNaN(val)) return;

    stealthQueue.push({ sid, val });
    totalAmtCounter += val;
    document.getElementById('qUsers').innerText = stealthQueue.length;
    document.getElementById('qAmount').innerText = totalAmtCounter.toFixed(2);
    document.getElementById('sid').value = ""; document.getElementById('amt').value = "";
}

// --- মূল ফিক্স: ব্যালেন্স অ্যাড করার লজিক ---
async function processAirdrop() {
    const btn = document.getElementById('sendBtn');
    btn.disabled = true;
    
    // ব্যালেন্স কি (Key) আপনার ইউজার প্যানেলের সাথে মিল রেখে
    const balanceField = activeCoin.sym + "_balance"; 
    const finalReport = [];
    const finalTotalUsers = stealthQueue.length;
    const finalTotalAmt = totalAmtCounter;

    try {
        const usersSnap = await db.ref('users').once('value');
        const allUsers = usersSnap.val();

        while(stealthQueue.length > 0) {
            const item = stealthQueue.shift();
            document.getElementById('qUsers').innerText = stealthQueue.length;
            btn.innerText = `SENDING (${stealthQueue.length})`;

            let targetUid = null;
            for(let uid in allUsers) {
                if(allUsers[uid].smatId && allUsers[uid].smatId.toString().toLowerCase() === item.sid.toLowerCase()) {
                    targetUid = uid; break;
                }
            }

            if(targetUid) {
                // ১. ব্যালেন্স আপডেট (সরাসরি পাথ ব্যবহার করা হয়েছে)
                const current = parseFloat(allUsers[targetUid][balanceField]) || 0;
                await db.ref(`users/${targetUid}/${balanceField}`).set(current + item.val);

                // ২. ইউজার হিস্ট্রি আপডেট
                await db.ref(`users/${targetUid}/history`).push({
                    method: 'Airdrop Reward',
                    coin: activeCoin.sym.toUpperCase(),
                    amount: item.val,
                    status: 'success',
                    timestamp: Date.now()
                });
                finalReport.push({ sid: item.sid, val: item.val });
            }
        }

        // ৩. অ্যাডমিন লগ সেভ (পপআপের জন্য)
        if(finalReport.length > 0) {
            await db.ref('stealth_airdrop_logs').push({
                coin: activeCoin.sym.toUpperCase(),
                totalUsers: finalReport.length,
                totalAmt: finalTotalAmt,
                timestamp: Date.now(),
                details: finalReport
            });
        }
        showToast();
        totalAmtCounter = 0;
    } catch (e) { alert(e.message); }
    finally { btn.disabled = false; btn.innerText = "EXECUTE SEND"; document.getElementById('summaryCard').style.display = 'none'; }
}

function loadHistory() {
    db.ref('stealth_airdrop_logs').limitToLast(15).on('value', snap => {
        const data = snap.val(); if(!data) return;
        document.getElementById('historyList').innerHTML = Object.keys(data).reverse().map(id => {
            const h = data[id];
            return `<div class="hist-item" onclick="showDetails('${id}')">
                <div><b>${h.coin}</b><br><small>${new Date(h.timestamp).toLocaleString()}</small></div>
                <div style="text-align:right"><b style="color:var(--up)">+${h.totalAmt}</b><br><small>${h.totalUsers} Persons</small></div>
            </div>`;
        }).join('');
    });
}

function showDetails(id) {
    const modal = document.getElementById('modalOverlay');
    document.getElementById('modalBody').innerHTML = "Loading...";
    modal.style.display = 'flex';
    db.ref(`stealth_airdrop_logs/${id}`).once('value', snap => {
        const h = snap.val();
        document.getElementById('modalTitle').innerText = h.coin + " List";
        document.getElementById('modalBody').innerHTML = h.details.map(d => `
            <div style="display:flex; justify-content:space-between; padding:10px 0; border-bottom:1px solid #333; font-size:12px;">
                <span>ID: ${d.sid}</span><span style="color:var(--primary)">+${d.val}</span>
            </div>`).join('');
    });
}

function closeModal() { document.getElementById('modalOverlay').style.display = 'none'; }
function showToast() { document.getElementById('toast').style.display = 'block'; setTimeout(()=>document.getElementById('toast').style.display='none',3000); }
</script>
</body>
</html>
