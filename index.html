<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SMAT HUB | Access</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --primary: #00ff88;
            --bg: #0b0e11;
            --card: #161a1e;
            --input: #1e2329;
            --text: #eaecef;
            --muted: #848e9c;
        }

        * { box-sizing: border-box; transition: 0.3s cubic-bezier(0.4, 0, 0.2, 1); }

        body {
            margin: 0;
            font-family: 'Segoe UI', Roboto, sans-serif;
            background: var(--bg);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            color: var(--text);
        }

        .auth-container {
            width: 92%;
            max-width: 400px;
            background: var(--card);
            padding: 40px 30px;
            border-radius: 24px;
            text-align: center;
            border: 1px solid rgba(255,255,255,0.05);
            box-shadow: 0 20px 40px rgba(0,0,0,0.4);
        }

        .brand {
            font-size: 28px;
            font-weight: 800;
            color: var(--primary);
            margin-bottom: 5px;
            text-transform: uppercase;
        }

        .subtitle { color: var(--muted); font-size: 14px; margin-bottom: 30px; }

        .group { text-align: left; margin-bottom: 20px; }
        label { display: block; font-size: 13px; margin-bottom: 8px; color: var(--muted); }

        .field-wrapper { position: relative; }

        input {
            width: 100%;
            padding: 15px;
            background: var(--input);
            border: 2px solid transparent;
            border-radius: 12px;
            color: white;
            font-size: 15px;
        }

        input:focus { border-color: var(--primary); outline: none; }

        .eye-btn {
            position: absolute;
            right: 15px;
            top: 50%;
            transform: translateY(-50%);
            cursor: pointer;
            color: var(--muted);
        }

        .pass-hint { font-size: 11px; margin-top: 5px; display: block; }

        button {
            width: 100%;
            padding: 16px;
            background: var(--primary);
            color: #000;
            border: none;
            border-radius: 12px;
            font-size: 16px;
            font-weight: 700;
            cursor: pointer;
            margin-top: 10px;
        }

        button:disabled { background: #474d57; color: #848e9c; cursor: not-allowed; }

        .footer { margin-top: 25px; display: flex; flex-direction: column; gap: 12px; }
        .toggle-link { color: var(--primary); cursor: pointer; font-weight: 600; font-size: 14px; }
        .forgot { color: var(--muted); font-size: 13px; cursor: pointer; }

        .msg {
            margin-top: 20px;
            padding: 12px;
            border-radius: 10px;
            font-size: 13px;
            display: none;
            background: rgba(255,255,255,0.03);
        }
    </style>
</head>
<body>

<div class="auth-container">
    <div class="brand">SMAT HUB</div>
    <p class="subtitle" id="subtitle">Log in to your SMAT account</p>

    <div class="group">
        <label>Email Address</label>
        <input type="email" id="email" placeholder="email@example.com">
    </div>

    <div class="group">
        <label>Password <span id="passStatus" class="pass-hint"></span></label>
        <div class="field-wrapper">
            <input type="password" id="password" placeholder="••••••••" oninput="validatePassword()">
            <i class="fa-solid fa-eye eye-btn" id="eyeIcon" onclick="togglePasswordVisibility()"></i>
        </div>
    </div>

    <button id="btn" onclick="handleAuth()">Login</button>

    <div id="message" class="msg"></div>

    <div class="footer">
        <div class="toggle-link" id="toggleLink" onclick="toggleForm()">Create account</div>
        <div class="forgot" onclick="resetPass()">Forgot password?</div>
    </div>
</div>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
  import { getAuth, createUserWithEmailAndPassword, signInWithEmailAndPassword, sendEmailVerification, sendPasswordResetEmail } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
  import { getDatabase, ref, set, get, runTransaction } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

  const firebaseConfig = {
    apiKey: "AIzaSyAMxtJedkehhxJRMPZLjhpKHqneHEWsGlE",
    authDomain: "smat-exchange.firebaseapp.com",
    projectId: "smat-exchange",
    storageBucket: "smat-exchange.firebasestorage.app",
    messagingSenderId: "836334569396",
    appId: "1:836334569396:web:679effe640b3453412d4e1",
    measurementId: "G-FCE3H3F18V"
  };

  const app = initializeApp(firebaseConfig);
  const auth = getAuth(app);
  const db = getDatabase(app);

  let isLogin = true;
  const urlParams = new URLSearchParams(window.location.search);
  const referralID = urlParams.get('ref') || null;

  // --- পাসওয়ার্ড দেখা/লুকানোর ফাংশন ---
  window.togglePasswordVisibility = () => {
    const passInput = document.getElementById('password');
    const eyeIcon = document.getElementById('eyeIcon');
    if (passInput.type === 'password') {
        passInput.type = 'text';
        eyeIcon.classList.replace('fa-eye', 'fa-eye-slash');
    } else {
        passInput.type = 'password';
        eyeIcon.classList.replace('fa-eye-slash', 'fa-eye');
    }
  };

  // --- ভ্যালিডেশন ---
  window.validatePassword = () => {
    const pass = document.getElementById('password').value;
    const status = document.getElementById('passStatus');
    const submitBtn = document.getElementById('btn');
    const regex = /^(?=.*[A-Za-z])(?=.*\d)[A-Za-z\d]{8,}$/;

    if (pass === "") { status.innerText = ""; submitBtn.disabled = false; return; }

    if (regex.test(pass)) {
        status.innerText = "✓ Strong";
        status.style.color = "#00ff88";
        submitBtn.disabled = false;
    } else {
        status.innerText = "Min 8 chars, Letter & Number";
        status.style.color = "#ff4d4d";
        if(!isLogin) submitBtn.disabled = true;
    }
  };

  // --- ফর্ম টগল (Login/Register) ---
  window.toggleForm = () => {
    isLogin = !isLogin;
    document.getElementById('subtitle').innerText = isLogin ? "Log in to your SMAT account" : "Join the SMAT ecosystem today";
    document.getElementById('btn').innerText = isLogin ? "Login" : "Create Account";
    document.getElementById('toggleLink').innerText = isLogin ? "Create account" : "Already have an account? Sign In";
    document.getElementById('message').style.display = "none";
    document.getElementById('passStatus').innerText = "";
    document.getElementById('btn').disabled = false;
  };

  const generateSmatID = async () => {
    const counterRef = ref(db, 'counters/lastSmatId');
    const result = await runTransaction(counterRef, (currentValue) => {
      return (currentValue || 100000) + 1;
    });
    return "SMAT" + result.snapshot.val();
  };

  // --- মেইন অথেনটিকেশন ফাংশন ---
  window.handleAuth = async () => {
    const email = document.getElementById('email').value;
    const pass = document.getElementById('password').value;
    const msgBox = document.getElementById('message');
    
    if(!email || !pass) return alert("Please fill all fields");

    msgBox.style.display = "block";
    msgBox.style.color = "white";
    msgBox.innerText = "Processing...";

    try {
      if (isLogin) {
        const userCredential = await signInWithEmailAndPassword(auth, email, pass);
        if (userCredential.user.emailVerified) {
          const userSnapshot = await get(ref(db, 'users/' + userCredential.user.uid));
          if(userSnapshot.exists()) localStorage.setItem('smatID', userSnapshot.val().smatID);
          
          localStorage.setItem('isLoggedIn', 'true');
          localStorage.setItem('userEmail', email);
          window.location.href = "home.html"; 
        } else {
          msgBox.style.color = "#f3ba2f";
          msgBox.innerText = "Please verify your email first!";
        }
      } else {
        const userCredential = await createUserWithEmailAndPassword(auth, email, pass);
        const newUser = userCredential.user;
        const newSmatID = await generateSmatID();

        await set(ref(db, 'users/' + newUser.uid), {
          email: email,
          smatID: newSmatID,
          kycStatus: 'unverified',
          referredBy: referralID,
          createdAt: new Date().toISOString()
        });

        await sendEmailVerification(newUser);
        msgBox.style.color = "#00ff88";
        msgBox.innerText = "Verification link sent! Check Gmail.";
      }
    } catch (e) {
      msgBox.style.color = "#ff4d4d";
      msgBox.innerText = e.message;
    }
  };

  window.resetPass = async () => {
    const email = document.getElementById('email').value;
    if(!email) return alert("Enter email first.");
    try {
        await sendPasswordResetEmail(auth, email);
        alert("Password reset link sent to your email!");
    } catch (e) { alert(e.message); }
  };
</script>

</body>
</html>
