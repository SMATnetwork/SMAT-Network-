<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SMAT EXCHANGE | Access</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --primary: #00ff88;
            --bg: #07090b;
            --card: rgba(22, 26, 30, 0.95);
            --input: #1e2329;
            --text: #eaecef;
            --muted: #848e9c;
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

        body {
            margin: 0;
            font-family: 'Segoe UI', Roboto, sans-serif;
            background: var(--bg);
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            position: relative;
        }

        /* --- Live Animated Background (Blurry Coins) --- */
        .live-bg {
            position: absolute;
            width: 100%;
            height: 100%;
            z-index: 1;
            filter: blur(60px);
            opacity: 0.4;
            pointer-events: none;
        }

        .coin-float {
            position: absolute;
            font-weight: bold;
            font-size: 20px;
            animation: float 15s infinite linear;
        }

        @keyframes float {
            0% { transform: translateY(100vh) translateX(0); }
            100% { transform: translateY(-100px) translateX(50px); }
        }

        /* --- Auth Card --- */
        .auth-container {
            position: relative;
            width: 90%;
            max-width: 420px;
            background: var(--card);
            padding: 40px 30px;
            border-radius: 32px;
            text-align: center;
            border: 1px solid rgba(0, 255, 136, 0.1);
            box-shadow: 0 0 40px rgba(0, 255, 136, 0.05);
            z-index: 10;
            backdrop-filter: blur(10px);
        }

        .logo { width: 70px; margin-bottom: 15px; }

        .brand-header {
            font-size: 26px;
            font-weight: 800;
            color: white;
            letter-spacing: 1.5px;
            margin-bottom: 5px;
        }

        .brand-header span { color: var(--primary); }

        .subtitle { color: var(--muted); font-size: 13px; margin-bottom: 35px; }

        .group { text-align: left; margin-bottom: 22px; }
        label { display: block; font-size: 12px; margin-bottom: 8px; color: var(--muted); text-transform: uppercase; letter-spacing: 1px; }

        .field-wrapper { position: relative; }

        input {
            width: 100%;
            padding: 16px;
            background: var(--input);
            border: 1.5px solid transparent;
            border-radius: 16px;
            color: white;
            font-size: 15px;
            transition: all 0.3s;
        }

        input:focus { border-color: var(--primary); background: #161a1e; outline: none; }

        .eye-btn {
            position: absolute; right: 15px; top: 50%; transform: translateY(-50%);
            cursor: pointer; color: var(--muted); padding: 5px;
        }

        /* --- Premium Authenticate Button --- */
        #btn {
            width: 100%;
            padding: 18px;
            background: var(--primary);
            color: #000;
            border: none;
            border-radius: 16px;
            font-size: 16px;
            font-weight: 800;
            cursor: pointer;
            margin-top: 10px;
            box-shadow: 0 10px 25px rgba(0, 255, 136, 0.2);
            transition: 0.3s;
        }

        #btn:hover { transform: translateY(-2px); filter: brightness(1.1); }

        .footer { margin-top: 30px; border-top: 1px solid rgba(255,255,255,0.05); padding-top: 20px; }
        .toggle-link { color: var(--primary); cursor: pointer; font-weight: 600; font-size: 14px; }
        .forgot { color: var(--muted); font-size: 13px; cursor: pointer; display: block; margin-top: 15px; }

        /* --- Toast Notification --- */
        #toast {
            position: fixed; top: -100px; left: 50%; transform: translateX(-50%);
            background: #1e2329; color: white; padding: 15px 30px; border-radius: 14px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.6); z-index: 1000; transition: 0.5s;
            display: flex; align-items: center; gap: 12px; border: 1px solid rgba(255,255,255,0.1);
        }
        #toast.active { top: 30px; }
    </style>
</head>
<body>

    <div class="live-bg" id="liveBg"></div>

    <div id="toast">
        <i id="toastIcon" class="fa-solid fa-circle-check" style="color: var(--primary);"></i>
        <span id="toastMsg">Success message</span>
    </div>

    <div class="auth-container">
        <img src="assets/logos/smat.png" alt="SMAT" class="logo">
        <div class="brand-header">SMAT <span>EXCHANGE</span></div>
        <p class="subtitle" id="subtitle">Securely log in to your trading account</p>

        <div class="group">
            <label>Email Address</label>
            <input type="email" id="email" placeholder="email@example.com">
        </div>

        <div class="group">
            <label>Password <span id="passStatus" style="float: right;"></span></label>
            <div class="field-wrapper">
                <input type="password" id="password" placeholder="••••••••" oninput="validatePassword()">
                <i class="fa-solid fa-eye eye-btn" id="eyeIcon" onclick="togglePass()"></i>
            </div>
        </div>

        <button id="btn" onclick="handleAuth()">LOGIN</button>

        <div class="footer">
            <span style="color: var(--muted); font-size: 14px;">New to SMAT?</span> 
            <span class="toggle-link" id="toggleLink" onclick="toggleForm()">Create account</span>
            <span class="forgot" onclick="resetPass()">Lost your password?</span>
        </div>
    </div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getAuth, createUserWithEmailAndPassword, signInWithEmailAndPassword, sendEmailVerification, sendPasswordResetEmail } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
    import { getDatabase, ref, set, get, runTransaction } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

    const firebaseConfig = {
        apiKey: "AIzaSyAMxtJedkehhxJRMPZLjhpKHqneHEWsGlE",
        authDomain: "smat-exchange.firebaseapp.com",
        projectId: "smat-exchange",
        storageBucket: "smat-exchange.firebasestorage.app",
        messagingSenderId: "836334569396",
        appId: "1:836334569396:web:679effe640b3453412d4e1"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getDatabase(app);

    let isLogin = true;

    // --- Create Live Coin Graphics ---
    const liveBg = document.getElementById('liveBg');
    const coins = ['BTC $64,231.20 ↑', 'ETH $3,452.11 ↓', 'SMAT $1.42 ↑', 'BNB $592.40 ↑', 'SOL $145.22 ↓'];
    
    function createLiveCoins() {
        coins.forEach((text, i) => {
            let div = document.createElement('div');
            div.className = 'coin-float';
            div.innerText = text;
            div.style.left = Math.random() * 80 + '%';
            div.style.top = Math.random() * 100 + '%';
            div.style.color = text.includes('↑') ? '#00ff88' : '#ff4d4d';
            div.style.animationDelay = (i * 2) + 's';
            liveBg.appendChild(div);
        });
    }
    createLiveCoins();

    // --- Functional Logics ---
    window.showToast = (msg, type="success") => {
        const toast = document.getElementById('toast');
        document.getElementById('toastMsg').innerText = msg;
        document.getElementById('toastIcon').className = type === "error" ? "fa-solid fa-circle-xmark" : "fa-solid fa-circle-check";
        document.getElementById('toastIcon').style.color = type === "error" ? "#ff4d4d" : "#00ff88";
        toast.classList.add('active');
        setTimeout(() => toast.classList.remove('active'), 3000);
    };

    window.togglePass = () => {
        const p = document.getElementById('password');
        const i = document.getElementById('eyeIcon');
        p.type = p.type === 'password' ? 'text' : 'password';
        i.classList.toggle('fa-eye-slash');
    };

    window.validatePassword = () => {
        const pass = document.getElementById('password').value;
        const status = document.getElementById('passStatus');
        const regex = /^(?=.*[A-Za-z])(?=.*\d)[A-Za-z\d]{8,}$/;
        if(!isLogin) {
            status.innerText = regex.test(pass) ? "✓ Strong" : "Invalid";
            status.style.color = regex.test(pass) ? "#00ff88" : "#ff4d4d";
            document.getElementById('btn').disabled = !regex.test(pass);
        }
    };

    window.toggleForm = () => {
        isLogin = !isLogin;
        document.getElementById('subtitle').innerText = isLogin ? "Securely log in to your trading account" : "Join the world's most secure exchange";
        document.getElementById('btn').innerText = isLogin ? "LOGIN" : "REGISTER";
        document.getElementById('toggleLink').innerText = isLogin ? "Create account" : "Sign In";
        document.getElementById('passStatus').innerText = "";
    };

    window.handleAuth = async () => {
        const email = document.getElementById('email').value;
        const pass = document.getElementById('password').value;
        if(!email || !pass) return showToast("Enter all details!", "error");

        showToast("Processing...");

        try {
            if (isLogin) {
                const res = await signInWithEmailAndPassword(auth, email, pass);
                if (res.user.emailVerified) {
                    window.location.href = "home.html";
                } else {
                    showToast("Please verify email!", "error");
                }
            } else {
                const res = await createUserWithEmailAndPassword(auth, email, pass);
                await sendEmailVerification(res.user);
                showToast("Verification link sent!");
            }
        } catch (e) {
            showToast(e.message, "error");
        }
    };

    window.resetPass = async () => {
        const email = document.getElementById('email').value;
        if(!email) return showToast("Enter email first!", "error");
        try {
            await sendPasswordResetEmail(auth, email);
            showToast("Reset link sent to Gmail!");
        } catch (e) { showToast(e.message, "error"); }
    };
</script>
</body>
</html>
