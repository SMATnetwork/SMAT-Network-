<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SMAT HUB | Access</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --primary: #00ff88;
            --primary-dark: #00cc6d;
            --bg: #0b0e11;
            --card: #161a1e;
            --input: #1e2329;
            --text: #eaecef;
            --muted: #848e9c;
        }

        * { box-sizing: border-box; font-family: 'Segoe UI', system-ui, sans-serif; }

        body {
            margin: 0;
            background: var(--bg);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            color: var(--text);
            overflow: hidden;
        }

        /* --- Auth Card Design --- */
        .auth-container {
            width: 90%;
            max-width: 400px;
            background: var(--card);
            padding: 40px 25px;
            border-radius: 30px;
            text-align: center;
            border: 1px solid rgba(255,255,255,0.05);
            box-shadow: 0 25px 50px rgba(0,0,0,0.5);
            z-index: 10;
        }

        .brand {
            font-size: 32px;
            font-weight: 900;
            color: var(--primary);
            letter-spacing: 1px;
            margin-bottom: 8px;
            text-transform: uppercase;
        }

        .subtitle { color: var(--muted); font-size: 14px; margin-bottom: 35px; }

        .group { text-align: left; margin-bottom: 22px; position: relative; }
        
        label { 
            display: flex; 
            justify-content: space-between;
            font-size: 13px; 
            margin-bottom: 8px; 
            color: var(--muted); 
            padding-left: 5px;
        }

        .field-wrapper { position: relative; }

        input {
            width: 100%;
            padding: 16px 18px;
            background: var(--input);
            border: 1.5px solid transparent;
            border-radius: 14px;
            color: white;
            font-size: 15px;
            transition: 0.2s;
        }

        input:focus { border-color: var(--primary); outline: none; background: #1a1f24; }

        .eye-btn {
            position: absolute;
            right: 15px;
            top: 50%;
            transform: translateY(-50%);
            cursor: pointer;
            color: var(--muted);
            padding: 5px;
        }

        /* --- Premium Button --- */
        #btn {
            width: 100%;
            padding: 16px;
            background: var(--primary);
            color: #000;
            border: none;
            border-radius: 14px;
            font-size: 16px;
            font-weight: 800;
            cursor: pointer;
            margin-top: 10px;
            box-shadow: 0 8px 20px rgba(0, 255, 136, 0.15);
        }

        #btn:active { transform: scale(0.98); }
        #btn:disabled { background: #2b3139; color: #5e6673; cursor: not-allowed; box-shadow: none; }

        .footer { margin-top: 30px; }
        
        .toggle-link { 
            color: var(--primary); 
            cursor: pointer; 
            font-weight: 600; 
            font-size: 15px;
            display: inline-block;
        }

        .forgot { 
            color: var(--muted); 
            font-size: 13px; 
            cursor: pointer; 
            margin-top: 20px;
            display: block;
            text-decoration: none;
        }

        /* --- Custom Toast Notification --- */
        #toast {
            position: fixed;
            top: -100px;
            left: 50%;
            transform: translateX(-50%);
            background: #1e2329;
            color: white;
            padding: 15px 25px;
            border-radius: 12px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            border-left: 4px solid var(--primary);
            z-index: 1000;
            transition: top 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            display: flex;
            align-items: center;
            gap: 10px;
            min-width: 280px;
        }

        #toast.show { top: 30px; }
        #toast.error { border-left-color: #ff4d4d; }
    </style>
</head>
<body>

<div id="toast">
    <i id="toastIcon" class="fa-solid fa-circle-info"></i>
    <span id="toastMsg">Notification message</span>
</div>

<div class="auth-container">
    <div class="brand">SMAT HUB</div>
    <p class="subtitle" id="subtitle">Log in to your SMAT account</p>

    <div class="group">
        <label>Email Address</label>
        <input type="email" id="email" placeholder="email@example.com">
    </div>

    <div class="group">
        <label>
            Password 
            <span id="passStatus" style="font-size: 11px;"></span>
        </label>
        <div class="field-wrapper">
            <input type="password" id="password" placeholder="••••••••" oninput="validatePassword()">
            <i class="fa-solid fa-eye eye-btn" id="eyeIcon" onclick="togglePasswordVisibility()"></i>
        </div>
    </div>

    <button id="btn" onclick="handleAuth()">Login</button>

    <div class="footer">
        <div class="toggle-link" id="toggleLink" onclick="toggleForm()">Create account</div>
        <a class="forgot" onclick="resetPass()">Forgot password?</a>
    </div>
</div>

<script type="module">
  // --- Firebase Config & Imports ---
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
  import { getAuth, createUserWithEmailAndPassword, signInWithEmailAndPassword, sendEmailVerification, sendPasswordResetEmail } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
  import { getDatabase, ref, set, get, runTransaction } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

  const firebaseConfig = {
    apiKey: "AIzaSyAMxtJedkehhxJRMPZLjhpKHqneHEWsGlE",
    authDomain: "smat-exchange.firebaseapp.com",
    projectId: "smat-exchange",
    storageBucket: "smat-exchange.firebasestorage.app",
    messagingSenderId: "836334569396",
    appId: "1:836334569396:web:679effe640b3453412d4e1",
    measurementId: "G-FCE3H3F18V"
  };

  const app = initializeApp(firebaseConfig);
  const auth = getAuth(app);
  const db = getDatabase(app);

  let isLogin = true;
  const urlParams = new URLSearchParams(window.location.search);
  const referralID = urlParams.get('ref') || null;

  // --- Premium Toast Function ---
  window.showToast = (message, type = "success") => {
    const toast = document.getElementById('toast');
    const msg = document.getElementById('toastMsg');
    const icon = document.getElementById('toastIcon');
    
    msg.innerText = message;
    toast.className = type === "error" ? "show error" : "show";
    icon.className = type === "error" ? "fa-solid fa-triangle-exclamation" : "fa-solid fa-circle-check";
    icon.style.color = type === "error" ? "#ff4d4d" : "#00ff88";

    setTimeout(() => { toast.classList.remove('show'); }, 3000);
  };

  window.togglePasswordVisibility = () => {
    const passInput = document.getElementById('password');
    const eyeIcon = document.getElementById('eyeIcon');
    const isPass = passInput.type === 'password';
    passInput.type = isPass ? 'text' : 'password';
    eyeIcon.classList.toggle('fa-eye', !isPass);
    eyeIcon.classList.toggle('fa-eye-slash', isPass);
  };

  window.validatePassword = () => {
    const pass = document.getElementById('password').value;
    const status = document.getElementById('passStatus');
    const submitBtn = document.getElementById('btn');
    const regex = /^(?=.*[A-Za-z])(?=.*\d)[A-Za-z\d]{8,}$/;

    if (pass === "") { status.innerText = ""; return; }

    if (regex.test(pass)) {
        status.innerText = "✓ Strong";
        status.style.color = "#00ff88";
        submitBtn.disabled = false;
    } else {
        status.innerText = "Min 8 chars (Letter+Num)";
        status.style.color = "#ff4d4d";
        if(!isLogin) submitBtn.disabled = true;
    }
  };

  window.toggleForm = () => {
    isLogin = !isLogin;
    document.getElementById('subtitle').innerText = isLogin ? "Log in to your SMAT account" : "Join the SMAT ecosystem today";
    document.getElementById('btn').innerText = isLogin ? "Login" : "Create Account";
    document.getElementById('toggleLink').innerText = isLogin ? "Create account" : "Already have an account? Sign In";
    document.getElementById('passStatus').innerText = "";
    document.getElementById('btn').disabled = false;
  };

  window.handleAuth = async () => {
    const email = document.getElementById('email').value;
    const pass = document.getElementById('password').value;
    
    if(!email || !pass) return showToast("Fields cannot be empty!", "error");

    showToast("Processing request...");

    try {
      if (isLogin) {
        const userCredential = await signInWithEmailAndPassword(auth, email, pass);
        if (userCredential.user.emailVerified) {
          const userSnapshot = await get(ref(db, 'users/' + userCredential.user.uid));
          if(userSnapshot.exists()) localStorage.setItem('smatID', userSnapshot.val().smatID);
          localStorage.setItem('isLoggedIn', 'true');
          window.location.href = "home.html"; 
        } else {
            showToast("Verify email first!", "error");
        }
      } else {
        const userCredential = await createUserWithEmailAndPassword(auth, email, pass);
        const newSmatID = "SMAT" + Math.floor(100000 + Math.random() * 900000); // Simple ID for now
        await set(ref(db, 'users/' + userCredential.user.uid), {
          email, smatID: newSmatID, kycStatus: 'unverified', referredBy: referralID, createdAt: new Date().toISOString()
        });
        await sendEmailVerification(userCredential.user);
        showToast("Verification link sent!");
      }
    } catch (e) {
      showToast(e.message, "error");
    }
  };

  window.resetPass = async () => {
    const email = document.getElementById('email').value;
    if(!email) return showToast("Enter email first!", "error");
    try {
        await sendPasswordResetEmail(auth, email);
        showToast("Password reset link sent!");
    } catch (e) { showToast(e.message, "error"); }
  };
</script>

</body>
</html>
