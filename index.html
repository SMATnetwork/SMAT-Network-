<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SMAT EXCHANGE | Secure Access</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --primary: #00ff88;
            --bg-deep: #050708;
            --card-glass: rgba(18, 22, 28, 0.9);
            --input-fill: #1a1f24;
            --text-main: #ffffff;
            --text-dim: #848e9c;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', sans-serif; }

        body {
            background-color: var(--bg-deep);
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            position: relative;
        }

        /* --- জীবন্ত কয়েন গ্রাফিক্স (Blurred Floating Data) --- */
        .live-data-bg {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            z-index: 0;
            overflow: hidden;
        }

        .ticker-item {
            position: absolute;
            white-space: nowrap;
            font-family: monospace;
            font-weight: bold;
            font-size: 1.2rem;
            opacity: 0.3;
            filter: blur(2px);
            animation: moveUp 12s infinite linear;
            pointer-events: none;
        }

        @keyframes moveUp {
            0% { transform: translateY(110vh); }
            100% { transform: translateY(-20vh); }
        }

        /* --- Auth Card --- */
        .auth-card {
            position: relative;
            z-index: 10;
            width: 90%;
            max-width: 420px;
            background: var(--card-glass);
            padding: 40px 30px;
            border-radius: 28px;
            border: 1px solid rgba(255, 255, 255, 0.08);
            box-shadow: 0 30px 60px rgba(0,0,0,0.6), 0 0 20px rgba(0, 255, 136, 0.05);
            backdrop-filter: blur(15px);
            text-align: center;
        }

        /* Logo Border Radius Fix */
        .logo-box {
            width: 85px;
            height: 85px;
            margin: 0 auto 20px;
            background: #fff;
            border-radius: 50%; /* লগো গোল করার জন্য */
            overflow: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 0 20px rgba(0, 255, 136, 0.2);
            border: 2px solid var(--primary);
        }

        .logo-box img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .brand-name {
            font-size: 24px;
            font-weight: 800;
            color: #fff;
            margin-bottom: 5px;
            letter-spacing: 1px;
        }

        .brand-name span { color: var(--primary); }

        .subtitle { color: var(--text-dim); font-size: 14px; margin-bottom: 35px; }

        /* Input Styles */
        .input-group { text-align: left; margin-bottom: 22px; }
        label { display: block; font-size: 12px; color: var(--text-dim); margin-bottom: 8px; text-transform: uppercase; font-weight: 600; }

        .input-wrapper { position: relative; }
        
        input {
            width: 100%;
            padding: 16px;
            background: var(--input-fill);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 14px;
            color: #fff;
            font-size: 15px;
            transition: 0.3s ease;
        }

        input:focus { border-color: var(--primary); outline: none; background: #22282e; box-shadow: 0 0 10px rgba(0, 255, 136, 0.1); }

        .eye-icon {
            position: absolute; right: 15px; top: 50%; transform: translateY(-50%);
            color: var(--text-dim); cursor: pointer; padding: 5px;
        }

        /* Button */
        #mainBtn {
            width: 100%;
            padding: 16px;
            background: var(--primary);
            color: #050708;
            border: none;
            border-radius: 14px;
            font-size: 16px;
            font-weight: 800;
            cursor: pointer;
            text-transform: uppercase;
            margin-top: 10px;
            transition: 0.3s;
        }

        #mainBtn:hover { filter: brightness(1.1); transform: translateY(-2px); box-shadow: 0 10px 20px rgba(0, 255, 136, 0.2); }

        .form-footer { margin-top: 30px; border-top: 1px solid rgba(255,255,255,0.05); padding-top: 20px; }
        .toggle-btn { color: var(--primary); cursor: pointer; font-weight: 600; font-size: 14px; }
        .forgot-link { color: var(--text-dim); font-size: 13px; cursor: pointer; display: block; margin-top: 12px; text-decoration: none; }

        /* Custom Toast */
        #customToast {
            position: fixed; top: -100px; left: 50%; transform: translateX(-50%);
            background: #1e2329; color: white; padding: 15px 25px; border-radius: 12px;
            z-index: 9999; transition: 0.5s cubic-bezier(0.18, 0.89, 0.32, 1.28);
            border-bottom: 3px solid var(--primary); display: flex; align-items: center; gap: 10px;
        }
        #customToast.show { top: 25px; }

        /* Responsive Adjustments */
        @media (max-width: 480px) {
            .auth-card { padding: 30px 20px; }
            .brand-name { font-size: 20px; }
        }
    </style>
</head>
<body>

<div id="customToast">
    <i class="fa-solid fa-circle-info"></i>
    <span id="toastText">Message here</span>
</div>

<div class="live-data-bg" id="dataStream"></div>

<div class="auth-card">
    <div class="logo-box">
        <img src="assets/logos/smat.png" alt="SMAT LOGO">
    </div>
    <div class="brand-name">SMAT <span>EXCHANGE</span></div>
    <p class="subtitle" id="subText">Secure access to your digital assets</p>

    <div class="input-group">
        <label>Email Address</label>
        <input type="email" id="email" placeholder="example@gmail.com">
    </div>

    <div class="input-group">
        <label>Password</label>
        <div class="input-wrapper">
            <input type="password" id="password" placeholder="••••••••" oninput="validatePass()">
            <i class="fa-solid fa-eye eye-icon" id="toggleEye" onclick="togglePassView()"></i>
        </div>
    </div>

    <button id="mainBtn" onclick="handleAuth()">LOGIN</button>

    <div class="form-footer">
        <span style="color: var(--text-dim); font-size: 14px;">Not a member?</span>
        <span class="toggle-btn" id="toggleLink" onclick="switchForm()">Create Account</span>
        <a class="forgot-link" onclick="triggerReset()">Forgot Password?</a>
    </div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getAuth, createUserWithEmailAndPassword, signInWithEmailAndPassword, sendEmailVerification, sendPasswordResetEmail } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
    import { getDatabase, ref, set, get, runTransaction } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

    const firebaseConfig = {
        apiKey: "AIzaSyAMxtJedkehhxJRMPZLjhpKHqneHEWsGlE",
        authDomain: "smat-exchange.firebaseapp.com",
        projectId: "smat-exchange",
        storageBucket: "smat-exchange.firebasestorage.app",
        messagingSenderId: "836334569396",
        appId: "1:836334569396:web:679effe640b3453412d4e1"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getDatabase(app);

    // --- Live Ticker Graphics Logic ---
    const stream = document.getElementById('dataStream');
    const coins = ['BTC $64,302 ↑', 'ETH $3,420 ↓', 'SMAT $1.42 ↑', 'BNB $590 ↓', 'SOL $145 ↑', 'XRP $0.62 ↓'];
    
    function initTicker() {
        for(let i=0; i<15; i++) {
            let el = document.createElement('div');
            el.className = 'ticker-item';
            let coin = coins[Math.floor(Math.random()*coins.length)];
            el.innerText = coin;
            el.style.left = Math.random() * 90 + '%';
            el.style.animationDelay = (Math.random() * 10) + 's';
            el.style.color = coin.includes('↑') ? '#00ff88' : '#ff4d4d';
            stream.appendChild(el);
        }
    }
    initTicker();

    // --- Logic Functions ---
    window.alertToast = (msg) => {
        const t = document.getElementById('customToast');
        document.getElementById('toastText').innerText = msg;
        t.classList.add('show');
        setTimeout(() => t.classList.remove('show'), 3000);
    };

    window.togglePassView = () => {
        const p = document.getElementById('password');
        const e = document.getElementById('toggleEye');
        p.type = p.type === 'password' ? 'text' : 'password';
        e.classList.toggle('fa-eye-slash');
    };

    let isLogin = true;
    window.switchForm = () => {
        isLogin = !isLogin;
        document.getElementById('mainBtn').innerText = isLogin ? "LOGIN" : "REGISTER";
        document.getElementById('subText').innerText = isLogin ? "Secure access to your digital assets" : "Join the future of exchange";
        document.getElementById('toggleLink').innerText = isLogin ? "Create Account" : "Already have an account? Login";
    };

    window.handleAuth = async () => {
        const email = document.getElementById('email').value;
        const pass = document.getElementById('password').value;
        if(!email || !pass) return alertToast("Please fill all fields!");

        alertToast("Processing...");
        try {
            if(isLogin) {
                const res = await signInWithEmailAndPassword(auth, email, pass);
                if(res.user.emailVerified) window.location.href = "home.html";
                else alertToast("Verify your email first!");
            } else {
                const res = await createUserWithEmailAndPassword(auth, email, pass);
                await sendEmailVerification(res.user);
                alertToast("Verification link sent!");
            }
        } catch(e) { alertToast(e.message); }
    };

    window.triggerReset = async () => {
        const email = document.getElementById('email').value;
        if(!email) return alertToast("Enter email first!");
        try {
            await sendPasswordResetEmail(auth, email);
            alertToast("Reset link sent!");
        } catch(e) { alertToast(e.message); }
    };
</script>
</body>
</html>
