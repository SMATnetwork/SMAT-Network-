<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SMAT HUB | Authentication</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --primary-green: #00ff88;
            --bg-dark: #0b0e11;
            --card-bg: #161a1e;
            --input-bg: #1e2329;
            --text-gray: #848e9c;
            --text-white: #eaecef;
        }

        body {
            margin: 0;
            padding: 0;
            font-family: 'Inter', 'Segoe UI', sans-serif;
            background-color: var(--bg-dark);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            color: var(--text-white);
        }

        .auth-card {
            width: 90%;
            max-width: 400px;
            background: var(--card-bg);
            padding: 40px 30px;
            border-radius: 28px;
            box-shadow: 0 20px 50px rgba(0,0,0,0.5);
            text-align: center;
            border: 1px solid rgba(255, 255, 255, 0.05);
        }

        .brand-title {
            font-size: 32px;
            font-weight: 800;
            color: var(--primary-green);
            margin-bottom: 30px;
            letter-spacing: 1px;
            text-transform: uppercase;
        }

        .input-group {
            position: relative;
            margin-bottom: 20px;
            text-align: left;
        }

        .input-group label {
            display: block;
            font-size: 14px;
            color: var(--text-gray);
            margin-bottom: 8px;
            margin-left: 5px;
        }

        .input-wrapper {
            position: relative;
        }

        input {
            width: 100%;
            padding: 16px 18px;
            background: var(--input-bg);
            border: 2px solid transparent;
            border-radius: 15px;
            color: white;
            font-size: 15px;
            box-sizing: border-box;
            transition: 0.3s;
        }

        input:focus {
            border-color: var(--primary-green);
            outline: none;
        }

        /* Eye Icon Styling */
        .toggle-password {
            position: absolute;
            right: 15px;
            top: 50%;
            transform: translateY(-50%);
            cursor: pointer;
            color: var(--text-gray);
        }

        /* Password Validation Styles */
        .validation-box {
            font-size: 12px;
            margin-top: 8px;
            display: none;
        }
        .valid { color: var(--primary-green); }
        .invalid { color: #ff4d4d; }

        .btn-auth {
            width: 100%;
            padding: 16px;
            background: var(--primary-green);
            color: #000;
            border: none;
            border-radius: 15px;
            font-size: 16px;
            font-weight: 800;
            cursor: pointer;
            text-transform: uppercase;
            margin-top: 10px;
            transition: 0.3s;
        }

        .btn-auth:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(0, 255, 136, 0.3);
            filter: brightness(1.1);
        }

        .btn-auth:disabled {
            background: #474d57;
            cursor: not-allowed;
            transform: none;
        }

        .footer-nav {
            margin-top: 25px;
            font-size: 14px;
        }

        .link {
            color: var(--primary-green);
            text-decoration: none;
            font-weight: 600;
            cursor: pointer;
        }

        .forgot-link {
            display: block;
            margin-top: 15px;
            color: var(--text-gray);
            font-size: 13px;
        }

        #message {
            margin-top: 15px;
            padding: 10px;
            border-radius: 8px;
            font-size: 13px;
            display: none;
        }
    </style>
</head>
<body>

<div class="auth-card">
    <div class="brand-title" id="displayTitle">SMAT HUB</div>
    
    <div id="authForm">
        <div class="input-group">
            <label>Email Address</label>
            <input type="email" id="email" placeholder="Enter your email">
        </div>

        <div class="input-group">
            <label>Password</label>
            <div class="input-wrapper">
                <input type="password" id="password" placeholder="••••••••" oninput="checkPass()">
                <i class="fa-solid fa-eye toggle-password" id="eyeIcon" onclick="togglePass()"></i>
            </div>
            <div id="passHint" class="validation-box">
                <span id="lenReq">● Min 8 characters</span> <br>
                <span id="numReq">● Letter & Number required</span>
            </div>
        </div>

        <button class="btn-auth" id="mainBtn" onclick="handleAuth()">Authenticate</button>
        
        <div id="message"></div>

        <div class="footer-nav">
            <span id="toggleText">Don't have an account?</span> 
            <span class="link" id="toggleLink" onclick="toggleView()">Register</span>
            <span class="forgot-link" onclick="resetPass()">Forgot Password?</span>
        </div>
    </div>
</div>

<script type="module">
    // Firebase Config (আপনার আগের কোড থেকে)
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getAuth, createUserWithEmailAndPassword, signInWithEmailAndPassword, sendEmailVerification, sendPasswordResetEmail } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
    import { getDatabase, ref, set, get, runTransaction } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

    const firebaseConfig = {
        apiKey: "AIzaSyAMxtJedkehhxJRMPZLjhpKHqneHEWsGlE",
        authDomain: "smat-exchange.firebaseapp.com",
        projectId: "smat-exchange",
        storageBucket: "smat-exchange.firebasestorage.app",
        messagingSenderId: "836334569396",
        appId: "1:836334569396:web:679effe640b3453412d4e1"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getDatabase(app);

    let isLoginMode = true;

    // --- Password Toggle Function ---
    window.togglePass = () => {
        const passInput = document.getElementById('password');
        const eyeIcon = document.getElementById('eyeIcon');
        if (passInput.type === 'password') {
            passInput.type = 'text';
            eyeIcon.classList.replace('fa-eye', 'fa-eye-slash');
        } else {
            passInput.type = 'password';
            eyeIcon.classList.replace('fa-eye-slash', 'fa-eye');
        }
    };

    // --- Validation Logic ---
    window.checkPass = () => {
        const pass = document.getElementById('password').value;
        const hintBox = document.getElementById('passHint');
        const btn = document.getElementById('mainBtn');
        
        const hasLen = pass.length >= 8;
        const hasNum = /[0-9]/.test(pass) && /[a-zA-Z]/.test(pass);

        if(!isLoginMode) {
            hintBox.style.display = "block";
            document.getElementById('lenReq').className = hasLen ? 'valid' : 'invalid';
            document.getElementById('numReq').className = hasNum ? 'valid' : 'invalid';
            btn.disabled = !(hasLen && hasNum);
        } else {
            hintBox.style.display = "none";
            btn.disabled = false;
        }
    };

    // --- Toggle UI between Login and Register ---
    window.toggleView = () => {
        isLoginMode = !isLoginMode;
        document.getElementById('displayTitle').innerText = isLoginMode ? "SMAT HUB" : "JOIN SMAT";
        document.getElementById('mainBtn').innerText = isLoginMode ? "Authenticate" : "Create Account";
        document.getElementById('toggleText').innerText = isLoginMode ? "Don't have an account?" : "Already a member?";
        document.getElementById('toggleLink').innerText = isLoginMode ? "Register" : "Login";
        document.getElementById('passHint').style.display = "none";
        checkPass();
    };

    // --- Auth Logic ---
    window.handleAuth = async () => {
        const email = document.getElementById('email').value;
        const pass = document.getElementById('password').value;
        const msg = document.getElementById('message');

        if(!email || !pass) return alert("Fields cannot be empty!");

        msg.style.display = "block";
        msg.style.color = "#fff";
        msg.innerText = "Processing...";

        try {
            if(isLoginMode) {
                const res = await signInWithEmailAndPassword(auth, email, pass);
                if(res.user.emailVerified) {
                    window.location.href = "home.html";
                } else {
                    msg.innerText = "Check your email to verify account!";
                    msg.style.color = "#ffb300";
                }
            } else {
                const res = await createUserWithEmailAndPassword(auth, email, pass);
                await sendEmailVerification(res.user);
                msg.innerText = "Verification sent to Gmail!";
                msg.style.color = var(--primary-green);
            }
        } catch (e) {
            msg.innerText = e.message;
            msg.style.color = "#ff4d4d";
        }
    };

    window.resetPass = async () => {
        const email = document.getElementById('email').value;
        if(!email) return alert("Enter email first");
        try {
            await sendPasswordResetEmail(auth, email);
            alert("Reset link sent!");
        } catch(e) { alert(e.message); }
    };
</script>

</body>
</html>
