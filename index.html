<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SMAT EXCHANGE | Secure Access</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --primary: #00ff88;
            --bg: #05070a;
            --card: rgba(17, 21, 26, 0.98);
            --input: #1a1f24;
            --text-main: #ffffff;
            --text-dim: #848e9c;
        }

        /* রিসেট এবং গ্লিচ প্রিভেনশন */
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', sans-serif; }
        
        body {
            background: var(--bg);
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            position: relative;
        }

        /* --- ডায়নামিক বাজার দর (স্পষ্ট ও আলাদা এনিমেশন) --- */
        .market-stream {
            position: absolute;
            width: 100%;
            height: 100%;
            z-index: 1;
            pointer-events: none;
        }

        .ticker {
            position: absolute;
            font-family: 'Courier New', Courier, monospace;
            font-weight: 900;
            font-size: 1.1rem;
            white-space: nowrap;
            opacity: 0;
            animation: moveSmooth 18s infinite linear;
        }

        @keyframes moveSmooth {
            0% { transform: translateY(105vh); opacity: 0; }
            5% { opacity: 0.8; }
            95% { opacity: 0.8; }
            100% { transform: translateY(-15vh); opacity: 0; }
        }

        /* --- মেইন কার্ড ডিজাইন --- */
        .auth-card {
            position: relative;
            z-index: 10;
            width: 92%;
            max-width: 400px;
            background: var(--card);
            padding: 40px 25px;
            border-radius: 28px;
            border: 1px solid rgba(0, 255, 136, 0.2);
            box-shadow: 0 25px 50px rgba(0,0,0,0.8);
            text-align: center;
        }

        .logo-circle {
            width: 85px;
            height: 85px;
            margin: 0 auto 20px;
            background: #fff;
            border-radius: 50%; /* লগো গোল করার ফিক্স */
            padding: 3px;
            border: 2.5px solid var(--primary);
            overflow: hidden;
        }

        .logo-circle img { width: 100%; height: 100%; object-fit: cover; border-radius: 50%; }

        .brand-name { font-size: 26px; font-weight: 800; color: #fff; margin-bottom: 5px; }
        .brand-name span { color: var(--primary); }

        .sub-desc { color: var(--text-dim); font-size: 13px; margin-bottom: 30px; }

        .form-group { text-align: left; margin-bottom: 22px; }
        label { display: block; font-size: 11px; color: var(--text-dim); margin-bottom: 8px; text-transform: uppercase; letter-spacing: 1px; }

        .input-box { position: relative; }
        
        input {
            width: 100%;
            padding: 16px;
            background: var(--input);
            border: 1.5px solid rgba(255,255,255,0.05);
            border-radius: 14px;
            color: #fff;
            font-size: 15px;
            outline: none;
        }

        input:focus { border-color: var(--primary); background: #1f252b; }

        .eye-toggle {
            position: absolute; right: 15px; top: 50%; transform: translateY(-50%);
            color: var(--text-dim); cursor: pointer; padding: 5px;
        }

        /* পাসওয়ার্ড স্ট্যাটাস */
        #passStatus { font-weight: bold; font-size: 11px; transition: 0.3s; }

        #actionBtn {
            width: 100%;
            padding: 17px;
            background: var(--primary);
            color: #000;
            border: none;
            border-radius: 14px;
            font-size: 16px;
            font-weight: 800;
            cursor: pointer;
            margin-top: 10px;
            transition: 0.2s;
        }

        #actionBtn:disabled { background: #2b3139; color: #5e6673; cursor: not-allowed; }

        .auth-footer { margin-top: 25px; padding-top: 15px; border-top: 1px solid rgba(255,255,255,0.05); }
        .switch-link { color: var(--primary); cursor: pointer; font-weight: 700; font-size: 14px; }
        .forgot-link { color: var(--text-dim); font-size: 13px; cursor: pointer; display: block; margin-top: 15px; }

        /* পপআপ টোস্ট */
        #toast {
            position: fixed; top: -100px; left: 50%; transform: translateX(-50%);
            background: #1e2329; color: white; padding: 15px 30px; border-radius: 12px;
            z-index: 1000; transition: 0.5s; border-left: 5px solid var(--primary);
            box-shadow: 0 15px 40px rgba(0,0,0,0.6); display: flex; align-items: center; gap: 12px;
        }
        #toast.active { top: 30px; }
    </style>
</head>
<body>

<div id="toast">
    <i class="fa-solid fa-circle-check" id="tIcon"></i>
    <span id="tMsg">Notification</span>
</div>

<div class="market-stream" id="tickerContainer"></div>

<div class="auth-card">
    <div class="logo-circle">
        <img src="assets/logos/smat.png" alt="SMAT">
    </div>
    <h2 class="brand-name">SMAT <span>EXCHANGE</span></h2>
    <p class="sub-desc" id="subHeader">Log in to your SMAT account</p>

    <div class="form-group">
        <label>Email Address</label>
        <input type="email" id="email" placeholder="example@gmail.com">
    </div>

    <div class="form-group">
        <label>Password <span id="passStatus" style="float: right;"></span></label>
        <div class="input-box">
            <input type="password" id="password" placeholder="••••••••" oninput="validatePass()">
            <i class="fa-solid fa-eye eye-toggle" onclick="toggleVisibility()"></i>
        </div>
    </div>

    <button id="actionBtn" onclick="processAuth()">LOGIN</button>

    <div class="auth-footer">
        <span class="switch-link" id="switchText" onclick="toggleMode()">Create new account</span>
        <span class="forgot-link" onclick="handleReset()">Lost your password?</span>
    </div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getAuth, createUserWithEmailAndPassword, signInWithEmailAndPassword, sendEmailVerification, sendPasswordResetEmail } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
    import { getDatabase, ref, set, get, runTransaction } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

    const firebaseConfig = {
        apiKey: "AIzaSyAMxtJedkehhxJRMPZLjhpKHqneHEWsGlE",
        authDomain: "smat-exchange.firebaseapp.com",
        projectId: "smat-exchange",
        storageBucket: "smat-exchange.firebasestorage.app",
        messagingSenderId: "836334569396",
        appId: "1:836334569396:web:679effe640b3453412d4e1"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getDatabase(app);

    // --- ১. স্পষ্ট ও জটলাহীন কয়েন এনিমেশন ---
    const container = document.getElementById('tickerContainer');
    const coins = [
        {t: 'BTC/USDT', p: '64,205.10', u: true},
        {t: 'ETH/USDT', p: '3,450.42', u: false},
        {t: 'SMAT/USDT', p: '1.4500', u: true},
        {t: 'SOL/USDT', p: '142.15', u: true},
        {t: 'BNB/USDT', p: '590.20', u: false},
        {t: 'XRP/USDT', p: '0.6120', u: true}
    ];

    function createTickers() {
        for(let i=0; i<10; i++) {
            let div = document.createElement('div');
            div.className = 'ticker';
            let data = coins[i % coins.length];
            div.innerHTML = `${data.t} <span style="color:${data.u ? '#00ff88' : '#ff4d4d'}">${data.p} ${data.u ? '↑' : '↓'}</span>`;
            div.style.left = (i * 10) + '%'; // জটলা পাকাবে না, আলাদা আলাদা জায়গায় থাকবে
            div.style.animationDelay = (i * 2.5) + 's';
            container.appendChild(div);
        }
    }
    createTickers();

    // --- ২. আপনার দেওয়া অরিজিনাল লজিক ---
    let isLogin = true;
    const urlParams = new URLSearchParams(window.location.search);
    const referralID = urlParams.get('ref') || null;

    window.notify = (msg, err = false) => {
        const t = document.getElementById('toast');
        document.getElementById('tMsg').innerText = msg;
        t.style.borderLeftColor = err ? "#ff4d4d" : "#00ff88";
        t.classList.add('active');
        setTimeout(() => t.classList.remove('active'), 3000);
    };

    window.toggleVisibility = () => {
        const p = document.getElementById('password');
        p.type = p.type === 'password' ? 'text' : 'password';
    };

    // পাসওয়ার্ড ভ্যালিডেশন (সবুজ টিক সহ)
    window.validatePass = () => {
        const val = document.getElementById('password').value;
        const status = document.getElementById('passStatus');
        const btn = document.getElementById('actionBtn');
        const regex = /^(?=.*[A-Za-z])(?=.*\d)[A-Za-z\d]{8,}$/;

        if(val === "") { status.innerText = ""; return; }

        if(regex.test(val)) {
            status.innerHTML = '<i class="fa-solid fa-circle-check"></i> Strong';
            status.style.color = "#00ff88";
            btn.disabled = false;
        } else {
            status.innerText = "Letter + Number (Min 8)";
            status.style.color = "#ff4d4d";
            if(!isLogin) btn.disabled = true;
        }
    };

    window.toggleMode = () => {
        isLogin = !isLogin;
        document.getElementById('subHeader').innerText = isLogin ? "Log in to your SMAT account" : "Join the SMAT ecosystem today";
        document.getElementById('actionBtn').innerText = isLogin ? "LOGIN" : "REGISTER";
        document.getElementById('switchText').innerText = isLogin ? "Create new account" : "Already have an account? Sign In";
        document.getElementById('passStatus').innerText = "";
    };

    // SMAT ID জেনারেটর (Transaction Logic)
    const generateSmatID = async () => {
        const counterRef = ref(db, 'counters/lastSmatId');
        const result = await runTransaction(counterRef, (v) => (v || 100000) + 1);
        return "SMAT" + result.snapshot.val();
    };

    window.processAuth = async () => {
        const email = document.getElementById('email').value;
        const pass = document.getElementById('password').value;
        if(!email || !pass) return notify("Enter all details!", true);

        notify("Authenticating...");
        try {
            if (isLogin) {
                const res = await signInWithEmailAndPassword(auth, email, pass);
                if (res.user.emailVerified) {
                    const snap = await get(ref(db, 'users/' + res.user.uid));
                    if(snap.exists()) localStorage.setItem('smatID', snap.val().smatID);
                    localStorage.setItem('isLoggedIn', 'true');
                    window.location.href = "home.html"; 
                } else notify("Verify email in your inbox!", true);
            } else {
                const res = await createUserWithEmailAndPassword(auth, email, pass);
                const sID = await generateSmatID();
                await set(ref(db, 'users/' + res.user.uid), {
                    email, smatID: sID, kycStatus: 'unverified', referredBy: referralID, createdAt: new Date().toISOString()
                });
                await sendEmailVerification(res.user);
                notify("Verification link sent to Gmail!");
            }
        } catch (e) { notify(e.message, true); }
    };

    window.handleReset = async () => {
        const email = document.getElementById('email').value;
        if(!email) return notify("Input email first!", true);
        try {
            await sendPasswordResetEmail(auth, email);
            notify("Reset link sent!");
        } catch (e) { notify(e.message, true); }
    };
</script>
</body>
</html>
