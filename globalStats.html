    <style>
        body { background: #0b0e11; color: white; font-family: 'Inter', sans-serif; }
        .glass { background: rgba(30, 35, 41, 0.6); backdrop-filter: blur(15px); border: 1px solid rgba(255,255,255,0.05); border-radius: 20px; }
        .gold-border { border-top: 2px solid #f0b90b; }
        .stat-label { font-size: 10px; font-weight: 800; color: #848e9c; text-transform: uppercase; letter-spacing: 1px; }
        .live-pulse { width: 10px; height: 10px; background: #0ecb81; border-radius: 50%; box-shadow: 0 0 10px #0ecb81; animation: pulse 1.5s infinite; }
        @keyframes pulse { 0% { opacity: 1; } 50% { opacity: 0.4; } 100% { opacity: 1; } }
        .hash-glow { text-shadow: 0 0 10px rgba(240, 185, 11, 0.5); }
    </style>
</head>
<body class="p-4 pb-24">

    <div class="flex justify-between items-center mb-6 px-2">
        <div>
            <h1 class="text-2xl font-black text-white">NETWORK <span class="text-yellow-500">LIVE</span></h1>
            <p class="stat-label">Real-time Ecosystem Intelligence</p>
        </div>
        <div class="live-pulse"></div>
    </div>

    <div class="glass p-6 mb-4 gold-border text-center relative overflow-hidden">
        <div class="absolute top-0 right-0 p-4 opacity-10">
            <i class="fas fa-microchip text-6xl"></i>
        </div>
        <p class="stat-label mb-2">Total Network Hash Power (Active)</p>
        <h2 id="total-network-hash" class="text-4xl font-black tracking-tighter text-yellow-500 hash-glow">0.00x</h2>
        <p class="text-[10px] text-gray-500 font-bold mt-2" id="active-miner-count">Scanning Nodes...</p>
    </div>

    <div class="glass p-5 mb-4">
        <div class="flex justify-between items-center border-b border-white/5 pb-4 mb-4">
            <div>
                <p class="stat-label">oxSMAT Live Price</p>
                <h3 id="ox-live-price" class="text-2xl font-black text-green-400">$0.0000</h3>
            </div>
            <div class="text-right">
                <p class="stat-label">Market Status</p>
                <span class="text-[10px] bg-green-500/20 text-green-500 px-2 py-1 rounded font-bold">STABLE</span>
            </div>
        </div>
        <div class="grid grid-cols-2 gap-4">
            <div>
                <p class="stat-label">Global Staked</p>
                <p id="global-staked" class="text-lg font-bold">0.00</p>
            </div>
            <div class="text-right">
                <p class="stat-label">Global Staked Value</p>
                <p id="global-staked-value" class="text-lg font-bold text-yellow-500">$0.00</p>
            </div>
        </div>
    </div>

    <div class="grid grid-cols-2 gap-3 mb-4">
        <div class="glass p-4">
            <p class="stat-label">Total SMAT Mined</p>
            <h4 id="global-mined" class="text-lg font-bold">0.00</h4>
        </div>
        <div class="glass p-4 text-right">
            <p class="stat-label">Daily Unstaked</p>
            <h4 id="global-unstaked" class="text-lg font-bold text-red-500">0.00</h4>
        </div>
    </div>

    <div class="grid grid-cols-3 gap-2">
        <div class="glass p-3 text-center">
            <p class="stat-label">Crash</p>
            <p id="avg-crash" class="text-xs font-bold text-blue-400">+0.00x</p>
        </div>
        <div class="glass p-3 text-center">
            <p class="stat-label">Predict</p>
            <p id="avg-pred" class="text-xs font-bold text-purple-400">+0.00x</p>
        </div>
        <div class="glass p-3 text-center">
            <p class="stat-label">Ref</p>
            <p id="total-ref-boost" class="text-xs font-bold text-orange-400">+0.00x</p>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getDatabase, ref, onValue } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyAMxtJedkehhxJRMPZLjhpKHqneHEWsGlE",
            authDomain: "smat-exchange.firebaseapp.com",
            projectId: "smat-exchange",
            databaseURL: "https://smat-exchange-default-rtdb.firebaseio.com"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);

        // ১. লাইভ প্রাইস সিঙ্ক (আপনার ট্রেড ইঞ্জিনের logic অনুযায়ী)
        // ট্রেড ইঞ্জিনে যেভাবে market/sym থেকে প্রাইস নেওয়া হয়
        onValue(ref(db, 'market/oxsmat'), (snap) => {
            const mData = snap.val() || { price: 0 };
            const livePrice = parseFloat(mData.price) || 0;
            document.getElementById('ox-live-price').innerText = "$" + livePrice.toFixed(4);
            
            // প্রাইস পাওয়া গেলে স্ট্যাক ভ্যালু আপডেট করার জন্য গ্লোবাল কলব্যাক
            window.currentOxPrice = livePrice;
        });

        // ২. গ্লোবাল নেটওয়ার্ক ডাটা ক্যালকুলেশন
        onValue(ref(db, 'users'), (snap) => {
            if(!snap.exists()) return;

            let totalMined = 0;
            let totalStaked = 0;
            let activeMiners = 0;
            let totalNetworkHash = 0; // মোট মাইনিং পাওয়ার
            
            let totalCrashBoost = 0;
            let totalPredBoost = 0;
            let totalUnstakedToday = 0;

            const userArray = Object.values(snap.val());
            const today = new Date().toLocaleDateString();

            userArray.forEach(u => {
                // ক) মাইনিং এবং একটিভ পাওয়ার হিসাব
                const sessionSmat = parseFloat(u.sessionSmat) || 0;
                const walletSmat = parseFloat(u.smat_balance) || 0;
                totalMined += (sessionSmat + walletSmat);

                // খ) ইউজার ভিত্তিক হ্যাশ পাওয়ার ক্যালকুলেশন (আপনার ট্রেড লজিক অনুযায়ী)
                if(u.miningActive) {
                    activeMiners++;
                    const cBoost = parseFloat(u.crashVol_6am) || 0;
                    const pBoost = parseFloat(u.predVol_6am) || 0;
                    const sBoost = (parseFloat(u.oxStaked) || 0) * 10;
                    
                    // এখানে আমরা রেফারেল বুস্ট সাধারণত ১x করে ধরি প্রতিটি একটিভ রেফারের জন্য
                    // আপাতত বেস ১x + অন্যান্য বুস্ট যোগ করছি
                    const userPower = 1.0 + cBoost + pBoost + sBoost; 
                    totalNetworkHash += userPower;

                    // এভারেজ দেখানোর জন্য বুস্ট জমা করা
                    totalCrashBoost += cBoost;
                    totalPredBoost += pBoost;
                }

                // গ) স্ট্যাকিং হিসাব
                totalStaked += parseFloat(u.oxStaked) || 0;

                // ঘ) আজকের আনস্টেক হিস্ট্রি চেক
                if(u.history) {
                    Object.values(u.history).forEach(h => {
                        if((h.method === "Unstake" || h.method === "Unstake (Early)") && h.date === today) {
                            totalUnstakedToday += parseFloat(h.amount) || 0;
                        }
                    });
                }
            });

            // ৩. UI আপডেট
            document.getElementById('total-network-hash').innerText = totalNetworkHash.toFixed(2) + "x";
            document.getElementById('active-miner-count').innerText = activeMiners + " NODES ACTIVELY MINING";
            
            document.getElementById('global-mined').innerText = totalMined.toFixed(2);
            document.getElementById('global-staked').innerText = totalStaked.toFixed(2);
            document.getElementById('global-unstaked').innerText = totalUnstakedToday.toFixed(2);

            // স্ট্যাক করা কয়েনের রিয়েল ভ্যালু (Live Price দিয়ে গুণ)
            const livePrice = window.currentOxPrice || 0;
            document.getElementById('global-staked-value').innerText = "$" + (totalStaked * livePrice).toFixed(2);

            // এভারেজ বুস্ট ক্যালকুলেশন
            const totalUsers = userArray.length || 1;
            document.getElementById('avg-crash').innerText = "+" + (totalCrashBoost / totalUsers).toFixed(2) + "x";
            document.getElementById('avg-pred').innerText = "+" + (totalPredBoost / totalUsers).toFixed(2) + "x";
        });
    </script>
</body>
</html>
