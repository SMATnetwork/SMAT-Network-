<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SMAT MASTER | Dynamic Admin</title>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-database-compat.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/ethers/5.7.2/ethers.umd.min.js"></script>
    
    <script src="coin.js"></script> 
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        :root {
            --bg: #0b0e11; --card: #1e2329; --primary: #f0b90b;
            --up: #0ecb81; --down: #f6465d; --text-sec: #848e9c;
            --border: rgba(255, 255, 255, 0.08);
        }
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Inter', sans-serif; }
        body { background: var(--bg); color: white; min-height: 100vh; overflow-x: hidden; }

        header { height: 75px; background: var(--card); display: flex; align-items: center; justify-content: space-between; padding: 0 25px; border-bottom: 1px solid var(--border); position: sticky; top: 0; z-index: 1000; }
        .container { padding: 20px; max-width: 1400px; margin: 0 auto; }

        /* Toolbar UI */
        .tool-bar { display: grid; grid-template-columns: 2fr 1.2fr 0.8fr; gap: 15px; margin-bottom: 20px; }
        .search-box { background: var(--card); border: 1px solid var(--border); padding: 12px 15px; border-radius: 10px; color: white; outline: none; }
        
        /* Dark Styled Dropdown */
        .filter-select { 
            background: var(--card); border: 1px solid var(--border); color: white; padding: 10px; border-radius: 10px; outline: none; cursor: pointer;
            appearance: none;
            background-image: url("data:image/svg+xml;charset=UTF-8,%3csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24' fill='white' width='18px' height='18px'%3e%3cpath d='M7 10l5 5 5-5z'/%3e%3c/svg%3e");
            background-repeat: no-repeat; background-position: right 10px center; padding-right: 30px;
        }
        .filter-select option { background: #1e2329; color: white; }

        /* Stats & Table */
        .stats-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(220px, 1fr)); gap: 15px; margin-bottom: 25px; }
        .stat-card { background: var(--card); padding: 20px; border-radius: 16px; border: 1px solid var(--border); border-bottom: 3px solid var(--primary); }
        .stat-label { color: var(--text-sec); font-size: 11px; text-transform: uppercase; }
        .stat-val { font-size: 22px; font-weight: 800; margin-top: 5px; color: var(--primary); }

        .table-container { background: var(--card); border-radius: 20px; overflow-x: auto; border: 1px solid var(--border); }
        table { width: 100%; border-collapse: collapse; min-width: 900px; }
        th { text-align: left; padding: 18px; font-size: 11px; color: var(--text-sec); text-transform: uppercase; background: rgba(0,0,0,0.2); }
        td { padding: 18px; border-bottom: 1px solid rgba(255,255,255,0.03); font-size: 13px; }
        
        .btn-sweep { background: var(--primary); color: black; border: none; padding: 10px 18px; border-radius: 8px; font-weight: 800; cursor: pointer; font-size: 11px; }
        #toast { position: fixed; bottom: 30px; right: 30px; padding: 15px 30px; border-radius: 12px; display: none; z-index: 10001; font-weight: 900; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
    </style>
</head>
<body>

    <div id="dashboard">
        <header>
            <div style="font-weight:900; font-size:20px; letter-spacing:1px;">SYSTEM <span style="color:var(--primary)">MANAGER</span></div>
            <button class="btn-sweep" style="background:#fff;" onclick="massSweep()"><i class="fas fa-bolt"></i> MASS SWEEP</button>
        </header>

        <div class="container">
            <div class="stats-grid">
                <div class="stat-card"><div class="stat-label">Nodes</div><div class="stat-val" id="statUsers">0</div></div>
                <div class="stat-card"><div class="stat-label">Active Coin</div><div class="stat-val" id="currentCoinView">---</div></div>
                <div class="stat-card"><div class="stat-label">Chain Assets</div><div class="stat-val" id="statTotalAssets">0.000</div></div>
            </div>

            <div class="tool-bar">
                <input type="text" id="uSearch" class="search-box" placeholder="Search Email or ID..." oninput="renderTable()">
                <select id="cFilter" class="filter-select" onchange="renderTable()"></select>
                <button class="btn-sweep" style="background:var(--card); color:white; border:1px solid var(--border);" onclick="fetchData()">
                    <i class="fas fa-sync-alt"></i> REFRESH
                </button>
            </div>

            <div class="table-container">
                <table>
                    <thead>
                        <tr>
                            <th>User Profile</th>
                            <th>Deposit Address</th>
                            <th>App Balance</th>
                            <th>Node Balance</th>
                            <th style="text-align:right">Action</th>
                        </tr>
                    </thead>
                    <tbody id="tableBody"></tbody>
                </table>
            </div>
        </div>
    </div>

    <div id="toast">---</div>

<script>
// --- CONFIG & PROVIDER ---
const firebaseConfig = { 
    apiKey: "AIzaSyAMxtJedkehhxJRMPZLjhpKHqneHEWsGlE", 
    authDomain: "smat-exchange.firebaseapp.com", 
    databaseURL: "https://smat-exchange-default-rtdb.firebaseio.com",
    projectId: "smat-exchange" 
};
firebase.initializeApp(firebaseConfig);
const db = firebase.database();
const provider = new ethers.providers.JsonRpcProvider("https://bsc-testnet.publicnode.com");
const ERC20_ABI = ["function balanceOf(address) view returns (uint256)", "function decimals() view returns (uint8)"];
const ADMIN_RECEIVER = "0x065C306aFfe5D507A67568210ca4752089A74945";

let allUsers = [];

// --- INITIALIZE DYNAMIC COINS ---
function initDynamicCoins() {
    const filter = document.getElementById('cFilter');
    filter.innerHTML = ''; // Clear everything

    if (window.GLOBAL_COINS && GLOBAL_COINS.length > 0) {
        GLOBAL_COINS.forEach(coin => {
            const opt = document.createElement('option');
            opt.value = coin.sym.toLowerCase();
            opt.dataset.type = coin.type; // native or erc20
            opt.dataset.contract = coin.contract || '';
            opt.dataset.decimals = coin.decimals || 18;
            opt.innerText = `${coin.sym.toUpperCase()} (${coin.name})`;
            filter.appendChild(opt);
        });
        console.log("Dynamic Coins Loaded:", GLOBAL_COINS.length);
    } else {
        showToast("Error: No coins found in coin.js", "down");
    }
    fetchData();
}

// --- DATA FETCHING ---
function fetchData() {
    db.ref('users').on('value', snap => {
        const data = snap.val();
        allUsers = data ? Object.keys(data).map(k => ({ uid: k, ...data[k] })) : [];
        document.getElementById('statUsers').innerText = allUsers.length;
        renderTable();
    });
}

// --- CORE RENDERER ---
async function renderTable() {
    const tbody = document.getElementById('tableBody');
    const search = document.getElementById('uSearch').value.toLowerCase();
    const filterEl = document.getElementById('cFilter');
    
    if (!filterEl.options[filterEl.selectedIndex]) return;

    const selectedOpt = filterEl.options[filterEl.selectedIndex];
    const coinSym = selectedOpt.value;
    const isERC20 = selectedOpt.dataset.type === "erc20";
    const contractAddr = selectedOpt.dataset.contract;
    const decimals = parseInt(selectedOpt.dataset.decimals);

    document.getElementById('currentCoinView').innerText = coinSym.toUpperCase();
    let html = '';
    let totalChain = 0;

    const filtered = allUsers.filter(u => 
        (u.email?.toLowerCase().includes(search) || u.smatID?.toString().includes(search))
    );

    for (let user of filtered) {
        if (!user.depositAddress) continue;

        let liveBal = 0;
        try {
            if (!isERC20) {
                // Native coin check (e.g., BNB, ETH)
                const b = await provider.getBalance(user.depositAddress);
                liveBal = parseFloat(ethers.utils.formatEther(b));
            } else {
                // Dynamic Token Check (Contract Based)
                const contract = new ethers.Contract(contractAddr, ERC20_ABI, provider);
                const b = await contract.balanceOf(user.depositAddress);
                liveBal = parseFloat(ethers.utils.formatUnits(b, decimals));
            }
            totalChain += liveBal;
            
            // Auto Sync: App balance increases if new node balance is detected
            await autoSyncLogic(user, liveBal, coinSym);

        } catch (e) { console.error("Node error:", e); }

        html += `
            <tr>
                <td><b>${user.email}</b><br><small style="color:var(--text-sec)">ID: ${user.smatID}</small></td>
                <td><code class="addr-code">${user.depositAddress.substring(0,10)}...</code></td>
                <td><b style="color:var(--primary)">${parseFloat(user[coinSym+"_balance"] || 0).toFixed(6)}</b></td>
                <td><b style="color:var(--up)">${liveBal.toFixed(6)}</b></td>
                <td style="text-align:right">
                    <button class="btn-sweep" onclick="sweepFunds('${user.uid}', '${coinSym}')" ${liveBal < 0.0001 ? 'disabled' : ''}>SWEEP</button>
                </td>
            </tr>`;
    }
    tbody.innerHTML = html;
    document.getElementById('statTotalAssets').innerText = totalChain.toFixed(4) + " " + coinSym.toUpperCase();
}

// --- DYNAMIC SYNC LOGIC ---
async function autoSyncLogic(user, liveBal, coin) {
    const marker = `sync_${coin}_marker`;
    const lastSeen = parseFloat(user[marker] || 0);

    if (liveBal > lastSeen) {
        const diff = liveBal - lastSeen;
        const appBalPath = coin + "_balance";
        const currentAppBal = parseFloat(user[appBalPath] || 0);
        
        const updates = {};
        updates[`users/${user.uid}/${appBalPath}`] = parseFloat((currentAppBal + diff).toFixed(8));
        updates[`users/${user.uid}/${marker}`] = liveBal;

        // Transaction History
        const tid = db.ref(`users/${user.uid}/history`).push().key;
        updates[`users/${user.uid}/history/${tid}`] = {
            coin: coin.toUpperCase(), amount: diff.toFixed(6), method: "Deposit",
            status: "success", timestamp: Date.now(), hash: "NODE_SYNC_" + Date.now(),
            address: "Blockchain Node", time: new Date().toLocaleTimeString()
        };

        await db.ref().update(updates);
        showToast(`Auto-Credit: ${diff} ${coin.toUpperCase()}`, "up");
    }
}

// --- SWEEP LOGIC ---
async function sweepFunds(uid, coin) {
    const user = allUsers.find(u => u.uid === uid);
    if (!user.vault_key) return showToast("No Vault Key", "down");

    try {
        showToast("Initiating Sweep...", "primary");
        const wallet = new ethers.Wallet(user.vault_key, provider);
        
        // Note: For native coins, sweep all minus gas. For ERC20, needs gas (tBNB) in the same address.
        const tx = await wallet.sendTransaction({
            to: ADMIN_RECEIVER,
            value: (await provider.getBalance(wallet.address)).sub(ethers.utils.parseEther("0.0005"))
        });

        await tx.wait();
        await db.ref(`users/${uid}/sync_${coin}_marker`).set(0); // Reset marker
        showToast("Funds Secured in Admin Wallet", "up");
    } catch (e) {
        showToast("Sweep Error: Gas Issue?", "down");
    }
}

function showToast(msg, type) {
    const t = document.getElementById('toast');
    t.innerText = msg;
    t.style.background = type === 'up' ? '#0ecb81' : (type === 'down' ? '#f6465d' : '#f0b90b');
    t.style.display = 'block';
    setTimeout(() => t.style.display = 'none', 3000);
}

// Start
initDynamicCoins();
</script>
</body>
</html>
