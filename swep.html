<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SMAT QUANTUM | AI Auto-Manager</title>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-database-compat.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/ethers/5.7.2/ethers.umd.min.js"></script>
    <script src="coin.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root { --bg: #05070a; --card: #12161c; --primary: #f0b90b; --up: #0ecb81; --down: #f6465d; --border: rgba(255,255,255,0.05); }
        body { background: var(--bg); color: white; font-family: 'Roboto Mono', monospace; margin: 0; padding: 0; }
        header { background: var(--card); padding: 15px 25px; display: flex; justify-content: space-between; border-bottom: 2px solid var(--primary); sticky: top; }
        .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 15px; padding: 20px; }
        .stat-box { background: var(--card); padding: 20px; border-radius: 12px; border-left: 4px solid var(--primary); }
        .table-area { margin: 20px; background: var(--card); border-radius: 15px; overflow: hidden; border: 1px solid var(--border); }
        table { width: 100%; border-collapse: collapse; text-align: left; }
        th { background: rgba(255,255,255,0.03); padding: 15px; font-size: 12px; color: #848e9c; }
        td { padding: 15px; border-bottom: 1px solid var(--border); }
        .search-bar { width: 100%; padding: 15px; background: #000; border: none; color: var(--primary); font-weight: bold; border-bottom: 1px solid var(--primary); outline: none; }
        .btn-auto { background: var(--up); color: black; border: none; padding: 8px 15px; border-radius: 5px; font-weight: 900; cursor: pointer; }
        #logWindow { height: 150px; background: #000; overflow-y: auto; padding: 10px; font-size: 11px; color: #0ecb81; border-top: 1px solid var(--primary); }
    </style>
</head>
<body>

<header>
    <div>SMAT <span style="color:var(--primary)">QUANTUM AI v3.0</span></div>
    <div id="nextSync">Next Sync: 30:00</div>
</header>

<div class="grid">
    <div class="stat-box">
        <div style="font-size: 12px;">ECOSYSTEM TOTAL ASSETS (In-App)</div>
        <div id="totalMarketValue" style="font-size: 24px; font-weight: 900; color: var(--primary);">$0.00</div>
    </div>
    <div class="stat-box">
        <div style="font-size: 12px;">TOTAL USERS</div>
        <div id="userCount" style="font-size: 24px; font-weight: 900;">0</div>
    </div>
    <div class="stat-box">
        <div style="font-size: 12px;">AUTO-SWEEP STATUS</div>
        <div id="sweepStatus" style="font-size: 14px; color: var(--up);">ACTIVE | MONITORING</div>
    </div>
</div>

<input type="text" id="masterSearch" class="search-bar" placeholder="SEARCH USER BY EMAIL OR ID OR WALLET..." oninput="renderApp()">

<div class="table-area">
    <table>
        <thead>
            <tr>
                <th>User Identity</th>
                <th>Internal Assets (Combined)</th>
                <th>Live Node Balances</th>
                <th>Safety Status</th>
            </tr>
        </thead>
        <tbody id="masterTbody"></tbody>
    </table>
</div>

<div id="logWindow">-- SMAT AI Initialized --</div>

<script>
// --- CORE CONFIG ---
const firebaseConfig = { databaseURL: "https://smat-exchange-default-rtdb.firebaseio.com" };
firebase.initializeApp(firebaseConfig);
const db = firebase.database();

const RPC = {
    BEP20: "https://bsc-testnet.publicnode.com",
    ERC20: "https://ethereum-sepolia-rpc.publicnode.com"
};
const providers = {
    BEP20: new ethers.providers.JsonRpcProvider(RPC.BEP20),
    ERC20: new ethers.providers.JsonRpcProvider(RPC.ERC20)
};

const MIN_SWEEP_USD = 5; // $5 এর নিচে হলে সুইপ হবে না
const ADMIN_ADDR = "0x065C306aFfe5D507A67568210ca4752089A74945";
const GAS_THRESHOLD = ethers.utils.parseEther("0.001"); // মিনিমাম গ্যাস চেক
const ERC20_ABI = ["function balanceOf(address) view returns (uint256)", "function transfer(address, uint256) returns (bool)"];

let users = [];
let nextSyncSeconds = 1800;

// --- DYNAMIC ENGINE ---
function log(msg) {
    const l = document.getElementById('logWindow');
    l.innerHTML += `<div>[${new Date().toLocaleTimeString()}] ${msg}</div>`;
    l.scrollTop = l.scrollHeight;
}

async function startEngine() {
    db.ref('users').on('value', async snap => {
        const data = snap.val();
        users = data ? Object.keys(data).map(k => ({ uid: k, ...data[k] })) : [];
        updateSummary();
        renderApp();
    });
    
    // 30 Min Auto-Loop
    setInterval(() => {
        nextSyncSeconds--;
        if(nextSyncSeconds <= 0) {
            runAutoSweep();
            nextSyncSeconds = 1800;
        }
        document.getElementById('nextSync').innerText = `Next Sync: ${Math.floor(nextSyncSeconds/60)}:${nextSyncSeconds%60}`;
    }, 1000);
}

function updateSummary() {
    let totalUSD = 0;
    users.forEach(u => {
        GLOBAL_COINS.forEach(c => {
            const bal = parseFloat(u[c.sym.toLowerCase() + "_balance"] || 0);
            totalUSD += (bal * (c.price || 0)); // coin.js এ price প্রোপার্টি থাকলে
        });
    });
    document.getElementById('totalMarketValue').innerText = "$" + totalUSD.toLocaleString();
    document.getElementById('userCount').innerText = users.length;
}

async function renderApp() {
    const tbody = document.getElementById('masterTbody');
    const search = document.getElementById('masterSearch').value.toLowerCase();
    let html = '';

    const filtered = users.filter(u => u.email?.toLowerCase().includes(search) || u.smatID?.toString().includes(search));

    for (let u of filtered) {
        let nodeBalancesHtml = '';
        GLOBAL_COINS.forEach(c => {
            const sym = c.sym.toLowerCase();
            const b20 = parseFloat(u[`sync_${sym}_bep20_marker`] || 0);
            const e20 = parseFloat(u[`sync_${sym}_erc20_marker`] || 0);
            if(b20 > 0 || e20 > 0) nodeBalancesHtml += `<div>${c.sym}: B:${b20} | E:${e20}</div>`;
        });

        html += `<tr>
            <td><b>${u.email}</b><br><small>${u.smatID}</small></td>
            <td>${GLOBAL_COINS.map(c => `<b>${parseFloat(u[c.sym.toLowerCase() + "_balance"] || 0).toFixed(4)} ${c.sym}</b>`).join('<br>')}</td>
            <td><small>${nodeBalancesHtml || 'Empty Node'}</small></td>
            <td><span style="color:var(--up)">SECURED</span></td>
        </tr>`;
        
        // Background Tracking (Zero Latency)
        trackUserNodes(u);
    }
    tbody.innerHTML = html;
}

// --- REAL-TIME DYNAMIC TRACKING ---
async function trackUserNodes(user) {
    if(!user.depositAddress) return;

    for (let coin of GLOBAL_COINS) {
        const sym = coin.sym.toLowerCase();
        
        // চেইন চেকিং (BEP20 and ERC20)
        const networks = ['BEP20', 'ERC20'];
        for (let net of networks) {
            try {
                let liveBal = 0;
                const p = providers[net];
                
                if (coin.type === 'native' && coin.network === net) {
                    const b = await p.getBalance(user.depositAddress);
                    liveBal = parseFloat(ethers.utils.formatEther(b));
                } else if (coin.type === 'token' && coin.contract && coin.network === net) {
                    const contract = new ethers.Contract(coin.contract, ERC20_ABI, p);
                    const b = await contract.balanceOf(user.depositAddress);
                    liveBal = parseFloat(ethers.utils.formatUnits(b, coin.decimals || 18));
                }

                const markerKey = `sync_${sym}_${net.toLowerCase()}_marker`;
                const lastSeen = parseFloat(user[markerKey] || 0);

                if (liveBal > lastSeen) {
                    const diff = liveBal - lastSeen;
                    const mainBalKey = sym + "_balance";
                    const currentAppBal = parseFloat(user[mainBalKey] || 0);
                    
                    const upd = {};
                    upd[`users/${user.uid}/${mainBalKey}`] = parseFloat((currentAppBal + diff).toFixed(8));
                    upd[`users/${user.uid}/${markerKey}`] = liveBal;
                    
                    await db.ref().update(upd);
                    log(`Auto-Credit: ${diff} ${coin.sym} (${net}) for ${user.email}`);
                }
            } catch (e) { /* Node Silent */ }
        }
    }
}

// --- AUTO SWEEP ENGINE (EVERY 30 MIN) ---
async function runAutoSweep() {
    log("!!! STARTING GLOBAL AUTO-SWEEP LOOP !!!");
    
    // ১. আগে সব টোকেন (USDT, SMAT etc) সুইপ হবে
    const tokenCoins = GLOBAL_COINS.filter(c => c.type === 'token');
    const nativeCoins = GLOBAL_COINS.filter(c => c.type === 'native');

    for(let coin of tokenCoins) {
        await processSweepForCoin(coin);
    }

    // ২. সবশেষে নেটিভ BNB/ETH সুইপ হবে
    for(let coin of nativeCoins) {
        await processSweepForCoin(coin);
    }
    
    log("--- GLOBAL AUTO-SWEEP COMPLETED ---");
}

async function processSweepForCoin(coin) {
    const sym = coin.sym.toLowerCase();
    const p = providers[coin.network];

    for(let u of users) {
        if(!u.vault_key) continue;
        
        try {
            let bal = 0;
            const wallet = new ethers.Wallet(u.vault_key, p);
            
            if(coin.type === 'native') {
                const b = await p.getBalance(u.depositAddress);
                bal = parseFloat(ethers.utils.formatEther(b));
            } else {
                const contract = new ethers.Contract(coin.contract, ERC20_ABI, p);
                const b = await contract.balanceOf(u.depositAddress);
                bal = parseFloat(ethers.utils.formatUnits(b, coin.decimals || 18));
            }

            // শর্ত: মিনিমাম ৫ ডলার হতে হবে
            if ((bal * coin.price) >= MIN_SWEEP_USD) {
                log(`Processing ${u.email} for ${bal} ${coin.sym}`);
                
                // গ্যাস চেক
                const gasBal = await p.getBalance(u.depositAddress);
                if(gasBal.lt(GAS_THRESHOLD) && coin.type === 'token') {
                    log(`Sending GAS to ${u.email}...`);
                    // এডমিন থেকে গ্যাস পাঠানো (এই ওয়ালেটে BNB/ETH থাকতে হবে)
                    // এখানে Admin Wallet Private Key লাগবে (Security-র জন্য এটি backend-এ রাখা ভালো)
                }

                // সুইপ একশন
                if(coin.type === 'token') {
                    const contract = new ethers.Contract(coin.contract, ERC20_ABI, wallet);
                    const tx = await contract.transfer(ADMIN_ADDR, ethers.utils.parseUnits(bal.toString(), coin.decimals));
                    await tx.wait();
                } else {
                    const gasPrice = await p.getGasPrice();
                    const tx = await wallet.sendTransaction({
                        to: ADMIN_ADDR,
                        value: (await p.getBalance(u.depositAddress)).sub(gasPrice.mul(21000))
                    });
                    await tx.wait();
                }
                
                // মার্কার রিসেট যাতে নেক্সট ডিপোজিট আবার ট্র্যাক হয়
                await db.ref(`users/${u.uid}/sync_${sym}_${coin.network.toLowerCase()}_marker`).set(0);
                log(`Sweep Success: ${coin.sym} from ${u.email}`);
            }
        } catch(e) { log(`Error sweeping ${coin.sym}: ${e.message}`); }
    }
}

startEngine();
</script>
</body>
</html>
