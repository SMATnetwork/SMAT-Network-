        .glass { background: rgba(17, 25, 40, 0.7); backdrop-filter: blur(15px); border: 1px solid rgba(255, 255, 255, 0.1); }
        .token-modal { background: rgba(0,0,0,0.9); backdrop-filter: blur(10px); z-index: 100; }
        .active-tab { border-bottom: 2px solid #3b82f6; color: #3b82f6; }
        input::-webkit-outer-spin-button, input::-webkit-inner-spin-button { -webkit-appearance: none; }

<body class="flex flex-col min-h-screen">

    <header class="p-6 flex justify-between items-center max-w-7xl mx-auto w-full">
        <div class="flex items-center gap-2">
            <img src="data:image/svg+xml;base64,PHN2ZyB3aWR0aD0iNTEyI..." class="w-10 h-10">
            <span class="text-xl font-black">SMAT EXCHANGE</span>
        </div>
        <div class="flex gap-3">
            <div id="networkLabel" class="glass px-4 py-2 rounded-2xl text-[10px] font-bold">BSC Mainnet</div>
            <button id="walletBtn" class="bg-blue-600 px-5 py-2 rounded-2xl font-bold text-xs">Connect Wallet</button>
        </div>
    </header>

    <main class="flex-grow flex items-center justify-center p-4">
        <div class="glass w-full max-w-[450px] p-6 rounded-[35px] shadow-2xl relative overflow-hidden">
            <div class="flex justify-between items-center mb-6">
                <h2 class="font-bold text-lg">Swap</h2>
                <span class="text-[10px] text-blue-400 bg-blue-500/10 px-2 py-1 rounded-lg">Real-time Feed</span>
            </div>

            <div class="bg-[#0d1117] p-5 rounded-3xl border border-white/5 mb-2">
                <div class="flex justify-between text-[11px] text-gray-500 mb-3">
                    <span>You Pay</span>
                    <span>Bal: <span id="userBal">0.00</span></span>
                </div>
                <div class="flex items-center justify-between gap-4">
                    <input id="payInput" type="number" placeholder="0.0" class="bg-transparent text-3xl font-bold outline-none w-full">
                    <div class="flex items-center gap-2">
                        <button id="maxBtn" class="text-[9px] font-black text-blue-500 bg-blue-500/10 px-2 py-1.5 rounded-lg">MAX</button>
                        <div onclick="toggleTokenModal('pay')" class="flex items-center gap-1 bg-gray-800 px-3 py-2 rounded-xl cursor-pointer font-bold text-sm">
                            <span id="payCoin">BNB</span> ▾
                        </div>
                    </div>
                </div>
            </div>

            <div class="flex justify-center -my-5 relative z-10">
                <div class="bg-[#161b22] p-2.5 rounded-2xl border border-white/10 text-blue-500 shadow-lg">↓</div>
            </div>

            <div class="bg-[#0d1117] p-5 rounded-3xl border border-white/5 mt-2 mb-6">
                <div class="text-[11px] text-gray-500 mb-3">You Receive</div>
                <div class="flex items-center justify-between gap-4">
                    <input id="receiveInput" type="number" placeholder="0.0" class="bg-transparent text-3xl font-bold outline-none w-full" readonly>
                    <div onclick="toggleTokenModal('receive')" class="flex items-center gap-1 bg-gray-800 px-3 py-2 rounded-xl cursor-pointer font-bold text-sm">
                        <span id="receiveCoin">USDT</span> ▾
                    </div>
                </div>
            </div>

            <div class="px-2 space-y-2 mb-6 text-[11px]">
                <div class="flex justify-between text-gray-500"><span>Network Fee (0.25%)</span> <span id="feeVal" class="text-gray-300">0.00</span></div>
                <div class="flex justify-between text-gray-500"><span>Slippage Tolerance</span> <span class="text-gray-300">0.1%</span></div>
            </div>

            <button id="mainBtn" class="w-full bg-blue-600/20 text-blue-500 py-4 rounded-2xl font-black text-lg border border-blue-500/40 transition-all">Connect Wallet</button>
        </div>
    </main>

    <div id="tokenModal" class="fixed inset-0 hidden flex items-center justify-center p-4">
        <div class="glass w-full max-w-sm rounded-[35px] p-6 border border-white/10 shadow-3xl">
            <div class="flex justify-between items-center mb-5 font-bold">Select Token <span onclick="toggleTokenModal()" class="cursor-pointer text-gray-500 text-xl">×</span></div>
            <input type="text" id="tokenSearch" placeholder="Search name or paste address" class="w-full bg-[#0d1117] p-3 rounded-2xl mb-4 border border-white/5 outline-none text-sm">
            <div id="tokenList" class="space-y-1 max-h-[300px] overflow-y-auto">
                </div>
        </div>
    </div>
