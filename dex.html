<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SMAT-DEX | Multi-Chain Swap</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/ethers/6.7.0/ethers.umd.min.js"></script>
    
    <style>
        :root { --main-bg: #0d1117; --card-bg: #161b22; --accent: #3b82f6; }
        body { background-color: var(--main-bg); color: white; font-family: 'Inter', sans-serif; }
        .dex-card { background: var(--card-bg); border: 1px solid #30363d; border-radius: 24px; box-shadow: 0 20px 50px rgba(0,0,0,0.5); }
        .input-box { background: #0d1117; border: 1px solid #30363d; border-radius: 16px; padding: 15px; transition: 0.3s; }
        .input-box:focus-within { border-color: var(--accent); }
        input::-webkit-outer-spin-button, input::-webkit-inner-spin-button { -webkit-appearance: none; }
    </style>
</head>
<body class="flex flex-col items-center justify-center min-h-screen p-4">

    <div class="w-full max-w-lg flex justify-between items-center mb-6">
        <h2 class="text-2xl font-bold text-blue-500">SMAT-DEX</h2>
        <div class="flex gap-2">
            <select id="networkSelector" class="bg-gray-800 text-xs p-2 rounded-xl outline-none border border-gray-700">
                <option value="0x38">BSC Mainnet</option>
                <option value="0x1">Ethereum</option>
                <option value="0x89">Polygon</option>
                <option value="0xfa">Fantom</option>
                <option value="0xa4b1">Arbitrum</option>
            </select>
            <button id="connectBtn" class="bg-blue-600 hover:bg-blue-700 px-4 py-2 rounded-xl text-xs font-bold transition">Connect</button>
        </div>
    </div>

    <div class="dex-card w-full max-w-lg p-6">
        <div class="input-box mb-2">
            <span class="text-xs text-gray-400">You Pay</span>
            <div class="flex items-center">
                <input type="number" id="amountIn" placeholder="0.0" class="bg-transparent text-2xl font-bold outline-none w-full">
                <span class="font-bold text-lg">Native</span>
            </div>
        </div>

        <div class="flex justify-center -my-4 relative z-10">
            <button class="bg-gray-900 border border-gray-700 p-2 rounded-xl hover:text-blue-400 transition">↓</button>
        </div>

        <div class="input-box mt-2 mb-4">
            <span class="text-xs text-gray-400">You Receive (Search by Contract)</span>
            <input type="text" id="tokenAddress" placeholder="0x... (Paste Token Address)" class="w-full bg-black/20 text-xs p-2 my-2 rounded border border-gray-800 outline-none">
            <div class="flex justify-between items-center">
                <input type="number" id="amountOut" placeholder="0.0" class="bg-transparent text-2xl font-bold outline-none w-full" readonly>
                <span id="targetSymbol" class="text-blue-500 font-bold">TOKEN</span>
            </div>
        </div>

        <div id="riskWarning" class="hidden bg-red-900/20 border border-red-500/50 p-3 rounded-xl mb-4 text-[10px] text-red-400">
            ⚠️ <b>RISK:</b> This token is not on the verified list. We are fetching liquidity directly from the chain.
        </div>

        <button id="swapBtn" class="w-full bg-blue-600 hover:bg-blue-700 py-4 rounded-2xl font-bold text-lg shadow-lg transition">Connect Wallet</button>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/9.22.0/firebase-app.js";
        import { getFirestore } from "https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyAMxtJedkehhxJRMPZLjhpKHqneHEWsGlE",
            authDomain: "smat-exchange.firebaseapp.com",
            projectId: "smat-exchange",
            storageBucket: "smat-exchange.firebasestorage.app",
            messagingSenderId: "836334569396",
            appId: "1:836334569396:web:679effe640b3453412d4e1"
        };

        const app = initializeApp(firebaseConfig);
        window.db = getFirestore(app); // Global Access for dex-logic.js
    </script>

    <script type="module" src="dex-logic.js"></script>
</body>
</html>
