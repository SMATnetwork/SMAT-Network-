        body { background: #080a0c; color: white; font-family: sans-serif; }
        .glass { background: rgba(17, 25, 40, 0.7); backdrop-filter: blur(12px); border: 1px solid rgba(255, 255, 255, 0.1); }
        .token-modal { background: rgba(0,0,0,0.9); backdrop-filter: blur(10px); display: none; z-index: 100; }
        input::-webkit-outer-spin-button, input::-webkit-inner-spin-button { -webkit-appearance: none; }
    </style>

<body class="min-h-screen flex flex-col">

    <header class="p-6 flex justify-between items-center max-w-7xl mx-auto w-full">
        <div class="flex items-center gap-2">
            <div class="w-10 h-10 bg-[#f3ba2f] rounded-full flex items-center justify-center font-bold text-white">S</div>
            <span class="text-xl font-black">SMAT EXCHANGE</span>
        </div>
        <button id="walletBtn" class="bg-blue-600 px-4 py-2 rounded-2xl font-bold text-xs">Connect Wallet</button>
    </header>

    <main class="flex-grow flex items-center justify-center p-4">
        <div class="glass w-full max-w-[450px] p-6 rounded-[35px]">
            <h2 class="font-bold mb-6 text-lg">Swap</h2>

            <div class="bg-[#0d1117] p-5 rounded-3xl border border-white/5 mb-2">
                <div class="flex justify-between text-[11px] text-gray-500 mb-3">
                    <span>Pay</span>
                    <span>Bal: <span id="userBal">0.00</span></span>
                </div>
                <div class="flex items-center justify-between">
                    <input id="payInput" type="number" placeholder="0.0" class="bg-transparent text-3xl font-bold outline-none w-1/2">
                    <div class="flex items-center gap-2">
                        <button id="maxBtn" class="text-[10px] font-bold text-blue-500 bg-blue-500/10 px-2 py-1 rounded-lg">MAX</button>
                        <div id="payCoinSelect" class="bg-gray-800 px-3 py-2 rounded-xl cursor-pointer font-bold text-sm">BNB ▾</div>
                    </div>
                </div>
            </div>

            <div class="flex justify-center -my-5 relative z-10">
                <div class="bg-[#161b22] p-2 rounded-2xl border border-white/10 text-blue-500">↓</div>
            </div>

            <div class="bg-[#0d1117] p-5 rounded-3xl border border-white/5 mt-2 mb-6">
                <div class="text-[11px] text-gray-500 mb-3">Receive</div>
                <div class="flex items-center justify-between">
                    <input id="receiveInput" type="number" placeholder="0.0" class="bg-transparent text-3xl font-bold outline-none w-1/2" readonly>
                    <div id="recCoinSelect" class="bg-gray-800 px-3 py-2 rounded-xl cursor-pointer font-bold text-sm">USDT ▾</div>
                </div>
            </div>

            <div class="px-2 space-y-2 mb-6 text-[11px] text-gray-500">
                <div class="flex justify-between"><span>Fee (0.25%)</span> <span id="feeDisplay">0.00</span></div>
                <div class="flex justify-between"><span>Slippage</span> <span>0.1%</span></div>
            </div>

            <button id="mainBtn" class="w-full bg-blue-600/20 text-blue-500 py-4 rounded-2xl font-black text-lg border border-blue-500/40">Connect Wallet</button>
        </div>
    </main>

    <div id="tokenModal" class="token-modal fixed inset-0 items-center justify-center p-4">
        <div class="glass w-full max-w-sm rounded-[30px] p-6">
            <div class="flex justify-between mb-4 font-bold">Select Token <span id="closeModal" class="cursor-pointer text-gray-500">✕</span></div>
            <div id="tokenList" class="space-y-1"></div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getFirestore } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";
        const firebaseConfig = { apiKey: "AIzaSyAMxtJedkehhxJRMPZLjhpKHqneHEWsGlE", authDomain: "smat-exchange.firebaseapp.com", projectId: "smat-exchange", storageBucket: "smat-exchange.firebasestorage.app", messagingSenderId: "836334569396", appId: "1:836334569396:web:679effe640b3453412d4e1" };
        const app = initializeApp(firebaseConfig);
        window.db = getFirestore(app);
    </script>
    <script src="swap.js"></script>
</body>
</html>
