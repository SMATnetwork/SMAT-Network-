<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SMAT AGGREGATOR | Professional DEX</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/ethers/6.7.0/ethers.umd.min.js"></script>
    <link rel="stylesheet" type="text/css" href="https://cdn.jsdelivr.net/npm/toastify-js/src/toastify.min.css">
    <script type="text/javascript" src="https://cdn.jsdelivr.net/npm/toastify-js"></script>

    <style>
        body { background: #0b0e11; color: white; font-family: 'Inter', sans-serif; }
        .dex-container { background: #161b22; border: 1px solid #30363d; border-radius: 24px; padding: 24px; }
        .input-box { background: #0d1117; border: 1px solid #30363d; border-radius: 16px; padding: 16px; transition: 0.2s; }
        .input-box:hover { border-color: #3b82f6; }
        
        /* ডার্ক কাস্টম ড্রপডাউন স্টাইল */
        select {
            appearance: none;
            background: #21262d;
            color: white;
            border: 1px solid #30363d;
            padding: 8px 12px;
            border-radius: 10px;
            outline: none;
            cursor: pointer;
        }

        /* Token Modal */
        #tokenModal { background: rgba(0,0,0,0.85); backdrop-filter: blur(5px); }
        .modal-content { background: #161b22; border: 1px solid #30363d; width: 100%; max-width: 400px; border-radius: 24px; }
        .token-item { cursor: pointer; transition: 0.2s; border-radius: 12px; }
        .token-item:hover { background: #21262d; }
    </style>
</head>
<body class="flex flex-col items-center justify-center min-h-screen p-4">

    <div class="w-full max-w-lg flex justify-between items-center mb-6">
        <h1 class="text-2xl font-black text-blue-500 italic">SMATDEX</h1>
        <div class="flex gap-2">
            <select id="chainId">
                <option value="0x38">BSC Mainnet</option>
                <option value="0x1">Ethereum</option>
                <option value="0x89">Polygon</option>
                <option value="0xfa">Fantom</option>
            </select>
            <button id="connectBtn" class="bg-blue-600 px-4 py-2 rounded-xl text-xs font-bold">Connect</button>
        </div>
    </div>

    <div class="dex-container w-full max-w-lg shadow-2xl">
        <div class="input-box mb-2">
            <label class="text-xs text-gray-400">You Sell</label>
            <div class="flex justify-between items-center mt-2">
                <input type="number" id="inputAmount" placeholder="0.0" class="bg-transparent text-2xl font-bold outline-none w-full">
                <button class="bg-gray-800 px-3 py-1 rounded-full text-sm font-bold flex items-center gap-2">
                    NATIVE
                </button>
            </div>
        </div>

        <div class="flex justify-center -my-4 relative z-10">
            <div class="bg-gray-900 p-2 rounded-xl border border-gray-700">⬇️</div>
        </div>

        <div class="input-box mt-2 mb-6">
            <label class="text-xs text-gray-400">You Buy</label>
            <div class="flex justify-between items-center mt-2">
                <input type="number" id="outputAmount" placeholder="0.0" class="bg-transparent text-2xl font-bold outline-none w-full" readonly>
                <button id="selectTokenBtn" class="bg-blue-600/20 text-blue-400 px-4 py-2 rounded-xl text-sm font-bold border border-blue-500/30 transition hover:bg-blue-600 hover:text-white">
                    SELECT COIN
                </button>
            </div>
            <div id="selectedTokenInfo" class="text-[10px] text-gray-500 mt-2 truncate">No token selected</div>
        </div>

        <button id="mainActionBtn" class="w-full bg-blue-600 py-4 rounded-2xl font-black text-lg transition shadow-blue-500/20 shadow-lg">Connect Wallet</button>
    </div>

    <div id="tokenModal" class="fixed inset-0 hidden flex items-center justify-center z-50 p-4">
        <div class="modal-content p-6">
            <div class="flex justify-between items-center mb-4">
                <h3 class="text-lg font-bold">Select a Token</h3>
                <button onclick="closeModal()" class="text-gray-400">✕</button>
            </div>
            <input type="text" id="tokenSearchInput" placeholder="Search by name or paste address" class="w-full bg-gray-900 border border-gray-700 p-3 rounded-xl text-sm mb-4 outline-none focus:border-blue-500">
            
            <div id="tokenList" class="max-h-60 overflow-y-auto space-y-2">
                </div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/9.22.0/firebase-app.js";
        import { getFirestore } from "https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore.js";
        const firebaseConfig = {
            apiKey: "AIzaSyAMxtJedkehhxJRMPZLjhpKHqneHEWsGlE",
            authDomain: "smat-exchange.firebaseapp.com",
            projectId: "smat-exchange",
            storageBucket: "smat-exchange.firebasestorage.app",
            messagingSenderId: "836334569396",
            appId: "1:836334569396:web:679effe640b3453412d4e1"
        };
        const app = initializeApp(firebaseConfig);
        window.db = getFirestore(app);
    </script>
    <script type="module" src="dex-logic.js"></script>
    
    <script>
        function closeModal() { document.getElementById('tokenModal').classList.add('hidden'); }
    </script>
</body>
</html>
