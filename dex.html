        body { background: #080a0c; color: white; font-family: 'Inter', sans-serif; }
        .glass { background: rgba(17, 25, 40, 0.7); backdrop-filter: blur(15px); border: 1px solid rgba(255, 255, 255, 0.1); }
        .token-modal { background: rgba(0,0,0,0.95); backdrop-filter: blur(10px); display: none; }

<body class="flex flex-col min-h-screen">

    <header class="p-6 flex justify-between items-center max-w-7xl mx-auto w-full">
        <div class="flex items-center gap-2">
            <div class="w-10 h-10 bg-[#f3ba2f] rounded-full flex items-center justify-center font-black text-white">S</div>
            <span class="text-xl font-black tracking-tighter">SMAT EXCHANGE</span>
        </div>
        <div class="flex gap-3">
            <button id="walletBtn" onclick="connectWallet()" class="bg-blue-600 px-5 py-2 rounded-2xl font-bold text-xs hover:bg-blue-700 transition">Connect Wallet</button>
        </div>
    </header>

    <main class="flex-grow flex items-center justify-center p-4">
        <div class="glass w-full max-w-[450px] p-6 rounded-[35px] shadow-2xl">
            <h2 class="font-bold mb-6">Swap</h2>

            <div class="bg-[#0d1117] p-5 rounded-3xl border border-white/5 mb-2">
                <div class="flex justify-between text-[11px] text-gray-500 mb-3">
                    <span>You Pay</span>
                    <span>Bal: <span id="userBal">0.00</span></span>
                </div>
                <div class="flex items-center justify-between gap-4">
                    <input id="payInput" type="number" placeholder="0.0" class="bg-transparent text-3xl font-bold outline-none w-full">
                    <div class="flex items-center gap-2">
                        <button onclick="setMax()" class="text-[9px] font-black text-blue-500 bg-blue-500/10 px-2 py-1.5 rounded-lg">MAX</button>
                        <div onclick="openModal('pay')" class="flex items-center gap-1 bg-gray-800 px-3 py-2 rounded-xl cursor-pointer font-bold text-sm">
                            <span id="payCoin">BNB</span> ▾
                        </div>
                    </div>
                </div>
            </div>

            <div class="flex justify-center -my-5 relative z-10">
                <div class="bg-[#161b22] p-2.5 rounded-2xl border border-white/10 text-blue-500 shadow-lg">↓</div>
            </div>

            <div class="bg-[#0d1117] p-5 rounded-3xl border border-white/5 mt-2 mb-6">
                <div class="text-[11px] text-gray-500 mb-3">You Receive</div>
                <div class="flex items-center justify-between gap-4">
                    <input id="receiveInput" type="number" placeholder="0.0" class="bg-transparent text-3xl font-bold outline-none w-full" readonly>
                    <div onclick="openModal('receive')" class="flex items-center gap-1 bg-gray-800 px-3 py-2 rounded-xl cursor-pointer font-bold text-sm">
                        <span id="receiveCoin">USDT</span> ▾
                    </div>
                </div>
            </div>

            <button id="mainBtn" onclick="handleSwap()" class="w-full bg-blue-600/20 text-blue-500 py-4 rounded-2xl font-black text-lg border border-blue-500/40">Connect Wallet</button>
        </div>
    </main>

    <div id="tokenModal" class="token-modal fixed inset-0 items-center justify-center p-4">
        <div class="glass w-full max-w-sm rounded-[35px] p-6 border border-white/10 shadow-3xl">
            <div class="flex justify-between items-center mb-5 font-bold">Select Token <span onclick="closeModal()" class="cursor-pointer text-gray-500">✕</span></div>
            <div id="tokenList" class="space-y-1">
                </div>
        </div>
    </div>

        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";

        window.db = getFirestore(app);
    </script>

    <script src="swap.js"></script>
</body>
</html>
