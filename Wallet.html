<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SMAT | Wallet</title>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-database-compat.js"></script>
    <script src="coin.js"></script>
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@900&family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --bg: #0b0e11; --card: #1e2329; --primary: #f0b90b;
            --up: #0ecb81; --down: #f6465d; --text-sec: #848e9c;
            --border: rgba(255, 255, 255, 0.08);
            --font-bold: 'Montserrat', sans-serif;
        }
        
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Inter', sans-serif; -webkit-tap-highlight-color: transparent; }
        body { background: var(--bg); color: white; padding-bottom: 90px; overflow-x: hidden; }

        /* Wallet Header */
        .wallet-header {
            padding: 30px 20px;
            background: linear-gradient(180deg, rgba(240, 185, 11, 0.15) 0%, var(--bg) 100%);
            text-align: center;
            border-bottom: 1px solid var(--border);
        }
        .total-label { font-size: 12px; color: var(--text-sec); text-transform: uppercase; letter-spacing: 1.5px; margin-bottom: 8px; font-weight: 700; }
        .total-balance { font-family: var(--font-bold); font-size: 32px; font-weight: 900; color: #fff; margin-bottom: 5px; }
        .estimated-val { font-size: 14px; color: var(--up); font-weight: 600; }

        /* Action Grid */
        .action-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 12px; padding: 20px; }
        .action-btn { 
            background: var(--card); border: 1px solid var(--border); padding: 15px; 
            border-radius: 16px; text-align: center; cursor: pointer;
        }
        .action-btn i { font-size: 22px; color: var(--primary); margin-bottom: 8px; display: block; }
        .action-btn span { font-size: 11px; font-weight: 700; color: #fff; }

        /* Asset Section */
        .asset-title { padding: 15px 20px; font-family: var(--font-bold); font-size: 20px; font-weight: 900; }
        .asset-list { padding: 0 15px; }
        .asset-card {
            background: var(--card); border-radius: 20px; padding: 16px; margin-bottom: 12px;
            display: grid; grid-template-columns: auto 1fr auto; align-items: center; gap: 15px;
            border: 1px solid var(--border);
        }
        .a-logo { width: 44px; height: 44px; border-radius: 50%; background: #2b3139; overflow: hidden; }
        .a-logo img { width: 100%; height: 100%; object-fit: cover; }
        .a-info h4 { font-family: var(--font-bold); font-size: 16px; font-weight: 900; }
        .a-info p { font-size: 12px; color: var(--text-sec); }
        .a-amounts { text-align: right; }
        .a-bal { font-family: var(--font-bold); font-size: 15px; font-weight: 900; }
        .a-usd { font-size: 12px; color: var(--text-sec); }

        /* --- HOME PAGE EXACT FOOTER & FAB STYLE --- */
        .footer { position: fixed; bottom: 0; width: 100%; height: 75px; background: #181a20; display: flex; justify-content: space-around; align-items: center; border-top: 1px solid var(--border); z-index: 3000; }
        .f-nav { text-decoration: none; color: var(--text-sec); text-align: center; font-size: 10px; flex: 1; display: flex; flex-direction: column; align-items: center; }
        .f-nav i { font-size: 22px; margin-bottom: 5px; }
        .f-nav.active { color: var(--primary); }

        .fab-wrapper { position: relative; width: 75px; display: flex; justify-content: center; }
        .fab-options { position: absolute; bottom: 40px; display: flex; justify-content: center; align-items: center; pointer-events: none; width: 300px; height: 200px; }
        
        .popup-btn {
            position: absolute; background: var(--card); border: 2.5px solid var(--primary);
            color: white; padding: 8px 18px; border-radius: 50px;
            text-decoration: none; font-weight: 800; font-size: 12px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.6);
            transition: all 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            opacity: 0; transform: scale(0.3) translateY(120px);
            pointer-events: auto; white-space: nowrap; z-index: 2900;
        }

        .fab-options.show .btn-left { opacity: 1; transform: translate(-95px, -45px) scale(1); }
        .fab-options.show .btn-center { opacity: 1; transform: translate(0, -115px) scale(1); }
        .fab-options.show .btn-right { opacity: 1; transform: translate(95px, -45px) scale(1); }

        .main-fab {
            width: 65px; height: 65px; background: var(--primary);
            border: none; border-radius: 50%; cursor: pointer;
            box-shadow: 0 0 20px rgba(243, 186, 47, 0.4);
            display: flex; justify-content: center; align-items: center;
            z-index: 3100; margin-top: -35px; outline: none; transition: 0.3s;
        }

        @keyframes continuous-spin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
        .main-fab.active { animation: continuous-spin 2s linear infinite; background: var(--down); box-shadow: 0 0 35px rgba(246, 70, 93, 0.5); }
        .main-fab i { font-size: 24px; color: #000; -webkit-text-stroke: 2px; }
        .main-fab.active i { color: #fff; transform: rotate(45deg); }

    </style>
</head>
<body>

    <div class="wallet-header">
        <div class="total-label">Total Portfolio Value</div>
        <div class="total-balance">$ <span id="totalBalance">0.00</span></div>
        <div class="estimated-val">≈ <span id="estBtc">0.000000</span> BTC</div>
    </div>

    <div class="action-grid">
        <div class="action-btn"><i class="fas fa-plus-circle"></i><span>Deposit</span></div>
        <div class="action-btn"><i class="fas fa-external-link-alt"></i><span>Withdraw</span></div>
        <div class="action-btn"><i class="fas fa-history"></i><span>History</span></div>
    </div>

    <h3 class="asset-title">Assets</h3>
    <div class="asset-list" id="assetList"></div>

    <footer class="footer">
        <a href="home.html" class="f-nav"><i class="fas fa-home"></i>Home</a>
        <a href="Trade.html" class="f-nav"><i class="fas fa-chart-line"></i>Trade</a>
        
        <div class="fab-wrapper">
            <div class="fab-options" id="fabOptions">
                <a href="Crash.html" class="popup-btn btn-left">Crash</a>
                <a href="Prediction.html" class="popup-btn btn-center">Prediction</a>
                <a href="Feature.html" class="popup-btn btn-right">Future</a>
            </div>
            <button class="main-fab" id="mainFab" onclick="toggleGamingMenu()">
                 <i class="fa-solid fa-plus" id="icon"></i>
            </button>
        </div>

        <a href="Explorer.html" class="f-nav"><i class="fas fa-compass"></i>Explore</a>
        <a href="Wallet.html" class="f-nav active"><i class="fas fa-wallet"></i>Wallet</a>
    </footer>

<script>
// Firebase & Wallet Logic
const firebaseConfig = {
    apiKey: "AIzaSyAMxtJedkehhxJRMPZLjhpKHqneHEWsGlE",
    authDomain: "smat-exchange.firebaseapp.com",
    projectId: "smat-exchange",
    storageBucket: "smat-exchange.firebasestorage.app",
    messagingSenderId: "836334569396",
    appId: "1:836334569396:web:679effe640b3453412d4e1"
};
firebase.initializeApp(firebaseConfig);
const db = firebase.database();
const auth = firebase.auth();

let livePrices = {};
let userData = {};

// FAB Menu Logic from Home Page
function toggleGamingMenu() {
    const options = document.getElementById('fabOptions');
    const mainBtn = document.getElementById('mainFab');
    options.classList.toggle('show');
    mainBtn.classList.toggle('active');
    if (navigator.vibrate) navigator.vibrate(50);
}

// Close menu on outside click
window.addEventListener('click', (e) => {
    if (!e.target.closest('.fab-wrapper')) {
        document.getElementById('fabOptions').classList.remove('show');
        document.getElementById('mainFab').classList.remove('active');
    }
});

function initWallet() {
    auth.onAuthStateChanged(user => {
        if (user) {
            db.ref('market').on('value', snap => { livePrices = snap.val() || {}; renderAssets(); });
            db.ref('users/' + user.uid).on('value', snap => { userData = snap.val() || {}; renderAssets(); });
        } else { window.location.href = "login.html"; }
    });
}

function renderAssets() {
    const list = document.getElementById('assetList');
    let totalUSD = 0;
    let btcPrice = 65000;

    const html = GLOBAL_COINS.map(coin => {
        const s = coin.sym.toLowerCase();
        const price = (livePrices[s] && livePrices[s].price) ? livePrices[s].price : coin.price;
        if(s === 'btc') btcPrice = price;

        let balance = (s === 'usdt') ? (userData.balance || 0) : (userData[s + '_balance'] || 0);
        const usdVal = balance * price;
        totalUSD += usdVal;

        return `
            <div class="asset-card">
                <div class="a-logo"><img src="assets/logos/${s}.png" onerror="this.src='assets/logos/generic.png'"></div>
                <div class="a-info">
                    <h4>${coin.sym.toUpperCase()}</h4>
                    <p>$${price.toLocaleString(undefined, {minimumFractionDigits: 2})}</p>
                </div>
                <div class="a-amounts">
                    <div class="a-bal">${balance.toLocaleString(undefined, {minimumFractionDigits: 2, maximumFractionDigits: 6})}</div>
                    <div class="a-usd">≈ $${usdVal.toLocaleString(undefined, {minimumFractionDigits: 2})}</div>
                </div>
            </div>`;
    }).join('');

    list.innerHTML = html;
    document.getElementById('totalBalance').innerText = totalUSD.toLocaleString(undefined, {minimumFractionDigits: 2, maximumFractionDigits: 2});
    document.getElementById('estBtc').innerText = (totalUSD / btcPrice).toFixed(6);
}

window.onload = initWallet;
</script>
</body>
</html>
