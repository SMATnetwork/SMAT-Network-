<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SMAT | Dynamic Wallet</title>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-database-compat.js"></script>
    <script src="coin.js"></script>
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@900&family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --bg: #0b0e11; --card: #1e2329; --primary: #f0b90b;
            --up: #0ecb81; --down: #f6465d; --text-sec: #848e9c;
            --border: rgba(255, 255, 255, 0.05);
            --font-bold: 'Montserrat', sans-serif;
        }
        
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Inter', sans-serif; -webkit-tap-highlight-color: transparent; }
        body { background: var(--bg); color: white; padding-bottom: 90px; overflow-x: hidden; }

        /* Responsive Container */
        .container { width: 100%; max-width: 600px; margin: 0 auto; }

        /* Wallet Header - Dynamic Gradient */
        .wallet-header {
            padding: clamp(20px, 8vw, 40px) 20px;
            background: radial-gradient(circle at top right, rgba(240, 185, 11, 0.15), transparent),
                        linear-gradient(180deg, rgba(30, 35, 41, 0.5) 0%, var(--bg) 100%);
            text-align: center;
            border-bottom: 1px solid var(--border);
        }
        .total-label { font-size: 12px; color: var(--text-sec); text-transform: uppercase; letter-spacing: 1.5px; margin-bottom: 10px; font-weight: 700; }
        .total-balance { font-family: var(--font-bold); font-size: clamp(28px, 10vw, 42px); font-weight: 900; color: #fff; margin-bottom: 8px; }
        .estimated-val { font-size: 14px; color: var(--up); font-weight: 600; opacity: 0.9; }

        /* Action Buttons - Fully Responsive Grid */
        .action-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 12px; padding: 20px; }
        .action-btn { 
            background: var(--card); border: 1px solid var(--border); padding: 15px 10px; 
            border-radius: 16px; text-align: center; cursor: pointer; transition: all 0.2s ease;
        }
        .action-btn i { font-size: 22px; color: var(--primary); margin-bottom: 8px; display: block; }
        .action-btn span { font-size: 11px; font-weight: 700; color: #fff; text-transform: uppercase; }
        .action-btn:active { transform: scale(0.92); background: rgba(255,255,255,0.05); }

        /* Asset Section */
        .asset-section-header { 
            display: flex; justify-content: space-between; align-items: center; 
            padding: 15px 20px; margin-top: 10px;
        }
        .asset-title { font-family: var(--font-bold); font-size: 20px; font-weight: 900; letter-spacing: -0.5px; }
        .hide-zero { font-size: 12px; color: var(--text-sec); display: flex; align-items: center; gap: 5px; }

        .asset-list { padding: 0 15px; }
        
        /* Dynamic Asset Card */
        .asset-card {
            background: var(--card); border-radius: 20px; padding: 16px; margin-bottom: 12px;
            display: grid; grid-template-columns: auto 1fr auto; align-items: center; gap: 15px;
            border: 1px solid var(--border); transition: 0.3s;
        }
        .a-logo { 
            width: 44px; height: 44px; border-radius: 50%; background: #2b3139; 
            display: flex; align-items: center; justify-content: center; overflow: hidden;
        }
        .a-logo img { width: 100%; height: 100%; object-fit: cover; }
        
        .a-info h4 { font-family: var(--font-bold); font-size: 16px; font-weight: 900; color: #fff; }
        .a-info p { font-size: 12px; color: var(--text-sec); margin-top: 2px; font-weight: 600; }
        
        .a-amounts { text-align: right; }
        .a-bal { font-family: var(--font-bold); font-size: 15px; font-weight: 900; color: #fff; }
        .a-usd { font-size: 12px; color: var(--text-sec); margin-top: 3px; font-weight: 600; }

        /* Footer - Same as Home */
        .footer { position: fixed; bottom: 0; width: 100%; height: 75px; background: #181a20; display: flex; justify-content: space-around; align-items: center; border-top: 1px solid #2b3139; z-index: 1000; }
        .f-nav { text-decoration: none; color: #848e9c; text-align: center; font-size: 10px; flex: 1; display: flex; flex-direction: column; align-items: center; gap: 4px; }
        .f-nav i { font-size: 22px; }
        .f-nav.active { color: #f0b90b; }
        .u-curve { position: relative; top: -22px; width: 75px; height: 75px; display: flex; justify-content: center; align-items: center; }
        .spin-circle { position: absolute; width: 70px; height: 70px; border: 2.5px dashed #f0b90b; border-radius: 50%; animation: spin 5s linear infinite; }
        .crash-link { width: 58px; height: 58px; background: #f0b90b; border-radius: 50%; color: black; font-family: var(--font-bold); font-weight: 900; font-size: 11px; display: flex; align-items: center; justify-content: center; text-decoration: none; z-index: 5; }
        @keyframes spin { 100% { transform: rotate(360deg); } }

        /* Media Queries for Tablet/Larger Screens */
        @media (min-width: 600px) {
            .asset-card:hover { transform: translateY(-3px); border-color: var(--primary); }
            .container { border-left: 1px solid var(--border); border-right: 1px solid var(--border); min-height: 100vh; }
        }
    </style>
</head>
<body>

<div class="container">
    <div class="wallet-header">
        <div class="total-label">Total Portfolio Value</div>
        <div class="total-balance">$ <span id="totalBalance">0.00</span></div>
        <div class="estimated-val">≈ <span id="estBtc">0.000000</span> BTC</div>
    </div>

    <div class="action-grid">
        <div class="action-btn"><i class="fas fa-plus-circle"></i><span>Deposit</span></div>
        <div class="action-btn"><i class="fas fa-external-link-alt"></i><span>Withdraw</span></div>
        <div class="action-btn"><i class="fas fa-history"></i><span>History</span></div>
    </div>

    <div class="asset-section-header">
        <h3 class="asset-title">Assets</h3>
        <div class="hide-zero"><i class="far fa-check-circle"></i> Auto-Sync Active</div>
    </div>

    <div class="asset-list" id="assetList">
        </div>
</div>

<footer class="footer">
    <a href="home.html" class="f-nav"><i class="fas fa-home"></i>Home</a>
    <a href="Market.html" class="f-nav"><i class="fas fa-chart-pie"></i>Market</a>
    <div class="u-curve">
        <div class="spin-circle"></div>
        <a href="Crash.html" class="crash-link">CRASH</a>
    </div>
    <a href="Trade.html" class="f-nav"><i class="fas fa-chart-line"></i>Trade</a>
    <a href="Wallet.html" class="f-nav active"><i class="fas fa-wallet"></i>Wallet</a>
</footer>

<script>
// Firebase Config
const firebaseConfig = {
    apiKey: "AIzaSyAMxtJedkehhxJRMPZLjhpKHqneHEWsGlE",
    authDomain: "smat-exchange.firebaseapp.com",
    projectId: "smat-exchange",
    storageBucket: "smat-exchange.firebasestorage.app",
    messagingSenderId: "836334569396",
    appId: "1:836334569396:web:679effe640b3453412d4e1"
};
firebase.initializeApp(firebaseConfig);
const db = firebase.database();
const auth = firebase.auth();

let livePrices = {};
let userData = {};

function startSync() {
    auth.onAuthStateChanged(user => {
        if (user) {
            // ১. মার্কেট ডাটা সিঙ্ক (মার্কেট থেকে লাইভ প্রাইস নেবে)
            db.ref('market').on('value', snap => {
                livePrices = snap.val() || {};
                renderWallet();
            });

            // ২. ইউজার ডাটা সিঙ্ক (ব্যালেন্সের জন্য)
            db.ref('users/' + user.uid).on('value', snap => {
                userData = snap.val() || {};
                renderWallet();
            });
        } else {
            window.location.href = "login.html";
        }
    });
}

function renderWallet() {
    const listContainer = document.getElementById('assetList');
    let totalUSD = 0;
    let btcPrice = 65000; // Default if not found

    // GLOBAL_COINS হলো coin.js থেকে আসা মেইন অ্যারে
    const html = GLOBAL_COINS.map(coin => {
        const sym = coin.sym.toLowerCase();
        
        // ১. ডায়নামিক প্রাইস লজিক (মার্কেট ডাটাবেস না থাকলে coin.js এর ডিফল্ট প্রাইস)
        const price = (livePrices[sym] && livePrices[sym].price) ? livePrices[sym].price : coin.price;
        if(sym === 'btc') btcPrice = price;

        // ২. ডায়নামিক ব্যালেন্স লজিক (USDT এর জন্য 'balance' ফিল্ড, বাকিদের জন্য coin সিম্বল ফিল্ড)
        let balance = 0;
        if(sym === 'usdt') {
            balance = userData.balance || 0;
        } else {
            // যদি ফিউচারে অন্য কয়েনের ব্যালেন্স আলাদা ফিল্ডে রাখেন (যেমন: btc_balance)
            balance = userData[sym + '_balance'] || 0; 
        }

        const usdVal = balance * price;
        totalUSD += usdVal;

        // শুধুমাত্র সেইসব কয়েন দেখাবে যেগুলোর coin.js এ এন্ট্রি আছে
        return `
            <div class="asset-card">
                <div class="a-logo">
                    <img src="assets/logos/${sym}.png" onerror="this.src='assets/logos/generic.png'">
                </div>
                <div class="a-info">
                    <h4>${coin.sym.toUpperCase()}</h4>
                    <p>$${price.toLocaleString(undefined, {minimumFractionDigits: 2, maximumFractionDigits: 6})}</p>
                </div>
                <div class="a-amounts">
                    <div class="a-bal">${balance.toLocaleString(undefined, {minimumFractionDigits: 2, maximumFractionDigits: 8})}</div>
                    <div class="a-usd">≈ $${usdVal.toLocaleString(undefined, {minimumFractionDigits: 2})}</div>
                </div>
            </div>
        `;
    }).join('');

    listContainer.innerHTML = html;

    // টোটাল ব্যালেন্স আপডেট (Comma Formatting + Montserrat 900)
    document.getElementById('totalBalance').innerText = totalUSD.toLocaleString(undefined, {minimumFractionDigits: 2, maximumFractionDigits: 2});
    document.getElementById('estBtc').innerText = (totalUSD / btcPrice).toFixed(6);
}

window.onload = startSync;
</script>
</body>
</html>
