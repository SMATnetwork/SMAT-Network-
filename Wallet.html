<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SMAT Exchange | Professional Wallet</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <style>
        :root {
            --primary: #f3ba2f; --bg: #0b0e11; --card: #181a20;
            --text-main: #eaecef; --text-sec: #848e9c; --up: #0ecb81;
            --down: #f6465d; --border: #2b3139; --input-bg: #202630;
        }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; margin: 0; padding: 0; font-family: 'Inter', sans-serif; }
        body { background: var(--bg); color: var(--text-main); padding-bottom: 80px; }

        /* Header & Tabs */
        .wallet-header { padding: 20px; background: var(--card); border-bottom: 1px solid var(--border); }
        .balance-title { color: var(--text-sec); font-size: 13px; display: flex; align-items: center; gap: 8px; }
        .total-val { font-size: 28px; font-weight: 700; margin: 8px 0; }
        .wallet-tabs { display: flex; gap: 20px; margin-top: 15px; border-bottom: 1px solid var(--border); }
        .tab { padding-bottom: 8px; color: var(--text-sec); cursor: pointer; font-size: 14px; position: relative; }
        .tab.active { color: var(--primary); font-weight: 600; }
        .tab.active::after { content: ''; position: absolute; bottom: 0; left: 0; width: 100%; height: 2px; background: var(--primary); }

        /* Action Buttons */
        .action-bar { display: grid; grid-template-columns: repeat(3, 1fr); gap: 12px; padding: 15px; background: var(--card); }
        .act-btn { background: var(--input-bg); padding: 12px; border-radius: 8px; text-align: center; font-size: 13px; font-weight: 600; cursor: pointer; color: var(--text-main); }
        .act-btn.highlight { background: var(--primary); color: #000; }

        /* Asset Section */
        .asset-list-header { display: flex; justify-content: space-between; padding: 15px 20px; font-size: 12px; color: var(--text-sec); background: var(--bg); }
        .asset-item { display: flex; justify-content: space-between; align-items: center; padding: 16px 20px; border-bottom: 1px solid var(--border); background: var(--card); }
        .coin-box { display: flex; align-items: center; gap: 12px; }
        .coin-icon { width: 32px; height: 32px; border-radius: 50%; background: #2b3139; display: flex; align-items: center; justify-content: center; font-size: 12px; color: var(--primary); border: 1px solid var(--border); }

        /* Modern Bottom Sheet */
        .overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.8); z-index: 999; display: none; }
        .sheet { position: fixed; bottom: 0; width: 100%; background: var(--card); border-radius: 20px 20px 0 0; padding: 25px; transform: translateY(100%); transition: 0.3s cubic-bezier(0.4, 0, 0.2, 1); z-index: 1000; max-height: 85vh; overflow-y: auto; }
        .sheet.open { transform: translateY(0); }

        /* CEX Input Styles */
        .input-label { font-size: 12px; color: var(--text-sec); margin-bottom: 8px; display: block; }
        .cex-input { background: var(--input-bg); border: 1px solid transparent; border-radius: 10px; padding: 14px; width: 100%; color: white; outline: none; margin-bottom: 20px; transition: 0.2s; }
        .cex-input:focus { border-color: var(--primary); }
        .net-selector { display: flex; gap: 10px; margin-bottom: 20px; }
        .net-tag { padding: 6px 12px; border: 1px solid var(--border); border-radius: 6px; font-size: 11px; cursor: pointer; color: var(--text-sec); }
        .net-tag.active { border-color: var(--primary); color: var(--primary); background: rgba(243,186,47,0.1); }

        .btn-full { width: 100%; padding: 16px; background: var(--primary); border: none; border-radius: 10px; font-weight: 700; font-size: 16px; cursor: pointer; color: #000; }

        
    </style>
</head>
<body>

    <div class="wallet-header">
        <div class="balance-title">Total Assets (USDT) <i class="fas fa-eye"></i></div>
        <div class="total-val">$ <span id="total_val">0.00</span></div>
        <div class="wallet-tabs">
            <div class="tab active">Overview</div>
            <div class="tab">Spot</div>
            <div class="tab">Funding</div>
        </div>
    </div>

    <div class="action-bar">
        <div class="act-btn highlight" onclick="openGlobalSelect('Deposit')">Deposit</div>
        <div class="act-btn" onclick="openGlobalSelect('Withdraw')">Withdraw</div>
        <div class="act-btn" onclick="openTransfer()">Transfer</div>
    </div>

    <div class="asset-list-header">
        <span>Asset Name</span>
        <span>Balance / Value</span>
    </div>
    <div id="asset_list"></div>

    <div id="overlay" class="overlay" onclick="closeSheet()"></div>
    <div id="sheet" class="sheet">
        <div id="sheet_content"></div>
    </div>

    <style>

/* Footer */
        .footer { position: fixed; bottom: 0; width: 100%; height: 70px; background: #181a20; display: flex; justify-content: space-around; align-items: center; border-top: 1px solid #2b3139; z-index: 3000; }
        .f-nav { text-decoration: none; color: var(--text-sec); text-align: center; font-size: 10px; flex: 1; }
        .f-nav i { display: block; font-size: 20px; margin-bottom: 4px; }
        .f-nav.active { color: var(--primary); }
        .u-curve { position: relative; top: -20px; width: 70px; height: 70px; display: flex; justify-content: center; align-items: center; }
        .spin-circle { position: absolute; width: 66px; height: 66px; border: 2px dashed var(--primary); border-radius: 50%; animation: spin 4s linear infinite; }
        .crash-link { width: 55px; height: 55px; background: var(--primary); border-radius: 50%; color: black; font-weight: 900; font-size: 10px; display: flex; align-items: center; justify-content: center; text-decoration: none; z-index: 5; }
        @keyframes spin { 100% { transform: rotate(360deg); } }

        .up { color: var(--up); }
        .down { color: var(--down); }
</style>

<footer class="footer">
        <a href="home.html" class="f-nav"><i class="fas fa-home"></i>Home</a>
        <a href="Trade.html" class="f-nav active"><i class="fas fa-chart-line"></i>Trade</a>
        <div class="u-curve">
            <div class="spin-circle"></div>
            <a href="Crash.html" class="crash-link">CRASH</a>
        </div>
        <a href="index.html" class="f-nav"><i class="fas fa-compass"></i>Explore</a>
        <a href="Explorer.html" class="f-nav"><i class="fas fa-wallet"></i>Explore</a>
    </footer>

    <script>
        // --- লগইন চেক ---
        function checkAuth() {
            const isLoggedIn = localStorage.getItem('isLoggedIn');
            if (isLoggedIn !== 'true') {
                alert("Please login to access your wallet.");
                window.location.href = 'Login.html'; // আপনার লগইন পেজের লিঙ্ক
                return false;
            }
            return true;
        }

        // --- মার্কেটের লাইভ দাম পাওয়ার লজিক ---
        function getMarketPrice(sym) {
            if (sym === 'USDT') return 1.0;
            const stats = JSON.parse(localStorage.getItem('marketStats')) || [];
            const coin = stats.find(c => c.sym === sym);
            // যদি মার্কেটে দাম না পাওয়া যায় তবে ডিফল্ট দাম (SMAT=1.25, BNB=590)
            return coin ? parseFloat(coin.price) : (sym === 'SMAT' ? 1.25 : 590.0);
        }

        const CONFIG = {
            ADMIN_WALLET: "0x742d35Cc6634C0532925a3b844Bc454e4438f44e",
            COINS: [
                { sym: 'USDT', name: 'Tether', key: 'usdtBalance', networks: ['BEP20', 'TRC20', 'ERC20'] },
                { sym: 'SMAT', name: 'SMAT Coin', key: 'smatBalance', networks: ['SMAT Chain', 'BEP20'] },
                { sym: 'BNB', name: 'Binance Coin', key: 'bnbBalance', networks: ['BEP20'] }
            ]
        };

        let currentAction = '';
        let selectedCoin = null;
        let selectedNet = '';

        function getBalance(key) { return parseFloat(localStorage.getItem(key)) || 0.0; }
        function setBalance(key, val) { localStorage.setItem(key, val.toFixed(4)); }

        function refreshDashboard() {
            if (!checkAuth()) return;

            const list = document.getElementById('asset_list');
            list.innerHTML = '';
            let total = 0;

            CONFIG.COINS.forEach(c => {
                const bal = getBalance(c.key);
                const price = getMarketPrice(c.sym);
                const usdValue = bal * price;
                total += usdValue;
                
                list.innerHTML += `
                    <div class="asset-item" onclick="openCoinDetails('${c.sym}')">
                        <div class="coin-box">
                            <div class="coin-icon">${c.sym[0]}</div>
                            <div><b>${c.sym}</b><br><small style="color:var(--text-sec)">${c.name}</small></div>
                        </div>
                        <div style="text-align:right">
                            <b>${bal.toFixed(4)}</b><br>
                            <small style="color:var(--text-sec)">≈ $${usdValue.toFixed(2)}</small>
                        </div>
                    </div>`;
            });
            document.getElementById('total_val').innerText = total.toLocaleString(undefined, {minimumFractionDigits: 2, maximumFractionDigits: 2});
        }

        // --- CEX Actions Logic ---
        function openGlobalSelect(action) {
            currentAction = action;
            let html = `<h3 style="margin-bottom:15px">Select Coin for ${action}</h3>`;
            CONFIG.COINS.forEach(c => {
                html += `<div class="asset-item" onclick="selectCoin('${c.sym}')">${c.sym} - ${c.name}</div>`;
            });
            renderSheet(html);
        }

        function selectCoin(sym) {
            selectedCoin = CONFIG.COINS.find(c => c.sym === sym);
            selectedNet = selectedCoin.networks[0];
            if(currentAction === 'Deposit') showDepositUI();
            else if(currentAction === 'Withdraw') showWithdrawUI();
        }

        function showDepositUI() {
            let netHtml = selectedCoin.networks.map(n => 
                `<span class="net-tag ${selectedNet===n?'active':''}" onclick="updateNet('${n}', 'dep')">${n}</span>`
            ).join('');

            let html = `
                <div style="display:flex; justify-content:space-between"><h3>Deposit ${selectedCoin.sym}</h3><i class="fas fa-times" onclick="closeSheet()"></i></div>
                <br><label class="input-label">Select Network</label>
                <div class="net-selector">${netHtml}</div>
                <div id="qr_box" style="background:#fff; padding:10px; width:160px; margin:0 auto 15px; border-radius:10px;"></div>
                <label class="input-label">Deposit Address (${selectedNet})</label>
                <div class="cex-input" style="display:flex; font-size:11px; word-break:break-all;">
                    <span id="addr_txt" style="flex:1">${CONFIG.ADMIN_WALLET}</span>
                    <i class="fas fa-copy" onclick="copy()" style="color:var(--primary); cursor:pointer"></i>
                </div>
                <p style="color:var(--down); font-size:10px; text-align:center;">* Only send ${selectedCoin.sym} to this address.</p>
            `;
            renderSheet(html);
            new QRCode(document.getElementById("qr_box"), { text: CONFIG.ADMIN_WALLET, width: 140, height: 140 });
        }

        function showWithdrawUI() {
            let netHtml = selectedCoin.networks.map(n => 
                `<span class="net-tag ${selectedNet===n?'active':''}" onclick="updateNet('${n}', 'wit')">${n}</span>`
            ).join('');

            let html = `
                <div style="display:flex; justify-content:space-between"><h3>Withdraw ${selectedCoin.sym}</h3><i class="fas fa-times" onclick="closeSheet()"></i></div>
                <br><label class="input-label">Network</label>
                <div class="net-selector">${netHtml}</div>
                <label class="input-label">Address</label>
                <input type="text" class="cex-input" id="w_addr" placeholder="Paste ${selectedNet} address">
                <label class="input-label">Amount (Available: ${getBalance(selectedCoin.key)})</label>
                <input type="number" class="cex-input" id="w_amt" placeholder="Min 10">
                <button class="btn-full" onclick="executeWithdraw()">Withdraw Now</button>
            `;
            renderSheet(html);
        }

        function openTransfer() {
            let html = `
                <div style="display:flex; justify-content:space-between"><h3>Internal Transfer</h3><i class="fas fa-times" onclick="closeSheet()"></i></div>
                <br><label class="input-label">Recipient SMAT ID / Email</label>
                <input type="text" class="cex-input" id="t_id" placeholder="UID or Email">
                <label class="input-label">Coin</label>
                <select class="cex-input" id="t_coin" style="background:var(--input-bg)">
                    ${CONFIG.COINS.map(c => `<option value="${c.sym}">${c.sym}</option>`).join('')}
                </select>
                <label class="input-label">Amount</label>
                <input type="number" class="cex-input" id="t_amt" placeholder="0.00">
                <button class="btn-full" onclick="executeTransfer()">Transfer Asset</button>
            `;
            renderSheet(html);
        }

        function executeWithdraw() {
            const addr = document.getElementById('w_addr').value;
            const amt = parseFloat(document.getElementById('w_amt').value);
            const bal = getBalance(selectedCoin.key);

            if(!addr || addr.length < 20) return alert("Invalid Address!");
            if(amt < 10 || amt > bal) return alert("Insufficient Balance or Amount too low!");

            setBalance(selectedCoin.key, bal - amt);
            saveLog('Withdraw', amt, selectedCoin.sym, selectedNet, 'Pending');
            alert("Withdrawal submitted to blockchain. Check history for status.");
            closeSheet(); refreshDashboard();
        }

        function executeTransfer() {
            const id = document.getElementById('t_id').value;
            const coinSym = document.getElementById('t_coin').value;
            const amt = parseFloat(document.getElementById('t_amt').value);
            const coin = CONFIG.COINS.find(c => c.sym === coinSym);
            const bal = getBalance(coin.key);

            if(!id || amt <= 0 || amt > bal) return alert("Transfer failed. Check ID and Balance.");

            setBalance(coin.key, bal - amt);
            saveLog('Transfer', amt, coinSym, 'Internal', 'Success');
            alert(`Successfully transferred ${amt} ${coinSym} to ${id}`);
            closeSheet(); refreshDashboard();
        }

        function renderSheet(html) {
            document.getElementById('sheet_content').innerHTML = html;
            document.getElementById('overlay').style.display = 'block';
            setTimeout(() => document.getElementById('sheet').classList.add('open'), 10);
        }
        function closeSheet() {
            document.getElementById('sheet').classList.remove('open');
            setTimeout(() => document.getElementById('overlay').style.display = 'none', 300);
        }
        function updateNet(net, type) { 
            selectedNet = net; 
            if(type==='dep') showDepositUI(); else showWithdrawUI(); 
        }
        function copy() {
            navigator.clipboard.writeText(document.getElementById('addr_txt').innerText);
            alert("Address Copied!");
        }
        function saveLog(type, amt, sym, net, status) {
            let logs = JSON.parse(localStorage.getItem('tx_history')) || [];
            logs.unshift({ type, amt, sym, net, status, date: new Date().toLocaleString() });
            localStorage.setItem('tx_history', JSON.stringify(logs.slice(0, 15)));
        }

        window.onload = refreshDashboard;
    </script>
</body>
</html>
