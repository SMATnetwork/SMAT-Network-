<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SMAT | Pro Wallet</title>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-database-compat.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/qrcode-generator@1.4.4/qrcode.min.js"></script>
    <script src="coin.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@900&family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --bg: #0b0e11; --card: #1e2329; --primary: #f0b90b;
            --up: #0ecb81; --down: #f6465d; --text-sec: #848e9c;
            --border: rgba(255, 255, 255, 0.08);
            --font-bold: 'Montserrat', sans-serif;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Inter', sans-serif; -webkit-tap-highlight-color: transparent; }
        body { background: var(--bg); color: white; padding-bottom: 90px; overflow-x: hidden; }

        .wallet-header { padding: 40px 20px 20px; text-align: center; background: linear-gradient(180deg, rgba(240, 185, 11, 0.1) 0%, var(--bg) 100%); }
        .total-balance { font-family: var(--font-bold); font-size: 38px; font-weight: 900; }
        .quick-actions { display: grid; grid-template-columns: repeat(3, 1fr); gap: 15px; padding: 0 20px 25px; }
        .q-btn { background: var(--card); border: 1px solid var(--border); border-radius: 16px; padding: 15px; text-align: center; cursor: pointer; }

        .asset-list { padding: 0 15px; }
        .asset-card {
            background: var(--card); border-radius: 18px; padding: 15px; margin-bottom: 10px;
            display: grid; grid-template-columns: auto 1fr auto; align-items: center; gap: 12px;
            border: 1px solid var(--border);
        }
        .a-logo { width: 40px; height: 40px; border-radius: 50%; overflow: hidden; background: #000; }
        .a-logo img { width: 100%; height: 100%; object-fit: cover; }

        .overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); z-index: 5000; display: none; align-items: flex-end; }
        .popup { background: #181a20; width: 100%; border-radius: 25px 25px 0 0; padding: 25px; max-height: 90vh; overflow-y: auto; border-top: 2px solid var(--primary); animation: slideUp 0.3s; }
        @keyframes slideUp { from { transform: translateY(100%); } to { transform: translateY(0); } }

        .selector-popup { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: var(--bg); z-index: 7000; display: none; flex-direction: column; }
        .search-box { padding: 15px 20px; background: #181a20; border-bottom: 1px solid var(--border); }
        .search-input { width: 100%; background: var(--card); border: 1px solid var(--border); padding: 12px 15px; border-radius: 10px; color: white; outline: none; }

        .qr-box { background: white; width: 170px; height: 170px; margin: 15px auto; padding: 8px; border-radius: 12px; position: relative; display: flex; align-items: center; justify-content: center; }
        .qr-logo { position: absolute; width: 35px; height: 35px; background: white; border-radius: 50%; padding: 2px; z-index: 5; }
        .btn-main { width: 100%; background: var(--primary); color: #000; border: none; padding: 15px; border-radius: 12px; font-weight: 900; margin-top: 15px; }
        .opt-grid { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 8px; margin-bottom: 20px; }
        .opt-btn { background: var(--card); border: 1px solid var(--border); padding: 12px 5px; border-radius: 12px; text-align: center; font-size: 11px; font-weight: 800; cursor: pointer; }
        .opt-btn.active { border-color: var(--primary); color: var(--primary); }

        .history-popup { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: var(--bg); z-index: 6000; display: none; flex-direction: column; }
        .hist-card { background: var(--card); padding: 15px; border-radius: 15px; margin-bottom: 12px; border-left: 4px solid var(--primary); }
        .status-spin { animation: spin 2s linear infinite; }
        @keyframes spin { 100% { transform: rotate(360deg); } }

        .footer {font-size:16px; position: fixed; bottom: 0; width: 100%; height: 75px; background: #181a20; display: flex; justify-content: space-around; align-items: center; border-top: 1px solid var(--border); z-index: 4000; }
        .f-nav { text-decoration: none; color: var(--text-sec); text-align: center; font-size: 16px; flex: 1; display: flex; flex-direction: column; align-items: center; gap: 4px; }
        .f-nav.active { color: var(--primary); }
        .main-fab { width: 60px; height: 60px; background: var(--primary); border-radius: 50%; margin-top: -30px; display: flex; justify-content: center; align-items: center; box-shadow: 0 0 15px rgba(240, 185, 11, 0.4); }
    </style>
</head>
<body>

    <div class="wallet-header">
        <p style="font-size: 11px; color: var(--text-sec); font-weight: bold;">TOTAL ASSETS VALUE</p>
        <div class="total-balance">$ <span id="totalBalance">0.00</span></div>
    </div>

    <div class="quick-actions">
        <div class="q-btn" onclick="openCoinSelector('deposit')"><i class="fas fa-plus-circle" style="color:var(--primary)"></i><br><span style="font-size:11px">Deposit</span></div>
        <div class="q-btn" onclick="openCoinSelector('withdraw')"><i class="fas fa-arrow-up" style="color:var(--primary)"></i><br><span style="font-size:11px">Withdraw</span></div>
        <div class="q-btn" onclick="openHistory()"><i class="fas fa-history" style="color:var(--primary)"></i><br><span style="font-size:11px">History</span></div>
    </div>

    <div class="asset-list" id="assetList"></div>

    <div class="selector-popup" id="coinSelector">
        <div class="search-box">
            <div style="display:flex; align-items:center; gap:15px; margin-bottom:15px">
                <i class="fas fa-arrow-left" onclick="closeSelector()"></i>
                <h3 id="selectorTitle">Select Asset</h3>
            </div>
            <input type="text" class="search-input" id="coinSearch" placeholder="Search coin..." oninput="filterCoins()">
        </div>
        <div id="selectorList" style="flex:1; overflow-y:auto; padding:15px"></div>
    </div>

    <div class="overlay" id="actionOverlay" onclick="closePopupOverlay(event)">
        <div class="popup">
            <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:20px">
                <div style="display:flex; align-items:center; gap:10px">
                    <img id="popCoinLogo" style="width:30px; border-radius:50%">
                    <h3 id="popCoinName" style="font-family:var(--font-bold)">COIN</h3>
                </div>
                <i class="fas fa-times" onclick="hidePopup()"></i>
            </div>
            <div id="actionSwitchers" class="opt-grid">
                <div class="opt-btn" id="btnDep" onclick="switchMode('deposit')">DEPOSIT</div>
                <div class="opt-btn" id="btnWith" onclick="switchMode('withdraw')">WITHDRAW</div>
                <div class="opt-btn" id="btnTrans" onclick="switchMode('transfer')">TRANSFER</div>
            </div>
            <div id="uiDeposit" class="mode-ui">
                <div class="qr-box"><img id="qrCoinLogo" class="qr-logo"><div id="qrcode"></div></div>
                <div style="background:#0b0e11; padding:12px; border-radius:10px; display:flex; justify-content:space-between; align-items:center">
                    <span id="depAddr" style="font-size:10px; color:var(--text-sec)">0x...</span>
                    <i class="fas fa-copy" onclick="copyValue('depAddr')" style="color:var(--primary)"></i>
                </div>
                <p style="font-size:10px; color:var(--down); text-align:center; margin-top:15px">Warning: Only BEP20/ERC20 networks supported.</p>
            </div>
            <div id="uiWithdraw" class="mode-ui" style="display:none">
                <p style="font-size:11px; color:var(--text-sec)">Available: <b id="availWith" style="color:var(--up)">0.00</b></p>
                <select id="withNet" class="form-input" style="width:100%; background:#0b0e11; border:1px solid var(--border); color:white; padding:12px; border-radius:10px; margin:10px 0"><option>BEP20</option><option>ERC20</option></select>
                <input type="text" id="withAddr" placeholder="Recipient Address" style="width:100%; background:#0b0e11; border:1px solid var(--border); color:white; padding:12px; border-radius:10px; margin-bottom:10px">
                <input type="number" id="withAmt" placeholder="Amount" style="width:100%; background:#0b0e11; border:1px solid var(--border); color:white; padding:12px; border-radius:10px">
                <button class="btn-main" onclick="processWithdraw()">WITHDRAW NOW</button>
            </div>
            <div id="uiTransfer" class="mode-ui" style="display:none">
                <p style="font-size:11px; color:var(--text-sec)">Transferable: <b id="availTrans" style="color:var(--primary)">0.00</b></p>
                <select id="transType" style="width:100%; background:#0b0e11; border:1px solid var(--border); color:white; padding:12px; border-radius:10px; margin:10px 0"><option value="gmail">Email</option><option value="smatid">SMAT ID</option></select>
                <input type="text" id="transTarget" placeholder="Recipient Details" style="width:100%; background:#0b0e11; border:1px solid var(--border); color:white; padding:12px; border-radius:10px; margin-bottom:10px">
                <input type="number" id="transAmt" placeholder="Amount" style="width:100%; background:#0b0e11; border:1px solid var(--border); color:white; padding:12px; border-radius:10px">
                <button class="btn-main" onclick="processTransfer()">TRANSFER NOW</button>
            </div>
        </div>
    </div>

    <div class="history-popup" id="historyPopup">
        <div style="padding:20px; display:flex; align-items:center; gap:15px; border-bottom:1px solid var(--border)">
            <i class="fas fa-arrow-left" onclick="closeHistory()"></i>
            <h3 style="font-family:var(--font-bold)">Transaction History</h3>
        </div>
        <div id="histContent" style="padding:15px; overflow-y:auto"></div>
    </div>

    <footer class="footer">
        <a href="home.html" class="f-nav"><i class="fas fa-home"></i>Home</a>
        <a href="Trade.html" class="f-nav"><i class="fas fa-chart-line"></i>Trade</a>
        <div class="main-fab"><i class="fas fa-plus" style="color:black"></i></div>
        <a href="Explorer.html" class="f-nav"><i class="fas fa-compass"></i>Explore</a>
        <a href="Wallet.html" class="f-nav active"><i class="fas fa-wallet"></i>Wallet</a>
    </footer>

<script>
// --- CORE FUNCTIONS ---
function formatNum(num, fixed = 2) {
    return parseFloat(num).toLocaleString(undefined, { minimumFractionDigits: fixed, maximumFractionDigits: fixed });
}

// Firebase Initialization
const firebaseConfig = { apiKey: "AIzaSyAMxtJedkehhxJRMPZLjhpKHqneHEWsGlE", authDomain: "smat-exchange.firebaseapp.com", projectId: "smat-exchange", databaseURL: "https://smat-exchange-default-rtdb.firebaseio.com", storageBucket: "smat-exchange.appspot.com", messagingSenderId: "836334569396", appId: "1:836334569396:web:679effe640b3453412d4e1" };
firebase.initializeApp(firebaseConfig);
const db = firebase.database();
const auth = firebase.auth();

let userData = {}, livePrices = {}, currentSelectorMode = ''; 

function init() {
    auth.onAuthStateChanged(user => {
        if (user) {
            db.ref('market').on('value', s => { livePrices = s.val() || {}; updateUI(); });
            db.ref('users/' + user.uid).on('value', s => { userData = s.val() || {}; updateUI(); });
        } else { location.href = "login.html"; }
    });
}

function updateUI() {
    const sorted = GLOBAL_COINS.map(c => {
        const s = c.sym.toLowerCase();
        const price = livePrices[s]?.price || c.price;
        const bal = (s === 'usdt') ? (userData.balance || 0) : (userData[s + '_balance'] || 0);
        return { ...c, price, bal, val: bal * price };
    }).sort((a,b) => b.val - a.val);

    document.getElementById('assetList').innerHTML = sorted.map(c => `
        <div class="asset-card" onclick="openActionPopup('${c.sym.toLowerCase()}', 'all')">
            <div class="a-logo"><img src="assets/logos/${c.sym.toLowerCase()}.png"></div>
            <div style="flex:1"><h4>${c.sym.toUpperCase()}</h4><p style="font-size:11px; color:var(--text-sec)">$${formatNum(c.price)}</p></div>
            <div style="text-align:right"><b>${formatNum(c.bal, 4)}</b><br><span style="font-size:11px; color:var(--text-sec)">$${formatNum(c.val)}</span></div>
        </div>
    `).join('');
    
    let total = sorted.reduce((a, b) => a + b.val, 0);
    document.getElementById('totalBalance').innerText = formatNum(total);
}

function openCoinSelector(mode) {
    currentSelectorMode = mode;
    document.getElementById('selectorTitle').innerText = mode === 'deposit' ? 'Deposit' : 'Withdraw';
    document.getElementById('coinSelector').style.display = 'flex';
    filterCoins();
}

function filterCoins() {
    const query = document.getElementById('coinSearch').value.toLowerCase();
    const list = GLOBAL_COINS.map(c => {
        const s = c.sym.toLowerCase();
        const bal = (s === 'usdt') ? (userData.balance || 0) : (userData[s + '_balance'] || 0);
        return { ...c, bal };
    }).sort((a,b) => b.bal - a.bal)
    .filter(c => c.name.toLowerCase().includes(query) || c.sym.toLowerCase().includes(query));

    document.getElementById('selectorList').innerHTML = list.map(c => `
        <div class="asset-card" onclick="openActionPopup('${c.sym.toLowerCase()}', '${currentSelectorMode}')">
            <div class="a-logo"><img src="assets/logos/${c.sym.toLowerCase()}.png"></div>
            <div style="flex:1"><h4>${c.sym.toUpperCase()}</h4><p style="font-size:11px; color:var(--text-sec)">${c.name}</p></div>
            <div style="text-align:right"><b style="color:var(--primary)">${formatNum(c.bal, 4)}</b></div>
        </div>
    `).join('');
}

function openActionPopup(sym, mode) {
    const coin = GLOBAL_COINS.find(c => c.sym.toLowerCase() === sym);
    const s = coin.sym.toLowerCase();
    const bal = (s === 'usdt') ? (userData.balance || 0) : (userData[s + '_balance'] || 0);
    const price = livePrices[s]?.price || coin.price;

    document.getElementById('popCoinLogo').src = `assets/logos/${s}.png`;
    document.getElementById('qrCoinLogo').src = `assets/logos/${s}.png`;
    document.getElementById('popCoinName').innerText = sym.toUpperCase();
    document.getElementById('depAddr').innerText = userData.depositAddress || "0xLoading...";
    document.getElementById('availWith').innerText = formatNum(bal - (0.25/price), 6);
    document.getElementById('availTrans').innerText = formatNum(bal, 6);

    const qr = qrcode(0, 'M');
    qr.addData(userData.depositAddress || "0xLoading...");
    qr.make();
    document.getElementById('qrcode').innerHTML = qr.createImgTag(4);

    document.getElementById('coinSelector').style.display = 'none';
    document.getElementById('actionOverlay').style.display = 'flex';
    
    const grid = document.getElementById('actionSwitchers');
    const bDep = document.getElementById('btnDep'), bWith = document.getElementById('btnWith'), bTrans = document.getElementById('btnTrans');
    
    if(mode === 'deposit') {
        grid.style.display = 'grid'; bDep.style.display = 'block'; bWith.style.display = 'none'; bTrans.style.display = 'none';
        switchMode('deposit');
    } else if(mode === 'withdraw') {
        grid.style.display = 'grid'; bDep.style.display = 'none'; bWith.style.display = 'block'; bTrans.style.display = 'block';
        switchMode('withdraw');
    } else {
        grid.style.display = 'grid'; bDep.style.display = 'block'; bWith.style.display = 'block'; bTrans.style.display = 'block';
        switchMode('deposit');
    }
}

function switchMode(m) {
    document.querySelectorAll('.mode-ui').forEach(u => u.style.display = 'none');
    document.querySelectorAll('.opt-btn').forEach(b => b.classList.remove('active'));
    document.getElementById('ui' + m.charAt(0).toUpperCase() + m.slice(1)).style.display = 'block';
    document.getElementById('btn' + m.charAt(0).toUpperCase() + m.slice(1).substring(0,3)).classList.add('active');
}

// --- HISTORY LOGIC WITH 60 DAYS AUTO-DELETE ---
function openHistory() {
    document.getElementById('historyPopup').style.display = 'flex';
    const cont = document.getElementById('histContent');
    const now = Date.now();
    const sixtyDaysInMs = 60 * 24 * 60 * 60 * 1000;

    let headerHtml = `
        <div style="background: rgba(240, 185, 11, 0.1); padding: 12px; border-radius: 10px; margin-bottom: 20px; border: 1px solid rgba(240, 185, 11, 0.2);">
            <p style="font-size: 11px; color: var(--primary); font-weight: bold; text-align: center;">
                <i class="fas fa-info-circle"></i> Records are kept for a maximum of 60 days.
            </p>
        </div>
    `;

    db.ref('users/' + auth.currentUser.uid + '/history').on('value', snap => {
        const data = snap.val();
        if(!data) { cont.innerHTML = headerHtml + "<p style='text-align:center; color:var(--text-sec); margin-top:30px;'>No history found.</p>"; return; }

        let html = headerHtml;
        const items = Object.keys(data).map(key => ({ id: key, ...data[key] })).sort((a,b) => b.timestamp - a.timestamp);

        items.forEach(item => {
            // Auto-delete check
            if (now - item.timestamp > sixtyDaysInMs) {
                db.ref('users/' + auth.currentUser.uid + '/history/' + item.id).remove();
                return;
            }

            let typeIcon = 'fa-exchange-alt', typeColor = 'var(--primary)';
            if (item.method.toLowerCase().includes('deposit')) { typeIcon = 'fa-plus-circle'; typeColor = 'var(--up)'; }
            else if (item.method.toLowerCase().includes('withdraw')) { typeIcon = 'fa-arrow-up-right-from-square'; typeColor = 'var(--down)'; }

            html += `
                <div class="hist-card" style="border-left-color: ${typeColor};">
                    <div style="display:flex; justify-content:space-between; align-items:flex-start;">
                        <div>
                            <span style="color:${typeColor}; font-weight:bold; font-size:12px;"><i class="fas ${typeIcon}"></i> ${item.method.toUpperCase()}</span>
                            <div style="font-size:9px; color:var(--text-sec); margin-top:2px;">${new Date(item.timestamp).toLocaleString()}</div>
                        </div>
                        <span style="font-size:10px; padding:2px 6px; border-radius:4px; background:rgba(255,255,255,0.05); color:${item.status==='success'?'var(--up)':'var(--primary)'}">
                            ${item.status==='pending'?'<i class="fas fa-spinner status-spin"></i>':''} ${item.status.toUpperCase()}
                        </span>
                    </div>
                    <div style="display:grid; grid-template-columns: 1fr 1fr; gap:8px; margin-top:10px; padding-top:8px; border-top:1px solid rgba(255,255,255,0.03);">
                        <div><p style="font-size:9px; color:var(--text-sec)">Amount</p><b>${formatNum(item.amount, 4)} ${item.coin}</b></div>
                        <div style="text-align:right"><p style="font-size:9px; color:var(--text-sec)">Network</p><b>${item.network}</b></div>
                        <div style="grid-column: span 2;"><p style="font-size:9px; color:var(--text-sec)">Address/Target</p>
                            <div style="display:flex; justify-content:space-between; font-size:10px;">
                                <span style="font-family:monospace;">${item.address}</span>
                                <i class="fas fa-copy" onclick="copyValueText('${item.address}')" style="color:var(--primary); cursor:pointer;"></i>
                            </div>
                        </div>
                    </div>
                </div>`;
        });
        cont.innerHTML = html;
    });
}

// --- PROCESSORS ---
async function processWithdraw() {
    const amt = parseFloat(document.getElementById('withAmt').value);
    const addr = document.getElementById('withAddr').value;
    const s = document.getElementById('popCoinName').innerText.toLowerCase();
    const bal = (s === 'usdt') ? (userData.balance || 0) : (userData[s + '_balance'] || 0);
    const price = livePrices[s]?.price || 1, fee = 0.25 / price;

    if(!addr || isNaN(amt) || amt <= 0 || (amt + fee) > bal) return alert("Insufficient Balance!");

    const txId = db.ref('transactions').push().key;
    const data = { method: 'Withdraw', coin: s.toUpperCase(), amount: amt, network: document.getElementById('withNet').value, address: addr, status: 'pending', timestamp: Date.now(), hash: '...' };
    await db.ref('users/' + auth.currentUser.uid).update({ [(s==='usdt'?'balance':s+'_balance')]: bal - (amt + fee) });
    await db.ref('users/' + auth.currentUser.uid + '/history/' + txId).set(data);
    alert("Withdrawal Submitted!"); hidePopup();
}

async function processTransfer() {
    const amt = parseFloat(document.getElementById('transAmt').value);
    const target = document.getElementById('transTarget').value;
    const s = document.getElementById('popCoinName').innerText.toLowerCase();
    const bal = (s === 'usdt') ? (userData.balance || 0) : (userData[s + '_balance'] || 0);

    if(!target || isNaN(amt) || amt <= 0 || amt > bal) return alert("Check Input!");

    const txId = db.ref('transactions').push().key;
    const data = { method: 'Internal Transfer', coin: s.toUpperCase(), amount: amt, network: 'Internal', address: target, status: 'success', timestamp: Date.now(), hash: 'Null' };
    await db.ref('users/' + auth.currentUser.uid).update({ [(s==='usdt'?'balance':s+'_balance')]: bal - amt });
    await db.ref('users/' + auth.currentUser.uid + '/history/' + txId).set(data);
    alert("Sent Successfully!"); hidePopup();
}

function hidePopup() { document.getElementById('actionOverlay').style.display = 'none'; }
function closeHistory() { document.getElementById('historyPopup').style.display = 'none'; }
function closeSelector() { document.getElementById('coinSelector').style.display = 'none'; }
function copyValueText(t) { navigator.clipboard.writeText(t); alert("Copied!"); }
function copyValue(id) { copyValueText(document.getElementById(id).innerText); }
function closePopupOverlay(e) { if(e.target.id === 'actionOverlay') hidePopup(); }

window.onload = init;
</script>
</body>
</html>
