<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SMAT CEX | Secure Wallet</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <style>
        :root {
            --primary: #f3ba2f; --bg: #0b0e11; --card: #181a20;
            --text-main: #eaecef; --text-sec: #848e9c; --up: #0ecb81;
            --down: #f6465d; --border: #2b3139; --input-bg: #202630;
        }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; margin: 0; padding: 0; font-family: 'Inter', sans-serif; }
        body { background: var(--bg); color: var(--text-main); padding-bottom: 90px; overflow-x: hidden; }

        /* Header */
        .wallet-header { padding: 25px 20px; background: linear-gradient(180deg, var(--card) 0%, var(--bg) 100%); border-bottom: 1px solid var(--border); }
        .balance-title { color: var(--text-sec); font-size: 13px; display: flex; align-items: center; gap: 8px; }
        .total-val { font-size: 32px; font-weight: 800; margin: 10px 0; color: var(--text-main); }
        .total-val span { color: var(--primary); }
        
        .wallet-tabs { display: flex; gap: 20px; margin-top: 20px; }
        .tab { padding-bottom: 10px; color: var(--text-sec); cursor: pointer; font-size: 14px; font-weight: 600; position: relative; }
        .tab.active { color: var(--primary); }
        .tab.active::after { content: ''; position: absolute; bottom: 0; left: 0; width: 100%; height: 3px; background: var(--primary); border-radius: 10px; }

        /* Actions */
        .action-bar { display: grid; grid-template-columns: repeat(3, 1fr); gap: 12px; padding: 15px; background: var(--bg); }
        .act-btn { background: var(--card); padding: 14px; border-radius: 12px; text-align: center; font-size: 13px; font-weight: 700; cursor: pointer; border: 1px solid var(--border); transition: 0.2s; }
        .act-btn:active { transform: scale(0.95); background: var(--input-bg); }
        .act-btn.highlight { background: var(--primary); color: #000; border: none; }

        /* Asset List */
        .asset-section { margin-top: 5px; }
        .asset-item { display: flex; justify-content: space-between; align-items: center; padding: 18px 20px; border-bottom: 1px solid #1e2329; background: var(--bg); }
        .coin-box { display: flex; align-items: center; gap: 12px; }
        .coin-icon { width: 38px; height: 38px; border-radius: 50%; background: var(--card); display: flex; align-items: center; justify-content: center; font-weight: 800; color: var(--primary); border: 1px solid var(--border); }

        /* Bottom Sheet */
        .overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.85); z-index: 2000; display: none; backdrop-filter: blur(4px); }
        .sheet { position: fixed; bottom: 0; width: 100%; background: var(--card); border-radius: 24px 24px 0 0; padding: 25px; transform: translateY(100%); transition: 0.4s cubic-bezier(0, 0, 0.2, 1); z-index: 2100; max-height: 80vh; overflow-y: auto; border-top: 1px solid var(--primary); }
        .sheet.open { transform: translateY(0); }

        .cex-input { background: var(--input-bg); border: 1px solid var(--border); border-radius: 12px; padding: 15px; width: 100%; color: white; outline: none; margin-bottom: 15px; font-size: 15px; }
        .btn-full { width: 100%; padding: 16px; background: var(--primary); border: none; border-radius: 12px; font-weight: 800; font-size: 16px; cursor: pointer; color: #000; margin-top: 10px; }
        
        .net-selector { display: flex; gap: 10px; margin-bottom: 15px; overflow-x: auto; }
        .net-tag { padding: 8px 15px; border: 1px solid var(--border); border-radius: 8px; font-size: 12px; color: var(--text-sec); white-space: nowrap; }
        .net-tag.active { border-color: var(--primary); color: var(--primary); background: rgba(243,186,47,0.1); }

        /* Footer */
        .footer { position: fixed; bottom: 0; width: 100%; height: 75px; background: #111418; display: flex; justify-content: space-around; align-items: center; border-top: 1px solid var(--border); z-index: 1000; }
        .f-nav { text-decoration: none; color: var(--text-sec); text-align: center; font-size: 10px; flex: 1; }
        .f-nav i { display: block; font-size: 22px; margin-bottom: 5px; }
        .f-nav.active { color: var(--primary); }
    </style>
</head>
<body>

    <div class="wallet-header">
        <div class="balance-title">Estimated Balance <i class="fas fa-eye-slash" style="margin-left:5px"></i></div>
        <div class="total-val">$<span id="total_val">0.00</span></div>
        <div class="wallet-tabs">
            <div class="tab active" onclick="switchTab('spot')">Spot</div>
            <div class="tab" onclick="switchTab('funding')">Funding</div>
            <div class="tab" onclick="switchTab('earn')">Earn</div>
        </div>
    </div>

    <div class="action-bar">
        <div class="act-btn highlight" onclick="openAction('Deposit')">Deposit</div>
        <div class="act-btn" onclick="openAction('Withdraw')">Withdraw</div>
        <div class="act-btn" onclick="openTransfer()">Transfer</div>
    </div>

    <div class="asset-section" id="asset_list">
        </div>

    <div id="overlay" class="overlay" onclick="closeSheet()"></div>
    <div id="sheet" class="sheet">
        <div id="sheet_content"></div>
    </div>

    <footer class="footer">
        <a href="Home.html" class="f-nav"><i class="fas fa-home"></i>Home</a>
        <a href="Trade.html" class="f-nav"><i class="fas fa-chart-line"></i>Trade</a>
        <a href="index.html" class="f-nav"><i class="fas fa-microchip"></i>Mining</a>
        <a href="Wallet.html" class="f-nav active"><i class="fas fa-wallet"></i>Wallet</a>
    </footer>

    <script>
        const CONFIG = {
            DEPOSIT_ADDR: "0x742d35Cc6634C0532925a3b844Bc454e4438f44e",
            ASSETS: [
                { sym: 'USDT', name: 'Tether', key: 'usdtBalance', nets: ['BEP20', 'TRC20'] },
                { sym: 'SMAT', name: 'SMAT Coin', key: 'smatBalance', nets: ['SMAT Chain', 'BEP20'] },
                { sym: 'BNB', name: 'Binance Coin', key: 'bnbBalance', nets: ['BEP20'] }
            ]
        };

        function init() {
            // ডিফল্ট ব্যালেন্স সেট (যদি না থাকে)
            if(!localStorage.getItem('usdtBalance')) localStorage.setItem('usdtBalance', '500.00');
            if(!localStorage.getItem('smatBalance')) localStorage.setItem('smatBalance', '100.00');
            
            renderAssets();
        }

        function getLivePrice(sym) {
            if(sym === 'USDT') return 1.0;
            const stats = JSON.parse(localStorage.getItem('marketStats')) || [];
            const coin = stats.find(c => c.sym === sym);
            return coin ? parseFloat(coin.price) : 1.0;
        }

        function renderAssets() {
            const container = document.getElementById('asset_list');
            container.innerHTML = '';
            let totalUSD = 0;

            CONFIG.ASSETS.forEach(asset => {
                const bal = parseFloat(localStorage.getItem(asset.key)) || 0;
                const price = getLivePrice(asset.sym);
                const usdVal = bal * price;
                totalUSD += usdVal;

                container.innerHTML += `
                    <div class="asset-item" onclick="openAssetMenu('${asset.sym}')">
                        <div class="coin-box">
                            <div class="coin-icon">${asset.sym[0]}</div>
                            <div>
                                <div style="font-weight:700">${asset.sym}</div>
                                <div style="font-size:11px; color:var(--text-sec)">${asset.name}</div>
                            </div>
                        </div>
                        <div style="text-align:right">
                            <div style="font-weight:700">${bal.toFixed(4)}</div>
                            <div style="font-size:11px; color:var(--text-sec)">≈ $${usdVal.toFixed(2)}</div>
                        </div>
                    </div>
                `;
            });
            document.getElementById('total_val').innerText = totalUSD.toLocaleString(undefined, {minimumFractionDigits: 2});
        }

        function openAction(type) {
            let html = `<h3 style="margin-bottom:20px">Select Asset to ${type}</h3>`;
            CONFIG.ASSETS.forEach(a => {
                html += `<div class="asset-item" style="border:1px solid var(--border); border-radius:12px; margin-bottom:10px" onclick="selectForAction('${a.sym}', '${type}')">
                            <b>${a.sym}</b> <span>${a.name}</span>
                         </div>`;
            });
            renderSheet(html);
        }

        function selectForAction(sym, type) {
            const asset = CONFIG.ASSETS.find(a => a.sym === sym);
            if(type === 'Deposit') showDeposit(asset);
            else showWithdraw(asset);
        }

        function showDeposit(asset) {
            let html = `
                <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:20px">
                    <h3>Deposit ${asset.sym}</h3>
                    <i class="fas fa-times" onclick="closeSheet()"></i>
                </div>
                <div class="net-selector">
                    ${asset.nets.map((n, i) => `<div class="net-tag ${i===0?'active':''}">${n}</div>`).join('')}
                </div>
                <div id="qrcode" style="background:#fff; padding:15px; width:180px; height:180px; margin:20px auto; border-radius:12px"></div>
                <p style="font-size:12px; color:var(--text-sec); text-align:center">Wallet Address (${asset.nets[0]})</p>
                <div class="cex-input" style="display:flex; justify-content:space-between; align-items:center; font-size:12px; margin-top:10px">
                    <span id="addr">${CONFIG.DEPOSIT_ADDR}</span>
                    <i class="fas fa-copy" style="color:var(--primary)" onclick="copyAddr()"></i>
                </div>
                <p style="font-size:11px; color:var(--down); text-align:center; margin-top:10px">
                    * Deposit only ${asset.sym} via ${asset.nets[0]} network.
                </p>
            `;
            renderSheet(html);
            new QRCode(document.getElementById("qrcode"), { text: CONFIG.DEPOSIT_ADDR, width: 150, height: 150 });
        }

        function showWithdraw(asset) {
            const bal = parseFloat(localStorage.getItem(asset.key)) || 0;
            let html = `
                <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:20px">
                    <h3>Withdraw ${asset.sym}</h3>
                    <i class="fas fa-times" onclick="closeSheet()"></i>
                </div>
                <label style="font-size:12px; color:var(--text-sec)">Address</label>
                <input type="text" class="cex-input" placeholder="Long press to paste">
                <label style="font-size:12px; color:var(--text-sec)">Network</label>
                <div class="net-selector">${asset.nets.map((n, i) => `<div class="net-tag ${i===0?'active':''}">${n}</div>`).join('')}</div>
                <label style="font-size:12px; color:var(--text-sec)">Amount (Avbl: ${bal.toFixed(2)})</label>
                <input type="number" class="cex-input" placeholder="Minimum 10">
                <button class="btn-full" onclick="alert('Withdrawal request submitted!')">Withdraw ${asset.sym}</button>
            `;
            renderSheet(html);
        }

        function openTransfer() {
            let html = `
                <h3>Internal Transfer</h3><br>
                <input type="text" class="cex-input" placeholder="Recipient UID or Email">
                <select class="cex-input" style="background:var(--input-bg)">
                    ${CONFIG.ASSETS.map(a => `<option>${a.sym}</option>`).join('')}
                </select>
                <input type="number" class="cex-input" placeholder="Amount">
                <button class="btn-full" onclick="closeSheet()">Transfer Now</button>
            `;
            renderSheet(html);
        }

        function renderSheet(html) {
            document.getElementById('sheet_content').innerHTML = html;
            document.getElementById('overlay').style.display = 'block';
            setTimeout(() => document.getElementById('sheet').classList.add('open'), 10);
        }

        function closeSheet() {
            document.getElementById('sheet').classList.remove('open');
            setTimeout(() => document.getElementById('overlay').style.display = 'none', 300);
        }

        function copyAddr() {
            navigator.clipboard.writeText(CONFIG.DEPOSIT_ADDR);
            alert("Address Copied!");
        }

        window.onload = init;
    </script>
</body>
</html>
