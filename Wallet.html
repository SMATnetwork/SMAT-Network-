<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SMAT | Wallet</title>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-database-compat.js"></script>
    <script src="coin.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@900&family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --bg: #0b0e11; --card: #1e2329; --primary: #f0b90b;
            --up: #0ecb81; --down: #f6465d; --text-sec: #848e9c;
            --border: rgba(255, 255, 255, 0.05);
            --font-bold: 'Montserrat', sans-serif;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Inter', sans-serif; }
        body { background: var(--bg); color: white; padding-bottom: 90px; }

        /* Wallet Header */
        .wallet-header {
            padding: 30px 20px;
            background: linear-gradient(180deg, rgba(240, 185, 11, 0.15) 0%, var(--bg) 100%);
            text-align: center;
            border-bottom: 1px solid var(--border);
        }
        .total-label { font-size: 12px; color: var(--text-sec); text-transform: uppercase; letter-spacing: 1px; margin-bottom: 8px; font-weight: 700; }
        .total-balance { font-family: var(--font-bold); font-size: 32px; font-weight: 900; color: #fff; margin-bottom: 5px; }
        .estimated-val { font-size: 14px; color: var(--up); font-weight: 600; }

        /* Action Buttons */
        .action-grid { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 12px; padding: 20px; }
        .action-btn { 
            background: var(--card); border: 1px solid var(--border); padding: 12px; 
            border-radius: 12px; text-align: center; cursor: pointer; transition: 0.3s;
        }
        .action-btn i { font-size: 20px; color: var(--primary); margin-bottom: 6px; display: block; }
        .action-btn span { font-size: 12px; font-weight: 700; color: #fff; }
        .action-btn:active { transform: scale(0.95); background: #2b3139; }

        /* Asset Section */
        .asset-title { padding: 10px 20px; font-family: var(--font-bold); font-size: 18px; font-weight: 900; letter-spacing: -0.5px; }
        
        .asset-list { padding: 0 15px; }
        .asset-card {
            background: var(--card); border-radius: 16px; padding: 16px; margin-bottom: 12px;
            display: grid; grid-template-columns: auto 1fr auto; align-items: center; gap: 15px;
            border: 1px solid var(--border);
        }
        .a-logo { width: 40px; height: 40px; border-radius: 50%; background: #2b3139; padding: 2px; }
        .a-logo img { width: 100%; height: 100%; border-radius: 50%; object-fit: cover; }
        
        .a-info h4 { font-family: var(--font-bold); font-size: 16px; font-weight: 900; margin-bottom: 2px; }
        .a-info p { font-size: 11px; color: var(--text-sec); font-weight: 600; }
        
        .a-amounts { text-align: right; }
        .a-bal { font-family: var(--font-bold); font-size: 15px; font-weight: 900; margin-bottom: 2px; }
        .a-usd { font-size: 12px; color: var(--text-sec); font-weight: 600; }

        /* Footer - EXACTLY FROM HOME PAGE */
        .footer { position: fixed; bottom: 0; width: 100%; height: 75px; background: #181a20; display: flex; justify-content: space-around; align-items: center; border-top: 1px solid #2b3139; z-index: 1000; }
        .f-nav { text-decoration: none; color: #848e9c; text-align: center; font-size: 10px; flex: 1; display: flex; flex-direction: column; align-items: center; gap: 4px; }
        .f-nav i { font-size: 22px; }
        .f-nav.active { color: #f0b90b; }
        
        .u-curve { position: relative; top: -22px; width: 75px; height: 75px; display: flex; justify-content: center; align-items: center; }
        .spin-circle { position: absolute; width: 70px; height: 70px; border: 2.5px dashed #f0b90b; border-radius: 50%; animation: spin 5s linear infinite; }
        .crash-link { width: 58px; height: 58px; background: #f0b90b; border-radius: 50%; color: black; font-family: 'Montserrat', sans-serif; font-weight: 900; font-size: 11px; display: flex; align-items: center; justify-content: center; text-decoration: none; z-index: 5; box-shadow: 0 0 15px rgba(243, 186, 47, 0.4); }
        
        @keyframes spin { 100% { transform: rotate(360deg); } }
    </style>
</head>
<body>

    <div class="wallet-header">
        <div class="total-label">Total Portfolio Value</div>
        <div class="total-balance">$ <span id="totalBalance">0.00</span></div>
        <div class="estimated-val">≈ <span id="estBtc">0.000000</span> BTC</div>
    </div>

    <div class="action-grid">
        <div class="action-btn"><i class="fas fa-arrow-down"></i><span>Deposit</span></div>
        <div class="action-btn"><i class="fas fa-paper-plane"></i><span>Withdraw</span></div>
        <div class="action-btn"><i class="fas fa-exchange-alt"></i><span>Transfer</span></div>
    </div>

    <h3 class="asset-title">My Assets</h3>
    <div class="asset-list" id="assetList"></div>

    <footer class="footer">
        <a href="home.html" class="f-nav"><i class="fas fa-home"></i>Home</a>
        <a href="Market.html" class="f-nav"><i class="fas fa-chart-pie"></i>Market</a>
        <div class="u-curve">
            <div class="spin-circle"></div>
            <a href="Crash.html" class="crash-link">CRASH</a>
        </div>
        <a href="Trade.html" class="f-nav"><i class="fas fa-chart-line"></i>Trade</a>
        <a href="Wallet.html" class="f-nav active"><i class="fas fa-wallet"></i>Wallet</a>
    </footer>

<script>
const firebaseConfig = {
    apiKey: "AIzaSyAMxtJedkehhxJRMPZLjhpKHqneHEWsGlE",
    authDomain: "smat-exchange.firebaseapp.com",
    projectId: "smat-exchange",
    storageBucket: "smat-exchange.firebasestorage.app",
    messagingSenderId: "836334569396",
    appId: "1:836334569396:web:679effe640b3453412d4e1"
};
firebase.initializeApp(firebaseConfig);
const db = firebase.database();
const auth = firebase.auth();

let coinPrices = {};
let mainBalance = 0;

function initWallet() {
    auth.onAuthStateChanged(user => {
        if (user) {
            // ১. লাইভ মার্কেট প্রাইস
            db.ref('market').on('value', snap => {
                coinPrices = snap.val() || {};
                updateUI();
            });

            // ২. হোম পেজের মতো মেইন ব্যালেন্স কল (users/uid/balance)
            db.ref('users/' + user.uid).on('value', snap => {
                const userData = snap.val();
                if (userData) {
                    mainBalance = userData.balance || 0;
                    updateUI();
                }
            });
        } else {
            window.location.href = "login.html";
        }
    });
}

function updateUI() {
    const listContainer = document.getElementById('assetList');
    let html = '';

    GLOBAL_COINS.forEach(coin => {
        const sym = coin.sym.toLowerCase();
        const price = (coinPrices[sym] && coinPrices[sym].price) ? coinPrices[sym].price : coin.price;
        
        // USDT হিসেবে মেইন ব্যালেন্স ম্যাপিং
        let balance = (sym === 'usdt') ? mainBalance : 0; 
        let usdValue = balance * price;

        if (balance > 0 || sym === 'usdt') {
            html += `
                <div class="asset-card">
                    <div class="a-logo">
                        <img src="assets/logos/${sym}.png" onerror="this.src='assets/logos/generic.png'">
                    </div>
                    <div class="a-info">
                        <h4>${coin.sym.toUpperCase()}</h4>
                        <p>$${price.toLocaleString(undefined, {minimumFractionDigits: 2})}</p>
                    </div>
                    <div class="a-amounts">
                        <div class="a-bal">${balance.toLocaleString(undefined, {minimumFractionDigits: 2, maximumFractionDigits: 8})}</div>
                        <div class="a-usd">≈ $${usdValue.toLocaleString(undefined, {minimumFractionDigits: 2})}</div>
                    </div>
                </div>
            `;
        }
    });

    listContainer.innerHTML = html;
    document.getElementById('totalBalance').innerText = mainBalance.toLocaleString(undefined, {minimumFractionDigits: 2, maximumFractionDigits: 2});
    
    const btcPrice = (coinPrices['btc'] && coinPrices['btc'].price) ? coinPrices['btc'].price : 65000;
    const estBtc = mainBalance / btcPrice;
    document.getElementById('estBtc').innerText = estBtc.toFixed(6);
}

window.onload = initWallet;
</script>
</body>
</html>
