<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SMAT CEX | Secure Wallet</title>
    <script src="coins.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <style>
        :root {
            --primary: #f3ba2f; --bg: #0b0e11; --card: #181a20;
            --text-main: #eaecef; --text-sec: #848e9c; --up: #0ecb81;
            --down: #f6465d; --border: #2b3139; --input-bg: #202630;
        }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; margin: 0; padding: 0; font-family: 'Inter', sans-serif; }
        body { background: var(--bg); color: var(--text-main); padding-bottom: 90px; overflow-x: hidden; }

        /* Header */
        .wallet-header { padding: 30px 20px; background: linear-gradient(180deg, #1e2329 0%, var(--bg) 100%); border-bottom: 1px solid var(--border); }
        .balance-title { color: var(--text-sec); font-size: 13px; display: flex; align-items: center; gap: 8px; cursor: pointer; }
        .total-val { font-size: 34px; font-weight: 800; margin: 12px 0; color: var(--text-main); letter-spacing: -1px; }
        .total-val span { color: var(--primary); }
        
        .wallet-tabs { display: flex; gap: 20px; margin-top: 25px; }
        .tab { padding-bottom: 12px; color: var(--text-sec); cursor: pointer; font-size: 15px; font-weight: 600; position: relative; }
        .tab.active { color: var(--primary); }
        .tab.active::after { content: ''; position: absolute; bottom: 0; left: 0; width: 100%; height: 3px; background: var(--primary); border-radius: 10px; }

        /* Actions */
        .action-bar { display: grid; grid-template-columns: repeat(3, 1fr); gap: 12px; padding: 15px; background: var(--bg); }
        .act-btn { background: var(--card); padding: 15px; border-radius: 12px; text-align: center; font-size: 14px; font-weight: 700; cursor: pointer; border: 1px solid var(--border); transition: 0.2s; }
        .act-btn:active { transform: scale(0.95); background: var(--input-bg); }
        .act-btn.highlight { background: var(--primary); color: #000; border: none; }

        /* Asset List */
        .asset-item { display: flex; justify-content: space-between; align-items: center; padding: 20px; border-bottom: 1px solid #1e2329; background: var(--bg); transition: 0.2s; }
        .asset-item:active { background: var(--card); }
        .coin-box { display: flex; align-items: center; gap: 14px; }
        .coin-icon { width: 42px; height: 42px; border-radius: 50%; background: var(--card); display: flex; align-items: center; justify-content: center; font-weight: 800; color: var(--primary); border: 1px solid var(--border); font-size: 18px; }

        /* Bottom Sheet */
        .overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.85); z-index: 2000; display: none; backdrop-filter: blur(5px); }
        .sheet { position: fixed; bottom: 0; width: 100%; background: var(--card); border-radius: 28px 28px 0 0; padding: 30px 25px; transform: translateY(100%); transition: 0.4s cubic-bezier(0, 0, 0.2, 1); z-index: 2100; max-height: 85vh; overflow-y: auto; border-top: 1px solid #333; }
        .sheet.open { transform: translateY(0); }

        .cex-input { background: var(--input-bg); border: 1px solid var(--border); border-radius: 12px; padding: 16px; width: 100%; color: white; outline: none; margin: 10px 0 20px 0; font-size: 15px; }
        .btn-full { width: 100%; padding: 18px; background: var(--primary); border: none; border-radius: 14px; font-weight: 800; font-size: 16px; cursor: pointer; color: #000; margin-top: 10px; }
        
        .net-selector { display: flex; gap: 10px; margin: 15px 0; overflow-x: auto; padding-bottom: 5px; }
        .net-tag { padding: 10px 18px; border: 1px solid var(--border); border-radius: 10px; font-size: 13px; color: var(--text-sec); white-space: nowrap; font-weight: 600; }
        .net-tag.active { border-color: var(--primary); color: var(--primary); background: rgba(243,186,47,0.1); }

        /* Footer */
        .footer { position: fixed; bottom: 0; width: 100%; height: 75px; background: #111418; display: flex; justify-content: space-around; align-items: center; border-top: 1px solid var(--border); z-index: 1000; }
        .f-nav { text-decoration: none; color: var(--text-sec); text-align: center; font-size: 10px; flex: 1; }
        .f-nav i { display: block; font-size: 22px; margin-bottom: 5px; }
        .f-nav.active { color: var(--primary); }
    </style>
</head>
<body>

    <div class="wallet-header">
        <div class="balance-title" onclick="toggleBalance()">
            Estimated Balance <i id="eye-icon" class="fas fa-eye" style="margin-left:8px; color: var(--primary);"></i>
        </div>
        <div class="total-val" id="display-total">$<span id="total_val">0.00</span></div>
        <div class="wallet-tabs">
            <div class="tab active">Spot</div>
            <div class="tab">Funding</div>
            <div class="tab">Earn</div>
            <div class="tab">Futures</div>
        </div>
    </div>

    <div class="action-bar">
        <div class="act-btn highlight" onclick="openAction('Deposit')">Deposit</div>
        <div class="act-btn" onclick="openAction('Withdraw')">Withdraw</div>
        <div class="act-btn" onclick="openTransfer()">Transfer</div>
    </div>

    <div style="padding: 10px 20px; font-size: 18px; font-weight: 800;">Assets</div>
    <div class="asset-section" id="asset_list">
        </div>

    <div id="overlay" class="overlay" onclick="closeSheet()"></div>
    <div id="sheet" class="sheet">
        <div id="sheet_content"></div>
    </div>

    <footer class="footer">
        <a href="home.html" class="f-nav"><i class="fas fa-home"></i>Home</a>
        <a href="Trade.html" class="f-nav"><i class="fas fa-chart-line"></i>Trade</a>
        <a href="Explorer.html" class="f-nav"><i class="fas fa-compass"></i>Explore</a>
        <a href="Wallet.html" class="f-nav active"><i class="fas fa-wallet"></i>Wallet</a>
    </footer>

    <script>
        // coins.js থেকে ডাটা রিড করা
        let coins = JSON.parse(localStorage.getItem('marketStats')) || GLOBAL_COINS;
        let isBalanceHidden = false;

        const CONFIG = {
            DEPOSIT_ADDR: "0x742d35Cc6634C0532925a3b844Bc454e4438f44e",
            NETWORKS: {
                'USDT': ['BEP20', 'TRC20', 'ERC20'],
                'SMAT': ['SMAT Chain', 'BEP20'],
                'BTC': ['Bitcoin', 'BEP20'],
                'BNB': ['BEP20']
            }
        };

        function init() {
            // ডিফল্ট ব্যালেন্স ইনিশিয়ালাইজেশন
            if(!localStorage.getItem('usdtBalance')) localStorage.setItem('usdtBalance', '1250.00');
            if(!localStorage.getItem('smatBalance')) localStorage.setItem('smatBalance', '50000.00');
            
            renderAssets();
            // প্রতি ৫ সেকেন্ডে ব্যালেন্স আপডেট হবে মার্কেটের সাথে
            setInterval(renderAssets, 5000);
        }

        function toggleBalance() {
            isBalanceHidden = !isBalanceHidden;
            const eye = document.getElementById('eye-icon');
            eye.className = isBalanceHidden ? 'fas fa-eye-slash' : 'fas fa-eye';
            renderAssets();
        }

        function renderAssets() {
            const container = document.getElementById('asset_list');
            container.innerHTML = '';
            let totalUSD = 0;

            // coins.js এর লিস্ট অনুযায়ী অ্যাসেট দেখানো
            coins.forEach(coin => {
                const balKey = coin.key || (coin.sym.toLowerCase() + 'Balance');
                const balance = parseFloat(localStorage.getItem(balKey)) || 0;
                const usdVal = balance * coin.price;
                totalUSD += usdVal;

                if(balance >= 0) { // শুধু ব্যালেন্স থাকলে দেখাবে (অথবা সব দেখাতে পারেন)
                    container.innerHTML += `
                        <div class="asset-item" onclick="openAssetAction('${coin.sym}')">
                            <div class="coin-box">
                                <div class="coin-icon" style="color:${coin.color || 'var(--primary)'}">${coin.sym[0]}</div>
                                <div>
                                    <div style="font-weight:700; font-size:16px;">${coin.sym}</div>
                                    <div style="font-size:11px; color:var(--text-sec)">${coin.name}</div>
                                </div>
                            </div>
                            <div style="text-align:right">
                                <div style="font-weight:700; font-size:16px;">${isBalanceHidden ? '****' : balance.toLocaleString()}</div>
                                <div style="font-size:11px; color:var(--text-sec)">≈ ${isBalanceHidden ? '****' : '$' + usdVal.toLocaleString(undefined, {minimumFractionDigits: 2})}</div>
                            </div>
                        </div>
                    `;
                }
            });

            // USDT আলাদাভাবে যোগ করা (যেহেতু এটি মার্কেট লিস্টে নাও থাকতে পারে)
            const usdtBal = parseFloat(localStorage.getItem('usdtBalance')) || 0;
            totalUSD += usdtBal;
            container.innerHTML = `
                <div class="asset-item" onclick="openAssetAction('USDT')">
                    <div class="coin-box">
                        <div class="coin-icon" style="color:#26a17b; border-color:#26a17b">U</div>
                        <div>
                            <div style="font-weight:700; font-size:16px;">USDT</div>
                            <div style="font-size:11px; color:var(--text-sec)">Tether USD</div>
                        </div>
                    </div>
                    <div style="text-align:right">
                        <div style="font-weight:700; font-size:16px;">${isBalanceHidden ? '****' : usdtBal.toLocaleString()}</div>
                        <div style="font-size:11px; color:var(--text-sec)">≈ ${isBalanceHidden ? '****' : '$' + usdtBal.toLocaleString()}</div>
                    </div>
                </div>
            ` + container.innerHTML;

            document.getElementById('total_val').innerText = isBalanceHidden ? '****' : totalUSD.toLocaleString(undefined, {minimumFractionDigits: 2});
        }

        function openAction(type) {
            let html = `<h3 style="margin-bottom:20px; font-size:20px">Select Asset to ${type}</h3>`;
            
            // USDT option
            html += createAssetRow('USDT', 'Tether', type);
            
            // Other coins from coins.js
            coins.forEach(c => {
                html += createAssetRow(c.sym, c.name, type);
            });
            
            renderSheet(html);
        }

        function createAssetRow(sym, name, type) {
            return `
                <div class="asset-item" style="border:1px solid var(--border); border-radius:15px; margin-bottom:12px" 
                     onclick="proceedToForm('${sym}', '${type}')">
                    <div class="coin-box">
                        <div class="coin-icon" style="width:32px; height:32px; font-size:14px">${sym[0]}</div>
                        <b>${sym}</b>
                    </div>
                    <i class="fas fa-chevron-right" style="color:var(--text-sec); font-size:12px"></i>
                </div>
            `;
        }

        function proceedToForm(sym, type) {
            if(type === 'Deposit') showDepositForm(sym);
            else showWithdrawForm(sym);
        }

        function showDepositForm(sym) {
            const nets = CONFIG.NETWORKS[sym] || ['BEP20'];
            let html = `
                <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:20px">
                    <h3>Deposit ${sym}</h3>
                    <i class="fas fa-times" onclick="closeSheet()"></i>
                </div>
                <p style="font-size:13px; color:var(--text-sec)">Select Network</p>
                <div class="net-selector">
                    ${nets.map((n, i) => `<div class="net-tag ${i===0?'active':''}" onclick="this.parentElement.querySelectorAll('.net-tag').forEach(t=>t.classList.remove('active')); this.classList.add('active')">${n}</div>`).join('')}
                </div>
                <div id="qrcode" style="background:#fff; padding:12px; width:170px; height:170px; margin:20px auto; border-radius:12px"></div>
                <p style="font-size:12px; color:var(--text-sec); text-align:center">Your Wallet Address</p>
                <div class="cex-input" style="display:flex; justify-content:space-between; align-items:center; font-size:12px;">
                    <span id="addr" style="word-break: break-all; margin-right:10px">${CONFIG.DEPOSIT_ADDR}</span>
                    <i class="fas fa-copy" style="color:var(--primary); font-size:18px" onclick="copyAddr()"></i>
                </div>
                <button class="btn-full" onclick="closeSheet()">Save QR Image</button>
            `;
            renderSheet(html);
            new QRCode(document.getElementById("qrcode"), { text: CONFIG.DEPOSIT_ADDR, width: 146, height: 146 });
        }

        function showWithdrawForm(sym) {
            const balKey = sym === 'USDT' ? 'usdtBalance' : (sym.toLowerCase() + 'Balance');
            const bal = parseFloat(localStorage.getItem(balKey)) || 0;
            const nets = CONFIG.NETWORKS[sym] || ['BEP20'];

            let html = `
                <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:20px">
                    <h3>Withdraw ${sym}</h3>
                    <i class="fas fa-times" onclick="closeSheet()"></i>
                </div>
                <label style="font-size:12px; color:var(--text-sec)">Address</label>
                <input type="text" class="cex-input" placeholder="Enter or paste address">
                
                <label style="font-size:12px; color:var(--text-sec)">Network</label>
                <div class="net-selector">${nets.map((n, i) => `<div class="net-tag ${i===0?'active':''}">${n}</div>`).join('')}</div>
                
                <div style="display:flex; justify-content:space-between">
                    <label style="font-size:12px; color:var(--text-sec)">Amount</label>
                    <label style="font-size:12px; color:var(--text-sec)">Available: <b style="color:white">${bal.toLocaleString()}</b></label>
                </div>
                <input type="number" class="cex-input" placeholder="Minimum withdrawal 10">
                
                <div style="background:rgba(255,255,255,0.05); padding:15px; border-radius:12px; margin-bottom:20px">
                    <div style="display:flex; justify-content:space-between; font-size:13px; margin-bottom:5px">
                        <span>Fee</span> <span>0.8 USDT</span>
                    </div>
                    <div style="display:flex; justify-content:space-between; font-size:15px; font-weight:bold">
                        <span>You will receive</span> <span style="color:var(--primary)">0.00 ${sym}</span>
                    </div>
                </div>
                <button class="btn-full" onclick="alert('Withdrawal Successful!')">Withdraw ${sym}</button>
            `;
            renderSheet(html);
        }

        function openTransfer() {
            let html = `
                <h3 style="margin-bottom:20px">Transfer Assets</h3>
                <div style="background:var(--input-bg); border-radius:12px; padding:15px; margin-bottom:15px">
                    <div style="font-size:12px; color:var(--text-sec)">From</div>
                    <div style="font-weight:bold">Spot Wallet</div>
                    <hr style="margin:10px 0; border:0; border-top:1px solid #333">
                    <div style="font-size:12px; color:var(--text-sec)">To</div>
                    <div style="font-weight:bold">Funding Wallet</div>
                </div>
                <select class="cex-input">
                    <option>USDT</option>
                    <option>SMAT</option>
                    <option>BTC</option>
                </select>
                <input type="number" class="cex-input" placeholder="Amount">
                <button class="btn-full" onclick="closeSheet()">Confirm Transfer</button>
            `;
            renderSheet(html);
        }

        function renderSheet(html) {
            document.getElementById('sheet_content').innerHTML = html;
            document.getElementById('overlay').style.display = 'block';
            setTimeout(() => document.getElementById('sheet').classList.add('open'), 10);
        }

        function closeSheet() {
            document.getElementById('sheet').classList.remove('open');
            setTimeout(() => document.getElementById('overlay').style.display = 'none', 300);
        }

        function copyAddr() {
            navigator.clipboard.writeText(CONFIG.DEPOSIT_ADDR);
            alert("Address Copied!");
        }

        window.onload = init;
    </script>
</body>
</html>
