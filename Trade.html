<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SMAT CEX | Professional Trade Engine</title>
    <script src="coin.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><circle cx='50' cy='50' r='50' fill='%23f3ba2f'/><text x='50%25' y='55%25' text-anchor='middle' dy='.3em' fill='black' font-family='Courier New, monospace' font-weight='900' font-size='60'>S</text></svg>">
    
    <style>
        :root {
            --bg: #0b0e11; --card: #1e2329; --primary: #f0b90b;
            --up: #0ecb81; --down: #f6465d; --text-sec: #848e9c;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Inter', sans-serif; -webkit-tap-highlight-color: transparent; }
        body { background: var(--bg); color: white; overflow-x: hidden; }

        /* Header */
        .header { display: flex; justify-content: space-between; align-items: center; padding: 12px 15px; border-bottom: 1px solid #2b3139; background: var(--bg); position: sticky; top: 0; z-index: 1000; }
        .pair-selector { display: flex; align-items: center; gap: 8px; cursor: pointer; font-size: 18px; font-weight: bold; }
        .header-tools { display: flex; gap: 18px; color: var(--text-sec); font-size: 18px; }

        /* Popup Drawer */
        .overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); z-index: 2000; display: none; }
        .popup-card { background: var(--bg); width: 92%; max-width: 400px; margin: 50px auto; border-radius: 12px; border: 1px solid #333; overflow: hidden; animation: slideIn 0.3s ease; }
        @keyframes slideIn { from { transform: translateY(-20px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
        
        .pair-row { padding: 15px; border-bottom: 1px solid #2b3139; cursor: pointer; display: flex; justify-content: space-between; align-items: center; transition: 0.2s; }
        .pair-row:active { background: #1e2329; }
        .p-info { display: flex; align-items: center; gap: 12px; }
        .p-logo { width: 35px; height: 35px; background: var(--primary); border-radius: 50%; color: black; display: flex; align-items: center; justify-content: center; font-weight: bold; font-size: 14px; }

        /* Trade Grid */
        .trade-grid { display: grid; grid-template-columns: 1.1fr 0.9fr; gap: 10px; padding: 10px; }
        .side-tabs { display: flex; background: #2b3139; border-radius: 4px; margin-bottom: 12px; height: 36px; overflow: hidden; }
        .tab-btn { flex: 1; border: none; background: none; color: var(--text-sec); font-weight: bold; cursor: pointer; }
        .tab-btn.active.buy { background: var(--up); color: white; }
        .tab-btn.active.sell { background: var(--down); color: white; }

        .input-box { background: var(--card); border: 1px solid #333; border-radius: 4px; margin-bottom: 8px; padding: 10px; display: flex; align-items: center; }
        .input-box input { background: none; border: none; color: white; width: 100%; outline: none; font-size: 16px; }
        .input-box span { font-size: 12px; color: var(--text-sec); }

        .pct-row { display: flex; gap: 5px; margin: 10px 0; }
        .pct-btn { flex: 1; background: #2b3139; border: none; color: white; padding: 6px; border-radius: 4px; font-size: 11px; cursor: pointer; }

        .btn-action { width: 100%; padding: 14px; border: none; border-radius: 6px; font-weight: bold; font-size: 16px; margin-top: 10px; cursor: pointer; }
        .buy-bg { background: var(--up); color: white; }
        .sell-bg { background: var(--down); color: white; }

        /* Order Book Style */
        .ob-header { display: flex; justify-content: space-between; font-size: 11px; color: var(--text-sec); margin-bottom: 5px; }
        .ob-list { height: 185px; overflow: hidden; font-size: 11px; }
        .ob-row { display: flex; justify-content: space-between; padding: 4px 0; position: relative; cursor: pointer; z-index: 1; }
        .mid-price { text-align: center; padding: 12px 0; border-top: 1px solid #2b3139; border-bottom: 1px solid #2b3139; margin: 5px 0; }

        /* History */
        .history-section { padding: 15px; padding-bottom: 100px; }
        .h-tabs { display: flex; gap: 15px; border-bottom: 1px solid #2b3139; margin-bottom: 10px; }
        .h-tab { padding: 10px 0; color: var(--text-sec); font-size: 13px; cursor: pointer; }
        .h-tab.active { color: var(--primary); border-bottom: 2px solid var(--primary); }
        .h-table { width: 100%; border-collapse: collapse; font-size: 11px; }
        .h-table th { text-align: left; color: var(--text-sec); padding: 8px 0; }
        .h-table td { padding: 10px 0; border-bottom: 1px solid #1e2329; }

        /* Footer */
        .footer { position: fixed; bottom: 0; width: 100%; height: 70px; background: #181a20; display: flex; justify-content: space-around; align-items: center; border-top: 1px solid #2b3139; z-index: 3000; }
        .f-nav { text-decoration: none; color: var(--text-sec); text-align: center; font-size: 10px; flex: 1; }
        .f-nav i { display: block; font-size: 20px; margin-bottom: 4px; }
        .f-nav.active { color: var(--primary); }
        .u-curve { position: relative; top: -20px; width: 70px; height: 70px; display: flex; justify-content: center; align-items: center; }
        .spin-circle { position: absolute; width: 66px; height: 66px; border: 2px dashed var(--primary); border-radius: 50%; animation: spin 4s linear infinite; }
        .crash-link { width: 55px; height: 55px; background: var(--primary); border-radius: 50%; color: black; font-weight: 900; font-size: 10px; display: flex; align-items: center; justify-content: center; text-decoration: none; z-index: 5; }
        @keyframes spin { 100% { transform: rotate(360deg); } }

        .up { color: var(--up); }
        .down { color: var(--down); }
    </style>
</head>
<body>

    <header class="header">
        <div class="pair-selector" onclick="togglePopup(true)">
            <span id="currentPair">SMAT/USDT</span> <i class="fas fa-caret-down"></i>
        </div>
        <div class="header-tools">
            <i class="fas fa-info-circle"></i>
            <i class="fas fa-chart-line" id="chartLink" style="cursor:pointer; color:var(--primary)"></i>
            <i class="fas fa-bell"></i>
        </div>
    </header>

    <div id="pairPopup" class="overlay" onclick="togglePopup(false)">
        <div class="popup-card" onclick="event.stopPropagation()">
            <div id="pairListContainer"></div>
        </div>
    </div>

    <main class="trade-grid">
        <section>
            <div class="side-tabs">
                <button id="btnBuy" class="tab-btn active buy" onclick="setSide('buy')">Buy</button>
                <button id="btnSell" class="tab-btn sell" onclick="setSide('sell')">Sell</button>
            </div>
            <div class="input-box">
                <input type="number" step="0.0001" id="priceInp" placeholder="Price">
                <span>USDT</span>
            </div>
            <div class="input-box">
                <input type="number" step="0.0001" id="amountInp" placeholder="Amount" oninput="calcTotal()">
                <span id="unitAsset">SMAT</span>
            </div>
            <div class="pct-row">
                <button class="pct-btn" onclick="applyPct(25)">25%</button>
                <button class="pct-btn" onclick="applyPct(50)">50%</button>
                <button class="pct-btn" onclick="applyPct(75)">75%</button>
                <button class="pct-btn" onclick="applyPct(100)">100%</button>
            </div>
            <p style="font-size: 11px; margin-bottom: 5px;">Avbl: <span id="avblVal">0.0000</span> <span id="avblUnit">USDT</span></p>
            <p style="font-size: 13px; margin-bottom: 15px;">Total: <span id="totalVal" style="color:var(--primary)">0.0000</span> USDT</p>
            <button id="mainActionBtn" class="btn-action buy-bg" onclick="processOrder()">Buy SMAT</button>
        </section>

        <section>
            <div class="ob-header"><span>Price</span><span>Amount</span></div>
            <div id="asks" class="ob-list"></div>
            <div class="mid-price">
                <h2 id="marketPrice" class="up">0.0000</h2>
                <small id="bdtPrice" style="color:var(--text-sec)">≈ USD 0.0000</small>
            </div>
            <div id="bids" class="ob-list"></div>
        </section>
    </main>

    <section class="history-section">
        <div class="h-tabs">
            <div class="h-tab active" onclick="setHTab('global', this)">Global</div>
            <div class="h-tab" onclick="setHTab('my', this)">My Trade</div>
            <div class="h-tab" onclick="setHTab('un', this)">Unsuccessful</div>
        </div>
        <table class="h-table">
            <thead id="hHeader"></thead>
            <tbody id="hBody"></tbody>
        </table>
        <div id="loadMoreBtn" style="text-align:center; padding:15px; color:var(--primary); cursor:pointer; font-size:12px;">Show More</div>
    </section>

    <footer class="footer">
        <a href="home.html" class="f-nav"><i class="fas fa-home"></i>Home</a>
        <a href="Trade.html" class="f-nav active"><i class="fas fa-chart-line"></i>Trade</a>
        <div class="u-curve">
            <div class="spin-circle"></div>
            <a href="Crash.html" class="crash-link">CRASH</a>
        </div>
        <a href="index.html" class="f-nav"><i class="fas fa-compass"></i>mining</a>
        <a href="Wallet.html" class="f-nav"><i class="fas fa-wallet"></i>Wallet</a>
    </footer>

    <script>
    // ১. coin.js থেকে ডাটা নেওয়ার জন্য coins ভ্যারিয়েবল আপডেট
    let coins = JSON.parse(localStorage.getItem('marketStats'));
    if (!coins && typeof GLOBAL_COINS !== 'undefined') {
        coins = GLOBAL_COINS;
    } else if (!coins) {
        coins = [
            { name: "SMAT Coin", sym: "SMAT", price: 1.2500, startPrice: 1.2500, vol: 0, key: "smatBalance", lastReset: null },
            { name: "Binance", sym: "BNB", price: 590.00, startPrice: 590.00, vol: 0, key: "bnbBalance", lastReset: null }
        ];
    }
    
    let orderBooks = JSON.parse(localStorage.getItem('orderBooks')) || {};
    
    // ২. নিশ্চিত করা যে প্রতিটি কয়েনের জন্য অর্ডারবুক আছে
    coins.forEach(c => {
        if(!orderBooks[c.sym]) orderBooks[c.sym] = { bids: [], asks: [] };
    });
    
    let activeCoin = coins[0];
    let tradeSide = 'buy';
    let activeHTab = 'global';
    let historyLimit = 10;
    const FEE_RATE = 0.0025; 
    
    function init() {
        if(!localStorage.getItem('usdtBalance')) localStorage.setItem('usdtBalance', '1000.0000');
        coins.forEach(c => { if(!localStorage.getItem(c.key)) localStorage.setItem(c.key, '0.0000'); });
        
        document.getElementById('chartLink').onclick = () => {
            window.location.href = 'market_chat.html?coin=' + activeCoin.sym;
        };
        
        checkDailyReset();
        connectBinance(); 
        startBackgroundEngine();
        
        // URL থেকে আসা প্যারামিটার চেক (যেমন home.html থেকে নির্দিষ্ট কয়েনে আসা)
        const urlParams = new URLSearchParams(window.location.search);
        const side = urlParams.get('side');
        const coinSym = urlParams.get('coin');
        if (coinSym) {
            const targetCoin = coins.find(c => c.sym === coinSym.toUpperCase());
            if (targetCoin) activeCoin = targetCoin;
        }
        if (side === 'buy' || side === 'sell') setSide(side);
        
        refreshUI();
        renderHistory();
        
        setInterval(() => {
            localStorage.setItem('marketStats', JSON.stringify(coins));
            localStorage.setItem('orderBooks', JSON.stringify(orderBooks));
        }, 5000);
    }
    
    function checkDailyReset() {
        const now = new Date();
        const utc = now.getTime() + (now.getTimezoneOffset() * 60000);
        const bdTime = new Date(utc + (3600000 * 6));
        const todayStr = bdTime.toDateString();
        if (activeCoin.lastReset !== todayStr && bdTime.getHours() >= 6) {
            coins.forEach(c => { 
                c.vol = 0; 
                c.startPrice = c.price; 
                c.lastReset = todayStr; 
            });
        }
    }
    
    function connectBinance() {
        const ws = new WebSocket("wss://stream.binance.com:9443/ws/bnbusdt@ticker");
        ws.onmessage = (e) => {
            const data = JSON.parse(e.data);
            const bnb = coins.find(c => c.sym === "BNB");
            if(bnb) {
                bnb.price = parseFloat(data.c);
                if(activeCoin.sym === "BNB") {
                    document.getElementById('marketPrice').innerText = bnb.price.toFixed(4);
                    updateOrderBookUI();
                }
            }
        };
        ws.onclose = () => setTimeout(connectBinance, 5000);
    }
    
    function startBackgroundEngine() {
        setInterval(() => {
            checkDailyReset();
            coins.forEach(coin => {
                if(coin.sym === 'SMAT') {
                    coin.price += (Math.random() * 0.001 - 0.0005);
                }
                maintainLiquidity(coin);
            });
            updateOrderBookUI();
            if(document.getElementById('pairPopup').style.display === 'block') renderPairs();
        }, 3000);
    }
    
    function maintainLiquidity(coin) {
        let book = orderBooks[coin.sym];
        const currentPrice = coin.price;
        
        let realUserBids = book.bids.filter(o => o.type === 'user');
        let realUserAsks = book.asks.filter(o => o.type === 'user');
        
        function getRandomAmount(sym) {
            if (sym === "BNB") {
                return (Math.random() * (0.1 - 0.015) + 0.015).toFixed(4);
            } else {
                return (Math.random() * 100 + 50).toFixed(4);
            }
        }

        if(book.bids.filter(o => o.type === 'fake').length < 20) {
            let bidPrice = (currentPrice - (Math.random()*0.02));
            if(realUserBids.length > 0) bidPrice = parseFloat(realUserBids[0].p) + 0.025;
            book.bids.push({ p: bidPrice.toFixed(4), a: getRandomAmount(coin.sym), type: 'fake' });
        }
        
        if(book.asks.filter(o => o.type === 'fake').length < 20) {
            let askPrice = (currentPrice + (Math.random()*0.02));
            if(realUserAsks.length > 0) askPrice = parseFloat(realUserAsks[0].p) - 0.025;
            book.asks.push({ p: askPrice.toFixed(4), a: getRandomAmount(coin.sym), type: 'fake' });
        }
        
        book.asks.forEach((order, index) => {
            if(currentPrice >= parseFloat(order.p)) {
                let matched = book.asks.splice(index, 1)[0];
                if(matched.type === 'user') executeFinalUserTrade(coin, matched, 'sell');
                else saveOrder('global', matched.a, matched.p, (matched.a * matched.p).toFixed(4), 'buy', coin.sym);
            }
        });
        
        book.bids.forEach((order, index) => {
            if(currentPrice <= parseFloat(order.p)) {
                let matched = book.bids.splice(index, 1)[0];
                if(matched.type === 'user') executeFinalUserTrade(coin, matched, 'buy');
                else saveOrder('global', matched.a, matched.p, (matched.a * matched.p).toFixed(4), 'sell', coin.sym);
            }
        });
        
        book.asks.sort((a,b) => parseFloat(a.p) - parseFloat(b.p));
        book.bids.sort((a,b) => parseFloat(b.p) - parseFloat(a.p));
        
        let tradeAmt = parseFloat(getRandomAmount(coin.sym));
        coin.vol += tradeAmt;
        silentGlobalTrade(coin, tradeAmt);
    }
    
    function processOrder() {
        const p = parseFloat(document.getElementById('priceInp').value);
        let amountRemaining = parseFloat(document.getElementById('amountInp').value);
        if(!amountRemaining || amountRemaining <= 0 || !p) return;
        
        const usdtBal = parseFloat(localStorage.getItem('usdtBalance'));
        const coinBal = parseFloat(localStorage.getItem(activeCoin.key));
        
        if(tradeSide === 'buy' && (p * amountRemaining) > usdtBal) { alert("Insufficient USDT"); return; }
        if(tradeSide === 'sell' && amountRemaining > coinBal) { alert("Insufficient " + activeCoin.sym); return; }
        
        let book = orderBooks[activeCoin.sym];
        const orderId = Date.now();
        const newOrder = {id: orderId, p: p.toFixed(4), a: amountRemaining.toFixed(4), type: 'user', side: tradeSide};
        
        if(tradeSide === 'buy') {
            book.bids.unshift(newOrder);
            localStorage.setItem('usdtBalance', (parseFloat(localStorage.getItem('usdtBalance')) - (p * amountRemaining)).toFixed(4));
        } else {
            book.asks.unshift(newOrder);
            localStorage.setItem(activeCoin.key, (parseFloat(localStorage.getItem(activeCoin.key)) - amountRemaining).toFixed(4));
        }
        
        saveOrder('un', amountRemaining.toFixed(4), p.toFixed(4), (p*amountRemaining).toFixed(4), tradeSide, activeCoin.sym, orderId);
        localStorage.setItem('orderBooks', JSON.stringify(orderBooks));
        updateBalance(); updateOrderBookUI();
        document.getElementById('amountInp').value = "";
        calcTotal();
    }
    
    function executeFinalUserTrade(coin, order, side) {
        const p = parseFloat(order.p);
        const a = parseFloat(order.a);
        if(side === 'buy') {
            let c = parseFloat(localStorage.getItem(coin.key));
            localStorage.setItem(coin.key, (c + (a - (a * FEE_RATE))).toFixed(4));
        } else {
            let u = parseFloat(localStorage.getItem('usdtBalance'));
            localStorage.setItem('usdtBalance', (u + ((p*a) - ((p*a) * FEE_RATE))).toFixed(4));
        }
        let unList = JSON.parse(localStorage.getItem('unOrders') || '[]');
        localStorage.setItem('unOrders', JSON.stringify(unList.filter(o => o.id !== order.id)));
        saveOrder('my', a.toFixed(4), p.toFixed(4), (p*a).toFixed(4), side, coin.sym);
        updateBalance(); renderHistory();
    }
    
    function togglePopup(s) { if(s) renderPairs(); document.getElementById('pairPopup').style.display = s ? 'block' : 'none'; }
    
    function renderPairs() {
        document.getElementById('pairListContainer').innerHTML = coins.map(c => {
            const change = ((c.price - c.startPrice) / c.startPrice * 100).toFixed(2);
            return `<div class="pair-row" onclick="selectCoin('${c.sym}')">
            <div style="display:flex; gap:10px; align-items:center">
                <div class="p-logo">${c.sym[0]}</div>
                <div><b>${c.name}</b><br><small>Vol: $${(c.vol*c.price).toFixed(2)}</small></div>
            </div>
            <div style="text-align:right"><b>$${c.price.toFixed(4)}</b><br><small class="${change >= 0 ? 'up':'down'}">${change}%</small></div>
            </div>`;
        }).join('');
    }
    
    function selectCoin(s) { 
        activeCoin = coins.find(c => c.sym === s); 
        document.getElementById('chartLink').onclick = () => window.location.href = 'market_chat.html?coin=' + activeCoin.sym;
        refreshUI(); 
        togglePopup(false); 
        renderHistory(); 
    }

    function refreshUI() { 
        document.getElementById('currentPair').innerText = activeCoin.sym + "/USDT"; 
        document.getElementById('priceInp').value = activeCoin.price.toFixed(4); 
        document.getElementById('unitAsset').innerText = activeCoin.sym;
        document.getElementById('mainActionBtn').innerText = (tradeSide === 'buy' ? 'Buy ' : 'Sell ') + activeCoin.sym;
        updateBalance(); 
        calcTotal(); 
        updateOrderBookUI(); 
    }

    function updateBalance() { 
        const k = tradeSide === 'buy' ? 'usdtBalance' : activeCoin.key; 
        let currentBal = parseFloat(localStorage.getItem(k)) || 0;
        document.getElementById('avblVal').innerText = currentBal.toFixed(4); 
        document.getElementById('avblUnit').innerText = tradeSide === 'buy' ? 'USDT' : activeCoin.sym; 
    }

    function setSide(s) { 
        tradeSide = s; 
        document.getElementById('btnBuy').classList.toggle('active', s==='buy'); 
        document.getElementById('btnSell').classList.toggle('active', s==='sell'); 
        document.getElementById('mainActionBtn').className = 'btn-action ' + (s === 'buy' ? 'buy-bg' : 'sell-bg');
        refreshUI();
    }

    function applyPct(p) { 
        const bal = parseFloat(localStorage.getItem(tradeSide === 'buy' ? 'usdtBalance' : activeCoin.key)) || 0; 
        const prc = parseFloat(document.getElementById('priceInp').value); 
        if(!prc || prc <= 0) return; 
        if(tradeSide === 'buy') document.getElementById('amountInp').value = ((bal * (p/100)) / prc).toFixed(4); 
        else document.getElementById('amountInp').value = (bal * (p/100)).toFixed(4); 
        calcTotal(); 
    }

    function fillPrice(p) { document.getElementById('priceInp').value = p; calcTotal(); }
    function calcTotal() { 
        const p = parseFloat(document.getElementById('priceInp').value || 0); 
        const a = parseFloat(document.getElementById('amountInp').value || 0); 
        document.getElementById('totalVal').innerText = (p * a).toFixed(4); 
    }
    
    function saveOrder(type, a, p, t, side, sym, id = null) {
        let list = JSON.parse(localStorage.getItem(type + 'Orders') || '[]');
        const timeStr = new Date().toLocaleTimeString([], {hour: '2-digit', minute:'2-digit', second:'2-digit'});
        list.unshift({ id: id || Date.now(), a, p, t, side, sym, time: timeStr });
        if(list.length > 50) list.pop();
        localStorage.setItem(type + 'Orders', JSON.stringify(list));
        renderHistory();
    }
    
    function renderHistory() {
        const body = document.getElementById('hBody');
        const head = document.getElementById('hHeader');
        if(!body) return;
        let data = JSON.parse(localStorage.getItem(activeHTab + 'Orders') || '[]').filter(i => i.sym === activeCoin.sym);
        if(activeHTab === 'un') {
            head.innerHTML = `<tr><th>Amount</th><th>Price</th><th>Action</th></tr>`;
            body.innerHTML = data.slice(0, historyLimit).map(i => `<tr><td>${i.a}</td><td>${i.p}</td><td class="down" onclick="cancelOrder(${i.id})">Cancel</td></tr>`).join('');
        } else {
            head.innerHTML = `<tr><th>Time</th><th>Amount</th><th>Price</th><th>Total</th></tr>`;
            body.innerHTML = data.slice(0, historyLimit).map(i => `<tr><td style="color:var(--text-sec); font-size:10px;">${i.time}</td><td class="${i.side==='buy'?'up':'down'}">${i.a}</td><td class="${i.side==='buy'?'up':'down'}">${i.p}</td><td>${i.t}</td></tr>`).join('');
        }
    }
    
    function updateOrderBookUI() {
        const asksList = document.getElementById('asks');
        const bidsList = document.getElementById('bids');
        let book = orderBooks[activeCoin.sym];
        if(!book) return;
        
        const agg = (orders) => {
            const grp = {};
            orders.forEach(o => { const p = parseFloat(o.p).toFixed(4); grp[p] = (grp[p] || 0) + parseFloat(o.a); });
            return Object.keys(grp).map(p => ({ p, a: grp[p].toFixed(4) }));
        };
        asksList.innerHTML = agg(book.asks).sort((a,b)=>a.p-b.p).slice(0,8).reverse().map(o => `<div class="ob-row" onclick="fillPrice('${o.p}')"><span class="down">${o.p}</span><span>${o.a}</span></div>`).join('');
        bidsList.innerHTML = agg(book.bids).sort((a,b)=>b.p-a.p).slice(0,8).map(o => `<div class="ob-row" onclick="fillPrice('${o.p}')"><span class="up">${o.p}</span><span>${o.a}</span></div>`).join('');
        document.getElementById('marketPrice').innerText = activeCoin.price.toFixed(4);
    }
    
    function cancelOrder(id) {
        let list = JSON.parse(localStorage.getItem('unOrders') || '[]');
        let order = list.find(i => i.id === id);
        if(order) {
            if(order.side === 'buy') {
                let u = parseFloat(localStorage.getItem('usdtBalance'));
                localStorage.setItem('usdtBalance', (u + (parseFloat(order.p)*parseFloat(order.a))).toFixed(4));
            } else {
                let c = parseFloat(localStorage.getItem(activeCoin.key));
                localStorage.setItem(activeCoin.key, (c + parseFloat(order.a)).toFixed(4));
            }
        }
        localStorage.setItem('unOrders', JSON.stringify(list.filter(i => i.id !== id)));
        let book = orderBooks[activeCoin.sym];
        book.bids = book.bids.filter(o => o.id !== id);
        book.asks = book.asks.filter(o => o.id !== id);
        renderHistory(); updateOrderBookUI(); updateBalance();
    }
    
    function silentGlobalTrade(coin, amt) {
        let list = JSON.parse(localStorage.getItem('globalOrders') || '[]');
        const side = Math.random() > 0.5 ? 'buy' : 'sell';
        list.unshift({ id: Date.now(), a: amt.toFixed(4), p: coin.price.toFixed(4), t: (amt * coin.price).toFixed(4), side, sym: coin.sym, time: new Date().toLocaleTimeString() });
        if(list.length > 50) list.pop();
        localStorage.setItem('globalOrders', JSON.stringify(list));
        if(activeHTab === 'global') renderHistory();
    }
    
    function setHTab(t, el) { activeHTab = t; document.querySelectorAll('.h-tab').forEach(i => i.classList.remove('active')); el.classList.add('active'); renderHistory(); }
    
    window.onload = init;
    </script>
</body>
</html>
