<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SMAT CEX | Professional Trade Engine</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --bg: #0b0e11; --card: #1e2329; --primary: #f0b90b;
            --up: #0ecb81; --down: #f6465d; --text-sec: #848e9c;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Inter', sans-serif; -webkit-tap-highlight-color: transparent; }
        body { background: var(--bg); color: white; overflow-x: hidden; padding-bottom: 80px; }

        /* Header */
        .header { display: flex; justify-content: space-between; align-items: center; padding: 12px 15px; border-bottom: 1px solid #2b3139; background: var(--bg); position: sticky; top: 0; z-index: 1000; }
        .pair-selector { display: flex; align-items: center; gap: 8px; cursor: pointer; font-size: 18px; font-weight: bold; }
        
        /* Popup Pair List */
        .overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); z-index: 2000; display: none; }
        .popup-card { background: var(--bg); width: 92%; max-width: 400px; margin: 50px auto; border-radius: 12px; border: 1px solid #333; overflow-y: auto; max-height: 80vh; }
        .pair-row { padding: 15px; border-bottom: 1px solid #2b3139; cursor: pointer; display: flex; justify-content: space-between; }

        /* Trading Layout */
        .trade-grid { display: grid; grid-template-columns: 1.1fr 0.9fr; gap: 10px; padding: 10px; }
        .side-tabs { display: flex; background: #2b3139; border-radius: 4px; margin-bottom: 12px; height: 36px; overflow: hidden; }
        .tab-btn { flex: 1; border: none; background: none; color: var(--text-sec); font-weight: bold; cursor: pointer; }
        .tab-btn.active.buy { background: var(--up); color: white; }
        .tab-btn.active.sell { background: var(--down); color: white; }

        .input-box { background: var(--card); border: 1px solid #333; border-radius: 4px; margin-bottom: 8px; padding: 10px; display: flex; align-items: center; }
        .input-box input { background: none; border: none; color: white; width: 100%; outline: none; font-size: 16px; }
        
        .pct-row { display: flex; gap: 5px; margin: 10px 0; }
        .pct-btn { flex: 1; background: #2b3139; border: none; color: white; padding: 6px; border-radius: 4px; font-size: 11px; }

        .btn-action { width: 100%; padding: 14px; border: none; border-radius: 6px; font-weight: bold; margin-top: 10px; cursor: pointer; }
        .buy-bg { background: var(--up); color: white; }
        .sell-bg { background: var(--down); color: white; }

        /* Order Book */
        .ob-list { height: 180px; overflow: hidden; font-size: 11px; }
        .ob-row { display: flex; justify-content: space-between; padding: 4px 0; }
        .mid-price { text-align: center; padding: 10px 0; border-top: 1px solid #2b3139; border-bottom: 1px solid #2b3139; margin: 5px 0; }

        /* Footer */
        .footer { position: fixed; bottom: 0; width: 100%; height: 70px; background: #181a20; display: flex; justify-content: space-around; align-items: center; border-top: 1px solid #2b3139; z-index: 3000; }
        .f-nav { text-decoration: none; color: var(--text-sec); text-align: center; font-size: 10px; flex: 1; }
        .f-nav i { display: block; font-size: 20px; margin-bottom: 4px; }
        .f-nav.active { color: var(--primary); }
    </style>
</head>
<body>

    <header class="header">
        <div class="pair-selector" onclick="togglePopup(true)">
            <span id="currentPairDisplay">---/USDT</span> <i class="fas fa-caret-down"></i>
        </div>
        <div class="header-tools">
            <i class="fas fa-chart-line" id="chartBtn" style="color:var(--primary); cursor:pointer"></i>
            <i class="fas fa-bell"></i>
        </div>
    </header>

    <div id="pairPopup" class="overlay" onclick="togglePopup(false)">
        <div class="popup-card" onclick="event.stopPropagation()" id="pairList"></div>
    </div>

    <main class="trade-grid">
        <section>
            <div class="side-tabs">
                <button id="btnBuy" class="tab-btn active buy" onclick="setSide('buy')">Buy</button>
                <button id="btnSell" class="tab-btn sell" onclick="setSide('sell')">Sell</button>
            </div>
            <div class="input-box">
                <input type="number" id="priceInp" placeholder="Price">
                <span>USDT</span>
            </div>
            <div class="input-box">
                <input type="number" id="amountInp" placeholder="Amount" oninput="updateTotal()">
                <span id="assetUnit">---</span>
            </div>
            <div class="pct-row">
                <button class="pct-btn" onclick="applyPct(25)">25%</button>
                <button class="pct-btn" onclick="applyPct(50)">50%</button>
                <button class="pct-btn" onclick="applyPct(100)">100%</button>
            </div>
            <p style="font-size: 11px;">Avbl: <span id="balanceDisplay">0.00</span> <span id="balanceUnit">USDT</span></p>
            <p style="font-size: 13px; margin: 10px 0;">Total: <span id="totalDisplay" style="color:var(--primary)">0.00</span> USDT</p>
            <button id="actionBtn" class="btn-action buy-bg" onclick="executeOrder()">Buy ---</button>
        </section>

        <section>
            <div id="asks" class="ob-list"></div>
            <div class="mid-price">
                <h2 id="livePrice">0.0000</h2>
            </div>
            <div id="bids" class="ob-list"></div>
        </section>
    </main>

    <footer class="footer">
        <a href="Home.html" class="f-nav"><i class="fas fa-home"></i>Home</a>
        <a href="Trade.html" class="f-nav active"><i class="fas fa-chart-line"></i>Trade</a>
        <a href="Wallet.html" class="f-nav"><i class="fas fa-wallet"></i>Wallet</a>
    </footer>

    <script>
        // ১. ডাটা লোডিং (এটি Home.html এর মতই একই ডাটা ব্যবহার করবে)
        const DEFAULT_COINS = [
            { sym: 'SMAT', name: 'SMAT Coin', price: 1.2694, startPrice: 1.20, color: '#f3ba2f' },
            { sym: 'BNB', name: 'Binance', price: 588.20, startPrice: 595.00, color: '#f3ba2f' },
            { sym: 'BTC', name: 'Bitcoin', price: 68450.00, startPrice: 67000.00, color: '#f7931a' }
        ];

        let coins = JSON.parse(localStorage.getItem('marketStats')) || DEFAULT_COINS;
        let activeCoin = coins[0];
        let tradeSide = 'buy';

        function init() {
            // URL থেকে কয়েন চেক করা (যেমন Trade.html?coin=ETH)
            const params = new URLSearchParams(window.location.search);
            const coinSym = params.get('coin');
            if(coinSym) {
                const found = coins.find(c => c.sym === coinSym.toUpperCase());
                if(found) activeCoin = found;
            }
            
            refreshUI();
            connectWebsocket();
            startPriceEngine();
        }

        function refreshUI() {
            document.getElementById('currentPairDisplay').innerText = activeCoin.sym + "/USDT";
            document.getElementById('assetUnit').innerText = activeCoin.sym;
            document.getElementById('actionBtn').innerText = (tradeSide === 'buy' ? 'Buy ' : 'Sell ') + activeCoin.sym;
            document.getElementById('priceInp').value = activeCoin.price.toFixed(4);
            document.getElementById('chartBtn').onclick = () => window.location.href = 'market_chat.html?coin=' + activeCoin.sym;
            updateBalance();
            updateOrderBook();
        }

        function updateBalance() {
            const key = tradeSide === 'buy' ? 'usdtBalance' : (activeCoin.sym.toLowerCase() + 'Balance');
            const bal = localStorage.getItem(key) || "0.00";
            document.getElementById('balanceDisplay').innerText = parseFloat(bal).toFixed(4);
            document.getElementById('balanceUnit').innerText = tradeSide === 'buy' ? 'USDT' : activeCoin.sym;
        }

        function setSide(side) {
            tradeSide = side;
            document.getElementById('btnBuy').classList.toggle('active', side === 'buy');
            document.getElementById('btnSell').classList.toggle('active', side === 'sell');
            document.getElementById('actionBtn').className = 'btn-action ' + (side === 'buy' ? 'buy-bg' : 'sell-bg');
            refreshUI();
        }

        function togglePopup(show) {
            const popup = document.getElementById('pairPopup');
            if(show) {
                document.getElementById('pairList').innerHTML = coins.map(c => `
                    <div class="pair-row" onclick="selectCoin('${c.sym}')">
                        <b>${c.sym}/USDT</b>
                        <span>$${c.price.toFixed(2)}</span>
                    </div>
                `).join('');
            }
            popup.style.display = show ? 'block' : 'none';
        }

        function selectCoin(sym) {
            activeCoin = coins.find(c => c.sym === sym);
            togglePopup(false);
            refreshUI();
        }

        function updateTotal() {
            const p = parseFloat(document.getElementById('priceInp').value) || 0;
            const a = parseFloat(document.getElementById('amountInp').value) || 0;
            document.getElementById('totalDisplay').innerText = (p * a).toFixed(2);
        }

        // লিকুইডিটি ও প্রাইস ইঞ্জিন
        function startPriceEngine() {
            setInterval(() => {
                if(activeCoin.sym === 'SMAT') {
                    activeCoin.price += (Math.random() * 0.002 - 0.001);
                    document.getElementById('livePrice').innerText = activeCoin.price.toFixed(4);
                }
                updateOrderBook();
            }, 3000);
        }

        function updateOrderBook() {
            const asks = document.getElementById('asks');
            const bids = document.getElementById('bids');
            
            let askHTML = '', bidHTML = '';
            for(let i=0; i<7; i++) {
                let pAsk = activeCoin.price + (Math.random() * 0.05);
                let pBid = activeCoin.price - (Math.random() * 0.05);
                askHTML += `<div class="ob-row"><span style="color:var(--down)">${pAsk.toFixed(4)}</span><span>${(Math.random()*10).toFixed(2)}</span></div>`;
                bidHTML += `<div class="ob-row"><span style="color:var(--up)">${pBid.toFixed(4)}</span><span>${(Math.random()*10).toFixed(2)}</span></div>`;
            }
            asks.innerHTML = askHTML;
            bids.innerHTML = bidHTML;
            document.getElementById('livePrice').innerText = activeCoin.price.toFixed(4);
        }

        function executeOrder() {
            const amount = parseFloat(document.getElementById('amountInp').value);
            if(!amount || amount <= 0) return alert("Enter Amount");
            
            // এখানে আপনি আপনার ট্রেড লজিক বা সাকসেস মেসেজ দিতে পারেন
            alert(tradeSide.toUpperCase() + " Order Placed Successfully!");
        }

        // বাইনান্স থেকে রিয়েল টাইম ডাটা (ঐচ্ছিক)
        function connectWebsocket() {
            if(activeCoin.sym !== 'SMAT') {
                const ws = new WebSocket(`wss://stream.binance.com:9443/ws/${activeCoin.sym.toLowerCase()}usdt@ticker`);
                ws.onmessage = (e) => {
                    const data = JSON.parse(e.data);
                    activeCoin.price = parseFloat(data.c);
                    document.getElementById('livePrice').innerText = activeCoin.price.toFixed(2);
                };
            }
        }

        window.onload = init;
    </script>
</body>
</html>
