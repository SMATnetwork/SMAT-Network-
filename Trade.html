<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SMAT CEX | Professional Trade Engine</title>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-database-compat.js"></script>
    <script src="coin.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        :root {
            --bg: #0b0e11; --card: #1e2329; --primary: #f0b90b;
            --up: #0ecb81; --down: #f6465d; --text-sec: #848e9c;
            --border: #2b3139;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Inter', sans-serif; -webkit-tap-highlight-color: transparent; }
        body { background: var(--bg); color: white; overflow-x: hidden; padding-bottom: 80px; }

        .header { display: flex; justify-content: space-between; align-items: center; padding: 12px 15px; border-bottom: 1px solid var(--border); background: var(--bg); position: sticky; top: 0; z-index: 1000; }
        .pair-selector { display: flex; align-items: center; gap: 8px; cursor: pointer; font-size: 18px; font-weight: bold; text-transform: uppercase; }
        
        .overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: var(--bg); z-index: 4000; display: none; flex-direction: column; }
        .popup-header { padding: 15px; display: flex; align-items: center; gap: 15px; border-bottom: 1px solid #2b3139; }
        .popup-header i { font-size: 20px; cursor: pointer; }
        
        .search-container { padding: 10px 15px; }
        .search-box { background: var(--card); border-radius: 8px; padding: 10px 15px; display: flex; align-items: center; gap: 10px; }
        .search-box input { background: none; border: none; color: white; width: 100%; outline: none; font-size: 16px; }
        
        .market-tabs { display: flex; gap: 20px; padding: 10px 20px; border-bottom: 1px solid #2b3139; }
        .m-tab { padding: 10px 0; color: var(--text-sec); font-size: 15px; cursor: pointer; font-weight: 600; position: relative; display: flex; align-items: center; gap: 6px; }
        .m-tab.active { color: var(--primary); }
        .m-tab.active::after { content: ''; position: absolute; bottom: 0; left: 0; width: 100%; height: 2px; background: var(--primary); }
        
        .tab-logo { width: 18px; height: 18px; border-radius: 50%; overflow: hidden; display: flex; align-items: center; justify-content: center; background: var(--primary); color: black; font-size: 10px; font-weight: bold; }
        .tab-logo img { width: 100%; height: 100%; object-fit: cover; }

        .pair-list-scroll { overflow-y: auto; flex: 1; padding-bottom: 20px; }
        .pair-row { padding: 15px 20px; border-bottom: 1px solid #1e2329; cursor: pointer; display: flex; justify-content: space-between; align-items: center; }
        .p-info { display: flex; align-items: center; gap: 15px; }
        .p-logo { width: 32px; height: 32px; background: var(--primary); border-radius: 50%; color: black; display: flex; align-items: center; justify-content: center; font-weight: bold; overflow: hidden; }
        .p-logo img { width: 100%; height: 100%; object-fit: cover; }

        .trade-grid { display: grid; grid-template-columns: 1.1fr 0.9fr; gap: 12px; padding: 12px; }
        .side-tabs { display: flex; background: #2b3139; border-radius: 4px; margin-bottom: 12px; height: 36px; overflow: hidden; }
        .tab-btn { flex: 1; border: none; background: none; color: var(--text-sec); font-weight: bold; cursor: pointer; }
        .tab-btn.active.buy { background: var(--up); color: white; }
        .tab-btn.active.sell { background: var(--down); color: white; }

        .input-box { background: var(--card); border: 1px solid #333; border-radius: 4px; margin-bottom: 8px; padding: 10px; display: flex; align-items: center; position: relative; }
        .input-box input { background: none; border: none; color: white; width: 100%; outline: none; font-size: 16px; }
        .input-box span { font-size: 12px; color: var(--text-sec); }

        .fee-info { font-size: 10px; color: var(--text-sec); margin: 5px 0; display: flex; justify-content: space-between; }
        .pct-row { display: flex; gap: 5px; margin: 10px 0; }
        .pct-btn { flex: 1; background: #2b3139; border: none; color: white; padding: 6px; border-radius: 4px; font-size: 11px; }

        .btn-action { width: 100%; padding: 14px; border: none; border-radius: 6px; font-weight: bold; font-size: 16px; cursor: pointer; }
        .buy-bg { background: var(--up); color: white; }
        .sell-bg { background: var(--down); color: white; }

        .ob-header { display: flex; justify-content: space-between; font-size: 11px; color: var(--text-sec); margin-bottom: 5px; }
        .ob-list { height: 160px; overflow: hidden; font-size: 12px; }
        .ob-row { display: flex; justify-content: space-between; padding: 4px 0; position: relative; z-index: 1; }
        .depth-bar { position: absolute; right: 0; top: 0; bottom: 0; z-index: -1; transition: 0.3s; }
        .mid-price { text-align: center; padding: 10px 0; border-top: 1px solid var(--border); border-bottom: 1px solid var(--border); margin: 5px 0; }

        .history-section { padding: 15px; }
        .h-tabs { display: flex; gap: 15px; border-bottom: 1px solid var(--border); margin-bottom: 10px; }
        .h-tab { padding: 8px 0; color: var(--text-sec); font-size: 13px; cursor: pointer; }
        .h-tab.active { color: var(--primary); border-bottom: 2px solid var(--primary); }
        .h-table { width: 100%; border-collapse: collapse; font-size: 11px; text-align: left; }
        .h-table th { color: var(--text-sec); padding: 8px 0; }
        .h-table td { padding: 10px 0; border-bottom: 1px solid #1e2329; }
        .show-more-container { text-align: center; padding: 15px 0; }
        .show-more-btn { background: none; border: 1px solid var(--border); color: var(--text-sec); padding: 6px 20px; border-radius: 20px; font-size: 12px; cursor: pointer; }

        .footer { position: fixed; bottom: 0; width: 100%; height: 75px; background: #181a20; display: flex; justify-content: space-around; align-items: center; border-top: 1px solid #2b3139; z-index: 3000; }
        .f-nav { text-decoration: none; color: var(--text-sec); text-align: center; font-size: 10px; flex: 1; display: flex; flex-direction: column; align-items: center; }
        .f-nav i { font-size: 22px; margin-bottom: 5px; }
        .f-nav.active { color: var(--primary); }
        .u-curve { position: relative; top: -22px; width: 75px; height: 75px; display: flex; justify-content: center; align-items: center; }
        .spin-circle { position: absolute; width: 70px; height: 70px; border: 2.5px dashed var(--primary); border-radius: 50%; animation: spin 5s linear infinite; }
        .crash-link { width: 58px; height: 58px; background: var(--primary); border-radius: 50%; color: black; font-weight: 900; font-size: 11px; display: flex; align-items: center; justify-content: center; text-decoration: none; z-index: 5; box-shadow: 0 0 15px rgba(243, 186, 47, 0.4); }
        
        @keyframes spin { 100% { transform: rotate(360deg); } }
        .up { color: var(--up); }
        .down { color: var(--down); }
    </style>
</head>
<body>

    <header class="header">
        <div class="pair-selector" onclick="togglePopup(true)">
            <span id="currentPair">BTC/USDT</span> <i class="fas fa-caret-down"></i>
        </div>
        <div style="display: flex; gap: 18px; color: var(--text-sec); font-size: 18px;">
            <i class="fas fa-chart-line" style="color: var(--primary); cursor: pointer;" id="chartRedirect"></i>
            <i class="fas fa-info-circle"></i>
            <i class="fas fa-bell"></i>
        </div>
    </header>

    <div id="pairPopup" class="overlay">
        <div class="popup-header">
            <i class="fas fa-arrow-left" onclick="togglePopup(false)"></i>
            <span style="font-weight: bold;">Markets</span>
        </div>
        <div class="search-container">
            <div class="search-box">
                <i class="fas fa-search" style="color:var(--text-sec)"></i>
                <input type="text" id="pairSearch" placeholder="Search Pairs..." oninput="renderPairs()">
            </div>
        </div>
        <div class="market-tabs" id="marketTabs"></div>
        <div class="pair-list-scroll" id="pairListContainer"></div>
    </div>

    <main class="trade-grid">
        <section>
            <div class="side-tabs">
                <button id="btnBuy" class="tab-btn active buy" onclick="setSide('buy')">Buy</button>
                <button id="btnSell" class="tab-btn sell" onclick="setSide('sell')">Sell</button>
            </div>
            <div class="input-box">
                <input type="number" id="priceInp" step="0.0001" placeholder="Price" oninput="calcTotal()">
                <span class="activeBase">USDT</span>
            </div>
            <div class="input-box">
                <input type="number" id="amountInp" step="0.0001" placeholder="Amount" oninput="calcTotal()">
                <span id="unitAsset">BTC</span>
            </div>
            <div class="pct-row">
                <button class="pct-btn" onclick="applyPct(25)">25%</button>
                <button class="pct-btn" onclick="applyPct(50)">50%</button>
                <button class="pct-btn" onclick="applyPct(75)">75%</button>
                <button class="pct-btn" onclick="applyPct(100)">100%</button>
            </div>
            <div class="fee-info">
                <span>Avbl: <b id="avblVal" style="color:white">0.0000</b> <span id="avblUnit">USDT</span></span>
            </div>
            <div class="fee-info" style="margin-top: -5px;">
                <span id="feeLabel">Trade Fee (0.25%):</span>
                <span id="feeAmount">0.0000</span>
            </div>
            <div style="background: rgba(255,255,255,0.03); padding: 10px; border-radius: 4px; margin: 10px 0;">
                <span style="font-size: 11px; color: var(--text-sec);">Est. Total Cost:</span>
                <div id="totalCost" style="font-size: 16px; font-weight: bold; color: var(--primary);">0.0000 USDT</div>
            </div>
            <button id="mainActionBtn" class="btn-action buy-bg" onclick="processTrade()">Buy BTC</button>
        </section>

        <section>
            <div class="ob-header"><span>Price</span><span>Amount</span></div>
            <div id="asks" class="ob-list"></div>
            <div class="mid-price">
                <h2 id="marketPrice" class="up">0.0000</h2>
                <small style="color: var(--text-sec);">Vol: <span id="curVol">0.0</span></small>
            </div>
            <div id="bids" class="ob-list"></div>
        </section>
    </main>

    <section class="history-section">
        <div class="h-tabs">
            <div id="tab-global" class="h-tab active" onclick="setHTab('global')">Global</div>
            <div id="tab-my" class="h-tab" onclick="setHTab('my')">My Trade</div>
            <div id="tab-un" class="h-tab" onclick="setHTab('un')">Unsuccessful</div>
        </div>
        <table class="h-table">
            <thead id="hHead"></thead>
            <tbody id="hBody"></tbody>
        </table>
        <div class="show-more-container" id="showMoreBox" style="display:none">
            <button class="show-more-btn" onclick="showMoreHistory()">Show More</button>
        </div>
    </section>

    <footer class="footer">
        <a href="home.html" class="f-nav"><i class="fas fa-home"></i>Home</a>
        <a href="Trade.html" class="f-nav active"><i class="fas fa-chart-line"></i>Trade</a>
        <div class="u-curve"><div class="spin-circle"></div><a href="Crash.html" class="crash-link">CRASH</a></div>
        <a href="Explorer.html" class="f-nav"><i class="fas fa-compass"></i>Explore</a>
        <a href="Wallet.html" class="f-nav"><i class="fas fa-wallet"></i>Wallet</a>
    </footer>

<script>
    // --- FIREBASE CONFIGURATION ---
    const firebaseConfig = { databaseURL: "https://smat-exchange-default-rtdb.firebaseio.com" };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    let activeCoin = null;
    let tradeSide = 'buy';
    let activeHTab = 'global';
    let activeMarket = 'USDT';
    let historyLimit = 20; 
    const FEE_RATE = 0.0025;
    const userId = localStorage.getItem('userId');

    function checkAuth() {
        if(localStorage.getItem('isLoggedIn') !== 'true') {
            window.location.href = 'logIn.html';
            return false;
        }
        return true;
    }

    function init() {
        if (typeof GLOBAL_COINS !== 'undefined') {
            const urlParams = new URLSearchParams(window.location.search);
            const selectedCoinSym = urlParams.get('coin');
            activeCoin = selectedCoinSym ? (GLOBAL_COINS.find(c => c.sym.toLowerCase() === selectedCoinSym.toLowerCase()) || GLOBAL_COINS[0]) : GLOBAL_COINS[0];
        }

        renderMarketTabs();
        setupRealtimeListeners();
        
        const smatVal = window["smatVal"] || 1;
        const coinPrice = window[activeCoin.sym.toLowerCase() + "Val"] || activeCoin.price;
        const displayPrice = activeMarket === 'SMAT' ? (coinPrice / smatVal) : coinPrice;
        document.getElementById('priceInp').value = displayPrice.toFixed(4);

        refreshUI();

        document.getElementById('chartRedirect').onclick = () => {
            if(!checkAuth()) return;
            location.href = `market_chat.html?symbol=${activeCoin.sym.toUpperCase()}&market=${activeMarket}`;
        };
    }

    function setupRealtimeListeners() {
        if(!activeCoin) return;
        const symbol = activeCoin.sym.toUpperCase();

        // ১. রিয়েলটাইম অর্ডার বুক
        db.ref(`orderBoard/${symbol}`).on('value', snap => {
            const data = snap.val() || { asks: {}, bids: {} };
            renderOrderBook(data);
        });

        // ২. রিয়েলটাইম ভলিউম
        db.ref(`volumes/${activeCoin.sym.toLowerCase()}_volume`).on('value', snap => {
            document.getElementById('curVol').innerText = snap.val() || "0.0";
        });

        // ৩. রিয়েলটাইম মার্কেট প্রাইস
        db.ref(`prices/${activeCoin.sym.toLowerCase()}`).on('value', snap => {
            const newPrice = snap.val() || activeCoin.price;
            updatePriceUI(newPrice);
        });

        // ৪. রিয়েলটাইম গ্লোবাল হিস্ট্রি
        db.ref(`globalOrders`).on('value', snap => {
            if(activeHTab === 'global') renderHistory();
        });
    }

    function updatePriceUI(newPrice) {
        const smatVal = window["smatVal"] || 1;
        const priceEl = document.getElementById('marketPrice');
        const displayPrice = activeMarket === 'SMAT' ? (newPrice / smatVal) : newPrice;
        const oldPrice = parseFloat(priceEl.innerText) || 0;
        
        priceEl.innerText = displayPrice.toFixed(4);
        priceEl.style.color = displayPrice >= oldPrice ? 'var(--up)' : 'var(--down)';
    }

    function renderOrderBook(data) {
        const asksList = document.getElementById('asks');
        const bidsList = document.getElementById('bids');
        const smatVal = window["smatVal"] || 1;

        const process = (orders) => {
            if(!orders) return [];
            const map = {};
            Object.values(orders).forEach(o => {
                let p = activeMarket === 'SMAT' ? (o.p / smatVal) : o.p;
                const pk = p.toFixed(4);
                map[pk] = (map[pk] || 0) + parseFloat(o.a);
            });
            return Object.keys(map).map(p => ({ p: parseFloat(p), a: map[p] }));
        };

        const asks = process(data.asks).sort((a,b) => a.p - b.p).slice(0, 8).reverse();
        const bids = process(data.bids).sort((a,b) => b.p - a.p).slice(0, 8);

        const row = (d, t) => d.map(o => `
            <div class="ob-row" onclick="document.getElementById('priceInp').value='${o.p.toFixed(4)}'; calcTotal();">
                <span class="${t === 'ask' ? 'down' : 'up'}">${o.p.toFixed(4)}</span>
                <span>${o.a.toFixed(4)}</span>
                <div class="depth-bar" style="width: ${Math.min(o.a * 10, 100)}%; background: ${t === 'ask' ? 'rgba(246, 70, 93, 0.1)' : 'rgba(14, 203, 129, 0.1)'};"></div>
            </div>`).join('');

        asksList.innerHTML = row(asks, 'ask');
        bidsList.innerHTML = row(bids, 'bid');
    }

    function processTrade() {
        if(!checkAuth()) return;
        let p = parseFloat(document.getElementById('priceInp').value);
        let a = parseFloat(document.getElementById('amountInp').value);
        if(!p || !a || p <= 0 || a <= 0) return alert("Invalid Input");

        const smatVal = window["smatVal"] || 1;
        const dbPrice = activeMarket === 'SMAT' ? (p * smatVal) : p;
        const symbol = activeCoin.sym.toUpperCase();
        const cost = p * a;

        // ব্যালেন্স চেক
        const balKey = tradeSide === 'buy' ? `${activeMarket.toLowerCase()}_balance` : `${activeCoin.sym.toLowerCase()}_balance`;
        const bal = parseFloat(localStorage.getItem(balKey)) || 0;
        const totalCost = tradeSide === 'buy' ? (cost * (1 + FEE_RATE)) : a;

        if(bal < totalCost) return alert("Insufficient Balance");

        // ব্যালেন্স ডিডাক্ট
        localStorage.setItem(balKey, (bal - totalCost).toFixed(4));

        const orderId = db.ref(`orderBoard/${symbol}/${tradeSide === 'buy' ? 'bids' : 'asks'}`).push().key;
        const orderData = { id: orderId, userId, p: dbPrice, a, s: symbol, side: tradeSide, market: activeMarket, time: new Date().toLocaleTimeString() };

        db.ref(`orderBoard/${symbol}/${tradeSide === 'buy' ? 'bids' : 'asks'}/${orderId}`).set(orderData);
        db.ref(`userOrders/${userId}/unsuccessful/${orderId}`).set(orderData);

        alert("Order Placed");
        refreshUI();
    }

    function renderHistory() {
        const body = document.getElementById('hBody');
        const head = document.getElementById('hHead');
        const smatVal = window["smatVal"] || 1;

        let path = activeHTab === 'global' ? `globalOrders` : `userOrders/${userId}/${activeHTab === 'my' ? 'history' : 'unsuccessful'}`;

        db.ref(path).limitToLast(historyLimit + 10).once('value', snap => {
            const data = Object.values(snap.val() || {}).filter(o => o.s === activeCoin.sym.toUpperCase()).reverse();
            const visible = data.slice(0, historyLimit);
            document.getElementById('showMoreBox').style.display = data.length > historyLimit ? 'block' : 'none';

            if(activeHTab === 'un') {
                head.innerHTML = `<tr><th>Pair</th><th>Price</th><th>Amount</th><th>Status</th></tr>`;
                body.innerHTML = visible.map(o => `<tr><td>${o.s}/${o.market}</td><td>${(activeMarket==='SMAT'?o.p/smatVal:o.p).toFixed(4)}</td><td>${o.a.toFixed(4)}</td><td class="down" onclick="cancelOrder('${o.id}','${o.s}','${o.side}')">Cancel</td></tr>`).join('');
            } else {
                head.innerHTML = `<tr><th>Time</th><th>Side</th><th>Price</th><th>Amount</th></tr>`;
                body.innerHTML = visible.map(o => `<tr><td>${o.time}</td><td class="${o.side==='buy'?'up':'down'}">${o.side.toUpperCase()}</td><td>${(activeMarket==='SMAT'?o.p/smatVal:o.p).toFixed(4)}</td><td>${o.a.toFixed(4)}</td></tr>`).join('');
            }
        });
    }

    function cancelOrder(id, sym, side) {
        db.ref(`orderBoard/${sym}/${side === 'buy' ? 'bids' : 'asks'}/${id}`).once('value', snap => {
            const o = snap.val();
            if(o) {
                const balKey = side === 'buy' ? `${o.market.toLowerCase()}_balance` : `${sym.toLowerCase()}_balance`;
                const refund = side === 'buy' ? (o.p * o.a * (1+FEE_RATE)) : o.a;
                localStorage.setItem(balKey, (parseFloat(localStorage.getItem(balKey)) + refund).toFixed(4));
                
                db.ref(`orderBoard/${sym}/${side === 'buy' ? 'bids' : 'asks'}/${id}`).remove();
                db.ref(`userOrders/${userId}/unsuccessful/${id}`).remove();
                refreshUI();
            }
        });
    }

    function setHTab(t) { activeHTab = t; historyLimit = 20; renderHistory(); document.querySelectorAll('.h-tab').forEach(el => el.classList.toggle('active', el.id === 'tab-'+t)); }
    function showMoreHistory() { historyLimit += 10; renderHistory(); }
    function setSide(s) { tradeSide = s; refreshUI(); document.getElementById('btnBuy').classList.toggle('active', s==='buy'); document.getElementById('btnSell').classList.toggle('active', s==='sell'); document.getElementById('mainActionBtn').className = 'btn-action ' + (s==='buy'?'buy-bg':'sell-bg'); }
    function calcTotal() { const p = parseFloat(document.getElementById('priceInp').value)||0, a = parseFloat(document.getElementById('amountInp').value)||0, cost = p*a, fee = cost*FEE_RATE; document.getElementById('feeAmount').innerText = fee.toFixed(4); document.getElementById('totalCost').innerText = (tradeSide === 'buy' ? cost+fee : cost).toFixed(4) + " " + activeMarket; }
    function applyPct(pct) { const avbl = parseFloat(document.getElementById('avblVal').innerText), p = parseFloat(document.getElementById('priceInp').value); if(!p || p<=0) return; document.getElementById('amountInp').value = tradeSide === 'buy' ? (avbl*(pct/100)/(p*(1+FEE_RATE))).toFixed(4) : (avbl*(pct/100)).toFixed(4); calcTotal(); }
    function updateBalanceDisplay() { const key = tradeSide === 'buy' ? `${activeMarket.toLowerCase()}_balance` : `${activeCoin.sym.toLowerCase()}_balance`; document.getElementById('avblVal').innerText = (parseFloat(localStorage.getItem(key))||0).toFixed(4); document.getElementById('avblUnit').innerText = tradeSide === 'buy' ? activeMarket : activeCoin.sym.toUpperCase(); }
    function refreshUI() { document.getElementById('currentPair').innerText = activeCoin.sym.toUpperCase() + "/" + activeMarket; document.getElementById('unitAsset').innerText = activeCoin.sym.toUpperCase(); document.getElementById('mainActionBtn').innerText = (tradeSide==='buy'?'Buy ':'Sell ') + activeCoin.sym.toUpperCase(); document.querySelectorAll('.activeBase').forEach(el => el.innerText = activeMarket); updateBalanceDisplay(); calcTotal(); renderHistory(); }
    function togglePopup(s) { document.getElementById('pairPopup').style.display = s ? 'flex' : 'none'; if(s) { renderMarketTabs(); renderPairs(); } }
    function renderMarketTabs() { const m = ['USDT', 'USDC', 'SMAT']; document.getElementById('marketTabs').innerHTML = m.map(x => `<div class="m-tab ${activeMarket===x?'active':''}" onclick="activeMarket='${x}';renderMarketTabs();renderPairs();refreshUI();"><div class="tab-logo">${x[0]}</div>${x}</div>`).join(''); }
    function renderPairs() { const q = document.getElementById('pairSearch').value.toUpperCase(), smatVal = window["smatVal"]||1; document.getElementById('pairListContainer').innerHTML = GLOBAL_COINS.filter(c => c.sym.includes(q) && c.sym !== activeMarket).map(c => `<div class="pair-row" onclick="activeCoin=GLOBAL_COINS.find(x=>x.sym==='${c.sym}');togglePopup(false);setupRealtimeListeners();refreshUI();"><div class="p-info"><div class="p-logo"></div><b>${c.sym}/${activeMarket}</b></div><b>${(activeMarket==='SMAT'?c.price/smatVal:c.price).toFixed(4)}</b></div>`).join(''); }

    window.onload = init;
</script>
</body>
</html>
