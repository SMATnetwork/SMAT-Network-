<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SMAT CEX | Demo Balance Panel</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap');

        :root {
            --bg: #0b0e11; --card: #181a20; --border: #2b3139;
            --primary: #f0b90b; --up: #0ecb81; --down: #f6465d;
            --text-main: #ffffff; --text-muted: #848e9c;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Inter', sans-serif; }
        body { background: var(--bg); color: var(--text-main); display: flex; justify-content: center; align-items: center; min-height: 100vh; padding: 20px; }

        .admin-card { 
            background: var(--card); 
            border: 1px solid var(--border); 
            padding: 30px; 
            border-radius: 20px; 
            width: 100%; 
            max-width: 450px; 
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }

        .header { text-align: center; margin-bottom: 25px; }
        .header h1 { color: var(--primary); font-size: 22px; font-weight: 900; text-transform: uppercase; }
        .header p { color: var(--text-muted); font-size: 12px; margin-top: 5px; }

        .input-group { margin-bottom: 20px; }
        label { display: block; font-size: 10px; color: var(--text-muted); margin-bottom: 8px; font-weight: 900; text-transform: uppercase; letter-spacing: 1px; }
        input { 
            width: 100%; padding: 15px; background: #0b0e11; 
            border: 1px solid var(--border); color: white; 
            border-radius: 10px; outline: none; font-size: 14px; 
            font-weight: 700; transition: 0.3s;
        }
        input:focus { border-color: var(--primary); }

        .btn-send { 
            background: var(--primary); color: #000; width: 100%; 
            padding: 16px; border: none; border-radius: 12px; 
            font-weight: 900; cursor: pointer; text-transform: uppercase; 
            font-size: 15px; transition: 0.2s;
        }
        .btn-send:active { transform: scale(0.98); }

        .status-msg { margin-top: 15px; text-align: center; font-size: 12px; font-weight: 700; min-height: 18px; }
    </style>
</head>
<body>

<div class="admin-card">
    <div class="header">
        <h1>Demo Balance Panel</h1>
        <p>ইউজার আইডি দিয়ে সরাসরি USDT পাঠান</p>
    </div>

    <div class="input-group">
        <label>Target User (SMAT ID)</label>
        <input type="text" id="targetID" placeholder="যেমন: SMAT100002">
    </div>

    <div class="input-group">
        <label>Amount (USDT)</label>
        <input type="number" id="targetAmount" placeholder="৫০০০">
    </div>

    <button class="btn-send" onclick="processPayment()">ব্যালেন্স আপডেট করুন</button>
    <div id="status" class="status-msg"></div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getDatabase, ref, set, onValue } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

    const firebaseConfig = {
        apiKey: "AIzaSyAMxtJedkehhxJRMPZLjhpKHqneHEWsGlE",
        authDomain: "smat-exchange.firebaseapp.com",
        databaseURL: "https://smat-exchange-default-rtdb.firebaseio.com",
        projectId: "smat-exchange",
        appId: "1:836334569396:web:679effe640b3453412d4e1"
    };

    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app);

    window.processPayment = () => {
        const smatID = document.getElementById('targetID').value.trim();
        const amount = parseFloat(document.getElementById('targetAmount').value);
        const statusEl = document.getElementById('status');

        if(!smatID || isNaN(amount)) {
            showStatus("সবগুলো ঘর ঠিকভাবে পূরণ করুন!", "var(--down)");
            return;
        }

        statusEl.innerText = "ইউজার খোঁজা হচ্ছে...";
        statusEl.style.color = "var(--primary)";

        const usersRef = ref(db, 'users');
        onValue(usersRef, (snapshot) => {
            const users = snapshot.val();
            let firebaseKey = null;

            if(users) {
                Object.keys(users).forEach(key => {
                    if(users[key].smatID === smatID) {
                        firebaseKey = key;
                    }
                });
            }

            if(firebaseKey) {
                // ব্যালেন্স সেট করা হচ্ছে (এটি সরাসরি USDT হিসেবে কাজ করবে)
                set(ref(db, `users/${firebaseKey}/balance`), amount).then(() => {
                    showStatus(`${smatID} আইডিতে ${amount} USDT যোগ হয়েছে!`, "var(--up)");
                    document.getElementById('targetAmount').value = "";
                });
            } else {
                showStatus("এই SMAT ID পাওয়া যায়নি!", "var(--down)");
            }
        }, { onlyOnce: true });
    };

    function showStatus(msg, color) {
        const el = document.getElementById('status');
        el.innerText = msg;
        el.style.color = color;
    }
</script>

</body>
</html>
