<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SMAT | Master Admin Panel</title>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-database-compat.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/ethers/5.7.2/ethers.umd.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700;900&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --bg: #0b0e11; --card: #1e2329; --primary: #f0b90b;
            --up: #0ecb81; --down: #f6465d; --border: rgba(255, 255, 255, 0.1);
            --font: 'Montserrat', sans-serif;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; font-family: var(--font); outline: none; }
        body { background: var(--bg); color: white; overflow-x: hidden; min-height: 100vh; }

        /* --- LOGIN --- */
        #loginScreen { position: fixed; inset: 0; background: radial-gradient(circle at center, #1e2329 0%, #0b0e11 100%); display: flex; justify-content: center; align-items: center; z-index: 9999; }
        .login-card { background: var(--card); border-radius: 30px; padding: 50px 40px; width: 90%; max-width: 420px; border: 1px solid var(--primary); text-align: center; box-shadow: 0 0 20px rgba(0,0,0,0.5); }
        .login-input { width: 100%; background: #111418; border: 1px solid var(--border); padding: 18px; border-radius: 12px; color: white; margin-bottom: 20px; }
        .login-btn { width: 100%; background: var(--primary); border: none; padding: 18px; border-radius: 12px; font-weight: 900; cursor: pointer; text-transform: uppercase; color: black; }

        /* --- DASHBOARD --- */
        #dashboard { display: none; }
        header { height: 80px; background: var(--card); display: flex; align-items: center; justify-content: space-between; padding: 0 30px; border-bottom: 2px solid var(--primary); position: sticky; top: 0; z-index: 1000; }
        .container { padding: 25px; max-width: 1400px; margin: 0 auto; }
        
        /* Summary Grid */
        .stats-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 15px; margin-bottom: 25px; }
        .stat-box { background: var(--card); padding: 20px; border-radius: 15px; border: 1px solid var(--border); text-align: center; }
        .stat-label { color: #848e9c; font-size: 10px; text-transform: uppercase; margin-bottom: 8px; }
        .stat-val { font-size: 18px; font-weight: 900; color: var(--primary); }

        /* Table Style */
        .table-container { background: var(--card); border-radius: 20px; border: 1px solid var(--border); overflow-x: auto; }
        table { width: 100%; border-collapse: collapse; min-width: 900px; }
        th { background: rgba(255,255,255,0.03); color: #848e9c; font-size: 11px; text-transform: uppercase; padding: 18px; text-align: left; border-bottom: 1px solid var(--border); }
        td { padding: 18px; border-bottom: 1px solid rgba(255,255,255,0.03); font-size: 13px; vertical-align: middle; }
        tr:hover { background: rgba(255,255,255,0.01); }

        .addr-text { font-family: monospace; color: #848e9c; font-size: 11px; background: rgba(0,0,0,0.2); padding: 6px 10px; border-radius: 6px; }
        .btn-sweep { background: var(--primary); color: black; border: none; padding: 10px 18px; border-radius: 8px; font-weight: 900; cursor: pointer; font-size: 10px; display: inline-flex; align-items: center; gap: 6px; }
        .btn-sweep:disabled { opacity: 0.2; cursor: not-allowed; }

        #customPopup { position: fixed; bottom: 30px; right: 30px; padding: 15px 25px; background: var(--primary); color: black; border-radius: 10px; font-weight: 900; display: none; z-index: 10002; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }

        @media (max-width: 768px) {
            header h2 { font-size: 14px; }
            .container { padding: 10px; }
            .stats-grid { grid-template-columns: 1fr 1fr; }
        }
    </style>
</head>
<body>

    <div id="loginScreen">
        <div class="login-card">
            <div class="login-title" style="font-size:24px; font-weight:900; margin-bottom:25px;">SMAT <span style="color:var(--primary)">MASTER</span></div>
            <input type="email" id="admEmail" class="login-input" placeholder="Admin Email">
            <input type="password" id="admPass" class="login-input" placeholder="Password">
            <button class="login-btn" onclick="tryLogin()">Launch Panel</button>
            <p id="admErr" style="color:var(--down); font-size:11px; margin-top:10px; display:none;">Invalid Credentials</p>
        </div>
    </div>

    <div id="dashboard">
        <header>
            <h2 style="letter-spacing: 1px;">SYSTEM <span style="color:var(--primary)">CONTROL</span></h2>
            <div style="display:flex; align-items:center; gap:15px;">
                <button class="btn-sweep" id="globalSweepBtn" onclick="sweepAllFunds()" style="padding: 12px 25px; background:white;">
                    <i class="fas fa-bolt"></i> MASS SWEEP
                </button>
                <i class="fas fa-power-off" style="color:var(--down); cursor:pointer; font-size: 20px;" onclick="adminLogout()"></i>
            </div>
        </header>

        <div class="container">
            <div class="stats-grid">
                <div class="stat-box">
                    <div class="stat-label">Main Admin Wallet</div>
                    <div class="stat-val" style="font-size:13px;">0x065C...4945</div>
                </div>
                <div class="stat-box">
                    <div class="stat-label">Total Chain Assets</div>
                    <div class="stat-val" id="totalChainAssets">0.00 tBNB</div>
                </div>
                <div class="stat-box">
                    <div class="stat-label">Active Users</div>
                    <div class="stat-val" id="nodeCount">0</div>
                </div>
            </div>

            <div class="table-container">
                <table>
                    <thead>
                        <tr>
                            <th>User Profile</th>
                            <th>Deposit Node (BSC)</th>
                            <th>Internal Balance</th>
                            <th>Live Node Balance</th>
                            <th style="text-align:right">Action</th>
                        </tr>
                    </thead>
                    <tbody id="tableBody">
                        <tr><td colspan="5" style="text-align:center; padding:50px;">Waiting for data...</td></tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>

    <div id="customPopup">Action Successful!</div>

<script>
// --- CONFIGURATION ---
const firebaseConfig = { 
    apiKey: "AIzaSyAMxtJedkehhxJRMPZLjhpKHqneHEWsGlE", 
    authDomain: "smat-exchange.firebaseapp.com", 
    databaseURL: "https://smat-exchange-default-rtdb.firebaseio.com",
    projectId: "smat-exchange" 
};
firebase.initializeApp(firebaseConfig);
const db = firebase.database();
const auth = firebase.auth();

const ADMIN_WALLET = "0x065C306aFfe5D507A67568210ca4752089A74945";
const provider = new ethers.providers.JsonRpcProvider("https://bsc-testnet.publicnode.com");

let allUsers = [];

// --- AUTH LOGIC ---
function tryLogin() {
    const e = document.getElementById('admEmail').value;
    const p = document.getElementById('admPass').value;
    auth.signInWithEmailAndPassword(e, p).catch(() => document.getElementById('admErr').style.display='block');
}

auth.onAuthStateChanged(user => {
    if (user) {
        document.getElementById('loginScreen').style.display = 'none';
        document.getElementById('dashboard').style.display = 'block';
        loadData();
    } else {
        document.getElementById('loginScreen').style.display = 'flex';
        document.getElementById('dashboard').style.display = 'none';
    }
});

function adminLogout() { auth.signOut(); }

// --- CORE DATA ENGINE ---
function loadData() {
    db.ref('users').on('value', snap => {
        const users = snap.val();
        if(!users) return;
        allUsers = Object.keys(users).map(uid => ({ uid, ...users[uid] }));
        document.getElementById('nodeCount').innerText = allUsers.length;
        renderTable();
    });
}

async function renderTable() {
    const tbody = document.getElementById('tableBody');
    let html = '';
    let totalChainCount = 0;

    for (let user of allUsers) {
        if (!user.depositAddress) continue;
        
        let liveChainBalStr = "0.00";
        try {
            const b = await provider.getBalance(user.depositAddress);
            const liveChainBalNum = parseFloat(ethers.utils.formatEther(b));
            liveChainBalStr = liveChainBalNum.toFixed(4);
            totalChainCount += liveChainBalNum;

            // --- অটোমেটিক ব্যালেন্স এবং হিস্ট্রি সিঙ্ক লজিক ---
            const lastSynced = parseFloat(user.last_synced_chain_balance || 0);
            const currentAppBal = parseFloat(user.tbnb_balance || 0);

            if (liveChainBalNum > lastSynced) {
                const depositDiff = liveChainBalNum - lastSynced;
                const updatedAppBal = currentAppBal + depositDiff;
                const now = Date.now();
                
                // নতুন একটি হিস্ট্রি আইডি জেনারেট করা
                const historyRef = db.ref(`users/${user.uid}/history`).push();
                
                const historyData = {
                    coin: "tBNB",
                    amount: depositDiff.toFixed(6),
                    method: "Deposit",      // ইউজার ওয়ালেটে সবুজ রঙের 'INCOMING' দেখাবে
                    status: "success",      // সরাসরি সাকসেস (অটোমেটিক)
                    network: "BEP20",
                    timestamp: now,
                    hash: "Confirmed",
                    address: user.depositAddress,
                    date: new Date(now).toLocaleDateString(),
                    time: new Date(now).toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' })
                };

                // ব্যালেন্স, চেইন ট্র্যাকার এবং হিস্ট্রি একসাথে আপডেট (Atomic Update)
                const updates = {};
                updates[`users/${user.uid}/tbnb_balance`] = parseFloat(updatedAppBal.toFixed(8));
                updates[`users/${user.uid}/last_synced_chain_balance`] = liveChainBalNum;
                updates[`users/${user.uid}/history/${historyRef.key}`] = historyData;
                
                await db.ref().update(updates);
            }
        } catch(e) { console.log("Node Sync Error"); }

        html += `
        <tr>
            <td>
                <div style="font-weight:700; color:white;">${user.email}</div>
                <div style="font-size:10px; color:#848e9c">UID: ${user.uid.substring(0,8)}</div>
            </td>
            <td><span class="addr-text">${user.depositAddress.substring(0,12)}...${user.depositAddress.slice(-8)}</span></td>
            <td style="color:var(--primary); font-weight:900; font-size:15px;">${user.tbnb_balance || 0} <small style="font-size:9px">tBNB</small></td>
            <td style="color:var(--up); font-weight:700;">${liveChainBalStr} <small style="font-size:9px">tBNB</small></td>
            <td style="text-align:right">
                <button class="btn-sweep" onclick="sweepSingle('${user.uid}')" ${parseFloat(liveChainBalStr) < 0.0001 ? 'disabled' : ''}>
                    <i class="fas fa-bolt"></i> SWEEP
                </button>
            </td>
        </tr>`;
    }

    document.getElementById('totalChainAssets').innerText = totalChainCount.toFixed(4) + " tBNB";
    tbody.innerHTML = html || '<tr><td colspan="5" style="text-align:center;">No active nodes found.</td></tr>';
}

// --- SWEEP LOGIC (অ্যাডমিন মেইন ওয়ালেটে টাকা সরিয়ে নেওয়ার জন্য) ---
async function sweepSingle(uid) {
    const user = allUsers.find(u => u.uid === uid);
    if(!user || !user.vault_key) return showPopup("Private Key Missing!", "down");

    const cleanKey = user.vault_key.startsWith('0x') ? user.vault_key : '0x' + user.vault_key;

    try {
        showPopup("Executing Smart Tunnel...", "primary");
        const wallet = new ethers.Wallet(cleanKey, provider);
        const balance = await provider.getBalance(wallet.address);
        
        const networkGasPrice = await provider.getGasPrice();
        const gasPrice = networkGasPrice.mul(105).div(100);
        const gasLimit = 21000;
        const fee = gasPrice.mul(gasLimit);

        if (balance.lte(fee)) return showPopup("Insufficient Gas Fee!", "down");

        const sweepAmount = balance.sub(fee);
        
        showPopup("Broadcasting Transaction...", "primary");
        const tx = await wallet.sendTransaction({ 
            to: ADMIN_WALLET, 
            value: sweepAmount,
            gasPrice: gasPrice,
            gasLimit: gasLimit
        });
        
        const receipt = await tx.wait();

        if(receipt.status === 1) {
            // চেইন সিঙ্ক ০ করে দেওয়া হচ্ছে যাতে পরবর্তীতে নতুন ডিপোজিট ডিটেক্ট হয়
            await db.ref(`users/${uid}`).update({
                last_synced_chain_balance: 0 
            });
            showPopup("Funds Secured! Node Cleared.", "up");
        } else {
            showPopup("Transaction Reverted on Chain", "down");
        }

    } catch(e) {
        console.error("Sweep Error:", e);
        showPopup("Error: " + e.message.substring(0,25), "down");
    }
}

async function sweepAllFunds() {
    const btn = document.getElementById('globalSweepBtn');
    btn.disabled = true;
    showPopup("Mass Sweep Initiated...", "primary");

    for (let user of allUsers) {
        if(user.depositAddress && user.vault_key) {
            try {
                const b = await provider.getBalance(user.depositAddress);
                if(b.gt(ethers.utils.parseEther("0.001"))) {
                    await sweepSingle(user.uid);
                }
            } catch(e) {}
        }
    }
    btn.disabled = false;
    showPopup("Mass Sweep Process Complete!", "up");
}

function showPopup(msg, type) {
    const p = document.getElementById('customPopup');
    p.innerText = msg;
    p.style.background = type === 'up' ? '#0ecb81' : (type === 'down' ? '#f6465d' : '#f0b90b');
    p.style.display = 'block';
    setTimeout(() => { p.style.display = 'none'; }, 3500);
}
</script>

</body>
</html>
