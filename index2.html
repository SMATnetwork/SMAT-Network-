<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SMAT EXCHANGE | Digital Future</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --primary: #00ff88;
            --bg-black: #000000;
            --card-glass: rgba(12, 12, 12, 0.95);
            --text-main: #ffffff;
            --text-dim: #888888;
        }

        /* ক্লিক গ্লিচ বন্ধ এবং সিলেকশন প্রিভেনশন */
        * { 
            margin: 0; padding: 0; box-sizing: border-box; 
            font-family: 'Inter', -apple-system, sans-serif;
            -webkit-tap-highlight-color: transparent; 
            outline: none !important;
        }

        body {
            background-color: var(--bg-black);
            height: 100vh; display: flex;
            justify-content: center; align-items: center;
            overflow: hidden; position: relative;
        }

        /* --- OKX Matrix & Particle Logic --- */
        #matrixCanvas {
            position: absolute; top: 0; left: 0;
            width: 100%; height: 100%;
            z-index: 1; filter: blur(1px);
        }

        .market-overlay {
            position: absolute; width: 100%; height: 100%;
            z-index: 2; pointer-events: none;
        }

        .floating-coin {
            position: absolute;
            font-family: 'monospace';
            font-weight: 900;
            font-size: 1.1rem;
            color: rgba(255, 255, 255, 0.9);
            white-space: nowrap;
            animation: drift linear infinite;
            text-shadow: 0 0 10px rgba(0, 255, 136, 0.3);
        }

        @keyframes drift {
            from { transform: translate(-100px, 0); opacity: 0; }
            10% { opacity: 1; }
            90% { opacity: 1; }
            to { transform: translate(110vw, -50px); opacity: 0; }
        }

        /* --- Auth Card (OKX Premium Design) --- */
        .auth-container {
            position: relative; z-index: 10;
            width: 90%; max-width: 420px;
            background: var(--card-glass);
            padding: 45px 30px;
            border-radius: 35px;
            border: 1px solid rgba(0, 255, 136, 0.15);
            box-shadow: 0 0 50px rgba(0, 0, 0, 0.8), inset 0 0 20px rgba(0, 255, 136, 0.05);
            backdrop-filter: blur(10px);
            text-align: center;
        }

        .logo-frame {
            width: 95px; height: 95px; margin: 0 auto 20px;
            background: #fff; border-radius: 50%; padding: 4px;
            border: 2px solid var(--primary); overflow: hidden;
            box-shadow: 0 0 20px rgba(0, 255, 136, 0.3);
        }
        .logo-frame img { width: 100%; height: 100%; object-fit: cover; border-radius: 50%; }

        .brand { font-size: 30px; font-weight: 900; color: #fff; letter-spacing: -1px; margin-bottom: 5px; }
        .brand span { color: var(--primary); }
        .subtitle { color: var(--text-dim); font-size: 14px; margin-bottom: 35px; }

        .input-group { text-align: left; margin-bottom: 22px; }
        label { display: block; font-size: 11px; color: var(--text-dim); margin-bottom: 10px; font-weight: 800; text-transform: uppercase; }

        input {
            width: 100%; padding: 18px;
            background: #1a1a1a; border: 1px solid rgba(255,255,255,0.05);
            border-radius: 16px; color: #fff; font-size: 16px; transition: 0.3s;
        }
        input:focus { border-color: var(--primary); background: #000; }

        .pass-wrapper { position: relative; }
        .eye-icon { position: absolute; right: 18px; top: 50%; transform: translateY(-50%); color: var(--text-dim); cursor: pointer; padding: 5px; }

        #actionBtn {
            width: 100%; padding: 18px;
            background: var(--primary); color: #000;
            border: none; border-radius: 16px;
            font-size: 18px; font-weight: 900;
            cursor: pointer; margin-top: 10px; transition: 0.3s;
        }
        #actionBtn:disabled { background: #333; color: #666; cursor: not-allowed; }

        /* লিঙ্ক গ্লিচ বন্ধ */
        .footer-nav { margin-top: 30px; padding-top: 20px; border-top: 1px solid rgba(255,255,255,0.05); }
        .link-pri { color: var(--primary); cursor: pointer; font-weight: 800; font-size: 15px; background: none !important; }
        .link-sec { color: var(--text-dim); cursor: pointer; font-size: 14px; display: block; margin-top: 15px; background: none !important; }

        /* টোস্ট নোটিফিকেশন */
        #customToast {
            position: fixed; top: -100px; left: 50%; transform: translateX(-50%);
            background: #151515; color: #fff; padding: 18px 30px; border-radius: 16px;
            z-index: 1000; border: 1px solid var(--primary); transition: 0.6s cubic-bezier(0.68, -0.55, 0.27, 1.55);
            display: flex; align-items: center; gap: 15px; box-shadow: 0 20px 40px rgba(0,0,0,0.5);
        }
        #customToast.show { top: 30px; }
    </style>
</head>
<body>

<div id="customToast">
    <i class="fa-solid fa-bolt" style="color: var(--primary);"></i>
    <span id="toastMsg">Ready to Trade</span>
</div>

<canvas id="matrixCanvas"></canvas>
<div class="market-overlay" id="coinStream"></div>

<div class="auth-container">
    <div class="logo-frame">
        <img src="assets/logos/smat.png" alt="SMAT">
    </div>
    <h1 class="brand">SMAT <span>EXCHANGE</span></h1>
    <p class="subtitle" id="tagline">Sign in to manage your decentralized assets</p>

    <div class="input-group">
        <label>Email Address</label>
        <input type="email" id="email" placeholder="example@gmail.com">
    </div>

    <div class="input-group">
        <label>Password <span id="passValidator" style="float: right; text-transform: none;"></span></label>
        <div class="pass-wrapper">
            <input type="password" id="password" placeholder="••••••••" oninput="checkPass()">
            <i class="fa-solid fa-eye eye-icon" onclick="togglePass()"></i>
        </div>
    </div>

    <button id="actionBtn" onclick="runAuth()">LOGIN</button>

    <div class="footer-nav">
        <span class="link-pri" id="modeSwitch" onclick="switchUI()">Create Account</span>
        <span class="link-sec" onclick="triggerReset()">Forgot Password?</span>
    </div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getAuth, createUserWithEmailAndPassword, signInWithEmailAndPassword, sendEmailVerification, sendPasswordResetEmail } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
    import { getDatabase, ref, set, get, runTransaction } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

    const firebaseConfig = {
        apiKey: "AIzaSyAMxtJedkehhxJRMPZLjhpKHqneHEWsGlE",
        authDomain: "smat-exchange.firebaseapp.com",
        projectId: "smat-exchange",
        storageBucket: "smat-exchange.firebasestorage.app",
        messagingSenderId: "836334569396",
        appId: "1:836334569396:web:679effe640b3453412d4e1"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getDatabase(app);

    // --- ১. OKX Matrix Animation Logic ---
    const canvas = document.getElementById('matrixCanvas');
    const ctx = canvas.getContext('2d');
    let particles = [];

    function resize() {
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;
    }
    window.addEventListener('resize', resize);
    resize();

    class Particle {
        constructor() {
            this.x = Math.random() * canvas.width;
            this.y = Math.random() * canvas.height;
            this.size = Math.random() * 2;
            this.speedX = Math.random() * 0.5 - 0.25;
            this.speedY = Math.random() * 0.5 - 0.25;
        }
        update() {
            this.x += this.speedX;
            this.y += this.speedY;
            if (this.x > canvas.width) this.x = 0;
            if (this.x < 0) this.x = canvas.width;
            if (this.y > canvas.height) this.y = 0;
            if (this.y < 0) this.y = canvas.height;
        }
        draw() {
            ctx.fillStyle = 'rgba(0, 255, 136, 0.2)';
            ctx.beginPath();
            ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
            ctx.fill();
        }
    }

    function initMatrix() {
        for (let i = 0; i < 100; i++) particles.push(new Particle());
    }

    function animate() {
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        particles.forEach(p => { p.update(); p.draw(); });
        requestAnimationFrame(animate);
    }
    initMatrix();
    animate();

    // --- ২. Floating Coin Prices ---
    const coinStream = document.getElementById('coinStream');
    const crypto = [
        {n: 'BTC/USDT', p: '64,210', u: true}, {n: 'ETH/USDT', p: '3,452', u: false},
        {n: 'SMAT/USDT', p: '1.4500', u: true}, {n: 'BNB/USDT', p: '592', u: false}
    ];

    function spawnCoins() {
        setInterval(() => {
            const div = document.createElement('div');
            div.className = 'floating-coin';
            const d = crypto[Math.floor(Math.random()*crypto.length)];
            div.innerHTML = `${d.n} <span style="color:${d.u?'#00ff88':'#ff4d4d'}">${d.p} ${d.u?'↑':'↓'}</span>`;
            div.style.top = Math.random() * 80 + 'vh';
            div.style.duration = (Math.random() * 10 + 10) + 's';
            coinStream.appendChild(div);
            setTimeout(() => div.remove(), 20000);
        }, 3000);
    }
    spawnCoins();

    // --- ৩. SMAT ID & Referral Logic (Original) ---
    let isLogin = true;
    const urlParams = new URLSearchParams(window.location.search);
    const referralID = urlParams.get('ref') || null;

    window.pop = (msg, isErr = false) => {
        const t = document.getElementById('customToast');
        document.getElementById('toastMsg').innerText = msg;
        t.style.borderColor = isErr ? "#ff4d4d" : "#00ff88";
        t.classList.add('show');
        setTimeout(() => t.classList.remove('show'), 3000);
    };

    window.togglePass = () => {
        const p = document.getElementById('password');
        p.type = p.type === 'password' ? 'text' : 'password';
    };

    window.checkPass = () => {
        const val = document.getElementById('password').value;
        const status = document.getElementById('passValidator');
        const btn = document.getElementById('actionBtn');
        const regex = /^(?=.*[A-Za-z])(?=.*\d)[A-Za-z\d]{8,}$/;

        if(val === "") { status.innerText = ""; return; }
        if(regex.test(val)) {
            status.innerHTML = '<i class="fa-solid fa-circle-check"></i> Strong';
            status.style.color = "#00ff88";
            btn.disabled = false;
        } else {
            status.innerText = "Letter+Num (Min 8)";
            status.style.color = "#ff4d4d";
            if(!isLogin) btn.disabled = true;
        }
    };

    window.switchUI = () => {
        isLogin = !isLogin;
        document.getElementById('tagline').innerText = isLogin ? "Sign in to manage your decentralized assets" : "Join the SMAT ecosystem and start mining";
        document.getElementById('actionBtn').innerText = isLogin ? "LOGIN" : "REGISTER";
        document.getElementById('modeSwitch').innerText = isLogin ? "Create Account" : "Sign In Instead";
        document.getElementById('passValidator').innerText = "";
    };

    const getNewSmatID = async () => {
        const counterRef = ref(db, 'counters/lastSmatId');
        const res = await runTransaction(counterRef, (v) => (v || 100000) + 1);
        return "SMAT" + res.snapshot.val();
    };

    window.runAuth = async () => {
        const email = document.getElementById('email').value;
        const pass = document.getElementById('password').value;
        if(!email || !pass) return pop("Enter credentials!", true);

        pop("Authenticating...");
        try {
            if (isLogin) {
                const cred = await signInWithEmailAndPassword(auth, email, pass);
                if (cred.user.emailVerified) {
                    const snap = await get(ref(db, 'users/' + cred.user.uid));
                    if(snap.exists()) localStorage.setItem('smatID', snap.val().smatID);
                    localStorage.setItem('isLoggedIn', 'true');
                    window.location.href = "home.html"; 
                } else pop("Verify your email first!", true);
            } else {
                const cred = await createUserWithEmailAndPassword(auth, email, pass);
                const sID = await getNewSmatID();
                await set(ref(db, 'users/' + cred.user.uid), {
                    email, smatID: sID, kycStatus: 'unverified', referredBy: referralID, createdAt: new Date().toISOString()
                });
                await sendEmailVerification(cred.user);
                pop("Check Gmail for verification link!");
            }
        } catch (e) { pop(e.message, true); }
    };

    window.triggerReset = async () => {
        const email = document.getElementById('email').value;
        if(!email) return pop("Email required for reset!", true);
        try {
            await sendPasswordResetEmail(auth, email);
            pop("Reset link sent to your email!");
        } catch (e) { pop(e.message, true); }
    };
</script>
</body>
</html>
