<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SMAT EXCHANGE | Next-Gen Trading</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --primary: #00ff88;
            --glass: rgba(10, 10, 10, 0.85);
            --input: rgba(255, 255, 255, 0.08);
            --text-main: #ffffff;
            --text-dim: rgba(255, 255, 255, 0.6);
        }

        /* ক্লিক গ্লিচ এবং সিলেকশন বন্ধ করার মাস্টার ফিক্স */
        * { 
            margin: 0; padding: 0; box-sizing: border-box; 
            font-family: 'Inter', sans-serif;
            -webkit-tap-highlight-color: transparent;
            outline: none !important;
        }

        body, html {
            height: 100%; width: 100%;
            background: #000;
            display: flex; justify-content: center; align-items: center;
            overflow: hidden;
        }

        /* --- ভিডিও ব্যাকগ্রাউন্ড লেয়ার --- */
        .video-background {
            position: fixed; top: 0; left: 0;
            width: 100%; height: 100%;
            z-index: 1; overflow: hidden;
        }

        .video-background video {
            width: 100%; height: 100%;
            object-fit: cover; /* পুরো স্ক্রিন কভার করবে */
            filter: brightness(0.5); /* ভিডিওটি একটু ডার্ক রাখা হয়েছে যেন টেক্সট বোঝা যায় */
        }

        /* ভিডিওর ওপর হালকা গ্রিড ইফেক্ট (ঐচ্ছিক) */
        .video-overlay {
            position: absolute; top: 0; left: 0;
            width: 100%; height: 100%;
            background: radial-gradient(circle, transparent 20%, #000 100%);
            z-index: 2;
        }

        /* --- অথেনটিকেশন কার্ড --- */
        .auth-card {
            position: relative; z-index: 10;
            width: 90%; max-width: 420px;
            background: var(--glass);
            padding: 40px 30px;
            border-radius: 35px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(20px); /* গ্লাস ইফেক্ট */
            box-shadow: 0 25px 50px rgba(0,0,0,0.5);
            text-align: center;
        }

        .logo-box {
            width: 85px; height: 85px; margin: 0 auto 20px;
            background: #fff; border-radius: 50%; padding: 4px;
            border: 2.5px solid var(--primary); overflow: hidden;
        }
        .logo-box img { width: 100%; height: 100%; object-fit: cover; border-radius: 50%; }

        .brand-title { font-size: 28px; font-weight: 900; color: #fff; margin-bottom: 5px; }
        .brand-title span { color: var(--primary); }
        .sub-title { color: var(--text-dim); font-size: 14px; margin-bottom: 30px; }

        .form-group { text-align: left; margin-bottom: 22px; }
        label { display: block; font-size: 11px; color: var(--text-dim); margin-bottom: 8px; font-weight: 800; text-transform: uppercase; }

        input {
            width: 100%; padding: 18px;
            background: var(--input); border: 1px solid transparent;
            border-radius: 16px; color: #fff; font-size: 16px; transition: 0.3s;
        }
        input:focus { border-color: var(--primary); background: rgba(0, 0, 0, 0.5); }

        .pass-container { position: relative; }
        .eye-btn { position: absolute; right: 18px; top: 50%; transform: translateY(-50%); color: var(--text-dim); cursor: pointer; padding: 5px; }

        #actionBtn {
            width: 100%; padding: 18px;
            background: var(--primary); color: #000;
            border: none; border-radius: 16px;
            font-size: 18px; font-weight: 900;
            cursor: pointer; margin-top: 10px; transition: 0.3s;
        }
        #actionBtn:disabled { background: #333; color: #666; cursor: not-allowed; }

        /* লিঙ্ক গ্লিচ ফিক্স */
        .footer-links { margin-top: 25px; padding-top: 20px; border-top: 1px solid rgba(255,255,255,0.1); }
        .switch-btn { color: var(--primary); cursor: pointer; font-weight: 800; font-size: 15px; background: none !important; }
        .forgot-btn { color: var(--text-dim); cursor: pointer; font-size: 13px; display: block; margin-top: 15px; background: none !important; }

        /* টোস্ট */
        #toast {
            position: fixed; top: -100px; left: 50%; transform: translateX(-50%);
            background: #111; color: #fff; padding: 16px 25px; border-radius: 15px;
            z-index: 1000; border: 1px solid var(--primary); transition: 0.5s;
            display: flex; align-items: center; gap: 12px; box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }
        #toast.active { top: 30px; }
    </style>
</head>
<body>

<div class="video-background">
    <video autoplay muted loop playsinline poster="assets/bg-fallback.jpg">
        <source src="assets/bg_video.mp4" type="video/mp4">
        </video>
    <div class="video-overlay"></div>
</div>

<div id="toast">
    <i class="fa-solid fa-circle-check" style="color: var(--primary);"></i>
    <span id="tMsg">Welcome back</span>
</div>

<div class="auth-card">
    <div class="logo-box">
        <img src="assets/logos/smat.png" alt="SMAT">
    </div>
    <h1 class="brand-title">SMAT <span>EXCHANGE</span></h1>
    <p class="sub-title" id="tagline">The most secure way to trade crypto</p>

    <div class="form-group">
        <label>Email Address</label>
        <input type="email" id="email" placeholder="example@gmail.com">
    </div>

    <div class="form-group">
        <label>Password <span id="passValidator" style="float: right; text-transform: none;"></span></label>
        <div class="pass-container">
            <input type="password" id="password" placeholder="••••••••" oninput="validatePassword()">
            <i class="fa-solid fa-eye eye-btn" onclick="togglePassword()"></i>
        </div>
    </div>

    <button id="actionBtn" onclick="handleAuth()">LOGIN</button>

    <div class="footer-links">
        <span class="switch-btn" id="modeBtn" onclick="toggleUI()">Create new account</span>
        <span class="forgot-btn" onclick="sendReset()">Lost your password?</span>
    </div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getAuth, createUserWithEmailAndPassword, signInWithEmailAndPassword, sendEmailVerification, sendPasswordResetEmail } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
    import { getDatabase, ref, set, get, runTransaction } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

    const firebaseConfig = {
        apiKey: "AIzaSyAMxtJedkehhxJRMPZLjhpKHqneHEWsGlE",
        authDomain: "smat-exchange.firebaseapp.com",
        projectId: "smat-exchange",
        storageBucket: "smat-exchange.firebasestorage.app",
        messagingSenderId: "836334569396",
        appId: "1:836334569396:web:679effe640b3453412d4e1"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getDatabase(app);

    let isLoginMode = true;
    const urlParams = new URLSearchParams(window.location.search);
    const referralID = urlParams.get('ref') || null;

    window.notify = (msg, err = false) => {
        const t = document.getElementById('toast');
        document.getElementById('tMsg').innerText = msg;
        t.style.borderColor = err ? "#ff4d4d" : "#00ff88";
        t.classList.add('active');
        setTimeout(() => t.classList.remove('active'), 3000);
    };

    window.togglePassword = () => {
        const p = document.getElementById('password');
        p.type = p.type === 'password' ? 'text' : 'password';
    };

    window.validatePassword = () => {
        const val = document.getElementById('password').value;
        const status = document.getElementById('passValidator');
        const btn = document.getElementById('actionBtn');
        const regex = /^(?=.*[A-Za-z])(?=.*\d)[A-Za-z\d]{8,}$/;

        if(val === "") { status.innerText = ""; return; }
        if(regex.test(val)) {
            status.innerHTML = '<i class="fa-solid fa-circle-check"></i> Strong';
            status.style.color = "#00ff88";
            btn.disabled = false;
        } else {
            status.innerText = "Letter + Num (Min 8)";
            status.style.color = "#ff4d4d";
            if(!isLoginMode) btn.disabled = true;
        }
    };

    window.toggleUI = () => {
        isLoginMode = !isLoginMode;
        document.getElementById('tagline').innerText = isLoginMode ? "The most secure way to trade crypto" : "Start your blockchain journey with SMAT";
        document.getElementById('actionBtn').innerText = isLoginMode ? "LOGIN" : "REGISTER";
        document.getElementById('modeBtn').innerText = isLoginMode ? "Create new account" : "Already have an account? Sign In";
        document.getElementById('passValidator').innerText = "";
    };

    const generateSmatID = async () => {
        const counterRef = ref(db, 'counters/lastSmatId');
        const result = await runTransaction(counterRef, (v) => (v || 100000) + 1);
        return "SMAT" + result.snapshot.val();
    };

    window.handleAuth = async () => {
        const email = document.getElementById('email').value;
        const pass = document.getElementById('password').value;
        if(!email || !pass) return notify("All fields required!", true);

        notify("Authenticating...");
        try {
            if (isLoginMode) {
                const res = await signInWithEmailAndPassword(auth, email, pass);
                if (res.user.emailVerified) {
                    const snap = await get(ref(db, 'users/' + res.user.uid));
                    if(snap.exists()) localStorage.setItem('smatID', snap.val().smatID);
                    localStorage.setItem('isLoggedIn', 'true');
                    window.location.href = "home.html"; 
                } else notify("Verify email before logging in!", true);
            } else {
                const res = await createUserWithEmailAndPassword(auth, email, pass);
                const sID = await generateSmatID();
                await set(ref(db, 'users/' + res.user.uid), {
                    email, smatID: sID, kycStatus: 'unverified', referredBy: referralID, createdAt: new Date().toISOString()
                });
                await sendEmailVerification(res.user);
                notify("Verification link sent to your email!");
            }
        } catch (e) { notify(e.message, true); }
    };

    window.sendReset = async () => {
        const email = document.getElementById('email').value;
        if(!email) return notify("Please enter your email first!", true);
        try {
            await sendPasswordResetEmail(auth, email);
            notify("Password reset email sent!");
        } catch (e) { notify(e.message, true); }
    };
</script>
</body>
</html>
