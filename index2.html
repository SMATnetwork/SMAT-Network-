<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SMAT EXCHANGE | Pure Code Graphics</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --primary: #00ff88;
            --bg: #000000;
            --card: rgba(15, 18, 22, 0.96);
            --text-muted: #848e9c;
        }

        /* ক্লিক গ্লিচ বন্ধ এবং ইন্টারফেস রিসেট */
        * { 
            margin: 0; padding: 0; box-sizing: border-box; 
            font-family: 'Inter', sans-serif;
            -webkit-tap-highlight-color: transparent;
            outline: none !important;
        }

        body {
            background-color: var(--bg);
            height: 100vh; display: flex;
            justify-content: center; align-items: center;
            overflow: hidden; position: relative;
        }

        /* --- Pure Code Digital Graphics --- */
        #graphicsCanvas {
            position: absolute; top: 0; left: 0;
            width: 100%; height: 100%;
            z-index: 1;
        }

        /* ওল্ড স্কুল ডিজিটাল ফিল্টার */
        .scanlines {
            position: absolute; width: 100%; height: 100%;
            background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.25) 50%), 
                        linear-gradient(90deg, rgba(255, 0, 0, 0.06), rgba(0, 255, 0, 0.02), rgba(0, 0, 255, 0.06));
            background-size: 100% 4px, 3px 100%;
            z-index: 2; pointer-events: none;
        }

        /* --- Auth Card --- */
        .auth-container {
            position: relative; z-index: 10;
            width: 90%; max-width: 420px;
            background: var(--card);
            padding: 45px 30px;
            border-radius: 32px;
            border: 1px solid rgba(0, 255, 136, 0.2);
            box-shadow: 0 0 40px rgba(0, 0, 0, 0.8);
            text-align: center;
            backdrop-filter: blur(10px);
        }

        .logo-circle {
            width: 80px; height: 80px; margin: 0 auto 20px;
            background: #fff; border-radius: 50%; padding: 3px;
            border: 2px solid var(--primary); overflow: hidden;
        }
        .logo-circle img { width: 100%; height: 100%; object-fit: cover; border-radius: 50%; }

        .brand-name { font-size: 28px; font-weight: 900; color: #fff; margin-bottom: 8px; }
        .brand-name span { color: var(--primary); }
        .sub-desc { color: var(--text-muted); font-size: 14px; margin-bottom: 35px; }

        .form-group { text-align: left; margin-bottom: 25px; }
        label { display: block; font-size: 11px; color: var(--text-muted); margin-bottom: 8px; font-weight: 800; text-transform: uppercase; letter-spacing: 1px; }

        input {
            width: 100%; padding: 18px;
            background: #1e2329; border: 1px solid transparent;
            border-radius: 14px; color: #fff; font-size: 16px;
        }
        input:focus { border-color: var(--primary); background: #000; }

        .pass-box { position: relative; }
        .eye-icon { position: absolute; right: 18px; top: 50%; transform: translateY(-50%); color: var(--text-muted); cursor: pointer; padding: 5px; }

        #actionBtn {
            width: 100%; padding: 18px;
            background: var(--primary); color: #000;
            border: none; border-radius: 14px;
            font-size: 18px; font-weight: 900;
            cursor: pointer; margin-top: 10px; transition: 0.3s;
        }
        #actionBtn:disabled { background: #2b3139; color: #5e6673; cursor: not-allowed; }

        /* লিঙ্ক গ্লিচ বন্ধ করার মাস্টার ফিক্স */
        .auth-footer { margin-top: 25px; padding-top: 20px; border-top: 1px solid rgba(255, 255, 255, 0.05); }
        .link-primary { color: var(--primary); cursor: pointer; font-weight: 800; font-size: 14px; background: none !important; }
        .link-secondary { color: var(--text-muted); cursor: pointer; font-size: 13px; display: block; margin-top: 15px; background: none !important; }

        /* টোস্ট */
        #customToast {
            position: fixed; top: -100px; left: 50%; transform: translateX(-50%);
            background: #1e2329; color: #fff; padding: 16px 25px; border-radius: 12px;
            z-index: 1000; border-left: 5px solid var(--primary); transition: 0.5s;
            display: flex; align-items: center; gap: 12px; box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }
        #customToast.active { top: 30px; }
    </style>
</head>
<body>

<div class="scanlines"></div>
<canvas id="graphicsCanvas"></canvas>

<div id="customToast">
    <i class="fa-solid fa-shield-halved" style="color: var(--primary);"></i>
    <span id="toastMsg">Securing connection...</span>
</div>

<div class="auth-container">
    <div class="logo-circle">
        <img src="assets/logos/smat.png" alt="SMAT">
    </div>
    <h1 class="brand-name">SMAT <span>EXCHANGE</span></h1>
    <p class="sub-desc" id="uiLabel">Welcome to SMAT Family </p>

    <div class="form-group">
        <label>Account Email</label>
        <input type="email" id="email" placeholder="welcome@smat.com">
    </div>

    <div class="form-group">
        <label>Security Key <span id="passState" style="float: right; text-transform: none;"></span></label>
        <div class="pass-box">
            <input type="password" id="password" placeholder="••••••••" oninput="liveCheck()">
            <i class="fa-solid fa-eye eye-icon" onclick="togglePass()"></i>
        </div>
    </div>

    <button id="actionBtn" onclick="executeAuth()">LOGIN</button>

    <div class="auth-footer">
        <span class="link-primary" id="uiSwitch" onclick="switchUI()">Register new account</span>
        <span class="link-secondary" onclick="forgotPass()">Recover password?</span>
    </div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getAuth, createUserWithEmailAndPassword, signInWithEmailAndPassword, sendEmailVerification, sendPasswordResetEmail } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
    import { getDatabase, ref, set, get, runTransaction } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

    const firebaseConfig = {
        apiKey: "AIzaSyAMxtJedkehhxJRMPZLjhpKHqneHEWsGlE",
        authDomain: "smat-exchange.firebaseapp.com",
        projectId: "smat-exchange",
        storageBucket: "smat-exchange.firebasestorage.app",
        messagingSenderId: "836334569396",
        appId: "1:836334569396:web:679effe640b3453412d4e1"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getDatabase(app);

    // --- ১. Pure Code Graphics (Moving Matrix Grid) ---
    const canvas = document.getElementById('graphicsCanvas');
    const ctx = canvas.getContext('2d');
    let w, h;

    function resize() {
        w = canvas.width = window.innerWidth;
        h = canvas.height = window.innerHeight;
    }
    window.addEventListener('resize', resize);
    resize();

    const dots = [];
    for(let i=0; i<60; i++) {
        dots.push({
            x: Math.random() * w,
            y: Math.random() * h,
            vx: (Math.random() - 0.5) * 0.5,
            vy: (Math.random() - 0.5) * 0.5
        });
    }

    function draw() {
        ctx.fillStyle = "rgba(0, 0, 0, 0.1)";
        ctx.fillRect(0, 0, w, h);
        ctx.strokeStyle = "rgba(0, 255, 136, 0.15)";
        ctx.lineWidth = 0.5;

        dots.forEach(d => {
            d.x += d.vx;
            d.y += d.vy;
            if(d.x < 0 || d.x > w) d.vx *= -1;
            if(d.y < 0 || d.y > h) d.vy *= -1;

            ctx.beginPath();
            ctx.arc(d.x, d.y, 1, 0, Math.PI * 2);
            ctx.fillStyle = "rgba(0, 255, 136, 0.5)";
            ctx.fill();

            dots.forEach(d2 => {
                let dist = Math.hypot(d.x - d2.x, d.y - d2.y);
                if(dist < 150) {
                    ctx.beginPath();
                    ctx.moveTo(d.x, d.y);
                    ctx.lineTo(d2.x, d2.y);
                    ctx.stroke();
                }
            });
        });
        requestAnimationFrame(draw);
    }
    draw();

    // --- ২. আপনার অরিজিনাল লজিক (SMAT ID, Referral, Firebase) ---
    let loginMode = true;
    const urlParams = new URLSearchParams(window.location.search);
    const referralID = urlParams.get('ref') || null;

    window.popToast = (msg, err = false) => {
        const t = document.getElementById('customToast');
        document.getElementById('toastMsg').innerText = msg;
        t.style.borderLeftColor = err ? "#ff4d4d" : "#00ff88";
        t.classList.add('active');
        setTimeout(() => t.classList.remove('active'), 3000);
    };

    window.togglePass = () => {
        const p = document.getElementById('password');
        p.type = p.type === 'password' ? 'text' : 'password';
    };

    window.liveCheck = () => {
        const val = document.getElementById('password').value;
        const state = document.getElementById('passState');
        const btn = document.getElementById('actionBtn');
        const regex = /^(?=.*[A-Za-z])(?=.*\d)[A-Za-z\d]{8,}$/;

        if(val === "") { state.innerText = ""; return; }
        if(regex.test(val)) {
            state.innerHTML = '<i class="fa-solid fa-circle-check"></i> Strong';
            state.style.color = "#00ff88";
            btn.disabled = false;
        } else {
            state.innerText = "Min 8 Chars (Letter + Number)";
            state.style.color = "#ff4d4d";
            if(!loginMode) btn.disabled = true;
        }
    };

    window.switchUI = () => {
        loginMode = !loginMode;
        document.getElementById('uiLabel').innerText = loginMode ? "Wait For Processing....";
        document.getElementById('actionBtn').innerText = loginMode ? "LOGIN" : "REGISTER";
        document.getElementById('uiSwitch').innerText = loginMode ? "Register new account" : "Sign in instead";
        document.getElementById('passState').innerText = "";
    };

    const getSmatID = async () => {
        const counterRef = ref(db, 'counters/lastSmatId');
        const result = await runTransaction(counterRef, (v) => (v || 100000) + 1);
        return "SMAT" + result.snapshot.val();
    };

    window.executeAuth = async () => {
        const email = document.getElementById('email').value;
        const pass = document.getElementById('password').value;
        if(!email || !pass) return popToast("Details missing!", true);

        popToast("Connecting to SMAT Node...");
        try {
            if (loginMode) {
                const res = await signInWithEmailAndPassword(auth, email, pass);
                if (res.user.emailVerified) {
                    const snap = await get(ref(db, 'users/' + res.user.uid));
                    if(snap.exists()) localStorage.setItem('smatID', snap.val().smatID);
                    localStorage.setItem('isLoggedIn', 'true');
                    window.location.href = "home.html"; 
                } else popToast("Please verify your email address!", true);
            } else {
                const res = await createUserWithEmailAndPassword(auth, email, pass);
                const sID = await getSmatID();
                await set(ref(db, 'users/' + res.user.uid), {
                    email, smatID: sID, kycStatus: 'unverified', referredBy: referralID, createdAt: new Date().toISOString()
                });
                await sendEmailVerification(res.user);
                popToast("Verification link Send to Your Mail!");
            }
        } catch (e) { popToast(e.message, true); }
    };

    window.forgotPass = async () => {
        const email = document.getElementById('email').value;
        if(!email) return popToast("Enter email first!", true);
        try {
            await sendPasswordResetEmail(auth, email);
            popToast("Recovery instructions sent!");
        } catch (e) { popToast(e.message, true); }
    };
</script>
</body>
</html>
