<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SMAT CEX | Final Engine</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root { --bg: #0b0e11; --card: #181a20; --border: #2b3139; --up: #0ecb81; --down: #f6465d; --warn: #f0b90b; --primary: #f0b90b; --cyan: #00ffff; }
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Inter', sans-serif; }
        body { background: var(--bg); color: white; height: 100vh; display: flex; flex-direction: column; overflow: hidden; }
        .header { display: grid; grid-template-columns: 1fr 1.2fr 1fr; align-items: center; padding: 10px 15px; background: #12161c; border-bottom: 1px solid var(--border); }
        .bal-box { background: rgba(240, 185, 11, 0.1); border: 1px solid rgba(240, 185, 11, 0.2); padding: 5px 8px; text-align: center; border-radius: 4px; }
        .bal-amount { font-weight: 800; font-size: 14px; color: var(--primary); }
        .chart-section { width: 100%; position: relative; background: #000; border-bottom: 1px solid var(--border); height: 32vh; }
        .chart-overlay { position: absolute; top: 0; left: 0; width: 100%; z-index: 10; display: flex; justify-content: space-between; padding: 12px; pointer-events: none; }
        .timer-clock { font-size: 26px; font-weight: 900; }
        .history-section { flex: 1; background: var(--card); display: flex; flex-direction: column; overflow: hidden; padding-bottom: 85px; }
        .history-header { text-align: center; padding: 10px; font-size: 15px; font-weight: 900; border-bottom: 1px solid var(--border); background: #12161c; }
        .table-container { flex: 1; overflow-y: auto; }
        table { width: 100%; border-collapse: collapse; font-size: 11px; text-align: center; }
        th { background: #12161c; padding: 12px; color: #848e9c; }
        td { padding: 12px 5px; border-bottom: 1px solid #23272e; font-weight: 600; }
        .action-area { position: fixed; bottom: 0; width: 100%; padding: 15px; background: #12161c; border-top: 1px solid var(--border); }
        .btn-flex { display: flex; gap: 12px; max-width: 600px; margin: 0 auto; }
        .t-btn { flex: 1; padding: 16px; border: none; border-radius: 10px; font-weight: 900; font-size: 16px; color: white; cursor: pointer; text-transform: uppercase; }
    </style>
</head>
<body>

    <header class="header">
        <div style="display:flex; align-items:center; gap:8px; background:#1e2329; padding:5px; border-radius:8px;">
            <img src="assets/logos/btc.png" style="width:20px; height:20px;">
            <span style="font-weight:700;">Bitcoin</span>
        </div>
        <div class="bal-box">
            <span id="headerBalance" class="bal-amount">0.00000000</span>
            <span style="font-size:11px; color:white;">BTC</span>
        </div>
        <div id="priceDisplay" style="justify-self: end; color: var(--up); font-weight: 900; font-size: 18px;">$0.00</div>
    </header>

    <div class="chart-section">
        <div class="chart-overlay">
            <div><div id="statusLabel" style="font-weight:800; font-size:12px; color:var(--up);">TRADING TIME</div></div>
            <div id="timerClock" class="timer-clock">00:00</div>
        </div>
        <canvas id="liveChart"></canvas>
    </div>

    <div class="history-section">
        <h1 class="history-header">HISTORY</h1>
        <div class="table-container">
            <table>
                <thead><tr><th>Round</th><th>Time</th><th>Locked</th><th>Action</th><th>Result</th><th>Win/Loss</th></tr></thead>
                <tbody id="historyBody"></tbody>
            </table>
        </div>
    </div>

    <div class="action-area">
        <div class="btn-flex">
            <button id="upBtn" class="t-btn" style="background: var(--up);">UP</button>
            <button id="downBtn" class="t-btn" style="background: var(--down);">DOWN</button>
        </div>
    </div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getDatabase, ref, onValue, update } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";
    import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

    const firebaseConfig = {
        apiKey: "AIzaSyAMxtJedkehhxJRMPZLjhpKHqneHEWsGlE",
        authDomain: "smat-exchange.firebaseapp.com",
        databaseURL: "https://smat-exchange-default-rtdb.firebaseio.com",
        projectId: "smat-exchange",
        storageBucket: "smat-exchange.appspot.com",
        messagingSenderId: "836334569396",
        appId: "1:836334569396:web:679effe640b3453412d4e1"
    };

    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app);
    const auth = getAuth(app);

    // ১. ছবির হুবহু বানান অনুযায়ী ভেরিয়েবল
    let timeLeft = 0; 
    let State = "TRADING"; 

    // ২. ফায়ারবেস থেকে ডাটা পড়া
    function syncEngine() {
        onValue(ref(db, 'global_market'), (snapshot) => {
            const data = snapshot.val();
            if (data) {
                // সরাসরি আপনার ছবির বানান ব্যবহার (timeLeft এবং State)
                timeLeft = data.timeLeft || 0; 
                State = data.State || "TRADING"; 
                
                // টাইমার UI আপডেট
                const m = Math.floor(timeLeft / 60);
                const s = timeLeft % 60;
                document.getElementById('timerClock').innerText = `${m.toString().padStart(2,'0')}:${s.toString().padStart(2,'0')}`;
                
                // স্ট্যাটাস UI আপডেট
                const lbl = document.getElementById('statusLabel');
                lbl.innerText = State === "TRADING" ? "TRADING TIME" : (State === "CLOSED" ? "TRADING CLOSED" : "WAITING RESULT");
                lbl.style.color = State === "TRADING" ? "var(--up)" : (State === "CLOSED" ? "var(--down)" : "var(--warn)");
            }
        });
    }

    // ৩. মাস্টার ক্লক লজিক (ডাটাবেস আপডেট করার জন্য)
    function startMasterClock() {
        setInterval(() => {
            if (timeLeft > 0) {
                timeLeft--;
            } else {
                if (State === "TRADING") { State = "CLOSED"; timeLeft = 3; }
                else if (State === "CLOSED") { State = "WAITING"; timeLeft = 180; }
                else { State = "TRADING"; timeLeft = 60; }
            }
            // ডাটাবেসে আপনার বানান অনুযায়ীই আপডেট হবে
            update(ref(db, 'global_market'), { timeLeft: timeLeft, State: State });
        }, 1000);
    }

    onAuthStateChanged(auth, (user) => {
        if (user) {
            syncEngine();
            startMasterClock();
        }
    });

    const ws = new WebSocket(`wss://stream.binance.com:9443/ws/btcusdt@aggTrade`);
    ws.onmessage = (e) => {
        const d = JSON.parse(e.data);
        document.getElementById('priceDisplay').innerText = '$' + parseFloat(d.p).toFixed(2);
    };
</script>
</body>
</html>
