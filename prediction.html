<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SMAT CEX | Final Fix</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root { --bg: #0b0e11; --card: #181a20; --border: #2b3139; --up: #0ecb81; --down: #f6465d; --warn: #f0b90b; --primary: #f0b90b; --cyan: #00ffff; }
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Inter', sans-serif; }
        body { background: var(--bg); color: white; height: 100vh; display: flex; flex-direction: column; overflow: hidden; }
        .header { display: grid; grid-template-columns: 1fr 1.2fr 1fr; align-items: center; padding: 10px 15px; background: #12161c; border-bottom: 1px solid var(--border); }
        .asset-selector { display: flex; align-items: center; gap: 8px; background: #1e2329; padding: 5px 8px; border-radius: 8px; border: 1px solid var(--border); }
        .asset-selector img { width: 20px; height: 20px; border-radius: 50%; }
        .asset-selector select { background: transparent; color: white; border: none; font-weight: 700; outline: none; cursor: pointer; }
        .bal-box { background: rgba(240, 185, 11, 0.1); border: 1px solid rgba(240, 185, 11, 0.2); padding: 5px 5px; text-align: center; }
        .bal-amount { font-weight: 800; font-size: 14px; color: var(--primary); }
        .chart-section { width: 100%; position: relative; background: #000; border-bottom: 1px solid var(--border); height: 32vh; }
        .chart-overlay { position: absolute; top: 0; left: 0; width: 100%; z-index: 10; display: flex; justify-content: space-between; padding: 12px; pointer-events: none; }
        .timer-clock { font-size: 26px; font-weight: 900; }
        #chartDot { position: absolute; left: 50%; width: 12px; height: 12px; background: var(--cyan); border-radius: 50%; z-index: 5; transform: translateX(-50%); box-shadow: 0 0 15px var(--cyan); }
        .history-section { flex: 1; background: var(--card); display: flex; flex-direction: column; overflow: hidden; padding-bottom: 85px; }
        .history-header { text-align: center; padding: 10px; font-size: 15px; font-weight: 900; border-bottom: 1px solid var(--border); background: #12161c; }
        .table-container { flex: 1; overflow-y: auto; overflow-x: auto; }
        table { width: 100%; border-collapse: collapse; font-size: 11px; text-align: center; min-width: 450px; }
        th { background: #12161c; padding: 12px; color: #848e9c; position: sticky; top: 0; }
        td { padding: 12px 5px; border-bottom: 1px solid #23272e; font-weight: 600; }
        .action-area { position: fixed; bottom: 0; width: 100%; padding: 15px; background: #12161c; border-top: 1px solid var(--border); z-index: 2000; }
        .btn-flex { display: flex; gap: 12px; max-width: 600px; margin: 0 auto; }
        .t-btn { flex: 1; padding: 16px; border: none; border-radius: 10px; font-weight: 900; font-size: 16px; color: white; cursor: pointer; text-transform: uppercase; }
        .t-btn:disabled { background: #2b3139 !important; opacity: 0.5; }
        .modal-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.85); display: none; justify-content: center; align-items: center; z-index: 3000; }
        .modal-box { background: var(--card); padding: 25px; border-radius: 15px; width: 90%; max-width: 360px; text-align: center; border: 1px solid var(--border); }
        .modal-box input { width: 100%; padding: 12px; background: #0b0e11; border: 1px solid var(--border); color: white; border-radius: 8px; margin: 15px 0; font-size: 20px; text-align: center; outline: none; }
        .spinner-sm { width: 12px; height: 12px; border: 2px solid rgba(255,255,255,0.2); border-top: 2px solid white; border-radius: 50%; animation: spin 0.8s linear infinite; display: inline-block; vertical-align: middle; }
        @keyframes spin { 100% { transform: rotate(360deg); } }
    </style>
</head>
<body>

    <header class="header">
        <div class="asset-selector">
            <img id="assetLogo" src="assets/logos/btc.png">
            <select id="assetSelect" onchange="window.switchAsset(this.value)">
                <option value="btc">Bitcoin</option>
                <option value="eth">Ethereum</option>
                <option value="bnb">Binance</option>
                <option value="sol">Solana</option>
            </select>
        </div>
        <div class="dynamic-balance">
            <div class="bal-box">
                <span id="headerBalance" class="bal-amount">0.00000000</span>
                <span id="headerAssetUnit" style="font-size:11px; color:white;">BTC</span>
            </div>
        </div>
        <div id="priceDisplay" style="justify-self: end; color: var(--up); font-weight: 900; font-size: 18px;">$0.00</div>
    </header>

    <div class="chart-section">
        <div class="chart-overlay">
            <div>
                <div id="statusLabel" style="font-weight:800; font-size:12px;">TRADING TIME</div>
                <div id="lockedPriceDisplay" style="font-size:15px; font-weight:900; color:white; margin-top:4px; background:rgba(0,0,0,0.5); padding:2px 6px; border-radius:4px; display:none;"></div>
            </div>
            <div id="timerClock" class="timer-clock">00:00</div>
        </div>
        <div id="chartDot"></div>
        <canvas id="liveChart"></canvas>
    </div>

    <div class="history-section">
        <h1 class="history-header">HISTORY</h1>
        <div class="table-container">
            <table>
                <thead>
                    <tr><th>Round</th><th>Time</th><th>Locked</th><th>Action</th><th>Result</th><th>Win/Loss</th></tr>
                </thead>
                <tbody id="historyBody"></tbody>
            </table>
        </div>
    </div>

    <div class="action-area">
        <div class="btn-flex">
            <button id="upBtn" class="t-btn" style="background: var(--up);" onclick="window.openBetModal('UP')">UP</button>
            <button id="downBtn" class="t-btn" style="background: var(--down);" onclick="window.openBetModal('DOWN')">DOWN</button>
        </div>
    </div>

    <div id="betModal" class="modal-overlay">
        <div class="modal-box">
            <h3 id="modalTitle" style="color:var(--primary)">Bet UP</h3>
            <p style="font-size: 12px; color: #848e9c; margin-top: 10px;">Available: <span id="modalAvbl">0.00</span></p>
            <input type="number" id="betAmount" placeholder="0.00">
            <div style="display: flex; gap: 10px;">
                <button class="t-btn" style="background:#2b3139; font-size:14px;" onclick="window.closeBetModal()">Cancel</button>
                <button class="t-btn" style="background:var(--primary); color:black; font-size:14px;" onclick="window.confirmBet()">Confirm</button>
            </div>
        </div>
    </div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getDatabase, ref, onValue, set, update, get } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";
    import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

    const firebaseConfig = {
        apiKey: "AIzaSyAMxtJedkehhxJRMPZLjhpKHqneHEWsGlE",
        authDomain: "smat-exchange.firebaseapp.com",
        databaseURL: "https://smat-exchange-default-rtdb.firebaseio.com",
        projectId: "smat-exchange",
        storageBucket: "smat-exchange.appspot.com",
        messagingSenderId: "836334569396",
        appId: "1:836334569396:web:679effe640b3453412d4e1"
    };

    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app);
    const auth = getAuth(app);

    const assets = {
        btc: { symbol: 'btcusdt', round: 10001, logo: "assets/logos/btc.png", unit: "BTC", currentPrice: 0, pending: null },
        eth: { symbol: 'ethusdt', round: 20001, logo: "assets/logos/eth.png", unit: "ETH", currentPrice: 0, pending: null },
        bnb: { symbol: 'bnbusdt', round: 30001, logo: "assets/logos/bnb.png", unit: "BNB", currentPrice: 0, pending: null },
        sol: { symbol: 'solusdt', round: 40001, logo: "assets/logos/sol.png", unit: "SOL", currentPrice: 0, pending: null }
    };

    window.activeKey = 'btc';
    window.user = null;
    window.currentGlobalState = "TRADING";
    window.currentGlobaltimeLeft = 0;

    const ctx = document.getElementById('liveChart').getContext('2d');
    const chart = new Chart(ctx, {
        type: 'line',
        data: { labels: Array(60).fill(''), datasets: [{ data: Array(60).fill(0), borderColor: '#00ffff', borderWidth: 2, pointRadius: 0, tension: 0.4, fill: true, backgroundColor: 'rgba(0, 255, 255, 0.1)' }] },
        options: { responsive: true, maintainAspectRatio: false, animation: false, scales: { x: { display: false }, y: { display: false } }, plugins: { legend: { display: false } } }
    });

    // আপনার স্ক্রিনশট অনুযায়ী বানান: State (S বড়), timeLeft (L বড়)
    function syncGlobalTimer() {
        onValue(ref(db, 'global_market'), (snapshot) => {
            const data = snapshot.val();
            if (data) {
                window.currentGlobaltimeLeft = data.timeLeft || 0;
                window.currentGlobalState = data.State || "TRADING";
                updateUI();
            }
        });
    }

    function updateUI() {
        const clk = document.getElementById('timerClock');
        const lbl = document.getElementById('statusLabel');
        const upBtn = document.getElementById('upBtn');
        const downBtn = document.getElementById('downBtn');
        const lpd = document.getElementById('lockedPriceDisplay');

        let m = Math.floor(window.currentGlobaltimeLeft / 60);
        let s = window.currentGlobaltimeLeft % 60;
        clk.innerText = `${m.toString().padStart(2,'0')}:${s.toString().padStart(2,'0')}`;

        if (window.currentGlobalState === "TRADING") {
            lbl.innerText = "TRADING TIME"; lbl.style.color = "var(--up)";
            upBtn.disabled = false; downBtn.disabled = false;
            lpd.style.display = "none";
        } else if (window.currentGlobalState === "CLOSED") {
            lbl.innerText = "TRADING CLOSED"; lbl.style.color = "var(--down)";
            upBtn.disabled = true; downBtn.disabled = true;
            lpd.style.display = "block";
            lpd.innerText = "Locked: $" + assets[window.activeKey].currentPrice.toFixed(2);
        } else if (window.currentGlobalState === "WAITING") {
            lbl.innerText = "WAITING RESULT"; lbl.style.color = "var(--warn)";
            upBtn.disabled = true; downBtn.disabled = true;
        }
    }

    // মাস্টার ক্লক: বানান একদম ছবির মতো নিখুঁত
    function startMasterClock() {
        setInterval(async () => {
            if (window.currentGlobaltimeLeft > 0) {
                window.currentGlobaltimeLeft--;
            } else {
                if (window.currentGlobalState === "TRADING") { 
                    window.currentGlobalState = "CLOSED"; window.currentGlobaltimeLeft = 3; 
                    Object.keys(assets).forEach(k => saveRound(k));
                } else if (window.currentGlobalState === "CLOSED") { 
                    window.currentGlobalState = "WAITING"; window.currentGlobaltimeLeft = 180; 
                } else { 
                    window.currentGlobalState = "TRADING"; window.currentGlobaltimeLeft = 60; 
                    Object.keys(assets).forEach(k => finalizeRound(k));
                }
            }
            // ডাটাবেস আপডেট: ছবির বানান মিলিয়ে State এবং timeLeft
            update(ref(db, 'global_market'), { 
                timeLeft: window.currentGlobaltimeLeft, 
                State: window.currentGlobalState 
            });
        }, 1000);
    }

    async function saveRound(key) {
        if(!window.user) return;
        const rid = assets[key].round;
        const pb = assets[key].pending;
        const data = {
            rid: rid,
            time: new Date().toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'}),
            locked: assets[key].currentPrice,
            action: pb ? pb.side : "---",
            betAmt: pb ? pb.amount : 0,
            isPending: true, resPrice: 0, win: ""
        };
        await set(ref(db, `history/${window.user.uid}/${key}/${rid}`), data);
    }

    async function finalizeRound(key) {
        if(!window.user) return;
        const snap = await get(ref(db, `history/${window.user.uid}/${key}`));
        const history = snap.val() || {};
        for (let rid in history) {
            if (history[rid].isPending) {
                const rec = history[rid];
                const resPrice = assets[key].currentPrice;
                const win = (rec.action === "UP" && resPrice > rec.locked) || (rec.action === "DOWN" && resPrice < rec.locked);
                let winText = "Loss";
                if (rec.action !== "---" && win) {
                    const winAmt = rec.betAmt * 1.96;
                    winText = "+" + winAmt.toFixed(8);
                    const bSnap = await get(ref(db, `users/${window.user.uid}/balances/${key}`));
                    const curBal = parseFloat(bSnap.val() || 0);
                    await update(ref(db, `users/${window.user.uid}/balances`), { [key]: (curBal + winAmt).toFixed(8) });
                } else if (rec.action === "---") winText = "No Trade";
                await update(ref(db, `history/${window.user.uid}/${key}/${rid}`), { isPending: false, resPrice: resPrice, win: winText });
            }
        }
        assets[key].pending = null;
        assets[key].round++;
    }

    function loadUserData() {
        if (!window.user) return;
        onValue(ref(db, `users/${window.user.uid}/balances/${window.activeKey}`), (s) => {
            document.getElementById('headerBalance').innerText = parseFloat(s.val() || 0).toFixed(8);
        });
        onValue(ref(db, `history/${window.user.uid}/${window.activeKey}`), (s) => {
            renderHistory(s.val() || {});
        });
    }

    window.switchAsset = (val) => {
        window.activeKey = val;
        document.getElementById('assetLogo').src = assets[val].logo;
        document.getElementById('headerAssetUnit').innerText = assets[val].unit;
        chart.data.datasets[0].data = Array(60).fill(assets[window.activeKey].currentPrice);
        loadUserData();
    };

    window.openBetModal = (side) => {
        if (window.currentGlobalState !== "TRADING") return alert("Trading is closed!");
        document.getElementById('modalTitle').innerText = "Bet " + side;
        document.getElementById('modalAvbl').innerText = document.getElementById('headerBalance').innerText;
        document.getElementById('betModal').style.display = 'flex';
        document.getElementById('betModal').dataset.side = side;
    };

    window.closeBetModal = () => document.getElementById('betModal').style.display = 'none';

    window.confirmBet = async () => {
        const amt = parseFloat(document.getElementById('betAmount').value);
        const side = document.getElementById('betModal').dataset.side;
        const balRef = ref(db, `users/${window.user.uid}/balances/${window.activeKey}`);
        const snap = await get(balRef);
        const currentBal = parseFloat(snap.val() || 0);
        if (isNaN(amt) || amt <= 0 || amt > currentBal) return alert("Invalid Amount");
        assets[window.activeKey].pending = { side, amount: amt };
        await update(ref(db, `users/${window.user.uid}/balances`), { [window.activeKey]: (currentBal - amt).toFixed(8) });
        window.closeBetModal();
        document.getElementById('betAmount').value = "";
    };

    function renderHistory(data) {
        const body = document.getElementById('historyBody');
        body.innerHTML = "";
        Object.values(data).reverse().slice(0, 15).forEach(item => {
            body.innerHTML += `<tr><td>${item.rid}</td><td>${item.time}</td><td>$${parseFloat(item.locked).toFixed(2)}</td><td style="color:${item.action==='UP'?'var(--up)':'var(--down)'}">${item.action}</td><td>${item.isPending ? '<div class="spinner-sm"></div>' : '$'+parseFloat(item.resPrice).toFixed(2)}</td><td style="color:${item.win.includes('+')?'var(--up)':'white'}">${item.win || 'Waiting'}</td></tr>`;
        });
    }

    // ইনভোক ট্রিগার
    onAuthStateChanged(auth, (u) => {
        if (u) {
            window.user = u;
            syncGlobalTimer();
            loadUserData();
            startMasterClock();
        }
    });

    const streams = Object.values(assets).map(a => `${a.symbol}@aggTrade`).join('/');
    const ws = new WebSocket(`wss://stream.binance.com:9443/stream?streams=${streams}`);
    ws.onmessage = (e) => {
        const d = JSON.parse(e.data);
        const sym = d.data.s.toLowerCase();
        for (let k in assets) {
            if (assets[k].symbol === sym) {
                assets[k].currentPrice = parseFloat(d.data.p);
                if (k === window.activeKey) {
                    document.getElementById('priceDisplay').innerText = '$' + assets[k].currentPrice.toFixed(2);
                    chart.data.datasets[0].data.shift();
                    chart.data.datasets[0].data.push(assets[k].currentPrice);
                    chart.update('none');
                    const meta = chart.getDatasetMeta(0).data[30];
                    if(meta) document.getElementById('chartDot').style.top = (meta.y - 6) + 'px';
                }
            }
        }
    };
</script>
</body>
</html>
