<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SMAT CHAT FIX</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            background: #0b0e11; color: white;
            font-family: sans-serif;
            display: flex; flex-direction: column;
            height: 100vh; height: 100dvh; overflow: hidden;
        }

        /* Header */
        .header {
            background: #1e2329; padding: 15px;
            display: flex; justify-content: space-between; align-items: center;
            border-bottom: 2px solid #f3ba2f; flex-shrink: 0;
        }
        .header h1 { font-size: 18px; color: #f3ba2f; }

        /* Chat Area - Scrollable */
        #chatDisplay {
            flex: 1; overflow-y: auto; padding: 15px;
            display: flex; flex-direction: column; gap: 15px;
            background: #0b0e11;
        }

        .msg-box { display: flex; gap: 10px; align-items: flex-start; }
        .avatar {
            width: 35px; height: 35px; background: #363c44;
            border-radius: 50%; display: flex; align-items: center;
            justify-content: center; font-weight: bold; flex-shrink: 0;
        }
        .bubble {
            background: #2b3139; padding: 10px 14px;
            border-radius: 0 12px 12px 12px; font-size: 14px;
            max-width: 80%; word-wrap: break-word;
        }
        .user-id { font-size: 11px; color: #848e9c; margin-bottom: 4px; display: block; }

        /* Input Area - Fixed at Bottom */
        .input-area {
            background: #1e2329; padding: 10px;
            display: flex; gap: 10px; align-items: center;
            border-top: 1px solid #363c44; flex-shrink: 0;
        }
        #messageInput {
            flex: 1; background: #181a20; border: 1px solid #363c44;
            padding: 12px; color: white; border-radius: 8px; outline: none;
        }
        .send-btn {
            background: #f3ba2f; border: none; width: 45px; height: 45px;
            border-radius: 8px; cursor: pointer; color: black; font-size: 18px;
        }
    </style>
</head>
<body>

    <div class="header">
        <h1>SMAT CHAT</h1>
        <div id="adminControls" style="display:none;">
            <button style="background:#f3ba2f; border:none; padding:5px 10px; border-radius:4px;">ADMIN</button>
        </div>
    </div>

    <div id="chatDisplay">
        </div>

    <div class="input-area">
        <input type="text" id="messageInput" placeholder="Type message..." autocomplete="off">
        <button class="send-btn" onclick="sendMessage()"><i class="fa-solid fa-paper-plane"></i></button>
    </div>

    <script>
        const MY_ID = localStorage.getItem('smatID') || "SMAT" + Math.floor(Math.random() * 900000 + 100000);
        localStorage.setItem('smatID', MY_ID); // Ensure ID is saved

        let messages = JSON.parse(localStorage.getItem('smat_messages')) || [];

        function renderChat() {
            const display = document.getElementById('chatDisplay');
            if (messages.length === 0) {
                display.innerHTML = '<p style="text-align:center; color:#555; margin-top:20px;">No messages yet.</p>';
                return;
            }
            
            display.innerHTML = messages.map(msg => `
                <div class="msg-box">
                    <div class="avatar">${msg.id[0]}</div>
                    <div>
                        <span class="user-id">${msg.id} • ${msg.time}</span>
                        <div class="bubble">${msg.text}</div>
                    </div>
                </div>
            `).join('');
            
            display.scrollTop = display.scrollHeight;
        }

        function sendMessage() {
            const input = document.getElementById('messageInput');
            const text = input.value.trim();
            if (!text) return;

            const newMsg = {
                id: MY_ID,
                text: text,
                time: new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' })
            };

            messages.push(newMsg);
            if (messages.length > 100) messages.shift(); // Keep last 100

            localStorage.setItem('smat_messages', JSON.stringify(messages));
            input.value = '';
            renderChat();
        }

        // Handle Enter Key
        document.getElementById('messageInput').addEventListener("keypress", (e) => {
            if (e.key === "Enter") sendMessage();
        });

        // Initial Load
        window.onload = () => {
            renderChat();
            if (MY_ID === "SMAT100001") {
                document.getElementById('adminControls').style.display = 'block';
            }
        };
    </script>
</body>
</html>
