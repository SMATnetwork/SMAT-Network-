<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover, interactive-widget=resizes-content">
    <title>SMAT | Global Chat</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><circle cx='50' cy='50' r='50' fill='%23f3ba2f'/><text x='50%25' y='55%25' text-anchor='middle' dy='.3em' fill='black' font-family='Courier New, monospace' font-weight='900' font-size='60'>S</text></svg>">
    
    <style>
        :root {
            --primary: #f3ba2f; --bg: #0b0e11; --card-bg: #1e2329;
            --chat-bubble: #2b3139; --text-main: #ffffff; --text-sec: #848e9c;
            --admin-color: #0ecb81; --super-admin: #f0b90b; --danger: #f6465d;
            --mention-green: #0ecb81; --gold: #ffd700; --rain-blue: #00d2ff; --drop-cyan: #00ffcc;
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; margin: 0; padding: 0; }
        
        body {
            background: var(--bg); color: var(--text-main);
            font-family: 'Inter', 'Segoe UI', Roboto, sans-serif;
            display: flex; flex-direction: column; 
            height: 100vh; height: 100dvh; 
            overflow: hidden; width: 100%;
            position: relative;
        }

        /* --- PINNED NOTICE DESIGN --- */
        #pinnedNotice {
            background: #1e2329; border-bottom: 1px solid var(--primary);
            padding: 8px 15px; display: none; align-items: center; 
            gap: 10px; z-index: 101; flex-shrink: 0; cursor: pointer;
            box-shadow: 0 4px 10px rgba(0,0,0,0.3);
        }
        #pinnedNotice i { color: var(--primary); font-size: 14px; }
        #pinnedContent { font-size: 12px; color: #fff; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; flex: 1; }

        .chat-header {
            padding: 12px 15px; background: var(--card-bg); border-bottom: 2px solid var(--primary);
            display: flex; justify-content: space-between; align-items: center; 
            box-shadow: 0 4px 15px rgba(0,0,0,0.5); z-index: 100; flex-shrink: 0;
        }
        .header-title { font-size: 18px; font-weight: 900; letter-spacing: 1px; color: var(--primary); }

        #jojoTimer {
            position: absolute; top: 65px; right: 15px;
            background: rgba(30, 35, 41, 0.95); border: 1px solid var(--primary);
            padding: 6px 12px; border-radius: 8px; font-size: 12px;
            font-weight: 900; color: var(--primary); display: none;
            box-shadow: 0 4px 10px rgba(0,0,0,0.5); z-index: 999;
        }

        #s-bubble { 
            position: fixed; width: 65px; height: 65px; z-index: 9999; cursor: pointer; display: none; 
            animation: floatBubble 10s ease-in-out infinite; 
        }
        .s-logo-wrapper { 
            position: relative; width: 100%; height: 100%; background: radial-gradient(circle, #f0b90b 0%, #cc9900 100%); 
            border-radius: 50%; display: flex; align-items: center; justify-content: center; 
            border: 2px solid rgba(255, 255, 255, 0.2); box-shadow: 0 0 15px rgba(240, 185, 11, 0.5); 
        }    
        .s-logo-inner { font-weight: 900; font-size: 30px; color: white; }
        @keyframes floatBubble { 0%, 100% { transform: translate(0, 0); } 25% { transform: translate(50vw, 15vh); } 50% { transform: translate(5vw, 60vh); } 75% { transform: translate(40vw, 40vh); } }
        
        .pop-text { 
            position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); 
            background: #f0b90b; color: black; padding: 20px; border-radius: 15px; 
            font-weight: 900; text-align: center; z-index: 10000; display: none; 
            box-shadow: 0 0 30px rgba(240, 185, 11, 0.5); 
        }

        #chatDisplay {
            flex: 1; overflow-y: auto; padding: 15px;
            display: flex; flex-direction: column; justify-content: flex-start;
            gap: 15px; background: linear-gradient(to bottom, #0b0e11, #161a1e);
            scroll-behavior: smooth; -webkit-overflow-scrolling: touch;
        }

        .msg-row { display: flex; gap: 12px; animation: slideUp 0.3s ease-out; position: relative; width: 100%; flex-shrink: 0; }
        @keyframes slideUp { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        .avatar {
            width: 40px; height: 40px; border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            font-weight: 900; color: #fff; border: 1px solid var(--chat-bubble);
            flex-shrink: 0; font-size: 16px;
        }

        .msg-content { max-width: 85%; }
        .user-meta { display: flex; align-items: center; gap: 8px; margin-bottom: 4px; flex-wrap: wrap; }
        .user-name { font-size: 13px; font-weight: 800; cursor: pointer; }
        .timestamp { font-size: 9px; color: var(--text-sec); font-weight: 600; }
        
        .badge { font-size: 9px; padding: 1px 6px; border-radius: 4px; font-weight: 900; text-transform: uppercase; }
        .badge-admin { background: rgba(14, 203, 129, 0.2); color: var(--admin-color); border: 1px solid var(--admin-color); }
        .badge-super { background: rgba(243, 186, 47, 0.2); color: var(--primary); border: 1px solid var(--primary); }

        .bubble {
            background: var(--chat-bubble); padding: 10px 14px;
            border-radius: 5px 15px 15px 15px; font-size: 14px;
            line-height: 1.5; font-weight: 500; color: #f0f0f0;
            box-shadow: 2px 2px 8px rgba(0,0,0,0.2);
            word-break: break-word; position: relative;
        }
        .chat-image { max-width: 100%; border-radius: 8px; margin-top: 5px; display: block; border: 1px solid #444; }

        .bubble.mentioned-active { border-left: 3px solid var(--mention-green); background: rgba(14, 203, 129, 0.1); }
        .special-msg { border: 1px solid var(--rain-blue); background: rgba(0, 210, 255, 0.05) !important; }

        .input-area {
            padding: 10px 15px; background: var(--card-bg); 
            border-top: 1px solid var(--chat-bubble); flex-shrink: 0;
            z-index: 100; padding-bottom: max(10px, env(safe-area-inset-bottom));
        }
        .input-box-wrapper { display: flex; gap: 8px; align-items: center; width: 100%; }
        
        .special-tools { display: flex; gap: 10px; flex-shrink: 0; }
        .tool-btn { font-size: 18px; cursor: pointer; transition: 0.2s; }
        .rain-tool { color: var(--rain-blue); }
        .drop-tool { color: var(--drop-cyan); }
        #photoBtn { color: #848e9c; display: none; }

        .input-container {
            flex: 1; display: flex; background: #181a20; border-radius: 25px; 
            padding: 0 10px; align-items: center; border: 1px solid #363c44;
        }
        #messageInput {
            width: 100%; background: transparent; border: none; padding: 10px 5px;
            color: white; font-weight: 500; font-size: 16px; outline: none;
        }

        .send-btn {
            background: var(--primary); border: none; width: 40px; height: 40px;
            border-radius: 10px; color: #000; cursor: pointer; font-size: 16px;
            display: flex; align-items: center; justify-content: center; flex-shrink: 0;
        }

        /* Profile Modal Specific */
        #profileModal .modal-box { text-align: center; }
        #profileAvatar { width: 70px; height: 70px; border-radius: 50%; margin: 0 auto 15px; font-size: 30px; display: flex; align-items: center; justify-content: center; font-weight: 900; }
        #profileName { font-size: 18px; font-weight: 900; color: #fff; margin-bottom: 5px; }
        #profileRole { font-size: 12px; color: var(--text-sec); margin-bottom: 20px; }
        .admin-action-btns { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        .action-btn { padding: 10px; border-radius: 8px; font-weight: 900; cursor: pointer; border: none; font-size: 12px; }

        .modal {
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.9); z-index: 5000; justify-content: center; align-items: center;
        }
        .modal-box {
            background: var(--card-bg); padding: 20px; border-radius: 15px;
            width: 90%; max-width: 380px; border: 1px solid var(--primary);
            max-height: 80vh; overflow-y: auto;
        }
        
        .modal-box input, .modal-box select {
            width: 100%; padding: 10px; margin: 8px 0; background: #181a20;
            border: 1px solid var(--chat-bubble); color: white; border-radius: 8px; outline: none;
        }

        .claim-btn { background: var(--drop-cyan); border: none; padding: 8px; width: 100%; border-radius: 6px; color: #000; font-weight: 900; margin-top: 8px; cursor: pointer; }
        .claim-btn:disabled { background: #363c44; color: #848e9c; cursor: not-allowed; }

        .btn-panel { padding: 4px 8px; border-radius: 6px; font-weight: 900; font-size: 10px; cursor: pointer; border: none; }
    </style>
</head>
<body>

    <div id="pinnedNotice" onclick="scrollToPinned()">
        <i class="fa-solid fa-thumbtack"></i>
        <div id="pinnedContent">No pinned message</div>
        <i class="fa-solid fa-xmark" id="unpinIcon" style="font-size: 12px; display:none;" onclick="unpinAction(event)"></i>
    </div>

    <div id="s-bubble" onclick="popBubble()">
        <div class="s-logo-wrapper"><span class="s-logo-inner">S</span></div>
    </div>

    <div id="pop-msg" class="pop-text">
        <div style="font-size: 20px;">"I'm Jojo"</div>
        <div style="font-size: 14px;">+1.00 SMAT </div>
    </div>

    <div id="jojoTimer">Jojo Time: <span id="jojoClock">00:00:00</span></div>

    <div id="profileModal" class="modal">
        <div class="modal-box">
            <div id="profileAvatar"></div>
            <div id="profileName"></div>
            <div id="profileRole"></div>
            <div id="adminActions" class="admin-action-btns" style="display:none;">
                <button class="action-btn" style="background:var(--primary); color:black;" id="pinMsgBtn">PIN MSG</button>
                <button class="action-btn" style="background:var(--danger); color:white;" id="banUserBtn">BAN USER</button>
                <button class="action-btn" style="background:var(--admin-color); color:black; grid-column: span 2;" id="delMsgBtn">DELETE MESSAGE</button>
            </div>
            <button onclick="closeModal('profileModal')" style="width:100%; margin-top:15px; background:transparent; border:none; color:var(--text-sec);">Close</button>
        </div>
    </div>

    <div id="leaderboardModal" class="modal"><div class="modal-box"><h2 style="color:var(--primary); text-align: center; font-size: 18px;"><i class="fa-solid fa-trophy"></i> Today's Earners</h2><div id="leaderboardBody"></div><button onclick="closeModal('leaderboardModal')" style="width:100%; margin-top:15px; background:var(--primary); border:none; padding:10px; border-radius:8px; font-weight: 800;">CLOSE</button></div></div>
    <div id="rainModal" class="modal"><div class="modal-box"><h2 id="specialModalTitle" style="text-align: center; font-size: 18px;"></h2><p style="font-size: 11px; color: var(--text-sec); text-align: center;">Balance: <span id="modalBalInfo">0.00</span></p><select id="specialCoin"><option value="usdt">USDT</option><option value="trx">TRX</option><option value="smat">SMAT</option><option value="bnb">BNB</option></select><input type="number" id="specialAmount" placeholder="Total Amount"><input type="number" id="specialUsers" placeholder="Number of Users"><button id="specialSubmitBtn" onclick="processSpecial()" style="width:100%; margin-top:15px; border:none; padding:12px; border-radius:8px; font-weight: 900; color: #000; background: var(--primary);">SEND</button><button onclick="closeModal('rainModal')" style="width:100%; margin-top:10px; background:transparent; border:none; color:var(--text-sec);">Cancel</button></div></div>
    <div id="adminModal" class="modal"><div class="modal-box"><h2 style="color:var(--primary); font-size: 18px;"><i class="fa-solid fa-user-shield"></i> Admin Panel</h2><input type="text" id="targetUserID" placeholder="Admin Appointment"><button onclick="makeAdmin()" style="width:100%; padding:12px; background:var(--primary); border:none; font-weight:900; border-radius:8px;">PROMOTE</button><button onclick="closeModal('adminModal')" style="width:100%; margin-top:10px; background:transparent; border:none; color:var(--text-sec);">Close</button></div></div>
    <div id="banListModal" class="modal"><div class="modal-box"><h2 style="color:var(--danger); font-size: 18px;"><i class="fa-solid fa-gavel"></i> Restriction List</h2><div id="banListContent"></div><button onclick="closeModal('banListModal')" style="width:100%; margin-top:15px; background:var(--chat-bubble); border:none; color:white; padding:10px; border-radius:8px;">Close</button></div></div>

    <div class="chat-header">
        <div class="header-title">Global 💬 English</div>
        <div style="display:flex; gap:6px; align-items:center;">
            <i class="fa-solid fa-crown" style="color: var(--gold); cursor: pointer; font-size: 18px;" onclick="openLeaderboard()"></i>
            <button id="banListBtn" class="btn-panel" style="display:none; background: var(--danger); color: white;" onclick="openBanList()">Mute List</button>
            <button id="superAdminBtn" class="btn-panel" style="display:none; background: var(--primary); color: black;" onclick="openModal('adminModal')">Super Admin</button>
            <a href="home.html" style="color:var(--text-sec); font-size: 20px; margin-left: 2px;"><i class="fa-solid fa-circle-xmark"></i></a>
        </div>
    </div>

    <div id="chatDisplay"></div>

    <div class="input-area">
        <div class="input-box-wrapper">
            <div class="special-tools">
                <i class="fa-solid fa-cloud-showers-heavy tool-btn rain-tool" onclick="openSpecial('RAIN')"></i>
                <i class="fa-solid fa-droplet tool-btn drop-tool" onclick="openSpecial('DROP')"></i>
            </div>
            <div class="input-container">
                <i class="fa-solid fa-image tool-btn" id="photoBtn" onclick="triggerUpload()"></i>
                <input type="file" id="imageInput" style="display:none;" accept="image/*" onchange="handleImage(this)">
                <input type="text" id="messageInput" placeholder="Write a message..." autocomplete="off">
            </div>
            <button id="sendBtn" class="send-btn" onclick="sendMessage()"><i class="fa-solid fa-paper-plane"></i></button>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getDatabase, ref, push, onValue, set, update, remove, limitToLast, query, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyAMxtJedkehhxJRMPZLjhpKHqneHEWsGlE",
            authDomain: "smat-exchange.firebaseapp.com",
            projectId: "smat-exchange",
            storageBucket: "smat-exchange.firebasestorage.app",
            messagingSenderId: "836334569396",
            appId: "1:836334569396:web:679effe640b3453412d4e1"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);
        const messagesRef = ref(db, "global_messages");
        const adminsRef = ref(db, "smat_admins");
        const restrictedRef = ref(db, "smat_restricted");
        const pinRef = ref(db, "smat_pin");

        const MAIN_SUPER_ADMIN = "SMAT100001";
        const MAX_MESSAGES = 250;
        
        let user = { id: localStorage.getItem('smatID') || "SMAT100001", role: "USER" };
        let currentMessages = [];
        let adminsList = [];
        let restrictedList = [];

        // ADMIN SYNC
        onValue(adminsRef, (snap) => { 
            adminsList = snap.val() ? Object.values(snap.val()) : [];
            updateMyRole();
        });
        onValue(restrictedRef, (snap) => {
            restrictedList = snap.val() ? Object.values(snap.val()) : [];
        });

        // PIN SYNC
        onValue(pinRef, (snap) => {
            const data = snap.val();
            const bar = document.getElementById('pinnedNotice');
            if(data && data.text) {
                document.getElementById('pinnedContent').innerText = data.text;
                bar.style.display = 'flex';
                document.getElementById('unpinIcon').style.display = (user.role === 'ADMIN' || user.role === 'SUPER_ADMIN') ? 'block' : 'none';
            } else {
                bar.style.display = 'none';
            }
        });

        function updateMyRole() {
            if (user.id === MAIN_SUPER_ADMIN) {
                user.role = "SUPER_ADMIN";
                document.getElementById('superAdminBtn').style.display = 'block';
                document.getElementById('banListBtn').style.display = 'block';
                document.getElementById('photoBtn').style.display = 'block';
            } else if (adminsList.includes(user.id)) {
                user.role = "ADMIN";
                document.getElementById('banListBtn').style.display = 'block';
                document.getElementById('photoBtn').style.display = 'block';
            }
            renderChat();
        }

        // UNIQUE ID COLOR GENERATOR
        function getIDColor(id) {
            if(id === "SYSTEM") return "#0ecb81";
            if(id === MAIN_SUPER_ADMIN || adminsList.includes(id)) return "yellow";
            let hash = 0;
            for (let i = 0; i < id.length; i++) hash = id.charCodeAt(i) + ((hash << 5) - hash);
            return `hsl(${Math.abs(hash) % 360}, 80%, 70%)`;
        }

        // PHOTO UPLOAD LOGIC
        window.triggerUpload = () => document.getElementById('imageInput').click();
        window.handleImage = function(input) {
            const file = input.files[0];
            if(file) {
                const reader = new FileReader();
                reader.onload = (e) => sendMessage(e.target.result);
                reader.readAsDataURL(file);
            }
        };

        const q = query(messagesRef, limitToLast(MAX_MESSAGES));
        onValue(q, (snapshot) => {
            currentMessages = [];
            snapshot.forEach((child) => {
                currentMessages.push({ mid: child.key, ...child.val() });
            });
            renderChat();
        });

        window.sendMessage = async function(imgData = null) {
            if (restrictedList.includes(user.id)) return alert("You are restricted!");
            const input = document.getElementById('messageInput');
            let rawText = input.value.trim();
            if(!rawText && !imgData) return;
            
            push(messagesRef, {
                id: user.id,
                text: rawText,
                image: imgData,
                time: new Date().toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'}),
                timestamp: serverTimestamp(),
                role: user.role
            });
            input.value = '';
            document.getElementById('imageInput').value = '';
        }

        window.renderChat = function() {
            const container = document.getElementById('chatDisplay');
            container.innerHTML = '';
            currentMessages.forEach(msg => {
                const isMentionedMe = msg.text && msg.text.includes("@" + user.id);
                let btn = msg.dropData ? `<button class="claim-btn" ${msg.isCompleted ? 'disabled' : ''} onclick="claimDrop('${msg.dropData.id}', ${msg.dropData.total}, ${msg.dropData.count}, '${msg.dropData.coin}', '${msg.mid}')">${msg.isCompleted ? 'EMPTY' : 'CLAIM'}</button>` : '';
                
                let nameColor = getIDColor(msg.id);
                let displayName = msg.id === "SYSTEM" ? "SMAT Bot" : msg.id;

                container.innerHTML += `
                    <div class="msg-row" id="msg-${msg.mid}">
                        <div class="avatar" style="background:${getIDColor(msg.id)}">${msg.id === "SYSTEM" ? '<i class="fa-solid fa-robot"></i>' : msg.id[0]}</div>
                        <div class="msg-content">
                            <div class="user-meta">
                                <span class="user-name" style="color:${nameColor};" onclick="openUserProfile('${msg.id}', '${msg.mid}', '${msg.text || "Photo"}')">${displayName}</span> 
                                ${msg.id === MAIN_SUPER_ADMIN ? '<span class="badge badge-super">Owner</span>' : adminsList.includes(msg.id) ? '<span class="badge badge-admin">Admin</span>' : ''}
                                <span class="timestamp">${msg.time}</span>
                            </div>
                            <div class="bubble ${isMentionedMe ? 'mentioned-active' : ''} ${msg.isSpecial ? 'special-msg' : ''}">
                                ${msg.text ? msg.text.replace(/(@SMAT\d+)/g, '<span style="color:var(--primary); font-weight:bold;">$1</span>') : ''}
                                ${msg.image ? `<img src="${msg.image}" class="chat-image" onclick="window.open(this.src)">` : ''}
                                ${btn}
                            </div>
                        </div>
                    </div>
                `;
            });
            container.scrollTop = container.scrollHeight;
        }

        // PROFILE POPUP LOGIC
        window.openUserProfile = function(uid, mid, text) {
            const modal = document.getElementById('profileModal');
            const avatar = document.getElementById('profileAvatar');
            const name = document.getElementById('profileName');
            const roleTxt = document.getElementById('profileRole');
            const actions = document.getElementById('adminActions');

            avatar.style.background = getIDColor(uid);
            avatar.innerText = uid[0];
            name.innerText = uid;
            name.style.color = getIDColor(uid);
            
            let role = "User";
            if(uid === MAIN_SUPER_ADMIN) role = "Owner";
            else if(adminsList.includes(uid)) role = "Admin";
            roleTxt.innerText = role;

            if((user.role === 'ADMIN' || user.role === 'SUPER_ADMIN') && uid !== "SYSTEM") {
                actions.style.display = 'grid';
                document.getElementById('pinMsgBtn').onclick = () => { set(pinRef, { text, mid }); closeModal('profileModal'); };
                document.getElementById('banUserBtn').onclick = () => { if(uid !== MAIN_SUPER_ADMIN) set(ref(db, 'smat_restricted/'+uid), uid); closeModal('profileModal'); };
                document.getElementById('delMsgBtn').onclick = () => { remove(ref(db, 'global_messages/'+mid)); closeModal('profileModal'); };
            } else {
                actions.style.display = 'none';
                if(uid !== "SYSTEM") appendMention(uid); 
            }
            openModal('profileModal');
        }

        window.unpinAction = (e) => { e.stopPropagation(); remove(pinRef); };
        window.scrollToPinned = () => {
            onValue(pinRef, (s) => {
                const d = s.val();
                if(d && d.mid) {
                    const el = document.getElementById('msg-' + d.mid);
                    if(el) el.scrollIntoView({ behavior: 'smooth', block: 'center' });
                }
            }, {onlyOnce: true});
        };

        // PREVIOUS FUNCTIONS (Intact)
        window.makeAdmin = function() { const id = document.getElementById('targetUserID').value.trim(); if(id) set(ref(db, 'smat_admins/' + id), id); alert("Success!"); closeModal('adminModal'); };
        window.unbanUser = function(id) { remove(ref(db, 'smat_restricted/' + id)); alert("Unbanned!"); };
        window.processSpecial = function() { 
            const coin = document.getElementById('specialCoin').value;
            const amount = document.getElementById('specialAmount').value;
            const type = document.getElementById('specialModalTitle').innerText.includes('Rain') ? 'RAIN' : 'DROP';
            push(messagesRef, { id: "SYSTEM", text: `${type} by ${user.id}: ${amount} ${coin}!`, time: new Date().toLocaleTimeString(), isSpecial: true });
            closeModal('rainModal');
        };

        window.closeModal = (id) => document.getElementById(id).style.display = 'none';
        window.openModal = (id) => document.getElementById(id).style.display = 'flex';
        window.appendMention = (id) => { document.getElementById('messageInput').value += `@${id} `; document.getElementById('messageInput').focus(); };

    </script>

    <script>
        function openSpecial(type) { document.getElementById('specialModalTitle').innerHTML = type === 'RAIN' ? '🌧️ Asset Rain' : '💧 Asset Drop'; document.getElementById('rainModal').style.display = 'flex'; }
        function openLeaderboard() { document.getElementById('leaderboardModal').style.display = 'flex'; }
        function openBanList() { document.getElementById('banListModal').style.display = 'flex'; }
    </script>
</body>
</html>
