<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>SMAT | Global Chat</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <style>
        :root {
            --primary: #f3ba2f;
            --bg: #0b0e11;
            --card-bg: #1e2329;
            --chat-bubble: #2b3139;
            --text-main: #ffffff;
            --text-sec: #848e9c;
            --admin-color: #0ecb81;
            --danger: #f6465d;
            --gold: #ffd700;
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; margin: 0; padding: 0; }
        body { background: var(--bg); color: var(--text-main); font-family: 'Inter', sans-serif; display: flex; flex-direction: column; height: 100vh; overflow: hidden; }

        /* --- Header & Pin Section --- */
        .chat-header { padding: 12px 15px; background: var(--card-bg); border-bottom: 2px solid var(--primary); display: flex; justify-content: space-between; align-items: center; z-index: 100; }
        
        #pinnedContainer { 
            background: #181a20; border-left: 3px solid var(--primary); padding: 8px 15px; 
            display: none; justify-content: space-between; align-items: center; font-size: 13px; 
            border-bottom: 1px solid #333; animation: fadeIn 0.3s;
        }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        /* --- Chat Area --- */
        #chatDisplay { flex: 1; overflow-y: auto; padding: 15px; display: flex; flex-direction: column; gap: 15px; }
        .msg-row { display: flex; gap: 12px; position: relative; width: 100%; }
        .avatar { width: 40px; height: 40px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-weight: 900; flex-shrink: 0; cursor: pointer; }
        
        .bubble { 
            background: var(--chat-bubble); padding: 10px 14px; border-radius: 5px 15px 15px 15px; 
            font-size: 14px; line-height: 1.5; color: #f0f0f0; max-width: 85%;
        }
        .chat-img { max-width: 200px; border-radius: 10px; margin-top: 5px; display: block; border: 1px solid #444; }

        /* --- Input Area --- */
        .input-area { padding: 10px 15px; background: var(--card-bg); border-top: 1px solid #333; }
        .input-box-wrapper { display: flex; gap: 8px; align-items: center; }
        .input-container { flex: 1; display: flex; background: #181a20; border-radius: 25px; padding: 0 12px; align-items: center; border: 1px solid #363c44; }
        #messageInput { width: 100%; background: transparent; border: none; padding: 10px 5px; color: white; outline: none; }
        
        .send-btn { background: var(--primary); border: none; width: 42px; height: 42px; border-radius: 50%; color: #000; cursor: pointer; display: flex; align-items: center; justify-content: center; }
        .upload-label { color: var(--text-sec); cursor: pointer; margin-right: 8px; font-size: 18px; display: none; }

        /* --- Modals & Popups --- */
        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.85); z-index: 5000; justify-content: center; align-items: center; }
        .modal-box { background: var(--card-bg); padding: 20px; border-radius: 15px; width: 85%; max-width: 320px; text-align: center; border: 1px solid var(--primary); }
        .modal-btn { width: 100%; padding: 12px; margin-top: 10px; border: none; border-radius: 8px; font-weight: 800; cursor: pointer; }

        /* UI elements from previous code */
        #jojoTimer { position: absolute; top: 65px; right: 15px; background: rgba(30,35,41,0.9); border: 1px solid var(--primary); padding: 5px 10px; border-radius: 5px; font-size: 11px; color: var(--primary); font-weight: 900; }
    </style>
</head>
<body>

    <div id="pinnedContainer">
        <div style="flex:1;">
            <div style="color:var(--primary); font-size: 10px; font-weight: 900; text-transform: uppercase;">📌 Pinned Message</div>
            <div id="pinnedText" style="white-space: nowrap; overflow: hidden; text-overflow: ellipsis; color: #fff;">...</div>
        </div>
        <i id="unpinBtn" class="fa-solid fa-circle-xmark" style="color:var(--text-sec); cursor:pointer; margin-left: 10px; display:none;" onclick="handleUnpin()"></i>
    </div>

    <div id="userModal" class="modal">
        <div class="modal-box">
            <h3 id="modalUserName" style="color:var(--primary); margin-bottom: 5px;">User ID</h3>
            <p id="modalUserRole" style="font-size: 11px; color: var(--text-sec); margin-bottom: 20px;">Role: USER</p>
            
            <div id="adminActions" style="display: none;">
                <button class="modal-btn" style="background:var(--primary); color:#000;" onclick="handlePinAction()">PIN MESSAGE</button>
                <button class="modal-btn" style="background:var(--danger); color:#fff;" onclick="handleBanAction()">BAN USER</button>
                <button class="modal-btn" style="background:#444; color:#fff;" onclick="handleDeleteAction()">DELETE MESSAGE</button>
            </div>
            <button class="modal-btn" style="background:transparent; color:var(--text-sec);" onclick="closeModal('userModal')">CLOSE</button>
        </div>
    </div>

    <div class="chat-header">
        <div style="color:var(--primary); font-weight:900;">Global 💬 SMAT</div>
        <div style="display:flex; gap:10px; align-items:center;">
            <i class="fa-solid fa-crown" style="color:var(--gold); cursor:pointer;" onclick="openLeaderboard()"></i>
            <a href="home.html" style="color:var(--text-sec); font-size:20px;"><i class="fa-solid fa-circle-xmark"></i></a>
        </div>
    </div>

    <div id="chatDisplay"></div>
    <div id="jojoTimer">Jojo Time: <span id="jojoClock">00:00:00</span></div>

    <div class="input-area">
        <div class="input-box-wrapper">
            <label for="imgUpload" id="adminUploadBtn" class="upload-label"><i class="fa-solid fa-image"></i></label>
            <input type="file" id="imgUpload" accept="image/*" style="display:none;" onchange="handleImageSend(this)">
            
            <div class="input-container">
                <input type="text" id="messageInput" placeholder="Write a message..." autocomplete="off">
            </div>
            <button id="sendBtn" class="send-btn" onclick="sendMessage()"><i class="fa-solid fa-paper-plane"></i></button>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getDatabase, ref, push, onValue, set, update, remove, limitToLast, query, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyAMxtJedkehhxJRMPZLjhpKHqneHEWsGlE",
            authDomain: "smat-exchange.firebaseapp.com",
            projectId: "smat-exchange",
            storageBucket: "smat-exchange.firebasestorage.app",
            messagingSenderId: "836334569396",
            appId: "1:836334569396:web:679effe640b3453412d4e1"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);
        
        const user = { id: localStorage.getItem('smatID') || "GUEST", role: "USER" };
        let selectedMsg = null; 
        let adminsList = [];

        // --- 1. Admin & Pin Sync ---
        onValue(ref(db, "smat_admins"), (snap) => {
            adminsList = snap.val() ? Object.values(snap.val()) : [];
            if(user.id === "SMAT100001") user.role = "SUPER_ADMIN";
            else if(adminsList.includes(user.id)) user.role = "ADMIN";
            
            if(user.role !== "USER") document.getElementById('adminUploadBtn').style.display = 'block';
        });

        onValue(ref(db, "pinned_msg"), (snap) => {
            const data = snap.val();
            const container = document.getElementById('pinnedContainer');
            if(data) {
                container.style.display = 'flex';
                document.getElementById('pinnedText').innerText = data.text;
                if(user.role !== "USER") document.getElementById('unpinBtn').style.display = 'block';
            } else {
                container.style.display = 'none';
            }
        });

        // --- 2. Chat Rendering with Unique ID Colors ---
        const q = query(ref(db, "global_messages"), limitToLast(100));
        onValue(q, (snap) => {
            const container = document.getElementById('chatDisplay');
            container.innerHTML = '';
            snap.forEach(child => {
                const msg = child.val();
                const mid = child.key;
                const idColor = getUserColor(msg.id);
                
                const html = `
                    <div class="msg-row">
                        <div class="avatar" style="background:${idColor}" onclick="openUserActions('${msg.id}', '${mid}', '${msg.text.replace(/'/g, "")}')">
                            ${msg.id[0]}
                        </div>
                        <div class="msg-content">
                            <div style="font-size:11px; font-weight:800; color:${idColor}; margin-bottom:2px;">
                                ${msg.id} ${adminsList.includes(msg.id) || msg.id === "SMAT100001" ? '⭐' : ''}
                            </div>
                            <div class="bubble">
                                ${msg.image ? `<img src="${msg.image}" class="chat-img">` : ''}
                                ${msg.text || ''}
                            </div>
                        </div>
                    </div>
                `;
                container.insertAdjacentHTML('beforeend', html);
            });
            container.scrollTop = container.scrollHeight;
        });

        // --- 3. Profile Click & Admin Actions ---
        window.openUserActions = (targetId, mid, text) => {
            selectedMsg = { mid, targetId, text };
            document.getElementById('modalUserName').innerText = targetId;
            document.getElementById('modalUserRole').innerText = adminsList.includes(targetId) ? "Role: ADMIN" : "Role: USER";
            
            if(user.role !== "USER") {
                document.getElementById('adminActions').style.display = 'block';
            }
            document.getElementById('userModal').style.display = 'flex';
        };

        window.handlePinAction = () => {
            set(ref(db, "pinned_msg"), { text: selectedMsg.text, by: user.id });
            closeModal('userModal');
        };

        window.handleUnpin = () => {
            remove(ref(db, "pinned_msg"));
        };

        window.handleDeleteAction = () => {
            remove(ref(db, "global_messages/" + selectedMsg.mid));
            closeModal('userModal');
        };

        window.handleBanAction = () => {
            if(selectedMsg.targetId === "SMAT100001") return alert("Cannot ban Owner!");
            set(ref(db, "smat_restricted/" + selectedMsg.targetId), selectedMsg.targetId);
            remove(ref(db, "global_messages/" + selectedMsg.mid));
            alert("User restricted!");
            closeModal('userModal');
        };

        // --- 4. Messaging & Image Upload ---
        window.sendMessage = async () => {
            const input = document.getElementById('messageInput');
            const text = input.value.trim();
            if(!text) return;
            
            push(ref(db, "global_messages"), {
                id: user.id,
                text: text,
                time: new Date().toLocaleTimeString(),
                timestamp: serverTimestamp()
            });
            input.value = '';
        };

        window.handleImageSend = (input) => {
            if(user.role === "USER") return;
            const file = input.files[0];
            if(!file) return;

            const reader = new FileReader();
            reader.onload = (e) => {
                push(ref(db, "global_messages"), {
                    id: user.id,
                    image: e.target.result,
                    time: new Date().toLocaleTimeString(),
                    timestamp: serverTimestamp()
                });
            };
            reader.readAsDataURL(file);
        };

        // --- Utils ---
        function getUserColor(id) {
            let hash = 0;
            for (let i = 0; i < id.length; i++) hash = id.charCodeAt(i) + ((hash << 5) - hash);
            return `hsl(${Math.abs(hash) % 360}, 75%, 65%)`;
        }

        window.closeModal = (id) => document.getElementById(id).style.display = 'none';

        // --- Jojo Timer (Existing logic placeholder) ---
        setInterval(() => {
            // Your existing BD Time Jojo logic remains here
            document.getElementById('jojoClock').innerText = new Date().toLocaleTimeString();
        }, 1000);

    </script>
</body>
</html>
