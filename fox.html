<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>SMAT | Premium Chat</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root {
            --primary: #f3ba2f;
            --bg: #0b0e11;
            --card-bg: #1e2329;
            --chat-bubble: #2b3139;
            --text-main: #ffffff;
            --text-sec: #848e9c;
            --admin-color: #0ecb81;
            --super-admin: #f0b90b;
            --danger: #f6465d;
            --mention-green: #0ecb81;
            --gold: #ffd700;
            --rain-blue: #00d2ff;
            --drop-cyan: #00ffcc;
        }
/* Footer */
        .footer { position: fixed; bottom: 0; width: 100%; height: 75px; background: #181a20; display: flex; justify-content: space-around; align-items: center; border-top: 1px solid #2b3139; z-index: 3000; }
        .f-nav { text-decoration: none; color: var(--text-sec); text-align: center; font-size: 10px; flex: 1; display: flex; flex-direction: column; align-items: center; }
        .f-nav i { font-size: 22px; margin-bottom: 5px; }
        .f-nav.active { color: var(--primary); }
        .u-curve { position: relative; top: -22px; width: 75px; height: 75px; display: flex; justify-content: center; align-items: center; }
        .spin-circle { position: absolute; width: 70px; height: 70px; border: 2.5px dashed var(--primary); border-radius: 50%; animation: spin 5s linear infinite; }
        .crash-link { width: 58px; height: 58px; background: var(--primary); border-radius: 50%; color: black; font-weight: 900; font-size: 11px; display: flex; align-items: center; justify-content: center; text-decoration: none; z-index: 5; box-shadow: 0 0 15px rgba(243, 186, 47, 0.4); }
        
        @keyframes spin { 100% { transform: rotate(360deg); } }
        .up { color: var(--up); }
        .down { color: var(--down); }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; margin: 0; padding: 0; }
        
        body {
            margin: 0; background: var(--bg); color: var(--text-main);
            font-family: 'Inter', 'Segoe UI', Roboto, sans-serif;
            display: flex; flex-direction: column; 
            height: 100%; height: 100dvh; /* Mobile display adjust */
            overflow: hidden; width: 100%;
        }

        /* Header - Fixed */
        .chat-header {
            padding: 12px 15px; background: var(--card-bg); border-bottom: 2px solid var(--primary);
            display: flex; justify-content: space-between; align-items: center; 
            box-shadow: 0 4px 15px rgba(0,0,0,0.5); z-index: 100; flex-shrink: 0;
        }
        .header-title { font-size: 18px; font-weight: 900; letter-spacing: 1px; color: var(--primary); }

        /* Jojo Timer */
        #jojoTimer {
            position: absolute; top: 65px; right: 15px;
            background: rgba(30, 35, 41, 0.95); border: 1px solid var(--primary);
            padding: 6px 12px; border-radius: 8px; font-size: 12px;
            font-weight: 900; color: var(--primary); display: none;
            box-shadow: 0 4px 10px rgba(0,0,0,0.5); z-index: 999;
        }

        /* S-Bubble Logic Styles */
        #s-bubble { 
            position: fixed; width: 65px; height: 65px; z-index: 9999; cursor: pointer; display: none; 
            animation: floatBubble 10s ease-in-out infinite; 
        }
        .s-logo-wrapper { 
            position: relative; width: 100%; height: 100%; background: radial-gradient(circle, #f0b90b 0%, #cc9900 100%); 
            border-radius: 50%; display: flex; align-items: center; justify-content: center; 
            border: 2px solid rgba(255, 255, 255, 0.2); box-shadow: 0 0 15px rgba(240, 185, 11, 0.5); 
        }    
        .s-logo-inner { font-weight: 900; font-size: 30px; color: white; }
        @keyframes floatBubble { 0%, 100% { transform: translate(0, 0); } 25% { transform: translate(50vw, 15vh); } 50% { transform: translate(5vw, 60vh); } 75% { transform: translate(40vw, 40vh); } }
        
        .pop-text { 
            position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); 
            background: #f0b90b; color: black; padding: 20px; border-radius: 15px; 
            font-weight: 900; text-align: center; z-index: 10000; display: none; 
            box-shadow: 0 0 30px rgba(240, 185, 11, 0.5); 
        }

        /* Chat Display - Responsive Scrolling */
        #chatDisplay {
            flex: 1; overflow-y: auto; padding: 15px;
            display: flex; flex-direction: column; 
            justify-content: flex-start; /* মেসেজ ওপর থেকে শুরু হবে */
            gap: 15px;
            background: linear-gradient(to bottom, #0b0e11, #161a1e);
            scroll-behavior: smooth; -webkit-overflow-scrolling: touch;
        }

        .msg-row { display: flex; gap: 12px; animation: slideUp 0.3s ease-out; position: relative; width: 100%; }
        @keyframes slideUp { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        .avatar {
            width: 40px; height: 40px; border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            font-weight: 900; color: #fff; border: 1px solid var(--chat-bubble);
            flex-shrink: 0; font-size: 16px;
        }

        .msg-content { max-width: 85%; }
        .user-meta { display: flex; align-items: center; gap: 8px; margin-bottom: 4px; flex-wrap: wrap; }
        .user-name { font-size: 13px; font-weight: 800; color: #fff; cursor: pointer; }
        .timestamp { font-size: 9px; color: var(--text-sec); font-weight: 600; }
        
        .badge { font-size: 9px; padding: 1px 6px; border-radius: 4px; font-weight: 900; text-transform: uppercase; }
        .badge-admin { background: rgba(14, 203, 129, 0.2); color: var(--admin-color); border: 1px solid var(--admin-color); }
        .badge-super { background: rgba(243, 186, 47, 0.2); color: var(--primary); border: 1px solid var(--primary); }

        .bubble {
            background: var(--chat-bubble); padding: 10px 14px;
            border-radius: 5px 15px 15px 15px; font-size: 14px;
            line-height: 1.5; font-weight: 500; color: #f0f0f0;
            box-shadow: 2px 2px 8px rgba(0,0,0,0.2);
            word-break: break-word; position: relative;
        }
        .bubble.mentioned-active { border-left: 3px solid var(--mention-green); background: rgba(14, 203, 129, 0.1); }

        /* Input Area - Sticks to Bottom */
        .input-area { 
            padding: 10px 15px; background: var(--card-bg); 
            border-top: 1px solid var(--chat-bubble); flex-shrink: 0;
            z-index: 100; padding-bottom: env(safe-area-inset-bottom);
        }
        .input-box-wrapper { display: flex; gap: 10px; align-items: center; width: 100%; }
        
        .special-tools { display: flex; gap: 10px; flex-shrink: 0; }
        .tool-btn { font-size: 18px; cursor: pointer; }
        .rain-tool { color: var(--rain-blue); }
        .drop-tool { color: var(--drop-cyan); }

        .input-container {
            flex: 1; display: flex; background: #181a20; border-radius: 12px; 
            padding: 0 10px; align-items: center; border: 1px solid #363c44;
        }
        #messageInput {
            width: 100%; background: transparent; border: none; padding: 10px 5px;
            color: white; font-weight: 500; font-size: 14px; outline: none;
        }

        .send-btn {
            background: var(--primary); border: none; width: 40px; height: 40px;
            border-radius: 10px; color: #000; cursor: pointer; font-size: 16px;
            display: flex; align-items: center; justify-content: center; flex-shrink: 0;
        }

        /* Modals */
        .modal {
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.9); z-index: 5000; justify-content: center; align-items: center;
        }
        .modal-box {
            background: var(--card-bg); padding: 20px; border-radius: 15px;
            width: 90%; max-width: 380px; border: 1px solid var(--primary);
            max-height: 80vh; overflow-y: auto;
        }
        
        .claim-btn { background: var(--drop-cyan); border: none; padding: 8px; width: 100%; border-radius: 6px; color: #000; font-weight: 900; margin-top: 8px; cursor: pointer; }
    </style>
</head>
<body>

    <div id="s-bubble" onclick="popBubble()">
        <div class="s-logo-wrapper"><span class="s-logo-inner">S</span></div>
    </div>

    <div id="pop-msg" class="pop-text">
        <div style="font-size: 20px;">Jojo Gift You!</div>
        <div style="font-size: 14px;">+1.00 SMAT COIN</div>
    </div>

    <div class="chat-header">
        <div class="header-title">SMAT CHAT</div>
        <div style="display:flex; gap:8px; align-items:center;">
            <i class="fa-solid fa-crown" style="color: var(--gold); cursor: pointer; font-size: 18px;" onclick="openLeaderboard()"></i>
            <button id="banListBtn" class="btn-panel" style="display:none; background: var(--danger); color: white; padding: 5px 8px; border: none; border-radius: 5px; font-weight: 900; font-size: 10px;" onclick="openBanList()">LIST</button>
            <button id="superAdminBtn" class="btn-panel" style="display:none; background: var(--primary); color: black; padding: 5px 8px; border: none; border-radius: 5px; font-weight: 900; font-size: 10px;" onclick="openModal('adminModal')">ADMIN</button>
            <a href="Home.html" style="color:var(--text-sec); font-size: 20px; margin-left: 5px;"><i class="fa-solid fa-circle-xmark"></i></a>
        </div>
    </div>

    <div id="jojoTimer">Jojo Time: <span id="jojoClock">00:00:00</span></div>

    <div id="chatDisplay"></div>

    <div class="input-area">
        <div class="input-box-wrapper">
            <div class="special-tools">
                <i class="fa-solid fa-cloud-showers-heavy tool-btn rain-tool" onclick="openSpecial('RAIN')"></i>
                <i class="fa-solid fa-droplet tool-btn drop-tool" onclick="openSpecial('DROP')"></i>
            </div>
            <div class="input-container">
                <input type="text" id="messageInput" placeholder="Write a message..." autocomplete="off">
            </div>
            <button id="sendBtn" class="send-btn" onclick="sendMessage()"><i class="fa-solid fa-paper-plane"></i></button>
        </div>
    </div>

    <div id="leaderboardModal" class="modal"><div class="modal-box"><h2 style="color:var(--primary); text-align: center;"><i class="fa-solid fa-trophy"></i> Top Earners</h2><div id="leaderboardBody"></div><button onclick="closeModal('leaderboardModal')" style="width:100%; margin-top:15px; background:var(--primary); border:none; padding:10px; border-radius:8px; font-weight: 800;">CLOSE</button></div></div>
    <div id="rainModal" class="modal"><div class="modal-box"><h2 id="specialModalTitle" style="text-align: center;"></h2><input type="number" id="specialAmount" placeholder="Total Amount"><input type="number" id="specialUsers" placeholder="Number of Users"><button id="specialSubmitBtn" onclick="processSpecial()" style="width:100%; margin-top:15px; border:none; padding:12px; border-radius:8px; font-weight: 900; color: #000; background: var(--primary);">SEND</button><button onclick="closeModal('rainModal')" style="width:100%; margin-top:10px; background:transparent; border:none; color:var(--text-sec);">Cancel</button></div></div>
    <div id="adminModal" class="modal"><div class="modal-box"><h2>Admin</h2><input type="text" id="targetUserID" placeholder="SMAT ID"><button onclick="makeAdmin()">PROMOTE</button><button onclick="closeModal('adminModal')">Close</button></div></div>
    <div id="banListModal" class="modal"><div class="modal-box"><h2>Ban List</h2><div id="banListContent"></div><button onclick="closeModal('banListModal')">Close</button></div></div>

  <footer class="footer">
        <a href="home.html" class="f-nav"><i class="fas fa-home"></i>Home</a>
        <a href="Trade.html" class="f-nav active"><i class="fas fa-chart-line"></i>Trade</a>
        <div class="u-curve"><div class="spin-circle"></div><a href="Crash.html" class="crash-link">CRASH</a></div>
        <a href="Explorer.html" class="f-nav"><i class="fas fa-compass"></i>Explore</a>
        <a href="Wallet.html" class="f-nav"><i class="fas fa-wallet"></i>Wallet</a>
    </footer>

  <script>
        const MAIN_SUPER_ADMIN = "SMAT100001"; 
        const MAX_MESSAGES = 250;
        let user = getMyInfo();
        let messages = JSON.parse(localStorage.getItem('smat_messages')) || [];

        function getMyInfo() {
            const id = localStorage.getItem('smatID') || "SMAT100001"; 
            let role = "USER";
            const admins = JSON.parse(localStorage.getItem('smat_admins')) || [];
            if (id === MAIN_SUPER_ADMIN) role = "SUPER_ADMIN";
            else if (admins.includes(id)) role = "ADMIN";
            return { id, role };
        }

        async function translateToEnglish(text) {
            if(!/[a-zA-Z]/.test(text)) return "[EN] " + text + " (Translated)"; 
            return text;
        }

        function updateTimers() {
            const now = new Date();
            const utc = now.getTime() + (now.getTimezoneOffset() * 60000);
            const bdTime = new Date(utc + (3600000 * 6));
            const hours = bdTime.getHours();
            const minutes = bdTime.getMinutes();
            const seconds = bdTime.getSeconds();
            const currentTime = hours * 60 + minutes;

            const schedules = [{ start: 3*60+40, end: 3*60+50 }, { start: 7*60+50, end: 8*60 }, { start: 14*60+50, end: 15*60 }, { start: 19*60+50, end: 20*60 }];

            let active = schedules.some(s => currentTime >= s.start && currentTime < s.end);
            const timerDiv = document.getElementById('jojoTimer');
            if (active) {
                timerDiv.style.display = 'block';
                document.getElementById('jojoClock').innerText = bdTime.toLocaleTimeString([], {hour: '2-digit', minute:'2-digit', second:'2-digit', hour12: true});
            } else { timerDiv.style.display = 'none'; }

            const targetHours = [8, 14, 20, 2];
            const bubble = document.getElementById('s-bubble');
            const currentSlotID = `${bdTime.getDate()}-${hours}`;
            const lastClaimedSlot = localStorage.getItem('lastClaimedSlot');

            if (targetHours.includes(hours) && minutes === 0 && lastClaimedSlot !== currentSlotID) {
                if (seconds < 15) { if (bubble.style.display !== 'block') showBubble(); } else { hideBubble(); }
            } else { if (bubble.style.display === 'block' && (minutes > 0 || seconds >= 15)) hideBubble(); }
        }
        setInterval(updateTimers, 1000);

        function showBubble() { const b = document.getElementById('s-bubble'); b.style.top = "30%"; b.style.left = "10%"; b.style.display = 'block'; }
        function hideBubble() { document.getElementById('s-bubble').style.display = 'none'; }

        function popBubble() {
            let currentDailyBet = parseFloat(localStorage.getItem('dailyTotalBet')) || 0;
            if (currentDailyBet >= 500) {
                const now = new Date(); hideBubble();
                let currentBal = parseFloat(localStorage.getItem('smat_balance')) || 0;
                localStorage.setItem('smat_balance', (currentBal + 1.0).toFixed(6));
                document.getElementById('pop-msg').style.display = 'block';
                setTimeout(() => { document.getElementById('pop-msg').style.display = 'none'; }, 3000);
            } else { alert("Requirement: 500 SMAT Daily Betting!"); }
        }

        function deleteMessage(mid) {
            if (user.role === 'ADMIN' || user.role === 'SUPER_ADMIN') {
                if (confirm("Delete?")) {
                    messages = messages.filter(m => m.mid !== mid);
                    localStorage.setItem('smat_messages', JSON.stringify(messages));
                    renderChat();
                }
            }
        }

        function openLeaderboard() {
            const winners = [{id: "SMAT982341", profit: 1250.50},{id: "SMAT129384", profit: 980.20}];
            document.getElementById('leaderboardBody').innerHTML = winners.map((w, i) => `<div style="display:flex; justify-content:space-between; padding:10px; border-bottom:1px solid #333;"><div style="color:var(--primary);">#${i+1}</div><div>${w.id}</div><div style="color:var(--admin-color);">$${w.profit}</div></div>`).join('');
            openModal('leaderboardModal');
        }

        function getCoinBalance(coin) { return parseFloat(localStorage.getItem(`${coin}_balance`)) || 0.00; }
        function updateCoinBalance(coin, amount) { localStorage.setItem(`${coin}_balance`, (getCoinBalance(coin) + amount).toFixed(6)); }

        function openSpecial(type) {
            currentSpecialType = type;
            document.getElementById('specialModalTitle').innerHTML = type === 'RAIN' ? '🌧️ Asset Rain' : '💧 Asset Drop';
            openModal('rainModal');
        }

        function processSpecial() {
            const amount = parseFloat(document.getElementById('specialAmount').value);
            const count = parseInt(document.getElementById('specialUsers').value);
            closeModal('rainModal');
            sendSystemMessage(`${currentSpecialType}: ${amount} Asset shared!`);
        }

        function sendSystemMessage(text) {
            messages.push({ mid: Date.now().toString(), id: "SYSTEM", text, time: new Date().toLocaleTimeString(), isSpecial: true });
            localStorage.setItem('smat_messages', JSON.stringify(messages.slice(-MAX_MESSAGES)));
            renderChat();
        }

        function renderChat() {
            const container = document.getElementById('chatDisplay');
            container.innerHTML = '';
            const admins = JSON.parse(localStorage.getItem('smat_admins')) || [];
            messages.forEach(msg => {
                container.innerHTML += `
                    <div class="msg-row">
                        <div class="avatar" style="background:#444">${msg.id[0]}</div>
                        <div class="msg-content">
                            <div class="user-meta">
                                <span class="user-name">${msg.id}</span> 
                                <span class="timestamp">${msg.time}</span>
                            </div>
                            <div class="bubble ${msg.isSpecial ? 'special-msg' : ''}" oncontextmenu="deleteMessage('${msg.mid}'); return false;">
                                ${msg.text}
                            </div>
                        </div>
                    </div>`;
            });
            container.scrollTop = container.scrollHeight;
        }

        async function sendMessage() {
            const input = document.getElementById('messageInput');
            let rawText = input.value.trim();
            if(!rawText) return;
            let translatedText = await translateToEnglish(rawText);
            messages.push({ mid: Date.now().toString(), id: user.id, text: translatedText, time: new Date().toLocaleTimeString() });
            localStorage.setItem('smat_messages', JSON.stringify(messages.slice(-MAX_MESSAGES)));
            input.value = '';
            renderChat();
        }

        function openModal(id) { document.getElementById(id).style.display = 'flex'; }
        function closeModal(id) { document.getElementById(id).style.display = 'none'; }

        window.onload = () => {
            if (user.id === MAIN_SUPER_ADMIN) {
                document.getElementById('superAdminBtn').style.display = 'block';
                document.getElementById('banListBtn').style.display = 'block';
            }
            renderChat();
        };

        document.getElementById('messageInput').addEventListener("keypress", (e) => { if(e.key === "Enter") sendMessage(); });
    </script>
</body>
</html>
