<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover, interactive-widget=resizes-content">
    <title>SMAT | Global Chat</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root {
            --primary: #f3ba2f; --bg: #0b0e11; --card-bg: #1e2329;
            --chat-bubble: #2b3139; --text-main: #ffffff; --text-sec: #848e9c;
            --admin-color: #0ecb81; --super-admin: #f0b90b; --danger: #f6465d;
            --mention-green: #0ecb81; --gold: #ffd700; --rain-blue: #00d2ff; --drop-cyan: #00ffcc;
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; margin: 0; padding: 0; }
        
        body {
            background: var(--bg); color: var(--text-main);
            font-family: 'Inter', sans-serif;
            display: flex; flex-direction: column; 
            height: 100vh; height: 100dvh; 
            overflow: hidden; width: 100%;
            position: fixed; /* এটি স্ক্রিনকে এক জায়গায় আটকে রাখবে */
        }

        /* পিন নোটিশ */
        #pinnedNotice {
            background: #1e2329; border-bottom: 1px solid var(--primary);
            padding: 8px 15px; display: none; align-items: center; 
            gap: 10px; z-index: 101; flex-shrink: 0; cursor: pointer;
        }

        .chat-header {
            padding: 12px 15px; background: var(--card-bg); border-bottom: 2px solid var(--primary);
            display: flex; justify-content: space-between; align-items: center; 
            z-index: 100; flex-shrink: 0;
        }

        #chatDisplay {
            flex: 1; overflow-y: auto; padding: 15px;
            display: flex; flex-direction: column;
            gap: 15px; background: linear-gradient(to bottom, #0b0e11, #161a1e);
            -webkit-overflow-scrolling: touch;
        }

        /* ইনপুট এরিয়া ফিক্সড রাখার জন্য গুরুত্বপূর্ণ অংশ */
        .input-area {
            padding: 10px 15px; background: var(--card-bg); 
            border-top: 1px solid var(--chat-bubble); flex-shrink: 0;
            z-index: 100; 
            /* মোবাইলের নিচের নেভিগেশন বারের উপরে রাখার জন্য padding */
            padding-bottom: calc(10px + env(safe-area-inset-bottom));
        }

        .input-box-wrapper { display: flex; gap: 8px; align-items: center; width: 100%; }
        .input-container {
            flex: 1; display: flex; background: #181a20; border-radius: 25px; 
            padding: 0 10px; align-items: center; border: 1px solid #363c44;
        }
        #messageInput {
            width: 100%; background: transparent; border: none; padding: 10px 5px;
            color: white; font-size: 16px; outline: none;
        }

        .send-btn {
            background: var(--primary); border: none; width: 42px; height: 42px;
            border-radius: 12px; color: #000; cursor: pointer; flex-shrink: 0;
        }

        /* ইমেজের জন্য স্টাইল */
        .chat-image { max-width: 200px; border-radius: 8px; margin-top: 5px; display: block; }
        
        /* আগের সব মোডাল স্টাইল এখানে থাকবে... */
        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); z-index: 5000; justify-content: center; align-items: center; }
        .modal-box { background: var(--card-bg); padding: 20px; border-radius: 15px; width: 90%; max-width: 380px; border: 1px solid var(--primary); }
    </style>
</head>
<body>

    <div id="pinnedNotice" onclick="scrollToPinned()">
        <i class="fa-solid fa-thumbtack" style="color:var(--primary)"></i>
        <div id="pinnedContent" style="font-size:12px; flex:1; white-space:nowrap; overflow:hidden; text-overflow:ellipsis;">No pinned message</div>
    </div>

    <div class="chat-header">
        <div class="header-title" style="color:var(--primary); font-weight:900;">Global 💬</div>
        <div style="display:flex; gap:10px;">
            <i class="fa-solid fa-crown" style="color:var(--gold)" onclick="openLeaderboard()"></i>
            <a href="home.html" style="color:var(--text-sec)"><i class="fa-solid fa-circle-xmark"></i></a>
        </div>
    </div>

    <div id="chatDisplay"></div>

    <div class="input-area">
        <div class="input-box-wrapper">
            <div class="special-tools">
                <i class="fa-solid fa-image" style="color:#848e9c; font-size:18px;" onclick="document.getElementById('imageInput').click()"></i>
                <input type="file" id="imageInput" style="display:none;" accept="image/*" onchange="handleImage(this)">
            </div>
            <div class="input-container">
                <input type="text" id="messageInput" placeholder="Write a message..." autocomplete="off">
            </div>
            <button class="send-btn" onclick="sendMessage()"><i class="fa-solid fa-paper-plane"></i></button>
        </div>
    </div>

    <script type="module">
        // Firebase Configuration (আপনার আগের ফাইল থেকে)
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getDatabase, ref, push, onValue, set, remove, limitToLast, query, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyAMxtJedkehhxJRMPZLjhpKHqneHEWsGlE",
            authDomain: "smat-exchange.firebaseapp.com",
            projectId: "smat-exchange",
            storageBucket: "smat-exchange.firebasestorage.app",
            messagingSenderId: "836334569396",
            appId: "1:836334569396:web:679effe640b3453412d4e1"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);
        const messagesRef = ref(db, "global_messages");

        let user = { id: localStorage.getItem('smatID') || "SMAT100001", role: "USER" };

        // ইমেজ হ্যান্ডলিং
        window.handleImage = function(input) {
            const file = input.files[0];
            if(file) {
                const reader = new FileReader();
                reader.onload = (e) => sendMessage(e.target.result);
                reader.readAsDataURL(file);
            }
        };

        // মেসেজ পাঠানোর ফাংশন (২য় কোডের ফিচারসহ)
        window.sendMessage = async function(imgData = null) {
            const input = document.getElementById('messageInput');
            let text = input.value.trim();
            if(!text && !imgData) return;
            
            push(messagesRef, {
                id: user.id,
                text: text,
                image: imgData,
                time: new Date().toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'}),
                timestamp: serverTimestamp()
            });
            input.value = '';
            document.getElementById('imageInput').value = '';
        }

        // চ্যাট রেন্ডারিং
        onValue(query(messagesRef, limitToLast(50)), (snap) => {
            const container = document.getElementById('chatDisplay');
            container.innerHTML = '';
            snap.forEach((child) => {
                const msg = child.val();
                container.innerHTML += `
                    <div class="msg-row" style="display:flex; gap:10px; margin-bottom:10px;">
                        <div class="bubble" style="background:var(--chat-bubble); padding:10px; border-radius:10px; max-width:85%;">
                            <div style="font-size:11px; color:var(--primary); font-weight:800;">${msg.id}</div>
                            ${msg.text ? `<div style="color:#fff;">${msg.text}</div>` : ''}
                            ${msg.image ? `<img src="${msg.image}" class="chat-image">` : ''}
                            <div style="font-size:9px; color:var(--text-sec); text-align:right;">${msg.time}</div>
                        </div>
                    </div>
                `;
            });
            container.scrollTop = container.scrollHeight;
        });

        // লেআউট ফিক্স (কিবোর্ড ওপেন হলেও বাটন উপরে থাকবে)
        function adjustLayout() {
            const vh = window.visualViewport ? window.visualViewport.height : window.innerHeight;
            document.body.style.height = vh + "px";
            window.scrollTo(0,0);
        }
        window.visualViewport?.addEventListener('resize', adjustLayout);
        window.onload = adjustLayout;

    </script>
</body>
</html>
