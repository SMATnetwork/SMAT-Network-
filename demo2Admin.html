<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SMAT CEX | অল-ইন-ওয়ান অ্যাডমিন প্যানেল</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        /* HOT Wallet Style Font & Colors */
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap');

        :root {
            --bg: #0b0e11; --card: #181a20; --border: #2b3139;
            --primary: #f0b90b; --up: #0ecb81; --down: #f6465d;
            --text-main: #ffffff; --text-muted: #848e9c;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Inter', sans-serif; }
        body { background: var(--bg); color: var(--text-main); min-height: 100vh; display: flex; flex-direction: column; padding-bottom: 80px; }

        /* --- Login Overlay --- */
        #loginOverlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: var(--bg); display: flex; justify-content: center; align-items: center; z-index: 9999; }
        .login-box { background: var(--card); padding: 40px; border-radius: 15px; width: 90%; max-width: 400px; border: 1px solid var(--border); text-align: center; }
        .login-box h2 { font-weight: 900; margin-bottom: 25px; color: var(--primary); }

        /* --- Header --- */
        .header { background: var(--card); padding: 15px 25px; border-bottom: 1px solid var(--border); display: flex; justify-content: space-between; align-items: center; position: sticky; top: 0; z-index: 100; }
        .logo-area { font-size: 20px; font-weight: 900; color: var(--primary); }
        .current-tab-title { font-size: 14px; color: white; background: #2b3139; padding: 5px 12px; border-radius: 20px; font-weight: 700; }

        /* --- Container & Cards --- */
        .container { max-width: 1000px; margin: 20px auto; padding: 0 15px; flex: 1; }
        .card { background: var(--card); border: 1px solid var(--border); padding: 20px; border-radius: 12px; margin-bottom: 20px; }
        .tab-content { display: none; animation: fadeIn 0.3s ease; }
        .tab-content.active { display: block; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        h2 { font-weight: 900; font-size: 17px; margin-bottom: 15px; color: var(--primary); display: flex; align-items: center; gap: 8px; }
        
        /* --- Inputs & Buttons --- */
        .grid-inputs { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 15px; }
        .input-group { margin-bottom: 12px; }
        label { display: block; font-size: 11px; color: var(--text-muted); margin-bottom: 5px; font-weight: 700; }
        input { width: 100%; padding: 12px; background: #0b0e11; border: 1px solid var(--border); color: white; border-radius: 8px; outline: none; font-weight: 600; }
        input:focus { border-color: var(--primary); }
        .btn-primary { background: var(--primary); color: #000; width: 100%; padding: 14px; border: none; border-radius: 8px; font-weight: 900; cursor: pointer; text-transform: uppercase; margin-top: 10px; }

        /* --- Table --- */
        .table-container { overflow-x: auto; }
        table { width: 100%; border-collapse: collapse; }
        th { text-align: left; color: var(--text-muted); padding: 12px; border-bottom: 1px solid var(--border); font-size: 11px; }
        td { padding: 12px; border-bottom: 1px solid #23272e; font-size: 13px; font-weight: 700; }
        .coin-icon { width: 28px; height: 28px; border-radius: 50%; vertical-align: middle; margin-right: 8px; }
        .btn-del { background: rgba(246, 70, 93, 0.1); color: var(--down); border: none; padding: 6px 10px; border-radius: 4px; font-weight: 700; cursor: pointer; }

        /* --- Universal Footer Navigation --- */
        .admin-footer { position: fixed; bottom: 0; left: 0; width: 100%; background: var(--card); border-top: 1px solid var(--border); display: grid; grid-template-columns: 1fr 1fr 1fr; padding: 10px 0; z-index: 1000; }
        .footer-item { background: none; border: none; color: var(--text-muted); display: flex; flex-direction: column; align-items: center; gap: 5px; cursor: pointer; transition: 0.3s; }
        .footer-item i { font-size: 18px; }
        .footer-item span { font-size: 10px; font-weight: 900; text-transform: uppercase; }
        .footer-item.active { color: var(--primary); }
    </style>
</head>
<body>

<div id="loginOverlay">
    <div class="login-box">
        <h2>SMAT ADMIN</h2>
        <input type="email" id="loginEmail" placeholder="ইমেইল" style="margin-bottom: 10px;">
        <input type="password" id="loginPass" placeholder="পাসওয়ার্ড" style="margin-bottom: 20px;">
        <button class="btn-primary" onclick="handleLogin()">লগইন করুন</button>
    </div>
</div>

<header class="header">
    <div class="logo-area">SMAT <span style="color:white">NETWORK</span></div>
    <div id="activeTabName" class="current-tab-title">PREDICTION</div>
    <i class="fas fa-sign-out-alt" onclick="handleLogout()" style="color:var(--down); cursor:pointer;"></i>
</header>

<div class="container">
    
    <div id="predictionSec" class="tab-content active">
        <div class="card">
            <h2><i class="fas fa-chart-line"></i> Prediction কয়েন যুক্ত করুন</h2>
            <div class="grid-inputs">
                <input type="text" id="preKey" placeholder="ID (btc)">
                <input type="text" id="preName" placeholder="Name (BTC/USDT)">
                <input type="text" id="preSymbol" placeholder="Binance Sym (btcusdt)">
                <input type="text" id="preLogo" placeholder="Logo (btc.png)">
                <input type="number" id="preRound" placeholder="Round ID">
            </div>
            <button class="btn-primary" onclick="addCoin('predictionAssets', 'pre')">সেভ করুন</button>
        </div>
        <div class="card">
            <h2>Active Prediction Coins</h2>
            <div class="table-container"><table><tbody id="preTable"></tbody></table></div>
        </div>
    </div>

    <div id="spotSec" class="tab-content">
        <div class="card">
            <h2><i class="fas fa-coins"></i> Spot কয়েন যুক্ত করুন</h2>
            <div class="grid-inputs">
                <input type="text" id="spotKey" placeholder="ID (btc)">
                <input type="text" id="spotName" placeholder="Name (Bitcoin)">
                <input type="text" id="spotSymbol" placeholder="Symbol (BTC)">
                <input type="text" id="spotLogo" placeholder="Logo (btc.png)">
            </div>
            <button class="btn-primary" onclick="addCoin('spotAssets', 'spot')">স্পট কয়েন সেভ করুন</button>
        </div>
        <div class="card">
            <h2>Active Spot Coins</h2>
            <div class="table-container"><table><tbody id="spotTable"></tbody></table></div>
        </div>
    </div>

    <div id="featureSec" class="tab-content">
        <div class="card">
            <h2><i class="fas fa-bolt"></i> Futures কয়েন যুক্ত করুন</h2>
            <div class="grid-inputs">
                <input type="text" id="featKey" placeholder="ID (eth)">
                <input type="text" id="featName" placeholder="Pair (ETHUSDT)">
                <input type="text" id="featSymbol" placeholder="Sym (ethusdt)">
                <input type="text" id="featLogo" placeholder="Logo (eth.png)">
            </div>
            <button class="btn-primary" onclick="addCoin('featureAssets', 'feat')">ফিউচার কয়েন সেভ করুন</button>
        </div>
        <div class="card">
            <h2>Active Futures Coins</h2>
            <div class="table-container"><table><tbody id="featTable"></tbody></table></div>
        </div>
    </div>

</div>

<footer class="admin-footer">
    <button class="footer-item active" onclick="switchTab('prediction', this)">
        <i class="fas fa-clock"></i><span>Prediction</span>
    </button>
    <button class="footer-item" onclick="switchTab('spot', this)">
        <i class="fas fa-layer-group"></i><span>Spot</span>
    </button>
    <button class="footer-item" onclick="switchTab('feature', this)">
        <i class="fas fa-bolt"></i><span>Feature</span>
    </button>
</footer>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getDatabase, ref, set, onValue, remove, update } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";
    import { getAuth, signInWithEmailAndPassword, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

    const firebaseConfig = {
        apiKey: "AIzaSyAMxtJedkehhxJRMPZLjhpKHqneHEWsGlE",
        authDomain: "smat-exchange.firebaseapp.com",
        databaseURL: "https://smat-exchange-default-rtdb.firebaseio.com",
        projectId: "smat-exchange",
        appId: "1:836334569396:web:679effe640b3453412d4e1"
    };

    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app);
    const auth = getAuth(app);

    // --- Tab Switcher ---
    window.switchTab = (tab, btn) => {
        document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
        document.querySelectorAll('.footer-item').forEach(i => i.classList.remove('active'));
        document.getElementById(tab + 'Sec').classList.add('active');
        btn.classList.add('active');
        document.getElementById('activeTabName').innerText = tab.toUpperCase();
    };

    // --- Auth ---
    window.handleLogin = () => {
        const e = document.getElementById('loginEmail').value;
        const p = document.getElementById('loginPass').value;
        signInWithEmailAndPassword(auth, e, p).catch(() => alert("ভুল তথ্য!"));
    };
    window.handleLogout = () => signOut(auth);

    onAuthStateChanged(auth, (user) => {
        if (user) {
            document.getElementById('loginOverlay').style.display = 'none';
            syncAllData();
        } else {
            document.getElementById('loginOverlay').style.display = 'flex';
        }
    });

    // --- Data Management ---
    window.addCoin = (path, prefix) => {
        const key = document.getElementById(prefix+'Key').value.toLowerCase().trim();
        const data = {
            name: document.getElementById(prefix+'Name').value,
            symbol: document.getElementById(prefix+'Symbol').value.toLowerCase(),
            logo: document.getElementById(prefix+'Logo').value,
            unit: key.toUpperCase()
        };
        if(prefix === 'pre') data.round = parseInt(document.getElementById('preRound').value);

        set(ref(db, `${path}/${key}`), data).then(() => {
            if(prefix === 'pre') update(ref(db, 'roundLogic'), {[key]: data.round});
            alert("সফলভাবে সেভ হয়েছে!");
        });
    };

    window.deleteCoin = (path, key) => {
        if(confirm("ডিলিট করতে চান?")) remove(ref(db, `${path}/${key}`));
    };

    function syncAllData() {
        const paths = { predictionAssets: 'preTable', spotAssets: 'spotTable', featureAssets: 'featTable' };
        Object.entries(paths).forEach(([path, tableId]) => {
            onValue(ref(db, path), (snap) => {
                const data = snap.val();
                const tbody = document.getElementById(tableId);
                tbody.innerHTML = "";
                if(data) Object.entries(data).forEach(([key, val]) => {
                    tbody.innerHTML += `<tr>
                        <td><img src="assets/logos/${val.logo}" class="coin-icon"> ${val.name}</td>
                        <td>${val.symbol}</td>
                        <td><button class="btn-del" onclick="deleteCoin('${path}', '${key}')">ডিলিট</button></td>
                    </tr>`;
                });
            });
        });
    }
</script>
</body>
</html>
