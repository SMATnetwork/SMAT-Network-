<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SMAT CEX | ওমনি অ্যাডমিন প্যানেল</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap');

        :root {
            --bg: #0b0e11; --card: #181a20; --border: #2b3139;
            --primary: #f0b90b; --up: #0ecb81; --down: #f6465d;
            --text-main: #ffffff; --text-muted: #848e9c;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Inter', sans-serif; }

        body { 
            background: var(--bg); color: var(--text-main); height: 100vh; width: 100vw;
            display: flex; flex-direction: column; overflow: hidden; margin: 0;
        }

        /* --- ফিক্সড হেডার --- */
        .header { 
            background: var(--card); padding: 0 20px; border-bottom: 1px solid var(--border); 
            display: flex; justify-content: space-between; align-items: center; 
            height: 65px; flex-shrink: 0; z-index: 1000;
        }
        .logo-area { font-size: 20px; font-weight: 900; color: var(--primary); letter-spacing: -1px; }

        /* --- স্ক্রলেবল মেইন কন্টেইনার --- */
        .main-content { 
            flex: 1; overflow-y: auto; padding: 15px; 
            -webkit-overflow-scrolling: touch; background: #000;
        }

        .card { background: var(--card); border: 1px solid var(--border); padding: 18px; border-radius: 15px; margin-bottom: 20px; }
        h2 { font-weight: 900; font-size: 15px; margin-bottom: 15px; color: var(--primary); display: flex; align-items: center; gap: 8px; text-transform: uppercase; }

        /* গ্রিড ইনপুট সিস্টেম */
        .grid-inputs { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
        .full-row { grid-column: span 2; }
        .input-group { margin-bottom: 5px; }
        label { display: block; font-size: 9px; color: var(--text-muted); margin-bottom: 5px; font-weight: 900; text-transform: uppercase; }
        input { width: 100%; padding: 12px; background: #0b0e11; border: 1px solid var(--border); color: white; border-radius: 8px; outline: none; font-size: 13px; font-weight: 700; }
        input:focus { border-color: var(--primary); }

        .btn-main { background: var(--primary); color: #000; width: 100%; padding: 15px; border: none; border-radius: 10px; font-weight: 900; cursor: pointer; text-transform: uppercase; font-size: 14px; margin-top: 15px; transition: 0.2s; }
        .btn-main:active { transform: scale(0.98); opacity: 0.9; }

        /* --- ফিক্সড ফুটার --- */
        .admin-footer { 
            background: var(--card); border-top: 1px solid var(--border); 
            display: grid; grid-template-columns: 1fr 1fr 1fr; 
            height: 75px; flex-shrink: 0; z-index: 1000;
        }
        .footer-item { background: none; border: none; color: var(--text-muted); display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 5px; cursor: pointer; }
        .footer-item i { font-size: 18px; }
        .footer-item span { font-size: 10px; font-weight: 900; text-transform: uppercase; }
        .footer-item.active { color: var(--primary); border-top: 3px solid var(--primary); background: rgba(240, 185, 11, 0.05); }

        /* এসেট লিস্ট টেবিল */
        table { width: 100%; border-collapse: collapse; margin-top: 10px; }
        td { padding: 12px 0; border-bottom: 1px solid #23272e; font-size: 13px; font-weight: 900; }
        .coin-info { display: flex; align-items: center; gap: 10px; }
        .coin-icon { width: 28px; height: 28px; border-radius: 50%; background: #2b3139; object-fit: cover; }
        .btn-del { color: var(--down); background: transparent; border: 1px solid var(--down); padding: 5px 8px; border-radius: 5px; cursor: pointer; font-weight: 900; font-size: 10px; }

        .tab-content { display: none; }
        .tab-content.active { display: block; }
    </style>
</head>
<body>

<header class="header">
    <div class="logo-area">SMAT <span style="color:white">NETWORK</span></div>
    <div style="font-size: 10px; font-weight: 900; background: #2b3139; padding: 4px 10px; border-radius: 5px;">MAINNET 1.0</div>
</header>

<div class="main-content">
    
    <div id="spotSec" class="tab-content active">
        <div class="card">
            <h2><i class="fas fa-coins"></i> লঞ্চ স্পট এসেট</h2>
            <div class="grid-inputs">
                <div class="input-group"><label>Asset Symbol (BTC)</label><input type="text" id="sSym" placeholder="btc"></div>
                <div class="input-group"><label>Full Name</label><input type="text" id="sName" placeholder="Bitcoin"></div>
                <div class="input-group"><label>Listing Price ($)</label><input type="number" id="sPrice" placeholder="65000"></div>
                <div class="input-group"><label>Decimal</label><input type="number" id="sDec" placeholder="8"></div>
                <div class="full-row input-group"><label>Contract Address</label><input type="text" id="sCon" placeholder="0x... or Native"></div>
                <div class="full-row input-group"><label>Support Networks (Comma separated)</label><input type="text" id="sNet" placeholder="BEP20, ERC20, TRC20"></div>
                <div class="full-row input-group"><label>Logo Image File</label><input type="text" id="sLogo" placeholder="btc.png"></div>
            </div>
            <button class="btn-main" onclick="saveData('spotAssets', 's')">অ্যাড স্পট মার্কেট</button>
        </div>
        <div class="card">
            <h2>Active Spot Assets</h2>
            <table><tbody id="spotTable"></tbody></table>
        </div>
    </div>

    <div id="predictionSec" class="tab-content">
        <div class="card">
            <h2><i class="fas fa-chart-line"></i> প্রিডিকশন লিস্টিং</h2>
            <div class="grid-inputs">
                <div class="input-group"><label>Unit ID</label><input type="text" id="pID" placeholder="eth"></div>
                <div class="input-group"><label>Binance Symbol</label><input type="text" id="pBin" placeholder="ethusdt"></div>
                <div class="full-row input-group"><label>Pair Name</label><input type="text" id="pName" placeholder="ETH/USDT"></div>
                <div class="input-group"><label>Initial Round</label><input type="number" id="pRound" placeholder="10001"></div>
                <div class="input-group"><label>Logo File</label><input type="text" id="pLogo" placeholder="eth.png"></div>
            </div>
            <button class="btn-main" onclick="saveData('predictionAssets', 'p')">অ্যাড প্রিডিকশন মার্কেট</button>
        </div>
        <div class="card">
            <h2>Active Predictions</h2>
            <table><tbody id="preTable"></tbody></table>
        </div>
    </div>

    <div id="featureSec" class="tab-content">
        <div class="card">
            <h2><i class="fas fa-bolt"></i> ফিউচার এসেট লঞ্চার</h2>
            <div class="grid-inputs">
                <div class="input-group"><label>Asset ID</label><input type="text" id="fID" placeholder="sol"></div>
                <div class="input-group"><label>Max Leverage</label><input type="number" id="fLev" placeholder="50"></div>
                <div class="full-row input-group"><label>Pair Name</label><input type="text" id="fName" placeholder="SOLUSDT"></div>
                <div class="full-row input-group"><label>Logo File</label><input type="text" id="fLogo" placeholder="sol.png"></div>
            </div>
            <button class="btn-main" onclick="saveData('featureAssets', 'f')">অ্যাড ফিউচার মার্কেট</button>
        </div>
        <div class="card">
            <h2>Active Futures</h2>
            <table><tbody id="featTable"></tbody></table>
        </div>
    </div>

</div>

<footer class="admin-footer">
    <button class="footer-item active" onclick="switchTab('spot', this)">
        <i class="fas fa-wallet"></i><span>Spot</span>
    </button>
    <button class="footer-item" onclick="switchTab('prediction', this)">
        <i class="fas fa-chart-line"></i><span>Prediction</span>
    </button>
    <button class="footer-item" onclick="switchTab('feature', this)">
        <i class="fas fa-bolt"></i><span>Future</span>
    </button>
</footer>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getDatabase, ref, set, onValue, remove, update } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

    const firebaseConfig = {
        apiKey: "AIzaSyAMxtJedkehhxJRMPZLjhpKHqneHEWsGlE",
        authDomain: "smat-exchange.firebaseapp.com",
        databaseURL: "https://smat-exchange-default-rtdb.firebaseio.com",
        projectId: "smat-exchange",
        appId: "1:836334569396:web:679effe640b3453412d4e1"
    };

    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app);

    window.switchTab = (tab, btn) => {
        document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
        document.querySelectorAll('.footer-item').forEach(i => i.classList.remove('active'));
        document.getElementById(tab + 'Sec').classList.add('active');
        btn.classList.add('active');
    };

    window.saveData = (path, pre) => {
        const id = document.getElementById(pre+'ID' || pre+'Sym').value.toLowerCase().trim();
        if(!id) return alert("ID/Symbol দিন!");

        let data = {};
        if(pre === 's') {
            data = {
                sym: id, name: document.getElementById('sName').value,
                price: parseFloat(document.getElementById('sPrice').value) || 0,
                decimal: parseInt(document.getElementById('sDec').value) || 8,
                contract: document.getElementById('sCon').value,
                networks: document.getElementById('sNet').value.split(',').map(n => n.trim()),
                logo: document.getElementById('sLogo').value,
                key: id + "_balance"
            };
        } else if(pre === 'p') {
            data = {
                unit: id.toUpperCase(), name: document.getElementById('pName').value,
                symbol: document.getElementById('pBin').value.toLowerCase(),
                logo: document.getElementById('pLogo').value,
                round: parseInt(document.getElementById('pRound').value) || 0
            };
        } else {
            data = {
                unit: id.toUpperCase(), name: document.getElementById('fName').value,
                logo: document.getElementById('fLogo').value,
                lev: document.getElementById('fLev').value
            };
        }

        set(ref(db, path + '/' + id), data).then(() => {
            if(pre === 'p') update(ref(db, 'roundLogic'), {[id]: data.round});
            alert("সফলভাবে লঞ্চ হয়েছে!");
        });
    };

    window.del = (path, id) => { if(confirm("মুছে ফেলবেন?")) remove(ref(db, path+'/'+id)); };

    function sync() {
        const conf = { spotAssets: 'spotTable', predictionAssets: 'preTable', featureAssets: 'featTable' };
        Object.entries(conf).forEach(([path, tID]) => {
            onValue(ref(db, path), (snap) => {
                const data = snap.val();
                const tbody = document.getElementById(tID);
                tbody.innerHTML = "";
                if(data) Object.entries(data).forEach(([key, val]) => {
                    const logo = val.logo ? `assets/logos/${val.logo}` : 'https://via.placeholder.com/28';
                    tbody.innerHTML += `<tr>
                        <td>
                            <div class="coin-info">
                                <img src="${logo}" class="coin-icon" onerror="this.src='https://via.placeholder.com/28'">
                                <div>${val.name || val.unit} <br><small style="color:var(--text-muted)">${key.toUpperCase()}</small></div>
                            </div>
                        </td>
                        <td style="color:var(--primary)">${val.price ? '$'+val.price : (val.lev ? val.lev+'x' : 'Active')}</td>
                        <td style="text-align:right;"><button class="btn-del" onclick="del('${path}','${key}')">REMOVE</button></td>
                    </tr>`;
                });
            });
        });
    }
    sync();
</script>
</body>
</html>
