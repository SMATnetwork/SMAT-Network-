<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SMAT CEX | ওমনি অ্যাডমিন প্যানেল</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        /* HOT Wallet Style Font */
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap');

        :root {
            --bg: #0b0e11; --card: #181a20; --border: #2b3139;
            --primary: #f0b90b; --up: #0ecb81; --down: #f6465d;
            --text-main: #ffffff; --text-muted: #848e9c;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Inter', sans-serif; }

        /* বডিকে পুরো স্ক্রিন জুড়ে ফিক্সড করা হয়েছে */
        body { 
            background: var(--bg); 
            color: var(--text-main); 
            height: 100vh; 
            width: 100vw;
            display: flex; 
            flex-direction: column; 
            overflow: hidden; /* বডি নিজে স্ক্রল হবে না */
            margin: 0;
        }

        /* হেডার ফিক্সড */
        .header { 
            background: var(--card); 
            padding: 0 20px; 
            border-bottom: 1px solid var(--border); 
            display: flex; 
            justify-content: space-between; 
            align-items: center; 
            height: 60px; 
            flex-shrink: 0;
            z-index: 1000;
        }
        .logo-area { font-size: 18px; font-weight: 900; color: var(--primary); letter-spacing: -1px; }

        /* মাঝখানের কন্টেন্ট এরিয়া - এটি স্ক্রল হবে */
        .main-container { 
            flex: 1; 
            overflow-y: auto; 
            padding: 15px;
            -webkit-overflow-scrolling: touch;
        }

        .card { background: var(--card); border: 1px solid var(--border); padding: 15px; border-radius: 12px; margin-bottom: 15px; }
        h2 { font-weight: 900; font-size: 14px; margin-bottom: 12px; color: var(--primary); display: flex; align-items: center; gap: 8px; }

        /* ইনপুট গ্রিড */
        .grid-inputs { display: grid; grid-template-columns: repeat(auto-fit, minmax(140px, 1fr)); gap: 10px; }
        .input-group { margin-bottom: 8px; }
        label { display: block; font-size: 9px; color: var(--text-muted); margin-bottom: 4px; font-weight: 900; text-transform: uppercase; }
        input { width: 100%; padding: 10px; background: #000; border: 1px solid var(--border); color: white; border-radius: 6px; outline: none; font-size: 12px; }
        
        .btn-main { background: var(--primary); color: #000; width: 100%; padding: 12px; border: none; border-radius: 8px; font-weight: 900; cursor: pointer; text-transform: uppercase; font-size: 13px; margin-top: 10px; }

        /* ফুটার ফিক্সড - একদম নিচে আটকে থাকবে */
        .admin-footer { 
            background: var(--card); 
            border-top: 1px solid var(--border); 
            display: grid; 
            grid-template-columns: 1fr 1fr 1fr; 
            height: 70px; 
            flex-shrink: 0;
            z-index: 1000;
            padding-bottom: env(safe-area-inset-bottom); /* আইফোনের জন্য */
        }
        .footer-item { background: none; border: none; color: var(--text-muted); display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 4px; cursor: pointer; }
        .footer-item i { font-size: 18px; }
        .footer-item span { font-size: 9px; font-weight: 900; text-transform: uppercase; }
        .footer-item.active { color: var(--primary); }

        /* টেবিল স্টাইল */
        table { width: 100%; border-collapse: collapse; }
        td { padding: 10px 0; border-bottom: 1px solid #23272e; font-size: 12px; font-weight: 700; }
        .coin-icon { width: 24px; height: 24px; border-radius: 50%; vertical-align: middle; margin-right: 8px; background: #2b3139; }
        .btn-del { color: var(--down); border: 1px solid var(--down); padding: 4px 8px; border-radius: 4px; font-size: 10px; cursor: pointer; background: transparent; }

        .tab-content { display: none; }
        .tab-content.active { display: block; }
    </style>
</head>
<body>

<header class="header">
    <div class="logo-area">SMAT <span style="color:white">NETWORK</span></div>
    <div style="font-size: 10px; font-weight: 900; background: #2b3139; padding: 4px 8px; border-radius: 4px;">ADMIN</div>
</header>

<div class="main-container">
    <div id="spotSec" class="tab-content active">
        <div class="card">
            <h2><i class="fas fa-plus-circle"></i> লঞ্চ স্পট এসেট</h2>
            <div class="grid-inputs">
                <div class="input-group"><label>Asset ID</label><input type="text" id="sID" placeholder="btc"></div>
                <div class="input-group"><label>Name</label><input type="text" id="sName" placeholder="Bitcoin"></div>
                <div class="input-group"><label>Price ($)</label><input type="number" id="sPrice" placeholder="65000"></div>
                <div class="input-group"><label>Decimal</label><input type="number" id="sDec" placeholder="8"></div>
                <div class="input-group"><label>Volume</label><input type="text" id="sVol" placeholder="1.2B"></div>
                <div class="input-group"><label>Logo File</label><input type="text" id="sLogo" placeholder="btc.png"></div>
            </div>
            <button class="btn-main" onclick="saveData('spotAssets', 's')">সেভ এন্ড লাইভ</button>
        </div>
        <div class="card">
            <h2>সচল এসেট লিস্ট</h2>
            <table><tbody id="spotTable"></tbody></table>
        </div>
    </div>

    <div id="predictionSec" class="tab-content">
        <div class="card">
            <h2><i class="fas fa-chart-line"></i> প্রিডিকশন কয়েন</h2>
            <div class="grid-inputs">
                <div class="input-group"><label>Unit ID</label><input type="text" id="pID" placeholder="eth"></div>
                <div class="input-group"><label>Pair Name</label><input type="text" id="pName" placeholder="ETH/USDT"></div>
                <div class="input-group"><label>Logo File</label><input type="text" id="pLogo" placeholder="eth.png"></div>
            </div>
            <button class="btn-main" onclick="saveData('predictionAssets', 'p')">লঞ্চ প্রিডিকশন</button>
        </div>
        <div class="card">
            <table><tbody id="preTable"></tbody></table>
        </div>
    </div>

    <div id="featureSec" class="tab-content">
        <div class="card">
            <h2><i class="fas fa-bolt"></i> ফিউচার মার্কেট</h2>
            <div class="grid-inputs">
                <div class="input-group"><label>ID</label><input type="text" id="fID" placeholder="sol"></div>
                <div class="input-group"><label>Pair</label><input type="text" id="fName" placeholder="SOLUSDT"></div>
                <div class="input-group"><label>Logo</label><input type="text" id="fLogo" placeholder="sol.png"></div>
            </div>
            <button class="btn-main" onclick="saveData('featureAssets', 'f')">লঞ্চ ফিউচার</button>
        </div>
        <div class="card">
            <table><tbody id="featTable"></tbody></table>
        </div>
    </div>
</div>

<footer class="admin-footer">
    <button class="footer-item active" onclick="switchTab('spot', this)">
        <i class="fas fa-wallet"></i><span>Spot</span>
    </button>
    <button class="footer-item" onclick="switchTab('prediction', this)">
        <i class="fas fa-clock"></i><span>Prediction</span>
    </button>
    <button class="footer-item" onclick="switchTab('feature', this)">
        <i class="fas fa-bolt"></i><span>Feature</span>
    </button>
</footer>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getDatabase, ref, set, onValue, remove } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

    const firebaseConfig = {
        apiKey: "AIzaSyAMxtJedkehhxJRMPZLjhpKHqneHEWsGlE",
        authDomain: "smat-exchange.firebaseapp.com",
        databaseURL: "https://smat-exchange-default-rtdb.firebaseio.com",
        projectId: "smat-exchange",
        appId: "1:836334569396:web:679effe640b3453412d4e1"
    };

    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app);

    window.switchTab = (tab, btn) => {
        document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
        document.querySelectorAll('.footer-item').forEach(i => i.classList.remove('active'));
        document.getElementById(tab + 'Sec').classList.add('active');
        btn.classList.add('active');
    };

    window.saveData = (path, pre) => {
        const id = document.getElementById(pre+'ID').value.toLowerCase().trim();
        if(!id) return alert("ID দিন!");
        
        let data = {
            name: document.getElementById(pre+'Name').value,
            logo: document.getElementById(pre+'Logo').value,
            unit: id.toUpperCase()
        };
        
        if(pre === 's') {
            data.price = document.getElementById('sPrice').value;
            data.decimal = document.getElementById('sDec').value;
            data.vol = document.getElementById('sVol').value;
        }

        set(ref(db, path + '/' + id), data).then(() => alert("সেভ হয়েছে!"));
    };

    window.del = (path, id) => { if(confirm("মুছে ফেলবেন?")) remove(ref(db, path+'/'+id)); };

    function sync() {
        const sections = { spotAssets: 'spotTable', predictionAssets: 'preTable', featureAssets: 'featTable' };
        Object.entries(sections).forEach(([path, tID]) => {
            onValue(ref(db, path), (snap) => {
                const data = snap.val();
                const tbody = document.getElementById(tID);
                tbody.innerHTML = "";
                if(data) Object.entries(data).forEach(([key, val]) => {
                    tbody.innerHTML += `<tr>
                        <td><img src="assets/logos/${val.logo}" class="coin-icon"> ${val.unit}</td>
                        <td>${val.price ? '$'+val.price : 'সচল'}</td>
                        <td style="text-align:right;"><button class="btn-del" onclick="del('${path}','${key}')">DEL</button></td>
                    </tr>`;
                });
            });
        });
    }
    sync();
</script>
</body>
</html>
