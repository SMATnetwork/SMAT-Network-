<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SMAT CEX | ওমনি অ্যাডমিন প্যানেল</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        /* HOT Wallet Style Font (Inter 900) */
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap');

        :root {
            --bg: #0b0e11; --card: #181a20; --border: #2b3139;
            --primary: #f0b90b; --up: #0ecb81; --down: #f6465d;
            --text-main: #ffffff; --text-muted: #848e9c;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Inter', sans-serif; }

        body { 
            background: var(--bg); 
            color: var(--text-main); 
            height: 100vh; 
            display: flex; 
            flex-direction: column; 
            overflow: hidden; 
            margin: 0;
        }

        /* --- লগইন স্ক্রিন --- */
        #loginOverlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: var(--bg); display: flex; justify-content: center; align-items: center; z-index: 9999; }
        .login-box { background: var(--card); padding: 40px; border-radius: 15px; width: 90%; max-width: 400px; border: 1px solid var(--border); text-align: center; }
        .login-box h2 { font-weight: 900; margin-bottom: 25px; color: var(--primary); font-size: 24px; }

        /* --- ফিক্সড হেডার --- */
        .header { 
            background: var(--card); 
            padding: 0 25px; 
            border-bottom: 1px solid var(--border); 
            display: flex; 
            justify-content: space-between; 
            align-items: center; 
            height: 65px; 
            flex-shrink: 0;
            z-index: 100;
        }
        .logo-area { font-size: 20px; font-weight: 900; color: var(--primary); letter-spacing: -1px; }
        .tab-indicator { font-size: 10px; color: white; background: #2b3139; padding: 4px 10px; border-radius: 4px; font-weight: 900; text-transform: uppercase; }

        /* --- স্ক্রলেবল কন্টেইনার --- */
        .container { 
            flex: 1; 
            overflow-y: auto; 
            padding: 20px;
            max-width: 1000px; 
            margin: 0 auto;
            width: 100%;
        }

        .tab-content { display: none; }
        .tab-content.active { display: block; animation: fadeIn 0.3s ease; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        .card { background: var(--card); border: 1px solid var(--border); padding: 20px; border-radius: 12px; margin-bottom: 20px; }
        h2 { font-weight: 900; font-size: 16px; margin-bottom: 15px; color: var(--primary); display: flex; align-items: center; gap: 8px; }

        /* --- ইনপুট স্টাইল --- */
        .grid-inputs { display: grid; grid-template-columns: repeat(auto-fit, minmax(180px, 1fr)); gap: 15px; }
        .input-group { margin-bottom: 10px; }
        label { display: block; font-size: 10px; color: var(--text-muted); margin-bottom: 5px; font-weight: 900; text-transform: uppercase; }
        input { width: 100%; padding: 12px; background: #0b0e11; border: 1px solid var(--border); color: white; border-radius: 8px; outline: none; font-weight: 700; font-size: 13px; }
        input:focus { border-color: var(--primary); }
        .btn-main { background: var(--primary); color: #000; width: 100%; padding: 15px; border: none; border-radius: 8px; font-weight: 900; cursor: pointer; text-transform: uppercase; margin-top: 10px; font-size: 14px; }

        /* --- টেবিল স্টাইল --- */
        .table-container { overflow-x: auto; }
        table { width: 100%; border-collapse: collapse; min-width: 500px; }
        th { text-align: left; color: var(--text-muted); padding: 12px; border-bottom: 1px solid var(--border); font-size: 10px; text-transform: uppercase; }
        td { padding: 12px; border-bottom: 1px solid #23272e; font-size: 13px; font-weight: 900; }
        .coin-icon { width: 30px; height: 30px; border-radius: 50%; object-fit: cover; background: #2b3139; }
        .btn-del { color: var(--down); border: 1px solid var(--down); padding: 6px; border-radius: 4px; font-size: 12px; cursor: pointer; background: transparent; transition: 0.3s; }
        .btn-del:hover { background: var(--down); color: white; }

        /* --- ফিক্সড ফুটার নেভিগেশন --- */
        .admin-footer { 
            background: var(--card); 
            border-top: 1px solid var(--border); 
            display: grid; 
            grid-template-columns: 1fr 1fr 1fr; 
            height: 75px; 
            flex-shrink: 0;
            z-index: 100;
        }
        .footer-item { background: none; border: none; color: var(--text-muted); display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 5px; cursor: pointer; -webkit-tap-highlight-color: transparent; }
        .footer-item i { font-size: 18px; }
        .footer-item span { font-size: 10px; font-weight: 900; text-transform: uppercase; }
        .footer-item.active { color: var(--primary); border-top: 3px solid var(--primary); background: rgba(240, 185, 11, 0.05); }

        /* স্ক্রলবার স্টাইল */
        .container::-webkit-scrollbar { width: 4px; }
        .container::-webkit-scrollbar-thumb { background: var(--border); border-radius: 10px; }
    </style>
</head>
<body>

<div id="loginOverlay">
    <div class="login-box">
        <h2>ADMIN LOGIN</h2>
        <input type="email" id="loginEmail" placeholder="ইমেইল" style="margin-bottom: 10px;">
        <input type="password" id="loginPass" placeholder="পাসওয়ার্ড" style="margin-bottom: 20px;">
        <button class="btn-main" onclick="handleLogin()">LOGIN</button>
    </div>
</div>

<header class="header">
    <div class="logo-area">SMAT <span style="color:white">NETWORK</span></div>
    <div id="activeTabName" class="tab-indicator">SPOT MARKET</div>
    <i class="fas fa-sign-out-alt" onclick="handleLogout()" style="color:var(--down); cursor:pointer;"></i>
</header>

<div class="container">
    
    <div id="spotSec" class="tab-content active">
        <div class="card">
            <h2><i class="fas fa-coins"></i> লঞ্চ স্পট এসেট (Spot)</h2>
            <div class="grid-inputs">
                <div class="input-group"><label>Asset ID (btc)</label><input type="text" id="sID" placeholder="btc"></div>
                <div class="input-group"><label>Full Name</label><input type="text" id="sName" placeholder="Bitcoin"></div>
                <div class="input-group"><label>Price ($)</label><input type="number" id="sPrice" placeholder="65000"></div>
                <div class="input-group"><label>Decimals</label><input type="number" id="sDec" placeholder="8"></div>
                <div class="input-group"><label>Volume</label><input type="text" id="sVol" placeholder="1.2B"></div>
                <div class="input-group"><label>Contract</label><input type="text" id="sCon" placeholder="Native"></div>
                <div class="input-group"><label>Logo File</label><input type="text" id="sLogo" placeholder="btc.png"></div>
                <div class="input-group"><label>Networks</label><input type="text" id="sNet" placeholder="BEP20, TRC20"></div>
            </div>
            <button class="btn-main" onclick="saveData('spotAssets', 's')">সেভ এন্ড লাইভ</button>
        </div>
        <div class="card">
            <h2>সচল স্পট কয়েনসমূহ</h2>
            <div class="table-container">
                <table>
                    <thead>
                        <tr>
                            <th>এসেট ইনফো</th>
                            <th>দাম</th>
                            <th style="text-align: right;">অ্যাকশন</th>
                        </tr>
                    </thead>
                    <tbody id="spotTable"></tbody>
                </table>
            </div>
        </div>
    </div>

    <div id="predictionSec" class="tab-content">
        <div class="card">
            <h2><i class="fas fa-clock"></i> প্রিডিকশন লঞ্চার (Prediction)</h2>
            <div class="grid-inputs">
                <div class="input-group"><label>Unit (btc)</label><input type="text" id="pID" placeholder="eth"></div>
                <div class="input-group"><label>Pair Name</label><input type="text" id="pName" placeholder="ETH/USDT"></div>
                <div class="input-group"><label>Binance Symbol</label><input type="text" id="pBin" placeholder="ethusdt"></div>
                <div class="input-group"><label>Logo File</label><input type="text" id="pLogo" placeholder="eth.png"></div>
                <div class="input-group"><label>Initial Round</label><input type="number" id="pRound" placeholder="50001"></div>
            </div>
            <button class="btn-main" onclick="saveData('predictionAssets', 'p')">প্রিডিকশন লাইভ করুন</button>
        </div>
        <div class="card">
            <h2>সচল প্রিডিকশন এসেট</h2>
            <div class="table-container">
                <table>
                    <thead>
                        <tr>
                            <th>এসেট ইনফো</th>
                            <th>সিম্বল</th>
                            <th style="text-align: right;">অ্যাকশন</th>
                        </tr>
                    </thead>
                    <tbody id="preTable"></tbody>
                </table>
            </div>
        </div>
    </div>

    <div id="featureSec" class="tab-content">
        <div class="card">
            <h2><i class="fas fa-bolt"></i> ফিউচার মার্কেট কন্ট্রোল (Feature)</h2>
            <div class="grid-inputs">
                <div class="input-group"><label>ID (sol)</label><input type="text" id="fID" placeholder="sol"></div>
                <div class="input-group"><label>Pair Name</label><input type="text" id="fName" placeholder="SOLUSDT"></div>
                <div class="input-group"><label>Logo File</label><input type="text" id="fLogo" placeholder="sol.png"></div>
                <div class="input-group"><label>Leverage</label><input type="number" id="fLev" placeholder="50"></div>
            </div>
            <button class="btn-main" onclick="saveData('featureAssets', 'f')">ফিউচার এসেট যোগ করুন</button>
        </div>
        <div class="card">
            <h2>সচল ফিউচার এসেট</h2>
            <div class="table-container">
                <table>
                    <thead>
                        <tr>
                            <th>এসেট ইনফো</th>
                            <th>লিভারেজ</th>
                            <th style="text-align: right;">অ্যাকশন</th>
                        </tr>
                    </thead>
                    <tbody id="featTable"></tbody>
                </table>
            </div>
        </div>
    </div>

</div>

<footer class="admin-footer">
    <button class="footer-item active" onclick="switchTab('spot', this)">
        <i class="fas fa-wallet"></i><span>Spot</span>
    </button>
    <button class="footer-item" onclick="switchTab('prediction', this)">
        <i class="fas fa-chart-line"></i><span>Prediction</span>
    </button>
    <button class="footer-item" onclick="switchTab('feature', this)">
        <i class="fas fa-bolt"></i><span>Feature</span>
    </button>
</footer>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getDatabase, ref, set, onValue, remove, update } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";
    import { getAuth, signInWithEmailAndPassword, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

    const firebaseConfig = {
        apiKey: "AIzaSyAMxtJedkehhxJRMPZLjhpKHqneHEWsGlE",
        authDomain: "smat-exchange.firebaseapp.com",
        databaseURL: "https://smat-exchange-default-rtdb.firebaseio.com",
        projectId: "smat-exchange",
        appId: "1:836334569396:web:679effe640b3453412d4e1"
    };

    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app);
    const auth = getAuth(app);

    window.switchTab = (tab, btn) => {
        document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
        document.querySelectorAll('.footer-item').forEach(i => i.classList.remove('active'));
        document.getElementById(tab + 'Sec').classList.add('active');
        btn.classList.add('active');
        document.getElementById('activeTabName').innerText = tab.toUpperCase() + " MARKET";
    };

    window.handleLogin = () => {
        const e = document.getElementById('loginEmail').value;
        const p = document.getElementById('loginPass').value;
        signInWithEmailAndPassword(auth, e, p).catch(() => alert("ভুল তথ্য!"));
    };

    window.handleLogout = () => signOut(auth);

    onAuthStateChanged(auth, (u) => {
        document.getElementById('loginOverlay').style.display = u ? 'none' : 'flex';
        if(u) sync();
    });

    window.saveData = (path, pre) => {
        const id = document.getElementById(pre+'ID').value.toLowerCase().trim();
        if(!id) return alert("ID Required!");

        let data = {};
        if(pre === 's') {
            data = {
                sym: id, name: document.getElementById('sName').value,
                price: parseFloat(document.getElementById('sPrice').value) || 0,
                decimal: parseInt(document.getElementById('sDec').value) || 8,
                vol: document.getElementById('sVol').value,
                contract: document.getElementById('sCon').value,
                logo: document.getElementById('sLogo').value,
                networks: document.getElementById('sNet').value.split(',').map(n => n.trim()),
                key: id + "_balance"
            };
        } else if(pre === 'p') {
            data = {
                name: document.getElementById('pName').value,
                symbol: document.getElementById('pBin').value.toLowerCase(),
                logo: document.getElementById('pLogo').value,
                round: parseInt(document.getElementById('pRound').value) || 0,
                unit: id.toUpperCase()
            };
        } else {
            data = { unit: id.toUpperCase(), name: document.getElementById('fName').value, logo: document.getElementById('fLogo').value, lev: document.getElementById('fLev').value };
        }

        set(ref(db, path+'/'+id), data).then(() => {
            if(pre === 'p') update(ref(db, 'roundLogic'), {[id]: data.round});
            alert("সফলভাবে সেভ হয়েছে!");
            document.querySelectorAll('input').forEach(i => i.value = "");
        });
    };

    window.del = (path, id) => { if(confirm("ডিলিট করতে চান?")) remove(ref(db, path+'/'+id)); };

    function sync() {
        const conf = { spotAssets: 'spotTable', predictionAssets: 'preTable', featureAssets: 'featTable' };
        Object.entries(conf).forEach(([path, tID]) => {
            onValue(ref(db, path), (s) => {
                const d = s.val();
                const b = document.getElementById(tID);
                b.innerHTML = "";
                if(d) {
                    Object.entries(d).forEach(([k, v]) => {
                        const logoImg = v.logo ? `assets/logos/${v.logo}` : 'https://via.placeholder.com/30';
                        b.innerHTML += `<tr>
                            <td>
                                <div style="display:flex; align-items:center; gap:10px;">
                                    <img src="${logoImg}" class="coin-icon" onerror="this.src='https://via.placeholder.com/30'">
                                    <div>
                                        <div>${v.name || v.unit}</div>
                                        <div style="font-size:10px; color:var(--text-muted)">${k.toUpperCase()}</div>
                                    </div>
                                </div>
                            </td>
                            <td style="color:var(--primary)">${v.price ? '$'+v.price : (v.lev ? v.lev+'x' : (v.symbol || 'Active'))}</td>
                            <td style="text-align:right;"><button class="btn-del" onclick="del('${path}', '${k}')"><i class="fas fa-trash-alt"></i></button></td>
                        </tr>`;
                    });
                }
            });
        });
    }
</script>
</body>
</html>
