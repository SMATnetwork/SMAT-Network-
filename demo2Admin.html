<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SMAT CEX | ওমনি অ্যাডমিন কন্ট্রোল</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap');

        :root {
            --bg: #0b0e11; --card: #181a20; --border: #2b3139;
            --primary: #f0b90b; --up: #0ecb81; --down: #f6465d;
            --text-main: #ffffff; --text-muted: #848e9c;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Inter', sans-serif; }
        body { background: var(--bg); color: var(--text-main); min-height: 100vh; display: flex; flex-direction: column; padding-bottom: 90px; }

        /* --- Login Overlay --- */
        #loginOverlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: var(--bg); display: flex; justify-content: center; align-items: center; z-index: 9999; }
        .login-box { background: var(--card); padding: 40px; border-radius: 15px; width: 90%; max-width: 400px; border: 1px solid var(--border); text-align: center; }
        .login-box h2 { font-weight: 900; margin-bottom: 25px; color: var(--primary); }

        /* --- Header --- */
        .header { background: var(--card); padding: 15px 25px; border-bottom: 1px solid var(--border); display: flex; justify-content: space-between; align-items: center; position: sticky; top: 0; z-index: 100; }
        .logo-area { font-size: 20px; font-weight: 900; color: var(--primary); letter-spacing: -0.5px; }
        .current-tab-title { font-size: 12px; color: white; background: #2b3139; padding: 4px 10px; border-radius: 4px; font-weight: 900; }

        /* --- Container & Cards --- */
        .container { max-width: 1000px; margin: 20px auto; padding: 0 15px; flex: 1; }
        .card { background: var(--card); border: 1px solid var(--border); padding: 20px; border-radius: 12px; margin-bottom: 20px; }
        .tab-content { display: none; }
        .tab-content.active { display: block; animation: fadeIn 0.3s ease; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        h2 { font-weight: 900; font-size: 16px; margin-bottom: 20px; color: var(--primary); display: flex; align-items: center; gap: 8px; border-left: 4px solid var(--primary); padding-left: 10px; }
        
        /* --- Form Inputs --- */
        .grid-inputs { display: grid; grid-template-columns: repeat(auto-fit, minmax(220px, 1fr)); gap: 15px; }
        .input-group { margin-bottom: 12px; }
        label { display: block; font-size: 11px; color: var(--text-muted); margin-bottom: 5px; font-weight: 700; text-transform: uppercase; }
        input { width: 100%; padding: 12px; background: #0b0e11; border: 1px solid var(--border); color: white; border-radius: 8px; outline: none; font-weight: 600; font-size: 13px; }
        input:focus { border-color: var(--primary); }
        .btn-primary { background: var(--primary); color: #000; width: 100%; padding: 15px; border: none; border-radius: 8px; font-weight: 900; cursor: pointer; text-transform: uppercase; margin-top: 10px; font-size: 14px; }

        /* --- Table Styling --- */
        .table-container { overflow-x: auto; margin-top: 10px; }
        table { width: 100%; border-collapse: collapse; min-width: 600px; }
        th { text-align: left; color: var(--text-muted); padding: 12px; border-bottom: 1px solid var(--border); font-size: 11px; text-transform: uppercase; }
        td { padding: 12px; border-bottom: 1px solid #23272e; font-size: 13px; font-weight: 700; }
        .coin-icon { width: 28px; height: 28px; border-radius: 50%; vertical-align: middle; margin-right: 10px; background: #2b3139; }
        .badge { background: #2b3139; color: var(--primary); padding: 2px 6px; border-radius: 4px; font-size: 10px; }
        .btn-del { background: rgba(246, 70, 93, 0.1); color: var(--down); border: 1px solid var(--down); padding: 5px 10px; border-radius: 4px; font-weight: 700; cursor: pointer; font-size: 11px; }

        /* --- Bottom Navigation Footer --- */
        .admin-footer { position: fixed; bottom: 0; left: 0; width: 100%; background: var(--card); border-top: 1px solid var(--border); display: grid; grid-template-columns: 1fr 1fr 1fr; padding: 12px 0; z-index: 1000; box-shadow: 0 -5px 15px rgba(0,0,0,0.3); }
        .footer-item { background: none; border: none; color: var(--text-muted); display: flex; flex-direction: column; align-items: center; gap: 6px; cursor: pointer; transition: 0.3s; }
        .footer-item i { font-size: 20px; }
        .footer-item span { font-size: 10px; font-weight: 900; text-transform: uppercase; letter-spacing: 0.5px; }
        .footer-item.active { color: var(--primary); }
    </style>
</head>
<body>

<div id="loginOverlay">
    <div class="login-box">
        <h2 style="font-weight: 900;">ADMIN ACCESS</h2>
        <input type="email" id="loginEmail" placeholder="অ্যাডমিন ইমেইল" style="margin-bottom: 10px;">
        <input type="password" id="loginPass" placeholder="পাসওয়ার্ড" style="margin-bottom: 20px;">
        <button class="btn-primary" onclick="handleLogin()">প্যানেলে প্রবেশ করুন</button>
    </div>
</div>

<header class="header">
    <div class="logo-area">SMAT <span style="color:white">NETWORK</span></div>
    <div id="activeTabName" class="current-tab-title">SPOT MANAGER</div>
    <i class="fas fa-power-off" onclick="handleLogout()" style="color:var(--down); cursor:pointer;"></i>
</header>

<div class="container">
    
    <div id="spotSec" class="tab-content active">
        <div class="card">
            <h2><i class="fas fa-coins"></i> কয়েন লঞ্চার (Spot & Wallet)</h2>
            <div class="grid-inputs">
                <div class="input-group"><label>Asset ID (btc)</label><input type="text" id="spotSym" placeholder="btc"></div>
                <div class="input-group"><label>Full Name</label><input type="text" id="spotName" placeholder="Bitcoin"></div>
                <div class="input-group"><label>Price (USD)</label><input type="number" id="spotPrice" step="0.00000001" placeholder="65000"></div>
                <div class="input-group"><label>Decimal (8/18)</label><input type="number" id="spotDec" placeholder="8"></div>
                <div class="input-group"><label>24h Volume</label><input type="text" id="spotVol" placeholder="2.5B"></div>
                <div class="input-group"><label>Contract Addr</label><input type="text" id="spotContract" placeholder="Native/0x..."></div>
                <div class="input-group"><label>Logo File Name</label><input type="text" id="spotLogo" placeholder="btc.png"></div>
                <div class="input-group"><label>Networks (BEP20, TRC20)</label><input type="text" id="spotNets" placeholder="BEP20, ERC20"></div>
            </div>
            <button class="btn-primary" onclick="saveToFirebase('spotAssets', 'spot')">কয়েন লাইভ করুন</button>
        </div>
        <div class="card">
            <h2>Active Spot Market</h2>
            <div class="table-container"><table><tbody id="spotTable"></tbody></table></div>
        </div>
    </div>

    <div id="predictionSec" class="tab-content">
        <div class="card">
            <h2><i class="fas fa-clock"></i> Prediction ট্রেডিং লঞ্চার</h2>
            <div class="grid-inputs">
                <input type="text" id="preSym" placeholder="ID (eth)">
                <input type="text" id="preName" placeholder="Pair (ETH/USDT)">
                <input type="text" id="preBinance" placeholder="Binance Sym (ethusdt)">
                <input type="text" id="preLogo" placeholder="Logo (eth.png)">
                <input type="number" id="preRound" placeholder="Initial Round ID">
            </div>
            <button class="btn-primary" onclick="saveToFirebase('predictionAssets', 'pre')">প্রিডিকশন সচল করুন</button>
        </div>
        <div class="card">
            <h2>Prediction Assets</h2>
            <div class="table-container"><table><tbody id="preTable"></tbody></table></div>
        </div>
    </div>

    <div id="featureSec" class="tab-content">
        <div class="card">
            <h2><i class="fas fa-bolt"></i> Future Market লঞ্চার</h2>
            <div class="grid-inputs">
                <input type="text" id="featSym" placeholder="ID (sol)">
                <input type="text" id="featName" placeholder="Name (SOLUSDT)">
                <input type="text" id="featLogo" placeholder="Logo (sol.png)">
                <input type="number" id="featLev" placeholder="Max Leverage (e.g 50)">
            </div>
            <button class="btn-primary" onclick="saveToFirebase('featureAssets', 'feat')">ফিউচার কয়েন লঞ্চ করুন</button>
        </div>
        <div class="card">
            <h2>Futures Market Assets</h2>
            <div class="table-container"><table><tbody id="featTable"></tbody></table></div>
        </div>
    </div>

</div>

<footer class="admin-footer">
    <button class="footer-item active" onclick="switchTab('spot', this)">
        <i class="fas fa-wallet"></i><span>Spot</span>
    </button>
    <button class="footer-item" onclick="switchTab('prediction', this)">
        <i class="fas fa-chart-line"></i><span>Prediction</span>
    </button>
    <button class="footer-item" onclick="switchTab('feature', this)">
        <i class="fas fa-bolt"></i><span>Feature</span>
    </button>
</footer>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getDatabase, ref, set, onValue, remove, update } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";
    import { getAuth, signInWithEmailAndPassword, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

    const firebaseConfig = {
        apiKey: "AIzaSyAMxtJedkehhxJRMPZLjhpKHqneHEWsGlE",
        authDomain: "smat-exchange.firebaseapp.com",
        databaseURL: "https://smat-exchange-default-rtdb.firebaseio.com",
        projectId: "smat-exchange",
        appId: "1:836334569396:web:679effe640b3453412d4e1"
    };

    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app);
    const auth = getAuth(app);

    window.switchTab = (tab, btn) => {
        document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
        document.querySelectorAll('.footer-item').forEach(i => i.classList.remove('active'));
        document.getElementById(tab + 'Sec').classList.add('active');
        btn.classList.add('active');
        document.getElementById('activeTabName').innerText = tab.toUpperCase() + " MANAGER";
    };

    window.handleLogin = () => {
        const e = document.getElementById('loginEmail').value;
        const p = document.getElementById('loginPass').value;
        signInWithEmailAndPassword(auth, e, p).catch(() => alert("ভুল ইমেইল বা পাসওয়ার্ড!"));
    };
    window.handleLogout = () => signOut(auth);

    onAuthStateChanged(auth, (user) => {
        if (user) {
            document.getElementById('loginOverlay').style.display = 'none';
            syncData();
        } else {
            document.getElementById('loginOverlay').style.display = 'flex';
        }
    });

    // --- Dynamic Data Saver (Coin.js Logic Integrated) ---
    window.saveToFirebase = (path, pre) => {
        const id = document.getElementById(pre+'Sym').value.toLowerCase().trim();
        if(!id) return alert("কয়েন আইডি দিন!");

        let data = {};

        if(pre === 'spot') {
            data = {
                sym: id,
                name: document.getElementById('spotName').value,
                price: parseFloat(document.getElementById('spotPrice').value),
                decimal: parseInt(document.getElementById('spotDec').value),
                vol: document.getElementById('spotVol').value,
                contract: document.getElementById('spotContract').value,
                logo: document.getElementById('spotLogo').value,
                networks: document.getElementById('spotNets').value.split(',').map(n => n.trim()),
                key: id + "_balance"
            };
        } else if(pre === 'pre') {
            data = {
                name: document.getElementById('preName').value,
                symbol: document.getElementById('preBinance').value.toLowerCase(),
                logo: document.getElementById('preLogo').value,
                round: parseInt(document.getElementById('preRound').value),
                unit: id.toUpperCase()
            };
        } else {
            data = {
                name: document.getElementById('featName').value,
                logo: document.getElementById('featLogo').value,
                leverage: document.getElementById('featLev').value,
                unit: id.toUpperCase()
            };
        }

        set(ref(db, `${path}/${id}`), data).then(() => {
            if(pre === 'pre') update(ref(db, 'roundLogic'), {[id]: data.round});
            alert("কয়েনটি সফলভাবে সেভ হয়েছে!");
        });
    };

    window.delCoin = (path, id) => {
        if(confirm("ডিলিট করতে চান?")) remove(ref(db, `${path}/${id}`));
    };

    function syncData() {
        const sections = { spotAssets: 'spotTable', predictionAssets: 'preTable', featureAssets: 'featTable' };
        Object.entries(sections).forEach(([path, tableId]) => {
            onValue(ref(db, path), (snap) => {
                const data = snap.val();
                const tbody = document.getElementById(tableId);
                tbody.innerHTML = "";
                if(data) Object.entries(data).forEach(([key, val]) => {
                    tbody.innerHTML += `<tr>
                        <td><img src="assets/logos/${val.logo}" class="coin-icon"> ${val.name || val.unit}</td>
                        <td>${val.price ? '$'+val.price : (val.symbol || 'N/A')}</td>
                        <td><span class="badge">${key.toUpperCase()}</span></td>
                        <td><button class="btn-del" onclick="delCoin('${path}', '${key}')">ডিলিট</button></td>
                    </tr>`;
                });
            });
        });
    }
</script>
</body>
</html>
