<script>
// --- FIREBASE CONFIG ---
const firebaseConfig = {
  apiKey: "AIzaSyAMxtJedkehhxJRMPZLjhpKHqneHEWsGlE",
  authDomain: "smat-exchange.firebaseapp.com",
  projectId: "smat-exchange",
  databaseURL: "https://smat-exchange-default-rtdb.firebaseio.com",
  storageBucket: "smat-exchange.firebasestorage.app",
  messagingSenderId: "836334569396",
  appId: "1:836334569396:web:679effe640b3453412d4e1"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.database();

// --- GAME STATE ---
let smatBalance = parseFloat(localStorage.getItem('smatBalance')) || 1000.0;
let bankBalance = parseFloat(localStorage.getItem('bankBalance')) || 10000.0;
let gameId = 100000;
let currentMultiplier = 1.00;
let isRunning = false, hasBet = false, hasCashed = false, isProcessingBet = false, isGameOver = false;
let betAmt = 0, crashAt = 0;
let myUid = "User_" + Math.floor(Math.random() * 9999);
let isMaster = false;
let lastSyncData = null;
let flightSeconds = 0;
let players = [];
let fakePool = 0;
let crashHistoryDots = JSON.parse(localStorage.getItem('crashHistoryDots')) || [];
let isMuted = localStorage.getItem('isMuted') === 'true';
const audioContext = new (window.AudioContext || window.webkitAudioContext)();

// --- MASTER CONTROLLER ---
function syncMaster() {
    const masterRef = db.ref('crashArena/master');
    masterRef.onDisconnect().remove();
    setInterval(() => {
        masterRef.transaction(curr => { if (curr === null || curr === myUid) { isMaster = true; return myUid; } isMaster = false; return curr; });
        if (isMaster) runGameLogic();
    }, 1000);
}

function runGameLogic() {
    db.ref('crashArena/state').transaction(curr => {
        if (!curr) return { gameId: 100000, status: 'waiting', timer: 10, bank: 10000, multiplier: 1.00, crashAt: 2.00, lastUpdate: Date.now(), startTime: Date.now() };
        let now = Date.now();
        curr.lastUpdate = now;
        if (curr.status === 'waiting') {
            if (curr.timer > 0) curr.timer -= 1;
            else { curr.status = 'running'; curr.multiplier = 1.00; curr.startTime = now; curr.crashAt = calculateCrashPoint(); db.ref('crashArena/players').remove(); }
        } else if (curr.status === 'running') {
            let elapsed = (now - curr.startTime) / 1000;
            curr.multiplier = Math.pow(Math.E, 0.065 * elapsed);
            if (curr.multiplier >= curr.crashAt) { curr.status = 'crashed'; curr.multiplier = curr.crashAt; db.ref('crashArena/history').push(curr.multiplier); }
        } else if (curr.status === 'crashed') { curr.status = 'waiting'; curr.timer = 6; curr.gameId += 1; }
        return curr;
    });
}

// --- RENDERING ENGINE (Interpolation for 60FPS) ---
function gameLoop() {
    if (lastSyncData && lastSyncData.status === 'running') {
        let now = Date.now();
        let elapsedSinceStart = (now - lastSyncData.startTime) / 1000;
        let visualMult = Math.pow(Math.E, 0.065 * elapsedSinceStart);
        if (visualMult > lastSyncData.crashAt) visualMult = lastSyncData.crashAt;
        if (isRunning) renderRunning(visualMult);
    }
    requestAnimationFrame(gameLoop);
}
requestAnimationFrame(gameLoop);

// --- SYNC WITH FIREBASE ---
db.ref('crashArena/state').on('value', snap => {
    const data = snap.val();
    if (!data) return;
    lastSyncData = data;
    gameId = data.gameId;
    document.getElementById('game-id-display').innerText = "#" + data.gameId;
    document.getElementById('bank-display').innerText = data.bank.toFixed(4);
    
    if (data.status === 'waiting' && !isRunning) prepareRound(data.timer);
    else if (data.status === 'running' && !isRunning) startFlight();
    else if (data.status === 'crashed' && isRunning) doCrash(data.multiplier);
});

// --- UI HANDLERS (As per your original code) ---
function updateUI() {
    document.getElementById('balance-display').innerText = smatBalance.toFixed(6) + " SMAT";
    localStorage.setItem('smatBalance', smatBalance);
    renderDots();
}

function renderRunning(mult) {
    currentMultiplier = mult;
    document.getElementById('multiplier').innerText = mult.toFixed(2) + "x";
    document.getElementById('countdown-overlay').style.display='none';
    const plane = document.getElementById('plane'); plane.style.opacity="1";
    let moveX = Math.min((mult - 1) * 40, 250);
    let moveY = Math.min((mult - 1) * 20, 150);
    plane.style.transform = `translate(${moveX}px, -${moveY}px)`;
    
    if (hasBet && !hasCashed) {
        const btn = document.getElementById('action-btn');
        btn.innerText = "CASH OUT: " + (betAmt * mult).toFixed(6);
        let autoVal = parseFloat(document.getElementById('auto-cashout').value) || Infinity;
        if (mult >= autoVal) manualCashOut();
    }
    updateCharacters();
}

function placeBet() {
    if (isRunning || hasBet || isProcessingBet) return;
    const val = parseFloat(document.getElementById('bet-amount').value);
    if (val <= 0 || smatBalance < val) return alert("Error!");
    isProcessingBet = true;
    betAmt = val; smatBalance -= val; hasBet = true;
    updateUI();
    document.getElementById('action-btn').innerText = "WAITING...";
    db.ref('crashArena/players/' + myUid).set({ name: "YOU", bet: val, cashed: false });
}

function manualCashOut() {
    if (!hasBet || hasCashed || !isRunning) return;
    hasCashed = true;
    let win = betAmt * currentMultiplier;
    smatBalance += win; updateUI();
    document.getElementById('cashout-msg-amount').innerText = win.toFixed(6) + " SMAT";
    document.getElementById('cashout-popup').style.display = 'block';
    setTimeout(() => document.getElementById('cashout-popup').style.display = 'none', 2000);
    db.ref('crashArena/players/' + myUid).update({ cashed: true, exitMult: currentMultiplier.toFixed(2) });
    db.ref('crashArena/state/bank').transaction(b => b - (win - betAmt));
}

function prepareRound(t) {
    isRunning = false; hasCashed = false; isGameOver = false;
    document.getElementById('countdown-overlay').style.display='flex';
    document.getElementById('timer-num').innerText = t;
    document.getElementById('multiplier').innerText = "1.00x";
    document.getElementById('multiplier').className = "";
    document.getElementById('plane').style.opacity = "0";
}

function startFlight() { isRunning = true; }

function doCrash(m) {
    isRunning = false; isGameOver = true;
    const multDisp = document.getElementById('multiplier');
    multDisp.innerText = "CRASHED"; multDisp.classList.add('crashed-text');
    document.getElementById('plane').style.opacity = "0";
    hasBet = false; isProcessingBet = false;
}

// --- UTILITIES ---
function calculateCrashPoint() {
    let r = Math.random() * 100;
    if (r < 5) return 1.00;
    if (r < 50) return parseFloat((1.1 + Math.random() * 1.5).toFixed(2));
    return parseFloat((2.5 + Math.random() * 10).toFixed(2));
}

function renderDots() {
    const wrapper = document.getElementById('dots-wrapper');
    wrapper.innerHTML = crashHistoryDots.slice(-15).map(v => `<div class="history-dot ${v>=2?'dot-green':'dot-gray'}"></div>`).join("");
}

function updateCharacters() {
    const m = currentMultiplier;
    document.getElementById('char-cat').style.display = m > 10 ? 'block' : 'none';
}

function multiplyBet(f) { 
    let inp = document.getElementById('bet-amount'); 
    inp.value = (parseFloat(inp.value) * f).toFixed(6); 
}

function toggleSound() { isMuted = !isMuted; localStorage.setItem('isMuted', isMuted); }

window.onload = () => { updateUI(); syncMaster(); };
</script>
