<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SMAT Explore - Realtime Crash Arena</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;900&display=swap');
        body { background-color: #0b0e11; color: white; font-family: 'Inter', sans-serif; overflow-x: hidden; width: 100%; margin: 0; }
        .app-container { width: 100%; min-height: 100vh; background: #0b0e11; padding-bottom: 50px; }
        .s-logo-wrapper { position: relative; width: 45px; height: 45px; background: radial-gradient(circle, #f0b90b 0%, #cc9900 100%); border-radius: 50%; display: flex; align-items: center; justify-content: center; border: 2px solid rgba(255, 255, 255, 0.2); box-shadow: 0 0 15px rgba(240, 185, 11, 0.5); margin-right: 12px; }    
        .s-logo-inner { font-weight: 900; font-size: 28px; color: white; }
        .game-screen { height: 40vh; min-height: 280px; background: #161a1e; border: 1px solid #2d3339; border-radius: 12px; position: relative; overflow: hidden; margin: 0 16px; }
        #multiplier { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); font-size: 5rem; font-weight: 900; color: #f0b90b; z-index: 50; text-shadow: 0 0 40px rgba(240, 185, 11, 0.4); }
        .crashed-text { color: #ef4444 !important; font-size: 3rem !important; }
        .plane-anim { position: absolute; bottom: 30px; left: 45px; width: 70px; height: 70px; z-index: 30; transition: 0.1s linear; }
        #countdown-overlay { position: absolute; inset: 0; background: rgba(11,14,17,0.95); z-index: 100; display: none; flex-direction: column; align-items: center; justify-content: center; }
        #history-pills { display: flex; flex-wrap: wrap; gap: 4px; padding: 0 16px; margin-top: 8px; }
        .history-pill-item { font-size: 10px; font-weight: 900; padding: 4px 8px; border-radius: 4px; background: #1e2329; border: 1px solid #2d3339; }
        .pill-white { color: #FFFFFF; } .pill-gray { color: #808080; } .pill-green { color: #22c55e; } .pill-yellow { color: #f0b90b; }
        .bet-row { display: grid; grid-template-columns: 1.5fr 1fr 1fr 1fr; padding: 12px 14px; border-bottom: 1px solid rgba(45, 51, 57, 0.5); font-size: 11px; }
        #cashout-popup { position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); background: #22c55e; color: white; padding: 20px; border-radius: 15px; font-weight: 900; text-align: center; z-index: 10001; display: none; }
        #s-bubble { position: fixed; width: 60px; height: 60px; z-index: 9999; cursor: pointer; display: none; }
        .grid-lines { position: absolute; inset: -200px; background-image: linear-gradient(#23272c 1px, transparent 1px), linear-gradient(90deg, #23272c 1px, transparent 1px); background-size: 50px 50px; opacity: 0.15; z-index: 2; }
        .moving-bg { animation: bgScroll 1s linear infinite; }
        @keyframes bgScroll { from { transform: translate(0, 0); } to { transform: translate(-50px, 50px); } }
    </style>
</head>
<body>

<div id="s-bubble" onclick="popBubble()">
    <div class="s-logo-wrapper" style="width: 100%; height: 100%; margin: 0;"><span class="s-logo-inner">S</span></div>
</div>

<div id="cashout-popup">
    <div class="text-xs uppercase mb-1">Cashed Out</div>
    <div id="cashout-msg-amount" class="text-2xl font-black">0.000000 SMAT</div>
</div>

<div class="app-container">
    <div class="p-5 flex justify-between items-center border-b border-gray-800/50">
        <div class="flex items-center">
            <div class="s-logo-wrapper"><span class="s-logo-inner">S</span></div>
            <div>
                <h1 class="text-lg font-black uppercase leading-none">SMAT EXPLORER</h1>
                <p class="text-[9px] text-yellow-500 font-black tracking-[2px] uppercase">Crash Arena</p>
            </div>
        </div>
        <div class="bg-[#1e2329] px-3 py-1 rounded-lg border border-gray-700">
            <span id="balance-display" class="text-[12px] font-black text-yellow-500">0.000000 SMAT</span>
        </div>
    </div>

    <div class="px-4 py-2 flex justify-between items-center text-[10px] font-bold text-gray-500">
        <span>Bank: <span id="bank-display" class="text-blue-400">0.00</span></span>
        <span>ID: <span id="game-id-display" class="text-white">#0</span></span>
        <span>Pool: <span id="pool-display" class="text-yellow-500">0.00</span></span>
    </div>

    <div id="screen" class="game-screen shadow-inner">
        <div id="grid-bg" class="grid-lines"></div>
        <div id="multiplier">1.00x</div>
        <div id="plane" class="plane-anim opacity-0">
            <svg viewBox="0 0 64 64"><path d="M32,10 L42,30 L42,50 L22,50 L22,30 Z" fill="#f0b90b" /><circle cx="32" cy="15" r="2" fill="#ef4444" class="animate-pulse" /></svg>
        </div>
        <div id="countdown-overlay">
            <div class="text-yellow-500 font-black text-xs uppercase mb-2">Next bet starts in</div>
            <div id="timer-num" class="text-6xl font-black text-white">0</div>
        </div>
    </div>

    <div id="history-pills"></div>

    <div class="mt-4 px-4 space-y-3">
        <div class="grid grid-cols-2 gap-3">
            <div class="bg-[#1e2329] p-3 rounded-xl border border-[#2d3339]">
                <label class="text-[8px] text-gray-500 font-bold uppercase block mb-1">Bet SMAT</label>
                <input id="bet-amount" type="number" value="10" step="0.000001" class="w-full bg-transparent font-black text-lg outline-none text-yellow-500">
            </div>
            <div class="bg-[#1e2329] p-3 rounded-xl border border-[#2d3339]">
                <label class="text-[8px] text-gray-500 font-bold uppercase block mb-1">Auto Exit</label>
                <input id="auto-cashout" type="number" step="0.1" placeholder="∞" class="w-full bg-transparent font-black text-lg outline-none text-blue-400">
            </div>
        </div>
        <button id="action-btn" class="w-full bg-yellow-500 text-black py-4 rounded-xl font-black text-xl shadow-lg">PLACE BET</button>
    </div>

    <div class="mt-6 px-4">
        <h3 class="text-[11px] font-black text-white uppercase mb-3">Live Players</h3>
        <div id="live-bet-list" class="bg-[#161a1e] border border-[#2d3339] rounded-xl overflow-hidden"></div>
    </div>
</div>

<script>
// --- FIREBASE CONFIG ---
const firebaseConfig = {
  apiKey: "AIzaSyAMxtJedkehhxJRMPZLjhpKHqneHEWsGlE",
  authDomain: "smat-exchange.firebaseapp.com",
  projectId: "smat-exchange",
  databaseURL: "https://smat-exchange-default-rtdb.firebaseio.com",
  storageBucket: "smat-exchange.firebasestorage.app",
  messagingSenderId: "836334569396",
  appId: "1:836334569396:web:679effe640b3453412d4e1"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.database();

// --- STATE ---
let smatBalance = parseFloat(localStorage.getItem('smatBalance')) || 1000.0;
let myUid = "User_" + Math.floor(Math.random() * 9999);
let hasBet = false;
let hasCashed = false;
let myBetAmt = 0;
let currentStatus = "";

const actionBtn = document.getElementById('action-btn');

function updateUI() {
    document.getElementById('balance-display').innerText = smatBalance.toFixed(6) + " SMAT";
    localStorage.setItem('smatBalance', smatBalance);
}

// --- SYNC ENGINE ---
db.ref('crashArena/state').on('value', (snap) => {
    const data = snap.val();
    if (!data) { initGlobalLoop(); return; }

    currentStatus = data.status;
    document.getElementById('game-id-display').innerText = "#" + data.gameId;
    document.getElementById('bank-display').innerText = data.bank.toFixed(2);
    document.getElementById('pool-display').innerText = data.pool.toFixed(2);

    if (data.status === 'waiting') {
        renderWaiting(data.timer);
    } else if (data.status === 'running') {
        renderRunning(data.multiplier);
    } else if (data.status === 'crashed') {
        renderCrashed(data.multiplier);
    }
});

db.ref('crashArena/history').limitToLast(15).on('value', snap => {
    const hist = snap.val();
    const container = document.getElementById('history-pills');
    container.innerHTML = "";
    if (hist) {
        Object.values(hist).reverse().forEach(v => {
            const pill = document.createElement('div');
            pill.className = `history-pill-item ${v >= 2 ? 'pill-green' : 'pill-gray'}`;
            pill.innerText = v.toFixed(2) + "x";
            container.appendChild(pill);
        });
    }
});

db.ref('crashArena/players').on('value', snap => {
    const list = document.getElementById('live-bet-list');
    list.innerHTML = "";
    const players = snap.val();
    if (players) {
        Object.entries(players).forEach(([uid, p]) => {
            const row = document.createElement('div');
            row.className = "bet-row";
            const isMe = uid === myUid;
            row.innerHTML = `
                <span class="${isMe ? 'text-yellow-500' : ''}">${isMe ? 'YOU' : 'Player'}</span>
                <span class="text-center text-yellow-500">${p.bet.toFixed(2)}</span>
                <span class="text-center ${p.cashed ? 'text-green-500' : ''}">${p.cashed ? p.exitMult + 'x' : '-'}</span>
                <span class="text-right ${p.cashed ? 'text-green-500' : ''}">${p.cashed ? '+' + (p.bet * p.exitMult - p.bet).toFixed(4) : '-'}</span>
            `;
            list.appendChild(row);
        });
    }
});

// --- RENDER LOGIC ---
function renderWaiting(timer) {
    document.getElementById('countdown-overlay').style.display = 'flex';
    document.getElementById('timer-num').innerText = timer;
    document.getElementById('multiplier').innerText = "1.00x";
    document.getElementById('multiplier').classList.remove('crashed-text');
    document.getElementById('plane').style.opacity = "0";
    document.getElementById('grid-bg').classList.remove('moving-bg');
    
    if (!hasBet) {
        actionBtn.innerText = "PLACE BET";
        actionBtn.disabled = false;
        actionBtn.onclick = doPlaceBet;
        actionBtn.className = "w-full bg-yellow-500 text-black py-4 rounded-xl font-black text-xl shadow-lg";
    } else {
        actionBtn.innerText = "BET PLACED";
        actionBtn.disabled = true;
    }
}

function renderRunning(mult) {
    document.getElementById('countdown-overlay').style.display = 'none';
    document.getElementById('multiplier').innerText = mult.toFixed(2) + "x";
    const plane = document.getElementById('plane');
    plane.style.opacity = "1";
    document.getElementById('grid-bg').classList.add('moving-bg');

    let moveX = Math.min(mult * 20, 250);
    let moveY = Math.min(mult * 10, 150);
    plane.style.transform = `translate(${moveX}px, -${moveY}px)`;

    if (hasBet && !hasCashed) {
        actionBtn.disabled = false;
        actionBtn.innerText = "CASH OUT: " + (myBetAmt * mult).toFixed(4);
        actionBtn.className = "w-full bg-green-500 text-black py-4 rounded-xl font-black text-xl";
        actionBtn.onclick = () => doCashOut(mult);

        let auto = parseFloat(document.getElementById('auto-cashout').value);
        if (auto > 1.0 && mult >= auto) doCashOut(mult);
    }
}

function renderCrashed(mult) {
    document.getElementById('multiplier').innerText = "CRASHED";
    document.getElementById('multiplier').classList.add('crashed-text');
    document.getElementById('plane').style.opacity = "0";
    document.getElementById('grid-bg').classList.remove('moving-bg');
    actionBtn.innerText = "WAITING...";
    actionBtn.disabled = true;
    hasBet = false; 
    hasCashed = false;
}

// --- ACTIONS ---
function doPlaceBet() {
    const amt = parseFloat(document.getElementById('bet-amount').value);
    if (amt <= 0 || amt > smatBalance) return;
    
    smatBalance -= amt;
    myBetAmt = amt;
    hasBet = true;
    updateUI();

    db.ref('crashArena/players/' + myUid).set({
        bet: amt,
        cashed: false
    });
    // Add to pool
    db.ref('crashArena/state/pool').transaction(p => (p || 0) + amt);
}

function doCashOut(mult) {
    if (!hasBet || hasCashed || currentStatus !== 'running') return;
    hasCashed = true;
    const win = myBetAmt * mult;
    smatBalance += win;
    updateUI();

    document.getElementById('cashout-msg-amount').innerText = win.toFixed(6) + " SMAT";
    document.getElementById('cashout-popup').style.display = "block";
    setTimeout(() => { document.getElementById('cashout-popup').style.display = "none"; }, 2000);

    db.ref('crashArena/players/' + myUid).update({
        cashed: true,
        exitMult: mult.toFixed(2)
    });
    
    // Subtract from bank
    db.ref('crashArena/state/bank').transaction(b => b - (win - myBetAmt));
}

// --- GLOBAL GAME ENGINE ---
function initGlobalLoop() {
    const stateRef = db.ref('crashArena/state');
    setInterval(() => {
        stateRef.transaction(current => {
            if (!current) return { gameId: 1000, status: 'waiting', timer: 10, bank: 10000, pool: 0, multiplier: 1.00, crashAt: 2.00 };

            if (current.status === 'waiting') {
                if (current.timer > 0) current.timer -= 1;
                else {
                    current.status = 'running';
                    current.multiplier = 1.00;
                    current.crashAt = generateCrash();
                    db.ref('crashArena/players').remove();
                    current.pool = 0;
                }
            } else if (current.status === 'running') {
                current.multiplier += (current.multiplier < 5 ? 0.03 : current.multiplier * 0.015);
                if (current.multiplier >= current.crashAt) {
                    current.status = 'crashed';
                    current.multiplier = current.crashAt;
                    db.ref('crashArena/history').push(current.multiplier);
                }
            } else if (current.status === 'crashed') {
                current.status = 'waiting';
                current.timer = 8;
                current.gameId += 1;
            }
            return current;
        });
    }, 1000);
}

function generateCrash() {
    let r = Math.random() * 100;
    if (r < 10) return 1.00;
    if (r < 50) return parseFloat((1.1 + Math.random() * 1.5).toFixed(2));
    if (r < 90) return parseFloat((2 + Math.random() * 8).toFixed(2));
    return parseFloat((10 + Math.random() * 50).toFixed(2));
}

// S-Bubble Logic (Original)
function checkBubble() {
    const h = new Date().getHours();
    const bubble = document.getElementById('s-bubble');
    if ([8, 14, 20, 2].includes(h)) {
        bubble.style.display = 'block';
        bubble.style.top = "20%"; bubble.style.left = "20%";
    } else {
        bubble.style.display = 'none';
    }
}
function popBubble() {
    smatBalance += 1.0;
    updateUI();
    document.getElementById('s-bubble').style.display = 'none';
    alert("You got 1 SMAT!");
}

window.onload = () => { updateUI(); checkBubble(); };
</script>
</body>
</html>
