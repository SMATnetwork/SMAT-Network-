<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SMAT Explore - Global Crash Arena</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;900&display=swap');
        body { background-color: #0b0e11; color: white; font-family: 'Inter', sans-serif; overflow-x: hidden; width: 100%; margin: 0; }
        .app-container { width: 100%; min-height: 100vh; background: #0b0e11; padding-bottom: 50px; }
        .s-logo-wrapper { position: relative; width: 45px; height: 45px; background: radial-gradient(circle, #f0b90b 0%, #cc9900 100%); border-radius: 50%; display: flex; align-items: center; justify-content: center; border: 2px solid rgba(255, 255, 255, 0.2); box-shadow: 0 0 15px rgba(240, 185, 11, 0.5); margin-right: 12px; }    
        .s-logo-inner { font-weight: 900; font-size: 28px; color: white; }
        .game-screen { height: 40vh; min-height: 280px; background: #161a1e; border: 1px solid #2d3339; border-radius: 12px; position: relative; overflow: hidden; margin: 0 16px; }
        #multiplier { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); font-size: 5rem; font-weight: 900; color: #f0b90b; z-index: 50; text-shadow: 0 0 40px rgba(240, 185, 11, 0.4); }
        .crashed-text { color: #ef4444 !important; font-size: 3rem !important; }
        .plane-anim { position: absolute; bottom: 30px; left: 45px; width: 70px; height: 70px; z-index: 30; transition: 0.1s linear; }
        #countdown-overlay { position: absolute; inset: 0; background: rgba(11,14,17,0.95); z-index: 100; display: none; flex-direction: column; align-items: center; justify-content: center; }
        #history-pills { display: flex; flex-wrap: wrap; gap: 4px; padding: 0 16px; margin-top: 8px; }
        .history-pill-item { font-size: 10px; font-weight: 900; padding: 4px 8px; border-radius: 4px; background: #1e2329; border: 1px solid #2d3339; }
        .pill-white { color: #FFFFFF; } .pill-gray { color: #808080; } .pill-green { color: #22c55e; } .pill-yellow { color: #f0b90b; }
        #cashout-popup { position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); background: #22c55e; color: white; padding: 20px; border-radius: 15px; font-weight: 900; text-align: center; z-index: 10001; display: none; box-shadow: 0 10px 40px rgba(0,0,0,0.5); }
        .bet-row { display: grid; grid-template-columns: 1.5fr 1fr 1fr 1fr; padding: 12px 14px; border-bottom: 1px solid rgba(45, 51, 57, 0.5); font-size: 11px; }
    </style>
</head>
<body>

<div id="cashout-popup">
    <div class="text-xs uppercase opacity-90 mb-1">Cashed Out</div>
    <div id="cashout-msg-amount" class="text-2xl font-black">0.0000 SMAT</div>
</div>

<div class="app-container">
    <div class="p-5 flex justify-between items-center border-b border-gray-800/50 mb-2">
        <div class="flex items-center">
            <div class="s-logo-wrapper"><span class="s-logo-inner">S</span></div>
            <div>
                <h1 class="text-lg font-black uppercase leading-none">SMAT EXPLORER</h1>
                <p class="text-[9px] text-yellow-500 font-black tracking-[2px] uppercase">Crash Arena</p>
            </div>
        </div>
        <div class="bg-[#1e2329] px-3 py-1 rounded-lg border border-gray-700">
            <span id="balance-display" class="text-[12px] font-black text-yellow-500">0.000000 SMAT</span>
        </div>
    </div>

    <div class="px-4 mb-3 flex justify-between items-center text-[10px] font-bold text-gray-500 uppercase">
        <span>Bank: <span id="bank-display" class="text-blue-400">0.00</span></span>
        <span>ID: <span id="game-id-display" class="text-white">#0000</span></span>
        <span>Pool: <span id="pool-display" class="text-yellow-500">0.00</span></span>
    </div>

    <div id="screen" class="game-screen shadow-inner">
        <div id="multiplier">1.00x</div>
        <div id="plane" class="plane-anim opacity-0">
            <svg viewBox="0 0 64 64"><path d="M32,10 L42,30 L42,50 L22,50 L22,30 Z" fill="#f0b90b" /><circle cx="32" cy="15" r="2" fill="#ef4444" class="animate-pulse" /></svg>
        </div>
        <div id="countdown-overlay">
            <div class="text-yellow-500 font-black text-xs uppercase mb-2 animate-pulse">Next bet starts in</div>
            <div id="timer-num" class="text-6xl font-black text-white">0</div>
        </div>
    </div>

    <div id="history-pills"></div>

    <div class="mt-4 px-4 space-y-3">
        <div class="grid grid-cols-2 gap-3">
            <div class="bg-[#1e2329] p-3 rounded-xl border border-[#2d3339]">
                <label class="text-[8px] text-gray-500 font-bold uppercase block mb-1">Bet SMAT</label>
                <input id="bet-amount" type="number" value="10" class="w-full bg-transparent font-black text-lg outline-none text-yellow-500">
            </div>
            <div class="bg-[#1e2329] p-3 rounded-xl border border-[#2d3339]">
                <label class="text-[8px] text-gray-500 font-bold uppercase block mb-1">Auto Exit</label>
                <input id="auto-cashout" type="number" step="0.1" placeholder="2.00" class="w-full bg-transparent font-black text-lg outline-none text-blue-400">
            </div>
        </div>
        <button id="action-btn" class="w-full bg-yellow-500 text-black py-4 rounded-xl font-black text-xl shadow-lg active:scale-95 transition-all">PLACE BET</button>
    </div>

    <div class="mt-6 px-4">
        <h3 class="text-[11px] font-black text-white uppercase tracking-widest mb-3">Live Players</h3>
        <div id="live-bet-list" class="bg-[#161a1e] border border-[#2d3339] rounded-xl overflow-hidden"></div>
    </div>
</div>

<script>
// --- FIREBASE CONFIGURATION ---
const firebaseConfig = {
  apiKey: "AIzaSyAMxtJedkehhxJRMPZLjhpKHqneHEWsGlE",
  authDomain: "smat-exchange.firebaseapp.com",
  projectId: "smat-exchange",
  databaseURL: "https://smat-exchange-default-rtdb.firebaseio.com", // আপনার প্রজেক্ট অনুযায়ী এটা নিশ্চিত করুন
  storageBucket: "smat-exchange.firebasestorage.app",
  messagingSenderId: "836334569396",
  appId: "1:836334569396:web:679effe640b3453412d4e1"
};

// Initialize Firebase
firebase.initializeApp(firebaseConfig);
const db = firebase.database();

// --- GAME VARIABLES ---
let smatBalance = parseFloat(localStorage.getItem('smatBalance')) || 1000.0;
let hasBet = false;
let hasCashed = false;
let myBetAmt = 0;
let localGameId = 0;

const actionBtn = document.getElementById('action-btn');

// --- UI UPDATES ---
function updateUI() {
    document.getElementById('balance-display').innerText = smatBalance.toFixed(6) + " SMAT";
    localStorage.setItem('smatBalance', smatBalance);
}

// --- REAL-TIME DATA SYNC ---
// Listen for global game state
db.ref('crashArena/state').on('value', (snap) => {
    const data = snap.val();
    if (!data) return initGlobalGame(); // যদি ডাটাবেস খালি থাকে তবে গেম শুরু করো

    localGameId = data.gameId;
    document.getElementById('game-id-display').innerText = "#" + localGameId;
    document.getElementById('bank-display').innerText = data.bank.toFixed(2);
    document.getElementById('pool-display').innerText = data.pool.toFixed(2);

    if (data.status === 'waiting') {
        runWaitingUI(data.timer);
    } else if (data.status === 'running') {
        runFlightUI(data.multiplier);
    } else if (data.status === 'crashed') {
        runCrashedUI(data.multiplier);
    }
});

// Listen for History
db.ref('crashArena/history').limitToLast(12).on('value', (snap) => {
    const history = snap.val();
    const container = document.getElementById('history-pills');
    container.innerHTML = "";
    if (history) {
        Object.values(history).reverse().forEach(val => {
            const pill = document.createElement('div');
            pill.className = `history-pill-item ${getPillColor(val)}`;
            pill.innerText = val.toFixed(2) + "x";
            container.appendChild(pill);
        });
    }
});

// Listen for Players
db.ref('crashArena/players').on('value', (snap) => {
    const list = document.getElementById('live-bet-list');
    list.innerHTML = "";
    const players = snap.val();
    if (players) {
        Object.values(players).forEach(p => {
            const row = document.createElement('div');
            row.className = "bet-row";
            const profit = p.cashed ? (p.bet * p.exitMult - p.bet).toFixed(4) : "-";
            row.innerHTML = `
                <span class="${p.isYou ? 'text-yellow-500' : ''}">${p.name}</span>
                <span class="text-center text-yellow-500">${p.bet.toFixed(2)}</span>
                <span class="text-center ${p.cashed ? 'text-green-500' : ''}">${p.cashed ? p.exitMult + 'x' : '-'}</span>
                <span class="text-right ${p.cashed ? 'text-green-500' : ''}">${p.cashed ? '+' + profit : '-'}</span>
            `;
            list.appendChild(row);
        });
    }
});

// --- UI LOGIC ---
function runWaitingUI(time) {
    document.getElementById('countdown-overlay').style.display = 'flex';
    document.getElementById('timer-num').innerText = time;
    document.getElementById('multiplier').innerText = "1.00x";
    document.getElementById('multiplier').classList.remove('crashed-text');
    document.getElementById('plane').style.opacity = "0";
    
    if (!hasBet) {
        actionBtn.innerText = "PLACE BET";
        actionBtn.disabled = false;
        actionBtn.className = "w-full bg-yellow-500 text-black py-4 rounded-xl font-black text-xl shadow-lg";
        actionBtn.onclick = placeBet;
    } else {
        actionBtn.innerText = "BET PLACED";
        actionBtn.disabled = true;
    }
}

function runFlightUI(mult) {
    document.getElementById('countdown-overlay').style.display = 'none';
    document.getElementById('multiplier').innerText = mult.toFixed(2) + "x";
    const plane = document.getElementById('plane');
    plane.style.opacity = "1";
    
    let moveX = Math.min(mult * 15, 220);
    let moveY = Math.min(mult * 10, 150);
    plane.style.transform = `translate(${moveX}px, -${moveY}px)`;

    if (hasBet && !hasCashed) {
        actionBtn.disabled = false;
        actionBtn.innerText = "CASH OUT: " + (myBetAmt * mult).toFixed(4);
        actionBtn.className = "w-full bg-green-500 text-black py-4 rounded-xl font-black text-xl shadow-xl";
        actionBtn.onclick = () => manualCashOut(mult);

        let auto = parseFloat(document.getElementById('auto-cashout').value);
        if (auto > 1.0 && mult >= auto) manualCashOut(mult);
    }
}

function runCrashedUI(mult) {
    document.getElementById('multiplier').innerText = "CRASHED";
    document.getElementById('multiplier').classList.add('crashed-text');
    document.getElementById('plane').style.opacity = "0";
    actionBtn.innerText = "WAITING...";
    actionBtn.disabled = true;
    actionBtn.className = "w-full bg-gray-800 text-gray-500 py-4 rounded-xl font-black text-xl cursor-not-allowed";
    hasBet = false;
    hasCashed = false;
}

// --- ACTION FUNCTIONS ---
function placeBet() {
    const val = parseFloat(document.getElementById('bet-amount').value);
    if (isNaN(val) || val <= 0 || val > smatBalance) return;

    smatBalance -= val;
    myBetAmt = val;
    hasBet = true;
    updateUI();

    db.ref('crashArena/players').push({
        name: "User_" + Math.floor(Math.random() * 9000),
        bet: val,
        cashed: false,
        isYou: true
    });
}

function manualCashOut(mult) {
    if (!hasBet || hasCashed) return;
    hasCashed = true;
    const win = myBetAmt * mult;
    smatBalance += win;
    updateUI();

    document.getElementById('cashout-msg-amount').innerText = win.toFixed(4) + " SMAT";
    document.getElementById('cashout-popup').style.display = "block";
    setTimeout(() => { document.getElementById('cashout-popup').style.display = "none"; }, 2500);

    // Update Firebase so others can see you cashed out
    db.ref('crashArena/players').orderByChild('isYou').equalTo(true).once('value', snap => {
        snap.forEach(child => {
            child.ref.update({ cashed: true, exitMult: mult.toFixed(2) });
        });
    });

    actionBtn.innerText = "SUCCESS";
    actionBtn.disabled = true;
}

function getPillColor(val) {
    if (val <= 1.00) return 'pill-white';
    if (val < 2.00) return 'pill-gray';
    if (val < 10.00) return 'pill-green';
    return 'pill-yellow';
}

// --- GLOBAL ENGINE (Only one client needs to run this, but we make it robust) ---
// এটি গেমটিকে ডাটাবেসে সবসময় সচল রাখবে
function initGlobalGame() {
    const stateRef = db.ref('crashArena/state');
    
    // Server-side logic simulated on the first active client
    setInterval(() => {
        stateRef.transaction(current => {
            if (!current) return { gameId: 1000, status: 'waiting', timer: 10, bank: 10000, pool: 0, multiplier: 1.00 };

            if (current.status === 'waiting') {
                if (current.timer > 0) {
                    current.timer -= 1;
                } else {
                    current.status = 'running';
                    current.multiplier = 1.00;
                    current.crashPoint = generateCrashPoint();
                    db.ref('crashArena/players').remove(); // New round, clear players
                }
            } else if (current.status === 'running') {
                current.multiplier += (current.multiplier < 5 ? 0.02 : current.multiplier * 0.01);
                if (current.multiplier >= current.crashPoint) {
                    current.status = 'crashed';
                    current.multiplier = current.crashPoint;
                    db.ref('crashArena/history').push(current.multiplier);
                }
            } else if (current.status === 'crashed') {
                current.status = 'waiting';
                current.timer = 8;
                current.gameId += 1;
            }
            return current;
        });
    }, 1000);
}

function generateCrashPoint() {
    let r = Math.random() * 100;
    if (r < 5) return 1.00;
    if (r < 50) return parseFloat((1 + Math.random() * 1.5).toFixed(2));
    if (r < 90) return parseFloat((2 + Math.random() * 5).toFixed(2));
    return parseFloat((10 + Math.random() * 50).toFixed(2));
}

window.onload = updateUI;
</script>
</body>
</html>
