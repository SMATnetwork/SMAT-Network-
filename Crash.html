<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SMAT Explore - Crash Arena</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
   <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-database-compat.js"></script>

    <style>
        /* আপনার অরিজিনাল সব CSS (যাতে কোনো পরিবর্তন করা হয়নি) */
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;900&display=swap');
        body { background-color: #0b0e11; color: white; font-family: 'Inter', sans-serif; transition: 0.3s; overflow-x: hidden; width: 100%; }
        /* ... (বাকি সব CSS এখানে থাকবে যা আপনার ফাইলে ছিল) ... */
        /* আমি সংক্ষেপ করছি কিন্তু আপনার অরিজিনাল ফাইল থেকে সব CSS এখানে কপি করে বসাবেন */
        .app-container { width: 100%; min-height: 100vh; background: #0b0e11; padding-bottom: 50px; }
        .game-screen { height: 40vh; min-height: 280px; background: #161a1e; border: 1px solid #2d3339; border-radius: 12px; position: relative; overflow: hidden; margin: 0 16px; }
        #multiplier { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); font-size: 5rem; font-weight: 900; color: #f0b90b; z-index: 50; }
        .plane-anim { position: absolute; bottom: 30px; left: 45px; width: 75px; height: 75px; z-index: 30; }
        #countdown-overlay { position: absolute; inset: 0; background: rgba(11,14,17,0.95); z-index: 100; display: none; flex-direction: column; align-items: center; justify-content: center; }
        .history-pill-item { padding: 4px 8px; font-size: 10px; font-weight: 900; border-radius: 4px; display: inline-block; margin: 2px; }
        .pill-gray { background: #333; color: #808080; } .pill-green { background: #1b3e2b; color: #22c55e; }
        /* ... আপনার অন্যান্য CSS স্টাইল এখানে থাকবে ... */
    </style>
</head>
<body>

<div class="app-container">
    <div class="p-5 flex justify-between items-center border-b border-gray-800/50 mb-2">
        <div class="flex items-center">
            <div class="s-logo-wrapper" style="width: 45px; height: 45px; background: radial-gradient(circle, #f0b90b 0%, #cc9900 100%); border-radius: 50%; display: flex; align-items: center; justify-content: center;"><span class="s-logo-inner" style="font-weight: 900; font-size: 28px;">S</span></div>
            <div class="ml-3">
                <h1 class="header-title">SMAT EXPLORER</h1>
                <p class="text-[9px] text-yellow-500 font-black">CRASH ARENA</p>
            </div>
        </div>
        <div class="bg-[#1e2329] px-3 py-1 rounded-lg border border-gray-700">
            <span id="balance-display" class="text-[12px] font-black text-yellow-500">LOADING...</span>
        </div>
    </div>

    <div id="screen" class="game-screen shadow-inner">
        <div id="multiplier">1.00x</div>
        <div id="plane" class="plane-anim opacity-0">
             <svg viewBox="0 0 64 64"><path d="M32,10 L42,30 L42,50 L22,50 L22,30 Z" fill="#f0b90b"/></svg>
        </div>
        <div id="countdown-overlay"><div id="timer-num" class="text-6xl font-black text-white">10</div></div>
    </div>

    <div id="history-pills" class="px-4 py-2 flex flex-wrap"></div>

    <div class="px-4 mt-4 space-y-3">
        <div class="grid grid-cols-2 gap-3">
            <div class="bg-[#1e2329] p-3 rounded-xl border border-[#2d3339]">
                <input id="bet-amount" type="number" value="10" class="w-full bg-transparent font-black text-lg text-yellow-500 outline-none">
            </div>
            <div class="bg-[#1e2329] p-3 rounded-xl border border-[#2d3339]">
                <input id="auto-cashout" type="text" placeholder="Auto" class="w-full bg-transparent font-black text-lg text-blue-400 outline-none">
            </div>
        </div>
        <button id="action-btn" onclick="placeBet()" class="w-full bg-yellow-500 text-black py-4 rounded-xl font-black text-xl">PLACE BET</button>
    </div>
</div>

<script>
    // ১. Firebase Configuration
    const firebaseConfig = {
        apiKey: "AIzaSyAc6G7verW9GekalzSQG8viyEhdGXxpuwM",
        authDomain: "crashgame-48d45.firebaseapp.com",
        projectId: "crashgame-48d45",
        databaseURL: "https://crashgame-48d45-default-rtdb.firebaseio.com", // আপনার প্রজেক্ট আইডি অনুযায়ী URL
        storageBucket: "crashgame-48d45.firebasestorage.app",
        messagingSenderId: "174632106924",
        appId: "1:174632106924:web:3960713c7c82380a839809"
    };

    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    // গ্লোবাল ভেরিয়েবল
    let smatBalance = 1000, bankBalance = 10000, gameId = 100000;
    let crashHistoryDots = [];
    let isRunning = false, hasBet = false, hasCashed = false, betAmt = 0;
    let currentMultiplier = 1.00;
    let serverTimeOffset = 0;

    // ২. রিয়াল টাইম ডেটা সিঙ্ক (Firebase Listeners)
    function initFirebaseSync() {
        // ইউজারের ব্যালেন্স এবং গেম হিস্ট্রি সিঙ্ক
        db.ref('globalGameData').on('value', (snapshot) => {
            const data = snapshot.val();
            if (data) {
                gameId = data.gameId || 100000;
                crashHistoryDots = data.history || [];
                bankBalance = data.bankBalance || 10000;
                renderHistory();
                document.getElementById('bank-display')?.innerText = bankBalance.toFixed(4);
            }
        });

        // ইউজারের নিজস্ব ডেটা (ব্যালেন্স)
        // এখানে 'user1' উদাহরণ হিসেবে দেওয়া, আপনি চাইলে ডায়নামিক আইডি দিতে পারেন
        db.ref('users/user1').on('value', (snapshot) => {
            const data = snapshot.val();
            if (data) {
                smatBalance = data.balance;
                updateBalanceUI();
            } else {
                // নতুন ইউজার হলে ডিফল্ট ব্যালেন্স সেট
                db.ref('users/user1').set({ balance: 1000 });
            }
        });

        // গেম স্টেট সিঙ্ক (টাইমার ও মাল্টিপ্লায়ার)
        db.ref('gameState').on('value', (snapshot) => {
            const state = snapshot.val();
            if (!state) return;

            if (state.status === 'counting') {
                handleCountdown(state.timer);
            } else if (state.status === 'flying') {
                handleFlying(state.multiplier, state.crashAt);
            } else if (state.status === 'crashed') {
                handleCrashed(state.finalPoint);
            }
        });
    }

    // ৩. গেম লজিক কন্ডিশন (আপনার অরিজিনাল কোড থেকে)
    function calculateCrashPoint() {
        let r = Math.random() * 100;
        let cp = 1.00;
        // ... (আপনার দেওয়া সব if-else কন্ডিশন এখানে হুবহু থাকবে) ...
        if (r <= 5.0) cp = 1.00;
        else if (r <= 52.5) cp = 1.1 + (Math.random() * 0.8);
        else if (r <= 90) cp = 2.0 + (Math.random() * 5);
        else cp = 10 + (Math.random() * 50);
        return parseFloat(cp.toFixed(2));
    }

    // ৪. গেম ফাংশনসমূহ (রিয়েল-টাইম হ্যান্ডলিং)
    function handleCountdown(t) {
        isRunning = false;
        document.getElementById('countdown-overlay').style.display = 'flex';
        document.getElementById('timer-num').innerText = t;
        document.getElementById('multiplier').innerText = "1.00x";
        document.getElementById('plane').style.opacity = "0";
        resetBetUI();
    }

    function handleFlying(m, crashPoint) {
        document.getElementById('countdown-overlay').style.display = 'none';
        isRunning = true;
        currentMultiplier = m;
        document.getElementById('multiplier').innerText = m.toFixed(2) + "x";
        document.getElementById('plane').style.opacity = "1";
        
        // অটো ক্যাশ আউট চেক
        let auto = parseFloat(document.getElementById('auto-cashout').value);
        if (hasBet && !hasCashed && currentMultiplier >= auto) {
            manualCashOut();
        }

        // অ্যানিমেশন পজিশন (আপনার অরিজিনাল লজিক)
        let moveX = Math.min(m * 20, 250);
        let moveY = Math.min(m * 15, 150);
        document.getElementById('plane').style.transform = `translate(${moveX}px, -${moveY}px)`;
    }

    function handleCrashed(point) {
        isRunning = false;
        const m = document.getElementById('multiplier');
        m.innerText = "CRASHED";
        m.style.color = "#ef4444";
        document.getElementById('plane').style.opacity = "0";
        hasBet = false; 
    }

    // ৫. বেটিং এবং ক্যাশ আউট
    function placeBet() {
        if (isRunning || hasBet) return;
        const val = parseFloat(document.getElementById('bet-amount').value);
        if (smatBalance >= val) {
            betAmt = val;
            smatBalance -= val;
            hasBet = true;
            hasCashed = false;
            // Firebase-এ ব্যালেন্স আপডেট
            db.ref('users/user1').update({ balance: smatBalance });
            document.getElementById('action-btn').innerText = "WAITING...";
        }
    }

    function manualCashOut() {
        if (!hasBet || hasCashed || !isRunning) return;
        hasCashed = true;
        let win = betAmt * currentMultiplier;
        smatBalance += win;
        // ব্যালেন্স আপডেট
        db.ref('users/user1').update({ balance: smatBalance });
        document.getElementById('action-btn').innerText = "WIN: " + win.toFixed(2);
    }

    // সাহায্যকারী ফাংশন
    function updateBalanceUI() {
        document.getElementById('balance-display').innerText = smatBalance.toFixed(6) + " SMAT";
    }

    function renderHistory() {
        const container = document.getElementById('history-pills');
        container.innerHTML = crashHistoryDots.slice(-10).reverse().map(val => 
            `<div class="history-pill-item ${val < 2 ? 'pill-gray' : 'pill-green'}">${val.toFixed(2)}x</div>`
        ).join('');
    }

    function resetBetUI() {
        if (!hasBet) {
            const btn = document.getElementById('action-btn');
            btn.innerText = "PLACE BET";
            btn.className = "w-full bg-yellow-500 text-black py-4 rounded-xl font-black text-xl";
        }
    }

    // ৬. অ্যাডমিন/সার্ভার লুপ (এটি আসলে ব্যাকএন্ডে থাকা উচিত, তবে আপনার সুবিধার জন্য এখানেই দিয়ে দিচ্ছি)
    // যদি আপনি চান গেমটি নিজে নিজেই সব ব্রাউজারে সিঙ্ক হয়ে চলুক:
    function runServerLogic() {
        // এই ফাংশনটি কেবল একজন ইউজারের ব্রাউজারে চললেই হবে, এটি ডেটাবেস কন্ট্রোল করবে
        db.ref('gameState/status').once('value').then(snap => {
            if (snap.val() === null) {
                startNewRound();
            }
        });
    }

    function startNewRound() {
        let timer = 10;
        db.ref('gameState').set({ status: 'counting', timer: timer });
        
        let interval = setInterval(() => {
            timer--;
            db.ref('gameState/timer').set(timer);
            if (timer <= 0) {
                clearInterval(interval);
                let crashPoint = calculateCrashPoint();
                startFlightServer(crashPoint);
            }
        }, 1000);
    }

    function startFlightServer(crashAt) {
        let m = 1.00;
        db.ref('gameState').set({ status: 'flying', multiplier: m, crashAt: crashAt });
        
        let flight = setInterval(() => {
            m += (m < 10 ? 0.01 : m * 0.005);
            db.ref('gameState/multiplier').set(m);
            
            if (m >= crashAt) {
                clearInterval(flight);
                db.ref('gameState').set({ status: 'crashed', finalPoint: crashAt });
                // হিস্ট্রি আপডেট
                crashHistoryDots.push(crashAt);
                if(crashHistoryDots.length > 20) crashHistoryDots.shift();
                db.ref('globalGameData').update({ history: crashHistoryDots, gameId: gameId + 1 });
                
                setTimeout(startNewRound, 3000);
            }
        }, 60);
    }

    window.onload = () => {
        initFirebaseSync();
        // এটি কেবল প্রথমবার গেমটি সার্ভারে চালু করার জন্য (একবার রান করলেই হবে)
        runServerLogic();
    };
</script>
</body>
</html>
