<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SMAT Explore - Crash Arena</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><circle cx='50' cy='50' r='50' fill='%23f3ba2f'/><text x='50%25' y='55%25' text-anchor='middle' dy='.3em' fill='black' font-family='Courier New, monospace' font-weight='900' font-size='60'>S</text></svg>">
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;900&display=swap');
        
        body { background-color: #0b0e11; color: white; font-family: 'Inter', sans-serif; transition: 0.3s; overflow-x: hidden; width: 100%; }
        .app-container { width: 100%; min-height: 100vh; background: #0b0e11; padding-bottom: 50px; margin: 0; box-sizing: border-box; }
        
        .s-logo-wrapper { position: relative; width: 45px; height: 45px; background: radial-gradient(circle, #f0b90b 0%, #cc9900 100%); border-radius: 50%; display: flex; align-items: center; justify-content: center; border: 2px solid rgba(255, 255, 255, 0.2); box-shadow: 0 0 15px rgba(240, 185, 11, 0.5), inset 0 0 8px rgba(0,0,0,0.3); margin-right: 12px; }    
        .s-logo-inner { font-family: 'Inter', sans-serif; font-weight: 900; font-size: 28px; color: white; text-shadow: 1px 2px 4px rgba(0,0,0,0.3); position: relative; z-index: 2; }       
        .header-title { font-size: 20px; font-weight: 900; letter-spacing: -0.5px; line-height: 1; text-transform: uppercase;}

        .game-screen { height: 40vh; min-height: 280px; background: #161a1e; border: 1px solid #2d3339; border-radius: 12px; position: relative; overflow: hidden; margin: 0 16px; transition: all 0.5s ease; }
        
        .chat-icon-wrapper { position: absolute; top: 15px; right: 15px; z-index: 110; background: rgba(30, 35, 41, 0.8); width: 35px; height: 35px; border-radius: 8px; display: flex; align-items: center; justify-content: center; border: 1px solid rgba(240, 185, 11, 0.3); cursor: pointer; text-decoration: none; }
        .chat-icon-wrapper i { color: #f0b90b; font-size: 16px; }

        #multiplier { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); font-size: 5rem; font-weight: 900; color: #f0b90b; z-index: 50; text-shadow: 0 0 40px rgba(240, 185, 11, 0.6); }
        #multiplier.crashed-text { font-size: 6vw; white-space: nowrap; }

        #dots-wrapper { display: flex; gap: 6px; overflow: hidden; width: 100%; }
        .history-dot { width: 15px; height: 15px; border-radius: 50%; flex-shrink: 0; }
        .dot-white { background-color: #FFFFFF; } .dot-gray { background-color: #808080; } .dot-green { background-color: #008000; } .dot-yellow { background-color: #FFFF00; }
        .pill-white { color: #FFFFFF; } .pill-gray { color: #808080; } .pill-green { color: #008000; } .pill-yellow { color: #FFFF00; }
        .dot-live { background: rgba(255, 255, 255, 0.2); border: 1px dashed rgba(255, 255, 255, 0.4); animation: dotPulse 1s infinite alternate; filter: blur(1px); order: -1; }
        @keyframes dotPulse { from { opacity: 0.3; transform: scale(0.8); } to { opacity: 0.7; transform: scale(1.1); } }

        .plane-anim { position: absolute; bottom: 30px; left: 45px; width: 75px; height: 75px; z-index: 30; transition: 0.05s linear; }
        .rotor { transform-origin: center; animation: spinRotor 0.1s linear infinite; }
        @keyframes spinRotor { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
        .flame { position: absolute; bottom: -8px; left: 50%; transform: translateX(-50%); width: 15px; height: 35px; background: linear-gradient(to bottom, #f0b90b, #ff4500, transparent); border-radius: 50%; filter: blur(4px); animation: flicker 0.1s infinite; }

        .bet-row { display: grid; grid-template-columns: 1.5fr 1fr 1fr 1fr; padding: 14px; border-bottom: 1px solid rgba(45, 51, 57, 0.5); align-items: center; }
        #countdown-overlay { position: absolute; inset: 0; background: rgba(11,14,17,0.95); z-index: 100; display: none; flex-direction: column; align-items: center; justify-content: center; }
        
        #cashout-popup, #eaten-popup { position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); width: 90%; max-width: 320px; padding: 20px; border-radius: 15px; text-align: center; z-index: 10001; display: none; font-weight: 900; }
        #cashout-popup { background: #22c55e; color: white; }
        #eaten-popup { background: #ef4444; color: white; }
    </style>
</head>
<body>

<div id="cashout-popup">
    <div class="text-[12px] uppercase opacity-90 mb-1">Successful Cash Out</div>
    <div id="cashout-msg-amount" class="text-2xl font-black">0.000000 SMAT</div>
</div>

<div id="eaten-popup">
    <div class="text-xl font-black italic">Jojo Took All!</div>
    <div class="text-[10px] mt-1 opacity-80 uppercase">Yahoooo....</div>
</div>

<div class="app-container">
    <div class="p-5 flex justify-between items-center border-b border-gray-800/50 mb-2">
        <div class="flex items-center">
            <div class="s-logo-wrapper"><span class="s-logo-inner">S</span></div>
            <div>
                <h1 class="header-title text-white">SMAT EXPLORER</h1>
                <p class="text-[9px] text-yellow-500 font-black tracking-[2px] -mt-1 uppercase">Crash Arena</p>
            </div>
        </div>
        <div class="flex items-center">
            <div id="sound-toggle" onclick="toggleSound()" class="mr-3 bg-[#1e2329] w-[35px] h-[35px] flex items-center justify-center rounded-lg border border-[#2d3339]">
                <i id="sound-icon" class="fas fa-volume-up text-yellow-500"></i>
            </div>
            <div class="bg-[#1e2329] px-3 py-1 rounded-lg border border-gray-700">
                <span id="balance-display" class="text-[12px] font-black text-yellow-500">0.000000 SMAT</span>
            </div>
        </div>
    </div>

    <div class="dot-container" style="padding: 12px; background: #1e2329; border-radius: 8px; margin: 10px 16px; border: 1px solid #2d3339; overflow: hidden;">
        <div id="dots-wrapper"></div>
    </div>

    <div class="px-4 mb-3 flex justify-between items-center">
        <div class="bg-black/40 px-3 py-1 rounded-lg border border-gray-800 text-[10px] font-black">BANK: <span id="bank-display" class="text-blue-400">10000.00</span></div>
        <div class="bg-black/40 px-3 py-1 rounded-lg border border-gray-800 text-[10px] font-black text-white">ID: <span id="game-id-display">#100000</span></div>
        <div class="bg-black/40 px-3 py-1 rounded-lg border border-gray-800 text-[10px] font-black text-yellow-500">POOL: <span id="total-pool-display">0.00</span></div>
    </div>

    <div id="screen" class="game-screen">
        <a href="smatChat.html" class="chat-icon-wrapper"><i class="fas fa-comments"></i></a>
        <div id="multiplier">1.00x</div>
        <div id="plane" class="plane-anim opacity-0">
            <div class="flame"></div>
            <svg viewBox="0 0 64 64"><path d="M32,10 L42,30 L42,50 L22,50 L22,30 Z" fill="#f0b90b" /><circle class="rotor" cx="12" cy="37" r="6" stroke="white" stroke-width="1" fill="none" opacity="0.5"/><circle class="rotor" cx="52" cy="37" r="6" stroke="white" stroke-width="1" fill="none" opacity="0.5"/></svg>
        </div>
        <div id="countdown-overlay">
            <div class="text-yellow-500 font-black text-xs uppercase mb-2 animate-pulse">Next bet starts in</div>
            <div id="timer-num" class="text-6xl font-black text-white">10</div>
        </div>
    </div>

    <div id="history-pills" class="mt-2 px-4 flex flex-wrap gap-1"></div>

    <div class="mt-2 px-4 space-y-3">
        <div class="grid grid-cols-2 gap-3">
            <div class="bg-[#1e2329] p-3 rounded-xl border border-[#2d3339]">
                <label class="text-[8px] text-gray-400 font-bold uppercase block mb-1">Bet SMAT</label>
                <input id="bet-amount" type="number" value="10" class="w-full bg-transparent font-black text-lg outline-none text-yellow-500">
            </div>
            <div class="bg-[#1e2329] p-3 rounded-xl border border-[#2d3339]">
                <label class="text-[8px] text-gray-400 font-bold uppercase block mb-1">Auto Exit</label>
                <input id="auto-cashout" type="text" placeholder="∞" class="w-full bg-transparent font-black text-lg outline-none text-blue-400">
            </div>
        </div>
        <button id="action-btn" onclick="placeBet()" class="w-full bg-yellow-500 text-black py-4 rounded-xl font-black text-xl shadow-lg active:scale-95 transition-all">PLACE BET</button>
    </div>

    <div class="bet-container px-4">
        <div id="live-bet-list" class="bg-[#161a1e] border border-[#2d3339] rounded-lg overflow-hidden"></div>
    </div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getDatabase, ref, update, onValue, get } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

    const firebaseConfig = {
        apiKey: "AIzaSyAMxtJedkehhxJRMPZLjhpKHqneHEWsGlE",
        authDomain: "smat-exchange.firebaseapp.com",
        projectId: "smat-exchange",
        storageBucket: "smat-exchange.firebasestorage.app",
        messagingSenderId: "836334569396",
        appId: "1:836334569396:web:679effe640b3453412d4e1",
        measurementId: "G-FCE3H3F18V"
    };

    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app);

    // --- Variables ---
    let smatBalance = parseFloat(localStorage.getItem('smatBalance')) || 1000.00;
    let bankBalance = parseFloat(localStorage.getItem('bankBalance')) || 10000.00;
    let dailyTotalBet = parseFloat(localStorage.getItem('dailyTotalBet')) || 0;
    let gameId = 100000;
    let currentMultiplier = 1.00;
    let isRunning = false;
    let hasBet = false;
    let hasCashed = false;
    let betAmt = 0;
    let crashAt = 0;
    let players = [];
    let fakePool = 0;
    let gameLoop;
    let isGameOver = false;
    let over2xStreak = 0;
    let under2xStreak = 0;
    let crashHistoryDots = [];
    let isMuted = localStorage.getItem('isMuted') === 'true';

    // --- Firebase Sync ---
    function syncUser() {
        update(ref(db, 'users/player1'), { balance: smatBalance, bank: bankBalance, dailyBet: dailyTotalBet });
    }

    // --- CRASH POINT LOGIC (RESTORED EXACTLY) ---
    function calculateCrashPoint() {
        let r = Math.random() * 100;
        let cp = 1.00;
        if (under2xStreak >= 8) r = 52.5 + Math.random() * 47.5; 
        if (over2xStreak >= 7) r = Math.random() * 52.5; 
        
        if (r <= 5.0) cp = 1.00;
        else if (r <= 10.0) cp = 1.01 + Math.random() * 0.08;
        else if (r <= 15.0) cp = 1.10 + Math.random() * 0.09;
        else if (r <= 20.0) cp = 1.20 + Math.random() * 0.09;
        else if (r <= 25.0) cp = 1.30 + Math.random() * 0.09;
        else if (r <= 30.0) cp = 1.40 + Math.random() * 0.09;
        else if (r <= 34.5) cp = 1.50 + Math.random() * 0.09;
        else if (r <= 39.0) cp = 1.60 + Math.random() * 0.09;
        else if (r <= 43.5) cp = 1.70 + Math.random() * 0.09;
        else if (r <= 48.0) cp = 1.80 + Math.random() * 0.09;
        else if (r <= 52.5) cp = 1.90 + Math.random() * 0.09;
        else if (r <= 62.5) cp = 2.00 + Math.random() * 0.49;
        else if (r <= 69.5) cp = 2.50 + Math.random() * 0.24;
        else if (r <= 76.5) cp = 2.75 + Math.random() * 0.24;
        else if (r <= 81.5) cp = 3.00 + Math.random() * 0.49;
        else if (r <= 83.7) cp = 3.50 + Math.random() * 0.49;
        else if (r <= 85.9) cp = 4.00 + Math.random() * 0.49;
        else if (r <= 88.1) cp = 4.50 + Math.random() * 0.49;
        else if (r <= 90.1) cp = 5.00 + Math.random() * 0.49;
        else if (r <= 91.6) cp = 5.50 + Math.random() * 0.49;
        else if (r <= 93.1) cp = 6.00 + Math.random() * 0.99;
        else if (r <= 94.6) cp = 7.00 + Math.random() * 2.99;
        else if (r <= 95.6) cp = 10.00 + Math.random() * 4.99;
        else if (r <= 96.6) cp = 15.00 + Math.random() * 4.99;
        else if (r <= 97.1) cp = 20.00 + Math.random() * 4.99;
        else if (r <= 97.6) cp = 25.00 + Math.random() * 24.99;
        else if (r <= 98.1) cp = 50.00 + Math.random() * 24.99;
        else if (r <= 98.35) cp = 75.00 + Math.random() * 24.99;
        else if (r <= 98.60) cp = 100.00 + Math.random() * 49.99;
        else if (r <= 98.85) cp = 150.00 + Math.random() * 99.99;
        else if (r <= 99.10) cp = 250.00 + Math.random() * 249.99;
        else if (r <= 99.225) cp = 500.00 + Math.random() * 249.99;
        else if (r <= 99.35) cp = 750.00 + Math.random() * 249.99;
        else if (r <= 99.475) cp = 1000.00 + Math.random() * 499.99;
        else if (r <= 99.60) cp = 1500.00 + Math.random() * 499.99;
        else if (r <= 99.70) cp = 2000.00 + Math.random() * 499.99;
        else if (r <= 99.80) cp = 2500.00 + Math.random() * 2499.99;
        else if (r <= 99.85) cp = 5000.00 + Math.random() * 4999.99;
        else if (r <= 99.90) cp = 10000.00 + Math.random() * 14999.99;
        else if (r <= 99.93) cp = 25000.00 + Math.random() * 24999.99;
        else if (r <= 99.96) cp = 50000.00 + Math.random() * 49999.99;
        else if (r <= 99.98) cp = 100000.00 + Math.random() * 99999.99;
        else cp = 200000.00 + Math.random() * 799999.99;

        if (cp >= 2) { over2xStreak++; under2xStreak = 0; }
        else { under2xStreak++; over2xStreak = 0; }
        return parseFloat(cp.toFixed(2));
    }

    // --- Game Logic ---
    window.toggleSound = () => { isMuted = !isMuted; localStorage.setItem('isMuted', isMuted); document.getElementById('sound-icon').className = isMuted ? 'fas fa-volume-mute' : 'fas fa-volume-up'; };
    
    function updateUI() {
        document.getElementById('balance-display').innerText = smatBalance.toFixed(6) + " SMAT";
        document.getElementById('bank-display').innerText = bankBalance.toFixed(2);
        document.getElementById('game-id-display').innerText = "#" + gameId;
        document.getElementById('total-pool-display').innerText = (fakePool + (hasBet ? betAmt : 0)).toFixed(2);
        
        const dotsBox = document.getElementById('dots-wrapper');
        dotsBox.innerHTML = (isRunning ? '<div class="history-dot dot-live"></div>' : '') + crashHistoryDots.slice(-20).reverse().map(v => `<div class="history-dot ${getDotColor(v)}"></div>`).join('');
        syncUser();
    }

    function getDotColor(v) { return v <= 1 ? 'dot-white' : v < 2 ? 'dot-gray' : v < 10 ? 'dot-green' : 'dot-yellow'; }

    window.placeBet = () => {
        const val = parseFloat(document.getElementById('bet-amount').value);
        if(isRunning || hasBet || smatBalance < val || val <= 0) return;
        betAmt = val; smatBalance -= val; dailyTotalBet += val; hasBet = true;
        document.getElementById('action-btn').innerText = "WAITING...";
        updateUI();
    };

    function startFlight() {
        isRunning = true; currentMultiplier = 1.00; crashAt = calculateCrashPoint();
        document.getElementById('plane').style.opacity = "1";
        const btn = document.getElementById('action-btn');
        if(hasBet) {
            btn.onclick = manualCashOut; btn.innerText = "CASH OUT";
            btn.className = "w-full bg-green-500 text-black py-4 rounded-xl font-black text-xl";
        }

        gameLoop = setInterval(() => {
            currentMultiplier += (currentMultiplier < 10 ? 0.01 : currentMultiplier * 0.005);
            if(currentMultiplier >= crashAt) { currentMultiplier = crashAt; doCrash(); return; }
            document.getElementById('multiplier').innerText = currentMultiplier.toFixed(2) + "x";
            if(hasBet && !hasCashed) btn.innerText = "CASH OUT: " + (betAmt * currentMultiplier).toFixed(4);
            
            let autoVal = parseFloat(document.getElementById('auto-cashout').value);
            if(hasBet && !hasCashed && currentMultiplier >= autoVal) manualCashOut();
        }, 60);
    }

    function manualCashOut() {
        if(!hasBet || hasCashed) return;
        hasCashed = true; const win = betAmt * currentMultiplier;
        smatBalance += win; bankBalance -= (win - betAmt);
        document.getElementById('cashout-msg-amount').innerText = win.toFixed(6) + " SMAT";
        document.getElementById('cashout-popup').style.display = 'block';
        setTimeout(() => document.getElementById('cashout-popup').style.display = 'none', 2000);
        updateUI();
    }

    function doCrash() {
        clearInterval(gameLoop); isRunning = false; isGameOver = true;
        document.getElementById('multiplier').innerText = "CRASHED";
        document.getElementById('multiplier').style.color = "#ef4444";
        document.getElementById('plane').style.opacity = "0";
        crashHistoryDots.push(currentMultiplier);
        if(!hasCashed && hasBet) bankBalance += betAmt;
        
        update(ref(db, 'game_stats'), { history: crashHistoryDots, lastCrash: currentMultiplier, currentGameId: ++gameId });
        
        setTimeout(() => {
            hasBet = false; hasCashed = false; isGameOver = false;
            document.getElementById('multiplier').style.color = "#f0b90b";
            document.getElementById('action-btn').onclick = window.placeBet;
            document.getElementById('action-btn').innerText = "PLACE BET";
            document.getElementById('action-btn').className = "w-full bg-yellow-500 text-black py-4 rounded-xl font-black text-xl";
            prepareRound();
        }, 2000);
    }

    function prepareRound() {
        let t = 10; document.getElementById('countdown-overlay').style.display = 'flex';
        fakePool = Math.random() * 500 + 100;
        updateUI();
        const timer = setInterval(() => {
            t--; document.getElementById('timer-num').innerText = t;
            if(t <= 0) { clearInterval(timer); document.getElementById('countdown-overlay').style.display = 'none'; startFlight(); }
        }, 1000);
    }

    // Initialize
    onValue(ref(db, 'game_stats'), (snap) => {
        if(snap.exists()) { crashHistoryDots = snap.val().history || []; gameId = snap.val().currentGameId || 100000; updateUI(); }
    });
    prepareRound();
</script>
</body>
</html>
