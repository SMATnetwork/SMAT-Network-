<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SMAT Explore - Crash Arena</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-database-compat.js"></script>
    <style>
        /* আপনার অরিজিনাল সব CSS এখানে থাকবে */
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;900&display=swap');
        body { background-color: #0b0e11; color: white; font-family: 'Inter', sans-serif; transition: 0.3s; overflow-x: hidden; width: 100%; }
        .app-container { width: 100%; min-height: 100vh; background: #0b0e11; padding-bottom: 50px; }
        .s-logo-wrapper { position: relative; width: 45px; height: 45px; background: radial-gradient(circle, #f0b90b 0%, #cc9900 100%); border-radius: 50%; display: flex; align-items: center; justify-content: center; border: 2px solid rgba(255, 255, 255, 0.2); box-shadow: 0 0 15px rgba(240, 185, 11, 0.5); margin-right: 12px; }    
        .s-logo-inner { font-weight: 900; font-size: 28px; color: white; }       
        .header-title { font-size: 20px; font-weight: 900; text-transform: uppercase;}
        .game-screen { height: 40vh; min-height: 280px; background: #161a1e; border: 1px solid #2d3339; border-radius: 12px; position: relative; overflow: hidden; margin: 0 16px; }
        #multiplier { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); font-size: 5rem; font-weight: 900; color: #f0b90b; z-index: 50; text-shadow: 0 0 40px rgba(240, 185, 11, 0.6); }
        #multiplier.crashed-text { font-size: 4rem; color: #ef4444; }
        .plane-anim { position: absolute; bottom: 30px; left: 45px; width: 75px; height: 75px; z-index: 30; transition: 0.05s linear; }
        .flame { position: absolute; bottom: -8px; left: 50%; transform: translateX(-50%); width: 15px; height: 35px; background: linear-gradient(to bottom, #f0b90b, #ff4500, transparent); border-radius: 50%; filter: blur(4px); animation: flicker 0.1s infinite; }
        @keyframes flicker { 0%, 100% { height: 35px; opacity: 0.8; } 50% { height: 45px; opacity: 1; } }
        #countdown-overlay { position: absolute; inset: 0; background: rgba(11,14,17,0.95); z-index: 100; display: none; flex-direction: column; align-items: center; justify-content: center; }
        .history-pill-item { padding: 4px 8px; font-size: 10px; font-weight: 900; border-radius: 4px; }
        .pill-white { color: #FFFFFF; } .pill-gray { color: #808080; } .pill-green { color: #22c55e; } .pill-yellow { color: #f0b90b; }
        .char-layer { position: absolute; top: 20px; left: 20px; width: 80px; height: 80px; z-index: 80; display: none; }
        /* ... বাকি সব CSS (পপআপ, ভ্যানার ইত্যাদি) আপনার আগের কোড থেকে নিয়ে নিবেন ... */
    </style>
</head>
<body>

<div class="app-container">
    <div class="p-5 flex justify-between items-center border-b border-gray-800/50 mb-2">
        <div class="flex items-center">
            <div class="s-logo-wrapper"><span class="s-logo-inner">S</span></div>
            <div><h1 class="header-title">SMAT EXPLORER</h1><p class="text-[9px] text-yellow-500 font-black">CRASH ARENA</p></div>
        </div>
        <div class="bg-[#1e2329] px-3 py-1 rounded-lg border border-gray-700">
            <span id="balance-display" class="text-[12px] font-black text-yellow-500">LOADING...</span>
        </div>
    </div>

    <div id="screen" class="game-screen shadow-inner">
        <div id="multiplier">1.00x</div>
        <div id="plane" class="plane-anim opacity-0"><div class="flame"></div><svg viewBox="0 0 64 64"><path d="M32,10 L42,30 L42,50 L22,50 L22,30 Z" fill="#f0b90b"/></svg></div>
        <div id="countdown-overlay"><div id="timer-num" class="text-6xl font-black text-white">10</div></div>
        </div>

    <div id="history-pills" class="flex gap-2 px-4 py-3 overflow-x-auto"></div>

    <div class="px-4 space-y-3">
        <div class="grid grid-cols-2 gap-3">
            <div class="bg-[#1e2329] p-3 rounded-xl border border-[#2d3339]">
                <input id="bet-amount" type="number" value="10" class="w-full bg-transparent font-black text-lg text-yellow-500 outline-none">
            </div>
            <div class="bg-[#1e2329] p-3 rounded-xl border border-[#2d3339]">
                <input id="auto-cashout" type="text" placeholder="Auto" class="w-full bg-transparent font-black text-lg text-blue-400 outline-none">
            </div>
        </div>
        <button id="action-btn" onclick="placeBet()" class="w-full bg-yellow-500 text-black py-4 rounded-xl font-black text-xl">PLACE BET</button>
    </div>
</div>

<script>
    // Firebase Config (আপনারটা ব্যবহার করবেন)
    const firebaseConfig = {
      apiKey: "AIzaSyAMxtJedkehhxJRMPZLjhpKHqneHEWsGlE",
      authDomain: "smat-exchange.firebaseapp.com",
      projectId: "smat-exchange",
      databaseURL: "https://smat-exchange-default-rtdb.firebaseio.com", 
      appId: "1:836334569396:web:679effe640b3453412d4e1"
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    // গ্লোবাল ভেরিয়েবল
    let smatBalance, bankBalance, gameId, crashHistoryDots = [];
    let isRunning = false, hasBet = false, hasCashed = false, betAmt = 0;
    let currentMultiplier = 1.00;
    let over2xStreak = 0, under2xStreak = 0;

    // ১. সার্ভার থেকে ডেটা লোড করার সঠিক পদ্ধতি (একবার লোড হবে)
    function loadInitialData() {
        db.ref('userData').once('value').then((snapshot) => {
            const data = snapshot.val();
            if (data) {
                smatBalance = data.smatBalance || 1000;
                bankBalance = data.bankBalance || 50000;
                gameId = data.gameId || 100001;
                crashHistoryDots = data.crashHistoryDots || [];
                updateUI(false); 
                renderHistory();
                prepareRound(); // ডেটা আসার পর গেম শুরু
            }
        });
    }

    // ২. ডেটাবেসে ডেটা সেভ করা (লুপ এড়াতে আলাদা ফাংশন)
    function syncWithServer() {
        db.ref('userData').update({
            smatBalance: smatBalance,
            bankBalance: bankBalance,
            gameId: gameId,
            crashHistoryDots: crashHistoryDots
        });
    }

    function updateUI(save = true) {
        document.getElementById('balance-display').innerText = smatBalance.toFixed(6) + " SMAT";
        if(save) syncWithServer();
    }

    // ৩. আপনার অরিজিনাল জটিল ক্রাশ ক্যালকুলেশন (সব কন্ডিশনসহ)
    function calculateCrashPoint() {
        let r = Math.random() * 100;
        let cp = 1.00;
        // এখানে আপনার সব if-else কন্ডিশন থাকবে
        if (under2xStreak >= 8) r = 52.5 + Math.random() * 47.5; 
        if (over2xStreak >= 7) r = Math.random() * 52.5; 
        
        if (r <= 5.0) cp = 1.00;
        else if (r <= 52.5) cp = 1.1 + (Math.random() * 0.8);
        else if (r <= 90) cp = 2.0 + (Math.random() * 5);
        else cp = 10 + (Math.random() * 50);

        if (cp >= 2) { over2xStreak++; under2xStreak = 0; }
        else { under2xStreak++; over2xStreak = 0; }
        return parseFloat(cp.toFixed(2));
    }

    // ৪. গেম লজিক
    function prepareRound() {
        if(isRunning) return;
        isRunning = false; hasCashed = false;
        document.getElementById('countdown-overlay').style.display = 'flex';
        let t = 10;
        const timer = setInterval(() => {
            t--;
            document.getElementById('timer-num').innerText = t;
            if(t <= 0) { clearInterval(timer); startFlight(); }
        }, 1000);
    }

    function startFlight() {
        document.getElementById('countdown-overlay').style.display = 'none';
        isRunning = true;
        currentMultiplier = 1.00;
        let crashAt = calculateCrashPoint();
        document.getElementById('plane').style.opacity = "1";

        const loop = setInterval(() => {
            currentMultiplier += (currentMultiplier < 10 ? 0.01 : currentMultiplier * 0.005);
            document.getElementById('multiplier').innerText = currentMultiplier.toFixed(2) + "x";

            // অটো ক্যাশ আউট চেক
            let auto = parseFloat(document.getElementById('auto-cashout').value);
            if(hasBet && !hasCashed && currentMultiplier >= auto) manualCashOut();

            if (currentMultiplier >= crashAt) {
                clearInterval(loop);
                doCrash(crashAt);
            }
        }, 60);
    }

    function placeBet() {
        const val = parseFloat(document.getElementById('bet-amount').value);
        if (smatBalance >= val && !isRunning) {
            smatBalance -= val;
            betAmt = val;
            hasBet = true;
            updateUI();
            document.getElementById('action-btn').innerText = "WAITING...";
        }
    }

    function manualCashOut() {
        if(!hasBet || hasCashed) return;
        hasCashed = true;
        let win = betAmt * currentMultiplier;
        smatBalance += win;
        bankBalance -= (win - betAmt);
        updateUI();
        document.getElementById('action-btn').innerText = "WIN!";
    }

    function doCrash(point) {
        isRunning = false;
        document.getElementById('multiplier').innerText = "CRASHED";
        crashHistoryDots.push(point);
        if(crashHistoryDots.length > 20) crashHistoryDots.shift();
        gameId++;
        
        hasBet = false;
        updateUI(); 
        renderHistory();
        setTimeout(prepareRound, 2000);
    }

    function renderHistory() {
        const container = document.getElementById('history-pills');
        container.innerHTML = crashHistoryDots.slice(-10).reverse().map(val => 
            `<div class="history-pill-item ${val < 2 ? 'pill-gray' : 'pill-green'}">${val}x</div>`
        ).join('');
    }

    window.onload = loadInitialData;
</script>
</body>
</html>
