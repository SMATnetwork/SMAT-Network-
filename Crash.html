<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SMAT Explore - Crash Arena</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Ccircle cx='50' cy='50' r='48' fill='%23F3BA2F'/%3E%3Cpath d='M30 35 C 30 25, 70 25, 70 35 L 70 45 C 70 50, 30 50, 30 55 L 30 65 C 30 75, 70 75, 70 65' stroke='white' stroke-width='10' fill='none' stroke-linecap='round'/%3E%3C/svg%3E">
    
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
        import { getDatabase, ref, onValue, set, update, increment } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyAMxtJedkehhxJRMPZLjhpKHqneHEWsGlE",
            authDomain: "smat-exchange.firebaseapp.com",
            projectId: "smat-exchange",
            databaseURL: "https://smat-exchange-default-rtdb.firebaseio.com", // আপনার প্রজেক্ট অনুযায়ী এটা চেক করে নিবেন
            storageBucket: "smat-exchange.firebasestorage.app",
            messagingSenderId: "836334569396",
            appId: "1:836334569396:web:679effe640b3453412d4e1"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getDatabase(app);

        // --- Auth Guard ---
        onAuthStateChanged(auth, (user) => {
            if (!user) {
                window.location.href = "login.html"; // লগইন না থাকলে রিডাইরেক্ট
            } else {
                initGame(user);
            }
        });

        function initGame(user) {
            const userRef = ref(db, 'users/' + user.uid);
            
            // ব্যালেন্স সিঙ্ক
            onValue(userRef, (snapshot) => {
                const data = snapshot.val();
                if (data) {
                    document.getElementById('balance-display').innerText = parseFloat(data.balance).toFixed(6) + " SMAT";
                    window.smatBalance = data.balance;
                }
            });

            // গেম স্টেট সিঙ্ক (গ্লোবাল গেম সার্ভার হিসেবে কাজ করবে)
            const gameRef = ref(db, 'game_state/crash');
            onValue(gameRef, (snapshot) => {
                const state = snapshot.val();
                if (state && state.status === 'running') {
                    // যদি গেম অলরেডি সার্ভারে চলছে, তবে এখানেও শুরু হবে
                }
            });
        }
        
        // গ্লোবাল ফাংশন হিসেবে সেট করা যাতে বাটন থেকে কাজ করে
        window.placeBetFirebase = async (amount) => {
            const user = auth.currentUser;
            if(!user) return;
            const userRef = ref(db, 'users/' + user.uid);
            await update(userRef, {
                balance: increment(-amount)
            });
            // Firebase এ বেট রেকর্ড করা
        };
    </script>

    <style>
        /* আপনার CSS স্টাইলগুলো এখানে অপরিবর্তিত থাকবে */
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;900&display=swap');
        body { background-color: #0b0e11; color: white; font-family: 'Inter', sans-serif; overflow-x: hidden; width: 100%; margin:0; }
        .app-container { width: 100%; min-height: 100vh; background: #0b0e11; padding-bottom: 50px; }
        .s-logo-wrapper { position: relative; width: 45px; height: 45px; background: radial-gradient(circle, #f0b90b 0%, #cc9900 100%); border-radius: 50%; display: flex; align-items: center; justify-content: center; border: 2px solid rgba(255, 255, 255, 0.2); box-shadow: 0 0 15px rgba(240, 185, 11, 0.5); margin-right: 12px; }
        .s-logo-inner { font-weight: 900; font-size: 28px; color: white; }
        .game-screen { height: 40vh; min-height: 280px; background: #161a1e; border: 1px solid #2d3339; border-radius: 12px; position: relative; overflow: hidden; margin: 0 16px; }
        #multiplier { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); font-size: 5rem; font-weight: 900; color: #f0b90b; z-index: 50; text-shadow: 0 0 40px rgba(240, 185, 11, 0.4); }
        .plane-anim { position: absolute; bottom: 30px; left: 45px; width: 75px; height: 75px; z-index: 30; }
        /* ... বাকি CSS আগের মতোই থাকবে ... */
    </style>
</head>
<body>
    <div class="app-container">
        <div class="p-5 flex justify-between items-center border-b border-gray-800/50 mb-2">
            <div class="flex items-center">
                <div class="s-logo-wrapper"><span class="s-logo-inner">S</span></div>
                <h1 class="text-xl font-black uppercase">SMAT EXPLORER</h1>
            </div>
            <div id="balance-display" class="bg-[#1e2329] px-3 py-1 rounded-lg border border-gray-700 text-yellow-500 font-bold">0.000000 SMAT</div>
        </div>

        <div id="screen" class="game-screen shadow-inner">
            <div id="multiplier">1.00x</div>
            <div id="plane" class="plane-anim opacity-0">
                <svg viewBox="0 0 64 64"><path d="M32,10 L42,30 L42,50 L22,50 L22,30 Z" fill="#f0b90b" /></svg>
            </div>
            <div id="countdown-overlay" class="absolute inset-0 bg-black/90 flex flex-col items-center justify-center z-[100] hidden">
                <div class="text-yellow-500 text-xs mb-2">NEXT ROUND IN</div>
                <div id="timer-num" class="text-6xl font-black">10</div>
            </div>
        </div>

        <div class="p-4 space-y-4">
            <input id="bet-amount" type="number" value="10" class="w-full bg-[#1e2329] p-4 rounded-xl text-yellow-500 font-bold text-xl outline-none border border-gray-700">
            <button id="action-btn" onclick="handleAction()" class="w-full bg-yellow-500 text-black py-4 rounded-xl font-black text-xl">PLACE BET</button>
        </div>
    </div>

<script>
    // গেম লজিক ভেরিয়েবল
    let isRunning = false;
    let currentMult = 1.0;
    let betAmount = 0;
    let hasBet = false;
    let hasCashed = false;

    async function handleAction() {
        const btn = document.getElementById('action-btn');
        const amt = parseFloat(document.getElementById('bet-amount').value);

        if (!isRunning && !hasBet) {
            // Place Bet
            if (window.smatBalance >= amt) {
                await window.placeBetFirebase(amt);
                betAmount = amt;
                hasBet = true;
                btn.innerText = "WAITING FOR ROUND...";
                btn.className = "w-full bg-gray-700 text-gray-400 py-4 rounded-xl font-black text-xl";
            }
        } else if (isRunning && hasBet && !hasCashed) {
            // Cash Out
            cashOut();
        }
    }

    function cashOut() {
        hasCashed = true;
        const win = betAmount * currentMult;
        // Firebase update logic here (সফল ক্যাশ আউট হলে ডাটাবেসে এড হবে)
        document.getElementById('action-btn').innerText = "CASHED OUT!";
        alert("You won: " + win.toFixed(4));
    }

    // ল্যাগ কমানোর জন্য গেম লুপ (Animation Frame)
    function gameLoop() {
        if (isRunning) {
            currentMult += 0.01; // এটা সার্ভার থেকে আসা ভ্যালুর সাথে সিঙ্ক হবে
            document.getElementById('multiplier').innerText = currentMult.toFixed(2) + "x";
            
            if (hasBet && !hasCashed) {
                document.getElementById('action-btn').innerText = "CASH OUT: " + (betAmount * currentMult).toFixed(2);
                document.getElementById('action-btn').className = "w-full bg-green-500 text-black py-4 rounded-xl font-black text-xl";
            }
        }
        requestAnimationFrame(gameLoop);
    }
    gameLoop();

    // ফেক প্লেয়ার জেনারেশন এবং অন্যান্য UI লজিক আগের মতোই কাজ করবে।
</script>
</body>
</html>
