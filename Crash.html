<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SMAT EXPLORER - FINAL</title>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-database-compat.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background-color: #0b0e11; color: white; font-family: sans-serif; overflow: hidden; }
        .game-screen { height: 40vh; background: #161a1e; border-radius: 12px; position: relative; margin: 10px 16px; border: 1px solid #2d3339; overflow: hidden; }
        #multiplier { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); font-size: 5rem; font-weight: 900; color: #f0b90b; z-index: 50; }
        .history-pill { padding: 2px 8px; border-radius: 4px; font-size: 11px; font-weight: 800; background: #1e2329; margin-right: 5px; }
        #loading { position: fixed; inset: 0; background: #0b0e11; z-index: 9999; display: flex; align-items: center; justify-content: center; }
    </style>
</head>
<body>

<div id="loading">Syncing with Firebase...</div>

<div class="app-container">
    <div class="p-5 flex justify-between items-center border-b border-gray-800">
        <div class="flex items-center">
            <div class="bg-yellow-500 w-10 h-10 rounded-full flex items-center justify-center font-black text-black text-xl mr-3">S</div>
            <h1 class="text-lg font-black tracking-tighter">SMAT EXPLORER</h1>
        </div>
        <div class="bg-[#1e2329] px-3 py-1 rounded border border-gray-700">
            <span id="bal-text" class="text-yellow-500 font-bold text-sm">0.00 SMAT</span>
        </div>
    </div>

    <div class="px-4 py-2 flex justify-between text-[10px] font-bold text-gray-500">
        <span>BANK: <span id="bank-text" class="text-blue-400">0.00</span></span>
        <span>ID: <span id="id-text" class="text-white">#0</span></span>
    </div>

    <div class="game-screen">
        <div id="multiplier">1.00x</div>
        <div id="timer-box" class="absolute inset-0 bg-black/80 z-[60] hidden flex flex-col items-center justify-center">
            <p class="text-yellow-500 text-[10px] font-bold mb-1">NEXT ROUND</p>
            <h2 id="timer-val" class="text-6xl font-black">10</h2>
        </div>
    </div>

    <div id="history-box" class="px-4 flex overflow-x-auto mb-4"></div>

    <div class="px-4 space-y-3">
        <div class="grid grid-cols-2 gap-3">
            <div class="bg-[#1e2329] p-2 rounded border border-gray-800">
                <p class="text-[9px] text-gray-500 font-bold">BET AMOUNT</p>
                <input id="bet-input" type="number" value="10" class="w-full bg-transparent font-black outline-none text-yellow-500">
            </div>
            <div class="bg-[#1e2329] p-2 rounded border border-gray-800">
                <p class="text-[9px] text-gray-500 font-bold">AUTO EXIT</p>
                <input id="auto-input" type="number" placeholder="2.00" class="w-full bg-transparent font-black outline-none text-blue-400">
            </div>
        </div>
        <button id="btn-action" onclick="placeBet()" class="w-full bg-yellow-500 text-black py-4 rounded-xl font-black text-xl">PLACE BET</button>
    </div>
</div>

<script>
const firebaseConfig = {
    apiKey: "AIzaSyAc6G7verW9GekalzSQG8viyEhdGXxpuwM",
    authDomain: "crashgame-48d45.firebaseapp.com",
    projectId: "crashgame-48d45",
    databaseURL: "https://crashgame-48d45-default-rtdb.firebaseio.com",
    storageBucket: "crashgame-48d45.firebasestorage.app",
    messagingSenderId: "174632106924",
    appId: "1:174632106924:web:3960713c7c82380a839809"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.database();

let userBal = 0, bankBal = 0, gId = 0, currentM = 1.0, isRun = false, isBet = false, bAmt = 0, crashP = 0;

// --- ১. ডেটাবেস থেকে রিয়েলটাইম লোড ---
db.ref('gameData').on('value', (s) => {
    const d = s.val();
    if(d) {
        bankBal = d.bankBalance;
        gId = d.gameId;
        userBal = d.userBalance || parseFloat(localStorage.getItem('smatBalance')) || 500;
        
        document.getElementById('bank-text').innerText = bankBal.toFixed(2);
        document.getElementById('id-text').innerText = "#" + gId;
        document.getElementById('bal-text').innerText = userBal.toFixed(4) + " SMAT";
        document.getElementById('loading').style.display = 'none';
    }
});

// --- ২. ডাটাবেস আপডেট (Promise base) ---
async function saveDB() {
    await db.ref('gameData').update({
        bankBalance: bankBal,
        gameId: gId,
        userBalance: userBal
    });
    localStorage.setItem('smatBalance', userBal);
}

function getCrash() {
    let r = Math.random() * 100;
    if(r < 10) return 1.00; // ১০% ১.০০ এ ক্রাশ
    if(r < 60) return parseFloat((1.1 + Math.random() * 1.5).toFixed(2));
    if(r < 90) return parseFloat((2.5 + Math.random() * 10).toFixed(2));
    return parseFloat((15 + Math.random() * 100).toFixed(2));
}

function startTimer() {
    isRun = false;
    document.getElementById('multiplier').innerText = "1.00x";
    document.getElementById('multiplier').style.color = "#f0b90b";
    document.getElementById('timer-box').style.display = 'flex';
    let t = 8;
    let iv = setInterval(() => {
        t--;
        document.getElementById('timer-val').innerText = t;
        if(t <= 0) { clearInterval(iv); document.getElementById('timer-box').style.display = 'none'; runGame(); }
    }, 1000);
}

async function placeBet() {
    if(isRun || isBet) return;
    let v = parseFloat(document.getElementById('bet-input').value);
    if(v > userBal || v <= 0) return alert("Low Balance!");
    
    bAmt = v;
    userBal -= v;
    isBet = true;
    await saveDB(); // ব্যালেন্স কাটার পর সাথে সাথে সেভ
    
    let btn = document.getElementById('btn-action');
    btn.innerText = "WAITING...";
    btn.disabled = true;
}

function runGame() {
    isRun = true;
    currentM = 1.0;
    crashP = getCrash();
    
    if(isBet) {
        let btn = document.getElementById('btn-action');
        btn.disabled = false;
        btn.innerText = "CASH OUT";
        btn.className = "w-full bg-green-500 text-black py-4 rounded-xl font-black text-xl";
        btn.onclick = doCash;
    }

    let loop = setInterval(() => {
        currentM += 0.01;
        if(currentM >= crashP) { clearInterval(loop); crash(); }
        document.getElementById('multiplier').innerText = currentM.toFixed(2) + "x";
        
        let auto = parseFloat(document.getElementById('auto-input').value);
        if(isBet && auto > 1 && currentM >= auto) doCash();
    }, 50);
}

async function doCash() {
    if(!isBet) return;
    let win = bAmt * currentM;
    userBal += win;
    bankBal -= (win - bAmt);
    isBet = false;
    await saveDB();
    
    document.getElementById('btn-action').innerText = "WIN!";
    document.getElementById('btn-action').disabled = true;
}

async function crash() {
    isRun = false;
    document.getElementById('multiplier').innerText = "CRASHED";
    document.getElementById('multiplier').style.color = "#ff4d4d";
    
    if(isBet) {
        bankBal += bAmt; // হারলে টাকা ব্যাংকে
        isBet = false;
    }
    gId++;
    await saveDB();
    
    setTimeout(() => {
        let btn = document.getElementById('btn-action');
        btn.innerText = "PLACE BET";
        btn.disabled = false;
        btn.onclick = placeBet;
        btn.className = "w-full bg-yellow-500 text-black py-4 rounded-xl font-black text-xl";
        startTimer();
    }, 3000);
}

window.onload = startTimer;
</script>
</body>
</html>
