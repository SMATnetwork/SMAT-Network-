<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SMAT Explore - Crash Arena</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><circle cx='50' cy='50' r='50' fill='%23f3ba2f'/><text x='50%25' y='55%25' text-anchor='middle' dy='.3em' fill='black' font-family='Courier New, monospace' font-weight='900' font-size='60'>S</text></svg>">
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;900&display=swap');
        
        body { background-color: #0b0e11; color: white; font-family: 'Inter', sans-serif; transition: 0.3s; overflow-x: hidden; width: 100%; }
        .app-container { 
        width: 100%;             /* পুরো ডিসপ্লে জুড়ে থাকবে */
        min-height: 100vh;       /* স্ক্রিনের উচ্চতা অনুযায়ী অ্যাডজাস্ট হবে */
        background: #0b0e11; 
        border-left: none;       /* বর্ডার রাখার দরকার নেই যদি ফুল স্ক্রিন চান */
        border-right: none; 
        padding-bottom: 50px;
        margin: 0;               /* কোনো মার্জিন থাকবে না */
        box-sizing: border-box;  /* প্যাডিং দিলেও যাতে স্ক্রিনের বাইরে না যায় */
        }
        
        .s-logo-wrapper { position: relative; width: 45px; height: 45px; background: radial-gradient(circle, #f0b90b 0%, #cc9900 100%); border-radius: 50%; display: flex; align-items: center; justify-content: center; border: 2px solid rgba(255, 255, 255, 0.2); box-shadow: 0 0 15px rgba(240, 185, 11, 0.5), inset 0 0 8px rgba(0,0,0,0.3); margin-right: 12px; }    
        .s-logo-inner { font-family: 'Inter', sans-serif; font-weight: 900; font-size: 28px; color: white; text-shadow: 1px 2px 4px rgba(0,0,0,0.3); position: relative; z-index: 2; }       
        .header-title { font-size: 20px; font-weight: 900; letter-spacing: -0.5px; line-height: 1; text-transform: uppercase;}

        .game-screen { height: 40vh; min-height: 280px; background: #161a1e; border: 1px solid #2d3339; border-radius: 12px; position: relative; overflow: hidden; margin: 0 16px; transition: all 0.5s ease; }
        #multiplier { 
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); 
            font-size: 5rem; font-weight: 900; color: #f0b90b; z-index: 50; 
            text-shadow: 0 0 40px rgba(240, 185, 11, 0.6), 0 0 10px rgba(0,0,0,1); 
            letter-spacing: -2px; transition: font-size 0.2s ease;
        }
        #multiplier.crashed-text { 
        font-size: 6vw; /* স্ক্রিনের প্রস্থের ৮% হিসেবে ফন্ট সাইজ হবে */
        letter-spacing: 0; 
        white-space: nowrap; /* লেখা যাতে ভেঙে নিচে না যায় */
        }

        .char-layer { position: absolute; top: 20px; left: 20px; width: 80px; height: 80px; z-index: 80; display: none; pointer-events: none; }
        @keyframes charFloat { 0% { transform: translateY(0px) rotate(0deg); } 50% { transform: translateY(-10px) rotate(5deg); } 100% { transform: translateY(0px) rotate(0deg); } }
        .char-layer svg { width: 100%; height: 100%; animation: charFloat 2s ease-in-out infinite; }

        #dots-wrapper { display: flex; gap: 6px; flex-direction: row; justify-content: flex-start; align-items: center; overflow: hidden; width: 100%; }
        
        /* পিলস কন্টেইনার আপডেট: ২ লাইনে ১০টি করে */
        #history-pills {
            display: flex;
            flex-wrap: wrap; 
            gap: 4px;        
            width: calc(100% - 32px);
            margin: 0 16px;
            justify-content: flex-start;
            height: auto;
            min-height: 40px;
            background: none;
        }
        
        /* প্রতিটি পিলের সাইজ নির্ধারণ */
        .history-pill-item {
            width: calc(10% - 4px); /* প্রতি লাইনে ১০টি */
            text-align: center;
            font-size: 9px;
            font-weight: 900;
            padding: 4px 0;
            border-radius: 4px;
            flex-shrink: 0;
        }
        
        .history-dot { width: 15px; height: 15px; border-radius: 50%; flex-shrink: 0; }
        .dot-white { background-color: #FFFFFF; }
        .dot-gray { background-color: #808080; }
        .dot-green { background-color: #008000; }
        .dot-yellow { background-color: #FFFF00; }
        .pill-white { color: #FFFFFF; }
        .pill-gray { color: #808080;  }
        .pill-green { color: #008000; }
        .pill-yellow { color: #FFFF00;}
        .dot-live { background: rgba(255, 255, 255, 0.2); border: 1px dashed rgba(255, 255, 255, 0.4); animation: dotPulse 1s infinite alternate; filter: blur(1px); order: -1; }
        @keyframes dotPulse { from { opacity: 0.3; transform: scale(0.8); } to { opacity: 0.7; transform: scale(1.1); } }

        .vfx-layer { position: absolute; inset: 0; pointer-events: none; opacity: 0; transition: opacity 1s; }
        .rainbow-bg { background: linear-gradient(45deg, rgba(255,0,0,0.1), rgba(0,255,0,0.1), rgba(0,0,255,0.1)); animation: rotateBg 5s linear infinite; }
        .blackhole { background: radial-gradient(circle, transparent 30%, #000 70%); animation: spin 3s linear infinite; scale: 2; }
        @keyframes rotateBg { 0% { filter: hue-rotate(0deg); } 100% { filter: hue-rotate(360deg); } }
        @keyframes spin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
        #cloud-layer { position: absolute; inset: -100px; background: url('https://www.transparenttextures.com/patterns/clouds.png'); opacity: 0; z-index: 5; transition: opacity 1s; }
        .moving-clouds { animation: cloudMove 3s linear infinite; }
        @keyframes cloudMove { from { transform: translate(0, 0); } to { transform: translate(-150px, 150px); } }

        .y-axis, .x-axis { font-size: 10px; color: #474d57; font-weight: 900; z-index: 45; position: absolute; }
        .y-axis { left: 8px; top: 10px; bottom: 35px; display: flex; flex-direction: column-reverse; justify-content: space-between; height: 260px; }
        .x-axis { left: 50px; bottom: 8px; right: 15px; display: flex; justify-content: space-between; }
        .grid-lines { position: absolute; inset: -200px; background-image: linear-gradient(#23272c 1px, transparent 1px), linear-gradient(90deg, #23272c 1px, transparent 1px); background-size: 50px 50px; opacity: 0.15; z-index: 2; }
        .moving-bg { animation: bgScroll 1s linear infinite; }
        @keyframes bgScroll { from { transform: translate(0, 0); } to { transform: translate(-50px, 50px); } }

        .plane-anim { position: absolute; bottom: 30px; left: 45px; width: 75px; height: 75px; z-index: 30; transition: 0.05s linear; }
        .rotor { transform-origin: center; animation: spinRotor 0.1s linear infinite; }
        @keyframes spinRotor { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
        .flame { position: absolute; bottom: -8px; left: 50%; transform: translateX(-50%); width: 15px; height: 35px; background: linear-gradient(to bottom, #f0b90b, #ff4500, transparent); border-radius: 50%; filter: blur(4px); animation: flicker 0.1s infinite; z-index: -1; }
        @keyframes flicker { 0%, 100% { height: 35px; opacity: 0.8; } 50% { height: 45px; opacity: 1; } }
        #origin-light { position: absolute; bottom: 35px; left: 50px; width: 12px; height: 12px; background: #f0b90b; border-radius: 50%; box-shadow: 0 0 20px #f0b90b; z-index: 40; display: none; animation: lightSpin 1s linear infinite; }
        @keyframes lightSpin { 0% { transform: scale(1); opacity: 0.7; } 50% { transform: scale(1.8); opacity: 1; } 100% { transform: scale(1); opacity: 0.7; } }

        .bet-container { margin-top: 20px; padding: 0 16px; }
        .bet-header { display: grid; grid-template-columns: 1.5fr 1fr 1fr 1fr; padding: 10px 14px; background: #161a1e; border-radius: 8px 8px 0 0; border: 1px solid #2d3339; border-bottom: none; font-size: 10px; font-weight: 800; color: #5d6670; text-transform: uppercase; letter-spacing: 1px; }
        .bet-grid-box { background: #161a1e; border: 1px solid #2d3339; border-radius: 0 0 8px 8px; overflow: hidden; }
        .bet-row { display: grid; grid-template-columns: 1.5fr 1fr 1fr 1fr; padding: 14px; border-bottom: 1px solid rgba(45, 51, 57, 0.5); align-items: center; transition: all 0.2s ease; }
        .player-name { font-size: 11px; font-weight: 700; color: #e1e1e1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
        .bet-value { font-size: 11px; font-weight: 800; color: #f0b90b; text-align: center; }
        .mult-value { font-size: 11px; font-weight: 900; text-align: center; }
        .profit-value { font-size: 11px; font-weight: 900; text-align: right; }
        .text-win { color: #22c55e !important; }
        .text-loss { color: #ef4444 !important; }
        .text-wait { color: #5d6670; }

        #countdown-overlay { position: absolute; inset: 0; background: rgba(11,14,17,0.95); z-index: 100; display: none; flex-direction: column; align-items: center; justify-content: center; }
        #s-bubble { position: fixed; width: 80px; height: 80px; z-index: 9999; cursor: pointer; display: none; animation: floatBubble 10s ease-in-out infinite; }
        @keyframes floatBubble { 0%, 100% { transform: translate(0, 0); } 25% { transform: translate(60vw, 20vh); } 50% { transform: translate(10vw, 70vh); } 75% { transform: translate(50vw, 50vh); } }
        .pop-text { position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); background: #f0b90b; color: black; padding: 20px; border-radius: 15px; font-weight: 900; text-align: center; z-index: 10000; display: none; box-shadow: 0 0 30px rgba(240, 185, 11, 0.5); }
        
        #cashout-popup, #eaten-popup { 
            position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); 
            width: 90%; max-width: 320px; padding: 18px 20px; border-radius: 15px; 
            font-weight: 900; text-align: center; z-index: 10001; display: none; 
            box-shadow: 0 10px 40px rgba(0,0,0,0.5); 
            animation: popIn 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }
        #cashout-popup { background: #22c55e; color: white; }
        #eaten-popup { background: #ef4444; color: white; max-width: 280px; box-shadow: 0 0 30px rgba(239, 68, 68, 0.6); }

        @keyframes popIn { from { transform: translate(-50%, -50%) scale(0.7); opacity: 0; } to { transform: translate(-50%, -50%) scale(1); opacity: 1; } }
        #sound-toggle { background: #1e2329; width: 35px; height: 35px; border-radius: 8px; border: 1px solid #2d3339; display: flex; align-items: center; justify-content: center; cursor: pointer; margin-right: 10px; }
        #sound-toggle i { color: #f0b90b; font-size: 14px; }
    </style>
</head>
<body>

<div id="s-bubble" onclick="popBubble()">
    <div class="s-logo-wrapper" style="width: 100%; height: 100%; margin: 0;">
        <span class="s-logo-inner" style="font-size: 40px;">S</span>
    </div>
</div>

<div id="pop-msg" class="pop-text">
    <div class="text-2xl">Jojo Gift You!</div>
    <div class="mt-1 text-sm">+1.00 SMAT COIN</div>
</div>

<div id="cashout-popup">
    <div class="text-[12px] uppercase tracking-widest opacity-90 mb-1">Successful Cash Out</div>
    <div id="cashout-msg-amount" class="text-2xl font-black">0.000000 SMAT</div>
</div>

<div id="eaten-popup">
    <div class="text-xl font-black italic">Jojo Took All!</div>
    <div class="text-[10px] mt-1 opacity-80 uppercase tracking-tighter">Yahoooo....</div>
</div>

<div class="app-container">
    <div class="p-5 flex justify-between items-center border-b border-gray-800/50 mb-2">
        <div class="flex items-center">
            <div class="s-logo-wrapper"><span class="s-logo-inner">S</span></div>
            <div>
                <h1 class="header-title text-white">SMAT EXPLORER</h1>
                <p class="text-[9px] text-yellow-500 font-black tracking-[2px] -mt-1 uppercase">Crash Arena</p>
            </div>
        </div>
        <div class="flex items-center">
            <div id="sound-toggle" onclick="toggleSound()">
                <i id="sound-icon" class="fas fa-volume-up"></i>
            </div>
            <div class="text-right">
                <div class="bg-[#1e2329] px-3 py-1 rounded-lg border border-gray-700 shadow-inner">
                    <span id="balance-display" class="text-[12px] font-black text-yellow-500">0.000000 SMAT</span>
                </div>
            </div>
        </div>
    </div>

    <div class="dot-container" style="display: flex; align-items: center; padding: 12px; background: #1e2329; border-radius: 8px; margin: 10px 16px; border: 1px solid #2d3339; overflow: hidden;"><div id="dots-wrapper"></div></div>

    <div class="px-4 mb-3 flex justify-between items-center relative z-10">
        <div class="bg-black/40 px-3 py-1 rounded-lg border border-gray-800">
            <span class="text-[9px] text-gray-500 font-bold uppercase">Bank: </span>
            <span id="bank-display" class="text-[10px] font-black text-blue-400">10000.0000</span>
        </div>
        <div class="bg-black/40 px-3 py-1 rounded-lg border border-gray-800">
            <span class="text-[9px] text-gray-500 font-bold uppercase">ID: </span>
            <span id="game-id-display" class="text-[10px] font-black text-white">#100000</span>
        </div>
        <div class="bg-black/40 px-3 py-1 rounded-lg border border-gray-800 text-right">
            <span class="text-[9px] text-gray-500 font-bold uppercase">Pool: </span>
            <span id="total-pool-display" class="text-[10px] font-black text-yellow-500">0.000000</span>
        </div>
    </div>

    <div id="screen" class="game-screen shadow-inner">
        <div id="char-cat" class="char-layer"><svg viewBox="0 0 64 64" xmlns="http://www.w3.org/2000/svg"><rect x="10" y="25" width="44" height="22" rx="4" fill="#3B82F6"/> <rect x="12" y="28" width="10" height="8" rx="1" fill="#93C5FD"/> <rect x="24" y="28" width="10" height="8" rx="1" fill="#93C5FD"/> <rect x="36" y="28" width="10" height="8" rx="1" fill="#93C5FD"/> <rect x="48" y="30" width="6" height="12" fill="#1E3A8A"/> <circle cx="18" cy="48" r="5" fill="#111"/> <circle cx="46" cy="48" r="5" fill="#111"/> <rect x="52" y="40" width="3" height="4" fill="#FBBF24"/> </svg></div>
        <div id="char-girl" class="char-layer"><svg viewBox="0 0 64 64" xmlns="http://www.w3.org/2000/svg"><rect x="8" y="22" width="30" height="24" fill="#EF4444"/> <rect x="38" y="30" width="18" height="16" rx="2" fill="#B91C1C"/> <rect x="42" y="32" width="10" height="6" fill="#FCA5A5"/> <circle cx="15" cy="48" r="6" fill="#111"/> <circle cx="28" cy="48" r="6" fill="#111"/> <circle cx="48" cy="48" r="6" fill="#111"/> <rect x="10" y="25" width="26" height="2" fill="white" opacity="0.3"/> </svg></div>
        <div id="char-fairy" class="char-layer"><svg viewBox="0 0 64 64" xmlns="http://www.w3.org/2000/svg"><path d="M10,25 L45,25 Q55,25 55,35 L55,46 L10,46 Z" fill="#10B981"/> <rect x="12" y="28" width="8" height="6" fill="#A7F3D0"/> <rect x="24" y="28" width="8" height="6" fill="#A7F3D0"/> <rect x="36" y="28" width="8" height="6" fill="#A7F3D0"/> <rect x="48" y="28" width="5" height="10" fill="#064E3B"/> <circle cx="18" cy="48" r="4" fill="#333"/> <circle cx="28" cy="48" r="4" fill="#333"/> <circle cx="38" cy="48" r="4" fill="#333"/> <circle cx="48" cy="48" r="4" fill="#333"/> <path d="M55,40 L60,42 L55,44 Z" fill="#FCD34D"/> </svg></div>
        
        <div id="cloud-layer"></div>
        <div id="vfx-rainbow" class="vfx-layer rainbow-bg"></div>
        <div id="vfx-blackhole" class="vfx-layer blackhole"></div>
        <div id="y-labels" class="y-axis"><span>1.0x</span><span>1.2x</span><span>1.4x</span><span>1.6x</span><span>1.8x</span></div>
        <div id="grid-bg" class="grid-lines"></div>
        <div id="origin-light"></div>
        <div id="multiplier">1.00x</div>
        
        <div id="plane" class="plane-anim opacity-0">
            <div class="flame"></div>
            <svg viewBox="0 0 64 64" xmlns="http://www.w3.org/2000/svg">
                <path d="M32,10 L42,30 L42,50 L22,50 L22,30 Z" fill="#f0b90b" />
                <path d="M32,10 L38,30 L32,45 L26,30 Z" fill="#ffffff" opacity="0.3" />
                <rect x="12" y="35" width="10" height="4" fill="#2d3339" rx="1" />
                <rect x="42" y="35" width="10" height="4" fill="#2d3339" rx="1" />
                <circle class="rotor" cx="12" cy="37" r="6" stroke="#ffffff" stroke-width="1" fill="none" opacity="0.5" />
                <circle class="rotor" cx="52" cy="37" r="6" stroke="#ffffff" stroke-width="1" fill="none" opacity="0.5" />
                <circle cx="32" cy="15" r="2" fill="#ef4444" class="animate-pulse" />
                <path d="M22,40 L10,50 L22,50 Z" fill="#f0b90b" />
                <path d="M42,40 L54,50 L42,50 Z" fill="#f0b90b" />
            </svg>
        </div>
        
        <div id="x-labels" class="x-axis"><span>0s</span><span>1s</span><span>2s</span><span>3s</span><span>4s</span></div>
        
        <div id="countdown-overlay">
            <div class="text-yellow-500 font-black text-xs uppercase mb-2 tracking-widest animate-pulse">Next bet starts in</div>
            <div id="timer-num" class="text-6xl font-black text-white">10</div>
        </div>
    </div>

    <div id="history-pills" class="mt-2"></div>

    <div class="mt-2 px-4 space-y-3">
        <div class="grid grid-cols-2 gap-3">
            <div class="bg-[#1e2329] p-3 rounded-xl border border-[#2d3339]">
                <label class="text-[8px] text-gray-500 font-bold uppercase block mb-1">Bet SMAT</label>
                <div class="flex items-center gap-2">
                    <input id="bet-amount" type="number" value="10" step="0.000001" class="w-full bg-transparent font-black text-lg outline-none text-yellow-500">
                    <div class="flex gap-1">
                        <button onclick="multiplyBet(0.5)" class="bg-gray-800 text-[10px] px-2 py-1 rounded font-bold hover:bg-gray-700 text-gray-400">1/2x</button>
                        <button onclick="multiplyBet(2)" class="bg-gray-800 text-[10px] px-2 py-1 rounded font-bold hover:bg-gray-700 text-gray-400">2x</button>
                    </div>
                </div>
            </div>
            <div class="bg-[#1e2329] p-3 rounded-xl border border-[#2d3339]">
                <label class="text-[8px] text-gray-500 font-bold uppercase block mb-1">Auto Exit</label>
                <input id="auto-cashout" type="text" placeholder="∞" class="w-full bg-transparent font-black text-lg outline-none text-blue-400">
            </div>
        </div>
        <button id="action-btn" onclick="placeBet()" class="w-full bg-yellow-500 text-black py-4 rounded-xl font-black text-xl shadow-lg active:scale-95 transition-all">PLACE BET</button>
    </div>

    <div class="bet-container">
        <div class="flex justify-between items-center mb-3">
            <h3 class="text-[11px] font-black text-white uppercase tracking-widest flex items-center gap-2">
                <span class="w-2 h-2 bg-yellow-500 rounded-full animate-ping"></span> Live Players
            </h3>
            <span id="active-count" class="text-[10px] text-gray-500 font-bold">0/0 Players</span>
        </div>
        <div class="bet-header">
            <span>Player</span>
            <span class="text-center">Bet</span>
            <span class="text-center">Mult</span>
            <span class="text-right">Profit</span>
        </div>
        <div id="live-bet-list" class="bet-grid-box"></div>
        <button id="more-btn" onclick="toggleMore()" class="w-full mt-3 py-2 text-[10px] font-bold text-gray-500 uppercase border border-dashed border-gray-800 rounded-lg" style="display:none;">
            Show More <i class="fas fa-chevron-down ml-1"></i>
        </button>
    </div>
</div>

<script>
    let smatBalance = parseFloat(localStorage.getItem('smatBalance')) || 1000.000000;
    let bankBalance = parseFloat(localStorage.getItem('bankBalance')) || 10000.0000;
    let dailyTotalBet = parseFloat(localStorage.getItem('dailyTotalBet')) || 0;
    let gameId = parseInt(localStorage.getItem('gameId')) || 100000;
    let currentMultiplier = 1.00;
    let isRunning = false;
    let hasBet = false;
    let hasCashed = false;
    let betAmt = 0;
    let crashAt = 0;
    let gameLoop;
    let players = [];
    let fakePool = 0; 
    let isGameOver = false;
    let flightSeconds = 0;
    let over2xStreak = 0;
    let under2xStreak = 0;
    let showAllPlayers = false;
    let crashHistoryDots = JSON.parse(localStorage.getItem('crashHistoryDots')) || [];
    let isProcessingBet = false;
    let isMuted = localStorage.getItem('isMuted') === 'true';
    const audioContext = new (window.AudioContext || window.webkitAudioContext)();

    function toggleSound() {
        isMuted = !isMuted;
        localStorage.setItem('isMuted', isMuted);
        document.getElementById('sound-icon').className = isMuted ? 'fas fa-volume-mute' : 'fas fa-volume-up';
    }

    function playSound(type) {
        if (isMuted) return;
        if (audioContext.state === 'suspended') audioContext.resume();
        if (type === 'tick') {
            const osc = audioContext.createOscillator();
            const gain = audioContext.createGain();
            osc.connect(gain); gain.connect(audioContext.destination);
            osc.frequency.setValueAtTime(880, audioContext.currentTime);
            gain.gain.setValueAtTime(0.1, audioContext.currentTime);
            gain.gain.exponentialRampToValueAtTime(0.01, audioContext.currentTime + 0.1);
            osc.start(); osc.stop(audioContext.currentTime + 0.1);
        }
    }

    function multiplyBet(factor) {
        let currentBet = parseFloat(document.getElementById('bet-amount').value);
        document.getElementById('bet-amount').value = (currentBet * factor).toFixed(6);
    }

    function updateUI() { 
        document.getElementById('balance-display').innerText = smatBalance.toFixed(6) + " SMAT"; 
        document.getElementById('bank-display').innerText = bankBalance.toFixed(4);
        document.getElementById('game-id-display').innerText = "#" + gameId;
        let totalPool = fakePool + (hasBet ? betAmt : 0);
        document.getElementById('total-pool-display').innerText = totalPool.toFixed(6);

        localStorage.setItem('smatBalance', smatBalance); 
        localStorage.setItem('bankBalance', bankBalance);
        localStorage.setItem('gameId', gameId);
        localStorage.setItem('dailyTotalBet', dailyTotalBet);
        renderDots(); 
        updateActiveCount();
    }

    function checkBubble() {
        const now = new Date();
        const utc = now.getTime() + (now.getTimezoneOffset() * 60000);
        const bdTime = new Date(utc + (3600000 * 6));
        const hours = bdTime.getHours();
        const minutes = bdTime.getMinutes();
        const seconds = bdTime.getSeconds();
        const targetHours = [8, 14, 20, 2];
        const bubble = document.getElementById('s-bubble');
        const currentSlotID = `${bdTime.getDate()}-${hours}`;
        const lastClaimedSlot = localStorage.getItem('lastClaimedSlot');

        if (targetHours.includes(hours) && minutes === 0 && lastClaimedSlot !== currentSlotID) {
            if (seconds < 15) { if (bubble.style.display !== 'block') showBubble(); } else { hideBubble(); }
        } else { if (bubble.style.display === 'block' && (minutes > 0 || seconds >= 15)) hideBubble(); }
    }

    function showBubble() { const bubble = document.getElementById('s-bubble'); bubble.style.top = "30%"; bubble.style.left = "10%"; bubble.style.display = 'block'; }
    function hideBubble() { document.getElementById('s-bubble').style.display = 'none'; }

    function popBubble() {
        if (dailyTotalBet >= 500) {
            const now = new Date();
            const utc = now.getTime() + (now.getTimezoneOffset() * 60000);
            const bdTime = new Date(utc + (3600000 * 6));
            const currentSlotID = `${bdTime.getDate()}-${bdTime.getHours()}`;
            hideBubble();
            localStorage.setItem('lastClaimedSlot', currentSlotID);
            smatBalance += 1.0;
            updateUI();
            const msg = document.getElementById('pop-msg');
            msg.style.display = 'block';
            setTimeout(() => { msg.style.display = 'none'; }, 3000);
        } else { alert("Requirement: 500 SMAT Daily Betting to unlock!"); }
    }

    setInterval(checkBubble, 1000);

    function getDotColor(val) {
        if (val <= 1.00) return 'dot-white';
        if (val < 2.00) return 'dot-gray';
        if (val < 10.00) return 'dot-green';
        return 'dot-yellow';
    }

    function getPillColor(val) {
        if (val <= 1.00) return 'pill-white';
        if (val < 2.00) return 'pill-gray';
        if (val < 10.00) return 'pill-green';
        return 'pill-yellow';
    }

    function renderDots() { 
        const wrapper = document.getElementById('dots-wrapper'); 
        wrapper.innerHTML = ""; 
        if (isRunning || document.getElementById('countdown-overlay').style.display === 'flex') {
            const liveDot = document.createElement('div');
            liveDot.className = 'history-dot dot-live';
            wrapper.appendChild(liveDot);
        }
        [...crashHistoryDots].reverse().slice(0, 24).forEach(val => { 
            const dot = document.createElement('div'); 
            dot.className = `history-dot ${getDotColor(val)}`; 
            wrapper.appendChild(dot); 
        }); 
    }

    function calculateCrashPoint() {
        let r = Math.random() * 100;
        let cp = 1.00;
        if (under2xStreak >= 8) r = 52.5 + Math.random() * 47.5; 
        if (over2xStreak >= 7) r = Math.random() * 52.5; 
        if (r <= 5.0) cp = 1.00;
        else if (r <= 10.0) cp = 1.01 + Math.random() * 0.08;
        else if (r <= 15.0) cp = 1.10 + Math.random() * 0.09;
        else if (r <= 20.0) cp = 1.20 + Math.random() * 0.09;
        else if (r <= 25.0) cp = 1.30 + Math.random() * 0.09;
        else if (r <= 30.0) cp = 1.40 + Math.random() * 0.09;
        else if (r <= 34.5) cp = 1.50 + Math.random() * 0.09;
        else if (r <= 39.0) cp = 1.60 + Math.random() * 0.09;
        else if (r <= 43.5) cp = 1.70 + Math.random() * 0.09;
        else if (r <= 48.0) cp = 1.80 + Math.random() * 0.09;
        else if (r <= 52.5) cp = 1.90 + Math.random() * 0.09;
        else if (r <= 62.5) cp = 2.00 + Math.random() * 0.49;
        else if (r <= 69.5) cp = 2.50 + Math.random() * 0.24;
        else if (r <= 76.5) cp = 2.75 + Math.random() * 0.24;
        else if (r <= 81.5) cp = 3.00 + Math.random() * 0.49;
        else if (r <= 83.7) cp = 3.50 + Math.random() * 0.49;
        else if (r <= 85.9) cp = 4.00 + Math.random() * 0.49;
        else if (r <= 88.1) cp = 4.50 + Math.random() * 0.49;
        else if (r <= 90.1) cp = 5.00 + Math.random() * 0.49;
        else if (r <= 91.6) cp = 5.50 + Math.random() * 0.49;
        else if (r <= 93.1) cp = 6.00 + Math.random() * 0.99;
        else if (r <= 94.6) cp = 7.00 + Math.random() * 2.99;
        else if (r <= 95.6) cp = 10.00 + Math.random() * 4.99;
        else if (r <= 96.6) cp = 15.00 + Math.random() * 4.99;
        else if (r <= 97.1) cp = 20.00 + Math.random() * 4.99;
        else if (r <= 97.6) cp = 25.00 + Math.random() * 24.99;
        else if (r <= 98.1) cp = 50.00 + Math.random() * 24.99;
        else if (r <= 98.35) cp = 75.00 + Math.random() * 24.99;
        else if (r <= 98.60) cp = 100.00 + Math.random() * 49.99;
        else if (r <= 98.85) cp = 150.00 + Math.random() * 99.99;
        else if (r <= 99.10) cp = 250.00 + Math.random() * 249.99;
        else if (r <= 99.225) cp = 500.00 + Math.random() * 249.99;
        else if (r <= 99.35) cp = 750.00 + Math.random() * 249.99;
        else if (r <= 99.475) cp = 1000.00 + Math.random() * 499.99;
        else if (r <= 99.60) cp = 1500.00 + Math.random() * 499.99;
        else if (r <= 99.70) cp = 2000.00 + Math.random() * 499.99;
        else if (r <= 99.80) cp = 2500.00 + Math.random() * 2499.99;
        else if (r <= 99.85) cp = 5000.00 + Math.random() * 4999.99;
        else if (r <= 99.90) cp = 10000.00 + Math.random() * 14999.99;
        else if (r <= 99.93) cp = 25000.00 + Math.random() * 24999.99;
        else if (r <= 99.96) cp = 50000.00 + Math.random() * 49999.99;
        else if (r <= 99.98) cp = 100000.00 + Math.random() * 99999.99;
        else cp = 200000.00 + Math.random() * 799999.99;
        if (cp >= 2) { over2xStreak++; under2xStreak = 0; }
        else { under2xStreak++; over2xStreak = 0; }
        return parseFloat(cp.toFixed(2));
    }

    function generateFakePlayers() {
        players = []; fakePool = 0;
        const names = ["Alpha", "Bull", "Whale", "Rich", "Satoshi", "Trade", "Dexter", "Moon"];
        const count = Math.floor(Math.random() * 20 + 20);
        for(let i=0; i<count; i++) {
            let pBet = (Math.random() * 600 + 5).toFixed(6);
            let pTarget = (1.1 + Math.random() * (Math.random() > 0.9 ? 10 : 3)).toFixed(2);
            players.push({ name: names[Math.floor(Math.random()*names.length)] + "-" + Math.floor(Math.random()*99), bet: parseFloat(pBet), target: parseFloat(pTarget), won: false, isUser: false });
            fakePool += parseFloat(pBet);
        }
        updateUI();
        renderBets();
    }

    function updateActiveCount() {
        let total = players.length + (hasBet ? 1 : 0);
        let cashed = players.filter(p => p.won).length + (hasCashed ? 1 : 0);
        document.getElementById('active-count').innerText = `${cashed}/${total} Players`;
    }

    function toggleMore() { showAllPlayers = !showAllPlayers; document.getElementById('more-btn').innerHTML = showAllPlayers ? `Show Less <i class="fas fa-chevron-up ml-1"></i>` : `Show More <i class="fas fa-chevron-down ml-1"></i>`; renderBets(); }

    function renderBets() {
        const list = document.getElementById('live-bet-list');
        list.innerHTML = "";
        let userBetObj = hasBet ? { name: "YOU", bet: betAmt, isUser: true, won: hasCashed } : null;
        let sortedPlayers = [...players].sort((a, b) => b.bet - a.bet);
        let displayList = userBetObj ? [userBetObj, ...sortedPlayers] : sortedPlayers;
        if (displayList.length > 10) { document.getElementById('more-btn').style.display = 'block'; if (!showAllPlayers) displayList = displayList.slice(0, 10); } else { document.getElementById('more-btn').style.display = 'none'; }
        displayList.forEach(p => {
            let pCol = "text-wait", mDisp = "-", pDisp = "-";
            if(p.won) { pCol="text-win"; const m = p.isUser ? localStorage.getItem('lastCash') : p.target; mDisp=m+"x"; pDisp="+"+(p.bet*m - p.bet).toFixed(4); }
            else if(isGameOver) { pCol="text-loss"; mDisp="0.00x"; pDisp="-"+p.bet.toFixed(4); }
            list.innerHTML += `<div class="bet-row"><span class="player-name ${p.isUser?'text-yellow-500':''}">${p.isUser ? '<i class="fas fa-user-circle mr-1"></i>' : ''}${p.name}</span><span class="bet-value">${p.bet.toFixed(4)}</span><span class="mult-value ${pCol}">${mDisp}</span><span class="profit-value ${pCol}">${pDisp}</span></div>`;
        });
        updateActiveCount();
    }

    function updateCharacters() {
        const m = currentMultiplier;
        const cat = document.getElementById('char-cat');
        const girl = document.getElementById('char-girl');
        const fairy = document.getElementById('char-fairy');
        cat.style.display = 'none'; girl.style.display = 'none'; fairy.style.display = 'none';
        if(isRunning) {
            if (m >= 10.00 && m < 50.00) cat.style.display = 'block';
            else if (m >= 50.00 && m < 100.00) girl.style.display = 'block';
            else if (m >= 100.00) fairy.style.display = 'block';
        }
    }

    function prepareRound() {
        isRunning=false; hasCashed=false; isGameOver=false; flightSeconds=0; isProcessingBet = false;
        document.querySelectorAll('.vfx-layer').forEach(l=>l.style.opacity="0");
        document.getElementById('cloud-layer').style.opacity = "0";
        document.querySelectorAll('.char-layer').forEach(c=>c.style.display="none");
        const m = document.getElementById('multiplier');
        m.innerText = "1.00x"; m.style.color = "#f0b90b"; m.classList.remove('crashed-text');
        document.getElementById('plane').style.transform = `translate(0, 0)`;
        document.getElementById('origin-light').style.display = 'none';
        document.getElementById('grid-bg').classList.remove('moving-bg');
        let t = 10; document.getElementById('timer-num').innerText = t;
        generateFakePlayers(); document.getElementById('countdown-overlay').style.display='flex';
        updateUI();
        const timer = setInterval(()=>{ 
            t--; document.getElementById('timer-num').innerText = t; 
            if(t <= 3 && t > 0) playSound('tick');
            if(t<=0){ clearInterval(timer); document.getElementById('countdown-overlay').style.display='none'; startFlight(); }
        }, 1000);
    }

    function placeBet() {
        if(isRunning || hasBet || isProcessingBet) return;
        const val = parseFloat(document.getElementById('bet-amount').value);
        if(isNaN(val) || val <= 0) return alert("Invalid Bet Amount!");
        if(smatBalance < val) return alert("Low Balance!");
        isProcessingBet = true;
        const actionBtn = document.getElementById('action-btn');
        actionBtn.innerText = "PROCESSING..."; actionBtn.disabled = true;
        betAmt = val; smatBalance -= val; dailyTotalBet += val; hasBet = true; 
        updateUI(); actionBtn.innerText = "WAITING..."; renderBets();
    }

    function startFlight() {
        isRunning = true; currentMultiplier = 1.00; crashAt = calculateCrashPoint(); renderDots();
        if (crashAt <= 1.00) { 
            const eaten = document.getElementById('eaten-popup');
            eaten.style.display = 'block'; setTimeout(() => { eaten.style.display = 'none'; }, 3000);
            doCrash(); return; 
        }
        const plane = document.getElementById('plane'); plane.style.opacity="1";
        const btn=document.getElementById('action-btn');
        document.getElementById('origin-light').style.display = 'block';
        if(hasBet){ btn.disabled=false; btn.onclick=manualCashOut; btn.className = "w-full bg-green-500 text-black py-4 rounded-xl font-black text-xl shadow-xl"; }
        else { btn.disabled = true; btn.innerText = "BET RUNNING..."; btn.className = "w-full bg-gray-700 text-gray-400 py-4 rounded-xl font-black text-xl cursor-not-allowed"; }
        gameLoop = setInterval(()=>{
            currentMultiplier += (currentMultiplier < 10 ? 0.01 : currentMultiplier * 0.005);
            flightSeconds += 0.06; 
            if(currentMultiplier >= crashAt) { currentMultiplier = crashAt; doCrash(); return; }
            document.getElementById('multiplier').innerText = currentMultiplier.toFixed(2) + "x";
            if(hasBet && !hasCashed) btn.innerText = "CASH OUT: " + (betAmt * currentMultiplier).toFixed(6);
            players.forEach(p => { if (!p.won && currentMultiplier >= p.target) { p.won = true; bankBalance -= (p.bet * p.target - p.bet); updateUI(); renderBets(); } });
            updateCharacters(); 
            let maxMoveX = document.getElementById('screen').clientWidth - 110; 
            let moveX = Math.min(flightSeconds * 30, maxMoveX);
            let moveY = Math.min((currentMultiplier - 1) * 50, 240);
            plane.style.transform = `translate(${moveX}px, -${moveY}px)`;
            
            const xLabels = document.getElementById('x-labels');
            const sec = Math.floor(flightSeconds);
            xLabels.innerHTML = `<span>${sec}s</span><span>${sec+1}s</span><span>${sec+2}s</span><span>${sec+3}s</span><span>${sec+4}s</span>`;
            
            const yLabels = document.getElementById('y-labels');
            yLabels.innerHTML = `<span>${currentMultiplier.toFixed(1)}x</span><span>${(currentMultiplier+0.2).toFixed(1)}x</span><span>${(currentMultiplier+0.4).toFixed(1)}x</span><span><span>${(currentMultiplier+0.6).toFixed(1)}x</span><span>${(currentMultiplier+0.8).toFixed(1)}x</span>`;
            
            if(moveX >= maxMoveX || currentMultiplier >= 10) { 
            gridBg.classList.add('moving-bg'); 
            document.getElementById('cloud-layer').style.opacity = "0.4";
            document.getElementById('cloud-layer').classList.add('moving-clouds');
            }
            
            let autoVal = parseFloat(document.getElementById('auto-cashout').value) || Infinity;
            if(hasBet && !hasCashed && currentMultiplier >= autoVal) manualCashOut();
            }, 60);
            }
    
    function manualCashOut() {
        if(!hasBet || hasCashed || !isRunning) return;
        hasCashed = true; 
        const winAmount = (betAmt * currentMultiplier);
        const profit = winAmount - betAmt;
        localStorage.setItem('lastCash', currentMultiplier.toFixed(2));
        smatBalance += winAmount; bankBalance -= profit;
        updateUI();
        const popup = document.getElementById('cashout-popup');
        document.getElementById('cashout-msg-amount').innerText = winAmount.toFixed(6) + " SMAT";
        popup.style.display = 'block'; setTimeout(() => { popup.style.display = 'none'; }, 3000);
        const actionBtn = document.getElementById('action-btn');
        actionBtn.innerText = "WINNER!"; actionBtn.disabled = true; renderBets();
    }

    function doCrash() {
        if(!isRunning && !isGameOver) return;
        clearInterval(gameLoop); isRunning=false; isGameOver=true;
        const actionBtn = document.getElementById('action-btn');
        actionBtn.disabled = true; actionBtn.innerText = "NEXT";
        actionBtn.className = "w-full bg-black-600 text-white py-4 rounded-xl font-black text-xl";
        if (hasBet && !hasCashed) { bankBalance += betAmt; hasBet = false; }
        players.forEach(p => { if(!p.won) bankBalance += p.bet; });
        const result = parseFloat(currentMultiplier.toFixed(2));
        const m = document.getElementById('multiplier');
        m.innerText = "CRASHED"; m.style.color = "#ef4444"; m.classList.add('crashed-text'); 
        document.getElementById('plane').style.opacity="0"; 
        document.getElementById('grid-bg').classList.remove('moving-bg');
        
        crashHistoryDots.push(result);
        if(crashHistoryDots.length > 50) crashHistoryDots.shift();
        localStorage.setItem('crashHistoryDots', JSON.stringify(crashHistoryDots));
        gameId++; renderDots(); renderBets();

        // হিস্টোরি পিলস লজিক
        const pillContainer = document.getElementById('history-pills');
        const pill = document.createElement('div');
        pill.className = `history-pill-item ${getPillColor(result)}`;
        pill.innerText = result.toFixed(2) + "x";
        
        pillContainer.prepend(pill);
        if(pillContainer.children.length > 20) pillContainer.removeChild(pillContainer.lastChild);

        setTimeout(()=>{
            actionBtn.innerText = "PLACE BET"; actionBtn.disabled = false; actionBtn.onclick = placeBet;
            actionBtn.className = "w-full bg-yellow-500 text-black py-4 rounded-xl font-black text-xl shadow-lg";
            hasBet = false; betAmt = 0; isProcessingBet = false;
            prepareRound();
        }, 1000);
    }

    window.onload = () => { updateUI(); prepareRound(); checkBubble(); };
</script>

</body>
</html>
