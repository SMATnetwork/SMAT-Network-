<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SMAT | Home</title>
    <script src="coin.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@700;800;900&family=Inter:wght@400;600&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --primary: #f3ba2f;
            --bg: #0b0e11;
            --card-bg: #1e2329;
            --text-main: #eaecef;
            --text-sec: #848e9c;
            --up: #0ecb81;
            --down: #f6465d;
            --border: rgba(255, 255, 255, 0.08);
            --font-bold: 'Montserrat', sans-serif;
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; outline: none; }
        body {
            margin: 0; background: var(--bg); color: var(--text-main);
            font-family: 'Inter', sans-serif; padding-bottom: 90px;
            overflow-x: hidden;
        }

        /* --- Header --- */
        .header {
            padding: 15px 20px; display: flex; align-items: center; justify-content: space-between;
            position: sticky; top: 0; background: var(--bg); z-index: 100;
        }
        .header-title { font-family: var(--font-bold); font-size: 20px; font-weight: 900; }
        .header-right { display: flex; gap: 18px; align-items: center; }
        .header-right i { font-size: 20px; color: var(--text-sec); cursor: pointer; }

        /* --- Sidebar --- */
        .sidebar {
            position: fixed; top: 0; left: -100%; width: 85%; max-width: 320px; height: 100%;
            background: #181a20; z-index: 4000; transition: 0.4s cubic-bezier(0.4, 0, 0.2, 1); padding: 25px;
            box-shadow: 20px 0 50px rgba(0,0,0,0.8); overflow-y: auto;
        }
        .sidebar.active { left: 0; }
        .sidebar-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.8); display: none; z-index: 3500;
        }

        .side-user-box { background: var(--card-bg); padding: 15px; border-radius: 12px; margin-bottom: 15px; border: 1px dashed var(--primary); }
        .side-label { font-size: 11px; color: var(--text-sec); margin-bottom: 4px; display: block; }
        .side-val { font-weight: 700; font-size: 14px; word-break: break-all; }

        .kyc-status-btn {
            background: linear-gradient(135deg, #2b3139, #1e2329);
            padding: 15px; border-radius: 15px; text-align: center;
            border: 1px solid var(--border); margin: 15px 0; cursor: pointer;
        }
        .kyc-status-btn i { font-size: 25px; color: var(--primary); margin-bottom: 5px; }

        .side-menu { margin-top: 20px; }
        .menu-item {
            display: flex; align-items: center; gap: 15px; padding: 12px 0;
            text-decoration: none; color: var(--text-main); border-bottom: 1px solid var(--border);
        }
        .menu-item i { font-size: 18px; color: var(--primary); width: 25px; }
        .menu-text b { display: block; font-size: 14px; }
        .menu-text span { font-size: 10px; color: var(--text-sec); }

        /* --- Portfolio Card --- */
        .asset-card {
            margin: 10px 20px; background: linear-gradient(135deg, #1e2329 0%, #0b0e11 100%);
            padding: 20px; border-radius: 20px; border: 1px solid var(--border);
        }
        .asset-balance { font-family: var(--font-bold); font-size: 28px; margin: 10px 0; letter-spacing: 1px; color: var(--primary); }

        /* --- Market List --- */
        .market-header { width: 100%; padding: 15px 20px; font-family: var(--font-bold); font-size: 16px; border-bottom: 1px solid var(--border); }
        .market-tabs { display: flex; padding: 0 20px; gap: 20px; margin: 15px 0; border-bottom: 1px solid var(--border); }
        .tab { font-size: 14px; font-weight: 700; color: var(--text-sec); cursor: pointer; padding-bottom: 10px; position: relative; }
        .tab.active { color: var(--primary); }
        .tab.active::after { content: ''; position: absolute; bottom: 0; left: 0; width: 100%; height: 3px; background: var(--primary); border-radius: 10px; }

        .coin-row { display: flex; justify-content: space-between; align-items: center; padding: 15px 20px; border-bottom: 1px solid rgba(255,255,255,0.03); cursor: pointer; }
        .coin-meta { display: flex; align-items: center; gap: 12px; }
        .coin-icon { width: 40px; height: 40px; border-radius: 50%; object-fit: cover; }
        .price-col { text-align: right; }
        .percent-box { display: inline-block; padding: 4px 10px; border-radius: 6px; font-size: 11px; font-weight: bold; margin-top: 4px; min-width: 65px; text-align: center; }

        /* --- Footer --- */
        .footer { position: fixed; bottom: 0; width: 100%; height: 75px; background: #181a20; display: flex; justify-content: space-around; align-items: center; border-top: 1px solid var(--border); z-index: 3000; }
        .f-nav { text-decoration: none; color: var(--text-sec); text-align: center; font-size: 10px; display: flex; flex-direction: column; align-items: center; flex: 1; }
        .f-nav i { font-size: 22px; margin-bottom: 5px; }
        .f-nav.active { color: var(--primary); }
        .crash-link { width: 60px; height: 60px; background: var(--primary); border-radius: 50%; color: black; font-weight: 900; display: flex; align-items: center; justify-content: center; margin-top: -35px; box-shadow: 0 5px 20px rgba(243,186,47,0.4); text-decoration: none; font-size: 11px; z-index: 5; position: relative; }
        .spin-circle { position: absolute; width: 70px; height: 70px; border: 2px dashed var(--primary); border-radius: 50%; animation: spin 5s linear infinite; top: -40px; }
        @keyframes spin { 100% { transform: rotate(360deg); } }

        .status-badge { padding: 4px 8px; border-radius: 4px; font-size: 9px; font-weight: bold; text-transform: uppercase; }
        .status-verified { background: rgba(14, 203, 129, 0.15); color: var(--up); }
        .status-pending { background: rgba(243, 186, 47, 0.15); color: var(--primary); }
        .status-rejected { background: rgba(246, 70, 93, 0.15); color: var(--down); }
        .status-unverified { background: #474d57; color: #fff; }
        .new-badge { font-size: 8px; background: var(--primary); color: black; padding: 2px 4px; border-radius: 4px; margin-left: 4px; font-weight: bold; }
    </style>
</head>
<body>

    <div class="sidebar-overlay" id="overlay" onclick="closeSidebar()"></div>

    <div class="sidebar" id="sidebar">
        <div id="loggedInContent">
            <div class="side-user-box">
                <span class="side-label">Account Email</span>
                <div class="side-val" id="userEmail">Loading...</div>
            </div>
            <div class="side-user-box">
                <span class="side-label">Your SMAT ID</span>
                <div class="side-val" id="displaySmatID" style="color:var(--primary)">Assigning...</div>
            </div>

            <div class="kyc-status-btn">
                <i class="fa-solid fa-id-card"></i>
                <div id="kycStatusText" style="font-weight:bold">Identity Verification</div>
                <div id="kycBadge" class="status-badge status-unverified" style="margin-top:5px; display:inline-block">Unverified</div>
            </div>

            <div class="side-menu">
                <a href="mining.html" class="menu-item"><i class="fa-solid fa-microchip"></i><div class="menu-text"><b>Mining</b><span>Active Session</span></div></a>
                <a href="fox.html" class="menu-item"><i class="fa-solid fa-comments"></i><div class="menu-text"><b>SMAT Chat</b><span>Community Group</span></div></a>
                <a href="Wallet.html" class="menu-item"><i class="fa-solid fa-wallet"></i><div class="menu-text"><b>Wallet</b><span>Balance & Transfer</span></div></a>
            </div>

            <div style="margin-top: 40px; text-align: center;"><i class="fa-solid fa-sign-out-alt" style="color:var(--down); font-size:30px; cursor:pointer" onclick="logout()"></i></div>
        </div>
    </div>

    <div class="header">
        <i class="fa-solid fa-circle-user" onclick="openSidebar()" style="font-size:28px; color:var(--primary); cursor:pointer"></i>
        <div class="header-title">SMAT <span style="color:var(--primary)">EXCHANGE</span></div>
        <div class="header-right">
            <a href="fox.html" style="text-decoration:none; color:inherit;"><i class="fa-solid fa-comments"></i></a>
            <i class="fa-solid fa-bell"></i>
        </div>
    </div>

    <div class="asset-card">
        <div style="font-size: 13px; color: var(--text-sec);">Total Assets <i class="fa-solid fa-eye" style="font-size:11px"></i></div>
        <div class="asset-balance">$ <span id="totalVal">0.00</span></div>
        <div style="font-size:13px; font-weight:600; color:var(--up)" id="pnlVal">+$0.00 Today's PNL</div>
    </div>

    <div class="market-header">REAL MARKET HISTORY</div>
    <div class="market-tabs">
        <div class="tab active" id="tab-hot" onclick="switchTab(this, 'hot')">HOT</div>
        <div class="tab" id="tab-gainer" onclick="switchTab(this, 'gainer')">GAINER</div>
        <div class="tab" id="tab-loser" onclick="switchTab(this, 'loser')">LOSER</div>
        <div class="tab" id="tab-new" onclick="switchTab(this, 'new')">NEW</div>
    </div>

    <div id="coinList"></div>

    <footer class="footer">
        <a href="home.html" class="f-nav active"><i class="fas fa-home"></i>Home</a>
        <a href="Trade.html" class="f-nav"><i class="fas fa-chart-line"></i>Trade</a>
        <div style="position:relative; width:75px; display:flex; justify-content:center">
            <div class="spin-circle"></div>
            <a href="Crash.html" class="crash-link">CRASH</a>
        </div>
        <a href="Explorer.html" class="f-nav"><i class="fas fa-compass"></i>Explore</a>
        <a href="Wallet.html" class="f-nav"><i class="fas fa-wallet"></i>Wallet</a>
    </footer>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getAuth, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
        import { getDatabase, ref, onValue } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyAMxtJedkehhxJRMPZLjhpKHqneHEWsGlE",
            authDomain: "smat-exchange.firebaseapp.com",
            projectId: "smat-exchange",
            storageBucket: "smat-exchange.firebasestorage.app",
            messagingSenderId: "836334569396",
            appId: "1:836334569396:web:679effe640b3453412d4e1"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getDatabase(app);

        onAuthStateChanged(auth, (user) => {
            if (user) {
                localStorage.setItem('isLoggedIn', 'true');
                document.getElementById('userEmail').innerText = user.email;
                onValue(ref(db, 'users/' + user.uid), (snap) => {
                    const d = snap.val();
                    if(d) {
                        document.getElementById('displaySmatID').innerText = d.smatID || "Assigning...";
                        document.getElementById('totalVal').innerText = (d.balance || 0).toFixed(2);
                        const kyc = d.kycStatus || 'unverified';
                        document.getElementById('kycBadge').innerText = kyc;
                        document.getElementById('kycBadge').className = `status-badge status-${kyc}`;
                    }
                });
            } else {
                localStorage.setItem('isLoggedIn', 'false');
                window.location.href = 'logIn.html';
            }
        });

        // --- রিয়েল-টাইম মার্কেট লজিক (আপনার আগের ফাইলের লজিক) ---
        onValue(ref(db, 'market'), (snapshot) => {
            const data = snapshot.val();
            if (data) {
                Object.keys(data).forEach(coinSym => {
                    const sym = coinSym.toLowerCase();
                    window[sym + "Val"] = data[coinSym].price;
                    localStorage.setItem(sym + "_latest_price", data[coinSym].price);
                });
                renderCoins(currentTab);
            }
        });

        window.logout = () => signOut(auth).then(() => { localStorage.clear(); location.reload(); });
    </script>

    <script>
        let currentTab = 'hot';

        function openSidebar() { document.getElementById('sidebar').classList.add('active'); document.getElementById('overlay').style.display='block'; }
        function closeSidebar() { document.getElementById('sidebar').classList.remove('active'); document.getElementById('overlay').style.display='none'; }

        function switchTab(el, cat) {
            currentTab = cat;
            document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
            el.classList.add('active');
            renderCoins(cat);
        }

        function renderCoins(filter = 'hot') {
            const container = document.getElementById('coinList');
            if (!container) return;

            // coin.js থেকে আসা GLOBAL_COINS ব্যবহার করা হয়েছে
            const liveData = (typeof GLOBAL_COINS !== 'undefined') ? GLOBAL_COINS : [];
            const now = Date.now();
            const threeDaysMs = 3 * 24 * 60 * 60 * 1000;

            let filtered = liveData;
            if (filter === 'hot') filtered = [...liveData].slice(0, 10);
            else if (filter === 'gainer') filtered = [...liveData].sort((a,b) => (window[b.sym.toLowerCase() + "Val"] || b.price) - (window[a.sym.toLowerCase() + "Val"] || a.price)).slice(0, 8);
            else if (filter === 'loser') filtered = [...liveData].sort((a,b) => (window[a.sym.toLowerCase() + "Val"] || a.price) - (window[b.sym.toLowerCase() + "Val"] || b.price)).slice(0, 8);
            else if (filter === 'new') filtered = liveData.filter(c => (now - (c.listedAt || 0)) < threeDaysMs);

            container.innerHTML = filtered.map(coin => {
                const sym = coin.sym.toLowerCase();
                // window[sym + "Val"] এর মাধ্যমে রিয়েল-টাইম প্রাইস ধরা হচ্ছে (যা undefined এরর বন্ধ করবে)
                const currentPrice = window[sym + "Val"] || parseFloat(localStorage.getItem(sym + "_latest_price")) || coin.price;
                const diff = currentPrice - coin.price;
                const isUp = diff >= 0;
                const changePercent = coin.price > 0 ? ((diff / coin.price) * 100).toFixed(2) : "0.00";
                const isNew = (now - (coin.listedAt || 0)) < threeDaysMs;

                return `
                <div class="coin-row" onclick="window.location.href='Trade.html?coin=${sym}'">
                    <div class="coin-meta">
                        <img src="assets/logos/${sym}.png" class="coin-icon" onerror="this.src='https://via.placeholder.com/40?text=${coin.sym[0].toUpperCase()}'">
                        <div>
                            <div style="font-weight:bold">${coin.sym.toUpperCase()}/USDT ${isNew ? '<span class="new-badge">NEW</span>' : ''}</div>
                            <div style="font-size:12px; color:var(--text-sec)">${coin.name}</div>
                        </div>
                    </div>
                    <div class="price-col">
                        <div style="font-weight:bold; font-size:16px">$${currentPrice.toLocaleString(undefined, {minimumFractionDigits: 2, maximumFractionDigits: 4})}</div>
                        <div class="percent-box" style="background:${isUp ? 'rgba(14, 203, 129, 0.15)' : 'rgba(246, 70, 93, 0.15)'}; color:${isUp ? 'var(--up)' : 'var(--down)'}">
                            ${isUp ? '+' : ''}${changePercent}%
                        </div>
                    </div>
                </div>`;
            }).join('');
        }

        window.onload = () => {
            renderCoins('hot');
            setInterval(() => renderCoins(currentTab), 1500);
        };
    </script>
</body>
</html>
