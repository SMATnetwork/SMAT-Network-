<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SMAT | Home </title>
    <script src="coin.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><circle cx='50' cy='50' r='50' fill='%23f3ba2f'/><text x='50%25' y='55%25' text-anchor='middle' dy='.3em' fill='black' font-family='Courier New, monospace' font-weight='900' font-size='60'>S</text></svg>">
    
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getAuth, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
        import { getDatabase, ref, onValue, update, query, orderByChild, equalTo } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyAMxtJedkehhxJRMPZLjhpKHqneHEWsGlE",
            authDomain: "smat-exchange.firebaseapp.com",
            projectId: "smat-exchange",
            storageBucket: "smat-exchange.firebasestorage.app",
            messagingSenderId: "836334569396",
            appId: "1:836334569396:web:679effe640b3453412d4e1"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getDatabase(app);

        let userBalance = 0;
        let isBalanceHidden = false;

        onAuthStateChanged(auth, (user) => {
            if (user) {
                localStorage.setItem('isLoggedIn', 'true');
                document.getElementById('emailDisplay').innerText = user.email;
                
                const userRef = ref(db, 'users/' + user.uid);
                onValue(userRef, (snapshot) => {
                    const data = snapshot.val();
                    if (data) {
                        userBalance = data.balance || 0;
                        updateBalanceUI();
                        const smatID = data.smatID || "Assigning...";
                        document.getElementById('smatID').innerText = smatID;
                        updateKYCUI(data);
                        setupReferralSystem(smatID);
                    }
                });
            } else {
                localStorage.setItem('isLoggedIn', 'false');
                window.location.href = 'logIn.html';
            }
        });

        // --- Balance Logic ---
        window.toggleBalance = () => {
            isBalanceHidden = !isBalanceHidden;
            const eye = document.getElementById('eyeIcon');
            eye.className = isBalanceHidden ? "fa-solid fa-eye" : "fa-solid fa-eye-slash";
            updateBalanceUI();
        };

        function updateBalanceUI() {
            document.getElementById('totalValue').innerText = isBalanceHidden ? "******" : userBalance.toFixed(2);
        }

        // --- Referral Logic (Popup + Info) ---
        function setupReferralSystem(smatID) {
            const baseUrl = window.location.origin + window.location.pathname.replace('home.html', 'logIn.html');
            document.getElementById('referralLink').value = `${baseUrl}?ref=${smatID}`;

            onValue(query(ref(db, 'users'), orderByChild('referredBy'), equalTo(smatID)), (snapshot) => {
                const data = snapshot.val();
                let verifiedCount = 0, rejectedCount = 0;
                const listContainer = document.getElementById('referralList');
                listContainer.innerHTML = '';

                if (data) {
                    const allUsers = Object.values(data).sort((a, b) => (b.createdAt || 0) - (a.createdAt || 0));
                    allUsers.forEach(u => {
                        if(u.kycStatus === 'verified') verifiedCount++;
                        else if(u.kycStatus === 'rejected') rejectedCount++;
                    });
                    
                    allUsers.slice(0, 5).forEach(refUser => {
                        const div = document.createElement('div');
                        div.className = 'ref-item';
                        div.innerHTML = `<span>${refUser.email.split('@')[0]}...</span><span class="status-badge status-${refUser.kycStatus || 'unverified'}">${refUser.kycStatus || 'unverified'}</span>`;
                        listContainer.appendChild(div);
                    });
                }
                document.getElementById('ref_verified').innerText = verifiedCount;
                document.getElementById('ref_rejected').innerText = rejectedCount;
            });
        }

        window.copyRef = () => {
            const copyText = document.getElementById("referralLink");
            copyText.select();
            navigator.clipboard.writeText(copyText.value);
            alert("Link Copied!");
        };

        // --- Market Logic (Direct Price Link) ---
        onValue(ref(db, 'market'), (snapshot) => {
            const data = snapshot.val();
            if (data) {
                Object.keys(data).forEach(coinSym => {
                    const sym = coinSym.toLowerCase();
                    window[sym + "Val"] = data[coinSym].price;
                });
                renderCoins(currentActiveTab);
            }
        });

        window.logout = () => { signOut(auth).then(() => { localStorage.clear(); window.location.href = 'logIn.html'; }); };

        // KYC UI Logic
        function updateKYCUI(data) {
            const form = document.getElementById('kycForm');
            const notice = document.getElementById('kycPendingNotice');
            const badge = document.getElementById('kycBadge');
            const verifiedBox = document.getElementById('kycVerifiedInfo');
            form.style.display = 'none'; notice.style.display = 'none'; verifiedBox.style.display = 'none';

            if (data.kycStatus === 'pending') {
                notice.style.display = 'block';
                badge.innerText = 'Pending'; badge.className = 'status-badge status-pending';
            } else if (data.kycStatus === 'verified') {
                verifiedBox.style.display = 'block';
                badge.innerText = 'Verified'; badge.className = 'status-badge status-verified';
                document.getElementById('v_name').innerText = data.realName;
                document.getElementById('v_nid').innerText = data.nidNumber;
            } else {
                form.style.display = 'block';
                badge.innerText = data.kycStatus || 'Unverified';
                badge.className = `status-badge status-${data.kycStatus || 'unverified'}`;
            }
        }
    </script>

    <style>
        :root { --primary: #f3ba2f; --bg: #0b0e11; --card-bg: #1e2329; --text-main: #eaecef; --text-sec: #848e9c; --up: #0ecb81; --down: #f6465d; --border: #2b3139; }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { margin: 0; background: var(--bg); color: var(--text-main); font-family: 'Segoe UI', sans-serif; padding-bottom: 90px; }

        .header { padding: 15px; display: flex; align-items: center; justify-content: space-between; position: sticky; top: 0; background: var(--bg); z-index: 100; }
        .sidebar { position: fixed; top: 0; left: -100%; width: 85%; max-width: 320px; height: 100%; background: var(--card-bg); z-index: 4000; transition: 0.4s; padding: 25px; box-shadow: 15px 0 40px rgba(0,0,0,0.7); overflow-y: auto; }
        .sidebar.active { left: 0; }
        .sidebar-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); display: none; z-index: 3500; }

        .user-id-box { background: #181a20; padding: 15px; border-radius: 12px; margin: 15px 0; border: 1px dashed var(--primary); }
        .kyc-section, .referral-section { background: #2b3139; padding: 20px; border-radius: 20px; margin-top: 20px; border: 1px solid var(--border); }
        
        .ref-stats { display: flex; justify-content: space-between; margin-bottom: 12px; }
        .stat-item { background: #181a20; padding: 8px; border-radius: 8px; flex: 1; margin: 0 4px; text-align: center; }
        .ref-box { display: flex; gap: 5px; margin-top: 10px; }
        .ref-box input { flex: 1; background: #181a20; border: 1px solid var(--border); color: var(--text-sec); padding: 8px; border-radius: 6px; font-size: 11px; }
        .ref-box button { background: var(--primary); border: none; padding: 0 12px; border-radius: 6px; font-weight: bold; cursor: pointer; }

        .status-badge { padding: 4px 10px; border-radius: 6px; font-size: 11px; font-weight: bold; }
        .status-verified { background: rgba(14, 203, 129, 0.2); color: var(--up); }
        .status-pending { background: rgba(243, 186, 47, 0.2); color: var(--primary); }

        .asset-card { margin: 15px; background: linear-gradient(135deg, #2b3139 0%, #1e2329 100%); padding: 25px; border-radius: 24px; border: 1px solid var(--border); }
        .asset-val { font-size: 32px; font-weight: 800; color: var(--primary); margin: 12px 0; }

        .market-tabs { display: flex; padding: 0 15px; gap: 20px; border-bottom: 1px solid var(--border); margin-top: 15px; }
        .tab { padding: 12px 5px; color: var(--text-sec); font-size: 15px; font-weight: 600; cursor: pointer; position: relative; }
        .tab.active { color: var(--primary); }
        .tab.active::after { content: ''; position: absolute; bottom: 0; left: 0; width: 100%; height: 3px; background: var(--primary); }

        .coin-row { display: flex; justify-content: space-between; align-items: center; padding: 18px 15px; border-bottom: 1px solid rgba(255,255,255,0.03); }
        .coin-icon { width: 40px; height: 40px; border-radius: 50%; }
        .percent-box { padding: 6px 12px; border-radius: 8px; font-weight: 700; font-size: 13px; min-width: 75px; text-align: center; margin-top: 4px; }

        .footer { position: fixed; bottom: 0; width: 100%; height: 75px; background: #181a20; display: flex; justify-content: space-around; align-items: center; border-top: 1px solid #2b3139; z-index: 3000; }
        .f-nav { text-decoration: none; color: var(--text-sec); text-align: center; font-size: 10px; flex: 1; display: flex; flex-direction: column; align-items: center; }
        .u-curve { position: relative; top: -22px; width: 75px; height: 75px; display: flex; justify-content: center; align-items: center; }
        .spin-circle { position: absolute; width: 70px; height: 70px; border: 2.5px dashed var(--primary); border-radius: 50%; animation: spin 5s linear infinite; }
        .crash-link { width: 58px; height: 58px; background: var(--primary); border-radius: 50%; color: black; font-weight: 900; display: flex; align-items: center; justify-content: center; text-decoration: none; z-index: 5; }
        @keyframes spin { 100% { transform: rotate(360deg); } }
    </style>
</head>
<body>

    <div class="sidebar-overlay" id="overlay" onclick="toggleSidebar()"></div>

    <div class="sidebar" id="sidebar">
        <div id="loggedInContent">
            <span style="font-size:12px; color:var(--text-sec)">Account Email</span>
            <div id="emailDisplay" style="font-weight:600; margin-top:4px;">Loading...</div>
            
            <div class="user-id-box">
                <span style="font-size:11px; color:var(--text-sec);">Your SMAT ID</span>
                <div id="smatID" style="font-size:18px; font-weight:800; color:var(--primary);">Checking...</div>
            </div>

            <div class="referral-section">
                <span style="font-weight:bold; font-size:14px"><i class="fa-solid fa-users"></i> Invited Friends</span>
                <div class="ref-stats" style="margin-top: 10px;">
                    <div class="stat-item"><span>Verified</span><b id="ref_verified" style="color:var(--up)">0</b></div>
                    <div class="stat-item"><span>Rejected</span><b id="ref_rejected" style="color:var(--down)">0</b></div>
                </div>
                <div class="ref-box">
                    <input type="text" id="referralLink" readonly>
                    <button onclick="copyRef()">Copy</button>
                </div>
                <div id="referralList" style="margin-top:15px; font-size:12px"></div>
            </div>

            <div class="kyc-section">
                <div style="display:flex; justify-content:space-between">
                    <span style="font-weight:bold; font-size:14px">KYC Status</span>
                    <span id="kycBadge" class="status-badge">Unverified</span>
                </div>
                <div id="kycForm" style="margin-top:10px; font-size:12px; color:var(--text-sec); text-align:center">
                    <button onclick="alert('Open KYC Process')" style="width:100%; padding:10px; background:var(--primary); border:none; border-radius:8px; font-weight:bold; cursor:pointer">Verify Now</button>
                </div>
                <div id="kycPendingNotice" style="display:none; text-align:center; color:var(--primary); padding:10px">Processing KYC...</div>
                <div id="kycVerifiedInfo" style="display:none; margin-top:10px">
                    <div id="v_name" style="font-weight:bold; color:var(--up)"></div>
                    <div id="v_nid" style="font-size:11px"></div>
                </div>
            </div>
            
            <p style="margin-top:40px; text-align:center; color:#ff4d4d; font-size:30px; cursor:pointer" onclick="logout()"><i class="fa-solid fa-sign-out-alt"></i></p>
        </div>
    </div>

    <div class="header">
        <i class="fa-solid fa-circle-user profile-trigger" onclick="toggleSidebar()"></i>
        <div style="font-weight: 900; font-size: 20px;">SMAT <span style="color:var(--primary)">Exchange</span></div>
        <div style="display: flex; gap: 18px;"><i class="fas fa-comments" onclick="location.href='fox.html'"></i><i class="fa-solid fa-bell"></i></div>
    </div>

    <div class="asset-card">
        <div style="font-size: 14px; color: var(--text-sec);">Total Assets <i class="fa-solid fa-eye-slash" id="eyeIcon" onclick="toggleBalance()" style="cursor:pointer"></i></div>
        <div class="asset-val">$ <span id="totalValue">0.00</span></div>
        <div style="color:var(--up); font-size:13px; font-weight:600;" id="pnlValue">+$0.00 Today</div>
    </div>

    <div class="market-tabs">
        <div class="tab active" onclick="switchTab(this, 'hot')">Hot</div>
        <div class="tab" onclick="switchTab(this, 'gainer')">Gainers</div>
        <div class="tab" onclick="switchTab(this, 'loser')">Losers</div>
        <div class="tab" onclick="switchTab(this, 'new')">New</div>
    </div>

    <div id="coinContainer"></div>

    <footer class="footer">
        <a href="home.html" class="f-nav active"><i class="fas fa-home"></i>Home</a>
        <a href="Trade.html" class="f-nav"><i class="fas fa-chart-line"></i>Trade</a>
        <div class="u-curve"><div class="spin-circle"></div><a href="Crash.html" class="crash-link">CRASH</a></div>
        <a href="Explorer.html" class="f-nav"><i class="fas fa-compass"></i>Explore</a>
        <a href="Wallet.html" class="f-nav"><i class="fas fa-wallet"></i>Wallet</a>
    </footer>

    <script>
        let currentActiveTab = 'hot';
        function toggleSidebar() {
            const sb = document.getElementById('sidebar');
            sb.classList.toggle('active');
            document.getElementById('overlay').style.display = sb.classList.contains('active') ? 'block' : 'none';
        }

        function switchTab(el, cat) {
            currentActiveTab = cat;
            document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
            el.classList.add('active');
            renderCoins(cat);
        }

        function renderCoins(filter) {
            const container = document.getElementById('coinContainer');
            if (!container || !window.marketData) return;
            const liveData = Object.keys(window.marketData).map(k => ({ sym: k, ...window.marketData[k] }));

            let coins = [...liveData];
            if(filter === 'gainer') coins.sort((a,b) => b.priceChange - a.priceChange);
            else if(filter === 'loser') coins.sort((a,b) => a.priceChange - b.priceChange);

            container.innerHTML = coins.slice(0, 10).map(coin => {
                const sym = coin.sym.toLowerCase();
                const price = window[sym + "Val"] || coin.price;
                const isUp = coin.priceChange >= 0;
                return `
                    <div class="coin-row" onclick="location.href='Trade.html?coin=${sym}'">
                        <div style="display:flex; align-items:center; gap:12px;">
                            <img src="assets/logos/${sym}.png" class="coin-icon" onerror="this.src='https://via.placeholder.com/40'">
                            <div>
                                <div style="font-weight:bold">${coin.sym.toUpperCase()}/USDT</div>
                                <div style="font-size:12px; color:var(--text-sec)">${coin.name}</div>
                            </div>
                        </div>
                        <div style="text-align:right">
                            <div style="font-weight:bold; font-size:16px">$${parseFloat(price).toLocaleString()}</div>
                            <div class="percent-box" style="background:${isUp ? 'rgba(14, 203, 129, 0.15)' : 'rgba(246, 70, 93, 0.15)'}; color:${isUp ? 'var(--up)' : 'var(--down)'}">
                                ${isUp ? '+' : ''}${coin.priceChange}%
                            </div>
                        </div>
                    </div>`;
            }).join('');
        }
        setInterval(() => renderCoins(currentActiveTab), 2000);
    </script>
</body>
</html>
