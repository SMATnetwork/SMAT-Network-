<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SMAT CEX | Ultimate Prediction Engine</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root { --bg: #0b0e11; --card: #181a20; --border: #2b3139; --up: #0ecb81; --down: #f6465d; --warn: #f0b90b; --primary: #f0b90b; --cyan: #00ffff; }
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Inter', sans-serif; }
        body { background: var(--bg); color: white; height: 100vh; display: flex; flex-direction: column; overflow: hidden; }
        
        /* UI Components */
        .header { display: grid; grid-template-columns: 1fr 1.2fr 1fr; align-items: center; padding: 10px 15px; background: #12161c; border-bottom: 1px solid var(--border); }
        .asset-selector { display: flex; align-items: center; gap: 8px; background: #1e2329; padding: 5px 8px; border-radius: 8px; border: 1px solid var(--border); }
        .asset-selector img { width: 22px; height: 22px; border-radius: 50%; object-fit: cover; }
        .asset-selector select { background: transparent; color: white; border: none; font-weight: 700; outline: none; cursor: pointer; }
        
        .bal-box { background: rgba(240, 185, 11, 0.1); border: 1px solid rgba(240, 185, 11, 0.2); padding: 5px; text-align: center; border-radius: 4px; }
        .bal-amount { font-weight: 800; font-size: 13px; color: var(--primary); }
        
        .chart-section { width: 100%; position: relative; background: #000; height: 32vh; border-bottom: 1px solid var(--border); }
        .chart-overlay { position: absolute; top: 0; left: 0; width: 100%; z-index: 10; display: flex; justify-content: space-between; padding: 12px; pointer-events: none; }
        .timer-clock { font-size: 26px; font-weight: 900; text-shadow: 0 0 10px rgba(0,0,0,0.5); }
        #chartDot { position: absolute; left: 50%; width: 12px; height: 12px; background: var(--cyan); border-radius: 50%; z-index: 5; transform: translateX(-50%); box-shadow: 0 0 15px var(--cyan); }
        
        .history-section { flex: 1; background: var(--card); display: flex; flex-direction: column; overflow: hidden; padding-bottom: 85px; }
        .history-header { text-align: center; padding: 10px; font-size: 15px; font-weight: 900; border-bottom: 1px solid var(--border); background: #12161c; }
        .table-container { flex: 1; overflow-y: auto; }
        table { width: 100%; border-collapse: collapse; font-size: 11px; text-align: center; }
        th { background: #12161c; padding: 12px 5px; color: #848e9c; position: sticky; top: 0; font-size: 10px; }
        td { padding: 12px 2px; border-bottom: 1px solid #23272e; font-weight: 600; vertical-align: middle; }
        
        .hist-logo { width: 14px; height: 14px; border-radius: 50%; vertical-align: middle; margin-right: 3px; border: 1px solid rgba(255,255,255,0.1); }
        .locked-sub { display: block; font-size: 9px; color: #848e9c; margin-top: 2px; }

        .action-area { position: fixed; bottom: 0; width: 100%; padding: 15px; background: #12161c; border-top: 1px solid var(--border); z-index: 100; }
        .t-btn { flex: 1; padding: 16px; border: none; border-radius: 10px; font-weight: 900; font-size: 16px; color: white; cursor: pointer; }
        .t-btn:disabled { opacity: 0.4; filter: grayscale(1); }

        .modal-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.85); display: none; justify-content: center; align-items: center; z-index: 3000; }
        .modal-box { background: var(--card); padding: 25px; border-radius: 15px; width: 90%; max-width: 360px; text-align: center; border: 1px solid var(--border); }
        .modal-box input { width: 100%; padding: 12px; background: #0b0e11; border: 1px solid var(--border); color: white; border-radius: 8px; margin: 15px 0; font-size: 20px; text-align: center; }

        /* Animations */
        .blink { animation: blink 1s infinite; }
        @keyframes blink { 0%, 100% { opacity: 1; } 50% { opacity: 0.2; } }
        .spinner-sm { width: 14px; height: 14px; border: 2px solid rgba(255,255,255,0.1); border-top: 2px solid var(--primary); border-radius: 50%; animation: spin 0.8s linear infinite; display: inline-block; vertical-align: middle; }
        @keyframes spin { 100% { transform: rotate(360deg); } }
    </style>
</head>
<body>

    <header class="header">
        <div class="asset-selector">
            <img id="assetLogo" src="assets/logos/btc.png">
            <select id="assetSelect" onchange="window.switchAsset(this.value)">
                <option value="btc">BTC/USDT</option>
                <option value="eth">ETH/USDT</option>
                <option value="bnb">BNB/USDT</option>
                <option value="sol">SOL/USDT</option>
            </select>
        </div>
        <div class="bal-box">
            <span id="headerBalance" class="bal-amount">0.00000000</span>
            <span id="headerAssetUnit" style="font-size:10px; color:#848e9c;">BTC</span>
        </div>
        <div id="priceDisplay" style="justify-self: end; color: var(--up); font-weight: 900; font-size: 17px;">$0.00</div>
    </header>

    <div class="chart-section">
        <div class="chart-overlay">
            <div><div id="statusLabel" class="blink" style="color:var(--up); font-weight:800; font-size:11px;">TRADING TIME</div></div>
            <div id="timerClock" class="timer-clock">00:00</div>
        </div>
        <div id="chartDot"></div>
        <canvas id="liveChart"></canvas>
    </div>

    <div class="history-section">
        <h1 class="history-header">MARKET HISTORY</h1>
        <div class="table-container">
            <table>
                <thead>
                    <tr><th>Round</th><th>Time</th><th>Locked Price</th><th>Action</th><th>Result</th><th>My Win</th></tr>
                </thead>
                <tbody id="historyBody"></tbody>
            </table>
        </div>
    </div>

    <div class="action-area">
        <div style="display:flex; gap:12px; max-width:600px; margin:0 auto;">
            <button id="upBtn" class="t-btn" style="background: var(--up);" onclick="window.openBetModal('UP')">UP</button>
            <button id="downBtn" class="t-btn" style="background: var(--down);" onclick="window.openBetModal('DOWN')">DOWN</button>
        </div>
    </div>

    <div id="betModal" class="modal-overlay">
        <div class="modal-box">
            <h3 id="modalTitle" style="color:var(--primary)">Bet UP</h3>
            <p style="font-size: 11px; color: #848e9c; margin-top: 8px;">Available: <span id="modalAvbl">0.00</span></p>
            <input type="number" id="betAmount" step="0.00000001" placeholder="0.00000000">
            <div style="display: flex; gap: 10px;">
                <button class="t-btn" style="background:#2b3139;" onclick="window.closeBetModal()">Cancel</button>
                <button class="t-btn" style="background:var(--primary); color:black;" onclick="window.confirmBet()">Confirm</button>
            </div>
        </div>
    </div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getDatabase, ref, onValue, set, update, get } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";
    import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

    const firebaseConfig = {
        apiKey: "AIzaSyAMxtJedkehhxJRMPZLjhpKHqneHEWsGlE",
        authDomain: "smat-exchange.firebaseapp.com",
        databaseURL: "https://smat-exchange-default-rtdb.firebaseio.com",
        projectId: "smat-exchange",
        appId: "1:836334569396:web:679effe640b3453412d4e1"
    };

    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app);
    const auth = getAuth(app);

    const assets = {
        btc: { symbol: 'btcusdt', round: 10001, logo: "assets/logos/btc.png", unit: "BTC", currentPrice: 0, pending: null },
        eth: { symbol: 'ethusdt', round: 20001, logo: "assets/logos/eth.png", unit: "ETH", currentPrice: 0, pending: null },
        bnb: { symbol: 'bnbusdt', round: 30001, logo: "assets/logos/bnb.png", unit: "BNB", currentPrice: 0, pending: null },
        sol: { symbol: 'solusdt', round: 40001, logo: "assets/logos/sol.png", unit: "SOL", currentPrice: 0, pending: null }
    };

    let activeKey = 'btc';
    let user = null;
    let currentGlobalState = "TRADING";

    const ctx = document.getElementById('liveChart').getContext('2d');
    const chart = new Chart(ctx, {
        type: 'line',
        data: { labels: Array(50).fill(''), datasets: [{ data: Array(50).fill(0), borderColor: '#00ffff', borderWidth: 2, pointRadius: 0, tension: 0.4, fill: true, backgroundColor: 'rgba(0, 255, 255, 0.05)' }] },
        options: { responsive: true, maintainAspectRatio: false, animation: false, scales: { x: { display: false }, y: { display: false } }, plugins: { legend: { display: false } } }
    });

    // ==================== মাস্টার ক্লক এবং টাইমার ====================
    function initTimerEngine() {
        const timerRef = ref(db, 'timerLogic');
        onValue(timerRef, (snap) => {
            const data = snap.val();
            if (data) updateUI(data.timeLeft, data.state);
        });
    }

    setInterval(async () => {
        const timerRef = ref(db, 'timerLogic');
        const snap = await get(timerRef);
        const data = snap.val();
        if (!data) return;

        let t = data.timeLeft;
        let s = data.state;

        if (t > 0) {
            t--;
        } else {
            if (s === "TRADING") { s = "CLOSED"; t = 3; Object.keys(assets).forEach(k => lockRound(k)); }
            else if (s === "CLOSED") { s = "WAITING"; t = 180; }
            else { s = "TRADING"; t = 60; Object.keys(assets).forEach(k => finalizeRound(k)); }
        }
        await update(timerRef, { timeLeft: t, state: s });
    }, 1000);

    function updateUI(t, s) {
        currentGlobalState = s;
        const min = Math.floor(t / 60);
        const sec = t % 60;
        document.getElementById('timerClock').innerText = `${min.toString().padStart(2,'0')}:${sec.toString().padStart(2,'0')}`;
        
        const lbl = document.getElementById('statusLabel');
        lbl.innerText = s === "TRADING" ? "TRADING TIME" : (s === "CLOSED" ? "TRADING CLOSED" : "WAITING RESULT");
        lbl.style.color = s === "TRADING" ? "var(--up)" : (s === "CLOSED" ? "var(--down)" : "var(--warn)");
        
        document.getElementById('upBtn').disabled = (s !== "TRADING");
        document.getElementById('downBtn').disabled = (s !== "TRADING");
        
        if (user) syncHistory(); // টাইমার পরিবর্তনের সাথে সাথে টেবিল রি-রেন্ডার
    }

    // ==================== ট্রেডিং লজিক (Lock & Result) ====================
    async function lockRound(key) {
        if (!user) return;
        const rid = assets[key].round;
        const bet = assets[key].pending;
        const entry = {
            rid: rid,
            time: new Date().toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'}),
            lockedPrice: assets[key].currentPrice,
            action: bet ? bet.side : "No Trade",
            betAmt: bet ? bet.amount : 0,
            isPending: true,
            logo: assets[key].logo
        };
        await set(ref(db, `history/${user.uid}/${key}/${rid}`), entry);
    }

    async function finalizeRound(key) {
        if (!user) return;
        const snap = await get(ref(db, `history/${user.uid}/${key}`));
        const history = snap.val() || {};
        const finalPrice = assets[key].currentPrice;

        for (let rid in history) {
            if (history[rid].isPending) {
                const rec = history[rid];
                let status = "LOSS";
                let winAmt = 0;

                if (rec.action === "No Trade") {
                    status = "No Trade";
                } else if (finalPrice === rec.lockedPrice) {
                    status = "DRAW"; // Equal Price Logic
                    winAmt = rec.betAmt * 0.5; // ৫০% রিফান্ড
                } else {
                    const isWin = (rec.action === "UP" && finalPrice > rec.lockedPrice) || (rec.action === "DOWN" && finalPrice < rec.lockedPrice);
                    if (isWin) {
                        status = "WIN";
                        winAmt = rec.betAmt + (rec.betAmt * 0.96); // Bet + 96% Profit
                    }
                }

                if (winAmt > 0) {
                    const bRef = ref(db, `users/${user.uid}/balances/${key}`);
                    const bSnap = await get(bRef);
                    await set(bRef, (parseFloat(bSnap.val() || 0) + winAmt).toFixed(8));
                }

                await update(ref(db, `history/${user.uid}/${key}/${rid}`), {
                    isPending: false,
                    resultPrice: finalPrice,
                    status: status
                });
            }
        }
        assets[key].round++;
        assets[key].pending = null;
    }

    function renderTable(data) {
        const body = document.getElementById('historyBody');
        body.innerHTML = "";
        if (!data) return;

        Object.values(data).reverse().slice(0, 15).forEach(item => {
            const isWaiting = item.isPending && currentGlobalState === "WAITING";
            const rowClass = isWaiting ? 'blink' : '';
            
            body.innerHTML += `<tr class="${rowClass}">
                <td><img src="${item.logo}" class="hist-logo"> ${item.rid}</td>
                <td>${item.time}</td>
                <td>
                    $${parseFloat(item.lockedPrice || 0).toFixed(2)}
                    <span class="locked-sub">Locked</span>
                </td>
                <td style="color:${item.action==='UP'?'var(--up)':(item.action==='DOWN'?'var(--down)':'#848e9c')}">${item.action}</td>
                <td>
                    ${item.isPending ? '<div class="spinner-sm"></div>' : '$'+parseFloat(item.resultPrice).toFixed(2)}
                </td>
                <td style="color:${item.status==='WIN'?'var(--up)':(item.status==='LOSS'?'var(--down)':'#848e9c')}">
                    ${item.isPending ? '<div class="spinner-sm"></div>' : (item.status === 'WIN' ? '<img src="'+item.logo+'" class="hist-logo">'+item.status : item.status)}
                </td>
            </tr>`;
        });
    }

    // ==================== ইউজার ইন্টারঅ্যাকশন ====================
    window.switchAsset = (v) => {
        activeKey = v;
        document.getElementById('assetLogo').src = assets[v].logo;
        document.getElementById('headerAssetUnit').innerText = assets[v].unit;
        syncUser();
    };

    window.openBetModal = (side) => {
        if (currentGlobalState !== "TRADING") return;
        document.getElementById('modalTitle').innerText = "Bet " + side;
        document.getElementById('modalAvbl').innerText = document.getElementById('headerBalance').innerText + " " + assets[activeKey].unit;
        document.getElementById('betModal').style.display = 'flex';
        document.getElementById('betModal').dataset.side = side;
    };

    window.closeBetModal = () => document.getElementById('betModal').style.display = 'none';

    window.confirmBet = async () => {
        const amt = parseFloat(document.getElementById('betAmount').value);
        if (isNaN(amt) || amt <= 0) return alert("Enter Amount");

        const balRef = ref(db, `users/${user.uid}/balances/${activeKey}`);
        const bSnap = await get(balRef);
        const curBal = parseFloat(bSnap.val() || 0);

        if (amt > curBal) return alert("Insufficient Balance");

        await set(balRef, (curBal - amt).toFixed(8));
        assets[activeKey].pending = { side: document.getElementById('betModal').dataset.side, amount: amt };
        window.closeBetModal();
        document.getElementById('betAmount').value = "";
    };

    function syncUser() {
        if (!user) return;
        onValue(ref(db, `users/${user.uid}/balances/${activeKey}`), (s) => {
            document.getElementById('headerBalance').innerText = parseFloat(s.val() || 0).toFixed(8);
        });
        syncHistory();
    }

    function syncHistory() {
        if (!user) return;
        get(ref(db, `history/${user.uid}/${activeKey}`)).then(s => renderTable(s.val()));
    }

    // ==================== WebSocket (Binance) ====================
    function initWS() {
        const streams = Object.values(assets).map(a => `${a.symbol}@aggTrade`).join('/');
        const ws = new WebSocket(`wss://stream.binance.com:9443/stream?streams=${streams}`);
        ws.onmessage = (e) => {
            const d = JSON.parse(e.data);
            const key = Object.keys(assets).find(k => assets[k].symbol === d.data.s.toLowerCase());
            if (key) {
                const p = parseFloat(d.data.p);
                assets[key].currentPrice = p;
                if (key === activeKey) {
                    document.getElementById('priceDisplay').innerText = '$' + p.toFixed(2);
                    chart.data.datasets[0].data.shift(); chart.data.datasets[0].data.push(p); chart.update('none');
                    const meta = chart.getDatasetMeta(0).data[40];
                    if (meta) document.getElementById('chartDot').style.top = (meta.y - 6) + 'px';
                }
            }
        };
    }

    onAuthStateChanged(auth, (u) => {
        if (u) { user = u; syncUser(); initWS(); initTimerEngine(); }
    });
</script>
</body>
</html>
