<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SMAT CEX | Pro Prediction Engine</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root { --bg: #0b0e11; --card: #181a20; --border: #2b3139; --up: #0ecb81; --down: #f6465d; --warn: #f0b90b; --primary: #f0b90b; --cyan: #00ffff; }
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Inter', sans-serif; }
        body { background: var(--bg); color: white; height: 100vh; display: flex; flex-direction: column; overflow: hidden; }
        
        /* Header & Assets */
        .header { display: grid; grid-template-columns: 1fr 1.2fr 1fr; align-items: center; padding: 10px 15px; background: #12161c; border-bottom: 1px solid var(--border); }
        .asset-selector { display: flex; align-items: center; gap: 8px; background: #1e2329; padding: 5px 8px; border-radius: 8px; border: 1px solid var(--border); }
        .asset-selector img { width: 22px; height: 22px; border-radius: 50%; object-fit: cover; }
        .asset-selector select { background: transparent; color: white; border: none; font-weight: 700; outline: none; cursor: pointer; }
        
        .bal-box { background:none; border: none; padding: 0 0; text-align: center; border-radius: 4px; }
        .bal-amount { font-weight: 800; font-size: 14px; color: var(--primary); }
        
        /* Chart & Dynamic Status */
        .chart-section { width: 100%; position: relative; background: #000; height: 25vh; border-bottom: 1px solid var(--border); overflow: hidden; } /* overflow: hidden যোগ করা হয়েছে */
        .chart-overlay { position: absolute; top: 0; left: 0; width: 100%; z-index: 10; display: flex; justify-content: space-between; padding: 12px; pointer-events: none; }
        .status-container { display: flex; flex-direction: column; gap: 4px; }
        .timer-clock { font-size: 26px; font-weight: 900; color: white; text-align: right; }
        
        /* chartDot সিএসএস পুরোপুরি সরিয়ে দেওয়া হয়েছে */
        
        /* History Table */
        .history-section { flex: 1; background: var(--card); display: flex; flex-direction: column; overflow: hidden; padding-bottom: 85px; }
        .history-header { text-align: center; padding: 10px; font-size: 15px; font-weight: 900; border-bottom: 1px solid var(--border); background: #12161c; }
        .table-container { flex: 1; overflow-y: auto; overflow-x: auto; }
        table { width: 100%; border-collapse: collapse; font-size: 11px; text-align: center; min-width: 520px; }
        th { background: #12161c; padding: 12px 5px; color: #848e9c; position: sticky; top: 0; z-index: 5; }
        td { padding: 12px 2px; border-bottom: 1px solid #23272e; font-weight: 600; vertical-align: middle; }
        
        .hist-logo { width: 16px; height: 16px; border-radius: 50%; vertical-align: middle; margin-right: 4px; border: 1px solid rgba(255,255,255,0.1); }
        .sub-text { display: block; font-size: 9px; color: #848e9c; margin-top: 2px; }

        /* Action Buttons */
        .action-area { position: fixed; bottom: 0; width: 100%; padding: 15px; background: #12161c; border-top: 1px solid var(--border); z-index: 2000; }
        .t-btn { flex: 1; padding: 16px; border: none; border-radius: 10px; font-weight: 900; font-size: 16px; color: white; cursor: pointer; text-transform: uppercase; }
        .t-btn:disabled { opacity: 0.4; cursor: not-allowed; filter: grayscale(1); }
        
        /* Modals & Loaders */
        .modal-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.85); display: none; justify-content: center; align-items: center; z-index: 3000; }
        .modal-box { background: var(--card); padding: 25px; border-radius: 15px; width: 90%; max-width: 360px; text-align: center; border: 1px solid var(--border); }
        .modal-box input { width: 100%; padding: 12px; background: #0b0e11; border: 1px solid var(--border); color: white; border-radius: 8px; margin: 15px 0; font-size: 20px; text-align: center; outline: none; }
        
        .blink { animation: blink 1s infinite; }
        @keyframes blink { 0%, 100% { opacity: 1; } 50% { opacity: 0.2; } }
        .spinner-sm { width: 14px; height: 14px; border: 2px solid rgba(255,255,255,0.1); border-top: 2px solid var(--primary); border-radius: 50%; animation: spin 0.8s linear infinite; display: inline-block; vertical-align: middle; margin-right: 5px; }
        @keyframes spin { 100% { transform: rotate(360deg); } }
    </style>
</head>
<body>

    <header class="header">
        <div class="asset-selector">
            <img id="assetLogo" src="assets/logos/btc.png">
            <select id="assetSelect" onchange="window.switchAsset(this.value)">
                <option value="btc">BTC/USDT</option>
                <option value="eth">ETH/USDT</option>
                <option value="bnb">BNB/USDT</option>
                <option value="sol">SOL/USDT</option>
            </select>
        </div>
        <div class="bal-box"> Aval :
            <span id="headerBalance" class="bal-amount">0.00000000</span>
            <span id="headerAssetUnit" style="font-size:10px; color:#848e9c;">BTC</span>
        </div>
        <div id="priceDisplay" style="justify-self: end; color: var(--up); font-weight: 900; font-size: 17px;">$0.00</div>
    </header>

    <div class="chart-section">
        <div class="chart-overlay">
            <div class="status-container">
                <div id="statusLabel" class="blink" style="color:var(--up); font-weight:800; font-size:11px;">
                    TRADING TIME
                </div>
                <div id="dynamicLockedInfo" style="font-size: 10px; color: #848e9c; font-weight: 600;"></div>
            </div>
            <div id="timerClock" class="timer-clock">00:00</div>
        </div>
        <canvas id="liveChart"></canvas>
    </div>

    <div class="history-section">
        <h1 class="history-header">REAL-TIME MARKET HISTORY</h1>
        <div class="table-container">
            <table>
                <thead>
                    <tr><th>Round</th><th>Time</th><th>Locked Price</th><th>Action</th><th>Result</th><th>My Win</th></tr>
                </thead>
                <tbody id="historyBody"></tbody>
            </table>
        </div>
    </div>

    <div class="action-area">
        <div style="display:flex; gap:12px; max-width:600px; margin:0 auto;">
            <button id="upBtn" class="t-btn" style="background: var(--up);" onclick="window.openBetModal('UP')">UP</button>
            <button id="downBtn" class="t-btn" style="background: var(--down);" onclick="window.openBetModal('DOWN')">DOWN</button>
        </div>
    </div>

    <div id="betModal" class="modal-overlay">
        <div class="modal-box">
            <h3 id="modalTitle" style="color:var(--primary)">Bet UP</h3>
            <p style="font-size: 11px; color: #848e9c; margin-top: 8px;">Available Balance: <span id="modalAvbl">0.00</span></p>
            <input type="number" id="betAmount" step="0.00000001" placeholder="0.00000000">
            <div style="display: flex; gap: 10px;">
                <button class="t-btn" style="background:#2b3139;" onclick="window.closeBetModal()">Cancel</button>
                <button class="t-btn" style="background:var(--primary); color:black;" onclick="window.confirmBet()">Confirm</button>
            </div>
        </div>
    </div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getDatabase, ref, onValue, set, update, get } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";
    import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

    const firebaseConfig = {
        apiKey: "AIzaSyAMxtJedkehhxJRMPZLjhpKHqneHEWsGlE",
        authDomain: "smat-exchange.firebaseapp.com",
        databaseURL: "https://smat-exchange-default-rtdb.firebaseio.com",
        projectId: "smat-exchange",
        appId: "1:836334569396:web:679effe640b3453412d4e1"
    };

    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app);
    const auth = getAuth(app);

    const assets = {
        btc: { symbol: 'btcusdt', round: 10001, logo: "assets/logos/btc.png", unit: "BTC", currentPrice: 0, pending: null, lockedPrice: 0 },
        eth: { symbol: 'ethusdt', round: 20001, logo: "assets/logos/eth.png", unit: "ETH", currentPrice: 0, pending: null, lockedPrice: 0 },
        bnb: { symbol: 'bnbusdt', round: 30001, logo: "assets/logos/bnb.png", unit: "BNB", currentPrice: 0, pending: null, lockedPrice: 0 },
        sol: { symbol: 'solusdt', round: 40001, logo: "assets/logos/sol.png", unit: "SOL", currentPrice: 0, pending: null, lockedPrice: 0 }
    };

    let activeKey = 'btc';
    let user = null;
    let globalState = "TRADING";

    const ctx = document.getElementById('liveChart').getContext('2d');

    // সবুজ রঙের গ্রেডিয়েন্ট তৈরি (উপর থেকে নিচে হালকা হবে) - ফিচার মার্কেট থেকে কপি করা হয়েছে
    const gradient = ctx.createLinearGradient(0, 0, 0, 400);
    gradient.addColorStop(0, 'rgba(14, 203, 129, 0.4)'); // উপরের গাঢ় সবুজ
    gradient.addColorStop(1, 'rgba(14, 203, 129, 0)');   // নিচে একদম হালকা

    // চার্ট ইনিশিয়ালাইজেশন - ফিচার মার্কেট থেকে কপি করা হয়েছে
    const chart = new Chart(ctx, {
        type: 'line',
        data: { 
            labels: Array(50).fill(''), 
            datasets: [{ 
                data: Array(50).fill(0), 
                borderColor: '#0ecb81',     // প্রফেশনাল বাইনান্স গ্রিন বর্ডার
                borderWidth: 2, 
                pointRadius: 0, 
                tension: 0.45,             // রেখাটি মসৃণ বা কার্ভি দেখাবে
                fill: true, 
                backgroundColor: gradient, // গ্রেডিয়েন্ট ব্যাকগ্রাউন্ড
                capBezierPoints: true
            }] 
        },
        options: { 
            responsive: true, 
            maintainAspectRatio: false, 
            animation: {
                duration: 800,             // চার্ট মুভমেন্ট স্মুথ করার জন্য
                easing: 'easeInOutQuad'
            },
            scales: { 
                x: { display: false }, 
                y: { 
                    display: true,
                    position: 'right',      // প্রাইস লেভেল ডানে দেখাবে
                    grid: {
                        color: 'rgba(255, 255, 255, 0.03)', // খুব হালকা গ্রিড
                        drawTicks: false
                    },
                    ticks: {
                        color: '#848e9c',   // টেক্সট কালার
                        font: { size: 10 },
                        count: 8 // খুব বেশি হিজিবিজি হবে না
                    }
                } 
            }, 
            plugins: { legend: { display: false } } 
        }
    });


    function initTimer() {
        onValue(ref(db, 'roundLogic'), (snap) => {
            const rounds = snap.val();
            if (rounds) {
                Object.keys(rounds).forEach(key => { 
                    if(assets[key]) assets[key].round = rounds[key]; 
                });
            }
        });
        
        onValue(ref(db, 'timerLogic'), (snap) => {
            const data = snap.val();
            if (data) updateEngineUI(data.timeLeft, data.state);
        });
    }

    setInterval(async () => {
        const timerRef = ref(db, 'timerLogic');
        const snap = await get(timerRef);
        const data = snap.val();
        if (!data) return;

        let t = data.timeLeft;
        let s = data.state;

        if (t > 0) {
            t--;
        } else {
            if (s === "TRADING") { 
                s = "CLOSED"; t = 3; 
                Object.keys(assets).forEach(key => lockAndSaveRound(key)); 
            }
            else if (s === "CLOSED") { s = "WAITING"; t = 180; }
            else { 
                s = "TRADING"; t = 60; 
                Object.keys(assets).forEach(key => finalizeAndReset(key));
            }
        }
        await update(timerRef, { timeLeft: t, state: s });
    }, 1000);

    function updateEngineUI(t, s) {
        globalState = s;
        const min = Math.floor(t / 60);
        const sec = t % 60;
        document.getElementById('timerClock').innerText = `${min.toString().padStart(2,'0')}:${sec.toString().padStart(2,'0')}`;
        
        const lbl = document.getElementById('statusLabel');
        const lockedDiv = document.getElementById('dynamicLockedInfo');
        
        if (s === "TRADING") {
            lbl.innerHTML = `TRADING TIME`; 
            lbl.style.color = "var(--up)";
            lockedDiv.innerText = ""; 
        } else if (s === "CLOSED") {
            lbl.innerHTML = `TRADING CLOSED`; 
            lbl.style.color = "var(--down)";
            lockedDiv.innerText = "";
        } else {
            // WAITING RESULT স্টেট
            lbl.innerHTML = `<div class="spinner-sm"></div> WAITING RESULT`; 
            lbl.style.color = "var(--warn)";
            
            // রিফ্রেশ দিলেও ডাটাবেস থেকে Locked Price রিকভার করার লজিক
            if (user) {
                const rid = assets[activeKey].round;
                onValue(ref(db, `history/${user.uid}/${activeKey}/${rid}`), (snapshot) => {
                    const rec = snapshot.val();
                    if (rec && rec.isPending) {
                        lockedDiv.innerText = `Locked Price: $${parseFloat(rec.lockedPrice).toFixed(2)}`;
                    }
                });
            }
        }
        
        // বাটন কন্ট্রোল
        document.getElementById('upBtn').disabled = (s !== "TRADING");
        document.getElementById('downBtn').disabled = (s !== "TRADING");
        
        // হিস্ট্রি সিঙ্ক্রোনাইজেশন
        if (user) syncHistory();
    }
    

    async function lockAndSaveRound(key) {
        assets[key].lockedPrice = assets[key].currentPrice; 
        if (!user) return;
        const rid = assets[key].round;
        const bet = assets[key].pending;
        const entry = {
            rid: rid,
            time: new Date().toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'}),
            lockedPrice: assets[key].currentPrice,
            action: bet ? bet.side : "No Trade",
            betAmt: bet ? bet.amount : 0,
            isPending: true,
            logo: assets[key].logo
        };
        await set(ref(db, `history/${user.uid}/${key}/${rid}`), entry);
    }

    async function finalizeAndReset(key) {
        if (!user) return;
        const snap = await get(ref(db, `history/${user.uid}/${key}`));
        const history = snap.val() || {};
        const resPrice = assets[key].currentPrice;

        for (let rid in history) {
            if (history[rid].isPending) {
                const rec = history[rid];
                let status = "LOSS";
                let winAmt = 0;

                if (rec.action === "No Trade") {
                    status = "No Trade";
                } else if (resPrice === rec.lockedPrice) {
                    status = "DRAW"; 
                    winAmt = rec.betAmt * 0.5;
                } else {
                    const win = (rec.action === "UP" && resPrice > rec.lockedPrice) || (rec.action === "DOWN" && resPrice < rec.lockedPrice);
                    if (win) {
                        status = "WIN";
                        winAmt = rec.betAmt + (rec.betAmt * 0.96);
                    }
                }

                if (winAmt > 0) {
                    const bRef = ref(db, `users/${user.uid}/balances/${key}`);
                    const bSnap = await get(bRef);
                    await set(bRef, (parseFloat(bSnap.val() || 0) + winAmt).toFixed(8));
                }

                await update(ref(db, `history/${user.uid}/${key}/${rid}`), {
                    isPending: false,
                    resultPrice: resPrice,
                    status: status,
                    finalWin: winAmt
                });
            }
        }

        // --- নতুন ইউজারের জন্য গ্লোবাল হিস্ট্রি সেভ (আপনার লজিকের বাইরে আলাদা সেভ হবে) ---
        const currentRid = assets[key].round;
        await set(ref(db, `marketHistory/${key}/${currentRid}`), {
            rid: currentRid,
            time: new Date().toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'}),
            lockedPrice: assets[key].lockedPrice || assets[key].currentPrice,
            resultPrice: resPrice,
            logo: assets[key].logo
        });

        assets[key].round++;
        await update(ref(db, 'roundLogic'), { [key]: assets[key].round });
        
        assets[key].pending = null;
        if (key === activeKey) document.getElementById('dynamicLockedInfo').innerText = "";
    }

    async function syncHistory() {
        if (!user) return;
        
        // গ্লোবাল ডাটা (আগের রাউন্ডগুলো দেখানোর জন্য)
        const gSnap = await get(ref(db, `marketHistory/${activeKey}`));
        const globalData = gSnap.val() || {};
        
        // ইউজারের নিজস্ব ডাটা (Action এবং Win দেখানোর জন্য)
        const snap = await get(ref(db, `history/${user.uid}/${activeKey}`));
        const data = snap.val() || {};
        
        // গ্লোবাল এবং পার্সোনাল ডাটা মার্জ করা হচ্ছে যাতে আপনার কন্ডিশন ঠিক থাকে
        const mergedData = { ...globalData, ...data };
        
        const body = document.getElementById('historyBody');
        body.innerHTML = "";

        Object.values(mergedData).reverse().slice(0, 15).forEach(item => {
            const isWaiting = item.isPending && globalState === "WAITING";
            let winHtml = "";

            if (item.isPending) {
                winHtml = '<div class="spinner-sm"></div>';
            } else if (item.status === "WIN") {
                winHtml = `<div style="color:var(--up)"><img src="${item.logo}" class="hist-logo">${parseFloat(item.finalWin || 0).toFixed(8)}</div>`;
            } else if (item.status === "LOSS") {
                winHtml = `<div style="color:var(--down)"><img src="${item.logo}" class="hist-logo">0.00000000</div>`;
            } else if (item.status === "DRAW") {
                winHtml = `<div style="color:var(--warn)"><img src="${item.logo}" class="hist-logo">${parseFloat(item.finalWin || 0).toFixed(8)}</div>`;
            } else {
                winHtml = '<span style="color:#848e9c">--</span>';
            }

            // আপনার অরিজিনাল Blink এবং Table কন্ডিশন হুবহু রাখা হয়েছে
            body.innerHTML += `<tr class="${isWaiting ? 'blink' : ''}">
                <td><img src="${item.logo}" class="hist-logo"> ${item.rid}</td>
                <td>${item.time}</td>
                <td>$${parseFloat(item.lockedPrice || 0).toFixed(2)}<span class="sub-text">Locked Price</span></td>
                <td style="color:${item.action==='UP'?'var(--up)':(item.action==='DOWN'?'var(--down)':'#848e9c')}">${item.action || '--'}</td>
                <td>${(item.isPending || !item.resultPrice) ? '<div class="spinner-sm"></div>' : '$'+parseFloat(item.resultPrice).toFixed(2)}</td>
                <td>${winHtml}</td>
            </tr>`;
        });
    }

    window.switchAsset = (val) => {
        activeKey = val;
        document.getElementById('assetLogo').src = assets[val].logo;
        document.getElementById('headerAssetUnit').innerText = assets[val].unit;
        chart.data.datasets[0].data = Array(50).fill(assets[val].currentPrice);
        syncUser();
    };

    window.openBetModal = (side) => {
        if (globalState !== "TRADING") return;
        document.getElementById('modalTitle').innerText = "Bet " + side;
        document.getElementById('modalAvbl').innerText = document.getElementById('headerBalance').innerText + " " + assets[activeKey].unit;
        document.getElementById('betModal').style.display = 'flex';
        document.getElementById('betModal').dataset.side = side;
    };

    window.closeBetModal = () => document.getElementById('betModal').style.display = 'none';

    window.confirmBet = async () => {
        const amtInput = document.getElementById('betAmount');
        const amt = parseFloat(amtInput.value);
        if (isNaN(amt) || amt <= 0) return alert("পরিমাণ লিখুন");

        const balRef = ref(db, `users/${user.uid}/balances/${activeKey}`);
        const bSnap = await get(balRef);
        const curBal = parseFloat(bSnap.val() || 0);

        if (amt > curBal) return alert("পর্যাপ্ত ব্যালেন্স নেই");

        await set(balRef, (curBal - amt).toFixed(8));
        assets[activeKey].pending = { side: document.getElementById('betModal').dataset.side, amount: amt };
        window.closeBetModal();
        amtInput.value = "";
    };

    function syncUser() {
        if (!user) return;
        onValue(ref(db, `users/${user.uid}/balances/${activeKey}`), (s) => {
            document.getElementById('headerBalance').innerText = parseFloat(s.val() || 0).toFixed(8);
        });
        syncHistory();
    }

    function initWS() {
        const streamList = Object.values(assets).map(a => `${a.symbol}@trade`).join('/');
        const ws = new WebSocket(`wss://stream.binance.com:9443/stream?streams=${streamList}`);
        
        ws.onmessage = (e) => {
            const d = JSON.parse(e.data);
            const key = Object.keys(assets).find(k => assets[k].symbol === d.data.s.toLowerCase());
            
            if (key) {
                const price = parseFloat(d.data.p);
                assets[key].currentPrice = price; 

                if (key === activeKey) {
                    document.getElementById('priceDisplay').innerText = '$' + price.toFixed(2);
                    
                    // চার্ট ডাটা আপডেট - ফিচার মার্কেট থেকে কপি করা হয়েছে
                    chart.data.datasets[0].data.shift();
                    chart.data.datasets[0].data.push(price);
                    chart.update('none'); // 'none' দিলে এনিমেশন ছাড়াই আপডেট হবে যা দ্রুত কাজ করে

                    // চার্টের ডট (chartDot) মুভ করার লজিক পুরোপুরি সরিয়ে দেওয়া হয়েছে
                }
            }
        };
        ws.onclose = () => setTimeout(initWS, 1000);
    }

    onAuthStateChanged(auth, (u) => {
        if (u) { user = u; syncUser(); initWS(); initTimer(); }
    });


</script>
