<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SMAT CEX | Full Prediction Engine</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root { --bg: #0b0e11; --card: #181a20; --border: #2b3139; --up: #0ecb81; --down: #f6465d; --warn: #f0b90b; --primary: #f0b90b; --cyan: #00ffff; }
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Inter', sans-serif; }
        body { background: var(--bg); color: white; height: 100vh; display: flex; flex-direction: column; overflow: hidden; }
        
        .header { display: grid; grid-template-columns: 1fr 1.2fr 1fr; align-items: center; padding: 10px 15px; background: #12161c; border-bottom: 1px solid var(--border); }
        .asset-selector { display: flex; align-items: center; gap: 8px; background: #1e2329; padding: 5px 8px; border-radius: 8px; border: 1px solid var(--border); }
        .asset-selector img { width: 20px; height: 20px; border-radius: 50%; }
        .asset-selector select { background: transparent; color: white; border: none; font-weight: 700; outline: none; cursor: pointer; }
        
        .bal-box { background: rgba(240, 185, 11, 0.1); border: 1px solid rgba(240, 185, 11, 0.2); padding: 5px; text-align: center; border-radius: 4px; }
        .bal-amount { font-weight: 800; font-size: 14px; color: var(--primary); }
        
        .chart-section { width: 100%; position: relative; background: #000; height: 32vh; border-bottom: 1px solid var(--border); }
        .chart-overlay { position: absolute; top: 0; left: 0; width: 100%; z-index: 10; display: flex; justify-content: space-between; padding: 12px; pointer-events: none; }
        .timer-clock { font-size: 26px; font-weight: 900; color: white; }
        #chartDot { position: absolute; left: 50%; width: 12px; height: 12px; background: var(--cyan); border-radius: 50%; z-index: 5; transform: translateX(-50%); box-shadow: 0 0 15px var(--cyan); }
        
        .history-section { flex: 1; background: var(--card); display: flex; flex-direction: column; overflow: hidden; padding-bottom: 85px; }
        .history-header { text-align: center; padding: 10px; font-size: 15px; font-weight: 900; border-bottom: 1px solid var(--border); background: #12161c; }
        .table-container { flex: 1; overflow-y: auto; overflow-x: auto; }
        table { width: 100%; border-collapse: collapse; font-size: 11px; text-align: center; min-width: 450px; }
        th { background: #12161c; padding: 12px; color: #848e9c; position: sticky; top: 0; }
        td { padding: 12px 5px; border-bottom: 1px solid #23272e; font-weight: 600; }
        
        .action-area { position: fixed; bottom: 0; width: 100%; padding: 15px; background: #12161c; border-top: 1px solid var(--border); z-index: 2000; }
        .t-btn { flex: 1; padding: 16px; border: none; border-radius: 10px; font-weight: 900; font-size: 16px; color: white; cursor: pointer; text-transform: uppercase; }
        .t-btn:disabled { opacity: 0.5; cursor: not-allowed; }
        
        .modal-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.85); display: none; justify-content: center; align-items: center; z-index: 3000; }
        .modal-box { background: var(--card); padding: 25px; border-radius: 15px; width: 90%; max-width: 360px; text-align: center; border: 1px solid var(--border); }
        .modal-box input { width: 100%; padding: 12px; background: #0b0e11; border: 1px solid var(--border); color: white; border-radius: 8px; margin: 15px 0; font-size: 20px; text-align: center; }
        
        .blink { animation: blink 1s infinite; }
        @keyframes blink { 0%, 100% { opacity: 1; } 50% { opacity: 0.3; } }
        .spinner-sm { width: 12px; height: 12px; border: 2px solid rgba(255,255,255,0.2); border-top: 2px solid white; border-radius: 50%; animation: spin 0.8s linear infinite; display: inline-block; }
        @keyframes spin { 100% { transform: rotate(360deg); } }
    </style>
</head>
<body>

    <header class="header">
        <div class="asset-selector">
            <img id="assetLogo" src="assets/logos/btc.png">
            <select id="assetSelect" onchange="window.switchAsset(this.value)">
                <option value="btc">Bitcoin</option>
                <option value="eth">Ethereum</option>
                <option value="bnb">Binance</option>
                <option value="sol">Solana</option>
            </select>
        </div>
        <div class="bal-box">
            <span id="headerBalance" class="bal-amount">0.00000000</span>
            <span id="headerAssetUnit" style="font-size:11px; color:white;">BTC</span>
        </div>
        <div id="priceDisplay" style="justify-self: end; color: var(--up); font-weight: 900; font-size: 18px;">$0.00</div>
    </header>

    <div class="chart-section">
        <div class="chart-overlay">
            <div>
                <div id="statusLabel" class="blink" style="color:var(--up); font-weight:800; font-size:12px;">TRADING TIME</div>
            </div>
            <div id="timerClock" class="timer-clock">00:00</div>
        </div>
        <div id="chartDot"></div>
        <canvas id="liveChart"></canvas>
    </div>

    <div class="history-section">
        <h1 class="history-header">HISTORY</h1>
        <div class="table-container">
            <table>
                <thead>
                    <tr><th>Round</th><th>Time</th><th>Locked</th><th>Action</th><th>Result</th><th>Win/Loss</th></tr>
                </thead>
                <tbody id="historyBody"></tbody>
            </table>
        </div>
    </div>

    <div class="action-area">
        <div style="display:flex; gap:12px; max-width:600px; margin:0 auto;">
            <button id="upBtn" class="t-btn" style="background: var(--up);" onclick="window.openBetModal('UP')">UP</button>
            <button id="downBtn" class="t-btn" style="background: var(--down);" onclick="window.openBetModal('DOWN')">DOWN</button>
        </div>
    </div>

    <div id="betModal" class="modal-overlay">
        <div class="modal-box">
            <h3 id="modalTitle" style="color:var(--primary)">Bet UP</h3>
            <p style="font-size: 12px; color: #848e9c; margin-top: 10px;">Balance: <span id="modalAvbl">0.00</span></p>
            <input type="number" id="betAmount" step="0.00000001" placeholder="0.00000000">
            <div style="display: flex; gap: 10px;">
                <button class="t-btn" style="background:#2b3139;" onclick="window.closeBetModal()">Cancel</button>
                <button class="t-btn" style="background:var(--primary); color:black;" onclick="window.confirmBet()">Confirm</button>
            </div>
        </div>
    </div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getDatabase, ref, onValue, set, update, get } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";
    import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

    const firebaseConfig = {
        apiKey: "AIzaSyAMxtJedkehhxJRMPZLjhpKHqneHEWsGlE",
        authDomain: "smat-exchange.firebaseapp.com",
        databaseURL: "https://smat-exchange-default-rtdb.firebaseio.com",
        projectId: "smat-exchange",
        appId: "1:836334569396:web:679effe640b3453412d4e1"
    };

    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app);
    const auth = getAuth(app);

    const assets = {
        btc: { symbol: 'btcusdt', round: 10001, logo: "assets/logos/btc.png", unit: "BTC", currentPrice: 0, pending: null, lockedPrice: 0 },
        eth: { symbol: 'ethusdt', round: 20001, logo: "assets/logos/eth.png", unit: "ETH", currentPrice: 0, pending: null, lockedPrice: 0 },
        bnb: { symbol: 'bnbusdt', round: 30001, logo: "assets/logos/bnb.png", unit: "BNB", currentPrice: 0, pending: null, lockedPrice: 0 },
        sol: { symbol: 'solusdt', round: 40001, logo: "assets/logos/sol.png", unit: "SOL", currentPrice: 0, pending: null, lockedPrice: 0 }
    };

    let activeKey = 'btc';
    let user = null;
    let currentState = "TRADING";

    // Chart Setup
    const ctx = document.getElementById('liveChart').getContext('2d');
    const chart = new Chart(ctx, {
        type: 'line',
        data: { labels: Array(60).fill(''), datasets: [{ data: Array(60).fill(0), borderColor: '#00ffff', borderWidth: 2, pointRadius: 0, tension: 0.4, fill: true, backgroundColor: 'rgba(0, 255, 255, 0.1)' }] },
        options: { responsive: true, maintainAspectRatio: false, animation: false, scales: { x: { display: false }, y: { display: false } }, plugins: { legend: { display: false } } }
    });

    // ==================== ফায়ারবেস টাইমার ও মাস্টার ক্লক ====================
    function initTimer() {
        const timerRef = ref(db, 'timerLogic');
        onValue(timerRef, (snap) => {
            const data = snap.val();
            if (data) {
                updateUI(data.timeLeft, data.state);
            }
        });
    }

    setInterval(async () => {
        const timerRef = ref(db, 'timerLogic');
        const snap = await get(timerRef);
        const data = snap.val();
        if (!data) return;

        let t = data.timeLeft;
        let s = data.state;

        if (t > 0) {
            t--;
        } else {
            if (s === "TRADING") { 
                s = "CLOSED"; t = 3; 
                Object.keys(assets).forEach(key => lockAndSave(key)); 
            }
            else if (s === "CLOSED") { s = "WAITING"; t = 180; }
            else { 
                s = "TRADING"; t = 60; 
                Object.keys(assets).forEach(key => finalizeRound(key));
            }
        }
        await update(timerRef, { timeLeft: t, state: s });
    }, 1000);

    function updateUI(t, s) {
        currentState = s;
        const min = Math.floor(t / 60);
        const sec = t % 60;
        document.getElementById('timerClock').innerText = `${min.toString().padStart(2,'0')}:${sec.toString().padStart(2,'0')}`;
        
        const lbl = document.getElementById('statusLabel');
        if (s === "TRADING") {
            lbl.innerText = "TRADING TIME"; lbl.style.color = "var(--up)";
        } else if (s === "CLOSED") {
            lbl.innerText = "TRADING CLOSED"; lbl.style.color = "var(--down)";
        } else {
            lbl.innerText = "WAITING RESULT"; lbl.style.color = "var(--warn)";
        }
        
        document.getElementById('upBtn').disabled = (s !== "TRADING");
        document.getElementById('downBtn').disabled = (s !== "TRADING");
    }

    // ==================== হিস্ট্রি ও রেজাল্ট লজিক ====================
    async function lockAndSave(key) {
        assets[key].lockedPrice = assets[key].currentPrice;
        if (!user) return;
        const rid = assets[key].round;
        const pb = assets[key].pending;
        const historyData = {
            rid: rid,
            time: new Date().toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'}),
            locked: assets[key].lockedPrice,
            action: pb ? pb.side : "---",
            betAmt: pb ? pb.amount : 0,
            isPending: true,
            logo: assets[key].logo
        };
        await set(ref(db, `history/${user.uid}/${key}/${rid}`), historyData);
    }

    async function finalizeRound(key) {
        if (!user) return;
        const histRef = ref(db, `history/${user.uid}/${key}`);
        const snap = await get(histRef);
        const history = snap.val() || {};

        for (let rid in history) {
            if (history[rid].isPending) {
                const rec = history[rid];
                const resPrice = assets[key].currentPrice;
                const win = (rec.action === "UP" && resPrice > rec.locked) || (rec.action === "DOWN" && resPrice < rec.locked);
                
                if (win && rec.betAmt > 0) {
                    const balRef = ref(db, `users/${user.uid}/balances/${key}`);
                    const bSnap = await get(balRef);
                    const newBal = (parseFloat(bSnap.val() || 0) + (rec.betAmt * 1.96)).toFixed(8);
                    await set(balRef, newBal);
                }

                await update(ref(db, `history/${user.uid}/${key}/${rid}`), {
                    isPending: false,
                    resPrice: resPrice,
                    win: win ? "WIN" : "LOSS"
                });
            }
        }
        assets[key].round++;
        assets[key].pending = null;
    }

    function renderHistory(data) {
        const body = document.getElementById('historyBody');
        body.innerHTML = "";
        Object.values(data).reverse().slice(0, 15).forEach(item => {
            const isWaiting = item.isPending && currentState === "WAITING";
            body.innerHTML += `<tr>
                <td class="${isWaiting ? 'blink' : ''}"><img src="${item.logo}" style="width:12px;"> ${item.rid}</td>
                <td class="${isWaiting ? 'blink' : ''}">${item.time}</td>
                <td>$${parseFloat(item.locked || 0).toFixed(2)}</td>
                <td style="color:${item.action==='UP'?'var(--up)':'var(--down)'}">${item.action}</td>
                <td>${item.isPending ? '<div class="spinner-sm"></div>' : '$'+parseFloat(item.resPrice).toFixed(2)}</td>
                <td style="color:${item.win==='WIN'?'var(--up)':'white'}">
                    ${item.isPending ? '<div class="spinner-sm"></div>' : '<img src="'+item.logo+'" style="width:10px;"> '+item.win}
                </td>
            </tr>`;
        });
    }

    // ==================== ইউজার একশন ও ব্যালেন্স ====================
    window.switchAsset = (val) => {
        activeKey = val;
        document.getElementById('assetLogo').src = assets[val].logo;
        document.getElementById('headerAssetUnit').innerText = assets[val].unit;
        syncUser();
    };

    window.openBetModal = (side) => {
        if (currentState !== "TRADING") return;
        document.getElementById('modalTitle').innerText = "Bet " + side;
        document.getElementById('modalAvbl').innerText = document.getElementById('headerBalance').innerText + " " + assets[activeKey].unit;
        document.getElementById('betModal').style.display = 'flex';
        document.getElementById('betModal').dataset.side = side;
    };

    window.closeBetModal = () => document.getElementById('betModal').style.display = 'none';

    window.confirmBet = async () => {
        const amtInput = document.getElementById('betAmount');
        const amt = parseFloat(amtInput.value);
        if (isNaN(amt) || amt <= 0) return alert("Amount দিন");

        const balRef = ref(db, `users/${user.uid}/balances/${activeKey}`);
        const bSnap = await get(balRef);
        const curBal = parseFloat(bSnap.val() || 0);

        if (amt > curBal) return alert("ব্যালেন্স নেই!");

        await set(balRef, (curBal - amt).toFixed(8));
        assets[activeKey].pending = { side: document.getElementById('betModal').dataset.side, amount: amt };
        window.closeBetModal();
        amtInput.value = "";
    };

    function syncUser() {
        if (!user) return;
        onValue(ref(db, `users/${user.uid}/balances/${activeKey}`), (s) => {
            document.getElementById('headerBalance').innerText = parseFloat(s.val() || 0).toFixed(8);
        });
        onValue(ref(db, `history/${user.uid}/${activeKey}`), (s) => renderHistory(s.val() || {}));
    }

    // WebSocket Binance
    function initWS() {
        const streams = Object.values(assets).map(a => `${a.symbol}@aggTrade`).join('/');
        const ws = new WebSocket(`wss://stream.binance.com:9443/stream?streams=${streams}`);
        ws.onmessage = (e) => {
            const d = JSON.parse(e.data);
            const key = Object.keys(assets).find(k => assets[k].symbol === d.data.s.toLowerCase());
            if (key) {
                const price = parseFloat(d.data.p);
                assets[key].currentPrice = price;
                if (key === activeKey) {
                    document.getElementById('priceDisplay').innerText = '$' + price.toFixed(2);
                    chart.data.datasets[0].data.shift(); chart.data.datasets[0].data.push(price); chart.update('none');
                    const meta = chart.getDatasetMeta(0).data[40];
                    if (meta) document.getElementById('chartDot').style.top = (meta.y - 6) + 'px';
                }
            }
        };
    }

    onAuthStateChanged(auth, (u) => {
        if (u) { user = u; syncUser(); initWS(); initTimer(); }
    });
</script>
</body>
</html>
