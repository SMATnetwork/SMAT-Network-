<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SMAT CEX | Absolute Prediction Engine</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root { --bg: #0b0e11; --card: #181a20; --border: #2b3139; --up: #0ecb81; --down: #f6465d; --warn: #f0b90b; --primary: #f0b90b; --cyan: #00ffff; }
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Inter', sans-serif; }
        body { background: var(--bg); color: white; height: 100vh; display: flex; flex-direction: column; overflow: hidden; }
        
        /* Layout Components */
        .header { display: grid; grid-template-columns: 1fr 1.2fr 1fr; align-items: center; padding: 10px 15px; background: #12161c; border-bottom: 1px solid var(--border); }
        .asset-selector { display: flex; align-items: center; gap: 8px; background: #1e2329; padding: 5px 8px; border-radius: 8px; border: 1px solid var(--border); }
        .asset-selector img { width: 22px; height: 22px; border-radius: 50%; }
        .asset-selector select { background: transparent; color: white; border: none; font-weight: 700; outline: none; cursor: pointer; }
        
        .bal-box { background: rgba(240, 185, 11, 0.1); border: 1px solid rgba(240, 185, 11, 0.2); padding: 5px; text-align: center; border-radius: 4px; }
        .bal-amount { font-weight: 800; font-size: 13px; color: var(--primary); }
        
        /* Chart Section */
        .chart-section { width: 100%; position: relative; background: #000; height: 32vh; border-bottom: 1px solid var(--border); }
        .chart-overlay { position: absolute; top: 0; left: 0; width: 100%; z-index: 10; display: flex; justify-content: space-between; padding: 12px; pointer-events: none; }
        .status-container { display: flex; flex-direction: column; gap: 4px; }
        .timer-clock { font-size: 26px; font-weight: 900; color: white; }
        #chartDot { position: absolute; left: 50%; width: 12px; height: 12px; background: var(--cyan); border-radius: 50%; z-index: 5; transform: translateX(-50%); box-shadow: 0 0 15px var(--cyan); }
        
        /* History Section */
        .history-section { flex: 1; background: var(--card); display: flex; flex-direction: column; overflow: hidden; padding-bottom: 85px; }
        .history-header { text-align: center; padding: 10px; font-size: 15px; font-weight: 900; border-bottom: 1px solid var(--border); background: #12161c; }
        .table-container { flex: 1; overflow-y: auto; overflow-x: auto; }
        table { width: 100%; border-collapse: collapse; font-size: 11px; text-align: center; min-width: 520px; }
        th { background: #12161c; padding: 12px 5px; color: #848e9c; position: sticky; top: 0; z-index: 5; }
        td { padding: 12px 2px; border-bottom: 1px solid #23272e; font-weight: 600; vertical-align: middle; }
        
        .hist-logo { width: 16px; height: 16px; border-radius: 50%; vertical-align: middle; margin-right: 4px; }
        .sub-text { display: block; font-size: 9px; color: #848e9c; }

        /* Controls */
        .action-area { position: fixed; bottom: 0; width: 100%; padding: 15px; background: #12161c; border-top: 1px solid var(--border); z-index: 2000; }
        .t-btn { flex: 1; padding: 16px; border: none; border-radius: 10px; font-weight: 900; font-size: 16px; color: white; cursor: pointer; text-transform: uppercase; }
        .t-btn:disabled { opacity: 0.4; filter: grayscale(1); }
        
        /* Animations */
        .spinner-sm { width: 14px; height: 14px; border: 2px solid rgba(255,255,255,0.1); border-top: 2px solid var(--primary); border-radius: 50%; animation: spin 0.8s linear infinite; display: inline-block; vertical-align: middle; margin-right: 5px; }
        @keyframes spin { 100% { transform: rotate(360deg); } }
        .blink { animation: blink 1s infinite; }
        @keyframes blink { 0%, 100% { opacity: 1; } 50% { opacity: 0.2; } }
    </style>
</head>
<body>

    <header class="header">
        <div class="asset-selector">
            <img id="assetLogo" src="assets/logos/btc.png">
            <select id="assetSelect" onchange="window.switchAsset(this.value)">
                <option value="btc">BTC/USDT</option>
                <option value="eth">ETH/USDT</option>
                <option value="bnb">BNB/USDT</option>
                <option value="sol">SOL/USDT</option>
            </select>
        </div>
        <div class="bal-box">
            <span id="headerBalance" class="bal-amount">0.00000000</span>
            <span id="headerAssetUnit" style="font-size:10px; color:#848e9c;">BTC</span>
        </div>
        <div id="priceDisplay" style="justify-self: end; color: var(--up); font-weight: 900; font-size: 17px;">$0.00</div>
    </header>

    <div class="chart-section">
        <div class="chart-overlay">
            <div class="status-container">
                <div id="statusLabel" class="blink" style="font-weight:800; font-size:11px;">TRADING TIME</div>
                <div id="dynamicLockedInfo" style="font-size: 10px; color: #848e9c; font-weight: 600;"></div>
            </div>
            <div id="timerClock" class="timer-clock">00:00</div>
        </div>
        <div id="chartDot"></div>
        <canvas id="liveChart"></canvas>
    </div>

    <div class="history-section">
        <h1 class="history-header">REAL-TIME MARKET HISTORY</h1>
        <div class="table-container">
            <table>
                <thead>
                    <tr><th>Round</th><th>Time</th><th>Locked Price</th><th>Action</th><th>Result</th><th>My Win</th></tr>
                </thead>
                <tbody id="historyBody"></tbody>
            </table>
        </div>
    </div>

    <div class="action-area">
        <div style="display:flex; gap:12px; max-width:600px; margin:0 auto;">
            <button id="upBtn" class="t-btn" style="background: var(--up);" onclick="window.openBetModal('UP')">UP</button>
            <button id="downBtn" class="t-btn" style="background: var(--down);" onclick="window.openBetModal('DOWN')">DOWN</button>
        </div>
    </div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getDatabase, ref, onValue, set, update, get } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";
    import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

    const firebaseConfig = {
        apiKey: "AIzaSyAMxtJedkehhxJRMPZLjhpKHqneHEWsGlE",
        authDomain: "smat-exchange.firebaseapp.com",
        databaseURL: "https://smat-exchange-default-rtdb.firebaseio.com",
        projectId: "smat-exchange",
        appId: "1:836334569396:web:679effe640b3453412d4e1"
    };

    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app);
    const auth = getAuth(app);

    const assets = {
        btc: { symbol: 'btcusdt', round: 10001, logo: "assets/logos/btc.png", unit: "BTC", currentPrice: 0 },
        eth: { symbol: 'ethusdt', round: 20001, logo: "assets/logos/eth.png", unit: "ETH", currentPrice: 0 },
        bnb: { symbol: 'bnbusdt', round: 30001, logo: "assets/logos/bnb.png", unit: "BNB", currentPrice: 0 },
        sol: { symbol: 'solusdt', round: 40001, logo: "assets/logos/sol.png", unit: "SOL", currentPrice: 0 }
    };

    let activeKey = 'btc';
    let user = null;
    let globalState = "TRADING";

    // --- Chart Config ---
    const ctx = document.getElementById('liveChart').getContext('2d');
    const chart = new Chart(ctx, {
        type: 'line',
        data: { labels: Array(50).fill(''), datasets: [{ data: Array(50).fill(0), borderColor: '#00ffff', borderWidth: 2, pointRadius: 0, tension: 0.4, fill: true, backgroundColor: 'rgba(0, 255, 255, 0.05)' }] },
        options: { responsive: true, maintainAspectRatio: false, animation: false, scales: { x: { display: false }, y: { display: false } }, plugins: { legend: { display: false } } }
    });

    // --- Timer & UI Core ---
    function initTimer() {
        onValue(ref(db, 'timerLogic'), (snap) => {
            const data = snap.val();
            if (data) {
                globalState = data.state;
                updateEngineUI(data.timeLeft, data.state);
            }
        });
    }

    function updateEngineUI(t, s) {
        const min = Math.floor(t / 60);
        const sec = t % 60;
        document.getElementById('timerClock').innerText = `${min.toString().padStart(2,'0')}:${sec.toString().padStart(2,'0')}`;
        
        const lbl = document.getElementById('statusLabel');
        const lockedDiv = document.getElementById('dynamicLockedInfo');
        
        if (s === "TRADING") {
            lbl.innerHTML = `TRADING TIME`; lbl.style.color = "var(--up)";
            lockedDiv.innerText = "";
        } else if (s === "CLOSED") {
            lbl.innerHTML = `TRADING CLOSED`; lbl.style.color = "var(--down)";
            lockedDiv.innerText = "";
        } else {
            lbl.innerHTML = `<div class="spinner-sm"></div> WAITING RESULT`; lbl.style.color = "var(--warn)";
            if (user) {
                const rid = assets[activeKey].round;
                get(ref(db, `history/${user.uid}/${activeKey}/${rid}`)).then(snap => {
                    const h = snap.val();
                    if (h && h.isPending) {
                        lockedDiv.innerText = `Locked Price: $${parseFloat(h.lockedPrice).toFixed(2)}`;
                    }
                });
            }
        }
        document.getElementById('upBtn').disabled = (s !== "TRADING");
        document.getElementById('downBtn').disabled = (s !== "TRADING");
        if (user) syncHistory();
    }

    // --- Logic Core ---
    async function lockRound(key) {
        if (!user) return;
        const rid = assets[key].round;
        const snap = await get(ref(db, `temp_bet/${user.uid}/${key}`));
        const bet = snap.val();

        const entry = {
            rid: rid,
            time: new Date().toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'}),
            lockedPrice: assets[key].currentPrice,
            action: bet ? bet.side : "No Trade",
            betAmt: bet ? bet.amount : 0,
            isPending: true,
            logo: assets[key].logo
        };
        await set(ref(db, `history/${user.uid}/${key}/${rid}`), entry);
        await set(ref(db, `temp_bet/${user.uid}/${key}`), null);
    }

    async function finalizeRound(key) {
        if (!user) return;
        const rid = assets[key].round;
        const snap = await get(ref(db, `history/${user.uid}/${key}/${rid}`));
        const rec = snap.val();
        if (!rec || !rec.isPending) return;

        const resPrice = assets[key].currentPrice;
        let status = "LOSS";
        let winAmt = 0;

        if (rec.action === "No Trade") {
            status = "No Trade";
        } else if (resPrice === rec.lockedPrice) {
            status = "DRAW"; winAmt = rec.betAmt * 0.5;
        } else {
            const isWin = (rec.action === "UP" && resPrice > rec.lockedPrice) || (rec.action === "DOWN" && resPrice < rec.lockedPrice);
            if (isWin) {
                status = "WIN"; winAmt = rec.betAmt + (rec.betAmt * 0.96);
            }
        }

        if (winAmt > 0) {
            const bRef = ref(db, `users/${user.uid}/balances/${key}`);
            const bSnap = await get(bRef);
            const currentBal = parseFloat(bSnap.val() || 0);
            await set(bRef, (currentBal + winAmt).toFixed(8));
        }

        await update(ref(db, `history/${user.uid}/${key}/${rid}`), {
            isPending: false, resultPrice: resPrice, status: status, finalWin: winAmt
        });
        assets[key].round++;
    }

    // --- High Accuracy Loop ---
    setInterval(async () => {
        const tRef = ref(db, 'timerLogic');
        const snap = await get(tRef);
        const d = snap.val();
        if (!d) return;
        let {timeLeft, state} = d;

        if (timeLeft > 0) {
            timeLeft--;
        } else {
            if (state === "TRADING") { state = "CLOSED"; timeLeft = 3; Object.keys(assets).forEach(k => lockRound(k)); }
            else if (state === "CLOSED") { state = "WAITING"; timeLeft = 180; }
            else { state = "TRADING"; timeLeft = 60; Object.keys(assets).forEach(k => finalizeRound(k)); }
        }
        await update(tRef, { timeLeft, state });
    }, 1000);

    // --- UI Rendering (Advanced My Win Logic) ---
    async function syncHistory() {
        if (!user) return;
        const snap = await get(ref(db, `history/${user.uid}/${activeKey}`));
        const data = snap.val() || {};
        const body = document.getElementById('historyBody');
        body.innerHTML = "";

        Object.values(data).reverse().slice(0, 15).forEach(item => {
            const isWait = item.isPending && globalState === "WAITING";
            let winDisplay = "";
            
            // My Win Column Logic
            if (item.isPending) {
                winDisplay = '<div class="spinner-sm"></div>';
            } else if (item.status === "WIN") {
                winDisplay = `<div style="color:var(--up)"><img src="${item.logo}" class="hist-logo">${parseFloat(item.finalWin).toFixed(8)}</div>`;
            } else if (item.status === "LOSS") {
                winDisplay = `<div style="color:var(--down)"><img src="${item.logo}" class="hist-logo">0.00000000</div>`;
            } else if (item.status === "DRAW") {
                winDisplay = `<div style="color:var(--warn)"><img src="${item.logo}" class="hist-logo">${parseFloat(item.finalWin).toFixed(8)}</div>`;
            } else {
                winDisplay = `<span style="color:#848e9c">--</span>`;
            }

            body.innerHTML += `<tr class="${isWait ? 'blink' : ''}">
                <td><img src="${item.logo}" class="hist-logo"> ${item.rid}</td>
                <td>${item.time}</td>
                <td>$${parseFloat(item.lockedPrice).toFixed(2)}<span class="sub-text">Locked Price</span></td>
                <td style="color:${item.action==='UP'?'var(--up)':(item.action==='DOWN'?'var(--down)':'#848e9c')}">${item.action}</td>
                <td>${item.isPending ? '<div class="spinner-sm"></div>' : '$'+parseFloat(item.resultPrice).toFixed(2)}</td>
                <td>${winDisplay}</td>
            </tr>`;
        });
    }

    // --- Utilities ---
    window.switchAsset = (val) => {
        activeKey = val;
        document.getElementById('assetLogo').src = assets[val].logo;
        document.getElementById('headerAssetUnit').innerText = assets[val].unit;
        syncUser();
    };

    window.openBetModal = async (side) => {
        if (globalState !== "TRADING") return;
        const amt = prompt(`Enter ${activeKey.toUpperCase()} amount for ${side}:`);
        if (!amt || isNaN(amt) || amt <= 0) return;
        
        const bSnap = await get(ref(db, `users/${user.uid}/balances/${activeKey}`));
        const bal = parseFloat(bSnap.val() || 0);
        if (parseFloat(amt) > bal) return alert("Insufficient Balance!");

        await set(ref(db, `users/${user.uid}/balances/${activeKey}`), (bal - parseFloat(amt)).toFixed(8));
        await set(ref(db, `temp_bet/${user.uid}/${activeKey}`), { side, amount: parseFloat(amt) });
        alert("Bet Placed Successfully!");
    };

    function syncUser() {
        onValue(ref(db, `users/${user.uid}/balances/${activeKey}`), s => {
            document.getElementById('headerBalance').innerText = parseFloat(s.val() || 0).toFixed(8);
        });
        syncHistory();
    }

    function initWS() {
        const ws = new WebSocket(`wss://stream.binance.com:9443/stream?streams=btcusdt@trade/ethusdt@trade/bnbusdt@trade/solusdt@trade`);
        ws.onmessage = (e) => {
            const d = JSON.parse(e.data);
            const key = d.data.s.toLowerCase().replace('usdt','');
            assets[key].currentPrice = parseFloat(d.data.p);
            if (key === activeKey) {
                document.getElementById('priceDisplay').innerText = '$' + assets[key].currentPrice.toFixed(2);
                chart.data.datasets[0].data.shift(); chart.data.datasets[0].data.push(assets[key].currentPrice); chart.update('none');
                const meta = chart.getDatasetMeta(0).data[49];
                if (meta) document.getElementById('chartDot').style.top = (meta.y - 6) + 'px';
            }
        };
    }

    onAuthStateChanged(auth, u => { if(u){ user=u; syncUser(); initWS(); initTimer(); } });
</script>
</body>
</html>
